<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Progress Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 44px; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 10px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .fp { background: #2A442A; border: 1px solid #5A845A; border-radius: 16px; padding: 5px 12px; font-size: .8rem; cursor: pointer; }
  .fp.on { background: #5AE57A; color: #325132; border-color: #5AE57A; font-weight: 500; }
  .log { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; margin-bottom: 6px; }
  .log .top { display: flex; justify-content: space-between; gap: 10px; }
  .log .nm { color: #5AE57A; font-weight: 500; font-size: .88rem; }
  .log .x { cursor: pointer; opacity: .5; flex: none; } .log .x:hover { opacity: 1; color: #5AE57A; }
  .log .tx { font-size: .87rem; margin-top: 2px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Student Progress Tracker</h1>
  <p class="sub">Log observations and progress notes for each student — for teachers and tutors.</p>

  <div class="panel">
    <div class="row">
      <div><label>Student</label><input id="student" placeholder="Name"></div>
      <div><label>Progress</label><select id="level"><option value="great">Doing great</option><option value="ok">On track</option><option value="watch">Needs support</option></select></div>
    </div>
    <label>Observation / note</label>
    <textarea id="note" placeholder="What you observed, a strength, a concern, a next step"></textarea>
    <button class="btn" onclick="add()">+ Log Note</button>
  </div>

  <div class="panel">
    <div class="filter" id="filter"></div>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('spt2')||'[]'), filter='all';
  const save=()=>localStorage.setItem('spt2',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const COL={great:'#5AE57A',ok:'#5AE57A',watch:'#5AE57A'};
  function add(){ if(!v('student')||!v('note')){ alert('Enter a student and a note.'); return; }
    R.push({s:v('student'),lvl:g('level').value,n:v('note'),d:new Date().toLocaleDateString(undefined,{month:'short',day:'numeric'})});
    g('note').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all notes?')){ R=[]; save(); render(); } }
  function setF(f){ filter=f; render(); }
  function render(){
    const students=[...new Set(R.map(x=>x.s))];
    g('filter').innerHTML='<span class="fp'+(filter==='all'?' on':'')+'" onclick="setF(\'all\')">All</span>'+
      students.map(s=>'<span class="fp'+(filter===s?' on':'')+'" onclick="setF(\''+s.replace(/'/g,"\\'")+'\')">'+esc(s)+'</span>').join('');
    const L=g('list');
    const shown=R.map((x,i)=>({x,i})).filter(o=>filter==='all'||o.x.s===filter);
    if(!shown.length){ L.innerHTML='<div class="empty">No progress notes yet.</div>'; return; }
    L.innerHTML=[...shown].reverse().map(({x,i})=>
      '<div class="log"><div class="top"><span class="nm"><span class="dot" style="background:'+COL[x.lvl]+'"></span>'+esc(x.s)+' <span style="opacity:.5;font-weight:400;font-size:.76rem">· '+x.d+'</span></span><span class="x" onclick="del('+i+')">✕</span></div><div class="tx">'+esc(x.n)+'</div></div>').join('');
  }
  render();
</script>
</body>
</html>
