<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Single Parent Support Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .lead { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 11px 14px; font-size: .87rem; font-style: italic; margin-bottom: 6px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Single Parent Support Planner</h1>
  <p class="sub">Doing it solo is heroic and heavy. Build a support plan so you are not carrying it all alone.</p>

  <div class="panel">
    <div class="lead">Asking for help is not failing at this. It is exactly how good single parenting works.</div>
    <label for="help">People I can ask for help (and what they could do)</label>
    <textarea id="help" placeholder="Family, friends, other parents — name them and a specific ask"></textarea>
    <label for="practical">My biggest practical pressure right now</label>
    <input id="practical" placeholder="e.g. School pickups, childcare gaps, money">
    <label for="solve">One step toward easing it</label>
    <textarea id="solve" placeholder="A small, doable next action"></textarea>
    <label for="recharge">How and when I will recharge</label>
    <textarea id="recharge" placeholder="Even small windows count — name them and protect them"></textarea>
    <label for="resource">Support or services I could look into</label>
    <input id="resource" placeholder="e.g. Local single-parent groups, school support, benefits">
    <label for="kind">What I want to remember on the hard days</label>
    <textarea id="kind" placeholder="A true, kind sentence for the tough moments"></textarea>
    <button class="btn" onclick="gen()">Build Support Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['help','practical','solve','recharge','resource','kind'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('spsp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('spsp_'+k,g(k).value)); });
  function gen(){
    const t=`MY SINGLE PARENT SUPPORT PLAN\n\nMY SUPPORT PEOPLE:\n${v('help')||'[who you can ask, and for what]'}\n\nBIGGEST PRESSURE RIGHT NOW:\n${v('practical')||'[name it]'}\n\nONE STEP TO EASE IT:\n${v('solve')||'[a small next action]'}\n\nHOW I WILL RECHARGE:\n${v('recharge')||'[your windows of rest]'}\n\nSUPPORT TO LOOK INTO:\n${v('resource')||'[services and groups]'}\n\nFOR THE HARD DAYS:\n${v('kind')||'[your kind, true reminder]'}\n\n--- Remember ---\nYou are one person doing the work of two — of course it is hard.\nA "good enough" day is a good day. Your child needs you present, not perfect.\nLook after yourself too — you are the heart of this home.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
