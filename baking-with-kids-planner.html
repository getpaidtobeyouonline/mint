<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Baking with Kids Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Baking with Kids Planner</h1>
  <p class="sub">A relaxed plan for baking together — without flour on the ceiling.</p>

  <div class="panel">
    <label for="what">What you are baking</label>
    <input id="what" placeholder="e.g. cupcakes, banana bread, gingerbread">
    <label for="age">Child's age &amp; experience</label>
    <input id="age" placeholder="e.g. 5, first time">
    <label for="prep">What to prep before they come in</label>
    <textarea id="prep" placeholder="Pre-weighed ingredients, oven on, aprons out"></textarea>
    <label for="theirjobs">Their jobs (safe, hands-on)</label>
    <textarea id="theirjobs" placeholder="e.g. mixing, pouring, mashing, decorating"></textarea>
    <label for="myjobs">Your jobs (grown-up only)</label>
    <textarea id="myjobs" placeholder="Hot oven, knife work, anything sharp or hot"></textarea>
    <button class="btn" onclick="gen()">Build Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['what','age','prep','theirjobs','myjobs'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('bwk_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('bwk_'+k,g(k).value)); });
  function gen(){
    const t='BAKING WITH KIDS — PLAN\n\nWE ARE BAKING: '+(v('what')||'[your bake]')+(v('age')?'  (age '+v('age')+')':'')+
    '\n\nPREP BEFORE WE START\n'+(v('prep')||'[pre-weigh ingredients, aprons out, oven on if needed]')+
    '\n\nTHEIR JOBS\n'+(v('theirjobs')||'[mixing, pouring, mashing, decorating]')+
    '\n\nMY JOBS (grown-up only)\n'+(v('myjobs')||'[hot oven, sharp knives, anything hot or sharp]')+
    '\n\n--- Baking-with-kids tips ---\nWeigh and measure everything before they arrive — keeps focus on the fun parts.\nGive each task a "we" or a "you" — they love feeling trusted.\nMess is part of it. Cover the surface, roll up sleeves and breathe.\nFinish with a clean-up game; little hands rinse bowls beautifully.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
