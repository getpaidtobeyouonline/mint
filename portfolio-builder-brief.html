<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Builder Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 54px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Portfolio Builder Brief</h1>
  <p class="sub">Plan a portfolio that wins work — before you build a single page.</p>

  <div class="panel">
    <label for="field">Your field / craft</label>
    <input id="field" placeholder="e.g. design, writing, development, photography">
    <label for="goal">What you want the portfolio to do</label>
    <input id="goal" placeholder="e.g. land freelance clients, get hired, get speaking gigs">
    <label for="audience">Who will view it</label>
    <input id="audience" placeholder="The exact person you want to impress">
    <label for="pieces">Your best 3-5 pieces to include</label>
    <textarea id="pieces" placeholder="List only your strongest, most relevant work"></textarea>
    <label for="present">How you will present each piece</label>
    <textarea id="present" placeholder="e.g. the brief, your role, the result, a visual"></textarea>
    <label for="host">Where you will host it</label>
    <input id="host" placeholder="e.g. own site, Behance, Notion, PDF">
    <button class="btn" onclick="gen()">Build Brief</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['field','goal','audience','pieces','present','host'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('pbr_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('pbr_'+k,g(k).value)); });
  function gen(){
    const t='PORTFOLIO BRIEF'+(v('field')?'\nField: '+v('field'):'')+
    '\n\nWHAT IT NEEDS TO DO:\n'+(v('goal')||'[the job of this portfolio]')+
    '\n\nWHO IT IS FOR:\n'+(v('audience')||'[the exact viewer]')+
    '\n\nPIECES TO INCLUDE:\n'+(v('pieces')||'[your 3-5 strongest, most relevant works]')+
    '\n\nHOW EACH PIECE IS PRESENTED:\n'+(v('present')||'[brief, role, result, visual]')+
    '\n\nWHERE IT LIVES:\n'+(v('host')||'[your chosen platform]')+
    '\n\n--- Portfolio rules ---\nShow fewer, stronger pieces — quality signals taste.\nFor each one tell the story: the problem, your part, the outcome.\nLead with the work most like the work you want more of.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
