<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Reading List Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 120px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 10px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat { flex: 1; min-width: 90px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 12px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #5AE57A; }
  .stat .l { font-size: .66rem; opacity: .65; text-transform: uppercase; }
  .filter { display: flex; gap: 6px; margin-bottom: 10px; }
  .fp { background: #2A442A; border: 1px solid #5A845A; border-radius: 16px; padding: 5px 13px; font-size: .8rem; cursor: pointer; }
  .fp.on { background: #5AE57A; color: #325132; border-color: #5AE57A; font-weight: 500; }
  .book { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 9px 13px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; gap: 10px; font-size: .87rem; }
  .book.read { border-left: 3px solid #5AE57A; }
  .book .st { cursor: pointer; font-size: .78rem; color: #5AE57A; flex: none; }
  .book .x { cursor: pointer; opacity: .5; flex: none; } .book .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Reading List Tracker</h1>
  <p class="sub">Track what you want to read, what you are reading, and what you have finished.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Book title</label><input id="title" placeholder="Title"></div>
      <div><label>Author</label><input id="author" placeholder="Author"></div>
    </div>
    <button class="btn" onclick="add()">+ Add to List</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="sWant">0</div><div class="l">Want to read</div></div>
    <div class="stat"><div class="v" id="sNow">0</div><div class="l">Reading</div></div>
    <div class="stat"><div class="v" id="sDone">0</div><div class="l">Finished</div></div>
  </div>

  <div class="panel">
    <div class="filter" id="filter"></div>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('rlt')||'[]'), filter='all';
  const save=()=>localStorage.setItem('rlt',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const STATES=['want','reading','done'];
  const SLABEL={want:'Want to read',reading:'Reading',done:'Finished'};
  function add(){ if(!v('title')){ alert('Enter a book title.'); return; }
    R.push({t:v('title'),a:v('author'),s:'want'}); g('title').value=''; g('author').value=''; save(); render(); }
  function cycle(i){ R[i].s=STATES[(STATES.indexOf(R[i].s)+1)%3]; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the whole list?')){ R=[]; save(); render(); } }
  function setF(f){ filter=f; render(); }
  function render(){
    g('sWant').textContent=R.filter(x=>x.s==='want').length;
    g('sNow').textContent=R.filter(x=>x.s==='reading').length;
    g('sDone').textContent=R.filter(x=>x.s==='done').length;
    g('filter').innerHTML=['all','want','reading','done'].map(f=>'<span class="fp'+(filter===f?' on':'')+'" onclick="setF(\''+f+'\')">'+(f==='all'?'All':SLABEL[f])+'</span>').join('');
    const L=g('list');
    const shown=R.map((x,i)=>({x,i})).filter(o=>filter==='all'||o.x.s===filter);
    if(!shown.length){ L.innerHTML='<div class="empty">No books here yet.</div>'; return; }
    L.innerHTML=shown.map(({x,i})=>
      '<div class="book'+(x.s==='done'?' read':'')+'"><span><b style="color:#5AE57A">'+esc(x.t)+'</b>'+(x.a?' · '+esc(x.a):'')+'</span><span style="display:flex;gap:10px;align-items:center"><span class="st" onclick="cycle('+i+')">'+SLABEL[x.s]+' ⟳</span><span class="x" onclick="del('+i+')">✕</span></span></div>').join('');
  }
  render();
</script>
</body>
</html>
