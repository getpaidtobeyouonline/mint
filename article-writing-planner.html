<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article Writing Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 54px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Article Writing Planner</h1>
  <p class="sub">Plan a focused article before you write — so the draft flows.</p>

  <div class="panel">
    <label for="topic">Working title / topic</label>
    <input id="topic" placeholder="What the article is about">
    <label for="idea">The one big idea (in a sentence)</label>
    <textarea id="idea" placeholder="If a reader remembers one thing, it is this"></textarea>
    <label for="reader">Who it is for</label>
    <input id="reader" placeholder="The exact reader and what they want">
    <label for="hook">Your opening hook</label>
    <textarea id="hook" placeholder="A question, story or surprising fact to start with"></textarea>
    <label for="points">Key points / sections</label>
    <textarea id="points" placeholder="The 3-5 things you will cover, in order"></textarea>
    <label for="cta">Closing / call to action</label>
    <input id="cta" placeholder="What you want the reader to do or feel">
    <label for="where">Where you will publish it</label>
    <input id="where" placeholder="e.g. LinkedIn, your blog, a publication">
    <button class="btn" onclick="gen()">Build Outline</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['topic','idea','reader','hook','points','cta','where'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('awp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('awp_'+k,g(k).value)); });
  function gen(){
    const t='ARTICLE OUTLINE'+(v('topic')?'\nWorking title: '+v('topic'):'')+
    '\n\nTHE ONE BIG IDEA:\n'+(v('idea')||'[the single takeaway]')+
    '\n\nWHO IT IS FOR:\n'+(v('reader')||'[your exact reader]')+
    '\n\n1. HOOK (opening)\n'+(v('hook')||'[a question, story or surprising fact]')+
    '\n\n2. BODY (key points)\n'+(v('points')||'[your 3-5 sections in order]')+
    '\n\n3. CLOSE (call to action)\n'+(v('cta')||'[what the reader should do next]')+
    (v('where')?'\n\nPUBLISH ON: '+v('where'):'')+
    '\n\n--- Writing reminders ---\nWrite the first draft fast and ugly — edit later.\nCut every sentence that does not serve the one big idea.\nA strong first line earns the second. Read it aloud before publishing.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
