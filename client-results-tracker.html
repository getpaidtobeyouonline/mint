<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Results Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .total { text-align: center; margin-bottom: 12px; }
  .total .n { font-family: 'Playfair Display', serif; font-size: 2.1rem; color: #5AE57A; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 9px 12px; margin-bottom: 6px; }
  .item .top { display: flex; justify-content: space-between; gap: 8px; }
  .item .nm { font-weight: 500; }
  .item .meta { font-size: .8rem; opacity: .65; }
  .item .x { cursor: pointer; opacity: .5; flex: none; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Client Results Tracker</h1>
  <p class="sub">Bank every client win — your library of proof for sales pages and content.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Client</label><input id="client" placeholder="Client name or initials"></div>
      <div><label>Date</label><input id="date" type="date"></div>
    </div>
    <label>The result / win</label>
    <input id="result" placeholder="Be specific — numbers, before/after, the breakthrough">
    <button class="btn" onclick="add()" style="margin-top:10px">+ Add Result</button>
  </div>

  <div class="panel">
    <div class="total"><span class="n" id="total">0</span><div style="opacity:.7;font-size:.85rem">client wins banked</div></div>
    <div id="list"></div>
    <button class="btn ghost" onclick="copyAll()" style="margin-top:8px">Copy All</button>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('clrt')||'[]');
  const save=()=>localStorage.setItem('clrt',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('result')){ alert('Enter the result.'); return; }
    R.unshift({c:v('client'),d:g('date').value,r:v('result')}); g('result').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all results?')){ R=[]; save(); render(); } }
  function copyAll(){ if(!R.length){ alert('Nothing to copy.'); return; }
    const t='CLIENT RESULTS\n\n'+R.map(x=>'- '+x.r+(x.c?'  ('+x.c+')':'')).join('\n');
    navigator.clipboard.writeText(t).then(()=>alert('Results copied!'),()=>alert('Copy failed.'));
  }
  function render(){
    g('total').textContent=R.length;
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No results banked yet.</div>'; return; }
    L.innerHTML=R.map((x,i)=>'<div class="item"><div class="top"><span class="nm">'+esc(x.r)+'</span><span class="x" onclick="del('+i+')">✕</span></div><div class="meta">'+(esc(x.c)||'—')+(x.d?'  ·  '+x.d:'')+'</div></div>').join('');
  }
  render();
</script>
</body>
</html>
