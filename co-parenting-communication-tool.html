<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Co Parenting Communication Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; min-height: 90px; }
  textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .check { margin-top: 14px; }
  .ci { display: flex; gap: 9px; align-items: flex-start; font-size: .88rem; padding: 5px 0; }
  .ci .d { color: #5AE57A; flex: none; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .93rem; margin-top: 14px; }
  .note { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; font-size: .8rem; opacity: .75; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Co Parenting Communication Tool</h1>
  <p class="sub">Rewrite a heated message into a calm, child-focused one before you send it.</p>

  <div class="panel">
    <label for="draft">Your draft message (write it however it comes out)</label>
    <textarea id="draft" placeholder="Get the raw version out here — this is just for you"></textarea>
    <button class="btn" onclick="check()">Run the Check</button>
    <button class="btn ghost" onclick="clearAll()">Clear</button>
    <div class="check" id="check"></div>
    <div class="note">A self-review tool — it does not send anything. The BIFF idea: keep messages Brief, Informative, Friendly and Firm.</div>
  </div>

  <div class="panel">
    <label for="clean">Your calm, rewritten version</label>
    <textarea id="clean" placeholder="Rewrite it here using the checklist — then copy it across"></textarea>
    <button class="btn" onclick="copyClean()">Copy Clean Version</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  ['draft','clean'].forEach(k=>{ const s=localStorage.getItem('cpct_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('cpct_'+k,g(k).value)); });
  function check(){
    const t=g('draft').value.toLowerCase();
    if(!t.trim()){ alert('Write your draft first.'); return; }
    const flags=[];
    if(/\b(you always|you never)\b/.test(t))flags.push(["⚠","Contains 'you always' / 'you never' — absolutes escalate. Stick to this specific situation."]);
    if(/[A-Z]{4,}/.test(g('draft').value))flags.push(["⚠","Has WORDS IN CAPS — it reads as shouting. Use normal case."]);
    if((g('draft').value.match(/!/g)||[]).length>1)flags.push(["⚠","Multiple exclamation marks — they add heat. Keep it flat and factual."]);
    if(/\b(stupid|lazy|selfish|ridiculous|pathetic|idiot)\b/.test(t))flags.push(["⚠","Contains a personal insult — remove it entirely. Attack the problem, not the person."]);
    if(/\b(your fault|blame|because of you)\b/.test(t))flags.push(["⚠","Assigns blame — co-parenting messages work better focused on the solution."]);
    if(g('draft').value.length>600)flags.push(["⚠","Quite long — long messages invite long arguments. Keep it brief."]);
    if(!/\b(child|kid|son|daughter|they|she|he|name)\b/.test(t))flags.push(["•","Tip: anchor the message in what is best for the child."]);
    let h='';
    if(!flags.length){ h='<div class="ci"><span class="d">✓</span><span>No red flags found. Still — read it once more as if you were receiving it.</span></div>'; }
    else h=flags.map(f=>'<div class="ci"><span class="d">'+f[0]+'</span><span>'+f[1]+'</span></div>').join('');
    h+='<div class="ci"><span class="d">✓</span><span>Checklist: Brief · Informative · Friendly · Firm. Would you be okay with a judge reading this?</span></div>';
    g('check').innerHTML=h;
  }
  function copyClean(){ const t=g('clean').value.trim(); if(!t){alert('Write your clean version first.');return;}
    navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  function clearAll(){ g('draft').value=''; g('check').innerHTML=''; localStorage.removeItem('cpct_draft'); }
</script>
</body>
</html>
