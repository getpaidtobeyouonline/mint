<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Country Research Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 46px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .9rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Country Research Tool</h1>
  <p class="sub">A structured profile for any country you are considering — visiting or moving to.</p>

  <div class="panel">
    <label for="country">Country</label>
    <input id="country" placeholder="The country you are researching">
    <label for="visa">Entry / visa &amp; residency rules</label>
    <textarea id="visa" placeholder="What it takes to visit or stay"></textarea>
    <label for="cost">Cost of living &amp; currency</label>
    <textarea id="cost" placeholder="Rough monthly costs, how it compares to home"></textarea>
    <label for="safety">Safety &amp; healthcare</label>
    <textarea id="safety" placeholder="Travel advice, health system, insurance needs"></textarea>
    <label for="climate">Climate &amp; best time to go</label>
    <input id="climate" placeholder="Weather pattern and ideal seasons">
    <label for="culture">Language &amp; culture notes</label>
    <textarea id="culture" placeholder="Language, customs, etiquette to know"></textarea>
    <label for="pros">Pros — what draws me to it</label>
    <textarea id="pros" placeholder="The appeal"></textarea>
    <label for="cons">Cons — the concerns</label>
    <textarea id="cons" placeholder="The downsides or worries"></textarea>
    <button class="btn" onclick="gen()">Build Country Profile</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['country','visa','cost','safety','climate','culture','pros','cons'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('crt2_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('crt2_'+k,g(k).value)); });
  function gen(){
    const t=`COUNTRY PROFILE: ${(v('country')||'[country]').toUpperCase()}\n\nENTRY / VISA & RESIDENCY:\n${v('visa')||'[rules]'}\n\nCOST OF LIVING & CURRENCY:\n${v('cost')||'[costs]'}\n\nSAFETY & HEALTHCARE:\n${v('safety')||'[notes]'}\n\nCLIMATE & BEST TIME TO GO:\n${v('climate')||'[seasons]'}\n\nLANGUAGE & CULTURE:\n${v('culture')||'[notes]'}\n\nPROS:\n${v('pros')||'[the appeal]'}\n\nCONS:\n${v('cons')||'[the concerns]'}\n\n--- Tip ---\nUse official government sources for visas and safety, and recent first-hand accounts for the day-to-day reality.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
