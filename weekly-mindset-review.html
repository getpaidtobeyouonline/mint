<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Mindset Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .blk { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
  .blk h4 { color: #5AE57A; font-size: .76rem; text-transform: uppercase; margin-bottom: 5px; }
  .blk p { font-size: .93rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Weekly Mindset Review</h1>
  <p class="sub">A 6-question Sunday review that catches the pattern before it becomes the year.</p>

  <div class="panel">
    <label for="energy">Where did my energy go this week?</label>
    <textarea id="energy" placeholder="People, tasks, themes that took the most"></textarea>
    <label for="proud">What am I proud of?</label>
    <textarea id="proud" placeholder="No bar — small counts"></textarea>
    <label for="story">A story I told myself this week that was not helpful</label>
    <textarea id="story" placeholder='e.g. "I am behind / I am too much / no one cares"'></textarea>
    <label for="lesson">The lesson the week was trying to teach me</label>
    <textarea id="lesson" placeholder="Even hard weeks have one"></textarea>
    <label for="protect">What will I protect more next week?</label>
    <input id="protect" placeholder="Time, focus, sleep, a relationship">
    <label for="permit">What am I giving myself permission to do (or not do)?</label>
    <input id="permit" placeholder="One specific thing">
    <button class="btn" onclick="gen()">Run Review</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['energy','proud','story','lesson','protect','permit'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('wmr_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('wmr_'+k,g(k).value)); });
  function gen(){
    g('out').innerHTML='<div class="blk"><h4>Energy went to</h4><p>'+esc(v('energy')||'—')+'</p></div>'+
      '<div class="blk"><h4>Proud of</h4><p>'+esc(v('proud')||'—')+'</p></div>'+
      '<div class="blk"><h4>Unhelpful story I told myself</h4><p>'+esc(v('story')||'—')+'</p></div>'+
      '<div class="blk"><h4>The lesson</h4><p>'+esc(v('lesson')||'—')+'</p></div>'+
      '<div class="blk"><h4>Protecting next week</h4><p>'+esc(v('protect')||'—')+'</p></div>'+
      '<div class="blk"><h4>Permission slip</h4><p>'+esc(v('permit')||'—')+'</p></div>'+
      '<div class="blk" style="border-left-color:#BFD8BF"><h4>The point</h4><p>This is the loop that compounds. Notice → name → protect → permit. Do this 50 weeks in a row and the year reshapes itself.</p></div>';
    g('out').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function copyOut(){ const t=g('out').innerText; if(!t){alert('Review first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
