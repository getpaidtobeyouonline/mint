<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Kids Meditation Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 520px; margin: 0 auto; text-align: center; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; }
  .sub { opacity: .75; margin: 8px 0 20px; font-size: .95rem; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 22px 20px; margin-bottom: 14px; }
  .presets { display: flex; gap: 7px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
  .pre { background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; border-radius: 20px; padding: 6px 14px; cursor: pointer; font-size: .84rem; font-family:'DM Sans',sans-serif; }
  .pre.on { background: #5AE57A; color: #325132; border-color: #5AE57A; font-weight: 500; }
  .stage { height: 220px; display: flex; align-items: center; justify-content: center; }
  .circle { width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle,#5AE57A,#5AE57A); transition: transform 4s ease-in-out; }
  .word { font-family: 'Playfair Display', serif; font-size: 1.2rem; min-height: 30px; opacity: .85; margin-top: 6px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 24px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 4px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  footer { opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Kids Meditation Tool</h1>
  <p class="sub">A friendly breathing buddy — watch the bubble grow and settle.</p>

  <div class="panel">
    <div class="presets" id="presets"></div>
    <div class="stage"><div class="circle" id="circle"></div></div>
    <div class="word" id="word">Press start when you are ready.</div>
    <div>
      <button class="btn" id="startBtn" onclick="toggle()">Start</button>
      <button class="btn ghost" onclick="stop()">Stop</button>
    </div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const MODES={
    'Calm bubble':{in:4,hold:0,out:4,inText:'Breathe in...',outText:'Breathe out...'},
    'Bear breath':{in:3,hold:3,out:3,inText:'Breathe in slowly',holdText:'Hold like a sleepy bear',outText:'Sigh it all out'},
    'Star nap':{in:4,hold:2,out:6,inText:'Sparkle in',holdText:'Hold the sparkle',outText:'Glow out the breath'}
  };
  let mode='Calm bubble', running=false, t=null;
  function drawPresets(){ g('presets').innerHTML=Object.keys(MODES).map(m=>'<span class="pre'+(m===mode?' on':'')+'" onclick="setMode(\''+m+'\')">'+m+'</span>').join(''); }
  function setMode(m){ if(running)return; mode=m; drawPresets(); }
  function toggle(){ running?stop():start(); }
  function stop(){ running=false; clearTimeout(t); g('startBtn').textContent='Start'; g('word').textContent='Lovely. Take that calm with you.'; g('circle').style.transform='scale(1)'; }
  function start(){ running=true; g('startBtn').textContent='Pause'; step('in'); }
  function step(phase){
    if(!running)return;
    const m=MODES[mode];
    if(phase==='in'){ g('circle').style.transitionDuration=m.in+'s'; g('circle').style.transform='scale(2.4)'; g('word').textContent=m.inText; t=setTimeout(()=>step(m.hold?'hold':'out'),m.in*1000); }
    else if(phase==='hold'){ g('word').textContent=m.holdText||'Hold'; t=setTimeout(()=>step('out'),m.hold*1000); }
    else { g('circle').style.transitionDuration=m.out+'s'; g('circle').style.transform='scale(1)'; g('word').textContent=m.outText; t=setTimeout(()=>step('in'),m.out*1000); }
  }
  drawPresets();
</script>
</body>
</html>
