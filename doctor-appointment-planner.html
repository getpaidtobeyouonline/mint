<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Doctor Appointment Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 56px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 140px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Doctor Appointment Planner</h1>
  <p class="sub">Walk in prepared. Most appointments are short — make every minute count.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="who">Doctor / clinic</label><input id="who" placeholder="e.g. Dr. Smith"></div>
      <div><label for="when">Appointment date/time</label><input id="when" type="datetime-local"></div>
    </div>
    <label for="reason">Main reason for the visit (one line)</label>
    <input id="reason" placeholder="The single most important thing to address">
    <label for="symptoms">Symptoms / changes since last visit</label>
    <textarea id="symptoms" placeholder="What, when it started, how often, severity"></textarea>
    <label for="questions">Questions you want answered (one per line)</label>
    <textarea id="questions" placeholder="Ask the most important one first"></textarea>
    <label for="meds">Current medications &amp; supplements</label>
    <textarea id="meds" placeholder="Names and doses"></textarea>
    <button class="btn" onclick="gen()">Build Prep Sheet</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['who','when','reason','symptoms','questions','meds'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('dap_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('dap_'+k,g(k).value)); });
  function gen(){
    const q=v('questions').split('\n').map(s=>s.trim()).filter(Boolean);
    const t=`APPOINTMENT PREP SHEET\n\n${v('who')||'[doctor]'}  ·  ${v('when')||'[date/time]'}\n\nMAIN REASON:\n${v('reason')||'[not set]'}\n\nSYMPTOMS / CHANGES:\n${v('symptoms')||'[not set]'}\n\nQUESTIONS TO ASK (most important first):\n${q.length?q.map((x,i)=>`  ${i+1}. ${x}`).join('\n'):'  1. [question]'}\n\nCURRENT MEDS & SUPPLEMENTS:\n${v('meds')||'[not set]'}\n\n--- During the appointment ---\n• Lead with the main reason — don't save it for last.\n• Ask them to write down anything important.\n• If unsure, ask: "What should I watch for, and when should I come back?"`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
