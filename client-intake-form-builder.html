<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Intake Form Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 54px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .hint { font-size: .78rem; opacity: .6; margin-top: 3px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Client Intake Form Builder</h1>
  <p class="sub">Generate a professional intake form to send every new client.</p>

  <div class="panel">
    <label for="biz">Your name / business</label>
    <input id="biz" placeholder="What appears at the top of the form">
    <label for="service">The service this form is for</label>
    <input id="service" placeholder="e.g. 1:1 coaching, consulting, done-for-you">
    <label for="custom">Your own custom questions (one per line)</label>
    <textarea id="custom" placeholder="Anything specific you need to know"></textarea>
    <div class="hint">Standard questions are included automatically — add only what is unique to you.</div>
    <button class="btn" onclick="gen()">Build Intake Form</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['biz','service','custom'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('cifb_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('cifb_'+k,g(k).value)); });
  function gen(){
    let n=12;
    const std=['Full name','Email and best contact number','What made you reach out now?','Where are things for you right now? (the current situation)','What is the biggest challenge you are facing?','What would success look like at the end of our work together?','What have you already tried?','On a scale of 1-10, how committed are you to making this change?','What might get in the way — and how can I best support you?','Your availability (days / times that work)','How did you hear about me?','Anything else you would like me to know?'];
    let t='CLIENT INTAKE FORM'+(v('biz')?'\n'+v('biz'):'')+(v('service')?'\n'+v('service'):'')+
    '\n\nWelcome! Please answer the questions below before our first session.\nThe more honest and detailed you are, the more I can help.\n\n';
    t+=std.map((q,i)=>(i+1)+'. '+q).join('\n');
    const cust=v('custom').split('\n').filter(x=>x.trim());
    if(cust.length){ t+='\n'; cust.forEach((q,i)=>{ t+='\n'+(std.length+i+1)+'. '+q.trim(); }); }
    t+='\n\nThank you — I am looking forward to working with you.\n\n--- Tip ---\nSend this as a form (Google Forms, Typeform) so answers arrive organised.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
