<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conflict Resolution Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .hint { font-size: .78rem; opacity: .6; margin-top: 3px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Conflict Resolution Planner</h1>
  <p class="sub">Before the hard conversation, get clear. Calm preparation prevents most blow-ups.</p>

  <div class="panel">
    <label for="issue">The issue, in one neutral sentence</label>
    <input id="issue" placeholder="Stick to the facts, not the blame">
    <label for="feel">How it made me feel (not what they did wrong)</label>
    <textarea id="feel" placeholder="I felt... — own your side"></textarea>
    <label for="need">What I actually need going forward</label>
    <textarea id="need" placeholder="A specific, doable request"></textarea>
    <label for="their">Their likely perspective (steelman it)</label>
    <textarea id="their" placeholder="What might this look like from their side?"></textarea>
    <div class="hint">Understanding their view first makes them far more open to yours.</div>
    <label for="common">Shared goal you both want</label>
    <input id="common" placeholder="e.g. We both want to feel like a team">
    <label for="give">Where I can compromise or own my part</label>
    <textarea id="give" placeholder="What can you offer or take responsibility for?"></textarea>
    <button class="btn" onclick="gen()">Build Resolution Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['issue','feel','need','their','common','give'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('crp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('crp_'+k,g(k).value)); });
  function gen(){
    const t=`CONFLICT RESOLUTION PLAN\n\nTHE ISSUE (neutral):\n${v('issue')||'[one factual sentence]'}\n\nHOW I FELT:\n${v('feel')||'[own your feelings]'}\n\nWHAT I NEED:\n${v('need')||'[a specific request]'}\n\nTHEIR LIKELY PERSPECTIVE:\n${v('their')||'[their side, fairly]'}\n\nOUR SHARED GOAL:\n${v('common')||'[what you both want]'}\n\nWHERE I CAN GIVE:\n${v('give')||'[your compromise / your part]'}\n\n--- During the conversation ---\n• Pick a calm time, not the heat of the moment.\n• Lead with the shared goal, then your feelings, then the need.\n• Use “I” not “you always”. Listen to understand, not to reply.\n• The aim is resolution, not winning.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
