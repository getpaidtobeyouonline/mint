<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Meditation Session Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 12px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat { flex: 1; min-width: 100px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 13px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #5AE57A; }
  .stat .l { font-size: .67rem; opacity: .65; text-transform: uppercase; }
  .row2 { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 8px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: .85rem; gap: 10px; }
  .row2 .x { cursor: pointer; opacity: .5; } .row2 .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Meditation Session Tracker</h1>
  <p class="sub">Log each sit. Minutes add up, and the streak is its own kind of practice.</p>

  <div class="panel">
    <div class="row">
      <div><label>Date</label><input id="dt" type="date"></div>
      <div><label>Minutes</label><input id="min" type="number" min="1" placeholder="10"></div>
      <div><label>Style</label><select id="sty"><option>Breath focus</option><option>Body scan</option><option>Loving-kindness</option><option>Guided</option><option>Walking</option><option>Open awareness</option></select></div>
    </div>
    <label>How it felt (one line, optional)</label>
    <input id="note" placeholder="Restless? Calm? Distracted? All fine to note.">
    <button class="btn" onclick="add()">+ Log Session</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="sN">0</div><div class="l">Sessions</div></div>
    <div class="stat"><div class="v" id="sM">0</div><div class="l">Total minutes</div></div>
    <div class="stat"><div class="v" id="sS">0</div><div class="l">Day streak</div></div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('mst')||'[]');
  const save=()=>localStorage.setItem('mst',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  g('dt').value=new Date().toISOString().slice(0,10);
  function add(){ const m=parseInt(g('min').value)||0; if(!m){alert('Enter minutes meditated.');return;}
    R.push({d:g('dt').value||new Date().toISOString().slice(0,10),m,s:g('sty').value,note:v('note')});
    g('min').value=''; g('note').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all sessions?')){ R=[]; save(); render(); } }
  function streak(){ const days=new Set(R.map(x=>x.d)); let s=0,d=new Date();
    if(!days.has(d.toISOString().slice(0,10)))d.setDate(d.getDate()-1);
    for(;;){ if(days.has(d.toISOString().slice(0,10))){s++; d.setDate(d.getDate()-1);} else break; } return s; }
  function render(){
    g('sN').textContent=R.length;
    g('sM').textContent=R.reduce((s,x)=>s+x.m,0);
    g('sS').textContent=streak();
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No sessions logged yet.</div>'; return; }
    L.innerHTML=[...R].map((x,i)=>({x,i})).sort((a,b)=>a.x.d<b.x.d?1:-1).map(({x,i})=>
      '<div class="row2"><span><b style="color:#5AE57A">'+x.d+'</b> · '+x.m+' min · '+esc(x.s)+(x.note?' · '+esc(x.note):'')+'</span><span class="x" onclick="del('+i+')">✕</span></div>').join('');
  }
  render();
</script>
</body>
</html>
