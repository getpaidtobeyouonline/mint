<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Anniversary Email Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Anniversary Email Planner</h1>
  <p class="sub">Anniversary emails (1 year subscribed, 1 year as a customer) feel personal and quietly drive repeat sales.</p>

  <div class="panel">
    <label for="type">Anniversary of…</label>
    <select id="type"><option value="sub">Subscribing</option><option value="buy">Buying / becoming a customer</option><option value="biz">Your business anniversary (to your list)</option></select>
    <label for="years">Years</label>
    <input id="years" type="number" min="1" value="1">
    <label for="extra">Something to celebrate (a result, a milestone, a free gift)</label>
    <input id="extra" placeholder="e.g. a thank-you discount / a behind-the-scenes look">
    <button class="btn" onclick="gen()">Build Email</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['type','years','extra'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('aep_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('aep_'+k,g(k).value)); });
  function gen(){
    const y=v('years')||'1', t=g('type').value, ex=v('extra');
    let intro, body;
    if(t==='sub'){ intro=y+' year(s) ago today you joined this list.'; body='That actually means something to me. Most people scroll past, click subscribe, then disappear. You stuck around.\n\nHere is what we have been through since then (in 3 lines): [milestone] · [milestone] · [milestone]. You were part of that.'; }
    else if(t==='buy'){ intro=y+' year(s) ago today you became a customer.'; body='Without you, none of this exists. That is not a marketing line — it is the math.\n\nSo, a small thank-you: '+(ex||'a token of appreciation just for you')+'.'; }
    else { intro='It is the '+y+'-year mark for me/us.'; body='I want to mark it with you, not at you. Here is what changed for me this year, the one thing I would do differently, and the moment that made it all worth it.'; }
    const t2='Subject: '+(t==='biz'?'a quiet anniversary':'happy '+y+'-year')+'\n\nHey,\n\n'+intro+'\n\n'+body+'\n\n'+
      (ex&&t!=='buy'?'A small thing to mark it: '+ex+'.\n\n':'')+
      'Thank you for being here.\n\n— [your name]\n\nP.S. Reply with one thing you remember from this year. I read all of them.';
    g('out').textContent=t2; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ if(g('out').style.display==='none'){alert('Build it first.');return;} navigator.clipboard.writeText(g('out').textContent).then(()=>alert('Email copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
