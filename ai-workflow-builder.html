<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workflow Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #325132; color: #FFFFFF;
    font-family: 'DM Sans', sans-serif;
    line-height: 1.6; padding: 24px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2.1rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 28px; font-size: .95rem; }
  label { display: block; font-size: .8rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 14px 0 6px; }
  input, textarea {
    width: 100%; background: #2A442A; border: 1px solid #5A845A;
    color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: 1rem;
    padding: 11px 13px; border-radius: 8px; resize: vertical;
  }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  textarea { min-height: 70px; }
  .btn {
    background: #5AE57A; color: #325132; border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: .95rem;
    padding: 12px 22px; border-radius: 8px; margin-top: 18px;
  }
  .btn:hover { opacity: .9; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 22px; margin-bottom: 26px; }
  .step {
    background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A;
    border-radius: 8px; padding: 16px; margin-bottom: 12px;
  }
  .step h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.15rem; }
  .step .num { opacity: .5; font-family: 'DM Sans', sans-serif; font-weight: 500; }
  .step p { white-space: pre-wrap; margin-top: 6px; font-size: .95rem; }
  .step .out { opacity: .7; font-size: .85rem; margin-top: 8px; font-style: italic; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .mini {
    background: transparent; border: 1px solid #5A845A; color: #FFFFFF;
    cursor: pointer; padding: 5px 12px; border-radius: 6px; font-size: .8rem;
  }
  .mini:hover { border-color: #5AE57A; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; padding: 30px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 40px; }
  @media (max-width: 600px) { h1 { font-size: 1.7rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>AI Workflow Builder</h1>
  <p class="sub">Design step-by-step AI workflows you can hand off, reuse, or sell. Add each step, reorder, then export.</p>

  <div class="panel">
    <label for="wfname">Workflow Name</label>
    <input id="wfname" placeholder="e.g. Blog Post Generator" oninput="save()">

    <label for="title">Step Title</label>
    <input id="title" placeholder="e.g. Draft the outline">

    <label for="prompt">AI Instruction / Prompt</label>
    <textarea id="prompt" placeholder="What the AI should do at this step…"></textarea>

    <label for="output">Expected Output (optional)</label>
    <input id="output" placeholder="e.g. A 5-point outline">

    <button class="btn" onclick="addStep()">+ Add Step</button>
  </div>

  <div id="list"></div>

  <div class="row">
    <button class="btn" onclick="copyAll()">Copy Workflow</button>
    <button class="btn ghost" onclick="downloadMd()">Download .md</button>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  let steps = JSON.parse(localStorage.getItem('aiwf_steps') || '[]');
  const wfInput = document.getElementById('wfname');
  wfInput.value = localStorage.getItem('aiwf_name') || '';

  function save() {
    localStorage.setItem('aiwf_steps', JSON.stringify(steps));
    localStorage.setItem('aiwf_name', wfInput.value);
  }

  function render() {
    const list = document.getElementById('list');
    if (!steps.length) {
      list.innerHTML = '<div class="empty">No steps yet — add your first one above.</div>';
      return;
    }
    list.innerHTML = steps.map((s, i) => `
      <div class="step">
        <h3><span class="num">${i + 1}.</span> ${esc(s.title)}</h3>
        <p>${esc(s.prompt)}</p>
        ${s.output ? `<div class="out">→ Output: ${esc(s.output)}</div>` : ''}
        <div class="row">
          <button class="mini" onclick="move(${i},-1)" ${i === 0 ? 'disabled' : ''}>↑ Up</button>
          <button class="mini" onclick="move(${i},1)" ${i === steps.length - 1 ? 'disabled' : ''}>↓ Down</button>
          <button class="mini" onclick="del(${i})">✕ Delete</button>
        </div>
      </div>`).join('');
  }

  function esc(t) {
    return (t || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
  }

  function addStep() {
    const title = document.getElementById('title').value.trim();
    const prompt = document.getElementById('prompt').value.trim();
    const output = document.getElementById('output').value.trim();
    if (!title || !prompt) { alert('Step title and AI instruction are required.'); return; }
    steps.push({ title, prompt, output });
    document.getElementById('title').value = '';
    document.getElementById('prompt').value = '';
    document.getElementById('output').value = '';
    save(); render();
  }

  function move(i, d) {
    const j = i + d;
    [steps[i], steps[j]] = [steps[j], steps[i]];
    save(); render();
  }

  function del(i) {
    steps.splice(i, 1);
    save(); render();
  }

  function clearAll() {
    if (!confirm('Delete the entire workflow?')) return;
    steps = []; wfInput.value = '';
    save(); render();
  }

  function buildText() {
    const name = wfInput.value.trim() || 'Untitled Workflow';
    let t = `# ${name}\n\n`;
    steps.forEach((s, i) => {
      t += `## Step ${i + 1}: ${s.title}\n\n${s.prompt}\n`;
      if (s.output) t += `\n**Expected output:** ${s.output}\n`;
      t += `\n`;
    });
    return t.trim();
  }

  function copyAll() {
    if (!steps.length) { alert('Add at least one step first.'); return; }
    navigator.clipboard.writeText(buildText())
      .then(() => alert('Workflow copied to clipboard!'))
      .catch(() => alert('Copy failed — try the download button.'));
  }

  function downloadMd() {
    if (!steps.length) { alert('Add at least one step first.'); return; }
    const name = (wfInput.value.trim() || 'workflow').toLowerCase().replace(/[^a-z0-9]+/g, '-');
    const blob = new Blob([buildText()], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name + '.md';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  render();
</script>
</body>
</html>
