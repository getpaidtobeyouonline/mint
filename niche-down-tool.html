<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Niche Down Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .opt { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 13px 16px; margin-bottom: 9px; display:flex; justify-content:space-between; gap:10px; }
  .opt .t { font-size: .95rem; } .opt .cp { cursor:pointer; color:#5AE57A; font-size:.82rem; }
  .formula { background:#2E4D2E; border:1px solid #4F8A55; border-radius:8px; padding:11px 14px; font-size:.86rem; margin-bottom:12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Niche Down Tool</h1>
  <p class="sub">"Too broad" is why you're invisible. Combine these levers into a niche sharp enough to win.</p>

  <div class="formula">Sharp niche = <b>[who]</b> + <b>[specific outcome]</b> + <b>[your angle/method]</b>. Specific beats big — you can always expand later.</div>

  <div class="panel">
    <label for="topic">Your broad topic</label>
    <input id="topic" placeholder="e.g. fitness">
    <label for="who">A specific WHO (not 'everyone')</label>
    <input id="who" placeholder="e.g. busy new dads">
    <label for="out">A specific OUTCOME they want</label>
    <input id="out" placeholder="e.g. get strong in 20-min home workouts">
    <label for="angle">Your angle / unfair advantage</label>
    <input id="angle" placeholder="e.g. ex-athlete, no-equipment method">
    <button class="btn" onclick="gen()">Sharpen It</button>
    <button class="btn ghost" onclick="gen()">↻ More options</button>
  </div>

  <div id="out2"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  ['topic','who','out','angle'].forEach(k=>{ const s=localStorage.getItem('ndt_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('ndt_'+k,g(k).value)); });
  function gen(){
    const t=v('topic')||'[topic]', w=v('who')||'[who]', o=v('out')||'[outcome]', a=v('angle')||'[your angle]';
    const opts=[
      `I help ${w} ${o}.`,
      `${cap(t)} for ${w} — specifically: ${o}.`,
      `${cap(o)} for ${w}, using ${a}.`,
      `The ${a} approach to ${t} for ${w}.`,
      `${cap(t)} that actually works for ${w} (without the usual ${t} advice).`
    ];
    g('out2').innerHTML=opts.map((s,i)=>`<div class="opt"><span class="t">${esc(s)}</span><span class="cp" onclick="cp(${i})">⧉</span></div>`).join('')+
      `<div class="formula" style="background:#3C603C;border-color:#4C724C">Pick the one that makes you slightly uncomfortable with how narrow it is — that's usually the right one.</div>`;
    window._o=opts;
  }
  function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function cp(i){ navigator.clipboard.writeText(window._o[i]).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
