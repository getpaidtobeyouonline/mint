<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Memory Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 60px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 130px; }
  .prompt { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 11px 14px; font-size: .88rem; font-style: italic; margin-bottom: 4px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 10px 16px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin-top: 12px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .entry { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 12px 15px; margin-bottom: 9px; }
  .entry .d { color: #5AE57A; font-size: .82rem; }
  .entry .x { float: right; cursor: pointer; opacity: .5; } .entry .x:hover { opacity: 1; color: #5AE57A; }
  .entry p { font-size: .9rem; margin-top: 3px; white-space: pre-wrap; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Travel Memory Journal</h1>
  <p class="sub">Capture the moments while they are fresh — the details fade faster than you think.</p>

  <div class="panel">
    <div class="prompt" id="prompt"></div>
    <div class="row">
      <div><label>Place</label><input id="place" placeholder="Where you were"></div>
      <div><label>Date</label><input id="date" type="date"></div>
    </div>
    <label>What happened &amp; how it felt</label>
    <textarea id="text" placeholder="The day, the people, the small details, the feeling..."></textarea>
    <button class="btn" onclick="add()">Save Memory</button>
    <button class="btn ghost" onclick="newPrompt()">New prompt</button>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const PROMPTS=["What surprised you today?","Describe a moment you never want to forget.","Who did you meet, and what did they teach you?","What did today taste, sound or smell like?","What was the best thing you ate?","When did you feel most alive today?","What would you tell a friend about this place?"];
  let R=JSON.parse(localStorage.getItem('tmj')||'[]');
  const save=()=>localStorage.setItem('tmj',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  g('date').value=new Date().toISOString().slice(0,10);
  function newPrompt(){ g('prompt').textContent=PROMPTS[Math.floor(Math.random()*PROMPTS.length)]; }
  function add(){ if(!v('text')){ alert('Write your memory first.'); return; }
    R.push({place:v('place'),date:g('date').value,text:v('text')});
    g('place').value=''; g('text').value=''; save(); render(); newPrompt(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all memories?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No memories yet — capture your first.</div>'; return; }
    L.innerHTML=[...R].map((x,i)=>({x,i})).sort((a,b)=>a.x.date<b.x.date?1:-1).map(({x,i})=>
      '<div class="entry"><span class="x" onclick="del('+i+')">✕</span><div class="d">'+(x.place?esc(x.place)+' · ':'')+(x.date||'')+'</div><p>'+esc(x.text)+'</p></div>').join('');
  }
  newPrompt(); render();
</script>
</body>
</html>
