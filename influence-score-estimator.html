<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Influence Score Estimator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 10px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .res { text-align: center; background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 10px; padding: 22px; }
  .res .n { font-family: 'Playfair Display', serif; font-size: 3rem; color: #5AE57A; line-height: 1; }
  .res .tier { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: #5AE57A; margin-top: 6px; }
  .res .d { font-size: .9rem; opacity: .78; margin-top: 6px; }
  .bd { text-align: left; background: #325132; border: 1px solid #3C603C; border-radius: 8px; padding: 12px 14px; margin-top: 12px; font-size: .86rem; }
  .bd div { display: flex; justify-content: space-between; padding: 2px 0; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Influence Score Estimator</h1>
  <p class="sub">A 0–100 read on your real influence — it's reach × engagement × trust, not just followers.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="fol">Followers</label><input id="fol" type="number" min="0" value="5000" oninput="calc()"></div>
      <div><label for="er">Avg engagement rate (%)</label><input id="er" type="number" min="0" step="0.1" value="3" oninput="calc()"></div>
    </div>
    <div class="grid">
      <div><label for="post">Posts / week</label><input id="post" type="number" min="0" value="5" oninput="calc()"></div>
      <div><label for="dm">Inbound DMs / week</label><input id="dm" type="number" min="0" value="10" oninput="calc()"></div>
    </div>
    <label for="conv">People who acted on your recommendation (last month)</label>
    <input id="conv" type="number" min="0" value="15" oninput="calc()">
  </div>

  <div class="res">
    <div class="n" id="score">0</div>
    <div class="tier" id="tier">—</div>
    <div class="d" id="d"></div>
    <div class="bd" id="bd"></div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), n=id=>parseFloat(g(id).value)||0;
  ['fol','er','post','dm','conv'].forEach(k=>{ const s=localStorage.getItem('ise_'+k); if(s!==null)g(k).value=s; });
  function calc(){
    ['fol','er','post','dm','conv'].forEach(k=>localStorage.setItem('ise_'+k,g(k).value));
    const reach=Math.min(30, Math.log10(Math.max(1,n('fol')))*7.5);          // up to ~30
    const eng=Math.min(30, n('er')*6);                                        // 5% -> 30
    const consist=Math.min(15, n('post')*2);                                  // 7+/wk -> ~14
    const trust=Math.min(15, n('dm')*0.6);                                    // inbound interest
    const action=Math.min(10, n('conv')*0.5);                                 // real influence
    const score=Math.round(reach+eng+consist+trust+action);
    g('score').textContent=score;
    const t = score>=80?['True influencer','People act because you said so. This is monetisable now.']
      : score>=60?['Strong voice','Real pull in your niche. Tighten consistency and proof to level up.']
      : score>=38?['Rising','Engagement is doing the heavy lifting — keep nurturing trust.']
      : ['Building','Followers ≠ influence yet. Depth and consistency come before reach.'];
    g('tier').textContent=t[0]; g('d').textContent=t[1];
    g('bd').innerHTML=[['Reach',reach],['Engagement',eng],['Consistency',consist],['Trust signals',trust],['Action / pull',action]]
      .map(([l,x])=>`<div><span>${l}</span><span style="color:#5AE57A">${Math.round(x)}</span></div>`).join('');
  }
  calc();
</script>
</body>
</html>
