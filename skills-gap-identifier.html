<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Skills Gap Identifier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 80px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 9px 12px; margin-bottom: 6px; }
  .item .top { display: flex; justify-content: space-between; gap: 8px; }
  .item .nm { font-weight: 500; }
  .item .x { cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .track { height: 7px; background: #5A845A; border-radius: 5px; margin-top: 6px; position: relative; }
  .track .now { position: absolute; height: 100%; background: #5AE57A; border-radius: 5px; }
  .track .gap { position: absolute; height: 100%; background: repeating-linear-gradient(45deg,#5AE57A,#5AE57A 4px,#2A442A 4px,#2A442A 8px); border-radius: 5px; }
  .lvl { font-size: .78rem; opacity: .7; margin-top: 4px; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Skills Gap Identifier</h1>
  <p class="sub">See clearly where you are now versus where the next role needs you to be.</p>

  <div class="panel">
    <label>Skill needed for your target role</label>
    <input id="skill" placeholder="e.g. Public speaking, SQL, budgeting">
    <div class="row" style="margin-top:8px">
      <div><label>Your level now</label><select id="now"><option value="1">1 – None</option><option value="2">2 – Basic</option><option value="3">3 – Working</option><option value="4">4 – Strong</option><option value="5">5 – Expert</option></select></div>
      <div><label>Level needed</label><select id="need"><option value="1">1 – None</option><option value="2">2 – Basic</option><option value="3" selected>3 – Working</option><option value="4">4 – Strong</option><option value="5">5 – Expert</option></select></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const NAMES=['','None','Basic','Working','Strong','Expert'];
  let R=JSON.parse(localStorage.getItem('sgi')||'[]');
  const save=()=>localStorage.setItem('sgi',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('skill')){ alert('Enter a skill.'); return; }
    R.push({s:v('skill'),now:+g('now').value,need:+g('need').value}); g('skill').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all skills?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No skills added yet.</div>'; return; }
    R.sort((a,b)=>(b.need-b.now)-(a.need-a.now));
    L.innerHTML=R.map((x,i)=>{
      const gap=Math.max(0,x.need-x.now);
      return '<div class="item"><div class="top"><span class="nm">'+esc(x.s)+'</span><span class="x" onclick="del('+i+')">✕</span></div>'+
      '<div class="track"><div class="gap" style="left:'+(x.now/5*100)+'%;width:'+(gap/5*100)+'%"></div><div class="now" style="width:'+(x.now/5*100)+'%"></div></div>'+
      '<div class="lvl">Now: '+NAMES[x.now]+'  →  Need: '+NAMES[x.need]+(gap?'   ·   Gap of '+gap+' level'+(gap>1?'s':''):'   ·   Ready ✓')+'</div></div>';
    }).join('');
  }
  render();
</script>
</body>
</html>
