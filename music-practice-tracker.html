<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Music Practice Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .stats { display: flex; gap: 8px; margin-bottom: 12px; }
  .stat { flex: 1; background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 8px; text-align: center; }
  .stat .n { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #5AE57A; }
  .stat .l { font-size: .68rem; text-transform: uppercase; opacity: .6; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 9px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; gap: 8px; font-size: .88rem; }
  .item .x { cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Music Practice Tracker</h1>
  <p class="sub">Log every practice — small daily reps are how great players are made.</p>

  <div class="panel">
    <div class="row">
      <div><label>Instrument</label><input id="inst" placeholder="e.g. guitar, piano, voice"></div>
      <div style="flex:2"><label>Focus</label><input id="focus" placeholder="e.g. scales, this piece, ear training"></div>
      <div><label>Minutes</label><input id="mins" type="number" min="0" placeholder="20"></div>
      <div><label>Date</label><input id="date" type="date"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Log</button></div>
    </div>
  </div>

  <div class="panel">
    <div class="stats" id="stats"></div>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('mpt2')||'[]');
  const save=()=>localStorage.setItem('mpt2',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('focus')){ alert('What did you practise?'); return; }
    R.unshift({i:v('inst'),f:v('focus'),m:parseFloat(g('mins').value)||0,d:g('date').value||new Date().toISOString().slice(0,10)});
    g('focus').value=''; g('mins').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all sessions?')){ R=[]; save(); render(); } }
  function render(){
    const total=R.length, mins=R.reduce((s,x)=>s+x.m,0);
    const days=[...new Set(R.map(x=>x.d))].length;
    g('stats').innerHTML='<div class="stat"><div class="n">'+total+'</div><div class="l">sessions</div></div><div class="stat"><div class="n">'+mins+'</div><div class="l">minutes</div></div><div class="stat"><div class="n">'+days+'</div><div class="l">days</div></div>';
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No sessions logged yet.</div>'; return; }
    L.innerHTML=R.map((x,i)=>'<div class="item"><span>'+esc(x.f)+(x.i?'  ·  '+esc(x.i):'')+'</span><span style="opacity:.75">'+x.d+(x.m?'  ·  '+x.m+' min':'')+'  <span class="x" onclick="del('+i+')">✕</span></span></div>').join('');
  }
  render();
</script>
</body>
</html>
