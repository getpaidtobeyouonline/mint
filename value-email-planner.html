<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Value Email Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #5AE57A; }
  textarea { min-height: 48px; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Value Email Planner</h1>
  <p class="sub">A pure-value email earns the right to sell later. Build one that gives a real result fast.</p>

  <div class="panel">
    <label for="problem">The one problem you'll solve in this email</label>
    <input id="problem" placeholder="e.g. emails that don't get opens">
    <label for="lesson">The single insight / lesson</label>
    <textarea id="lesson" placeholder="What you want them to walk away knowing"></textarea>
    <label for="steps">2-3 quick action steps (one per line)</label>
    <textarea id="steps" placeholder="Step 1&#10;Step 2&#10;Step 3"></textarea>
    <label for="quick">A 'use it today' line (the quick win)</label>
    <input id="quick" placeholder="e.g. Try this on tomorrow's send">
    <button class="btn" onclick="gen()">Build Value Email</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['problem','lesson','steps','quick'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('vep_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('vep_'+k,g(k).value)); });
  function gen(){
    if(!v('problem')){ alert('Add the problem.'); return; }
    const steps=v('steps').split('\n').map(s=>s.trim()).filter(Boolean);
    const t='Subject: a sharp angle on '+v('problem')+' (keep under 55 chars)\n\n'+
      'Most people stuck on '+v('problem')+' fix the wrong thing.\n\n'+
      'Here is the part that actually matters:\n\n'+
      (v('lesson')||'[the one insight]')+'\n\n'+
      'Three steps to put it to work:\n'+
      (steps.length?steps.map((s,i)=>(i+1)+'. '+s).join('\n'):'1. [step]\n2. [step]\n3. [step]')+'\n\n'+
      (v('quick')||'Try this on the next email you send.')+'\n\n'+
      'That is it for today — no pitch. Just the thing.\n\n'+
      '— [your name]';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ if(g('out').style.display==='none'){alert('Build it first.');return;} navigator.clipboard.writeText(g('out').textContent).then(()=>alert('Email copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
