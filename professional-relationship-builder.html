<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Professional Relationship Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 12px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .grp { font-size: .76rem; text-transform: uppercase; letter-spacing: .04em; color: #5AE57A; margin: 12px 0 5px; }
  .card { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 14px; margin-bottom: 7px; display: flex; justify-content: space-between; gap: 10px; font-size: .87rem; }
  .card.due { border-left: 3px solid #5AE57A; }
  .card .nm { color: #5AE57A; font-weight: 500; }
  .card .act { display: flex; gap: 8px; flex: none; align-items: flex-start; }
  .card .ic { cursor: pointer; opacity: .6; } .card .ic:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Professional Relationship Builder</h1>
  <p class="sub">Networks fade without contact. Track your key professional connections and stay in touch.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Name</label><input id="name" placeholder="Who?"></div>
      <div><label>Role / company</label><input id="role" placeholder="What they do"></div>
    </div>
    <div class="row">
      <div><label>Touch base every</label><select id="freq"><option value="30">Month</option><option value="90">3 months</option><option value="180">6 months</option><option value="365">Year</option></select></div>
      <div><label>Last contact</label><input id="last" type="date"></div>
    </div>
    <button class="btn" onclick="add()">+ Add Connection</button>
  </div>

  <div class="panel">
    <p style="font-size:.8rem;opacity:.6;margin-bottom:6px">Tap ✓ to log a fresh contact today.</p>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('prb')||'[]');
  const save=()=>localStorage.setItem('prb',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  g('last').value=new Date().toISOString().slice(0,10);
  function add(){ if(!v('name')){ alert('Enter a name.'); return; }
    R.push({n:v('name'),r:v('role'),f:+g('freq').value,last:g('last').value||new Date().toISOString().slice(0,10)});
    g('name').value=''; g('role').value=''; save(); render(); }
  function touch(i){ R[i].last=new Date().toISOString().slice(0,10); save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all connections?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No connections added yet.</div>'; return; }
    const now=Date.now();
    const rows=R.map((x,i)=>{ const days=Math.floor((now-new Date(x.last))/86400000); return {x,i,days,due:days>=x.f}; });
    const due=rows.filter(r=>r.due).sort((a,b)=>b.days-a.days);
    const ok=rows.filter(r=>!r.due).sort((a,b)=>b.days-a.days);
    function card(r){ const fmap={30:'monthly',90:'quarterly',180:'6-monthly',365:'yearly'};
      return '<div class="card'+(r.due?' due':'')+'"><span><span class="nm">'+esc(r.x.n)+'</span>'+(r.x.r?' · '+esc(r.x.r):'')+'<br><span style="opacity:.65">last contact '+r.days+'d ago · '+fmap[r.x.f]+'</span></span><span class="act"><span class="ic" onclick="touch('+r.i+')">✓</span><span class="ic" onclick="del('+r.i+')">✕</span></span></div>'; }
    let h='';
    if(due.length)h+='<div class="grp">Time to reach out</div>'+due.map(card).join('');
    if(ok.length)h+='<div class="grp">In good contact</div>'+ok.map(card).join('');
    L.innerHTML=h;
  }
  render();
</script>
</body>
</html>
