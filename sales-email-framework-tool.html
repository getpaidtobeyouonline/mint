<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Sales Email Framework Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #5AE57A; }
  textarea { min-height: 48px; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Sales Email Framework Tool</h1>
  <p class="sub">Plug your offer into the proven Problem → Promise → Proof → Pitch structure.</p>

  <div class="panel">
    <label for="framework">Framework</label>
    <select id="framework">
      <option value="pppp">Problem → Promise → Proof → Pitch (classic)</option>
      <option value="paspa">PAS (Problem, Agitate, Solve)</option>
      <option value="aida">AIDA (Attention, Interest, Desire, Action)</option>
    </select>
    <label for="offer">Your offer</label>
    <input id="offer" placeholder="e.g. The Pricing Toolkit">
    <label for="audience">Who it's for</label>
    <input id="audience" placeholder="e.g. coaches who undercharge">
    <label for="problem">Their painful problem</label>
    <textarea id="problem" placeholder="What keeps them stuck"></textarea>
    <label for="promise">The transformation</label>
    <textarea id="promise" placeholder="The result the offer delivers"></textarea>
    <label for="proof">One proof point</label>
    <input id="proof" placeholder="e.g. 'helped 250+ coaches raise their rates'">
    <label for="cta">CTA</label>
    <input id="cta" placeholder="e.g. grab it before Friday">
    <button class="btn" onclick="gen()">Build Sales Email</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['framework','offer','audience','problem','promise','proof','cta'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('seft_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('seft_'+k,g(k).value)); });
  function gen(){
    if(!v('offer')){ alert('Add the offer.'); return; }
    const fw=g('framework').value;
    const off=v('offer'), aud=v('audience')||'your audience', prob=v('problem')||'[the problem]', pro=v('promise')||'[the transformation]', proof=v('proof')||'[proof point]', cta=v('cta')||'click to grab it';
    let t='';
    if(fw==='pppp'){
      t='Subject: a clean angle on '+prob+'\n\n'+
        'Most '+aud+' are stuck because of '+prob+'.\n\n'+
        'Here is what is actually possible:\n'+pro+'\n\n'+
        'It is not theory — '+proof+'.\n\n'+
        'That is exactly what '+off+' is built for.\n\n'+
        '→ '+cta+'\n\n— [you]\n\nP.S. One sharp line reinforcing the CTA, not filler.';
    } else if(fw==='paspa'){
      t='Subject: the cost of leaving '+prob+' unsolved\n\n'+
        prob+' — sound familiar?\n\n'+
        'Left alone, this only gets worse: lost income, lost momentum, lost confidence.\n\n'+
        'There is a faster way out: '+pro+'\n\n'+
        proof+'\n\n'+
        off+' is the shortcut.\n\n→ '+cta+'\n\n— [you]';
    } else {
      t='Subject: one bold line that stops the scroll\n\n'+
        '(Attention) '+prob+' — you are not imagining it.\n\n'+
        '(Interest) Here is the part nobody told you: '+pro+'\n\n'+
        '(Desire) '+proof+'. That can be your story too.\n\n'+
        '(Action) '+cta+' — '+off+' makes it the obvious next step.\n\n— [you]';
    }
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ if(g('out').style.display==='none'){alert('Build it first.');return;} navigator.clipboard.writeText(g('out').textContent).then(()=>alert('Email copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
