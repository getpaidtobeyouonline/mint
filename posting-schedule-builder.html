<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Posting Schedule Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 20px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .addrow { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
  .addrow > div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .day { margin-bottom: 12px; }
  .day h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1rem; border-bottom: 1px solid #4C724C; padding-bottom: 5px; margin-bottom: 7px; }
  .slot { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 7px; padding: 9px 12px; margin-bottom: 6px; display: flex; justify-content: space-between; gap: 10px; font-size: .88rem; align-items: center; }
  .slot .x { cursor: pointer; opacity: .5; } .slot .x:hover { opacity: 1; color: #5AE57A; }
  .empty { opacity: .45; font-size: .85rem; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Posting Schedule Builder</h1>
  <p class="sub">Lock specific posts into specific days and times — turn a vague plan into a real schedule.</p>

  <div class="panel">
    <div class="addrow">
      <div><label for="day">Day</label><select id="day"><option>Mon</option><option>Tue</option><option>Wed</option><option>Thu</option><option>Fri</option><option>Sat</option><option>Sun</option></select></div>
      <div><label for="time">Time</label><input id="time" type="time" value="09:00"></div>
      <div><label for="plat">Platform</label><select id="plat"><option>Instagram</option><option>TikTok</option><option>X/Twitter</option><option>LinkedIn</option><option>YouTube</option><option>Pinterest</option></select></div>
      <div style="flex:2"><label for="what">Content</label><input id="what" placeholder="e.g. Reel — 3 pricing tips"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div id="grid"></div>
    <button class="btn ghost" onclick="exportTxt()">Export Schedule</button>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let slots=JSON.parse(localStorage.getItem('psb')||'[]');
  const save=()=>localStorage.setItem('psb',JSON.stringify(slots));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ const w=v('what'); if(!w){alert('Add content.');return;} slots.push({d:g('day').value,t:g('time').value,p:g('plat').value,w}); g('what').value=''; save(); render(); }
  function del(i){ slots.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the schedule?')){ slots=[]; save(); render(); } }
  function render(){
    g('grid').innerHTML=DAYS.map(d=>{
      const items=slots.map((s,i)=>({s,i})).filter(o=>o.s.d===d).sort((a,b)=>a.s.t<b.s.t?-1:1);
      return `<div class="day"><h3>${d}</h3>${items.length?items.map(({s,i})=>`<div class="slot"><span>⏰ ${s.t} · <b style="color:#5AE57A">${esc(s.p)}</b> — ${esc(s.w)}</span><span class="x" onclick="del(${i})">✕</span></div>`).join(''):'<div class="empty">No posts scheduled.</div>'}</div>`;
    }).join('');
  }
  function exportTxt(){
    if(!slots.length){alert('Add slots first.');return;}
    let t='WEEKLY POSTING SCHEDULE\n';
    DAYS.forEach(d=>{ const it=slots.filter(s=>s.d===d).sort((a,b)=>a.t<b.t?-1:1); if(it.length){ t+=`\n${d}\n`+it.map(s=>`  ${s.t} · ${s.p} — ${s.w}`).join('\n')+'\n'; } });
    const b=new Blob([t.trim()],{type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='posting-schedule.txt'; a.click(); URL.revokeObjectURL(a.href);
  }
  render();
</script>
</body>
</html>
