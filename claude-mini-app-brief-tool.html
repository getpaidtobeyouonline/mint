<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Mini App Brief Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2.1rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .76rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 13px 0 5px; }
  .hint { text-transform: none; letter-spacing: 0; opacity: .55; font-size: .8rem; }
  input, textarea, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .96rem; padding: 10px 12px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #5AE57A; }
  textarea { min-height: 52px; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 22px; margin-bottom: 18px; }
  .chk { display: flex; align-items: center; gap: 10px; margin-top: 14px; font-size: .92rem; cursor: pointer; }
  .chk input { width: auto; accent-color: #5AE57A; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: .95rem; padding: 12px 22px; border-radius: 8px; margin: 16px 8px 0 0; }
  .btn:hover { opacity: .9; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-size: .88rem; font-family: 'DM Sans', sans-serif; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.7rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Claude Mini App Brief Tool</h1>
  <p class="sub">Spec a tiny single-screen web app in 30 seconds — get a copy-ready build prompt, filename, and listing draft.</p>

  <div class="panel">
    <label for="idea">App idea <span class="hint">— what it does in one line</span></label>
    <input id="idea" placeholder="e.g. Split a restaurant bill with tip across people">

    <label for="action">The one action the user takes</label>
    <textarea id="action" placeholder="The single core flow — keep it to one thing"></textarea>

    <label for="input">What the user gives it</label>
    <input id="input" placeholder="e.g. bill total, tip %, number of people">

    <label for="output">What they get back</label>
    <input id="output" placeholder="e.g. per-person amount, instantly">

    <label for="data">Saving</label>
    <select id="data">
      <option value="none">No saving — fresh each visit</option>
      <option value="local">Remember inputs in the browser</option>
    </select>

    <label for="extra">Anything else <span class="hint">(optional)</span></label>
    <textarea id="extra" placeholder="A nice-to-have, a constraint, a vibe…"></textarea>

    <label class="chk"><input type="checkbox" id="house" checked> Match the GetPaidToBeYouOnline house style</label>
  </div>

  <button class="btn" onclick="build()">Generate Brief</button>
  <button class="btn ghost" onclick="copyB()">Copy</button>
  <button class="btn ghost" onclick="dlMd()">Download .md</button>

  <pre id="out" style="display:none"></pre>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F = ['idea','action','input','output','data','extra'];
  F.forEach(id => { const s = localStorage.getItem('cmab_'+id); if (s!==null) document.getElementById(id).value = s; });
  const hEl = document.getElementById('house');
  if (localStorage.getItem('cmab_house') !== null) hEl.checked = localStorage.getItem('cmab_house') === '1';
  [...F, 'house'].forEach(id => document.getElementById(id).addEventListener('input', save));
  function save() {
    F.forEach(id => localStorage.setItem('cmab_'+id, document.getElementById(id).value));
    localStorage.setItem('cmab_house', hEl.checked ? '1' : '0');
  }
  const v = id => document.getElementById(id).value.trim();
  const kebab = s => (s||'mini-app').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,40) || 'mini-app';
  const title = s => (s||'Mini App').replace(/\b\w/g, c=>c.toUpperCase()).slice(0,50);

  const dataNote = {
    none: "No persistence — state resets on reload. No backend, no accounts.",
    local: "Persist the user's inputs in localStorage so they survive a reload. No backend."
  };

  function briefText() {
    const house = hEl.checked;
    const reqs = [
      "Single self-contained HTML file — zero external files, works in any browser, mobile responsive",
      ...(house ? [
        "Google Fonts: Playfair Display (headings) + DM Sans (body)",
        "Colors: #325132 background, #FFFFFF text, #5AE57A gold accents and buttons",
        'Footer: "Powered by GetPaidToBeYouOnline"'
      ] : []),
      "Clear title, one short line of instructions, fully working",
      "Keep it under 300 lines — simple UI beats complex code",
      dataNote[v('data')],
      "Ask any clarifying questions first, then build something usable as-is"
    ];
    return `Build a mini web app.\n\n`+
      `CONCEPT: ${v('idea')||'(not set)'}\n`+
      `CORE ACTION: ${v('action')||'(not set)'}\n`+
      `INPUT: ${v('input')||'(not set)'}\n`+
      `OUTPUT: ${v('output')||'(not set)'}\n`+
      (v('extra')?`NOTES: ${v('extra')}\n`:'')+
      `\nREQUIREMENTS:\n`+ reqs.map(r=>`- ${r}`).join('\n') +
      `\n\nSUGGESTED FILE: ${kebab(v('idea'))}.html\n\n`+
      `LISTING DRAFT (fill in before selling):\n`+
      `PRODUCT NAME: ${title(v('idea'))}\n`+
      `PRICE: $17\n`+
      `TAGLINE: ${v('idea')||'[one punchy sentence]'}\n`+
      `DESCRIPTION: [problem it solves] [how this fixes it] [why it beats a plain PDF]\n`+
      `BULLET 1: [feature]\nBULLET 2: [feature]\nBULLET 3: [feature]`;
  }

  function build() {
    if (!v('idea')) { alert('Add the app idea first.'); return; }
    const o = document.getElementById('out');
    o.textContent = briefText();
    o.style.display = 'block';
    o.scrollIntoView({ behavior: 'smooth' });
  }
  function copyB() {
    navigator.clipboard.writeText(briefText()).then(
      ()=>alert('Brief copied — paste it into Claude to build.'),
      ()=>alert('Copy failed.'));
  }
  function dlMd() {
    const b = new Blob([briefText()], { type:'text/markdown' });
    const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download=kebab(v('idea'))+'-brief.md'; a.click(); URL.revokeObjectURL(a.href);
  }
</script>
</body>
</html>
