<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Poll Results Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 20px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .addrow { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .addrow>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .poll { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 12px 14px; margin-bottom: 9px; }
  .poll .q { font-weight: 500; font-size: .92rem; }
  .barwrap { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-size: .82rem; }
  .barwrap .lb { width: 70px; flex: none; opacity: .8; }
  .barwrap .tr { flex: 1; background: #3C603C; border-radius: 4px; height: 13px; overflow: hidden; }
  .barwrap .tr>i { display: block; height: 100%; background: #5AE57A; }
  .barwrap .pc { width: 56px; text-align: right; flex: none; }
  .poll .meta { font-size: .78rem; opacity: .62; margin-top: 6px; }
  .poll .x { cursor: pointer; } .poll .x:hover { color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 16px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Story Poll Results Tracker</h1>
  <p class="sub">Log poll results and turn audience votes into a content & product roadmap.</p>

  <div class="panel">
    <label for="q">Poll question</label>
    <input id="q" placeholder="e.g. Which should I make next?">
    <div class="addrow" style="margin-top:8px">
      <div style="flex:2"><label for="oa">Option A</label><input id="oa" placeholder="Option A"></div>
      <div><label for="va">Votes A</label><input id="va" type="number" min="0"></div>
      <div style="flex:2"><label for="ob">Option B</label><input id="ob" placeholder="Option B"></div>
      <div><label for="vb">Votes B</label><input id="vb" type="number" min="0"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Log</button></div>
    </div>
  </div>

  <div id="list"></div>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim(), nu=id=>parseFloat(g(id).value)||0;
  let P=JSON.parse(localStorage.getItem('sprt')||'[]');
  const save=()=>localStorage.setItem('sprt',JSON.stringify(P));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('q')||!v('oa')||!v('ob')){alert('Add a question and both options.');return;}
    P.unshift({q:v('q'),oa:v('oa'),ob:v('ob'),va:nu('va'),vb:nu('vb')}); ['q','oa','va','ob','vb'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ P.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all polls?')){ P=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!P.length){ L.innerHTML='<div class="empty">No polls logged yet.</div>'; return; }
    L.innerHTML=P.map((p,i)=>{ const t=p.va+p.vb||1; const pa=Math.round(p.va/t*100), pb=100-pa; const win=p.va>=p.vb?p.oa:p.ob;
      return `<div class="poll"><div class="q">${esc(p.q)}</div>
        <div class="barwrap"><span class="lb">${esc(p.oa).slice(0,9)}</span><div class="tr"><i style="width:${pa}%"></i></div><span class="pc">${pa}% (${p.va})</span></div>
        <div class="barwrap"><span class="lb">${esc(p.ob).slice(0,9)}</span><div class="tr"><i style="width:${pb}%"></i></div><span class="pc">${pb}% (${p.vb})</span></div>
        <div class="meta">→ Audience wants: <b style="color:#5AE57A">${esc(win)}</b>. Make/build that next. <span class="x" onclick="del(${i})">✕ remove</span></div></div>`;
    }).join('');
  }
  render();
</script>
</body>
</html>
