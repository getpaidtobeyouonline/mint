<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Emotional Intelligence Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 740px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  .cat { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 16px 18px; margin-bottom: 14px; }
  .cat h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.05rem; margin-bottom: 6px; }
  .item { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 7px 0; border-top: 1px solid #3C603C; flex-wrap: wrap; }
  .item:first-of-type { border-top: none; }
  .item span { flex: 1; min-width: 210px; font-size: .92rem; }
  select { background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .85rem; padding: 7px 9px; border-radius: 7px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .95rem; padding: 13px 26px; border-radius: 8px; margin: 8px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .score { text-align: center; background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 22px; margin: 18px 0; }
  .score .n { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: #5AE57A; line-height: 1; }
  .score .vd { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: #5AE57A; margin-top: 5px; }
  .bar { display: flex; justify-content: space-between; font-size: .85rem; margin: 8px 0 3px; }
  .tr { background: #3C603C; border-radius: 5px; height: 7px; overflow: hidden; } .tr>i { display: block; height: 100%; background: #5AE57A; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Emotional Intelligence Checker</h1>
  <p class="sub">Score yourself across the 4 EI dimensions and find your highest-leverage growth area.</p>

  <div id="form"></div>
  <button class="btn" onclick="run()">Check My EI</button>
  <button class="btn ghost" onclick="reset()">Reset</button>
  <div id="res"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const A=[
    {n:"Self-Awareness",k:"sa",items:["I can name what I am feeling, in real time","I know my emotional triggers","I see how my mood affects others"]},
    {n:"Self-Management",k:"sm",items:["I pause before reacting","I can stay calm under pressure","I keep going when motivation drops"]},
    {n:"Social Awareness",k:"so",items:["I pick up on others' moods quickly","I listen to understand, not just reply","I notice group dynamics, not just words"]},
    {n:"Relationship Management",k:"rm",items:["I handle disagreement without escalating","I give feedback kindly and clearly","I repair after I have hurt someone"]}
  ];
  const flat=[]; A.forEach(c=>c.items.forEach(it=>flat.push({c:c.n,t:it})));
  const g=id=>document.getElementById(id);
  const saved=JSON.parse(localStorage.getItem('eic')||'{}');
  g('form').innerHTML=A.map(c=>`<div class="cat"><h3>${c.n}</h3>`+c.items.map((it,j)=>`
    <div class="item"><span>${it}</span>
      <select id="${c.k}_${j}"><option value="1">Rarely</option><option value="2">Sometimes</option><option value="3">Often</option><option value="4">Almost always</option></select></div>`).join('')+`</div>`).join('');
  A.forEach(c=>c.items.forEach((_,j)=>{ const e=g(c.k+'_'+j); if(saved[c.k+'_'+j])e.value=saved[c.k+'_'+j]; e.addEventListener('change',pers); }));
  function pers(){ const o={}; A.forEach(c=>c.items.forEach((_,j)=>o[c.k+'_'+j]=g(c.k+'_'+j).value)); localStorage.setItem('eic',JSON.stringify(o)); }
  function run(){
    pers();
    const per=A.map(c=>{ let s=0; c.items.forEach((_,j)=>s+=+g(c.k+'_'+j).value); return {n:c.n,pct:Math.round(s/(c.items.length*4)*100)}; });
    const overall=Math.round(per.reduce((s,p)=>s+p.pct,0)/per.length);
    const vd=overall>=85?['High EI','Rare and useful. Lead and mentor with this.']:overall>=65?['Solid EI','Strong in most areas; tighten the lower one.']:overall>=40?['Growing','Awareness is there; practice is the gap.']:['Early','Most of EI is learnable — start with self-awareness; the rest follows.'];
    const weak=[...per].sort((a,b)=>a.pct-b.pct)[0];
    g('res').innerHTML='<div class="score"><div class="n">'+overall+'%</div><div class="vd">'+vd[0]+'</div><div style="opacity:.8;font-size:.92rem;margin-top:4px">'+vd[1]+'</div></div>'+
      '<div class="cat"><h3>By dimension</h3>'+per.map(p=>'<div class="bar"><span>'+p.n+'</span><span>'+p.pct+'%</span></div><div class="tr"><i style="width:'+p.pct+'%"></i></div>').join('')+'</div>'+
      '<div class="cat" style="border-left:3px solid #5AE57A"><h3 style="margin-bottom:5px">Highest-leverage area: '+weak.n+'</h3><p style="font-size:.92rem">'+(weak.n==="Self-Awareness"?'Start with naming the emotion in the moment. The rest of EI is built on this.':weak.n==="Self-Management"?'Practice the pause. 3 slow breaths before responding to anything emotional.':weak.n==="Social Awareness"?'Spend a full conversation just listening with no agenda. Note what you would have missed.':'When conflict comes up, lead with curiosity instead of defence. "Tell me more" is the whole tool.')+'</p></div>';
    g('res').scrollIntoView({behavior:'smooth'});
  }
  function reset(){ if(confirm('Reset?')){ localStorage.removeItem('eic'); A.forEach(c=>c.items.forEach((_,j)=>g(c.k+'_'+j).value='1')); g('res').innerHTML=''; } }
</script>
</body>
</html>
