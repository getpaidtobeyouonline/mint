<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Hotel Checklist Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 90px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1rem; margin: 10px 0 6px; }
  .hotel { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 11px 14px; margin-bottom: 7px; display: flex; justify-content: space-between; align-items: center; font-size: .87rem; gap: 10px; }
  .hotel .sc { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1rem; flex: none; }
  .hotel .x { cursor: pointer; opacity: .5; flex: none; } .hotel .x:hover { opacity: 1; color: #5AE57A; }
  .item { display: flex; align-items: center; gap: 9px; padding: 6px 0; border-bottom: 1px solid #4C724C; cursor: pointer; font-size: .88rem; }
  .item:last-child { border-bottom: none; }
  .box { width: 18px; height: 18px; border: 2px solid #5AE57A; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; font-size: .68rem; font-weight: 700; }
  .box.on { background: #5AE57A; color: #325132; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 10px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Hotel Checklist Tool</h1>
  <p class="sub">Check what matters before you book — then score and compare your shortlist.</p>

  <div class="panel">
    <h3>What to check before booking</h3>
    <div id="checks"></div>
  </div>

  <div class="panel">
    <h3>Compare your shortlist</h3>
    <div class="row">
      <div style="flex:2"><label>Hotel name</label><input id="name" placeholder="Hotel name"></div>
      <div><label>Price/night</label><input id="price" type="number" min="0" placeholder="0"></div>
      <div><label>Your score /10</label><input id="score" type="number" min="0" max="10" placeholder="8"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
    <div id="list" style="margin-top:10px"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear Shortlist</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const CHECKS=["Location — close to what matters?","Genuine recent reviews read","Total price (taxes &amp; fees included)","Cancellation policy understood","Wi-Fi included &amp; reliable","Breakfast included or nearby options","Check-in / check-out times suit you","Air-con / heating as needed","Photos match the room type booked","Safe neighbourhood at night"];
  let state=JSON.parse(localStorage.getItem('hct2_chk')||'{}');
  let R=JSON.parse(localStorage.getItem('hct2')||'[]');
  const save=()=>{ localStorage.setItem('hct2_chk',JSON.stringify(state)); localStorage.setItem('hct2',JSON.stringify(R)); };
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function toggle(i){ state[i]=!state[i]; save(); render(); }
  function add(){ const p=parseFloat(g('price').value)||0, s=parseFloat(g('score').value)||0;
    if(!v('name')){ alert('Enter a hotel name.'); return; }
    R.push({n:v('name'),p,s}); ['name','price','score'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the shortlist?')){ R=[]; save(); render(); } }
  function render(){
    g('checks').innerHTML=CHECKS.map((c,i)=>'<div class="item" onclick="toggle('+i+')"><span class="box'+(state[i]?' on':'')+'">'+(state[i]?'✓':'')+'</span><span>'+c+'</span></div>').join('');
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No hotels added yet.</div>'; return; }
    L.innerHTML=R.map((x,i)=>({x,i})).sort((a,b)=>b.x.s-a.x.s).map(({x,i})=>
      '<div class="hotel"><span><b style="color:#5AE57A">'+esc(x.n)+'</b>'+(x.p?'<br><span style="opacity:.7">'+x.p.toLocaleString()+' / night</span>':'')+'</span><span style="display:flex;gap:10px;align-items:center"><span class="sc">'+x.s+'/10</span><span class="x" onclick="del('+i+')">✕</span></span></div>').join('');
  }
  render();
</script>
</body>
</html>
