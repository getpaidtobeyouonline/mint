<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Potluck Dish Suggester</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 580px; margin: 0 auto; text-align: center; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: #5AE57A; }
  .sub { opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 10px 0 5px; text-align: left; }
  select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .95rem; padding: 12px 26px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin-top: 14px; }
  .idea { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 18px; margin-top: 16px; display: none; text-align: left; }
  .idea .big { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: #5AE57A; }
  .idea .meta { font-size: .82rem; opacity: .65; margin-top: 6px; }
  footer { opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Potluck Dish Suggester</h1>
  <p class="sub">Asked to "bring something"? Get a crowd-pleasing dish idea that travels well.</p>

  <div class="panel">
    <label for="course">What course should you bring?</label>
    <select id="course"><option value="any">Anything</option><option value="starter">Starter / appetiser</option><option value="main">Main / big dish</option><option value="side">Side dish</option><option value="dessert">Dessert</option></select>
    <label for="effort">Effort level</label>
    <select id="effort"><option value="any">Any</option><option value="easy">Quick &amp; easy</option><option value="medium">A bit of effort</option></select>
    <button class="btn" onclick="gen()">Suggest a Dish</button>
  </div>

  <div class="idea" id="idea"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const D=[
    {t:"A big colourful salad",c:"side",e:"easy"},
    {t:"Guacamole or hummus with crudités",c:"starter",e:"easy"},
    {t:"A cheese and charcuterie board",c:"starter",e:"easy"},
    {t:"Bruschetta or loaded crostini",c:"starter",e:"medium"},
    {t:"A pasta bake (travels and reheats well)",c:"main",e:"medium"},
    {t:"A big pot of chilli or curry",c:"main",e:"medium"},
    {t:"A quiche or savoury tart",c:"main",e:"medium"},
    {t:"A traybake of roasted vegetables",c:"side",e:"easy"},
    {t:"Garlic bread or a fresh loaf",c:"side",e:"easy"},
    {t:"A rice or grain salad",c:"side",e:"easy"},
    {t:"Brownies or blondies",c:"dessert",e:"easy"},
    {t:"A fruit crumble or pie",c:"dessert",e:"medium"},
    {t:"A no-bake cheesecake",c:"dessert",e:"medium"},
    {t:"Cookies (always a hit)",c:"dessert",e:"easy"},
    {t:"Sausage rolls or mini pastries",c:"starter",e:"medium"},
    {t:"A frittata, cut into squares",c:"main",e:"easy"},
    {t:"Coleslaw or a crunchy slaw",c:"side",e:"easy"},
    {t:"Stuffed peppers or filo parcels",c:"main",e:"medium"}
  ];
  function gen(){
    const course=g('course').value, effort=g('effort').value;
    let pool=D.filter(x=>(course==='any'||x.c===course)&&(effort==='any'||x.e===effort));
    if(!pool.length)pool=D.filter(x=>course==='any'||x.c===course);
    if(!pool.length)pool=D;
    const p=pool[Math.floor(Math.random()*pool.length)];
    const cm={starter:'Starter',main:'Main',side:'Side',dessert:'Dessert'};
    const em={easy:'Quick & easy',medium:'A bit of effort'};
    g('idea').style.display='block';
    g('idea').innerHTML='<div class="big">'+p.t+'</div><div class="meta">'+cm[p.c]+' · '+em[p.e]+' · tip: bring it in a container you do not need back</div>';
  }
</script>
</body>
</html>
