<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Mindset Assessment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 740px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  .cat { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 16px 18px; margin-bottom: 14px; }
  .cat h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.05rem; margin-bottom: 6px; }
  .item { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 7px 0; border-top: 1px solid #3C603C; flex-wrap: wrap; }
  .item:first-of-type { border-top: none; }
  .item span { flex: 1; min-width: 220px; font-size: .92rem; }
  select { background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .85rem; padding: 7px 9px; border-radius: 7px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .95rem; padding: 13px 26px; border-radius: 8px; margin: 8px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .score { text-align: center; background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 22px; margin: 18px 0; }
  .score .n { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: #5AE57A; line-height: 1; }
  .score .vd { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: #5AE57A; margin-top: 5px; }
  .bar { display: flex; justify-content: space-between; font-size: .85rem; margin: 8px 0 3px; }
  .tr { background: #3C603C; border-radius: 5px; height: 7px; overflow: hidden; } .tr>i { display: block; height: 100%; background: #5AE57A; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Money Mindset Assessment</h1>
  <p class="sub">A full 4-dimension assessment of your relationship with money. Find where to work first.</p>

  <div id="form"></div>
  <button class="btn" onclick="run()">Run Assessment</button>
  <button class="btn ghost" onclick="reset()">Reset</button>
  <div id="res"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const A=[
    {n:"Receiving",k:"r",items:["I can receive money without flinching or over-justifying","I let others pay/treat me without guilt","I price myself based on value, not anxiety"]},
    {n:"Spending",k:"s",items:["My spending matches my stated values","I do not numb with shopping or food","I can spend on joy without shame"]},
    {n:"Saving / Investing",k:"i",items:["I have an automatic system that saves for me","I invest consistently, not based on mood","I believe money I park will grow"]},
    {n:"Beliefs",k:"b",items:["I believe wealth and goodness can co-exist","I believe more is possible for me specifically","I do not see money as scarce by default"]}
  ];
  const g=id=>document.getElementById(id);
  const saved=JSON.parse(localStorage.getItem('mma9')||'{}');
  g('form').innerHTML=A.map(c=>`<div class="cat"><h3>${c.n}</h3>`+c.items.map((it,j)=>`
    <div class="item"><span>${it}</span>
      <select id="${c.k}_${j}"><option value="1">Rarely</option><option value="2">Sometimes</option><option value="3">Often</option><option value="4">Almost always</option></select></div>`).join('')+`</div>`).join('');
  A.forEach(c=>c.items.forEach((_,j)=>{ const e=g(c.k+'_'+j); if(saved[c.k+'_'+j])e.value=saved[c.k+'_'+j]; e.addEventListener('change',pers); }));
  function pers(){ const o={}; A.forEach(c=>c.items.forEach((_,j)=>o[c.k+'_'+j]=g(c.k+'_'+j).value)); localStorage.setItem('mma9',JSON.stringify(o)); }
  function run(){
    pers();
    const per=A.map(c=>{ let s=0; c.items.forEach((_,j)=>s+=+g(c.k+'_'+j).value); return {n:c.n,pct:Math.round(s/(c.items.length*4)*100)}; });
    const overall=Math.round(per.reduce((s,p)=>s+p.pct,0)/per.length);
    const vd=overall>=80?['Healthy','Strong, integrated money relationship.']:overall>=60?['Mostly healthy','One dimension is dragging — see below.']:overall>=40?['Mixed','Workable foundation, gaps to close.']:['Tight','Money lives in fight-or-flight. The work below pays back fast.'];
    const weak=[...per].sort((a,b)=>a.pct-b.pct)[0];
    g('res').innerHTML='<div class="score"><div class="n">'+overall+'%</div><div class="vd">'+vd[0]+'</div><div style="opacity:.8;font-size:.92rem;margin-top:4px">'+vd[1]+'</div></div>'+
      '<div class="cat"><h3>By dimension</h3>'+per.map(p=>'<div class="bar"><span>'+p.n+'</span><span>'+p.pct+'%</span></div><div class="tr"><i style="width:'+p.pct+'%"></i></div>').join('')+'</div>'+
      '<div class="cat" style="border-left:3px solid #5AE57A"><h3 style="margin-bottom:5px">Start here: '+weak.n+'</h3><p style="font-size:.92rem">'+(weak.n==="Receiving"?"Practise saying thank you and stopping. No deflection, no bonus given.":weak.n==="Spending"?"Track 7 days of spending and tag each as Need/Want/Regret. Pattern shows the work.":weak.n==="Saving / Investing"?"Automate one tiny transfer. Smaller than feels worth it. Build the system before scaling it.":"Identify the one money belief you inherited that no longer serves you. Replace it with a true bridge belief and repeat for 30 days.")+'</p></div>';
    g('res').scrollIntoView({behavior:'smooth'});
  }
  function reset(){ if(confirm('Reset?')){ localStorage.removeItem('mma9'); A.forEach(c=>c.items.forEach((_,j)=>g(c.k+'_'+j).value='1')); g('res').innerHTML=''; } }
</script>
</body>
</html>
