<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Meeting Agenda Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.02rem; margin-bottom: 4px; }
  .desc { font-size: .8rem; opacity: .65; margin-bottom: 8px; }
  .add { display: flex; gap: 8px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 15px; border-radius: 8px; font-family:'DM Sans',sans-serif; flex: none; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 7px 12px; margin: 5px 0; display: flex; justify-content: space-between; font-size: .88rem; }
  .item .x { cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { opacity: .45; font-size: .82rem; font-style: italic; padding: 3px 0; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .9rem; margin-top: 14px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Family Meeting Agenda Builder</h1>
  <p class="sub">Regular family meetings build teamwork. Keep them short, fair and warm.</p>

  <div class="panel" id="s_wins"></div>
  <div class="panel" id="s_topics"></div>
  <div class="panel" id="s_plans"></div>

  <div class="panel" style="text-align:center">
    <button class="btn" onclick="gen()">Build Agenda</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
    <pre id="out" style="display:none;text-align:left"></pre>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const SEC=[
    {id:'wins',title:'Wins & appreciations',desc:'Start positive — celebrate the week and thank each other',ph:'e.g. Maya aced her spelling test'},
    {id:'topics',title:'Things to discuss',desc:'Issues, decisions, problems to solve together',ph:'e.g. Screen time on weekends'},
    {id:'plans',title:'Coming up / plans',desc:'Schedule, events, who needs what',ph:'e.g. Grandma visiting Saturday'}
  ];
  let D=JSON.parse(localStorage.getItem('fmab')||'{}');
  SEC.forEach(s=>{ if(!D[s.id])D[s.id]=[]; });
  const save=()=>localStorage.setItem('fmab',JSON.stringify(D));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(id){ const inp=document.getElementById('in_'+id); const t=inp.value.trim(); if(!t)return;
    D[id].push(t); inp.value=''; save(); render(); }
  function del(id,i){ D[id].splice(i,1); save(); render(); }
  function render(){
    SEC.forEach(s=>{
      g('s_'+s.id).innerHTML='<h3>'+s.title+'</h3><div class="desc">'+s.desc+'</div>'+
        '<div class="add"><input id="in_'+s.id+'" placeholder="'+s.ph+'" onkeydown="if(event.key===\'Enter\')add(\''+s.id+'\')"><button class="btn" onclick="add(\''+s.id+'\')">Add</button></div>'+
        (D[s.id].length?D[s.id].map((x,i)=>'<div class="item"><span>'+esc(x)+'</span><span class="x" onclick="del(\''+s.id+'\','+i+')">✕</span></div>').join(''):'<div class="empty">Nothing added yet.</div>');
    });
  }
  function gen(){
    let t='FAMILY MEETING AGENDA\n'+new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})+'\n';
    SEC.forEach(s=>{ t+='\n'+s.title.toUpperCase()+':\n'+(D[s.id].length?D[s.id].map(x=>'  • '+x).join('\n'):'  (none)')+'\n'; });
    t+='\nCLOSE: One thing each person is looking forward to.';
    g('out').textContent=t; g('out').style.display='block';
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build the agenda first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  render();
</script>
</body>
</html>
