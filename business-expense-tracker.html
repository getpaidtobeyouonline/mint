<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Expense Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 2rem 1rem; }
    h1 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: clamp(1.8rem, 4vw, 2.6rem); text-align: center; margin-bottom: 0.4rem; }
    .subtitle { text-align: center; opacity: 0.65; margin-bottom: 1.75rem; font-size: 0.9rem; }
    .container { max-width: 700px; margin: 0 auto; }
    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
    .stat { background: #345534; border: 1px solid #3C603C; border-radius: 10px; padding: 1rem; text-align: center; }
    .stat-label { font-size: 0.75rem; opacity: 0.5; margin-bottom: 0.3rem; }
    .stat-val { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.3rem; }
    .add-card { background: #345534; border: 1px solid #3C603C; border-radius: 10px; padding: 1.3rem; margin-bottom: 1.25rem; }
    .add-title { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1rem; margin-bottom: 1rem; }
    .add-grid { display: grid; grid-template-columns: 135px 1fr 120px; gap: 0.5rem; margin-bottom: 0.5rem; }
    .add-grid2 { display: grid; grid-template-columns: 1fr auto; gap: 0.5rem; }
    input[type="date"], input[type="number"], input[type="text"], select { background: #3C603C; border: 1px solid #4C724C; color: #FFFFFF; padding: 0.6rem 0.85rem; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none; width: 100%; }
    input:focus, select:focus { border-color: #5AE57A; }
    select option { background: #3C603C; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
    input[type="number"] { -moz-appearance: textfield; }
    input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .add-btn { background: #5AE57A; color: #325132; border: none; padding: 0.6rem 1.4rem; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer; white-space: nowrap; transition: opacity 0.2s; }
    .add-btn:hover { opacity: 0.85; }
    .filters { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .filter-btn { background: #345534; border: 1px solid #3C603C; color: #BFD8BF; padding: 0.35rem 0.8rem; border-radius: 20px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; transition: all 0.2s; }
    .filter-btn:hover { border-color: #5AE57A; color: #FFFFFF; }
    .filter-btn.active { background: #5AE57A; border-color: #5AE57A; color: #325132; font-weight: 700; }
    .expense-item { background: #345534; border: 1px solid #3C603C; border-radius: 8px; padding: 0.85rem 1rem; margin-bottom: 0.45rem; display: flex; align-items: center; gap: 0.7rem; }
    .exp-date { font-size: 0.75rem; opacity: 0.4; min-width: 50px; }
    .exp-cat { font-size: 0.7rem; padding: 0.15rem 0.55rem; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
    .exp-desc { flex: 1; font-size: 0.9rem; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .exp-amount { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1rem; white-space: nowrap; }
    .exp-del { background: transparent; border: none; color: #4C724C; cursor: pointer; font-size: 0.85rem; padding: 0 0.2rem; transition: color 0.2s; flex-shrink: 0; }
    .exp-del:hover { color: #5AE57A; }
    .empty { text-align: center; opacity: 0.35; padding: 2.5rem 1rem; font-size: 0.9rem; }
    .cat-Software    { background: rgba(100,149,237,.15); color: #5AE57A; }
    .cat-Marketing   { background: rgba(180,100,220,.15); color: #5AE57A; }
    .cat-Education   { background: rgba(80,200,180,.15);  color: #5AE57A; }
    .cat-Contractors { background: rgba(230,160,60,.15);  color: #5AE57A; }
    .cat-Equipment   { background: rgba(160,160,160,.15); color: #BFD8BF; }
    .cat-Travel      { background: rgba(100,200,100,.15); color: #5AE57A; }
    .cat-Office      { background: rgba(220,140,100,.15); color: #5AE57A; }
    .cat-Other       { background: rgba(180,180,180,.1);  color: #BFD8BF; }
    .btn-row { display: flex; gap: 0.65rem; margin: 1rem 0 2.5rem; }
    .btn-outline { background: transparent; border: 1px solid #5AE57A; color: #5AE57A; padding: 0.7rem 1rem; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; flex: 1; transition: all 0.2s; }
    .btn-outline:hover { background: #5AE57A; color: #325132; }
    .btn-danger { border-color: #BFD8BF !important; color: #BFD8BF !important; }
    .btn-danger:hover { background: #5AE57A !important; border-color: #5AE57A !important; color: #FFFFFF !important; }
    footer { text-align: center; opacity: 0.35; font-size: 0.78rem; margin-top: 1rem; }
    @media (max-width: 500px) {
      .add-grid { grid-template-columns: 1fr 1fr; }
      .add-grid > input[type="date"] { grid-column: 1/-1; }
      .stat-val { font-size: 1.1rem; }
    }
    @media print {
      body { background: #FFFFFF; color: #325132; }
      .add-card, .filters, .btn-row, .exp-del, footer { display: none; }
      .expense-item, .stat { background: #FFFFFF; border-color: #FFFFFF; }
      .stat-val, .exp-amount { color: #5AE57A; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Business Expense Tracker</h1>
  <p class="subtitle">Log, categorize, and track every business expense — saved automatically to your browser.</p>

  <div class="stats">
    <div class="stat"><div class="stat-label">This Month</div><div class="stat-val" id="statMonth">$0.00</div></div>
    <div class="stat"><div class="stat-label">All Time</div><div class="stat-val" id="statTotal">$0.00</div></div>
    <div class="stat"><div class="stat-label">Entries</div><div class="stat-val" id="statCount">0</div></div>
  </div>

  <div class="add-card">
    <div class="add-title">Add Expense</div>
    <div class="add-grid">
      <input type="date" id="eDate">
      <select id="eCat">
        <option>Software</option><option>Marketing</option><option>Education</option>
        <option>Contractors</option><option>Equipment</option><option>Travel</option>
        <option>Office</option><option>Other</option>
      </select>
      <input type="number" id="eAmount" placeholder="Amount" min="0" step="0.01">
    </div>
    <div class="add-grid2">
      <input type="text" id="eDesc" placeholder="Description (e.g. Canva Pro subscription)" onkeydown="if(event.key==='Enter')addExpense()">
      <button class="add-btn" onclick="addExpense()">+ Add</button>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('All',this)">All</button>
    <button class="filter-btn" onclick="setFilter('Software',this)">Software</button>
    <button class="filter-btn" onclick="setFilter('Marketing',this)">Marketing</button>
    <button class="filter-btn" onclick="setFilter('Education',this)">Education</button>
    <button class="filter-btn" onclick="setFilter('Contractors',this)">Contractors</button>
    <button class="filter-btn" onclick="setFilter('Equipment',this)">Equipment</button>
    <button class="filter-btn" onclick="setFilter('Travel',this)">Travel</button>
    <button class="filter-btn" onclick="setFilter('Office',this)">Office</button>
    <button class="filter-btn" onclick="setFilter('Other',this)">Other</button>
  </div>

  <div id="expenseList"></div>

  <div class="btn-row">
    <button class="btn-outline" id="copyBtn" onclick="copyExpenses()">Copy List</button>
    <button class="btn-outline" onclick="window.print()">Print / PDF</button>
    <button class="btn-outline btn-danger" onclick="confirmClear()">Clear All</button>
  </div>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const KEY = 'gpbyo_exp_v1';
  let expenses = JSON.parse(localStorage.getItem(KEY) || '[]');
  let filter = 'All';

  document.getElementById('eDate').valueAsDate = new Date();

  function save() { localStorage.setItem(KEY, JSON.stringify(expenses)); }
  function fmt(n) { return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

  function addExpense() {
    const date   = document.getElementById('eDate').value;
    const cat    = document.getElementById('eCat').value;
    const amount = parseFloat(document.getElementById('eAmount').value);
    const desc   = document.getElementById('eDesc').value.trim();
    if (!date || !desc || !(amount > 0)) {
      (!amount||amount<=0) ? document.getElementById('eAmount').focus() : document.getElementById('eDesc').focus();
      return;
    }
    expenses.unshift({ id: Date.now(), date, cat, amount, desc });
    save();
    document.getElementById('eAmount').value = '';
    document.getElementById('eDesc').value   = '';
    render();
  }

  function deleteExpense(id) { expenses = expenses.filter(e=>e.id!==id); save(); render(); }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const ym = new Date().toISOString().slice(0,7);
    document.getElementById('statMonth').textContent = fmt(expenses.filter(e=>e.date.startsWith(ym)).reduce((s,e)=>s+e.amount,0));
    document.getElementById('statTotal').textContent = fmt(expenses.reduce((s,e)=>s+e.amount,0));
    document.getElementById('statCount').textContent = expenses.length;

    const list  = document.getElementById('expenseList');
    const shown = filter==='All' ? expenses : expenses.filter(e=>e.cat===filter);

    if (!shown.length) {
      list.innerHTML = `<div class="empty">${expenses.length?'No expenses in this category.':'No expenses yet — add your first one above.'}</div>`;
      return;
    }
    list.innerHTML = shown.map(e=>`
      <div class="expense-item">
        <span class="exp-date">${e.date.slice(5)}</span>
        <span class="exp-cat cat-${e.cat}">${e.cat}</span>
        <span class="exp-desc" title="${e.desc}">${e.desc}</span>
        <span class="exp-amount">${fmt(e.amount)}</span>
        <button class="exp-del" onclick="deleteExpense(${e.id})" title="Delete">✕</button>
      </div>`).join('');
  }

  function copyExpenses() {
    const shown = filter==='All' ? expenses : expenses.filter(e=>e.cat===filter);
    const rows  = shown.map(e=>`${e.date}  ${e.cat.padEnd(13)}  ${fmt(e.amount).padStart(9)}  ${e.desc}`);
    const total = shown.reduce((s,e)=>s+e.amount,0);
    const text  = [`BUSINESS EXPENSES${filter!=='All'?' — '+filter:''}`, '─'.repeat(52), ...rows, '─'.repeat(52), `TOTAL: ${fmt(total)}`].join('\n');
    navigator.clipboard.writeText(text).then(()=>{
      const b=document.getElementById('copyBtn'); b.textContent='Copied!';
      setTimeout(()=>b.textContent='Copy List',1600);
    });
  }

  function confirmClear() {
    if (confirm('Delete all expenses? This cannot be undone.')) { expenses=[]; save(); render(); }
  }

  render();
</script>
</body>
</html>
