<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Business Name Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#325132;color:#FFFFFF;font-family:'DM Sans',sans-serif;min-height:100vh;padding:32px 16px}
h1{font-family:'Playfair Display',serif;font-size:2.2rem;color:#5AE57A;text-align:center;margin-bottom:8px}
.sub{text-align:center;opacity:.65;margin-bottom:32px;font-size:.95rem;line-height:1.5}
.card{background:#3C603C;border:1px solid #4C724C;border-radius:14px;padding:28px;max-width:580px;margin:0 auto 28px}
label{display:block;margin-bottom:6px;font-size:.8rem;letter-spacing:.06em;text-transform:uppercase;color:#5AE57A;font-weight:600}
input,select{width:100%;background:#325132;border:1px solid #4C724C;border-radius:8px;padding:12px 14px;color:#FFFFFF;font-family:'DM Sans',sans-serif;font-size:.95rem;margin-bottom:20px;transition:border .2s}
input:focus,select:focus{outline:none;border-color:#5AE57A}
select option{background:#3C603C}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.btn{width:100%;background:#5AE57A;color:#325132;border:none;border-radius:8px;padding:15px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.02em;transition:opacity .2s}
.btn:hover{opacity:.85}
.results{max-width:580px;margin:0 auto}
.name-row{background:#3C603C;border:1px solid #4C724C;border-radius:10px;padding:16px 20px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.name-text{font-family:'Playfair Display',serif;font-size:1.25rem;word-break:break-word}
.vibe-tag{font-size:.72rem;color:#BFD8BF;margin-top:3px}
.copy-btn{background:transparent;border:1px solid #5AE57A;color:#5AE57A;padding:7px 16px;border-radius:6px;font-size:.8rem;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;white-space:nowrap;width:auto;transition:all .2s;flex-shrink:0}
.copy-btn:hover,.copy-btn.done{background:#5AE57A;color:#325132}
.empty{text-align:center;opacity:.5;padding:20px}
footer{text-align:center;margin-top:48px;opacity:.35;font-size:.78rem}
@media(max-width:480px){.row{grid-template-columns:1fr}h1{font-size:1.7rem}}
</style>
</head>
<body>

<h1>Minted Business Name Generator</h1>
<p class="sub">Enter your keywords and get 10 unique name ideas in seconds</p>

<div class="card">
  <label>Your Keywords</label>
  <input id="keywords" type="text" placeholder="e.g. glow, bloom, rise (1–3 words)">
  <div class="row">
    <div>
      <label>Industry</label>
      <select id="industry">
        <option value="beauty">Beauty &amp; Wellness</option>
        <option value="coaching">Coaching &amp; Consulting</option>
        <option value="tech">Tech &amp; Digital</option>
        <option value="food">Food &amp; Beverage</option>
        <option value="fashion">Fashion &amp; Style</option>
        <option value="finance">Finance &amp; Wealth</option>
        <option value="creative">Creative &amp; Design</option>
        <option value="health">Health &amp; Fitness</option>
      </select>
    </div>
    <div>
      <label>Vibe</label>
      <select id="vibe">
        <option value="luxury">Luxury &amp; Premium</option>
        <option value="playful">Playful &amp; Fun</option>
        <option value="professional">Professional &amp; Clean</option>
        <option value="bold">Bold &amp; Edgy</option>
        <option value="minimal">Minimal &amp; Modern</option>
        <option value="warm">Warm &amp; Approachable</option>
      </select>
    </div>
  </div>
  <button class="btn" onclick="generate()">Generate Names →</button>
</div>

<div class="results" id="results"></div>

<footer>Powered by GetPaidToBeYouOnline</footer>

<script>
const pfx = {
  luxury:['Aurum','Velour','Lumina','Soleil','Vela','Maison','Atelier','Crest','Noir','Opus','Elara','Ciel'],
  playful:['Zesty','Spark','Fizz','Poppy','Dazzle','Whimsy','Glimmer','Zippy','Breezy','Sunny','Pip','Lumi'],
  professional:['Peak','Apex','Prime','Core','Nexus','Vantage','Summit','Clarity','Forge','Align','Crest','Versa'],
  bold:['Blaze','Strike','Surge','Titan','Revolt','Voltage','Rogue','Grit','Hustle','Pulse','Rave','Edge'],
  minimal:['Nue','Pure','Form','Klar','Still','Bare','Lune','Aire','Even','Vero','Sone','Pale'],
  warm:['Hearth','Bloom','Haven','Maple','Ember','Wren','Honey','Clover','Cedar','Fern','Rosie','Goldie']
};
const sfx = {
  beauty:['Glow','Luxe','Beauty','Ritual','Bliss','Bloom','Aura','Radiance','Skin','Studio'],
  coaching:['Method','Mastery','Edge','Blueprint','Lab','Academy','Collective','Co','Circle','Works'],
  tech:['Labs','Stack','Flow','Hub','Logic','Forge','Sync','Digital','AI','Solutions'],
  food:['Kitchen','Bites','Table','Bowl','Harvest','Pantry','Eats','Co','Market','Provisions'],
  fashion:['Style','Wear','Label','Threads','Closet','Mode','Drape','House','Stitch','Edit'],
  finance:['Capital','Wealth','Advisory','Group','Partners','Ventures','Equity','Pro','Funds','Collective'],
  creative:['Studio','Works','Creative','Design','Craft','Agency','Collective','Brand','Media','Lab'],
  health:['Wellness','Fit','Vitality','Strong','Active','Motion','Thrive','Life','Body','Health']
};
const vibeLabel = {
  luxury:'Premium feel',playful:'Fun & energetic',professional:'Clean & credible',
  bold:'Strong presence',minimal:'Modern & sleek',warm:'Friendly & inviting'
};

function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function cap(w){return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()}

function generate(){
  const raw = document.getElementById('keywords').value.trim();
  const ind  = document.getElementById('industry').value;
  const vibe = document.getElementById('vibe').value;
  const kws  = raw ? raw.split(/[\s,]+/).map(cap).filter(Boolean).slice(0,3) : [];
  const P = pfx[vibe], S = sfx[ind];
  const pool = [];

  if(kws.length){
    kws.forEach(k=>{
      S.forEach(s=>{ if(k!==s) pool.push(k+s, k+' '+s); });
      P.forEach(p=>{ if(p!==k) pool.push(p+k); });
    });
    if(kws.length>1) pool.push(kws.join(''), kws.join(' '));
  }
  for(let i=0;i<30;i++){
    const p=pick(P),s=pick(S);
    pool.push(p+s, p+' '+s);
  }

  const seen=new Set();
  const names=pool.filter(n=>{
    const key=n.toLowerCase();
    if(seen.has(key)||n.length<4)return false;
    seen.add(key);return true;
  }).sort(()=>Math.random()-.5).slice(0,10);

  if(!names.length){
    document.getElementById('results').innerHTML='<p class="empty">Add a keyword and try again.</p>';
    return;
  }
  const tag=vibeLabel[vibe];
  document.getElementById('results').innerHTML=names.map(n=>`
    <div class="name-row">
      <div>
        <div class="name-text">${n}</div>
        <div class="vibe-tag">${tag}</div>
      </div>
      <button class="copy-btn" onclick="doCopy(this,'${n}')">Copy</button>
    </div>`).join('');
}

function doCopy(btn,text){
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='Copied!';btn.classList.add('done');
    setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('done')},1600);
  });
}
</script>
</body>
</html>
