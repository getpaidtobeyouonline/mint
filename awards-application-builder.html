<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Awards Application Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 54px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Awards Application Builder</h1>
  <p class="sub">Draft a compelling, evidence-backed award application.</p>

  <div class="panel">
    <label for="award">The award &amp; category</label>
    <input id="award" placeholder="What you are applying for">
    <label for="story">Your story — the journey so far</label>
    <textarea id="story" placeholder="Where you started and what you have built"></textarea>
    <label for="achievements">Key achievements (with numbers/proof)</label>
    <textarea id="achievements" placeholder="Concrete results, growth, milestones"></textarea>
    <label for="impact">The impact on clients / your field</label>
    <textarea id="impact" placeholder="The difference your work makes"></textarea>
    <label for="standout">What makes you stand out</label>
    <textarea id="standout" placeholder="Why you, and not someone else"></textarea>
    <button class="btn" onclick="gen()">Build Application Draft</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['award','story','achievements','impact','standout'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('aab_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('aab_'+k,g(k).value)); });
  function gen(){
    const t='AWARD APPLICATION DRAFT\n\nAWARD: '+(v('award')||'[the award and category]')+
    '\n\n1. THE STORY\n'+(v('story')||'[your journey so far]')+
    '\n\n2. KEY ACHIEVEMENTS\n'+(v('achievements')||'[results and milestones with numbers]')+
    '\n\n3. IMPACT\n'+(v('impact')||'[the difference your work makes]')+
    '\n\n4. WHAT MAKES ME STAND OUT\n'+(v('standout')||'[why you specifically]')+
    '\n\n--- Award application tips ---\nAnswer the exact question asked — judges score against the criteria.\nUse hard numbers and specific examples, not adjectives.\nTell a story with a clear before and after.\nGet someone else to proofread before you submit.\nDid not win? Ask for feedback and apply again next year.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
