<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Goal Setter</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 2rem 1rem; }
    h1 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: clamp(1.8rem, 4vw, 2.6rem); text-align: center; margin-bottom: 0.4rem; }
    .subtitle { text-align: center; opacity: 0.65; margin-bottom: 1.75rem; font-size: 0.9rem; }
    .container { max-width: 700px; margin: 0 auto; }
    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
    .stat { background: #345534; border: 1px solid #3C603C; border-radius: 10px; padding: 1rem; text-align: center; }
    .stat-label { font-size: 0.75rem; opacity: 0.5; margin-bottom: 0.25rem; }
    .stat-val { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.3rem; }
    .add-card { background: #345534; border: 1px solid #3C603C; border-radius: 10px; padding: 1.3rem; margin-bottom: 1.25rem; }
    .add-title { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1rem; margin-bottom: 1rem; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; margin-bottom: 0.65rem; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.65rem; margin-bottom: 0.65rem; }
    label { display: block; font-size: 0.78rem; opacity: 0.55; margin-bottom: 0.3rem; }
    input[type="text"], input[type="number"], input[type="date"], select { width: 100%; background: #3C603C; border: 1px solid #4C724C; color: #FFFFFF; padding: 0.6rem 0.85rem; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none; }
    input:focus, select:focus { border-color: #5AE57A; }
    select option { background: #3C603C; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
    input[type="number"] { -moz-appearance: textfield; }
    input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .add-btn { background: #5AE57A; color: #325132; border: none; padding: 0.75rem; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; width: 100%; margin-top: 0.4rem; transition: opacity 0.2s; }
    .add-btn:hover { opacity: 0.85; }
    .filters { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .filter-btn { background: #345534; border: 1px solid #3C603C; color: #BFD8BF; padding: 0.35rem 0.8rem; border-radius: 20px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; transition: all 0.2s; }
    .filter-btn:hover { border-color: #5AE57A; color: #FFFFFF; }
    .filter-btn.active { background: #5AE57A; border-color: #5AE57A; color: #325132; font-weight: 700; }
    .goal-card { background: #345534; border: 1px solid #3C603C; border-radius: 10px; padding: 1.1rem; margin-bottom: 0.6rem; }
    .goal-card.done { opacity: 0.55; }
    .goal-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.55rem; }
    .goal-title { font-family: 'Playfair Display', serif; font-size: 1rem; line-height: 1.35; }
    .goal-title.crossed { text-decoration: line-through; opacity: 0.6; }
    .goal-badges { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-top: 0.25rem; }
    .bdg { font-size: 0.68rem; padding: 0.15rem 0.55rem; border-radius: 10px; }
    .bdg-cat  { background: rgba(201,168,76,.12); color: #5AE57A; }
    .bdg-time { background: rgba(180,180,180,.08); color: #BFD8BF; }
    .goal-acts { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }
    .check-btn { background: transparent; border: 1px solid #4C724C; color: #5A845A; width: 26px; height: 26px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; display: flex; align-items: center; justify-content: center; padding: 0; }
    .check-btn:hover { border-color: #5AE57A; color: #5AE57A; }
    .check-btn.done { background: rgba(111,207,142,.15); border-color: #5AE57A; color: #5AE57A; }
    .del-btn { background: transparent; border: none; color: #4C724C; cursor: pointer; font-size: 0.85rem; transition: color 0.2s; }
    .del-btn:hover { color: #5AE57A; }
    .prog-wrap { margin-bottom: 0.55rem; }
    .prog-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem; font-size: 0.78rem; }
    .prog-left { opacity: 0.5; }
    .prog-right { display: flex; align-items: center; gap: 0.4rem; }
    .curr-inp { width: 65px !important; padding: 0.18rem 0.45rem !important; font-size: 0.8rem !important; border-radius: 5px !important; }
    .prog-pct { color: #5AE57A; font-weight: 500; min-width: 36px; text-align: right; }
    .bar { background: #3C603C; border-radius: 5px; height: 7px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 5px; background: #5AE57A; transition: width 0.35s; }
    .bar-fill.full { background: #5AE57A; }
    .goal-foot { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
    .due { font-size: 0.72rem; }
    .due-ok   { color: #BFD8BF; }
    .due-soon { color: #5AE57A; }
    .due-past { color: #5AE57A; }
    .goal-note { font-size: 0.82rem; opacity: 0.48; margin-top: 0.4rem; font-style: italic; line-height: 1.5; }
    .empty { text-align: center; opacity: 0.35; padding: 2.5rem 1rem; font-size: 0.9rem; }
    .btn-row { display: flex; gap: 0.65rem; margin: 0.5rem 0 2.5rem; }
    .btn-outline { background: transparent; border: 1px solid #5AE57A; color: #5AE57A; padding: 0.7rem 1rem; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; flex: 1; transition: all 0.2s; }
    .btn-outline:hover { background: #5AE57A; color: #325132; }
    .btn-muted { border-color: #4C724C !important; color: #BFD8BF !important; }
    .btn-muted:hover { background: #5AE57A !important; border-color: #5AE57A !important; color: #FFFFFF !important; }
    footer { text-align: center; opacity: 0.35; font-size: 0.78rem; margin-top: 1rem; }
    @media (max-width: 500px) { .grid2, .grid3 { grid-template-columns: 1fr; } .stat-val { font-size: 1.1rem; } }
  </style>
</head>
<body>
<div class="container">
  <h1>Business Goal Setter</h1>
  <p class="subtitle">Set goals, track progress, and build the business you actually want.</p>

  <div class="stats">
    <div class="stat"><div class="stat-label">Active Goals</div><div class="stat-val" id="sActive">0</div></div>
    <div class="stat"><div class="stat-label">Completed</div><div class="stat-val" id="sComplete">0</div></div>
    <div class="stat"><div class="stat-label">Avg Progress</div><div class="stat-val" id="sAvg">—</div></div>
  </div>

  <div class="add-card">
    <div class="add-title">Set a New Goal</div>
    <div><label>Goal</label><input type="text" id="gTitle" placeholder="What do you want to achieve?" style="margin-bottom:.65rem"></div>
    <div class="grid3">
      <div><label>Category</label>
        <select id="gCat">
          <option>Revenue</option><option>Clients</option><option>Audience</option>
          <option>Content</option><option>Learning</option><option>Other</option>
        </select>
      </div>
      <div><label>Timeframe</label>
        <select id="gTime">
          <option>This Week</option><option>This Month</option><option>This Quarter</option>
          <option>This Year</option><option>Custom</option>
        </select>
      </div>
      <div><label>Due Date</label><input type="date" id="gDue"></div>
    </div>
    <div class="grid2">
      <div><label>Target (optional number)</label><input type="number" id="gTarget" placeholder="e.g. 5000" min="0" step="any"></div>
      <div><label>Unit</label><input type="text" id="gUnit" placeholder="e.g. $ / clients / posts"></div>
    </div>
    <div><label>Notes (optional)</label><input type="text" id="gNotes" placeholder="Why this goal matters, how you'll get there…" style="margin-bottom:.1rem"></div>
    <button class="add-btn" onclick="addGoal()">✦ Set Goal</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('All',this)">All</button>
    <button class="filter-btn" onclick="setFilter('Active',this)">Active</button>
    <button class="filter-btn" onclick="setFilter('Done',this)">Completed</button>
    <button class="filter-btn" onclick="setFilter('Revenue',this)">Revenue</button>
    <button class="filter-btn" onclick="setFilter('Clients',this)">Clients</button>
    <button class="filter-btn" onclick="setFilter('Audience',this)">Audience</button>
    <button class="filter-btn" onclick="setFilter('Content',this)">Content</button>
  </div>

  <div id="goalList"></div>

  <div class="btn-row">
    <button class="btn-outline" id="copyBtn" onclick="copyGoals()">Copy Goals</button>
    <button class="btn-outline btn-muted" onclick="confirmClear()">Clear All</button>
  </div>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const KEY = 'gpbyo_goals_v1';
  let goals  = JSON.parse(localStorage.getItem(KEY) || '[]');
  let filter = 'All';

  document.getElementById('gDue').valueAsDate = new Date(Date.now()+30*864e5);

  function save() { localStorage.setItem(KEY, JSON.stringify(goals)); }

  function addGoal() {
    const title = document.getElementById('gTitle').value.trim();
    if (!title) { document.getElementById('gTitle').focus(); return; }
    const target = parseFloat(document.getElementById('gTarget').value) || 0;
    goals.unshift({
      id: Date.now(),
      title,
      cat:   document.getElementById('gCat').value,
      time:  document.getElementById('gTime').value,
      due:   document.getElementById('gDue').value,
      target,
      unit:  document.getElementById('gUnit').value.trim(),
      curr:  0,
      notes: document.getElementById('gNotes').value.trim(),
      done:  false
    });
    save();
    ['gTitle','gTarget','gUnit','gNotes'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('gDue').valueAsDate = new Date(Date.now()+30*864e5);
    render();
  }

  function toggleDone(id) {
    const g = goals.find(x=>x.id===id);
    if (g) { g.done=!g.done; if(g.done&&g.target) g.curr=g.target; save(); render(); }
  }

  function deleteGoal(id) { goals=goals.filter(g=>g.id!==id); save(); render(); }

  function updateCurr(id, val) {
    const g = goals.find(x=>x.id===id);
    if (!g) return;
    g.curr = parseFloat(val) || 0;
    save();
    const card = document.querySelector(`[data-id="${id}"]`);
    if (!card) return;
    const pct = g.target ? Math.min(100, Math.round(g.curr/g.target*100)) : 0;
    card.querySelector('.bar-fill').style.width = pct+'%';
    card.querySelector('.bar-fill').className   = 'bar-fill'+(pct>=100?' full':'');
    card.querySelector('.prog-pct').textContent = pct+'%';
    updateStats();
  }

  function updateStats() {
    const active  = goals.filter(g=>!g.done).length;
    const complete= goals.filter(g=>g.done).length;
    const wt      = goals.filter(g=>g.target>0);
    const avg     = wt.length ? Math.round(wt.reduce((s,g)=>s+Math.min(100,g.curr/g.target*100),0)/wt.length) : null;
    document.getElementById('sActive').textContent   = active;
    document.getElementById('sComplete').textContent = complete;
    document.getElementById('sAvg').textContent      = avg!==null ? avg+'%' : '—';
  }

  function setFilter(f, btn) {
    filter=f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function dueClass(due) {
    if (!due) return '';
    const d = (new Date(due)-new Date())/864e5;
    return d<0?'due-past':d<7?'due-soon':'due-ok';
  }
  function dueLabel(due) {
    if (!due) return '';
    const d = Math.round((new Date(due)-new Date())/864e5);
    if (d<0)  return `${Math.abs(d)}d overdue`;
    if (d===0) return 'Due today';
    if (d<7)  return `${d}d left`;
    return new Date(due).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }

  function render() {
    updateStats();
    let shown = goals;
    if      (filter==='Active') shown = goals.filter(g=>!g.done);
    else if (filter==='Done')   shown = goals.filter(g=>g.done);
    else if (filter!=='All')    shown = goals.filter(g=>g.cat===filter);

    const list = document.getElementById('goalList');
    if (!shown.length) {
      list.innerHTML=`<div class="empty">${goals.length?'No goals match this filter.':'No goals yet — set your first one above.'}</div>`;
      return;
    }

    list.innerHTML = shown.map(g => {
      const pct  = g.target ? Math.min(100,Math.round(g.curr/g.target*100)) : 0;
      const prog = g.target ? `
        <div class="prog-wrap">
          <div class="prog-row">
            <span class="prog-left">${g.unit||'Progress'}</span>
            <span class="prog-right">
              <input type="number" class="curr-inp" value="${g.curr}" min="0" step="any"
                onchange="updateCurr(${g.id},this.value)" onclick="this.select()">
              <span style="opacity:.4;font-size:.78rem">/ ${g.target}${g.unit?' '+g.unit:''}</span>
              <span class="prog-pct">${pct}%</span>
            </span>
          </div>
          <div class="bar"><div class="bar-fill${pct>=100?' full':''}" style="width:${pct}%"></div></div>
        </div>` : '';

      return `
        <div class="goal-card${g.done?' done':''}" data-id="${g.id}">
          <div class="goal-top">
            <div>
              <div class="goal-title${g.done?' crossed':''}">${g.title}</div>
              <div class="goal-badges">
                <span class="bdg bdg-cat">${g.cat}</span>
                <span class="bdg bdg-time">${g.time}</span>
              </div>
            </div>
            <div class="goal-acts">
              <button class="check-btn${g.done?' done':''}" onclick="toggleDone(${g.id})" title="${g.done?'Mark active':'Mark complete'}">✓</button>
              <button class="del-btn" onclick="deleteGoal(${g.id})">✕</button>
            </div>
          </div>
          ${prog}
          <div class="goal-foot">
            ${g.due?`<span class="due ${dueClass(g.due)}">📅 ${dueLabel(g.due)}</span>`:''}
          </div>
          ${g.notes?`<div class="goal-note">${g.notes}</div>`:''}
        </div>`;
    }).join('');
  }

  function copyGoals() {
    const active = goals.filter(g=>!g.done), done = goals.filter(g=>g.done);
    let text = `BUSINESS GOALS\n${'─'.repeat(28)}\nActive: ${active.length} | Completed: ${done.length}\n\n`;
    const section = (label, list) => {
      if (!list.length) return '';
      let s = `${label}\n`;
      list.forEach(g => {
        s += `• ${g.title} [${g.cat} · ${g.time}]\n`;
        if (g.target) s += `  Progress: ${g.curr} / ${g.target}${g.unit?' '+g.unit:''}\n`;
        if (g.notes)  s += `  ${g.notes}\n`;
      });
      return s+'\n';
    };
    text += section('ACTIVE', active)+section('COMPLETED', done);
    navigator.clipboard.writeText(text).then(()=>{
      const b=document.getElementById('copyBtn'); b.textContent='Copied!';
      setTimeout(()=>b.textContent='Copy Goals',1600);
    });
  }

  function confirmClear() {
    if (confirm('Delete all goals? This cannot be undone.')) { goals=[]; save(); render(); }
  }

  render();
</script>
</body>
</html>
