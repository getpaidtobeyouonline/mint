<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Symptom Logger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 20px; font-size: .95rem; }
  .note { background:#2E4D2E;border:1px solid #4F8A55;border-radius:8px;padding:10px 13px;font-size:.82rem;margin-bottom:14px; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input, select, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; resize: vertical; }
  input[type=range] { padding: 0; accent-color: #5AE57A; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .ent { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 7px; padding: 9px 13px; margin-bottom: 6px; font-size: .87rem; display: flex; justify-content: space-between; gap: 10px; }
  .ent .x { cursor: pointer; opacity: .5; } .ent .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Symptom Logger</h1>
  <p class="sub">A clear symptom diary you can show a doctor — date, severity, and what may have triggered it.</p>

  <div class="note">For tracking only — not a diagnosis. Bring patterns you notice to a healthcare professional.</div>

  <div class="panel">
    <div class="row">
      <div><label>Date</label><input id="dt" type="date"></div>
      <div style="flex:2"><label>Symptom</label><input id="nm" placeholder="e.g. headache"></div>
      <div style="flex:2"><label>Severity (1-10): <span id="sv" style="color:#5AE57A">5</span></label><input id="sev" type="range" min="1" max="10" value="5" oninput="document.getElementById('sv').textContent=this.value"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Log</button></div>
    </div>
    <input id="note2" placeholder="Possible triggers / notes (food, sleep, stress, weather…)" style="margin-top:8px">
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="exportTxt()">Export for Doctor</button>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('syl')||'[]');
  const save=()=>localStorage.setItem('syl',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  g('dt').value=new Date().toISOString().slice(0,10);
  function add(){ const nm=v('nm'); if(!nm){alert('Add a symptom.');return;}
    R.push({d:g('dt').value,nm,sev:+g('sev').value,note:v('note2')}); ['nm','note2'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No symptoms logged yet.</div>'; return; }
    L.innerHTML=[...R].map((x,i)=>({x,i})).sort((a,b)=>a.x.d<b.x.d?1:-1).map(({x,i})=>`<div class="ent"><span><b style="color:#5AE57A">${x.d}</b> · ${esc(x.nm)} · ${x.sev}/10${x.note?' · '+esc(x.note):''}</span><span class="x" onclick="del(${i})">✕</span></div>`).join('');
  }
  function exportTxt(){
    if(!R.length){alert('Log something first.');return;}
    let t='SYMPTOM DIARY\n\n'+[...R].sort((a,b)=>a.d<b.d?-1:1).map(x=>`${x.d} | ${x.nm} | severity ${x.sev}/10${x.note?' | '+x.note:''}`).join('\n');
    const b=new Blob([t],{type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='symptom-diary.txt'; a.click(); URL.revokeObjectURL(a.href);
  }
  render();
</script>
</body>
</html>
