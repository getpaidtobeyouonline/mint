<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media Goal Setter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .blk { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
  .blk h4 { color: #5AE57A; font-size: .76rem; text-transform: uppercase; margin-bottom: 4px; }
  .blk p { font-size: .95rem; }
  .warn { color: #5AE57A; font-size: .85rem; margin-top: 6px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Social Media Goal Setter</h1>
  <p class="sub">Turn a vague "grow my account" into a SMART goal with the weekly inputs that get you there.</p>

  <div class="panel">
    <label for="metric">What you're growing</label>
    <select id="metric"><option>Followers</option><option>Email subscribers</option><option>Engaged community</option><option>Sales / clients from social</option></select>
    <div class="grid">
      <div><label for="from">From (now)</label><input id="from" type="number" min="0" value="1200"></div>
      <div><label for="to">To (target)</label><input id="to" type="number" min="0" value="5000"></div>
      <div><label for="weeks">In how many weeks</label><input id="weeks" type="number" min="1" value="12"></div>
    </div>
    <label for="why">Why this matters (your real reason)</label>
    <input id="why" placeholder="Connects the grind to something you care about">
    <button class="btn" onclick="gen()">Set My Goal</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['metric','from','to','weeks','why'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim(), n=id=>parseFloat(g(id).value)||0;
  F.forEach(k=>{ const s=localStorage.getItem('smgs_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('smgs_'+k,g(k).value)); });
  function gen(){
    const gap=Math.max(0,n('to')-n('from')), wks=Math.max(1,n('weeks'));
    const perWk=Math.ceil(gap/wks);
    const rate=n('from')>0?(perWk*4.33)/n('from')*100:999;
    const m=g('metric').value;
    g('out').innerHTML=`<div class="blk"><h4>Your SMART goal</h4><p>Grow ${m.toLowerCase()} from <b>${n('from').toLocaleString()}</b> to <b>${n('to').toLocaleString()}</b> in <b>${wks} weeks</b> — about <b>${perWk.toLocaleString()}/week</b>.</p>${rate>25?`<div class="warn">⚠ That's ~${Math.round(rate)}%/month growth — aggressive. Consider extending the timeline or treating viral spikes as a bonus, not the plan.</div>`:''}</div>
      <div class="blk"><h4>Your real why</h4><p>${esc(v('why')||'[add the reason that keeps you going on slow weeks]')}</p></div>
      <div class="blk"><h4>Weekly inputs (what you control)</h4><p>You can't control the result, only the inputs. Commit to a fixed posting cadence + one growth lever (reach content, collabs, or daily commenting) and track inputs, not just the number.</p></div>
      <div class="blk"><h4>Checkpoint</h4><p>At the halfway mark (week ${Math.round(wks/2)}) you should be near <b>${(n('from')+gap/2).toLocaleString()}</b>. If you're under, change the input — not the goal.</p></div>`;
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function copyOut(){ const t=g('out').innerText; if(!t){alert('Set the goal first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Goal copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
