<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Note Organiser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 70px; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 130px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 10px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .fp { background: #2A442A; border: 1px solid #5A845A; border-radius: 16px; padding: 5px 12px; font-size: .8rem; cursor: pointer; }
  .fp.on { background: #5AE57A; color: #325132; border-color: #5AE57A; font-weight: 500; }
  .note { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 11px 14px; margin-bottom: 8px; }
  .note .top { display: flex; justify-content: space-between; gap: 10px; }
  .note .c { color: #5AE57A; font-size: .8rem; font-weight: 500; }
  .note .x { cursor: pointer; opacity: .5; } .note .x:hover { opacity: 1; color: #5AE57A; }
  .note .tx { font-size: .89rem; margin-top: 3px; white-space: pre-wrap; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Course Note Organiser</h1>
  <p class="sub">Keep all your course notes in one place, tagged by course and easy to find.</p>

  <div class="panel">
    <div class="row">
      <div><label>Course / subject</label><input id="course" placeholder="e.g. Marketing 101"></div>
      <div><label>Topic / lesson</label><input id="topic" placeholder="e.g. Lesson 3 — funnels"></div>
    </div>
    <label>Your notes</label>
    <textarea id="text" placeholder="Key points, definitions, things to remember..."></textarea>
    <button class="btn" onclick="add()">+ Save Note</button>
  </div>

  <div class="panel">
    <div class="filter" id="filter"></div>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('cno')||'[]'), filter='all';
  const save=()=>localStorage.setItem('cno',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('text')){ alert('Write a note first.'); return; }
    R.push({course:v('course')||'General',topic:v('topic'),text:v('text'),t:Date.now()});
    g('topic').value=''; g('text').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all notes?')){ R=[]; save(); render(); } }
  function setF(f){ filter=f; render(); }
  function render(){
    const courses=[...new Set(R.map(x=>x.course))];
    g('filter').innerHTML='<span class="fp'+(filter==='all'?' on':'')+'" onclick="setF(\'all\')">All</span>'+
      courses.map(c=>'<span class="fp'+(filter===c?' on':'')+'" onclick="setF(\''+c.replace(/'/g,"\\'")+'\')">'+esc(c)+'</span>').join('');
    const L=g('list');
    const shown=R.map((x,i)=>({x,i})).filter(o=>filter==='all'||o.x.course===filter);
    if(!shown.length){ L.innerHTML='<div class="empty">No notes here yet.</div>'; return; }
    L.innerHTML=[...shown].reverse().map(({x,i})=>
      '<div class="note"><div class="top"><span class="c">'+esc(x.course)+(x.topic?' · '+esc(x.topic):'')+'</span><span class="x" onclick="del('+i+')">✕</span></div><div class="tx">'+esc(x.text)+'</div></div>').join('');
  }
  render();
</script>
</body>
</html>
