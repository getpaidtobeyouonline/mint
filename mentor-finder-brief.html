<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentor Finder Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Mentor Finder Brief</h1>
  <p class="sub">Get clear on the mentor you need — so you ask the right person, the right way.</p>

  <div class="panel">
    <label for="help">What you want help with</label>
    <textarea id="help" placeholder="The specific area you want to grow in"></textarea>
    <label for="where">Where you want to be in 1-2 years</label>
    <input id="where" placeholder="Your near-term goal">
    <label for="qualities">Qualities of your ideal mentor</label>
    <input id="qualities" placeholder="e.g. has done what I want to do, honest, generous">
    <label for="offer">What you can offer in return</label>
    <input id="offer" placeholder="e.g. fresh perspective, help with a task, real effort">
    <label for="look">Where you could look</label>
    <input id="look" placeholder="e.g. my industry, LinkedIn, alumni, a community">
    <button class="btn" onclick="gen()">Build Brief</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['help','where','qualities','offer','look'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('mfb_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('mfb_'+k,g(k).value)); });
  function gen(){
    const t='MENTOR FINDER BRIEF\n\nWHAT I WANT HELP WITH:\n'+(v('help')||'[the area you want to grow]')+
    '\n\nWHERE I WANT TO BE (1-2 years):\n'+(v('where')||'[your near-term goal]')+
    '\n\nMY IDEAL MENTOR:\n'+(v('qualities')||'[the qualities that matter]')+
    '\n\nWHAT I BRING TO THE RELATIONSHIP:\n'+(v('offer')||'[what you offer in return]')+
    '\n\nWHERE I WILL LOOK:\n'+(v('look')||'[communities, people, platforms]')+
    '\n\n--- How to ask ---\nStart small: ask for one specific conversation, not "will you mentor me?"\nGreat mentorships grow naturally from a good first chat.\nCome with questions, act on the advice, and report back. That earns more time.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
