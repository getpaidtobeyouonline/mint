<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Budget Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 90px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.02rem; margin-bottom: 6px; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 7px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: .86rem; gap: 8px; }
  .item .x { cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .result { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 14px; text-align: center; margin-top: 12px; }
  .result .big { font-family: 'Playfair Display', serif; font-size: 1.8rem; }
  .result .l { font-size: .8rem; opacity: .7; }
  .empty { opacity: .45; font-size: .82rem; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Student Budget Calculator</h1>
  <p class="sub">Add your income and expenses (per term or month) and see if your budget balances.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Item</label><input id="label" placeholder="e.g. Part-time job / Rent"></div>
      <div><label>Type</label><select id="type"><option value="in">Income</option><option value="out">Expense</option></select></div>
      <div><label>Amount</label><input id="amt" type="number" min="0" step="0.01" placeholder="0"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div class="result" id="result"></div>
  </div>

  <div class="panel">
    <h3>Money in</h3>
    <div id="inList"></div>
    <h3 style="margin-top:12px">Money out</h3>
    <div id="outList"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:10px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('sbc')||'[]');
  const save=()=>localStorage.setItem('sbc',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const fmt=n=>n.toLocaleString(undefined,{maximumFractionDigits:0});
  function add(){ const a=parseFloat(g('amt').value)||0; if(!v('label')||!a){ alert('Enter an item and amount.'); return; }
    R.push({l:v('label'),t:g('type').value,a}); g('label').value=''; g('amt').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the budget?')){ R=[]; save(); render(); } }
  function render(){
    const inc=R.filter(x=>x.t==='in').reduce((s,x)=>s+x.a,0);
    const exp=R.filter(x=>x.t==='out').reduce((s,x)=>s+x.a,0);
    const net=inc-exp;
    g('result').innerHTML='<div class="big" style="color:'+(net>=0?'#5AE57A':'#5AE57A')+'">'+(net>=0?'+':'')+fmt(net)+'</div><div class="l">'+(net>=0?'left over — '+fmt(inc)+' in, '+fmt(exp)+' out':'shortfall — you are spending '+fmt(-net)+' more than you have')+'</div>';
    function rows(type,emptyMsg){
      const items=R.map((x,i)=>({x,i})).filter(o=>o.x.t===type);
      if(!items.length)return '<div class="empty">'+emptyMsg+'</div>';
      return items.map(({x,i})=>'<div class="item"><span>'+esc(x.l)+'</span><span><b style="color:'+(type==='in'?'#5AE57A':'#5AE57A')+'">'+fmt(x.a)+'</b> <span class="x" onclick="del('+i+')">✕</span></span></div>').join('');
    }
    g('inList').innerHTML=rows('in','No income added.');
    g('outList').innerHTML=rows('out','No expenses added.');
  }
  render();
</script>
</body>
</html>
