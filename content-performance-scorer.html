<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Content Performance Scorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 20px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .addrow { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .addrow>div { flex: 1; min-width: 90px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .post { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 11px 14px; margin-bottom: 8px; }
  .post .top { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; align-items: baseline; }
  .post .nm { font-weight: 500; }
  .post .sc { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.2rem; }
  .post .gr { font-size: .78rem; padding: 1px 8px; border-radius: 20px; border: 1px solid #5AE57A; color: #5AE57A; }
  .post .meta { font-size: .78rem; opacity: .65; margin-top: 3px; }
  .post .x { cursor: pointer; opacity: .5; } .post .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 16px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Content Performance Scorer</h1>
  <p class="sub">Score each post 0–100 on a fair blend of reach, engagement, and saves — then double down on A's.</p>

  <div class="panel">
    <div class="addrow">
      <div style="flex:2"><label for="nm">Post</label><input id="nm" placeholder="e.g. Reel: pricing"></div>
      <div><label for="rc">Reach</label><input id="rc" type="number" min="0"></div>
      <div><label for="li">Likes+comments</label><input id="li" type="number" min="0"></div>
      <div><label for="sv">Saves+shares</label><input id="sv" type="number" min="0"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Score</button></div>
    </div>
  </div>

  <div id="list"></div>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim(), nu=id=>parseFloat(g(id).value)||0;
  let P=JSON.parse(localStorage.getItem('cps')||'[]');
  const save=()=>localStorage.setItem('cps',JSON.stringify(P));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  // score = engagement-rate component + save-weight component, normalised across logged posts
  function score(p){
    const er = p.r>0 ? (p.li+p.sv)/p.r : 0;
    const saveBias = p.r>0 ? p.sv/p.r : 0;
    return er*100*0.7 + saveBias*100*1.5; // raw; we rank relative below
  }
  function add(){ const nm=v('nm'); if(!nm){alert('Name the post.');return;} P.push({nm,r:nu('rc'),li:nu('li'),sv:nu('sv')}); ['nm','rc','li','sv'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ P.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ P=[]; save(); render(); } }
  function grade(n){ return n>=80?'A':n>=60?'B':n>=40?'C':n>=20?'D':'F'; }
  function render(){
    const L=g('list');
    if(!P.length){ L.innerHTML='<div class="empty">No posts scored yet.</div>'; return; }
    const raws=P.map(score); const mx=Math.max(...raws,0.0001);
    L.innerHTML=P.map((p,i)=>({p,i,s:Math.round(raws[i]/mx*100)})).sort((a,b)=>b.s-a.s).map(({p,i,s})=>`
      <div class="post"><div class="top"><span class="nm">${esc(p.nm)}</span><span><span class="gr">${grade(s)}</span> <span class="sc">${s}</span></span></div>
      <div class="meta">👁 ${p.r.toLocaleString()} · ❤ ${p.li.toLocaleString()} · 🔖 ${p.sv.toLocaleString()} <span class="x" onclick="del(${i})">✕</span></div></div>`).join('')+
      `<div class="empty" style="opacity:.6">Scores are relative to your own best post (=100). Make more like your A's.</div>`;
  }
  render();
</script>
</body>
</html>
