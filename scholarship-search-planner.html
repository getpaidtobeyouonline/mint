<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scholarship Search Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 12px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .stats { display: flex; gap: 10px; margin-bottom: 12px; }
  .stat { flex: 1; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 12px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #5AE57A; }
  .stat .l { font-size: .66rem; opacity: .65; text-transform: uppercase; }
  .card { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; font-size: .87rem; gap: 10px; }
  .card.soon { border-left: 3px solid #5AE57A; }
  .card.done { border-left: 3px solid #5AE57A; opacity: .7; }
  .card .st { cursor: pointer; font-size: .78rem; color: #5AE57A; flex: none; }
  .card .x { cursor: pointer; opacity: .5; flex: none; } .card .x:hover { opacity: 1; color: #5AE57A; }
  .dd { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: .85rem; flex: none; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Scholarship Search Planner</h1>
  <p class="sub">Track every scholarship you find, its deadline, and where you are in the application.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Scholarship / award</label><input id="name" placeholder="Name"></div>
      <div><label>Amount</label><input id="amount" placeholder="e.g. 2,000"></div>
      <div><label>Deadline</label><input id="deadline" type="date"></div>
    </div>
    <button class="btn" onclick="add()">+ Add Scholarship</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="sCount">0</div><div class="l">Tracked</div></div>
    <div class="stat"><div class="v" id="sApplied">0</div><div class="l">Applied</div></div>
    <div class="stat"><div class="v" id="sValue">0</div><div class="l">Total value</div></div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('ssp2')||'[]');
  const save=()=>localStorage.setItem('ssp2',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const STATES=['Researching','Preparing','Applied','Result in'];
  function add(){ if(!v('name')){ alert('Enter a scholarship name.'); return; }
    R.push({n:v('name'),amt:v('amount'),dl:g('deadline').value,s:0}); ['name','amount'].forEach(k=>g(k).value=''); g('deadline').value=''; save(); render(); }
  function cycle(i){ R[i].s=(R[i].s+1)%STATES.length; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all scholarships?')){ R=[]; save(); render(); } }
  function render(){
    g('sCount').textContent=R.length;
    g('sApplied').textContent=R.filter(x=>x.s>=2).length;
    const total=R.reduce((s,x)=>s+(parseFloat((x.amt||'').replace(/[^0-9.]/g,''))||0),0);
    g('sValue').textContent=total?total.toLocaleString(undefined,{maximumFractionDigits:0}):'0';
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No scholarships tracked yet.</div>'; return; }
    const today=new Date().setHours(0,0,0,0);
    L.innerHTML=R.map((x,i)=>({x,i,du:x.dl?Math.ceil((new Date(x.dl)-today)/86400000):999})).sort((a,b)=>a.du-b.du).map(({x,i,du})=>{
      const cls= x.s>=2?' done':(x.dl&&du<=14&&du>=0?' soon':'');
      const dlbl= x.dl?(du<0?'closed':du===0?'today':du+'d'):'';
      return '<div class="card'+cls+'"><span><b style="color:#5AE57A">'+esc(x.n)+'</b>'+(x.amt?' · '+esc(x.amt):'')+'</span><span style="display:flex;gap:10px;align-items:center">'+(dlbl?'<span class="dd">'+dlbl+'</span>':'')+'<span class="st" onclick="cycle('+i+')">'+STATES[x.s]+' ⟳</span><span class="x" onclick="del('+i+')">✕</span></span></div>';
    }).join('');
  }
  render();
</script>
</body>
</html>
