<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Long Term Travel Budget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 90px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .result { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
  .result .big { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .result .l { font-size: .82rem; opacity: .7; text-align: center; }
  .bd { font-size: .87rem; margin-top: 10px; }
  .bd div { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #4C724C; }
  .bd div:last-child { border-bottom: none; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 7px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: .86rem; gap: 8px; }
  .item .x { cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .84rem; padding: 8px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Long Term Travel Budget</h1>
  <p class="sub">Planning months on the road? Work out the total — and how much to save each month.</p>

  <div class="panel">
    <div class="row">
      <div><label>Trip length (months)</label><input id="months" type="number" min="1" value="6" oninput="render()"></div>
      <div><label>Months to save</label><input id="saveMonths" type="number" min="1" value="12" oninput="render()"></div>
    </div>
  </div>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Monthly cost item</label><input id="label" placeholder="e.g. Accommodation"></div>
      <div><label>Per month</label><input id="amt" type="number" min="0" placeholder="0"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="result" id="result"></div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('lttb')||'[]');
  const save=()=>localStorage.setItem('lttb',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const fmt=n=>n.toLocaleString(undefined,{maximumFractionDigits:0});
  ['months','saveMonths'].forEach(k=>{ const s=localStorage.getItem('lttb_'+k); if(s!==null)g(k).value=s; });
  function add(){ const a=parseFloat(g('amt').value)||0; if(!v('label')||!a){ alert('Enter an item and monthly amount.'); return; }
    R.push({l:v('label'),a}); g('label').value=''; g('amt').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the budget?')){ R=[]; save(); render(); } }
  function render(){
    ['months','saveMonths'].forEach(k=>localStorage.setItem('lttb_'+k,g(k).value));
    const perMonth=R.reduce((s,x)=>s+x.a,0);
    const months=Math.max(1,parseInt(g('months').value)||1);
    const saveM=Math.max(1,parseInt(g('saveMonths').value)||1);
    const total=perMonth*months;
    const buffer=total*0.15;
    const grand=total+buffer;
    g('result').innerHTML='<div class="big">'+fmt(grand)+'</div><div class="l">total to save for the trip (incl. 15% buffer)</div>'+
      '<div class="bd"><div><span>Cost per month on the road</span><span>'+fmt(perMonth)+'</span></div>'+
      '<div><span>× '+months+' months</span><span>'+fmt(total)+'</span></div>'+
      '<div><span>Safety buffer (15%)</span><span>'+fmt(buffer)+'</span></div>'+
      '<div><span>Save each month</span><span style="color:#5AE57A">'+fmt(grand/saveM)+'</span></div></div>';
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No monthly costs added yet.</div>'; return; }
    L.innerHTML=R.map((x,i)=>'<div class="item"><span>'+esc(x.l)+'</span><span><b style="color:#5AE57A">'+fmt(x.a)+'/mo</b> <span class="x" onclick="del('+i+')">✕</span></span></div>').join('');
  }
  render();
</script>
</body>
</html>
