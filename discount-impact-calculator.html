<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discount Impact Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 10px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input[type=range] { padding: 0; accent-color: #5AE57A; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
  .stat { flex: 1; min-width: 110px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 12px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: #5AE57A; }
  .stat .l { font-size: .68rem; opacity: .65; text-transform: uppercase; }
  .res { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 10px; padding: 18px; }
  .note { font-size: .87rem; opacity: .82; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Discount Impact Calculator</h1>
  <p class="sub">A 20% discount doesn't cost 20% — it can cost half your profit. See the real math.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="price">Sale price ($)</label><input id="price" type="number" min="0" value="100" oninput="calc()"></div>
      <div><label for="margin">Profit margin (%)</label><input id="margin" type="number" min="0" max="100" value="40" oninput="calc()"></div>
    </div>
    <label for="disc">Discount: <span id="dv" style="color:#5AE57A">20%</span></label>
    <input id="disc" type="range" min="0" max="80" value="20" oninput="document.getElementById('dv').textContent=this.value+'%';calc()">
  </div>

  <div class="res">
    <div class="stats">
      <div class="stat"><div class="v" id="oldP">$0</div><div class="l">Original profit/unit</div></div>
      <div class="stat"><div class="v" id="newP">$0</div><div class="l">New profit/unit</div></div>
      <div class="stat"><div class="v" id="loss">0%</div><div class="l">Profit lost</div></div>
      <div class="stat"><div class="v" id="vol">—</div><div class="l">Volume needed for same $</div></div>
    </div>
    <div class="note" id="note"></div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), n=id=>parseFloat(g(id).value)||0;
  ['price','margin','disc'].forEach(k=>{ const s=localStorage.getItem('dic_'+k); if(s!==null)g(k).value=s; });
  if(localStorage.getItem('dic_disc'))g('dv').textContent=g('disc').value+'%';
  function calc(){
    ['price','margin','disc'].forEach(k=>localStorage.setItem('dic_'+k,g(k).value));
    const p=n('price'), m=n('margin')/100, d=n('disc')/100;
    const oldP=p*m;
    const newP=p*(1-d) - p*(1-m);
    const lossPct=oldP>0?(oldP-newP)/oldP*100:0;
    const vol=newP>0?(oldP/newP*100):0;
    g('oldP').textContent='$'+oldP.toFixed(2);
    g('newP').textContent=(newP<0?'-$':'$')+Math.abs(newP).toFixed(2);
    g('loss').textContent= oldP>0?Math.round(lossPct)+'%':'—';
    g('vol').textContent= newP>0?Math.round(vol)+'%':'∞';
    g('note').textContent= newP<=0 ? `At this discount you sell at a loss — every unit costs you money.`
      : `A ${Math.round(d*100)}% discount on a ${Math.round(m*100)}% margin means you must sell ${Math.round(vol)}% more units just to break even on profit. Discounting is almost always more expensive than it looks.`;
  }
  calc();
</script>
</body>
</html>
