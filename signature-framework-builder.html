<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signature Framework Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 80px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .hint { font-size: .78rem; opacity: .6; margin-top: 3px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Signature Framework Builder</h1>
  <p class="sub">Turn how you get results into a named, ownable framework.</p>

  <div class="panel">
    <label for="does">What your framework helps clients do</label>
    <input id="does" placeholder="The result it delivers">
    <label for="name">Framework name (optional)</label>
    <input id="name" placeholder="e.g. The Aligned Income Method">
    <label for="steps">The steps — one per line, in order</label>
    <textarea id="steps" placeholder="Step name + a short description on each line"></textarea>
    <div class="hint">Aim for 3-6 steps. The first letters can spell a memorable word.</div>
    <button class="btn" onclick="gen()">Build Framework</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['does','name','steps'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('sfb_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('sfb_'+k,g(k).value)); });
  function gen(){
    const steps=v('steps').split('\n').filter(x=>x.trim());
    if(!steps.length){ alert('Add at least one step.'); return; }
    const acro=steps.map(s=>s.trim()[0].toUpperCase()).join('');
    const t='SIGNATURE FRAMEWORK\n\nNAME: '+(v('name')||'[name your framework]')+
    '\n\nWHAT IT DOES:\n'+(v('does')||'[the result it delivers]')+
    '\n\nTHE STEPS:\n'+steps.map((s,i)=>'  '+(i+1)+'. '+s.trim()).join('\n')+
    '\n\nACRONYM CHECK: your steps spell "'+acro+'"\n'+(/^[A-Z]+$/.test(acro)&&acro.length>=3?'  Tip: if that is close to a real word, reorder or rename a step to make it land.':'')+
    '\n\n--- Why a framework matters ---\nA named framework makes your method memorable, teachable and resellable.\nIt lets clients see the whole journey before they start.\nUse it everywhere: sales pages, content, programmes, your book.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
