<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Views Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 20px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .addrow { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .addrow>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat { flex: 1; min-width: 120px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 13px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #5AE57A; }
  .stat .l { font-size: .7rem; opacity: .65; text-transform: uppercase; }
  .row { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 10px 13px; margin-bottom: 7px; display: flex; justify-content: space-between; gap: 10px; font-size: .87rem; flex-wrap: wrap; }
  .row .keep { color: #5AE57A; }
  .row .x { cursor: pointer; opacity: .5; } .row .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 16px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Story Views Tracker</h1>
  <p class="sub">Track story views and retention so you know which story types your audience actually watches.</p>

  <div class="panel">
    <div class="addrow">
      <div style="flex:2"><label for="nm">Story set</label><input id="nm" placeholder="e.g. Behind the scenes"></div>
      <div><label for="op">First-frame views</label><input id="op" type="number" min="0"></div>
      <div><label for="lf">Last-frame views</label><input id="lf" type="number" min="0"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="sAvg">—</div><div class="l">Avg retention</div></div>
    <div class="stat"><div class="v" id="sBest">—</div><div class="l">Best retention</div></div>
    <div class="stat"><div class="v" id="sN">0</div><div class="l">Sets logged</div></div>
  </div>

  <div id="list"></div>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim(), nu=id=>parseFloat(g(id).value)||0;
  let S=JSON.parse(localStorage.getItem('svt')||'[]');
  const save=()=>localStorage.setItem('svt',JSON.stringify(S));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const ret=s=>s.o>0?s.l/s.o*100:0;
  function add(){ const nm=v('nm'); if(!nm){alert('Name the story set.');return;} S.push({nm,o:nu('op'),l:nu('lf')}); ['nm','op','lf'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ S.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ S=[]; save(); render(); } }
  function render(){
    g('sN').textContent=S.length;
    if(S.length){ const avg=S.reduce((a,s)=>a+ret(s),0)/S.length; const best=[...S].sort((a,b)=>ret(b)-ret(a))[0];
      g('sAvg').textContent=avg.toFixed(0)+'%'; g('sBest').textContent=ret(best).toFixed(0)+'%'; }
    else { g('sAvg').textContent=g('sBest').textContent='—'; }
    const L=g('list');
    if(!S.length){ L.innerHTML='<div class="empty">No story sets logged yet.</div>'; return; }
    const avg=S.length?S.reduce((a,s)=>a+ret(s),0)/S.length:0;
    L.innerHTML=[...S].map((s,i)=>({s,i})).sort((a,b)=>ret(b.s)-ret(a.s)).map(({s,i})=>{
      const r=ret(s);
      return `<div class="row"><span>${esc(s.nm)} ${r>=avg?'<span class="keep">★ keep doing</span>':''}</span><span>${r.toFixed(0)}% retained (${s.o}→${s.l}) <span class="x" onclick="del(${i})">✕</span></span></div>`;
    }).join('');
  }
  render();
</script>
</body>
</html>
