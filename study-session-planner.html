<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Study Session Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .plan { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 12px 15px; margin-top: 14px; }
  .plan h4 { color: #5AE57A; font-size: .92rem; margin-bottom: 4px; }
  .plan .blk { font-size: .89rem; padding: 3px 0; }
  .task { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 8px 12px; margin-bottom: 5px; display: flex; align-items: center; gap: 9px; font-size: .87rem; }
  .box { width: 19px; height: 19px; border: 2px solid #5AE57A; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .7rem; font-weight: 700; }
  .box.on { background: #5AE57A; color: #325132; }
  .task.done .lb { text-decoration: line-through; opacity: .5; }
  .task .x { margin-left: auto; cursor: pointer; opacity: .5; } .task .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 10px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Study Session Planner</h1>
  <p class="sub">Plan a focused study session with built-in breaks — then work through your topic list.</p>

  <div class="panel">
    <div class="row">
      <div><label>Total study time</label><select id="total"><option>30</option><option selected>60</option><option>90</option><option>120</option><option>180</option></select></div>
      <div><label>Focus block (min)</label><select id="block"><option>25</option><option selected>30</option><option>45</option><option>50</option></select></div>
      <div style="flex:0"><button class="btn" onclick="buildPlan()">Plan Session</button></div>
    </div>
    <div id="plan"></div>
  </div>

  <div class="panel">
    <div class="row">
      <div style="flex:3"><label>Topic to study this session</label><input id="topic" placeholder="e.g. Chapter 4 — photosynthesis"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
    <div id="list" style="margin-top:10px"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('ssp')||'[]');
  const save=()=>localStorage.setItem('ssp',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function buildPlan(){
    const total=+g('total').value, block=+g('block').value, brk=block>=45?10:5;
    let used=0, n=1, html='<div class="plan"><h4>Your session timeline</h4>';
    while(used+block<=total){
      html+='<div class="blk">▸ Block '+n+': '+block+' min focused study</div>';
      used+=block; n++;
      if(used+brk<total){ html+='<div class="blk" style="opacity:.65">⏸ Break: '+brk+' min</div>'; used+=brk; }
    }
    if(total-used>=10)html+='<div class="blk">▸ Final review: '+(total-used)+' min</div>';
    html+='<div class="blk" style="color:#5AE57A;margin-top:4px">'+(n-1)+' focus blocks · '+total+' min total</div></div>';
    g('plan').innerHTML=html;
  }
  function add(){ if(!v('topic')){ alert('Enter a topic.'); return; }
    R.push({t:v('topic'),done:false}); g('topic').value=''; save(); render(); }
  function toggle(i){ R[i].done=!R[i].done; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear topic list?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No topics added yet.</div>'; return; }
    L.innerHTML=[...R].map((x,i)=>({x,i})).sort((a,b)=>a.x.done-b.x.done).map(({x,i})=>
      '<div class="task'+(x.done?' done':'')+'"><span class="box'+(x.done?' on':'')+'" onclick="toggle('+i+')">'+(x.done?'✓':'')+'</span><span class="lb">'+esc(x.t)+'</span><span class="x" onclick="del('+i+')">✕</span></div>').join('');
  }
  buildPlan(); render();
</script>
</body>
</html>
