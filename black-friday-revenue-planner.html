<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Black Friday Revenue Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 10px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
  .stat { flex: 1; min-width: 130px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 13px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: #5AE57A; }
  .stat .l { font-size: .69rem; opacity: .65; text-transform: uppercase; }
  .res { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 10px; padding: 18px; }
  .note { font-size: .87rem; opacity: .82; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Black Friday Revenue Planner</h1>
  <p class="sub">Project sale-week revenue and see exactly how many sales it takes to hit your target.</p>

  <div class="panel">
    <label for="target">Sale-week revenue target ($)</label>
    <input id="target" type="number" min="0" value="10000" oninput="calc()">
    <div class="grid">
      <div><label for="aov">Average order value ($)</label><input id="aov" type="number" min="0" value="47" oninput="calc()"></div>
      <div><label for="disc">Discount on offer (%)</label><input id="disc" type="number" min="0" max="80" value="30" oninput="calc()"></div>
    </div>
    <div class="grid">
      <div><label for="list">Audience size</label><input id="list" type="number" min="0" value="3000" oninput="calc()"></div>
      <div><label for="conv">Expected conversion (%)</label><input id="conv" type="number" min="0" step="0.1" value="2" oninput="calc()"></div>
    </div>
  </div>

  <div class="res">
    <div class="stats">
      <div class="stat"><div class="v" id="aov2">$0</div><div class="l">Sale price</div></div>
      <div class="stat"><div class="v" id="sales">0</div><div class="l">Sales needed</div></div>
      <div class="stat"><div class="v" id="proj">$0</div><div class="l">Projected revenue</div></div>
      <div class="stat"><div class="v" id="gap">—</div><div class="l">Gap to target</div></div>
    </div>
    <div class="note" id="note"></div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), n=id=>parseFloat(g(id).value)||0;
  ['target','aov','disc','list','conv'].forEach(k=>{ const s=localStorage.getItem('bfrp_'+k); if(s!==null)g(k).value=s; });
  function calc(){
    ['target','aov','disc','list','conv'].forEach(k=>localStorage.setItem('bfrp_'+k,g(k).value));
    const aov=n('aov')*(1-n('disc')/100);
    g('aov2').textContent='$'+aov.toFixed(2);
    g('sales').textContent= aov>0?Math.ceil(n('target')/aov):0;
    const projSales=n('list')*n('conv')/100, proj=projSales*aov;
    g('proj').textContent='$'+Math.round(proj).toLocaleString();
    const gap=n('target')-proj;
    g('gap').textContent=(gap<=0?'+$':'-$')+Math.abs(Math.round(gap)).toLocaleString();
    g('note').textContent = gap<=0 ? 'On track at these numbers. The risk is execution, not math — write the emails early.'
      : `Short by $${Math.round(gap).toLocaleString()}. Three levers: bigger list, better conversion (urgency/proof), or add an upsell to lift AOV. AOV is usually the easiest dial.`;
  }
  calc();
</script>
</body>
</html>
