<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Long Distance Relationship Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .count { text-align: center; }
  .count .n { font-family: 'Playfair Display', serif; font-size: 3rem; color: #5AE57A; line-height: 1; }
  .count .l { opacity: .75; font-size: .9rem; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.02rem; margin-bottom: 6px; }
  .add { display: flex; gap: 8px; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 7px 12px; margin: 5px 0; display: flex; align-items: center; gap: 8px; font-size: .86rem; }
  .box { width: 18px; height: 18px; border: 2px solid #5AE57A; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .68rem; font-weight: 700; }
  .box.on { background: #5AE57A; color: #325132; }
  .item.done .lb { text-decoration: line-through; opacity: .5; }
  .item .x { margin-left: auto; cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .tip { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 10px 13px; font-size: .85rem; }
  .empty { opacity: .45; font-size: .82rem; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Long Distance Relationship Planner</h1>
  <p class="sub">Distance is hard, but it is manageable with a plan. Count down and stay connected.</p>

  <div class="panel count">
    <label for="next" style="text-align:center">Next time you will be together</label>
    <input id="next" type="date" onchange="render()" style="max-width:220px;margin:0 auto 12px">
    <div class="n" id="days">—</div>
    <div class="l" id="dlabel">Set a date to start the countdown</div>
  </div>

  <div class="panel">
    <h3>Plans &amp; ideas for the time apart</h3>
    <div class="add"><input id="plan" placeholder="e.g. Watch a film together online Friday" onkeydown="if(event.key==='Enter')add()"><button class="btn" onclick="add()">Add</button></div>
    <div id="list" style="margin-top:8px"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>

  <div class="panel">
    <div class="tip" id="tip"></div>
    <button class="btn ghost" onclick="newTip()" style="margin-top:10px">Another tip</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const TIPS=["Schedule calls instead of leaving them to chance — predictability builds security.","Share the small, boring details. Closeness lives in the mundane, not just the milestones.","Have an end goal: a plan for closing the distance one day, even loosely.","Do things 'together apart' — same film, same recipe, same book.","Send unexpected things: a voice note, a photo, a posted letter.","Talk openly about insecurities before they grow. Distance feeds silence.","Keep your own full life going — two whole people make a stronger couple.","Quality over quantity: one real conversation beats hours of distracted texting."];
  let R=JSON.parse(localStorage.getItem('ldrp')||'[]');
  const save=()=>localStorage.setItem('ldrp',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  if(localStorage.getItem('ldrp_next'))g('next').value=localStorage.getItem('ldrp_next');
  function newTip(){ g('tip').textContent='💡 '+TIPS[Math.floor(Math.random()*TIPS.length)]; }
  function add(){ const t=g('plan').value.trim(); if(!t)return;
    R.push({t,done:false}); g('plan').value=''; save(); render(); }
  function toggle(i){ R[i].done=!R[i].done; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all plans?')){ R=[]; save(); render(); } }
  function render(){
    if(g('next').value){
      localStorage.setItem('ldrp_next',g('next').value);
      const d=Math.ceil((new Date(g('next').value)-new Date().setHours(0,0,0,0))/86400000);
      g('days').textContent= d>=0?d:'♥';
      g('dlabel').textContent= d>1?'days until you are together':d===1?'day to go!':d===0?'Today! ♥':'Hope it was wonderful — set the next date';
    }
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No plans added yet.</div>'; }
    else L.innerHTML=[...R].map((x,i)=>({x,i})).sort((a,b)=>a.x.done-b.x.done).map(({x,i})=>
      '<div class="item'+(x.done?' done':'')+'"><span class="box'+(x.done?' on':'')+'" onclick="toggle('+i+')">'+(x.done?'✓':'')+'</span><span class="lb">'+esc(x.t)+'</span><span class="x" onclick="del('+i+')">✕</span></div>').join('');
  }
  newTip(); render();
</script>
</body>
</html>
