<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Family Budget Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat { flex: 1; min-width: 100px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 13px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.4rem; }
  .stat .l { font-size: .67rem; opacity: .65; text-transform: uppercase; }
  .row2 { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 8px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: .86rem; gap: 10px; }
  .row2 .x { cursor: pointer; opacity: .5; } .row2 .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Family Budget Tool</h1>
  <p class="sub">A simple monthly view of money in and money out — see where the family stands.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Label</label><input id="label" placeholder="e.g. Salary / Groceries"></div>
      <div><label>Type</label><select id="type"><option value="in">Income</option><option value="out">Expense</option></select></div>
      <div><label>Amount</label><input id="amt" type="number" min="0" step="0.01" placeholder="0"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="sIn" style="color:#5AE57A">0</div><div class="l">Income</div></div>
    <div class="stat"><div class="v" id="sOut" style="color:#5AE57A">0</div><div class="l">Expenses</div></div>
    <div class="stat"><div class="v" id="sNet" style="color:#5AE57A">0</div><div class="l">Left over</div></div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:10px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('fbt')||'[]');
  const save=()=>localStorage.setItem('fbt',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const fmt=n=>n.toLocaleString(undefined,{maximumFractionDigits:0});
  function add(){ const a=parseFloat(g('amt').value)||0; if(!v('label')||!a){ alert('Enter a label and amount.'); return; }
    R.push({l:v('label'),t:g('type').value,a}); g('label').value=''; g('amt').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the whole budget?')){ R=[]; save(); render(); } }
  function render(){
    const inc=R.filter(x=>x.t==='in').reduce((s,x)=>s+x.a,0);
    const exp=R.filter(x=>x.t==='out').reduce((s,x)=>s+x.a,0);
    g('sIn').textContent=fmt(inc); g('sOut').textContent=fmt(exp);
    const net=inc-exp; g('sNet').textContent=fmt(net);
    g('sNet').style.color= net>=0?'#5AE57A':'#5AE57A';
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No items yet — add income and expenses above.</div>'; return; }
    L.innerHTML=[...R].map((x,i)=>({x,i})).sort((a,b)=>a.x.t<b.x.t?-1:1).map(({x,i})=>
      '<div class="row2"><span>'+(x.t==='in'?'➕':'➖')+' '+esc(x.l)+'</span><span><b style="color:'+(x.t==='in'?'#5AE57A':'#5AE57A')+'">'+fmt(x.a)+'</b> <span class="x" onclick="del('+i+')">✕</span></span></div>').join('');
  }
  render();
</script>
</body>
</html>
