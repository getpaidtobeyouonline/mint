<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mastermind Prep Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Mastermind Prep Tool</h1>
  <p class="sub">Show up to your mastermind ready. Prepared members get — and give — far more value.</p>

  <div class="panel">
    <label for="win">A win since last time (celebrate it briefly)</label>
    <textarea id="win" placeholder="What went well — be specific"></textarea>
    <label for="progress">Progress on what I committed to</label>
    <textarea id="progress" placeholder="What you said you would do — and what happened"></textarea>
    <label for="challenge">My biggest challenge or blocker right now</label>
    <textarea id="challenge" placeholder="The thing you most need the group's help with"></textarea>
    <label for="ask">My specific ask for the group (the hot seat)</label>
    <textarea id="ask" placeholder="A clear question — vague asks get vague help"></textarea>
    <label for="offer">How I can help others today</label>
    <input id="offer" placeholder="Experience, contacts or feedback you can give">
    <label for="commit">What I will commit to before next meeting</label>
    <textarea id="commit" placeholder="One or two concrete commitments"></textarea>
    <button class="btn" onclick="gen()">Build Prep Sheet</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['win','progress','challenge','ask','offer','commit'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('mpt2_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('mpt2_'+k,g(k).value)); });
  function gen(){
    const t=`MASTERMIND PREP SHEET\n\nWIN SINCE LAST TIME:\n${v('win')||'[a recent win]'}\n\nPROGRESS ON MY COMMITMENT:\n${v('progress')||'[what you said vs what happened]'}\n\nBIGGEST CHALLENGE:\n${v('challenge')||'[your main blocker]'}\n\nMY ASK FOR THE GROUP:\n${v('ask')||'[a specific, answerable question]'}\n\nHOW I CAN HELP OTHERS:\n${v('offer')||'[what you bring to the table]'}\n\nMY COMMITMENT BEFORE NEXT TIME:\n${v('commit')||'[1-2 concrete commitments]'}\n\n--- Mastermind etiquette ---\nKeep your update tight so others get airtime.\nAsk for specific help, not general sympathy.\nGive generously — you get back what you put in.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
