<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaking Opportunity Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Speaking Opportunity Finder</h1>
  <p class="sub">Map where your voice belongs — and build a plan to get on stage or mic.</p>

  <div class="panel">
    <label for="topic">Your topic / area of expertise</label>
    <input id="topic" placeholder="What you can speak on with authority">
    <label for="audience">Audiences who would benefit</label>
    <textarea id="audience" placeholder="Who needs to hear this — and where they gather"></textarea>
    <label for="formats">Formats you are open to</label>
    <input id="formats" placeholder="e.g. panels, podcasts, workshops, webinars, meetups">
    <label for="targets">Events, shows or venues to target</label>
    <textarea id="targets" placeholder="Specific podcasts, conferences or local groups"></textarea>
    <label for="pitch">Your one-line pitch</label>
    <textarea id="pitch" placeholder="The talk title and why it matters to that audience"></textarea>
    <label for="proof">Proof you can deliver</label>
    <input id="proof" placeholder="Past talks, content, results, or a clip">
    <button class="btn" onclick="gen()">Build Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['topic','audience','formats','targets','pitch','proof'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('sof_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('sof_'+k,g(k).value)); });
  function gen(){
    const t='SPEAKING OPPORTUNITY PLAN\n\nMY TOPIC:\n'+(v('topic')||'[your area of expertise]')+
    '\n\nAUDIENCES THAT NEED IT:\n'+(v('audience')||'[who benefits and where they are]')+
    '\n\nFORMATS I AM OPEN TO:\n'+(v('formats')||'[panels, podcasts, workshops...]')+
    '\n\nTARGET EVENTS / SHOWS:\n'+(v('targets')||'[specific places to pitch]')+
    '\n\nMY ONE-LINE PITCH:\n"'+(v('pitch')||'[talk title + why it matters]')+'"'+
    '\n\nPROOF I CAN DELIVER:\n'+(v('proof')||'[past talks, content, a clip]')+
    '\n\n--- How to start ---\nBegin small: local meetups, podcasts and webinars say yes faster.\nPitch the audience’s benefit, not your CV. Always have a clip to share.\nEvery talk you give makes the next, bigger one easier to land.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
