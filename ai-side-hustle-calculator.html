<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted AI Side Hustle Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2.1rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .76rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 13px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .96rem; padding: 10px 12px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  input[type=range] { padding: 0; accent-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 22px; margin-bottom: 18px; }
  .grid { display: flex; gap: 12px; flex-wrap: wrap; }
  .grid > div { flex: 1; min-width: 150px; }
  .stats { display: flex; gap: 12px; flex-wrap: wrap; }
  .stat { flex: 1; min-width: 140px; background: #2A442A; border: 1px solid #5A845A; border-radius: 10px; padding: 16px; text-align: center; }
  .stat .n { font-family: 'Playfair Display', serif; font-size: 1.55rem; color: #5AE57A; }
  .stat .l { font-size: .72rem; opacity: .65; text-transform: uppercase; letter-spacing: .04em; }
  .goalbox { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 9px; padding: 15px 17px; margin-top: 16px; }
  .goalbox p { font-size: .94rem; }
  .track { background: #3C603C; border-radius: 5px; height: 10px; overflow: hidden; margin-top: 8px; }
  .track > i { display: block; height: 100%; background: #5AE57A; transition: width .25s; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: .95rem; padding: 12px 22px; border-radius: 8px; margin: 16px 8px 0 0; }
  .btn:hover { opacity: .9; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.7rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted AI Side Hustle Calculator</h1>
  <p class="sub">Run the numbers on your AI side hustle — see real income, hours, and exactly what it takes to hit your goal.</p>

  <div class="panel">
    <label for="model">Hustle model</label>
    <select id="model" onchange="relabel()">
      <option value="service">Freelance AI services</option>
      <option value="product">Digital products</option>
      <option value="sub">Recurring subscription</option>
      <option value="retainer">Monthly retainers</option>
    </select>

    <div class="grid">
      <div><label id="lPrice" for="price">Price per project</label><input id="price" type="number" min="0" value="300"></div>
      <div><label id="lVol" for="vol">Projects / month</label><input id="vol" type="number" min="0" value="6"></div>
    </div>
    <div class="grid">
      <div><label id="lHrs" for="hrs">Hours per project</label><input id="hrs" type="number" min="0" value="5"></div>
      <div><label for="goal">Monthly income goal ($)</label><input id="goal" type="number" min="0" value="3000"></div>
    </div>

    <label for="ai">AI cuts your delivery time by: <span id="aval" style="color:#5AE57A">50%</span></label>
    <input id="ai" type="range" min="0" max="90" value="50">
  </div>

  <div class="stats">
    <div class="stat"><div class="n" id="mRev">$0</div><div class="l">Monthly</div></div>
    <div class="stat"><div class="n" id="yRev">$0</div><div class="l">Yearly</div></div>
    <div class="stat"><div class="n" id="hrsM">0</div><div class="l">Hours / month</div></div>
    <div class="stat"><div class="n" id="rate">$0</div><div class="l">Effective $/hr</div></div>
  </div>

  <div class="goalbox" id="goalbox"></div>

  <button class="btn" onclick="copyProj()">Copy Projection</button>
  <button class="btn ghost" onclick="resetAll()">Reset</button>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F = ['model','price','vol','hrs','goal','ai'];
  F.forEach(id => { const s = localStorage.getItem('ashc_'+id); if (s!==null) document.getElementById(id).value = s; });
  F.forEach(id => document.getElementById(id).addEventListener('input', calc));
  const g = id => document.getElementById(id);
  const n = id => parseFloat(g(id).value) || 0;

  const labels = {
    service:  { p:"Price per project", v:"Projects / month", h:"Hours per project", u:"projects" },
    product:  { p:"Price per sale", v:"Sales / month", h:"Hours of upkeep / month total", u:"sales" },
    sub:      { p:"Monthly price per member", v:"Active members", h:"Support hours / month total", u:"members" },
    retainer: { p:"Monthly retainer", v:"Number of clients", h:"Hours per client / month", u:"clients" }
  };
  function relabel() {
    const m = labels[g('model').value];
    g('lPrice').textContent = m.p; g('lVol').textContent = m.v; g('lHrs').textContent = m.h;
    calc();
  }

  function calc() {
    F.forEach(id => localStorage.setItem('ashc_'+id, g(id).value));
    const model = g('model').value, price = n('price'), vol = n('vol'), goal = n('goal'), ai = n('ai');
    const rev = price * vol;
    // products & subs: the hours field is a flat monthly total, not per-unit
    const perUnit = (model === 'product' || model === 'sub');
    const rawHours = perUnit ? n('hrs') : n('hrs') * vol;
    const effHours = rawHours * (1 - ai/100);
    const rate = effHours > 0 ? rev / effHours : 0;
    g('aval').textContent = ai + '%';
    g('mRev').textContent = '$' + Math.round(rev).toLocaleString();
    g('yRev').textContent = '$' + Math.round(rev*12).toLocaleString();
    g('hrsM').textContent = effHours.toFixed(1);
    g('rate').textContent = effHours > 0 ? '$' + Math.round(rate).toLocaleString() : '∞';

    const pct = goal > 0 ? Math.min(100, rev/goal*100) : 0;
    const need = price > 0 ? Math.ceil(goal/price) : 0;
    const u = labels[model].u;
    let msg;
    if (goal <= 0) msg = "Set a monthly income goal to see your path.";
    else if (rev >= goal) msg = `You're <b>hitting your $${goal.toLocaleString()} goal</b> with room to spare — now optimize hours or raise prices.`;
    else msg = `To hit <b>$${goal.toLocaleString()}/mo</b> you need about <b>${need} ${u}/month</b> at this price (you're at ${vol}). That's <b>${(pct).toFixed(0)}%</b> of the way.`;
    g('goalbox').innerHTML = `<p>${msg}</p><div class="track"><i style="width:${pct}%"></i></div>`;
  }

  function copyProj() {
    const model = g('model').selectedOptions[0].text;
    const t = `AI SIDE HUSTLE PROJECTION\nModel: ${model}\n`+
      `Monthly: ${g('mRev').textContent} | Yearly: ${g('yRev').textContent}\n`+
      `Hours/month: ${g('hrsM').textContent} | Effective rate: ${g('rate').textContent}/hr\n`+
      `Goal: $${n('goal').toLocaleString()}/mo — ${g('goalbox').textContent.trim()}`;
    navigator.clipboard.writeText(t).then(()=>alert('Projection copied!'),()=>alert('Copy failed.'));
  }
  function resetAll() {
    if (!confirm('Reset all inputs?')) return;
    F.forEach(id => localStorage.removeItem('ashc_'+id));
    g('model').value='service'; g('price').value=300; g('vol').value=6; g('hrs').value=5; g('goal').value=3000; g('ai').value=50;
    relabel();
  }

  relabel();
</script>
</body>
</html>
