<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Imposter Syndrome Buster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  textarea { min-height: 50px; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .step { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
  .step h4 { color: #5AE57A; font-size: .76rem; text-transform: uppercase; margin-bottom: 5px; }
  .step p { font-size: .93rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Imposter Syndrome Buster</h1>
  <p class="sub">Imposter syndrome shows up loudest right before growth. Use this 4-step process to keep going anyway.</p>

  <div class="panel">
    <label for="trigger">When did it hit today?</label>
    <input id="trigger" placeholder="e.g. before posting / pitching / launching">
    <label for="thought">What does the voice say?</label>
    <textarea id="thought" placeholder='e.g. "I am not qualified to teach this"'></textarea>
    <label for="evidence">3 pieces of evidence you actually are qualified</label>
    <textarea id="evidence" placeholder="Results, training, hard-won lessons, people you have already helped"></textarea>
    <button class="btn" onclick="gen()">Bust It</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['trigger','thought','evidence'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('isb_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('isb_'+k,g(k).value)); });
  function gen(){
    g('out').innerHTML='<div class="step"><h4>1 · Notice the timing</h4><p>It hit at: <b style="color:#5AE57A">'+esc(v('trigger')||'(when)')+'</b>. That is not a coincidence. Imposter syndrome shows up before visible action, not random moments. It is a signal you are about to grow.</p></div>'+
      '<div class="step"><h4>2 · Hear it without obeying it</h4><p>The voice says: "<i>'+esc(v('thought')||'(the thought)')+'</i>". You can hear it without believing it. That sentence is a thought, not a fact.</p></div>'+
      '<div class="step"><h4>3 · Reality check</h4><p>Evidence on the other side: '+esc(v('evidence')||'(your evidence)')+'. The actual record contradicts the voice.</p></div>'+
      '<div class="step"><h4>4 · Reframe</h4><p>The truth: <b style="color:#5AE57A">"I do not need to be the world expert. I need to be one step ahead of the person I am helping — and I am."</b></p></div>'+
      '<div class="step" style="border-left-color:#BFD8BF"><h4>The move</h4><p>Do the thing anyway. The feeling does not disappear by waiting — it disappears by acting through it. People with no imposter syndrome are not better; they just stopped letting it veto them.</p></div>';
    g('out').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function copyOut(){ const t=g('out').innerText; if(!t){alert('Run it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
