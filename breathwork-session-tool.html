<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breathwork Session Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 520px; margin: 0 auto; text-align: center; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; }
  .sub { opacity: .75; margin: 8px 0 20px; font-size: .95rem; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 22px 20px; margin-bottom: 16px; }
  .presets { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 18px; }
  .pre { background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; border-radius: 20px; padding: 7px 14px; cursor: pointer; font-size: .85rem; font-family:'DM Sans',sans-serif; }
  .pre.on { background: #5AE57A; color: #325132; border-color: #5AE57A; font-weight: 500; }
  .stage { height: 240px; display: flex; align-items: center; justify-content: center; }
  .circle { width: 90px; height: 90px; border-radius: 50%; background: radial-gradient(circle,#5AE57A,#5AE57A); display: flex; align-items: center; justify-content: center; transition: transform 4s ease-in-out; }
  .circle span { font-size: .95rem; color: #325132; font-weight: 500; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 24px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 4px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .rounds { font-size: .9rem; opacity: .8; margin-top: 10px; }
  .rounds b { color: #5AE57A; }
  footer { opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Breathwork Session Tool</h1>
  <p class="sub">Follow the circle — let it expand as you breathe in, settle as you breathe out.</p>

  <div class="panel">
    <div class="presets" id="presets"></div>
    <div class="stage"><div class="circle" id="circle"><span id="label">Ready</span></div></div>
    <div>
      <button class="btn" id="startBtn" onclick="toggle()">Start</button>
      <button class="btn ghost" onclick="reset()">Reset</button>
    </div>
    <div class="rounds">Rounds completed: <b id="rounds">0</b></div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const PATTERNS={
    'Box 4-4-4-4':[['Breathe in',4],['Hold',4],['Breathe out',4],['Hold',4]],
    'Calm 4-7-8':[['Breathe in',4],['Hold',7],['Breathe out',8]],
    'Coherent 5-5':[['Breathe in',5],['Breathe out',5]],
    'Relax 4-4-6':[['Breathe in',4],['Hold',4],['Breathe out',6]]
  };
  let pat='Box 4-4-4-4', phase=0, running=false, t=null, rounds=0;
  function drawPresets(){
    g('presets').innerHTML=Object.keys(PATTERNS).map(p=>'<span class="pre'+(p===pat?' on':'')+'" onclick="setPat(\''+p+'\')">'+p+'</span>').join('');
  }
  function setPat(p){ if(running)return; pat=p; drawPresets(); }
  function toggle(){ running?stop():start(); }
  function start(){ running=true; g('startBtn').textContent='Pause'; phase=0; step(); }
  function stop(){ running=false; g('startBtn').textContent='Start'; clearTimeout(t); }
  function reset(){ stop(); rounds=0; g('rounds').textContent='0'; g('label').textContent='Ready'; g('circle').style.transform='scale(1)'; }
  function step(){
    if(!running)return;
    const steps=PATTERNS[pat], cur=steps[phase], name=cur[0], secs=cur[1];
    g('label').textContent=name+' · '+secs;
    g('circle').style.transitionDuration=secs+'s';
    if(name==='Breathe in') g('circle').style.transform='scale(2.2)';
    else if(name==='Breathe out') g('circle').style.transform='scale(1)';
    let left=secs;
    const cd=setInterval(()=>{ left--; if(left>0&&running)g('label').textContent=name+' · '+left; },1000);
    t=setTimeout(()=>{ clearInterval(cd); phase++; if(phase>=steps.length){ phase=0; rounds++; g('rounds').textContent=rounds; } step(); },secs*1000);
  }
  drawPresets();
</script>
</body>
</html>
