<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Family Dinner Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .day { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .day span { width: 90px; flex: none; font-size: .82rem; color: #5AE57A; font-weight: 500; }
  .day input { flex: 1; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family:'DM Sans',sans-serif; font-size: .9rem; padding: 8px 10px; border-radius: 7px; }
  .day input:focus { outline: none; border-color: #5AE57A; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 10px 18px; border-radius: 8px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .idea { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 10px 13px; font-size: .87rem; font-style: italic; margin-bottom: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Family Dinner Planner</h1>
  <p class="sub">Plan the week's dinners in one go — fewer "what's for tea?" panics.</p>

  <div class="panel">
    <div class="idea" id="idea"></div>
    <button class="btn ghost" onclick="newIdea()">Need an idea?</button>
    <div id="days" style="margin-top:14px"></div>
  </div>

  <div class="panel" style="text-align:center">
    <button class="btn" onclick="copyAll()">Copy Week</button>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
  const IDEAS=["Theme nights help — Meat-free Monday, Taco Tuesday, Pasta Friday","Pick one 'use up the fridge' night each week","Plan an easy night before your busiest day","Repeat a reliable family favourite — variety is overrated midweek","Cook once, eat twice: plan a leftovers night","Let a different family member choose one dinner"];
  let D=JSON.parse(localStorage.getItem('fdp2')||'{}');
  const save=()=>localStorage.setItem('fdp2',JSON.stringify(D));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function newIdea(){ g('idea').textContent='💡 '+IDEAS[Math.floor(Math.random()*IDEAS.length)]; }
  function build(){
    g('days').innerHTML=DAYS.map(d=>'<div class="day"><span>'+d+'</span><input id="d_'+d+'" value="'+esc(D[d]||'')+'" oninput="upd(\''+d+'\',this.value)" placeholder="Dinner..."></div>').join('');
  }
  function upd(d,v){ D[d]=v; save(); }
  function copyAll(){
    navigator.clipboard.writeText('FAMILY DINNERS THIS WEEK\n\n'+DAYS.map(d=>d+': '+(D[d]||'-')).join('\n')).then(()=>alert('Copied!'),()=>alert('Copy failed.'));
  }
  function clearAll(){ if(confirm('Clear the week?')){ D={}; save(); build(); } }
  newIdea(); build();
</script>
</body>
</html>
