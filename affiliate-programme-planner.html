<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affiliate Programme Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#325132;color:#FFFFFF;font-family:'DM Sans',sans-serif;min-height:100vh;padding:2rem 1rem}
.container{max-width:680px;margin:0 auto}
header{text-align:center;margin-bottom:2rem}
h1{font-family:'Playfair Display',serif;font-size:2.1rem;color:#5AE57A;margin-bottom:.5rem}
.subtitle{opacity:.65;font-size:.95rem;max-width:480px;margin:0 auto}
.card{background:#3C603C;border:1px solid #4C724C;border-radius:12px;padding:1.4rem 1.5rem;margin-bottom:1.25rem}
.card h2{font-family:'Playfair Display',serif;color:#5AE57A;font-size:1rem;margin-bottom:.9rem;padding-bottom:.5rem;border-bottom:1px solid #4C724C}
label{display:block;font-size:.82rem;font-weight:500;opacity:.7;margin-bottom:.4rem;margin-top:.85rem}
label:first-of-type{margin-top:0}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-top:.85rem}
.two-col label{margin-top:0}
input[type=text],input[type=number]{width:100%;background:#325132;border:1px solid #4C724C;border-radius:8px;padding:.7rem .9rem;color:#FFFFFF;font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
input[type=text]:focus,input[type=number]:focus{border-color:#5AE57A}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
.opt-row{display:flex;gap:.55rem;flex-wrap:wrap}
.opt{flex:1;min-width:0;background:#325132;border:1px solid #4C724C;border-radius:8px;padding:.55rem .4rem;text-align:center;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;color:#FFFFFF;transition:border-color .2s,color .2s,background .2s}
.opt.sel{border-color:#5AE57A;color:#5AE57A;background:#325132}
.btn{width:100%;background:#5AE57A;color:#325132;border:none;border-radius:8px;padding:.9rem;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.02em;transition:opacity .2s;margin-top:.9rem}
.btn:hover{opacity:.88}
.results{display:none}
.results.show{display:block}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;margin-bottom:.75rem}
.stat{background:#3C603C;border:1px solid #4C724C;border-radius:8px;padding:.65rem .5rem;text-align:center}
.stat-val{font-family:'Playfair Display',serif;font-size:1.2rem;color:#5AE57A;display:block}
.stat-lbl{font-size:.63rem;opacity:.45;display:block;margin-top:.15rem;text-transform:uppercase;letter-spacing:.06em}
.sum-card{background:#325132;border:1px solid #C9A84C44;border-radius:12px;padding:1.3rem 1.5rem;margin-bottom:1rem}
.sum-lbl{font-size:.72rem;opacity:.45;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
.sum-big{font-family:'Playfair Display',serif;font-size:2.5rem;color:#5AE57A;line-height:1;margin-bottom:.65rem}
.sum-line{font-size:.83rem;opacity:.68;line-height:1.5;padding:.5rem .7rem;background:#325132;border-radius:6px;margin-bottom:.4rem}
.sum-note{font-size:.75rem;opacity:.4;font-style:italic}
.section-card{background:#3C603C;border:1px solid #4C724C;border-radius:10px;padding:1.1rem 1.25rem;margin-bottom:.85rem}
.section-card h3{font-family:'Playfair Display',serif;font-size:.95rem;color:#5AE57A;margin-bottom:.75rem}
.v-item{margin-bottom:.6rem;padding-bottom:.6rem;border-bottom:1px solid #3C603C}
.v-item:last-of-type{border-bottom:none;margin-bottom:0;padding-bottom:0}
.v-key{font-size:.7rem;opacity:.35;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:.2rem}
.v-text{font-size:.83rem;opacity:.72;line-height:1.45}
.rule-list{list-style:none;margin-top:.6rem}
.rule-list li{font-size:.82rem;opacity:.7;padding:.3rem 0 .3rem 1.2rem;position:relative;line-height:1.45;border-bottom:1px solid #3C603C}
.rule-list li:last-child{border-bottom:none}
.rule-list li::before{content:'→';position:absolute;left:0;color:#5AE57A;font-size:.8rem;top:.3rem}
.pitch-box{background:#325132;border:1px solid #4C724C;border-radius:8px;padding:.9rem 1rem;font-size:.82rem;line-height:1.7;white-space:pre-wrap;opacity:.8;margin-bottom:.6rem}
.blank{color:#5AE57A;font-weight:600}
.step-list{list-style:none;counter-reset:sc;margin-top:.1rem}
.step-list li{font-size:.83rem;opacity:.72;padding:.35rem 0 .35rem 1.65rem;position:relative;line-height:1.5;border-bottom:1px solid #3C603C;counter-increment:sc}
.step-list li:last-child{border-bottom:none}
.step-list li::before{content:counter(sc);position:absolute;left:0;width:1.15rem;height:1.15rem;background:#5AE57A;color:#325132;border-radius:50%;font-size:.62rem;font-weight:700;line-height:1.15rem;text-align:center;top:.38rem}
.copy-btn{width:100%;background:transparent;border:1px solid #5AE57A;color:#5AE57A;border-radius:8px;padding:.75rem;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:.25rem}
.copy-btn:hover{opacity:.7}
footer{text-align:center;font-size:.75rem;opacity:.4;margin-top:2rem;padding-bottom:1rem}
@media(max-width:480px){h1{font-size:1.75rem}.stats{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Affiliate Programme Planner</h1>
    <p class="subtitle">Design your commission structure, project affiliate revenue, and get a ready-to-send recruitment pitch and onboarding checklist.</p>
  </header>

  <div class="card">
    <h2>Your Programme</h2>
    <label>Product Type</label>
    <div class="opt-row">
      <button class="opt sel" onclick="pickPT(0)" id="pt0">Course</button>
      <button class="opt"     onclick="pickPT(1)" id="pt1">Ebook</button>
      <button class="opt"     onclick="pickPT(2)" id="pt2">Template Kit</button>
      <button class="opt"     onclick="pickPT(3)" id="pt3">Membership</button>
      <button class="opt"     onclick="pickPT(4)" id="pt4">Coaching</button>
    </div>
    <label>Product Name</label>
    <input type="text" id="inT" placeholder="e.g. Email Marketing Bootcamp, The Freelancer Kit">
    <div class="two-col">
      <div><label>Product Price ($)</label><input type="number" id="inP" placeholder="97" min="1"></div>
      <div><label>Affiliate Target</label>
        <div class="opt-row" style="margin-top:.4rem">
          <button class="opt"     onclick="pickAF(0)" id="af0">5</button>
          <button class="opt sel" onclick="pickAF(1)" id="af1">10</button>
          <button class="opt"     onclick="pickAF(2)" id="af2">20</button>
          <button class="opt"     onclick="pickAF(3)" id="af3">50</button>
        </div>
      </div>
    </div>
    <label>Commission Rate</label>
    <div class="opt-row">
      <button class="opt"     onclick="pickCR(0)" id="cr0">20%</button>
      <button class="opt sel" onclick="pickCR(1)" id="cr1">30%</button>
      <button class="opt"     onclick="pickCR(2)" id="cr2">40%</button>
      <button class="opt"     onclick="pickCR(3)" id="cr3">50%</button>
    </div>
    <label>Cookie Duration</label>
    <div class="opt-row">
      <button class="opt"     onclick="pickCK(0)" id="ck0">30 Days</button>
      <button class="opt sel" onclick="pickCK(1)" id="ck1">60 Days</button>
      <button class="opt"     onclick="pickCK(2)" id="ck2">90 Days</button>
      <button class="opt"     onclick="pickCK(3)" id="ck3">Lifetime</button>
    </div>
    <button class="btn" onclick="generate()">Build My Affiliate Programme →</button>
  </div>

  <div class="results" id="results">
    <div class="stats" id="statsBar"></div>
    <div id="sumCard"></div>
    <div class="section-card" id="structureCard"></div>
    <div class="section-card" id="recruitCard"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyResults()">Copy Affiliate Programme as Text</button>
  </div>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>
<script>
const st    = (v,l) => `<div class="stat"><span class="stat-val">${v}</span><span class="stat-lbl">${l}</span></div>`;
const fmt$  = n => n>=10000?'$'+(n/1000).toFixed(0)+'k':n>=1000?'$'+(n/1000).toFixed(1)+'k':'$'+(n===Math.floor(n)?n:n.toFixed(2));
const ptLabel  = ['Course','Ebook','Template Kit','Membership','Coaching'];
const crOpts   = [20,30,40,50];
const ckLabels = ['30-day','60-day','90-day','lifetime'];
const afCounts = [5,10,20,50];
const AVG_SALES = 3;

const crVerdict = [
  '20% is below market for most digital product programmes — you may struggle to attract active promoters. This rate works best for high-ticket items above $200.',
  '30% is the most common commission rate in digital product niches — competitive, sustainable, and what most creators already expect when they join.',
  '40% is above market and will stand out in most niches — a strong choice for building a loyal affiliate base or relaunching an existing programme.',
  '50% is a premium offer that signals confidence and attracts top promoters. Make sure your volume justifies the margin before committing to this rate.',
];
const ckVerdict = [
  '30-day cookies are the standard minimum — fine for impulse buys but will miss buyers on longer decision cycles, which is common for courses and coaching.',
  '60-day cookies are above average and cover the majority of buyer journeys — a meaningful advantage over the many programmes still offering 30 days.',
  '90-day cookies show real commitment to your affiliates and suit higher-ticket products where buyers take time to research before purchasing.',
  'Lifetime cookies are rare and powerful — a top recruiting tool that active affiliates will mention to peers and competitors will rarely match.',
];
const ptRule = [
  'Affiliates may not offer competing bonuses that replicate or undermine the course curriculum.',
  'Affiliates may not share, redistribute, or excerpt ebook content as free material.',
  'Affiliates may not re-sell or repackage templates as their own products.',
  'Affiliates earn commission on the initial sale only — recurring charges are excluded unless separately agreed in writing.',
  'Affiliates may not make specific income, results, or earnings claims on your behalf.',
];
const onboarding = [
  'Send a personalised welcome email within 24 hours — include their unique affiliate link and a one-page programme summary.',
  'Share a swipe file immediately: 3 email templates, 5 social captions, 3 subject line options, and your single best testimonial.',
  'Give them your highest-converting sales page URL and your top social proof asset — remove every friction point between them and their first sale.',
  'Set a 7-day check-in to answer questions, share any early performance data, and provide additional assets on request.',
  'Create a private update channel (email thread, Slack, or DM group) — active affiliates stay active when they hear from you regularly.',
];

let state = {pt:0, cr:1, ck:1, af:1};
function pickPT(i) { state.pt=i; [0,1,2,3,4].forEach(x=>document.getElementById(`pt${x}`).classList.toggle('sel',x===i)); }
function pickCR(i) { state.cr=i; [0,1,2,3].forEach(x=>document.getElementById(`cr${x}`).classList.toggle('sel',x===i)); }
function pickCK(i) { state.ck=i; [0,1,2,3].forEach(x=>document.getElementById(`ck${x}`).classList.toggle('sel',x===i)); }
function pickAF(i) { state.af=i; [0,1,2,3].forEach(x=>document.getElementById(`af${x}`).classList.toggle('sel',x===i)); }

function generate() {
  const T    = document.getElementById('inT').value.trim();
  const price = parseFloat(document.getElementById('inP').value);
  if (!T || !price || price<=0) { alert('Please enter your product name and price.'); return; }

  const cr        = crOpts[state.cr];
  const affCount  = afCounts[state.af];
  const commAmt   = parseFloat((price*cr/100).toFixed(2));
  const netSale   = parseFloat((price-commAmt).toFixed(2));
  const keepRate  = 100-cr;
  const projNet   = parseFloat((affCount*AVG_SALES*netSale).toFixed(2));
  const projPay   = parseFloat((affCount*AVG_SALES*commAmt).toFixed(2));
  const ckLbl     = ckLabels[state.ck];
  const ptLbl     = ptLabel[state.pt];

  document.getElementById('statsBar').innerHTML =
    st(fmt$(commAmt),'Commission / Sale') + st(fmt$(netSale),'Your Net / Sale') + st(fmt$(projNet)+'/mo','Proj. Net Revenue') + st(keepRate+'%','Keep Rate');

  document.getElementById('sumCard').innerHTML = `
    <div class="sum-card">
      <div class="sum-lbl">Your Net Per Affiliate Sale</div>
      <div class="sum-big">${fmt$(netSale)}</div>
      <div class="sum-line">With ${affCount} active affiliates averaging ${AVG_SALES} sales/month each, you'd net <strong>${fmt$(projNet)}/month</strong> and pay out ${fmt$(projPay)} in commissions — a ${keepRate}% margin on all affiliate revenue.</div>
      <div class="sum-note">Projection assumes ${AVG_SALES} sales/affiliate/month — the typical rate for active digital product affiliates.</div>
    </div>`;

  document.getElementById('structureCard').innerHTML = `
    <h3>Programme Structure</h3>
    <div class="v-item"><span class="v-key">Commission Rate — ${cr}%</span><div class="v-text">${crVerdict[state.cr]}</div></div>
    <div class="v-item"><span class="v-key">Cookie Duration — ${ckLabels[state.ck]}</span><div class="v-text">${ckVerdict[state.ck]}</div></div>
    <div class="v-item" style="border-bottom:none;padding-bottom:0;margin-bottom:0"><span class="v-key">Programme Rules to Include</span>
      <ul class="rule-list">
        <li>Commission is paid 30 days after sale to allow for the refund window — never pay out on a transaction that may be reversed.</li>
        <li>All affiliates must clearly disclose their relationship per FTC/ASA guidelines — non-disclosure puts your brand at legal risk.</li>
        <li>No bidding on your product or brand name in paid search — protect your own direct traffic from being cannibalised by affiliates.</li>
        <li>${ptRule[state.pt]}</li>
      </ul>
    </div>`;

  const pitch = `Hey [Name],

I run ${T} — a ${ptLbl.toLowerCase()} for <span class="blank">___</span> who want to <span class="blank">___</span>. I'm opening my affiliate programme and immediately thought of you.

Here's the deal: ${cr}% commission per sale, ${ckLbl} cookie, and I'll send you a ready-made swipe file so promotion takes minutes, not hours.

If your audience could benefit from what ${T} delivers, I'd love to have you on board.

[Your programme link]`;

  document.getElementById('recruitCard').innerHTML = `
    <h3>Affiliate Recruitment</h3>
    <span style="font-size:.7rem;opacity:.35;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:.4rem">Outreach Pitch Template</span>
    <div class="pitch-box">${pitch}</div>
    <span style="font-size:.7rem;opacity:.35;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:.4rem">New Affiliate Onboarding Checklist</span>
    <ul class="step-list">${onboarding.map(s=>`<li>${s}</li>`).join('')}</ul>`;

  const r = document.getElementById('results');
  r.classList.add('show');
  r.scrollIntoView({behavior:'smooth',block:'start'});
}

function copyResults() {
  const T    = document.getElementById('inT').value.trim();
  const price = parseFloat(document.getElementById('inP').value);
  if (!T||!price) return;
  const cr=crOpts[state.cr], affCount=afCounts[state.af];
  const commAmt=parseFloat((price*cr/100).toFixed(2)), netSale=parseFloat((price-commAmt).toFixed(2));
  const projNet=parseFloat((affCount*AVG_SALES*netSale).toFixed(2)), projPay=parseFloat((affCount*AVG_SALES*commAmt).toFixed(2));
  let text=`AFFILIATE PROGRAMME PLANNER\nProduct: ${T} (${ptLabel[state.pt]}) · Price: ${fmt$(price)}\n\n`;
  text+=`PROGRAMME NUMBERS\n${'─'.repeat(36)}\nCommission Rate: ${cr}% (${fmt$(commAmt)}/sale)\nYour Net Per Sale: ${fmt$(netSale)}\nCookie Duration: ${ckLabels[state.ck]}\nAffiliate Target: ${affCount} affiliates\nProjected Net Revenue: ${fmt$(projNet)}/month\nProjected Payouts: ${fmt$(projPay)}/month\nKeep Rate: ${100-cr}%\n\n`;
  text+=`PROGRAMME STRUCTURE\n${'─'.repeat(36)}\nCommission (${cr}%): ${crVerdict[state.cr]}\nCookies (${ckLabels[state.ck]}): ${ckVerdict[state.ck]}\n\nRules to include:\n→ Commission paid 30 days post-sale (refund window protection)\n→ Affiliates must disclose relationship per FTC/ASA guidelines\n→ No brand-name bidding in paid search\n→ ${ptRule[state.pt]}\n\n`;
  text+=`RECRUITMENT PITCH\n${'─'.repeat(36)}\nHey [Name],\n\nI run ${T} — a ${ptLabel[state.pt].toLowerCase()} for ___ who want to ___. I'm opening my affiliate programme and immediately thought of you.\n\nHere's the deal: ${cr}% commission per sale, ${ckLabels[state.ck]} cookie, and I'll send you a ready-made swipe file so promotion takes minutes.\n\nIf your audience could benefit from what ${T} delivers, I'd love to have you on board.\n\n[Your programme link]\n\n`;
  text+=`ONBOARDING CHECKLIST\n${'─'.repeat(36)}\n`;
  onboarding.forEach((s,i)=>{ text+=`${i+1}. ${s}\n`; });
  text+=`\n---\nCreated with Affiliate Programme Planner by GetPaidToBeYouOnline`;
  const btn=document.getElementById('copyBtn');
  const done=()=>{btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy Affiliate Programme as Text',2200);};
  navigator.clipboard?navigator.clipboard.writeText(text).then(done)
    :(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done();})();
}
</script>
</body>
</html>
