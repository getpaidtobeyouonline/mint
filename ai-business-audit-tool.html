<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted AI Business Audit Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 740px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 24px; font-size: .95rem; }
  .dim { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .dim h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.1rem; margin-bottom: 6px; }
  .item { display: flex; gap: 12px; align-items: center; justify-content: space-between; padding: 7px 0; flex-wrap: wrap; }
  .item span { flex: 1; min-width: 210px; font-size: .93rem; }
  select { background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .88rem; padding: 7px 9px; border-radius: 7px; }
  select:focus { outline: none; border-color: #5AE57A; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: .95rem; padding: 13px 26px; border-radius: 8px; margin: 6px 8px 0 0; }
  .btn:hover { opacity: .9; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .score { text-align: center; background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 24px; margin: 22px 0; }
  .score .big { font-family: 'Playfair Display', serif; font-size: 3rem; color: #5AE57A; line-height: 1; }
  .score .lvl { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: #5AE57A; margin-top: 6px; }
  .score .desc { opacity: .8; margin-top: 6px; font-size: .95rem; }
  .barrow { margin: 10px 0; }
  .barrow .t { display: flex; justify-content: space-between; font-size: .88rem; margin-bottom: 4px; }
  .track { background: #3C603C; border-radius: 5px; height: 9px; overflow: hidden; }
  .track > i { display: block; height: 100%; background: #5AE57A; }
  .fix { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
  .fix h4 { font-size: .8rem; color: #5AE57A; margin-bottom: 4px; }
  .fix .pr { font-size: .72rem; opacity: .6; text-transform: uppercase; letter-spacing: .05em; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted AI Business Audit Tool</h1>
  <p class="sub">Score your AI business across six make-or-break areas and get a prioritized list of what to fix first.</p>

  <div id="form"></div>
  <button class="btn" onclick="run()">Run Audit</button>
  <button class="btn ghost" onclick="reset()">Reset</button>

  <div id="result"></div>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const dims = [
    { name:"Offer Clarity", k:"offer",
      items:["It's obvious who this is for and the exact problem it solves","Buyers grasp the value in one sentence without explanation","There's a clear reason to choose you over the alternative"],
      fix:"Rewrite your offer as: 'I help [who] [achieve outcome] without [pain].' Test it on 5 strangers — if they don't get it instantly, it's not clear yet." },
    { name:"Audience & Demand", k:"aud",
      items:["You can reliably reach the people who'd buy this","Real people have paid or clearly want to pay for it","You know their language, objections, and triggers"],
      fix:"Have 5 real buyer conversations this week. Validate demand with money or a waitlist before building more." },
    { name:"AI Leverage", k:"ai",
      items:["AI meaningfully cuts your delivery time or cost","AI improves quality or consistency, not just speed","Your AI workflow is a real moat, not easily copied"],
      fix:"Map your delivery steps and move the most repetitive one to a documented AI workflow. Aim to cut delivery time by half." },
    { name:"Systems & Delivery", k:"sys",
      items:["Delivery is repeatable and documented, not all in your head","You could hand a task off without redoing it yourself","Quality stays consistent across every delivery"],
      fix:"Document your single most-repeated process as a step-by-step SOP this week. Systemize before you scale." },
    { name:"Pricing & Revenue", k:"rev",
      items:["You price on value delivered, not hours or guesswork","Income is predictable, not feast-or-famine","No single client is more than ~30% of revenue"],
      fix:"Reprice your core offer to the outcome it delivers and add one recurring or productized revenue line for stability." },
    { name:"Distribution & Growth", k:"dist",
      items:["At least one channel reliably brings new buyers","Growth doesn't depend only on your manual outreach","You can describe your funnel from stranger to buyer"],
      fix:"Pick ONE channel and commit to a 30-day consistent output plan. One working channel beats five neglected ones." }
  ];
  const levels = [
    [0,40,"Idea Stage","Fundamentals are missing. Fix clarity and demand before anything else."],
    [40,60,"Fragile","It works but rests on weak spots. One shock could break it."],
    [60,80,"Operating","A real business. Tighten the gaps and it starts to compound."],
    [80,101,"Scalable","Strong across the board. Now pour fuel on distribution and systems."]
  ];

  const saved = JSON.parse(localStorage.getItem('aba') || '{}');
  document.getElementById('form').innerHTML = dims.map(d => `
    <div class="dim"><h3>${d.name}</h3>${d.items.map((it,j)=>`
      <div class="item"><span>${it}</span>
        <select id="${d.k}_${j}">
          <option value="1">Not yet</option><option value="2">Partly</option>
          <option value="3">Mostly</option><option value="4">Fully</option>
        </select></div>`).join('')}</div>`).join('');
  dims.forEach(d => d.items.forEach((_,j) => {
    const el = document.getElementById(`${d.k}_${j}`);
    if (saved[`${d.k}_${j}`]) el.value = saved[`${d.k}_${j}`];
    el.addEventListener('change', persist);
  }));
  function persist() {
    const s = {};
    dims.forEach(d => d.items.forEach((_,j)=> s[`${d.k}_${j}`] = document.getElementById(`${d.k}_${j}`).value));
    localStorage.setItem('aba', JSON.stringify(s));
  }

  function run() {
    persist();
    const per = dims.map(d => {
      let sum = 0; d.items.forEach((_,j)=> sum += +document.getElementById(`${d.k}_${j}`).value);
      return { name:d.name, pct:Math.round(sum/(d.items.length*4)*100), fix:d.fix };
    });
    const overall = Math.round(per.reduce((s,p)=>s+p.pct,0)/per.length);
    const lv = levels.find(l => overall>=l[0] && overall<l[1]);
    const weak = [...per].filter(p=>p.pct<75).sort((a,b)=>a.pct-b.pct);
    const labels = ['Do this first','Then this','After that'];
    window._rep = { overall, lv, per, weak };
    document.getElementById('result').innerHTML =
      `<div class="score"><div class="big">${overall}%</div><div class="lvl">${lv[2]}</div><div class="desc">${lv[3]}</div></div>
       <div class="dim"><h3>Health by area</h3>${per.map(p=>`
         <div class="barrow"><div class="t"><span>${p.name}</span><span>${p.pct}%</span></div>
         <div class="track"><i style="width:${p.pct}%"></i></div></div>`).join('')}</div>
       <h3 style="font-family:'Playfair Display',serif;color:#5AE57A;margin:20px 0 10px">Fix-first priorities</h3>
       ${weak.length ? weak.slice(0,3).map((w,i)=>`<div class="fix"><div class="pr">${labels[i]||'Next'} · ${w.name} (${w.pct}%)</div><h4>${w.name}</h4><p>${w.fix}</p></div>`).join('')
         : '<div class="fix"><p>No major weak spots — every area is at 75%+. Focus on scaling your strongest channel.</p></div>'}
       <button class="btn" onclick="copyR()">Copy Report</button>`;
    document.getElementById('result').scrollIntoView({ behavior:'smooth' });
  }

  function copyR() {
    const r = window._rep;
    let t = `AI BUSINESS AUDIT — ${r.overall}% (${r.lv[2]})\n${r.lv[3]}\n\nHEALTH BY AREA\n` +
      r.per.map(p=>`${p.name}: ${p.pct}%`).join('\n') + `\n\nFIX FIRST\n` +
      (r.weak.length ? r.weak.slice(0,3).map((w,i)=>`${i+1}. ${w.name} (${w.pct}%): ${w.fix}`).join('\n') : 'No major gaps — scale your strengths.');
    navigator.clipboard.writeText(t).then(()=>alert('Report copied!'),()=>alert('Copy failed.'));
  }

  function reset() {
    if (!confirm('Reset all answers?')) return;
    localStorage.removeItem('aba');
    dims.forEach(d => d.items.forEach((_,j)=> document.getElementById(`${d.k}_${j}`).value='1'));
    document.getElementById('result').innerHTML = '';
  }
</script>
</body>
</html>
