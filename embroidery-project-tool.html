<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Embroidery Project Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Embroidery Project Tool</h1>
  <p class="sub">Plan a hoop with intention — design, thread list, stitches and finish.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="size">Hoop size</label><input id="size" placeholder="e.g. 6 inch"></div>
      <div><label for="fabric">Fabric</label><input id="fabric" placeholder="e.g. linen, calico"></div>
    </div>
    <label for="design">Design</label>
    <textarea id="design" placeholder="What you are stitching — sketch idea or description"></textarea>
    <label for="threads">Thread / floss colours</label>
    <textarea id="threads" placeholder="Brand and shade numbers if you have them"></textarea>
    <label for="stitches">Stitches you will use</label>
    <input id="stitches" placeholder="e.g. backstitch, satin, French knots, stem">
    <label for="finish">How you will finish it</label>
    <input id="finish" placeholder="Frame, mount, sew into a cushion, hang">
    <button class="btn" onclick="gen()">Build Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['size','fabric','design','threads','stitches','finish'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('ept2_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('ept2_'+k,g(k).value)); });
  function gen(){
    const t='EMBROIDERY PROJECT PLAN\n\nHOOP: '+(v('size')||'[size]')+'\nFABRIC: '+(v('fabric')||'[fabric]')+
    '\n\nDESIGN:\n'+(v('design')||'[your design idea]')+
    '\n\nTHREADS:\n'+(v('threads')||'[your colours]')+
    '\n\nSTITCHES:\n'+(v('stitches')||'[the stitches you will use]')+
    '\n\nFINISHING:\n'+(v('finish')||'[how you finish and display it]')+
    '\n\n--- Embroidery tips ---\nDraw the design lightly onto fabric, or use a transfer pen.\nStart with the largest filled areas, then outlines, then details.\nKeep your tension gentle — your fabric should still feel like fabric.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
