<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Community Board Organiser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 44px; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 120px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 10px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .fp { background: #2A442A; border: 1px solid #5A845A; border-radius: 16px; padding: 5px 12px; font-size: .8rem; cursor: pointer; }
  .fp.on { background: #5AE57A; color: #325132; border-color: #5AE57A; font-weight: 500; }
  .post { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; margin-bottom: 6px; }
  .post .top { display: flex; justify-content: space-between; gap: 10px; }
  .post .cat { color: #5AE57A; font-size: .78rem; font-weight: 500; }
  .post .x { cursor: pointer; opacity: .5; flex: none; } .post .x:hover { opacity: 1; color: #5AE57A; }
  .post .t { font-weight: 500; margin-top: 2px; }
  .post .d { font-size: .85rem; opacity: .8; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Community Board Organiser</h1>
  <p class="sub">Run a tidy community noticeboard — events, notices, offers and requests in one place.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Title</label><input id="title" placeholder="e.g. Summer street party"></div>
      <div><label>Category</label><select id="cat"><option>Event</option><option>Notice</option><option>Offer / free</option><option>Request / help</option><option>Lost &amp; found</option><option>Recommendation</option></select></div>
    </div>
    <label>Details</label>
    <textarea id="details" placeholder="When, where, contact — the key info"></textarea>
    <button class="btn" onclick="add()">+ Post to Board</button>
  </div>

  <div class="panel">
    <div class="filter" id="filter"></div>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('cbo')||'[]'), filter='all';
  const save=()=>localStorage.setItem('cbo',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('title')){ alert('Enter a title.'); return; }
    R.push({t:v('title'),c:g('cat').value,d:v('details'),date:new Date().toLocaleDateString(undefined,{month:'short',day:'numeric'})});
    g('title').value=''; g('details').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the board?')){ R=[]; save(); render(); } }
  function setF(f){ filter=f; render(); }
  function render(){
    const cats=['all',...new Set(R.map(x=>x.c))];
    g('filter').innerHTML=cats.map(f=>'<span class="fp'+(filter===f?' on':'')+'" onclick="setF(\''+f.replace(/'/g,"\\'")+'\')">'+(f==='all'?'All':esc(f))+'</span>').join('');
    const L=g('list');
    const shown=R.map((x,i)=>({x,i})).filter(o=>filter==='all'||o.x.c===filter);
    if(!shown.length){ L.innerHTML='<div class="empty">Nothing on the board yet.</div>'; return; }
    L.innerHTML=[...shown].reverse().map(({x,i})=>
      '<div class="post"><div class="top"><span class="cat">'+esc(x.c)+' · '+x.date+'</span><span class="x" onclick="del('+i+')">✕</span></div><div class="t">'+esc(x.t)+'</div>'+(x.d?'<div class="d">'+esc(x.d)+'</div>':'')+'</div>').join('');
  }
  render();
</script>
</body>
</html>
