<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appreciation Practice Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .prompt { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 11px 14px; font-size: .9rem; font-style: italic; margin-bottom: 4px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 10px 16px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin-top: 12px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .stat { text-align: center; font-size: .85rem; opacity: .8; margin-bottom: 12px; }
  .stat b { color: #5AE57A; font-family: 'Playfair Display', serif; font-size: 1.2rem; }
  .entry { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 11px 14px; margin-bottom: 8px; }
  .entry .d { color: #5AE57A; font-size: .8rem; }
  .entry .x { float: right; cursor: pointer; opacity: .5; } .entry .x:hover { opacity: 1; color: #5AE57A; }
  .entry p { font-size: .9rem; margin-top: 2px; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Appreciation Practice Tool</h1>
  <p class="sub">Noticed appreciation grows relationships. Spoken appreciation transforms them.</p>

  <div class="panel">
    <div class="prompt" id="prompt"></div>
    <label for="who">Who is this about?</label>
    <input id="who" placeholder="Partner, child, parent, friend...">
    <label for="what">What you appreciate about them</label>
    <textarea id="what" placeholder="Be specific — a moment, a quality, an action"></textarea>
    <button class="btn" onclick="add()">Save Appreciation</button>
    <button class="btn ghost" onclick="newPrompt()">New Prompt</button>
  </div>

  <div class="panel">
    <div class="stat">You have noted <b id="count">0</b> appreciations</div>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const PROMPTS=["Who made your day a little easier recently — and how?","What does someone close to you do that you have never thanked them for?","Think of a quality in a loved one you would miss if it were gone.","Who showed up for you this week, in a big or small way?","What is something a family member does that you take for granted?"];
  let R=JSON.parse(localStorage.getItem('apt')||'[]');
  const save=()=>localStorage.setItem('apt',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function newPrompt(){ g('prompt').textContent=PROMPTS[Math.floor(Math.random()*PROMPTS.length)]; }
  function add(){
    if(!v('what')){ alert('Write what you appreciate.'); return; }
    R.push({d:new Date().toLocaleDateString(undefined,{month:'short',day:'numeric'}),who:v('who'),what:v('what')});
    g('who').value=''; g('what').value=''; save(); render(); newPrompt();
  }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all appreciations?')){ R=[]; save(); render(); } }
  function render(){
    g('count').textContent=R.length;
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">None yet — and remember: say at least one out loud today.</div>'; return; }
    L.innerHTML=[...R].reverse().map(x=>{ const i=R.indexOf(x);
      return '<div class="entry"><span class="x" onclick="del('+i+')">✕</span><div class="d">'+x.d+(x.who?' · '+esc(x.who):'')+'</div><p>'+esc(x.what)+'</p></div>';
    }).join('');
  }
  newPrompt(); render();
</script>
</body>
</html>
