<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Meal Planning Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 780px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 20px; font-size: .95rem; }
  .day { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
  .day h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.05rem; margin-bottom: 8px; }
  .meal { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .meal .lbl { width: 80px; flex: none; font-size: .78rem; opacity: .7; text-transform: uppercase; }
  .meal input { flex: 1; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .9rem; padding: 7px 10px; border-radius: 7px; }
  .meal input:focus { outline: none; border-color: #5AE57A; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 6px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Meal Planning Tool</h1>
  <p class="sub">Plan the week's meals up front. Decided meals beat 6pm "what's for dinner" panic.</p>

  <div id="grid"></div>
  <button class="btn" onclick="exportTxt()">Export Plan + Shopping Note</button>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const MEALS=['Breakfast','Lunch','Dinner','Snack'];
  const g=id=>document.getElementById(id);
  let data=JSON.parse(localStorage.getItem('mpt')||'{}');
  g('grid').innerHTML=DAYS.map((d,di)=>`<div class="day"><h3>${d}</h3>`+
    MEALS.map((m,mi)=>`<div class="meal"><span class="lbl">${m}</span><input id="c${di}_${mi}" placeholder="—" value="${(data[di+'_'+mi]||'').replace(/"/g,'&quot;')}"></div>`).join('')+`</div>`).join('');
  DAYS.forEach((_,di)=>MEALS.forEach((_,mi)=>{ const el=g('c'+di+'_'+mi); el.addEventListener('input',()=>{ data[di+'_'+mi]=el.value; localStorage.setItem('mpt',JSON.stringify(data)); }); }));
  function exportTxt(){
    let t='WEEKLY MEAL PLAN\n';
    DAYS.forEach((d,di)=>{ t+='\n'+d+'\n'; MEALS.forEach((m,mi)=>{ const v=g('c'+di+'_'+mi).value.trim(); if(v)t+='  '+m+': '+v+'\n'; }); });
    t+='\n\nSHOPPING NOTE\n(Go through the plan and list every ingredient you need.)\n';
    const b=new Blob([t],{type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='meal-plan.txt'; a.click(); URL.revokeObjectURL(a.href);
  }
  function clearAll(){ if(confirm('Clear the whole plan?')){ data={}; localStorage.setItem('mpt','{}'); DAYS.forEach((_,di)=>MEALS.forEach((_,mi)=>g('c'+di+'_'+mi).value='')); } }
</script>
</body>
</html>
