<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expat Transition Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .grp { font-size: .76rem; text-transform: uppercase; letter-spacing: .04em; color: #5AE57A; margin: 12px 0 5px; }
  .task { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 8px 12px; margin-bottom: 5px; display: flex; align-items: center; gap: 9px; font-size: .87rem; }
  .box { width: 19px; height: 19px; border: 2px solid #5AE57A; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .7rem; font-weight: 700; }
  .box.on { background: #5AE57A; color: #325132; }
  .task.done .lb { text-decoration: line-through; opacity: .5; }
  .task .x { margin-left: auto; cursor: pointer; opacity: .5; } .task .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 10px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Expat Transition Planner</h1>
  <p class="sub">Settling into a new country, phase by phase. Track the steps that make a hard move smoother.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Task</label><input id="task" placeholder="e.g. Register with local authorities"></div>
      <div><label>Phase</label><select id="phase"><option>Before the move</option><option>First weeks</option><option>Settling in</option><option>Feeling at home</option></select></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="loadStarter()" style="margin-top:10px">Load starter tasks</button>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const PHASES=["Before the move","First weeks","Settling in","Feeling at home"];
  let R=JSON.parse(localStorage.getItem('etp2')||'[]');
  const save=()=>localStorage.setItem('etp2',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('task')){ alert('Enter a task.'); return; }
    R.push({t:v('task'),p:g('phase').value,done:false}); g('task').value=''; save(); render(); }
  function toggle(i){ R[i].done=!R[i].done; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all tasks?')){ R=[]; save(); render(); } }
  function loadStarter(){
    const S={"Before the move":["Sort visa &amp; residency paperwork","Research healthcare &amp; insurance","Arrange initial accommodation","Plan finances &amp; a local bank"],
      "First weeks":["Register with local authorities","Get a local SIM / phone plan","Open a local bank account","Learn the local transport"],
      "Settling in":["Find longer-term housing","Set up utilities &amp; internet","Find a doctor &amp; key services","Start learning the language"],
      "Feeling at home":["Build a local social circle","Find your regular spots &amp; routines","Join a club, class or community","Explore beyond your neighbourhood"]};
    Object.entries(S).forEach(([p,items])=>items.forEach(t=>{ if(!R.some(x=>x.t===t))R.push({t,p,done:false}); }));
    save(); render();
  }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No tasks yet — add your own or load the starter list.</div>'; return; }
    L.innerHTML=PHASES.map(p=>{
      const items=R.map((x,i)=>({x,i})).filter(o=>o.x.p===p);
      if(!items.length)return '';
      return '<div class="grp">'+p+'</div>'+items.map(({x,i})=>
        '<div class="task'+(x.done?' done':'')+'"><span class="box'+(x.done?' on':'')+'" onclick="toggle('+i+')">'+(x.done?'✓':'')+'</span><span class="lb">'+esc(x.t)+'</span><span class="x" onclick="del('+i+')">✕</span></div>').join('');
    }).join('');
  }
  render();
</script>
</body>
</html>
