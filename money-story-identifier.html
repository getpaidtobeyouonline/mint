<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Story Identifier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .blk { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
  .blk h4 { color: #5AE57A; font-size: .76rem; text-transform: uppercase; margin-bottom: 5px; }
  .blk p { font-size: .93rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Money Story Identifier</h1>
  <p class="sub">You inherited a money story before you could choose. Name it so you can choose differently now.</p>

  <div class="panel">
    <label for="early">What did money feel like growing up?</label>
    <textarea id="early" placeholder="Tight, abundant, fought-about, never discussed, etc."></textarea>
    <label for="parent">What did the adults in your house say or do about money?</label>
    <textarea id="parent" placeholder="Their phrases, behaviours, beliefs"></textarea>
    <label for="rule">A money rule you still follow that isn't really yours</label>
    <input id="rule" placeholder='e.g. "always save for a rainy day no matter what"'>
    <label for="repeat">Where do you see this story showing up today?</label>
    <textarea id="repeat" placeholder="Specific recent decisions or feelings"></textarea>
    <label for="rewrite">If you could rewrite the story, what would it say?</label>
    <textarea id="rewrite" placeholder="Your chosen money story going forward"></textarea>
    <button class="btn" onclick="gen()">Map My Story</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['early','parent','rule','repeat','rewrite'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('msi_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('msi_'+k,g(k).value)); });
  function gen(){
    g('out').innerHTML='<div class="blk"><h4>The inherited story</h4><p>'+esc(v('early')||'—')+'</p></div>'+
      '<div class="blk"><h4>From the adults</h4><p>'+esc(v('parent')||'—')+'</p></div>'+
      '<div class="blk"><h4>The rule still running</h4><p>'+esc(v('rule')||'—')+'</p></div>'+
      '<div class="blk"><h4>Where it shows up now</h4><p>'+esc(v('repeat')||'—')+'</p></div>'+
      '<div class="blk" style="border-left-color:#5AE57A"><h4>Your rewritten story</h4><p>'+esc(v('rewrite')||'—')+'</p></div>'+
      '<div class="blk" style="border-left-color:#BFD8BF"><h4>The practice</h4><p>Read your rewritten story before any big money decision for 30 days. The inherited story will not disappear &mdash; it just stops running the show.</p></div>';
    g('out').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function copyOut(){ const t=g('out').innerText; if(!t){alert('Map first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
