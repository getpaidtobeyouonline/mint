<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gratitude Health Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .prompt { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 11px 14px; font-size: .9rem; font-style: italic; margin-bottom: 4px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 18px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin-top: 12px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .entry { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 12px 15px; margin-bottom: 9px; }
  .entry .d { color: #5AE57A; font-size: .82rem; }
  .entry .x { float: right; cursor: pointer; opacity: .5; } .entry .x:hover { opacity: 1; color: #5AE57A; }
  .entry p { font-size: .9rem; margin-top: 3px; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Gratitude Health Journal</h1>
  <p class="sub">Thank your body for what it does. Gratitude for health shifts how you treat it.</p>

  <div class="panel">
    <div class="prompt" id="prompt"></div>
    <label for="body">Something my body let me do today</label>
    <input id="body" placeholder="Walked, hugged, tasted, rested, healed...">
    <label for="feel">Something I am grateful to feel</label>
    <input id="feel" placeholder="Energy, calm, strength, comfort...">
    <label for="care">One way I cared for myself today</label>
    <textarea id="care" placeholder="However small — it counts"></textarea>
    <button class="btn" onclick="add()">Save Entry</button>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const PROMPTS=["Your body carried you through today — what part are you most thankful for?","Health is easy to notice only when it is missing. What is quietly working well?","What did your senses give you today that you are grateful for?","Name one small recovery your body made without you asking."];
  g('prompt').textContent=PROMPTS[Math.floor(Math.random()*PROMPTS.length)];
  let R=JSON.parse(localStorage.getItem('ghj')||'[]');
  const save=()=>localStorage.setItem('ghj',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){
    if(!v('body')&&!v('feel')&&!v('care')){ alert('Write at least one thing.'); return; }
    R.push({d:new Date().toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}),body:v('body'),feel:v('feel'),care:v('care')});
    ['body','feel','care'].forEach(k=>g(k).value=''); save(); render();
  }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all entries?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No entries yet — start with one line.</div>'; return; }
    L.innerHTML=[...R].reverse().map((x)=>{ const i=R.indexOf(x);
      let p='';
      if(x.body)p+='<p>🫀 '+esc(x.body)+'</p>';
      if(x.feel)p+='<p>✨ '+esc(x.feel)+'</p>';
      if(x.care)p+='<p>🤍 '+esc(x.care)+'</p>';
      return '<div class="entry"><span class="x" onclick="del('+i+')">✕</span><div class="d">'+x.d+'</div>'+p+'</div>';
    }).join('');
  }
  render();
</script>
</body>
</html>
