<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thought Leadership Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.4rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Thought Leadership Roadmap</h1>
  <p class="sub">Map a 12-month path from known-by-some to recognised authority.</p>

  <div class="panel">
    <label for="topic">The topic you want to own</label>
    <input id="topic" placeholder="Your lane / area of authority">
    <label for="now">Where your visibility is now</label>
    <textarea id="now" placeholder="Honest starting point — audience, platforms, reputation"></textarea>
    <label for="d90">Next 90 days — foundation actions</label>
    <textarea id="d90" placeholder="Consistent content, a point of view, showing up"></textarea>
    <label for="m6">By 6 months — momentum actions</label>
    <textarea id="m6" placeholder="Guest spots, collaborations, a signature piece"></textarea>
    <label for="m12">By 12 months — authority markers</label>
    <textarea id="m12" placeholder="Speaking, press, a body of work people cite"></textarea>
    <button class="btn" onclick="gen()">Build Roadmap</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['topic','now','d90','m6','m12'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('tlr_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('tlr_'+k,g(k).value)); });
  function gen(){
    const t='THOUGHT LEADERSHIP ROADMAP\n\nTOPIC I WANT TO OWN:\n'+(v('topic')||'[your lane]')+
    '\n\nWHERE I AM NOW:\n'+(v('now')||'[honest starting point]')+
    '\n\n● NEXT 90 DAYS — FOUNDATION\n'+(v('d90')||'[consistent content + a clear point of view]')+
    '\n\n● BY 6 MONTHS — MOMENTUM\n'+(v('m6')||'[guest spots, collaborations, a signature piece]')+
    '\n\n● BY 12 MONTHS — AUTHORITY\n'+(v('m12')||'[speaking, press, a body of work]')+
    '\n\n--- The long game ---\nAuthority is built by showing up consistently with a real point of view.\nDepth beats reach — be genuinely known for one thing first.\nEach stage earns the next; do not skip the foundation.\nReview this roadmap every quarter and adjust.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
