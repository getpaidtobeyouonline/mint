<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laundry System Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  .tip { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 10px 13px; font-size: .84rem; margin-bottom: 6px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Laundry System Planner</h1>
  <p class="sub">Stop the laundry pile-up. Design a simple routine that keeps it under control.</p>

  <div class="panel">
    <div class="tip">💡 A laundry system has four stages: sort · wash · dry · put away. The pile builds when one stage stalls — usually 'put away'.</div>
    <label for="days">Which days will you do laundry?</label>
    <input id="days" placeholder="e.g. Wednesday and Saturday">
    <label for="sort">My sorting setup</label>
    <input id="sort" placeholder="e.g. Three baskets: lights, darks, towels/bedding">
    <label for="loads">Typical loads per week</label>
    <input id="loads" placeholder="e.g. 4 loads">
    <label for="dry">Drying plan</label>
    <input id="dry" placeholder="e.g. Airer in spare room / tumble dryer for towels">
    <label for="putaway">My 'put away' rule (the stage that defeats most people)</label>
    <textarea id="putaway" placeholder="e.g. Folded and away the same day it dries — no exceptions"></textarea>
    <label for="who">Who does what</label>
    <textarea id="who" placeholder="Share it out if you can"></textarea>
    <button class="btn" onclick="gen()">Build Laundry System</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['days','sort','loads','dry','putaway','who'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('lsp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('lsp_'+k,g(k).value)); });
  function gen(){
    const t=`MY LAUNDRY SYSTEM\n\nLAUNDRY DAYS:\n${v('days')||'[pick fixed days]'}\n\nSORTING SETUP:\n${v('sort')||'[your baskets / sorting]'}\n\nLOADS PER WEEK:\n${v('loads')||'[typical number]'}\n\nDRYING PLAN:\n${v('dry')||'[how clothes dry]'}\n\nTHE 'PUT AWAY' RULE:\n${v('putaway')||'[your non-negotiable]'}\n\nWHO DOES WHAT:\n${v('who')||'[share the load]'}\n\n--- The rule that keeps it working ---\nFinish what you start. A washed load that sits in the machine, or a dry load that lives on the airer, is the pile in disguise. Sort → wash → dry → away, every time.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
