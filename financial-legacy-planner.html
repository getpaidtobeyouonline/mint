<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Financial Legacy Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  textarea { min-height: 56px; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .blk { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
  .blk h4 { color: #5AE57A; font-size: .76rem; text-transform: uppercase; margin-bottom: 5px; }
  .blk p { font-size: .93rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Financial Legacy Planner</h1>
  <p class="sub">A first-pass legacy plan — what you want to leave, to whom, and the boring-but-vital admin.</p>

  <div class="panel">
    <label for="who">Who you want to provide for</label>
    <textarea id="who" placeholder="Names + relationship"></textarea>
    <label for="what">What you want to leave (money, property, business, values)</label>
    <textarea id="what" placeholder="Specific assets / amounts / intentions"></textarea>
    <label for="will">Will / trust status</label>
    <input id="will" placeholder="e.g. updated will dated [date] held by [person/firm]">
    <label for="benef">Beneficiaries listed on every account?</label>
    <input id="benef" placeholder="Bank, retirement, life insurance, brokerage — yes/no/needs updating">
    <label for="docs">Where the important documents live</label>
    <textarea id="docs" placeholder="Physical location + digital backup location + who has access"></textarea>
    <label for="msg">A letter / message you want left with the documents</label>
    <textarea id="msg" placeholder="Not legal advice — emotional guidance, intentions, values you want passed on"></textarea>
    <button class="btn" onclick="gen()">Build Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline · General guidance only — confirm legal/tax with a professional in your jurisdiction</footer>
</div>

<script>
  const F=['who','what','will','benef','docs','msg'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('flp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('flp_'+k,g(k).value)); });
  function gen(){
    g('out').innerHTML='<div class="blk"><h4>For whom</h4><p>'+esc(v('who')||'—')+'</p></div>'+
      '<div class="blk"><h4>What I want to leave</h4><p>'+esc(v('what')||'—')+'</p></div>'+
      '<div class="blk"><h4>Will / trust</h4><p>'+esc(v('will')||'—')+'</p></div>'+
      '<div class="blk"><h4>Beneficiaries on accounts</h4><p>'+esc(v('benef')||'—')+'</p></div>'+
      '<div class="blk"><h4>Document locations</h4><p>'+esc(v('docs')||'—')+'</p></div>'+
      '<div class="blk"><h4>The personal message</h4><p>'+esc(v('msg')||'—')+'</p></div>'+
      '<div class="blk" style="border-left-color:#BFD8BF"><h4>The discipline</h4><p>Review this once a year and after any major life event. Legacy is sequence: update the doc, tell one trusted person where it is, keep moving.</p></div>';
    g('out').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function copyOut(){ const t=g('out').innerText; if(!t){alert('Build first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
