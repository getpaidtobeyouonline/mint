<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Certification Programme Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 140px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.35rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Certification Programme Builder</h1>
  <p class="sub">Design a certification that trains others in your method — and scales your impact.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="name">Certification name</label><input id="name" placeholder="What it is called"></div>
      <div><label for="price">Price</label><input id="price" placeholder="e.g. £3,000"></div>
    </div>
    <label for="who">Who it is for</label>
    <input id="who" placeholder="The people you will certify">
    <label for="curriculum">Curriculum / modules (one per line)</label>
    <textarea id="curriculum" placeholder="What they learn to become certified"></textarea>
    <label for="assess">Assessment &amp; requirements</label>
    <textarea id="assess" placeholder="What they must complete or demonstrate to pass"></textarea>
    <label for="gives">What certification gives them</label>
    <textarea id="gives" placeholder="The badge, licence to use your method, listing, support"></textarea>
    <button class="btn" onclick="gen()">Build Programme</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['name','price','who','curriculum','assess','gives'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('crpb_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('crpb_'+k,g(k).value)); });
  function gen(){
    const cur=v('curriculum').split('\n').filter(x=>x.trim()).map((x,i)=>'  Module '+(i+1)+': '+x.trim()).join('\n')||'  [your curriculum]';
    const t='CERTIFICATION PROGRAMME\n\nNAME: '+(v('name')||'[certification name]')+(v('price')?'  ('+v('price')+')':'')+
    '\n\nFOR: '+(v('who')||'[who you will certify]')+
    '\n\nCURRICULUM:\n'+cur+
    '\n\nASSESSMENT & REQUIREMENTS:\n'+(v('assess')||'[what they must demonstrate to pass]')+
    '\n\nWHAT CERTIFICATION GIVES THEM:\n'+(v('gives')||'[badge, licence, listing, support]')+
    '\n\n--- Certification tips ---\nProtect quality — your name rides on every certified practitioner.\nReal assessment (not just attendance) keeps the certification valuable.\nGive graduates ongoing support and community so they stay active and proud.\nA directory of certified practitioners makes the badge worth having.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
