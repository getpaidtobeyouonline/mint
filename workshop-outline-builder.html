<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workshop Outline Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 54px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 140px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Workshop Outline Builder</h1>
  <p class="sub">Plan a workshop that teaches, engages and leaves people with a real result.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="title">Workshop title</label><input id="title" placeholder="Workshop title"></div>
      <div><label for="length">Duration</label><input id="length" placeholder="e.g. 90 min"></div>
    </div>
    <label for="who">Who it is for</label>
    <input id="who" placeholder="Your ideal attendee">
    <label for="outcome">What they leave able to do</label>
    <textarea id="outcome" placeholder="The concrete result, not just 'learn about'"></textarea>
    <label for="segments">Segments / teaching points (one per line)</label>
    <textarea id="segments" placeholder="The flow of the workshop"></textarea>
    <label for="interactive">Interactive element</label>
    <input id="interactive" placeholder="e.g. live exercise, breakout, hot seat, worksheet">
    <button class="btn" onclick="gen()">Build Outline</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['title','length','who','outcome','segments','interactive'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('wob_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('wob_'+k,g(k).value)); });
  function gen(){
    const seg=v('segments').split('\n').filter(x=>x.trim()).map((x,i)=>'  '+(i+1)+'. '+x.trim()).join('\n')||'  [your teaching points]';
    const t='WORKSHOP OUTLINE\n\nTITLE: '+(v('title')||'[workshop title]')+(v('length')?'  ('+v('length')+')':'')+
    '\n\nFOR: '+(v('who')||'[your ideal attendee]')+
    '\n\nBY THE END THEY CAN:\n'+(v('outcome')||'[the concrete result]')+
    '\n\n--- FLOW ---\n\nOPEN (hook + why this matters + what they will leave with)\n\nTEACH:\n'+seg+
    '\n\nINTERACTIVE ELEMENT:\n  '+(v('interactive')||'[live exercise or activity]')+
    '\n\nCLOSE (recap + their next step + any invitation)\n\n--- Workshop tips ---\nTeach less, but make it stick — depth beats coverage.\nGet them doing something in the first 15 minutes.\nEnd with one clear action so the learning turns into a result.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
