<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Birthday Reminder Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .row2 { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 9px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; font-size: .87rem; gap: 10px; }
  .row2.soon { border-left: 3px solid #5AE57A; }
  .days { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1rem; flex: none; }
  .row2 .x { cursor: pointer; opacity: .5; } .row2 .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Birthday Reminder Tracker</h1>
  <p class="sub">Never miss another birthday. See exactly who is coming up next.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Name</label><input id="name" placeholder="Who?"></div>
      <div><label>Birthday</label><input id="date" type="date"></div>
      <div><label>Relation</label><select id="rel"><option>Family</option><option>Friend</option><option>Partner</option><option>Colleague</option><option>Other</option></select></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:10px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('brt')||'[]');
  const save=()=>localStorage.setItem('brt',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('name')||!g('date').value){ alert('Enter a name and birthday.'); return; }
    R.push({n:v('name'),d:g('date').value,r:g('rel').value}); g('name').value=''; g('date').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all birthdays?')){ R=[]; save(); render(); } }
  function daysUntil(d){
    const t=new Date(); t.setHours(0,0,0,0);
    const b=new Date(d); let next=new Date(t.getFullYear(),b.getMonth(),b.getDate());
    if(next<t)next.setFullYear(t.getFullYear()+1);
    return Math.round((next-t)/86400000);
  }
  function turning(d){
    const b=new Date(d), t=new Date(); let age=t.getFullYear()-b.getFullYear();
    const next=new Date(t.getFullYear(),b.getMonth(),b.getDate());
    if(next<new Date(t.getFullYear(),t.getMonth(),t.getDate()))age++;
    return age;
  }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No birthdays added yet.</div>'; return; }
    L.innerHTML=[...R].map((x,i)=>({x,i,du:daysUntil(x.d)})).sort((a,b)=>a.du-b.du).map(({x,i,du})=>{
      const lbl= du===0?'Today!':du===1?'Tomorrow':'in '+du+' days';
      const age=turning(x.d);
      return '<div class="row2'+(du<=14?' soon':'')+'"><span><b style="color:#5AE57A">'+esc(x.n)+'</b> · '+x.r+(age>0&&age<130?' · turning '+age:'')+'</span><span class="days">'+lbl+'</span><span class="x" onclick="del('+i+')">✕</span></div>';
    }).join('');
  }
  render();
</script>
</body>
</html>
