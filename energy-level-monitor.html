<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Level Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input[type=range] { padding: 0; accent-color: #5AE57A; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .tod { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .tod .stat { flex: 1; min-width: 110px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 12px; text-align: center; }
  .tod .v { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #5AE57A; }
  .tod .l { font-size: .68rem; opacity: .65; text-transform: uppercase; }
  .row2 { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 8px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: .85rem; gap: 10px; }
  .row2 .x { cursor: pointer; opacity: .5; } .row2 .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  .note { background:#2E4D2E;border:1px solid #4F8A55;border-radius:8px;padding:11px 14px;font-size:.85rem;margin-bottom:12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Energy Level Monitor</h1>
  <p class="sub">Log energy across the day. Find your real peak and protect it for your hardest work.</p>

  <div class="panel">
    <div class="row">
      <div><label>Time of day</label><select id="tod"><option>Early morning</option><option>Mid-morning</option><option>Midday</option><option>Afternoon</option><option>Evening</option><option>Night</option></select></div>
      <div style="flex:2"><label>Energy (1-10): <span id="ev" style="color:#5AE57A">5</span></label><input id="lvl" type="range" min="1" max="10" value="5" oninput="document.getElementById('ev').textContent=this.value"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Log</button></div>
    </div>
  </div>

  <div class="note" id="peak"></div>
  <div class="tod" id="byTod"></div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const TODS=['Early morning','Mid-morning','Midday','Afternoon','Evening','Night'];
  let R=JSON.parse(localStorage.getItem('elm')||'[]');
  const save=()=>localStorage.setItem('elm',JSON.stringify(R));
  function add(){ R.push({d:new Date().toISOString().slice(0,10),tod:g('tod').value,lvl:+g('lvl').value}); save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ R=[]; save(); render(); } }
  function render(){
    const by={};
    TODS.forEach(t=>{ const arr=R.filter(x=>x.tod===t); by[t]=arr.length?arr.reduce((s,x)=>s+x.lvl,0)/arr.length:null; });
    g('byTod').innerHTML=TODS.map(t=>`<div class="stat"><div class="v">${by[t]!==null?by[t].toFixed(1):'—'}</div><div class="l">${t}</div></div>`).join('');
    const valid=TODS.filter(t=>by[t]!==null);
    if(valid.length){ const peak=valid.reduce((a,b)=>by[b]>by[a]?b:a);
      g('peak').innerHTML=`⚡ Your peak energy window looks like <b style="color:#5AE57A">${peak}</b>. Schedule your most important / hardest work here, and lighter tasks in the dips.`;
      g('peak').style.display='block';
    } else g('peak').style.display='none';
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No energy logs yet.</div>'; return; }
    L.innerHTML=[...R].map((x,i)=>({x,i})).reverse().slice(0,12).map(({x,i})=>`<div class="row2"><span><b style="color:#5AE57A">${x.lvl}/10</b> · ${x.tod} · ${x.d}</span><span class="x" onclick="del(${i})">✕</span></div>`).join('');
  }
  render();
</script>
</body>
</html>
