<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Food Sensitivity Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 44px; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 10px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .entry { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; margin-bottom: 6px; }
  .entry .top { display: flex; justify-content: space-between; gap: 10px; }
  .entry .d { color: #5AE57A; font-size: .8rem; }
  .entry .x { cursor: pointer; opacity: .5; flex: none; } .entry .x:hover { opacity: 1; color: #5AE57A; }
  .entry p { font-size: .87rem; margin-top: 2px; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  .note { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; font-size: .8rem; opacity: .8; margin-top: 10px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Food Sensitivity Tracker</h1>
  <p class="sub">Log what you eat and any symptoms after. Over time, patterns become visible.</p>

  <div class="panel">
    <div class="row">
      <div><label>Date</label><input id="dt" type="date"></div>
      <div><label>Meal</label><select id="meal"><option>Breakfast</option><option>Lunch</option><option>Dinner</option><option>Snack</option></select></div>
    </div>
    <label>What you ate</label>
    <input id="food" placeholder="List the main foods">
    <label>Symptoms after (if any) &amp; when</label>
    <textarea id="symptoms" placeholder="e.g. Bloating 1 hour later — or 'none'"></textarea>
    <button class="btn" onclick="add()">+ Log Entry</button>
    <div class="note">A personal observation log, not a diagnostic tool. For suspected allergies or intolerances, see a doctor or dietitian — do not self-diagnose.</div>
  </div>

  <div class="panel">
    <button class="btn ghost" onclick="copyLog()" style="margin-top:0">Copy log for doctor</button>
    <div id="list" style="margin-top:12px"></div>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('fst')||'[]');
  const save=()=>localStorage.setItem('fst',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  g('dt').value=new Date().toISOString().slice(0,10);
  function add(){ if(!v('food')){ alert('Enter what you ate.'); return; }
    R.push({d:g('dt').value||new Date().toISOString().slice(0,10),m:g('meal').value,f:v('food'),s:v('symptoms')});
    g('food').value=''; g('symptoms').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all entries?')){ R=[]; save(); render(); } }
  function copyLog(){ if(!R.length){ alert('Nothing logged yet.'); return; }
    const t='FOOD & SYMPTOM LOG\n\n'+[...R].sort((a,b)=>a.d<b.d?-1:1).map(x=>x.d+' ('+x.m+') — ate: '+x.f+(x.s?' | symptoms: '+x.s:' | no symptoms')).join('\n');
    navigator.clipboard.writeText(t).then(()=>alert('Log copied!'),()=>alert('Copy failed.'));
  }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No entries logged yet.</div>'; return; }
    L.innerHTML=[...R].map((x,i)=>({x,i})).sort((a,b)=>a.x.d<b.x.d?1:-1).map(({x,i})=>
      '<div class="entry"><div class="top"><span class="d">'+x.d+' · '+x.m+'</span><span class="x" onclick="del('+i+')">✕</span></div><p><b style="color:#5AE57A">Ate:</b> '+esc(x.f)+'</p>'+(x.s?'<p><b style="color:#5AE57A">After:</b> '+esc(x.s)+'</p>':'')+'</div>').join('');
  }
  render();
</script>
</body>
</html>
