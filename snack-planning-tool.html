<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Snack Planning Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 10px 0 5px; }
  select, input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  select:focus, input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 8px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .idea { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 14px; margin-top: 12px; display: none; }
  .idea .big { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: #5AE57A; }
  .add { display: flex; gap: 8px; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 7px 12px; margin: 5px 0; display: flex; justify-content: space-between; font-size: .87rem; }
  .item .x { cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { opacity: .45; font-size: .82rem; font-style: italic; padding: 3px 0; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Snack Planning Tool</h1>
  <p class="sub">Plan smart snacks ahead — so hunger does not make the choices for you.</p>

  <div class="panel">
    <label for="goal">What kind of snack?</label>
    <select id="goal">
      <option value="protein">Protein-rich &amp; filling</option>
      <option value="energy">Quick energy</option>
      <option value="light">Light &amp; low-calorie</option>
      <option value="sweet">Satisfy a sweet craving</option>
      <option value="savoury">Savoury &amp; crunchy</option>
    </select>
    <button class="btn" onclick="gen()" style="margin-top:12px">Suggest a Snack</button>
    <div class="idea" id="idea"></div>
  </div>

  <div class="panel">
    <label>My snack shopping/prep list</label>
    <div class="add"><input id="snack" placeholder="Add a snack to stock up on" onkeydown="if(event.key==='Enter')add()"><button class="btn" onclick="add()">Add</button></div>
    <div id="list" style="margin-top:8px"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const S={
    protein:["Greek yogurt with berries","Hard-boiled eggs","Hummus with veg sticks","A handful of nuts","Cottage cheese on crackers","Edamame beans"],
    energy:["Banana with nut butter","Trail mix","Oat energy balls","Apple slices with peanut butter","A medjool date with almond","Wholegrain toast with honey"],
    light:["Cucumber and cherry tomatoes","An orange or apple","A few rice cakes","Air-popped popcorn","Carrot sticks","A small bowl of berries"],
    sweet:["Dark chocolate square with nuts","Frozen grapes","Yogurt with honey","Dates stuffed with nut butter","Apple with cinnamon","A small smoothie"],
    savoury:["Whole-grain crackers with cheese","Roasted chickpeas","Olives","Veg sticks with hummus","A handful of seeds","Rice cakes with avocado"]
  };
  let R=JSON.parse(localStorage.getItem('spt')||'[]');
  const save=()=>localStorage.setItem('spt',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function gen(){
    const pool=S[g('goal').value];
    g('idea').style.display='block';
    g('idea').innerHTML='<div class="big">'+pool[Math.floor(Math.random()*pool.length)]+'</div>';
  }
  function add(){ const t=g('snack').value.trim(); if(!t)return; R.push(t); g('snack').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear list?')){ R=[]; save(); render(); } }
  function render(){
    g('list').innerHTML=R.length?R.map((x,i)=>'<div class="item"><span>'+esc(x)+'</span><span class="x" onclick="del('+i+')">✕</span></div>').join(''):'<div class="empty">No snacks added yet.</div>';
  }
  render();
</script>
</body>
</html>
