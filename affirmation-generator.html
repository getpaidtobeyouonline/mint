<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affirmation Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .aff { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 12px 15px; margin-bottom: 8px; display:flex; justify-content:space-between; gap:10px; align-items:center; }
  .aff .t { font-family: 'Playfair Display', serif; font-size: 1.05rem; }
  .aff .cp { cursor:pointer; color:#5AE57A; font-size:.82rem; }
  .note { background:#2E4D2E;border:1px solid #4F8A55;border-radius:8px;padding:11px 14px;font-size:.85rem;margin-bottom:12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Affirmation Generator</h1>
  <p class="sub">Skip the cringe-y "I am a magnet for millions". Get believable affirmations your brain can accept.</p>

  <div class="panel">
    <label for="area">Area</label>
    <select id="area"><option value="conf">Confidence</option><option value="calm">Calm / anxiety</option><option value="money">Money</option><option value="work">Work / focus</option><option value="self">Self-worth</option><option value="health">Health / body</option></select>
    <label for="trait">A trait or outcome you want to grow into</label>
    <input id="trait" placeholder="e.g. someone who follows through">
    <button class="btn" onclick="gen()">Generate</button>
    <button class="btn ghost" onclick="gen()">↻ More</button>
  </div>

  <div class="note">Use "I am becoming…" and "I am learning to…" — your brain rejects affirmations that feel like lies. Bridge statements work.</div>
  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  ['area','trait'].forEach(k=>{ const s=localStorage.getItem('ag_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('ag_'+k,g(k).value)); });
  const T={
    conf:["I am becoming someone who shows up even when it is uncomfortable.","I am learning to trust the version of me that already knows.","My confidence grows every time I choose to act before I feel ready.","I do not have to feel confident to be capable."],
    calm:["I can be anxious and still be safe.","I am learning to slow down before I react.","My nervous system is allowed to settle. Nothing here is an emergency.","I do not have to think every thought."],
    money:["I am learning to receive money as easily as I give my work.","I am becoming someone who is calm and clear about money.","My worth is not measured by my bank balance — and my income is allowed to grow.","I can want more and still be grateful."],
    work:["I am becoming someone who finishes what matters most.","I am learning to choose depth over busyness.","I trust that focused work compounds — small days still count.","I do not need motivation. I have my next small step."],
    self:["I am allowed to take up space exactly as I am right now.","I am learning that worth is not something I have to earn.","I am becoming kinder to the version of me that is still figuring it out.","My value is not up for debate today."],
    health:["I am learning to listen to my body before it has to shout.","I am becoming someone who keeps small promises to herself.","My body is on my side, not against me.","Rest is part of the work, not a betrayal of it."]
  };
  function gen(){
    let pool=[...T[g('area').value]];
    const tr=v('trait');
    if(tr) pool=pool.concat([`I am becoming ${tr}.`,`I am learning what it feels like to be ${tr}.`,`I do not have to be ${tr} yet — I just have to act like the person who is.`]);
    for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
    const pick=pool.slice(0,5);
    g('out').innerHTML=pick.map((x,i)=>`<div class="aff"><span class="t">${esc(x)}</span><span class="cp" onclick="cp(${i})">⧉</span></div>`).join('');
    window._a=pick;
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function cp(i){ navigator.clipboard.writeText(window._a[i]).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
