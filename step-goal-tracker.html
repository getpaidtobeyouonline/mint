<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step Goal Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat { flex: 1; min-width: 110px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 12px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: #5AE57A; }
  .stat .l { font-size: .68rem; opacity: .65; text-transform: uppercase; }
  .barwrap { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; font-size: .82rem; }
  .barwrap .lb { width: 70px; flex: none; opacity: .8; }
  .barwrap .tr { flex: 1; background: #3C603C; border-radius: 4px; height: 13px; overflow: hidden; }
  .barwrap .tr>i { display: block; height: 100%; background: #5AE57A; }
  .barwrap .pc { width: 70px; text-align: right; flex: none; }
  .row2 { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 8px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: .85rem; gap: 10px; }
  .row2 .x { cursor: pointer; opacity: .5; } .row2 .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Step Goal Tracker</h1>
  <p class="sub">Log your daily steps, hold the goal, watch the streak grow.</p>

  <div class="panel">
    <label for="goal">Daily step goal</label>
    <input id="goal" type="number" min="0" value="8000" oninput="render()">
    <div class="row" style="margin-top:8px">
      <div><label>Date</label><input id="dt" type="date"></div>
      <div><label>Steps today</label><input id="steps" type="number" min="0"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Log</button></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="sAvg">—</div><div class="l">Avg / day</div></div>
    <div class="stat"><div class="v" id="sHit">0</div><div class="l">Days goal hit</div></div>
    <div class="stat"><div class="v" id="sStreak">0</div><div class="l">Current streak</div></div>
  </div>

  <div class="panel" id="chartW" style="display:none">
    <div style="font-family:'Playfair Display',serif;color:#5AE57A;margin-bottom:8px">Last 10 days</div>
    <div id="chart"></div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  let R=JSON.parse(localStorage.getItem('sgt10')||'[]');
  const save=()=>{ localStorage.setItem('sgt10',JSON.stringify(R)); localStorage.setItem('sgt10_g',g('goal').value); };
  g('goal').value=localStorage.getItem('sgt10_g')||g('goal').value;
  g('dt').value=new Date().toISOString().slice(0,10);
  function add(){ const s=parseFloat(g('steps').value)||0; if(!s){alert('Enter steps.');return;}
    const d=g('dt').value||new Date().toISOString().slice(0,10);
    const ex=R.find(x=>x.d===d); if(ex)ex.s=s; else R.push({d,s});
    g('steps').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ R=[]; save(); render(); } }
  function streak(){ const goal=+g('goal').value||1; const m={}; R.forEach(x=>m[x.d]=x.s); let s=0,d=new Date();
    for(;;){ const k=d.toISOString().slice(0,10); if((m[k]||0)>=goal){s++; d.setDate(d.getDate()-1);} else break; } return s; }
  function render(){
    save();
    const goal=+g('goal').value||1;
    if(R.length){ g('sAvg').textContent=Math.round(R.reduce((s,x)=>s+x.s,0)/R.length).toLocaleString();
      g('sHit').textContent=R.filter(x=>x.s>=goal).length; }
    else { g('sAvg').textContent='—'; g('sHit').textContent='0'; }
    g('sStreak').textContent=streak();
    const cW=g('chartW');
    if(R.length){ cW.style.display='block'; const mx=Math.max(...R.map(x=>x.s),goal);
      g('chart').innerHTML=[...R].sort((a,b)=>a.d<b.d?-1:1).slice(-10).map(x=>`<div class="barwrap"><span class="lb">${x.d.slice(5)}</span><div class="tr"><i style="width:${Math.round(x.s/mx*100)}%"></i></div><span class="pc">${x.s.toLocaleString()}</span></div>`).join('');
    } else cW.style.display='none';
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No days logged yet.</div>'; return; }
    L.innerHTML=[...R].map((x,i)=>({x,i})).sort((a,b)=>a.x.d<b.x.d?1:-1).map(({x,i})=>`<div class="row2"><span><b style="color:#5AE57A">${x.d}</b> · ${x.s.toLocaleString()} steps ${x.s>=goal?'✓':''}</span><span class="x" onclick="del(${i})">✕</span></div>`).join('');
  }
  render();
</script>
</body>
</html>
