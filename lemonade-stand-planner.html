<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Lemonade Stand Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Lemonade Stand Planner</h1>
  <p class="sub">Plan the prices, supplies and pitch for a brilliant little stand.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="cost">Cost to make one cup</label><input id="cost" type="number" step="0.01" min="0" placeholder="e.g. 0.20"></div>
      <div><label for="price">Selling price per cup</label><input id="price" type="number" step="0.01" min="0" placeholder="e.g. 1.00"></div>
      <div><label for="cups">Cups you can make</label><input id="cups" type="number" min="0" placeholder="e.g. 30"></div>
    </div>
    <button class="btn" onclick="gen()">Plan My Stand</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), n=id=>parseFloat(g(id).value)||0;
  ['cost','price','cups'].forEach(k=>{ const s=localStorage.getItem('lsp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('lsp_'+k,g(k).value)); });
  const fmt=x=>x.toFixed(2);
  function gen(){
    const c=n('cost'), p=n('price'), cups=n('cups');
    if(!p||!cups){ alert('Enter at least a price and number of cups.'); return; }
    const profit=p-c, total=p*cups, totalProfit=profit*cups;
    const t='LEMONADE STAND PLAN\n\nTHE MATHS\nCost per cup: '+fmt(c)+'\nPrice per cup: '+fmt(p)+'\nProfit per cup: '+fmt(profit)+
    '\n\nIf you sell all '+cups+' cups:\n  Money taken: '+fmt(total)+'\n  Profit: '+fmt(totalProfit)+
    '\n\nSUPPLIES TO BRING\n  • Lemons or lemon juice + sugar (or your recipe)\n  • Big jug, ice, water\n  • Cups, napkins, a tray\n  • A bowl or jar for money + some change to start\n  • A bright sign with the price\n  • A table, sun hat and a smile\n\nWHERE TO SET UP\n  • A spot people walk past — front gate, school fair, park (with permission)\n  • Out of direct sun if you can; ice melts fast\n\nLITTLE EXTRAS THAT SELL\n  • Decorate the sign with the kids\n  • Offer a small biscuit deal for 50p more\n  • Have a charity option — "10p from each cup goes to..."\n\n--- Stand-running tips ---\nSmiling and saying hello sells more than the lemonade itself.\nKeep an adult close by for safety and change.\nKeep a tally on paper so you can see how many cups go.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Plan it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
