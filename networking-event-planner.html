<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Networking Event Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Networking Event Planner</h1>
  <p class="sub">Go to your next event with a goal, an intro line and a follow-up plan.</p>

  <div class="panel">
    <label for="event">Event name / type</label>
    <input id="event" placeholder="e.g. industry meetup, conference, mixer">
    <label for="goal">Your goal for the event</label>
    <input id="goal" placeholder="e.g. meet 3 people in my target field">
    <label for="who">Who you want to meet</label>
    <input id="who" placeholder="Roles, companies or types of people">
    <label for="intro">Your 15-second intro line</label>
    <textarea id="intro" placeholder="Who you are, what you do, who you help"></textarea>
    <label for="starters">Conversation starters you will use</label>
    <textarea id="starters" placeholder="Open, easy questions to break the ice"></textarea>
    <label for="followup">Your follow-up plan</label>
    <input id="followup" placeholder="e.g. connect on LinkedIn within 24 hours">
    <button class="btn" onclick="gen()">Build Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['event','goal','who','intro','starters','followup'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('nep_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('nep_'+k,g(k).value)); });
  function gen(){
    const t='NETWORKING EVENT PLAN'+(v('event')?'\nEvent: '+v('event'):'')+
    '\n\nMY GOAL:\n'+(v('goal')||'[a small, specific goal]')+
    '\n\nWHO I WANT TO MEET:\n'+(v('who')||'[the people worth seeking out]')+
    '\n\nMY 15-SECOND INTRO:\n"'+(v('intro')||'[your clear, friendly intro line]')+'"'+
    '\n\nCONVERSATION STARTERS:\n'+(v('starters')||'- What brought you to this event?\n- What are you working on at the moment?')+
    '\n\nFOLLOW-UP PLAN:\n'+(v('followup')||'[how and when you will reconnect]')+
    '\n\n--- On the day ---\nQuality over quantity — three real conversations beat thirty cards.\nAsk more than you pitch. Take quick notes after each chat.\nFollow up within 24-48 hours while you are fresh in their mind.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
