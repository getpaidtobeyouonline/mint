<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Kids Craft Supply Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .grp { font-size: .76rem; text-transform: uppercase; letter-spacing: .04em; color: #5AE57A; margin: 14px 0 6px; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 8px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; gap: 8px; font-size: .88rem; }
  .item.low { border-color: #5AE57A; }
  .item .x { cursor: pointer; opacity: .5; flex: none; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Kids Craft Supply Tracker</h1>
  <p class="sub">Know what's in the craft drawer — and what to grab next time.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Supply</label><input id="name" placeholder="e.g. glue sticks"></div>
      <div><label>Category</label><select id="cat"><option>Paper &amp; card</option><option>Paints &amp; pens</option><option>Glue &amp; tape</option><option>Stickers &amp; embellishments</option><option>Tools</option><option>Other</option></select></div>
      <div><label>Status</label><select id="status"><option>Plenty</option><option>Low</option><option>Out of stock</option></select></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="copyLow()" style="margin-top:8px">Copy Shopping List</button>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const CATS=['Paper & card','Paints & pens','Glue & tape','Stickers & embellishments','Tools','Other'];
  let R=JSON.parse(localStorage.getItem('kcst')||'[]');
  const save=()=>localStorage.setItem('kcst',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('name')){ alert('Enter a supply.'); return; }
    R.push({n:v('name'),c:g('cat').value,s:g('status').value}); g('name').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all supplies?')){ R=[]; save(); render(); } }
  function copyLow(){ const low=R.filter(x=>x.s!=='Plenty'); if(!low.length){ alert('Nothing low!'); return; }
    const t='CRAFT SHOPPING LIST\n'+low.map(x=>'- '+x.n+'  ('+x.s+')').join('\n');
    navigator.clipboard.writeText(t).then(()=>alert('Shopping list copied!'),()=>alert('Copy failed.'));
  }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No supplies yet — add the first one.</div>'; return; }
    L.innerHTML=CATS.map(c=>{
      const items=R.map((x,i)=>({x,i})).filter(o=>o.x.c===c);
      if(!items.length)return '';
      return '<div class="grp">'+c+'</div>'+items.map(({x,i})=>
        '<div class="item'+(x.s!=='Plenty'?' low':'')+'"><span>'+esc(x.n)+'</span><span style="opacity:.7">'+x.s+'  <span class="x" onclick="del('+i+')">✕</span></span></div>').join('');
    }).join('');
  }
  render();
</script>
</body>
</html>
