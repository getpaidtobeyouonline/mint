<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Content Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2.1rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 24px; font-size: .95rem; }
  label { display: block; font-size: .76rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 10px 0 5px; }
  input, select, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .95rem; padding: 10px 12px; border-radius: 8px; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; }
  .grid > div { flex: 1; min-width: 140px; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: .95rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; }
  .btn:hover { opacity: .9; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .stat { flex: 1; min-width: 110px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 13px; text-align: center; }
  .stat .n { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #5AE57A; }
  .stat .l { font-size: .72rem; opacity: .65; text-transform: uppercase; }
  .day { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.05rem; margin: 18px 0 8px; border-bottom: 1px solid #4C724C; padding-bottom: 4px; }
  .day .tag { font-size: .72rem; font-family: 'DM Sans', sans-serif; }
  .post { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 12px 14px; margin-bottom: 9px; }
  .post .top { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
  .post .title { font-weight: 500; }
  .meta { font-size: .8rem; opacity: .7; }
  .pill { font-size: .72rem; padding: 2px 9px; border-radius: 20px; border: 1px solid #5AE57A; color: #5AE57A; cursor: pointer; }
  .acts { margin-top: 8px; display: flex; gap: 14px; font-size: .8rem; }
  .acts span { cursor: pointer; opacity: .65; }
  .acts span:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; padding: 26px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.7rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>AI Content Calendar</h1>
  <p class="sub">Plan, schedule, and track your content in one place — with a built-in idea spark when you're stuck.</p>

  <div class="panel">
    <label for="topic">Topic / Title</label>
    <input id="topic" placeholder="What's the post about?">
    <div class="grid">
      <div><label for="platform">Platform</label>
        <select id="platform"><option>Instagram</option><option>LinkedIn</option><option>X / Twitter</option><option>YouTube</option><option>TikTok</option><option>Blog</option><option>Email</option><option>Newsletter</option></select></div>
      <div><label for="type">Type</label>
        <select id="type"><option>Tip</option><option>Story</option><option>Tutorial</option><option>Promo</option><option>List</option><option>Question</option><option>Behind-the-scenes</option></select></div>
      <div><label for="date">Date</label><input id="date" type="date"></div>
    </div>
    <button class="btn" onclick="add()">+ Add to Calendar</button>
    <button class="btn ghost" onclick="spark()">✦ Idea Spark</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="n" id="sAll">0</div><div class="l">Total</div></div>
    <div class="stat"><div class="n" id="sSch">0</div><div class="l">Scheduled</div></div>
    <div class="stat"><div class="n" id="sPost">0</div><div class="l">Posted</div></div>
  </div>

  <div id="list"></div>

  <button class="btn" onclick="exportMd()">Export Calendar</button>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  let posts = JSON.parse(localStorage.getItem('acc') || '[]');
  const save = () => localStorage.setItem('acc', JSON.stringify(posts));
  const esc = t => (t||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const states = ['Idea','Drafting','Scheduled','Posted'];
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('date').value = today;

  const sparks = {
    Tip: ["3 fast tips on [topic]","The one [topic] mistake to stop making","A 30-second [topic] win"],
    Story: ["How [topic] went wrong before it went right","What [topic] taught me the hard way","The day [topic] finally clicked"],
    Tutorial: ["[topic] step by step in under 10 minutes","Build [topic] from scratch","The simplest way to do [topic]"],
    Promo: ["Why I made this for people stuck on [topic]","Who [topic] is (and isn't) for","Behind the offer: [topic]"],
    List: ["5 tools that make [topic] easy","7 [topic] ideas you can steal","My [topic] starter checklist"],
    Question: ["What's your biggest struggle with [topic]?","[topic]: which approach do you use?","Hot take on [topic] — agree?"],
    "Behind-the-scenes": ["A real look at my [topic] process","What [topic] actually takes","My messy [topic] workspace"]
  };

  function spark() {
    const ty = document.getElementById('type').value;
    const base = document.getElementById('topic').value.trim() || '[topic]';
    const arr = sparks[ty];
    document.getElementById('topic').value = arr[Math.floor(Math.random()*arr.length)].replace('[topic]', base);
  }

  function add() {
    const topic = document.getElementById('topic').value.trim();
    if (!topic) { alert('Add a topic first.'); return; }
    posts.push({
      topic, platform: document.getElementById('platform').value,
      type: document.getElementById('type').value,
      date: document.getElementById('date').value || today, status: 'Idea'
    });
    document.getElementById('topic').value = '';
    save(); render();
  }
  function cycle(i) { const x = posts[i]; x.status = states[(states.indexOf(x.status)+1)%states.length]; save(); render(); }
  function del(i) { posts.splice(i,1); save(); render(); }
  function clearAll() { if (confirm('Clear the whole calendar?')) { posts=[]; save(); render(); } }

  function copyBrief(i) {
    const p = posts[i];
    const t = `CONTENT BRIEF\nTopic: ${p.topic}\nPlatform: ${p.platform}\nType: ${p.type}\nDate: ${p.date}\n\nWrite this ${p.type.toLowerCase()} post for ${p.platform}. Hook hard in the first line, keep it native to the platform, and end with a clear call to action.`;
    navigator.clipboard.writeText(t).then(()=>alert('Brief copied — paste into Claude.'),()=>alert('Copy failed.'));
  }

  function render() {
    document.getElementById('sAll').textContent = posts.length;
    document.getElementById('sSch').textContent = posts.filter(p=>p.status==='Scheduled').length;
    document.getElementById('sPost').textContent = posts.filter(p=>p.status==='Posted').length;
    const l = document.getElementById('list');
    if (!posts.length) { l.innerHTML = '<div class="empty">Nothing planned yet — add your first post above.</div>'; return; }
    const idx = posts.map((p,i)=>({p,i})).sort((a,b)=> a.p.date < b.p.date ? -1 : a.p.date > b.p.date ? 1 : 0);
    let html = '', cur = '';
    idx.forEach(({p,i}) => {
      if (p.date !== cur) {
        cur = p.date;
        const tag = p.date === today ? ' <span class="tag" style="color:#5AE57A">• Today</span>'
          : p.date < today ? ' <span class="tag" style="color:#5AE57A">• Past</span>' : '';
        html += `<div class="day">${p.date}${tag}</div>`;
      }
      html += `<div class="post"><div class="top">
        <span class="title">${esc(p.topic)}</span>
        <span class="pill" onclick="cycle(${i})">${p.status}</span></div>
        <div class="meta">${esc(p.platform)} · ${esc(p.type)}</div>
        <div class="acts"><span onclick="copyBrief(${i})">⧉ Copy brief</span><span onclick="del(${i})">✕ Delete</span></div>
      </div>`;
    });
    l.innerHTML = html;
  }

  function exportMd() {
    if (!posts.length) { alert('Add some posts first.'); return; }
    const idx = [...posts].sort((a,b)=> a.date<b.date?-1:1);
    let t = `# AI Content Calendar\n\n`, cur = '';
    idx.forEach(p => { if (p.date!==cur){cur=p.date; t+=`\n## ${p.date}\n`;} t += `- [${p.status}] ${p.topic} — ${p.platform} · ${p.type}\n`; });
    const b = new Blob([t.trim()], { type:'text/markdown' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'content-calendar.md'; a.click(); URL.revokeObjectURL(a.href);
  }

  render();
</script>
</body>
</html>
