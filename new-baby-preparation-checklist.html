<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Baby Preparation Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .count { text-align: center; margin-bottom: 12px; }
  .count .n { font-family: 'Playfair Display', serif; font-size: 2.4rem; color: #5AE57A; }
  .track { background: #3C603C; border-radius: 5px; height: 12px; overflow: hidden; margin: 8px 0; }
  .track>i { display: block; height: 100%; background: #5AE57A; transition: width .3s; }
  .grp { font-size: .78rem; text-transform: uppercase; letter-spacing: .04em; color: #5AE57A; margin: 14px 0 6px; font-weight: 500; }
  .task { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid #4C724C; cursor: pointer; font-size: .89rem; }
  .task:last-child { border-bottom: none; }
  .box { width: 20px; height: 20px; border: 2px solid #5AE57A; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; font-size: .7rem; font-weight: 700; }
  .box.on { background: #5AE57A; color: #325132; }
  .task.done span.lb { text-decoration: line-through; opacity: .5; }
  .add { display: flex; gap: 8px; margin-top: 8px; }
  input { flex: 1; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family:'DM Sans',sans-serif; font-size: .9rem; padding: 8px 10px; border-radius: 7px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .88rem; padding: 8px 14px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>New Baby Preparation Checklist</h1>
  <p class="sub">Everything to sort before baby arrives — in calm, manageable groups.</p>

  <div class="panel">
    <div class="count"><span class="n" id="pct">0%</span><div style="opacity:.7;font-size:.85rem">ready for baby</div></div>
    <div class="track"><i id="bar" style="width:0%"></i></div>
    <div id="list"></div>
    <div class="add"><input id="extra" placeholder="Add your own item..." onkeydown="if(event.key==='Enter')addExtra()"><button class="btn" onclick="addExtra()">Add</button></div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const BASE={
    "Sleep":["Cot or crib with firm mattress","Fitted sheets (3-4)","Sleeping bags or swaddles","Baby monitor"],
    "Feeding":["Bottles &amp; steriliser (or breastfeeding supplies)","Bibs and muslin cloths","Burp cloths","Feeding pillow"],
    "Clothing":["Bodysuits and sleepsuits (newborn &amp; 0-3m)","Hats, socks, scratch mittens","A going-home outfit","Weather-appropriate outer layer"],
    "Nappy changing":["Nappies (newborn size)","Wipes and cotton wool","Changing mat","Nappy cream and bin"],
    "Out and about":["Car seat (correctly fitted)","Pram or carrier","Changing bag","Rain cover / sun shade"],
    "For the parents":["Hospital bag packed","Postnatal supplies for the birthing parent","Meals batch-cooked and frozen","Important numbers and paperwork ready"]
  };
  let state=JSON.parse(localStorage.getItem('nbpc')||'{}');
  let extra=JSON.parse(localStorage.getItem('nbpc_extra')||'[]');
  const save=()=>{ localStorage.setItem('nbpc',JSON.stringify(state)); localStorage.setItem('nbpc_extra',JSON.stringify(extra)); };
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function toggle(k){ state[k]=!state[k]; save(); render(); }
  function addExtra(){ const t=g('extra').value.trim(); if(!t)return; extra.push(t); g('extra').value=''; save(); render(); }
  function delExtra(i){ const k='X|'+extra[i]; delete state[k]; extra.splice(i,1); save(); render(); }
  function render(){
    let html='', total=0, done=0;
    Object.entries(BASE).forEach(([grp,items])=>{
      html+='<div class="grp">'+grp+'</div>';
      items.forEach(it=>{ const k=grp+'|'+it; const on=!!state[k]; total++; if(on)done++;
        html+='<div class="task'+(on?' done':'')+'" onclick="toggle(\''+k.replace(/'/g,"\\'")+'\')"><span class="box'+(on?' on':'')+'">'+(on?'✓':'')+'</span><span class="lb">'+it+'</span></div>';
      });
    });
    if(extra.length){
      html+='<div class="grp">Your additions</div>';
      extra.forEach((it,i)=>{ const k='X|'+it; const on=!!state[k]; total++; if(on)done++;
        html+='<div class="task'+(on?' done':'')+'"><span class="box'+(on?' on':'')+'" onclick="toggle(\''+k.replace(/'/g,"\\'")+'\')">'+(on?'✓':'')+'</span><span class="lb" onclick="toggle(\''+k.replace(/'/g,"\\'")+'\')">'+esc(it)+'</span><span style="margin-left:auto;cursor:pointer;opacity:.5" onclick="delExtra('+i+')">✕</span></div>';
      });
    }
    g('list').innerHTML=html;
    const pct=total?Math.round(done/total*100):0;
    g('pct').textContent=pct+'%'; g('bar').style.width=pct+'%';
  }
  render();
</script>
</body>
</html>
