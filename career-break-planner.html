<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Career Break Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 140px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Career Break Planner</h1>
  <p class="sub">Plan a career break with intention — so it is a chapter, not a gap.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="type">Type of break</label><select id="type"><option>Sabbatical / rest</option><option>Caregiving</option><option>Travel</option><option>Study / retraining</option><option>Health recovery</option><option>Other</option></select></div>
      <div><label for="length">Length</label><input id="length" placeholder="e.g. 6 months"></div>
    </div>
    <label for="goals">What you want from this break</label>
    <textarea id="goals" placeholder="The honest purpose — rest, healing, learning, a decision"></textarea>
    <label for="money">Your finances plan</label>
    <textarea id="money" placeholder="How it is funded and a rough budget"></textarea>
    <label for="connected">How you will stay employable &amp; connected</label>
    <textarea id="connected" placeholder="e.g. keep a skill fresh, stay in touch with contacts"></textarea>
    <label for="reentry">Your re-entry plan</label>
    <textarea id="reentry" placeholder="How you will explain the break and step back in"></textarea>
    <button class="btn" onclick="gen()">Build Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['type','length','goals','money','connected','reentry'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('cbp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('cbp_'+k,g(k).value)); });
  function gen(){
    const t='CAREER BREAK PLAN\nType: '+g('type').value+(v('length')?'  |  Length: '+v('length'):'')+
    '\n\nWHAT I WANT FROM THIS BREAK:\n'+(v('goals')||'[the real purpose]')+
    '\n\nFINANCES:\n'+(v('money')||'[how it is funded + budget]')+
    '\n\nSTAYING EMPLOYABLE & CONNECTED:\n'+(v('connected')||'[keeping skills and contacts warm]')+
    '\n\nRE-ENTRY PLAN:\n'+(v('reentry')||'[how you explain it and step back in]')+
    '\n\n--- A break done well ---\nName the break clearly on your CV — confident framing beats hiding it.\nThe skills, perspective and growth from a break are real experience.\nKeep one foot in: a contact, a course, a small project keeps re-entry easy.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
