<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30 Day Post Idea Creator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #325132;
    color: #FFFFFF;
    font-family: 'DM Sans', sans-serif;
    line-height: 1.6;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }
  .wrap { max-width: 820px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 32px; }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    color: #5AE57A;
    margin-bottom: 12px;
  }
  .sub { opacity: 0.85; max-width: 560px; margin: 0 auto; }
  .card {
    background: rgba(240, 235, 224, 0.04);
    border: 1px solid rgba(201, 168, 76, 0.25);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 24px;
  }
  label {
    display: block;
    font-weight: 500;
    margin-bottom: 8px;
    color: #5AE57A;
    font-size: 0.95rem;
    letter-spacing: 0.3px;
  }
  input, select {
    width: 100%;
    background: #325132;
    color: #FFFFFF;
    border: 1px solid rgba(240, 235, 224, 0.2);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    margin-bottom: 18px;
  }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  button {
    background: #5AE57A;
    color: #325132;
    border: none;
    border-radius: 8px;
    padding: 14px 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    letter-spacing: 0.5px;
    transition: transform 0.15s, opacity 0.15s;
  }
  button:hover { transform: translateY(-1px); opacity: 0.92; }
  button.ghost {
    background: transparent;
    color: #5AE57A;
    border: 1px solid #5AE57A;
    margin-top: 10px;
  }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 540px) { .row { grid-template-columns: 1fr; gap: 0; } }
  .day {
    display: grid;
    grid-template-columns: 56px 1fr;
    gap: 14px;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(240, 235, 224, 0.08);
    align-items: start;
  }
  .day:last-child { border-bottom: none; }
  .day-num {
    font-family: 'Playfair Display', serif;
    color: #5AE57A;
    font-size: 1.4rem;
    font-weight: 700;
    text-align: center;
    padding-top: 2px;
  }
  .day-type {
    display: inline-block;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #5AE57A;
    background: rgba(201, 168, 76, 0.12);
    padding: 3px 8px;
    border-radius: 4px;
    margin-bottom: 6px;
  }
  .day-idea { font-size: 0.96rem; }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
  .actions button { flex: 1; min-width: 140px; width: auto; }
  .hidden { display: none; }
  footer {
    text-align: center;
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid rgba(240, 235, 224, 0.1);
    font-size: 0.85rem;
    opacity: 0.6;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>30 Day Post Idea Creator</h1>
    <p class="sub">A full month of post prompts — personalized to your niche, audience, and platform. No more blank-page Mondays.</p>
  </header>

  <div class="card" id="inputCard">
    <label for="niche">Your niche</label>
    <input id="niche" type="text" placeholder="e.g. budget travel, sourdough baking, freelance copywriting" />

    <label for="audience">Your audience</label>
    <input id="audience" type="text" placeholder="e.g. new parents, side-hustlers, creative directors" />

    <div class="row">
      <div>
        <label for="platform">Platform</label>
        <select id="platform">
          <option>Instagram</option>
          <option>TikTok</option>
          <option>LinkedIn</option>
          <option>YouTube Shorts</option>
          <option>Twitter / X</option>
          <option>Threads</option>
        </select>
      </div>
      <div>
        <label for="tone">Tone</label>
        <select id="tone">
          <option>Friendly & warm</option>
          <option>Bold & punchy</option>
          <option>Educational & calm</option>
          <option>Playful & witty</option>
        </select>
      </div>
    </div>

    <button onclick="generate()">Generate 30 Days</button>
  </div>

  <div id="output" class="hidden"></div>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const TEMPLATES = [
    { type: "Hook",     idea: "Open with: 'Most {{audience}} get {{niche}} wrong. Here's what actually works.'" },
    { type: "Tip",      idea: "Share one tiny {{niche}} habit that changed your week." },
    { type: "Story",    idea: "Tell the moment you first realized you needed to take {{niche}} seriously." },
    { type: "List",     idea: "5 tools every {{audience}} should know about for {{niche}}." },
    { type: "Myth",     idea: "Bust a common myth {{audience}} still believe about {{niche}}." },
    { type: "Question", idea: "Ask: What's the #1 thing holding you back in {{niche}}?" },
    { type: "Tutorial", idea: "Teach a 60-second walkthrough of your favorite {{niche}} shortcut." },
    { type: "Behind",   idea: "Show a real behind-the-scenes moment from your {{niche}} workflow." },
    { type: "Hot Take", idea: "Share a contrarian opinion most {{audience}} would disagree with." },
    { type: "Win",      idea: "Celebrate a small {{niche}} win — yours or a follower's." },
    { type: "Compare",  idea: "This vs. that: two approaches to {{niche}} and when to use each." },
    { type: "Mistake",  idea: "Confess a mistake you made in {{niche}} and the lesson it taught." },
    { type: "Quote",    idea: "Pair a quote you love with how it applies to {{niche}}." },
    { type: "Q&A",      idea: "Answer the question {{audience}} keep asking you about {{niche}}." },
    { type: "Mini Guide", idea: "Break down a step-by-step mini guide on one slice of {{niche}}." },
    { type: "Resource", idea: "Recommend a free resource that levels up any {{audience}} in {{niche}}." },
    { type: "Trend",    idea: "React to a current trend in {{niche}} — agree or push back." },
    { type: "Reframe",  idea: "Reframe a {{niche}} problem {{audience}} face into an opportunity." },
    { type: "Day in Life", idea: "Walk through one full day of yours through a {{niche}} lens." },
    { type: "Checklist", idea: "Post a save-worthy checklist for {{audience}} starting {{niche}}." },
    { type: "Poll",     idea: "Run a poll: which {{niche}} challenge hits hardest?" },
    { type: "Lesson",   idea: "Share the biggest lesson your last year in {{niche}} taught you." },
    { type: "Testimonial", idea: "Spotlight a result, win, or kind word from {{audience}} you've helped." },
    { type: "FAQ",      idea: "Answer 3 common FAQs about {{niche}} in one carousel/post." },
    { type: "Vision",   idea: "Paint the picture of where {{audience}} could be in 6 months." },
    { type: "Reaction", idea: "Stitch or react to a recent post in {{niche}} you have thoughts on." },
    { type: "Process",  idea: "Reveal your full process for one specific {{niche}} outcome." },
    { type: "Then/Now", idea: "Compare where you started in {{niche}} vs. where you are now." },
    { type: "Pep Talk", idea: "Send a pep talk to {{audience}} feeling stuck in {{niche}} this week." },
    { type: "CTA",      idea: "Invite {{audience}} to DM you a word about their biggest {{niche}} goal." }
  ];

  function generate() {
    const niche = document.getElementById('niche').value.trim();
    const audience = document.getElementById('audience').value.trim();
    const platform = document.getElementById('platform').value;
    const tone = document.getElementById('tone').value;

    if (!niche || !audience) {
      alert('Please fill in your niche and audience first.');
      return;
    }

    let html = `<div class="card">
      <h2 style="font-family:'Playfair Display',serif;color:#5AE57A;font-size:1.5rem;margin-bottom:6px;">Your 30-Day Plan</h2>
      <p style="opacity:0.8;margin-bottom:14px;font-size:0.92rem;">Platform: ${platform} · Tone: ${tone}</p>`;

    TEMPLATES.forEach((t, i) => {
      const idea = t.idea.replace(/{{niche}}/g, niche).replace(/{{audience}}/g, audience);
      html += `<div class="day">
        <div class="day-num">${i + 1}</div>
        <div>
          <span class="day-type">${t.type}</span>
          <div class="day-idea">${idea}</div>
        </div>
      </div>`;
    });

    html += `<div class="actions">
      <button class="ghost" onclick="copyPlan()">Copy All</button>
      <button class="ghost" onclick="downloadPlan()">Download .txt</button>
      <button class="ghost" onclick="reset()">Start Over</button>
    </div></div>`;

    const out = document.getElementById('output');
    out.innerHTML = html;
    out.classList.remove('hidden');
    document.getElementById('inputCard').classList.add('hidden');
    out.scrollIntoView({ behavior: 'smooth' });
  }

  function planAsText() {
    return Array.from(document.querySelectorAll('.day')).map(d => {
      const n = d.querySelector('.day-num').innerText;
      const t = d.querySelector('.day-type').innerText;
      const i = d.querySelector('.day-idea').innerText;
      return `Day ${n} — ${t}\n${i}\n`;
    }).join('\n');
  }

  function copyPlan() {
    navigator.clipboard.writeText(planAsText()).then(() => alert('Plan copied to clipboard.'));
  }

  function downloadPlan() {
    const blob = new Blob([planAsText()], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '30-day-post-plan.txt';
    a.click();
    URL.revokeObjectURL(url);
  }

  function reset() {
    document.getElementById('output').classList.add('hidden');
    document.getElementById('inputCard').classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
