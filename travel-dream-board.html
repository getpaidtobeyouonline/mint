<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Travel Dream Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .board { display: grid; grid-template-columns: repeat(auto-fill,minmax(150px,1fr)); gap: 10px; }
  .tile { background: #2A442A; border: 1px solid #5A845A; border-radius: 10px; padding: 16px 12px; text-align: center; position: relative; }
  .tile .ic { font-size: 2rem; }
  .tile .pl { font-family: 'Playfair Display', serif; font-size: 1rem; color: #5AE57A; margin-top: 4px; }
  .tile .wh { font-size: .78rem; opacity: .7; margin-top: 2px; }
  .tile .x { position: absolute; top: 5px; right: 8px; cursor: pointer; opacity: .4; }
  .tile .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 18px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Travel Dream Board</h1>
  <p class="sub">Picture the places that pull at you. A board you see often is a board you act on.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Dream destination</label><input id="place" placeholder="e.g. Kyoto, Japan"></div>
      <div><label>Why it calls you</label><input id="why" placeholder="The reason"></div>
      <div><label>Symbol</label><select id="icon"><option>🏝️</option><option>🏔️</option><option>🏛️</option><option>🌃</option><option>🏜️</option><option>🌋</option><option>🗺️</option><option>🚂</option><option>⛩️</option><option>🌅</option></select></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div class="board" id="board"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:12px">Clear Board</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('tdb')||'[]');
  const save=()=>localStorage.setItem('tdb',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('place')){ alert('Enter a dream destination.'); return; }
    R.push({p:v('place'),w:v('why'),ic:g('icon').value}); g('place').value=''; g('why').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the dream board?')){ R=[]; save(); render(); } }
  function render(){
    const B=g('board');
    if(!R.length){ B.innerHTML='<div class="empty">Your board is empty — add your first dream destination.</div>'; return; }
    B.innerHTML=R.map((x,i)=>'<div class="tile"><span class="x" onclick="del('+i+')">✕</span><div class="ic">'+x.ic+'</div><div class="pl">'+esc(x.p)+'</div>'+(x.w?'<div class="wh">'+esc(x.w)+'</div>':'')+'</div>').join('');
  }
  render();
</script>
</body>
</html>
