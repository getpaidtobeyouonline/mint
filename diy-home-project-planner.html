<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIY Home Project Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>DIY Home Project Planner</h1>
  <p class="sub">Plan a DIY project so it actually gets finished — and stays finished.</p>

  <div class="panel">
    <label for="project">Project</label>
    <input id="project" placeholder="e.g. paint the hallway, fit floating shelves">
    <div class="grid">
      <div><label for="time">Estimated time</label><input id="time" placeholder="e.g. a weekend"></div>
      <div><label for="budget">Budget</label><input id="budget" placeholder="e.g. £80"></div>
    </div>
    <label for="materials">Materials list</label>
    <textarea id="materials" placeholder="Everything you need, with quantities"></textarea>
    <label for="tools">Tools needed</label>
    <textarea id="tools" placeholder="What you have + what you need to borrow / buy"></textarea>
    <label for="steps">Steps</label>
    <textarea id="steps" placeholder="In order — write it like a recipe"></textarea>
    <button class="btn" onclick="gen()">Build Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['project','time','budget','materials','tools','steps'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('dhp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('dhp_'+k,g(k).value)); });
  function gen(){
    const t='DIY HOME PROJECT PLAN\n\nPROJECT: '+(v('project')||'[your project]')+(v('time')?'  ·  '+v('time'):'')+(v('budget')?'  ·  '+v('budget'):'')+
    '\n\nMATERIALS:\n'+(v('materials')||'[your shopping list]')+
    '\n\nTOOLS:\n'+(v('tools')||'[tools to gather]')+
    '\n\nSTEPS:\n'+(v('steps')||'[do them in this order]')+
    '\n\n--- DIY tips ---\nGather everything before you start — a missing screw kills momentum.\nDo the messy / dusty work first, then the careful bits.\nLeave time at the end for clean-up. The project is not done until the tools are away.\nKnow your limits: anything electrical or structural may need a pro.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
