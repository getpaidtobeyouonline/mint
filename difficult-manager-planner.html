<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Difficult Manager Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Difficult Manager Planner</h1>
  <p class="sub">Work out a calm, practical strategy for a tricky relationship with your boss.</p>

  <div class="panel">
    <label for="hard">What is hard about the relationship</label>
    <textarea id="hard" placeholder="Be specific — the patterns, not the personality"></textarea>
    <label for="pressures">Their likely pressures or style</label>
    <textarea id="pressures" placeholder="What they may be dealing with above and around them"></textarea>
    <label for="need">What you need from them</label>
    <input id="need" placeholder="e.g. clearer priorities, more notice, feedback">
    <label for="control">What is in your control</label>
    <textarea id="control" placeholder="How you communicate, prepare, and respond"></textarea>
    <label for="adapt">How you will adapt your approach</label>
    <textarea id="adapt" placeholder="e.g. brief written updates, ask for priorities upfront"></textarea>
    <button class="btn" onclick="gen()">Build Strategy</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['hard','pressures','need','control','adapt'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('dmp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('dmp_'+k,g(k).value)); });
  function gen(){
    const t='DIFFICULT MANAGER STRATEGY\n\nWHAT IS HARD:\n'+(v('hard')||'[the specific patterns]')+
    '\n\nTHEIR LIKELY PRESSURES / STYLE:\n'+(v('pressures')||'[what they may be carrying]')+
    '\n\nWHAT I NEED FROM THEM:\n'+(v('need')||'[your clear, reasonable need]')+
    '\n\nWHAT IS IN MY CONTROL:\n'+(v('control')||'[your responses and preparation]')+
    '\n\nHOW I WILL ADAPT:\n'+(v('adapt')||'[concrete changes to your approach]')+
    '\n\n--- Working with a difficult manager ---\nManage up: give them what they need before they ask for it.\nPut key things in writing so expectations are clear and on record.\nKeep your own record of wins and feedback.\nIf the behaviour is genuinely harmful, document it and consider HR or your next move.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
