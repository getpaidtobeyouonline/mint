<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Work Boundary Setter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Work Boundary Setter</h1>
  <p class="sub">Name a boundary you need at work — and plan how to set and hold it.</p>

  <div class="panel">
    <label for="area">The area</label>
    <input id="area" placeholder="e.g. after-hours emails, workload, meetings, interruptions">
    <label for="problem">What is not working right now</label>
    <textarea id="problem" placeholder="Be honest about the cost it is having on you"></textarea>
    <label for="boundary">The boundary you will set</label>
    <textarea id="boundary" placeholder="Clear and specific — e.g. no email replies after 6pm"></textarea>
    <label for="say">How you will communicate it</label>
    <textarea id="say" placeholder="The actual words you will use"></textarea>
    <label for="hold">How you will hold it</label>
    <input id="hold" placeholder="What you will do when it gets tested">
    <button class="btn" onclick="gen()">Build Boundary Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['area','problem','boundary','say','hold'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('wbs_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('wbs_'+k,g(k).value)); });
  function gen(){
    const t='WORK BOUNDARY PLAN'+(v('area')?'\nArea: '+v('area'):'')+
    '\n\nWHAT IS NOT WORKING:\n'+(v('problem')||'[the current cost to you]')+
    '\n\nMY BOUNDARY:\n'+(v('boundary')||'[the clear, specific limit]')+
    '\n\nHOW I WILL SAY IT:\n"'+(v('say')||'[the words you will use]')+'"'+
    '\n\nHOW I WILL HOLD IT:\n'+(v('hold')||'[your response when it is tested]')+
    '\n\n--- Boundary truths ---\nA boundary is information, not an apology — state it kindly and plainly.\nExpect it to be tested at first; calm consistency teaches people fast.\nYou are not responsible for other people’s disappointment when you protect your limits.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
