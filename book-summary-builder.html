<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Summary Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 56px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 150px; }
  .hint { font-size: .78rem; opacity: .6; margin-top: 3px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Book Summary Builder</h1>
  <p class="sub">Capture what a book taught you, so it actually sticks long after the last page.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="title">Book title</label><input id="title" placeholder="Title"></div>
      <div><label for="author">Author</label><input id="author" placeholder="Author"></div>
    </div>
    <label for="big">The big idea in one sentence</label>
    <input id="big" placeholder="If you could keep only one sentence...">
    <label for="takeaways">Top 3 takeaways (one per line)</label>
    <textarea id="takeaways" placeholder="The ideas you most want to remember"></textarea>
    <label for="quotes">Best quotes or passages</label>
    <textarea id="quotes" placeholder="Lines worth keeping"></textarea>
    <label for="apply">How I will apply this</label>
    <textarea id="apply" placeholder="What you will actually do differently"></textarea>
    <label for="rating">My rating &amp; who should read it</label>
    <input id="rating" placeholder="e.g. 4/5 — great for new managers">
    <button class="btn" onclick="gen()">Build Summary</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['title','author','big','takeaways','quotes','apply','rating'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('bsb_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('bsb_'+k,g(k).value)); });
  function lines(id){ return v(id).split('\n').map(s=>s.trim()).filter(Boolean); }
  function gen(){
    if(!v('title')){ alert('Enter the book title.'); return; }
    const tk=lines('takeaways');
    const t=`BOOK SUMMARY\n\n${v('title').toUpperCase()}${v('author')?'\nby '+v('author'):''}\n\nTHE BIG IDEA:\n${v('big')||'[one-sentence core message]'}\n\nKEY TAKEAWAYS:\n${tk.length?tk.map((x,i)=>`  ${i+1}. ${x}`).join('\n'):'  1. [your takeaways]'}\n\nQUOTES WORTH KEEPING:\n${v('quotes')||'[best passages]'}\n\nHOW I WILL APPLY IT:\n${v('apply')||'[what you will do differently]'}\n\nRATING & RECOMMENDATION:\n${v('rating')||'[your verdict]'}\n\n--- Tip ---\nRe-read this summary in a month. A book you cannot summarise is a book you have not really kept.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
