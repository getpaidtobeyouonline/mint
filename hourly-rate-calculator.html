<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Hourly Rate Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 600px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 10px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .res { text-align: center; background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 10px; padding: 20px; }
  .res .n { font-family: 'Playfair Display', serif; font-size: 2.6rem; color: #5AE57A; }
  .res .l { font-size: .9rem; opacity: .75; margin-top: 6px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
  .stat { flex: 1; min-width: 110px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 12px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: #5AE57A; }
  .stat .l { font-size: .68rem; opacity: .65; text-transform: uppercase; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Hourly Rate Calculator</h1>
  <p class="sub">Convert salary to hourly, hourly to salary, project to per-hour — three directions, one tool.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="salary">Annual salary ($)</label><input id="salary" type="number" min="0" value="80000" oninput="calc()"></div>
      <div><label for="hpw">Hours / week worked</label><input id="hpw" type="number" min="1" value="40" oninput="calc()"></div>
      <div><label for="wpy">Weeks / year</label><input id="wpy" type="number" min="1" value="48" oninput="calc()"></div>
    </div>
  </div>

  <div class="res">
    <div class="n" id="rate">$0</div>
    <div class="l">effective hourly rate</div>
    <div class="stats">
      <div class="stat"><div class="v" id="wk">$0</div><div class="l">/ week</div></div>
      <div class="stat"><div class="v" id="dy">$0</div><div class="l">/ day (8h)</div></div>
      <div class="stat"><div class="v" id="mo">$0</div><div class="l">/ month</div></div>
    </div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), n=id=>parseFloat(g(id).value)||0;
  ['salary','hpw','wpy'].forEach(k=>{ const s=localStorage.getItem('hrc_'+k); if(s!==null)g(k).value=s; });
  function calc(){
    ['salary','hpw','wpy'].forEach(k=>localStorage.setItem('hrc_'+k,g(k).value));
    const total=Math.max(1,n('hpw')*n('wpy'));
    const r=n('salary')/total;
    g('rate').textContent='$'+r.toFixed(2);
    g('wk').textContent='$'+Math.round(r*n('hpw')).toLocaleString();
    g('dy').textContent='$'+Math.round(r*8).toLocaleString();
    g('mo').textContent='$'+Math.round(r*n('hpw')*4.33).toLocaleString();
  }
  calc();
</script>
</body>
</html>
