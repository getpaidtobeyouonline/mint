<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Board Game Collection Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 90px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .filter { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 12px; }
  .chip { background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; border-radius: 20px; padding: 5px 12px; cursor: pointer; font-size: .82rem; }
  .chip.on { background: #5AE57A; color: #325132; border-color: #5AE57A; font-weight: 500; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; }
  .item .top { display: flex; justify-content: space-between; gap: 8px; }
  .item .nm { font-weight: 500; }
  .item .meta { font-size: .8rem; opacity: .7; }
  .x { cursor: pointer; opacity: .5; } .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Board Game Collection Tool</h1>
  <p class="sub">Catalogue your shelf — and find the right game for tonight's group.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Game</label><input id="name" placeholder="Game name"></div>
      <div><label>Players</label><input id="players" placeholder="e.g. 2-4"></div>
      <div><label>Time</label><input id="time" placeholder="e.g. 30 min"></div>
      <div><label>Weight</label><select id="weight"><option>Light</option><option>Medium</option><option>Heavy</option></select></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div class="filter" id="filter"></div>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('bgct')||'[]');
  let f='All';
  const save=()=>localStorage.setItem('bgct',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('name')){ alert('Enter a game.'); return; }
    R.push({n:v('name'),p:v('players'),t:v('time'),w:g('weight').value});
    ['name','players','time'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all games?')){ R=[]; save(); render(); } }
  function setF(x){ f=x; render(); }
  function render(){
    const FS=['All','Light','Medium','Heavy'];
    g('filter').innerHTML=FS.map(x=>'<span class="chip'+(x===f?' on':'')+'" onclick="setF(\''+x+'\')">'+x+'</span>').join('');
    const L=g('list');
    const list=f==='All'?R:R.filter(x=>x.w===f);
    if(!list.length){ L.innerHTML='<div class="empty">'+(R.length?'No '+f.toLowerCase()+' games.':'No games yet — log your first.')+'</div>'; return; }
    L.innerHTML=list.map((x)=>{ const i=R.indexOf(x); return '<div class="item"><div class="top"><span class="nm">'+esc(x.n)+'</span><span class="x" onclick="del('+i+')">✕</span></div><div class="meta">'+x.w+(x.p?'  ·  '+esc(x.p)+' players':'')+(x.t?'  ·  '+esc(x.t):'')+'</div></div>'; }).join('');
  }
  render();
</script>
</body>
</html>
