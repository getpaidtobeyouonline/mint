<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cover Letter Outline Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 54px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 140px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Cover Letter Outline Tool</h1>
  <p class="sub">Map out a focused, four-paragraph cover letter before you write a word.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="role">Role you are applying for</label><input id="role" placeholder="Job title"></div>
      <div><label for="company">Company</label><input id="company" placeholder="Company name"></div>
    </div>
    <label for="hook">Opening hook — why this role, why now</label>
    <textarea id="hook" placeholder="A genuine reason you want this specific job"></textarea>
    <label for="fit">Your strongest relevant experience (with proof)</label>
    <textarea id="fit" placeholder="One key win that maps to what they need"></textarea>
    <label for="value">What you would bring to them</label>
    <textarea id="value" placeholder="The problem you would help solve in this role"></textarea>
    <label for="why">Why this company specifically</label>
    <textarea id="why" placeholder="Something true about their work, values or product"></textarea>
    <button class="btn" onclick="gen()">Build Outline</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['role','company','hook','fit','value','why'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('clo_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('clo_'+k,g(k).value)); });
  function gen(){
    const t='COVER LETTER OUTLINE\n'+(v('role')?'Role: '+v('role'):'')+(v('company')?'  |  '+v('company'):'')+
    '\n\n1. OPENING (2-3 sentences)\nState the role and lead with your hook:\n'+(v('hook')||'[why this role excites you]')+
    '\n\n2. PROOF YOU CAN DO IT (1 short paragraph)\nGive one concrete, relevant win:\n'+(v('fit')||'[your strongest matching experience]')+
    '\n\n3. WHAT YOU BRING (1 short paragraph)\nConnect your strength to their need:\n'+(v('value')||'[the value you add here]')+
    '\n\n4. WHY THEM + CLOSE (2-3 sentences)\nShow you did your homework, then ask for the conversation:\n'+(v('why')||'[why this company specifically]')+
    '\n\n--- Reminders ---\nKeep it under one page. Address a real person if you can.\nMatch their language. End with a confident, specific call to action.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
