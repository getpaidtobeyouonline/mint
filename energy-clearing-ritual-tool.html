<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Clearing Ritual Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 140px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  .note { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; font-size: .8rem; opacity: .75; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Energy Clearing Ritual Tool</h1>
  <p class="sub">Design a simple, intentional ritual to clear and refresh your energy or space.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="what">What you are clearing</label><select id="what"><option>My home or a room</option><option>Myself / my energy</option><option>An object</option><option>A workspace</option></select></div>
      <div><label for="method">Method</label><select id="method"><option>Sound (bell, singing bowl, clapping)</option><option>Smoke (herbs, incense)</option><option>Salt</option><option>Water</option><option>Visualisation &amp; breath</option><option>Opening windows &amp; fresh air</option></select></div>
    </div>
    <label for="intention">Your intention</label>
    <textarea id="intention" placeholder="What you are releasing and what you are inviting in"></textarea>
    <label for="words">Words you will say</label>
    <textarea id="words" placeholder="A blessing, affirmation or simple statement"></textarea>
    <button class="btn" onclick="gen()">Build Ritual</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['what','method','intention','words'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('ecr_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('ecr_'+k,g(k).value)); });
  function gen(){
    const t='ENERGY CLEARING RITUAL\n\nCLEARING: '+g('what').value+'\nMETHOD: '+g('method').value+
    '\n\n--- THE RITUAL ---\n\n1. PREPARE\n  Pause. Take three slow breaths. Set down distractions.\n\n2. SET THE INTENTION\n  '+(v('intention')||'[what you release and what you invite in]')+
    '\n\n3. MOVE THROUGH THE SPACE\n  Using your chosen method, move slowly and mindfully, corner to corner, or around yourself crown to feet.\n\n4. SPEAK YOUR WORDS\n  "'+(v('words')||'[your blessing or statement]')+'"\n\n5. CLOSE\n  Give thanks. Take one more breath. Notice how the energy feels now.\n\n--- A note ---\nThe ritual works through your intention and attention, not the tools.\nUse what feels right for you. Stay safe with smoke, flame and ventilation.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
