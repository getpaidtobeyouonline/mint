<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Business Expense Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 780px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat { flex: 1; min-width: 120px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 13px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: #5AE57A; }
  .stat .l { font-size: .69rem; opacity: .65; text-transform: uppercase; }
  .row2 { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 7px; padding: 9px 13px; margin-bottom: 6px; display: flex; justify-content: space-between; gap: 10px; font-size: .87rem; flex-wrap: wrap; }
  .row2 .x { cursor: pointer; opacity: .5; } .row2 .x:hover { opacity: 1; color: #5AE57A; }
  .by { background: #3C603C; border: 1px solid #4C724C; border-radius: 7px; padding: 7px 11px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: .85rem; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Business Expense Tracker</h1>
  <p class="sub">Log every business spend with a category. Comes tax time, it's already done.</p>

  <div class="panel">
    <div class="row">
      <div><label>Date</label><input id="dt" type="date"></div>
      <div style="flex:2"><label>What</label><input id="nm" placeholder="e.g. Adobe subscription"></div>
      <div><label>$</label><input id="amt" type="number" min="0" step="0.01"></div>
      <div><label>Category</label><select id="cat"><option>Software / tools</option><option>Marketing / ads</option><option>Contractors</option><option>Office / supplies</option><option>Travel</option><option>Education</option><option>Fees</option><option>Other</option></select></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="sTot">$0</div><div class="l">Year-to-date</div></div>
    <div class="stat"><div class="v" id="sMo">$0</div><div class="l">This month</div></div>
    <div class="stat"><div class="v" id="sN">0</div><div class="l">Entries</div></div>
  </div>

  <div class="panel">
    <div style="font-family:'Playfair Display',serif;color:#5AE57A;margin-bottom:8px">By category</div>
    <div id="byCat"></div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let E=JSON.parse(localStorage.getItem('fbet')||'[]');
  const save=()=>localStorage.setItem('fbet',JSON.stringify(E));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  g('dt').value=new Date().toISOString().slice(0,10);
  function add(){ const nm=v('nm'), a=parseFloat(g('amt').value)||0; if(!nm||!a){alert('Add name and amount.');return;}
    E.push({d:g('dt').value,nm,a,c:g('cat').value}); ['nm','amt'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ E.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ E=[]; save(); render(); } }
  function render(){
    const yr=new Date().getFullYear()+'';
    const ytd=E.filter(x=>x.d.startsWith(yr)).reduce((s,x)=>s+x.a,0);
    const mo=new Date().toISOString().slice(0,7);
    const thisMo=E.filter(x=>x.d.startsWith(mo)).reduce((s,x)=>s+x.a,0);
    g('sTot').textContent='$'+Math.round(ytd).toLocaleString();
    g('sMo').textContent='$'+Math.round(thisMo).toLocaleString();
    g('sN').textContent=E.length;
    const by={}; E.forEach(x=>by[x.c]=(by[x.c]||0)+x.a);
    g('byCat').innerHTML = Object.keys(by).length?Object.entries(by).sort((a,b)=>b[1]-a[1]).map(([c,a])=>`<div class="by"><span>${esc(c)}</span><span>$${a.toLocaleString()}</span></div>`).join(''):'<div class="empty">No expenses yet.</div>';
    const L=g('list');
    if(!E.length){ L.innerHTML='<div class="empty">No expenses logged.</div>'; return; }
    L.innerHTML=[...E].map((x,i)=>({x,i})).sort((a,b)=>a.x.d<b.x.d?1:-1).map(({x,i})=>`<div class="row2"><span><b style="color:#5AE57A">${x.d}</b> · ${esc(x.nm)} · ${esc(x.c)}</span><span>$${x.a.toLocaleString()} <span class="x" onclick="del(${i})">✕</span></span></div>`).join('');
  }
  render();
</script>
</body>
</html>
