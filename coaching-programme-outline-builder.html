<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Coaching Programme Outline Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 54px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 140px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Coaching Programme Outline Builder</h1>
  <p class="sub">Shape a signature coaching programme clients can clearly see themselves in.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="name">Programme name</label><input id="name" placeholder="The name of your programme"></div>
      <div><label for="length">Duration</label><input id="length" placeholder="e.g. 12 weeks"></div>
    </div>
    <label for="who">Who it is for</label>
    <input id="who" placeholder="Your ideal client for this programme">
    <label for="promise">The promise / core outcome</label>
    <textarea id="promise" placeholder="The transformation it delivers"></textarea>
    <label for="phases">Phases or modules (one per line)</label>
    <textarea id="phases" placeholder="The journey, broken into stages"></textarea>
    <label for="included">What is included</label>
    <textarea id="included" placeholder="Calls, resources, support, community"></textarea>
    <button class="btn" onclick="gen()">Build Outline</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['name','length','who','promise','phases','included'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('cpob_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('cpob_'+k,g(k).value)); });
  function gen(){
    const ph=v('phases').split('\n').filter(x=>x.trim()).map((x,i)=>'  Phase '+(i+1)+': '+x.trim()).join('\n')||'  [your programme phases]';
    const t='COACHING PROGRAMME OUTLINE\n\nPROGRAMME: '+(v('name')||'[programme name]')+(v('length')?'  ('+v('length')+')':'')+
    '\n\nFOR: '+(v('who')||'[your ideal client]')+
    '\n\nTHE PROMISE:\n'+(v('promise')||'[the core transformation]')+
    '\n\nTHE JOURNEY:\n'+ph+
    '\n\nWHAT IS INCLUDED:\n'+(v('included')||'[calls, resources, support]')+
    '\n\n--- Strong programme design ---\nEach phase should produce a visible result, not just lessons.\nName your phases — it makes the journey feel real and ownable.\nUnder-promise the timeline; over-deliver on the support.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
