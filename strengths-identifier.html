<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strengths Identifier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  textarea { min-height: 60px; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .res { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
  .res h4 { color: #5AE57A; font-size: .76rem; text-transform: uppercase; margin-bottom: 5px; }
  .res p { font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Strengths Identifier</h1>
  <p class="sub">Surface your real strengths by answering 4 questions you cannot fake.</p>

  <div class="panel">
    <label for="energy">What kind of work leaves you energised, not drained?</label>
    <textarea id="energy" placeholder="The activities that recharge you, even if they are hard"></textarea>
    <label for="praise">What do people thank you for, again and again?</label>
    <textarea id="praise" placeholder="The compliments you brush off — those are clues"></textarea>
    <label for="easy">What feels easy to you that others find hard?</label>
    <textarea id="easy" placeholder="The things you assume everyone can do"></textarea>
    <label for="losing">When do you lose track of time?</label>
    <textarea id="losing" placeholder="Activities where 2 hours feels like 20 minutes"></textarea>
    <button class="btn" onclick="gen()">Find My Strengths</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['energy','praise','easy','losing'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('si_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('si_'+k,g(k).value)); });
  function gen(){
    g('out').innerHTML='<div class="res"><h4>What energises you</h4><p>'+esc(v('energy')||'—')+'</p></div>'+
      '<div class="res"><h4>What people thank you for</h4><p>'+esc(v('praise')||'—')+'</p></div>'+
      '<div class="res"><h4>What feels easy</h4><p>'+esc(v('easy')||'—')+'</p></div>'+
      '<div class="res"><h4>Where time disappears</h4><p>'+esc(v('losing')||'—')+'</p></div>'+
      '<div class="res" style="border-left-color:#BFD8BF"><h4>The pattern</h4><p>Look across the four answers — the overlap is your real strength. The work, person, or environment that combines all of these is where you should be spending the most of your time.</p></div>';
    g('out').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function copyOut(){ const t=g('out').innerText; if(!t){alert('Generate first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
