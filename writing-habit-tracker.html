<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writing Habit Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .stats { display: flex; gap: 8px; margin-bottom: 12px; }
  .stat { flex: 1; background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 8px; text-align: center; }
  .stat .n { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #5AE57A; }
  .stat .l { font-size: .68rem; text-transform: uppercase; opacity: .6; }
  .bar { height: 8px; background: #5A845A; border-radius: 5px; overflow: hidden; margin: 4px 0 10px; }
  .bar i { display: block; height: 100%; background: #5AE57A; width: 0; transition: width .4s; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 8px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; gap: 8px; font-size: .9rem; }
  .item .x { cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Writing Habit Tracker</h1>
  <p class="sub">Track words written and watch your streak grow — daily reps build books.</p>

  <div class="panel">
    <div class="row">
      <div><label>Daily goal (words)</label><input id="goal" type="number" min="0" placeholder="500"></div>
      <div><label>Today's words</label><input id="words" type="number" min="0" placeholder="how many today?"></div>
      <div><label>Date</label><input id="date" type="date"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Log</button></div>
    </div>
  </div>

  <div class="panel">
    <div class="stats" id="stats"></div>
    <div class="bar"><i id="fill"></i></div>
    <div style="font-size:.8rem;opacity:.7;text-align:center" id="todayMsg">—</div>
    <div id="list" style="margin-top:14px"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  let R=JSON.parse(localStorage.getItem('wht')||'[]');
  let goal=parseFloat(localStorage.getItem('wht_goal')||'500');
  g('goal').value=goal;
  g('goal').addEventListener('input',()=>{ goal=parseFloat(g('goal').value)||0; localStorage.setItem('wht_goal',goal); render(); });
  const save=()=>localStorage.setItem('wht',JSON.stringify(R));
  function add(){ const w=parseFloat(g('words').value)||0; const d=g('date').value||new Date().toISOString().slice(0,10);
    if(!w){ alert('Enter words written.'); return; }
    R=R.filter(e=>e.d!==d); R.unshift({d,w}); g('words').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all entries?')){ R=[]; save(); render(); } }
  function streak(){
    let s=0, d=new Date();
    for(;;){ const k=d.toISOString().slice(0,10); if(R.some(e=>e.d===k && e.w>=goal)){ s++; d.setDate(d.getDate()-1); } else break; }
    return s;
  }
  function render(){
    const total=R.reduce((s,x)=>s+x.w,0);
    const today=new Date().toISOString().slice(0,10);
    const tw=(R.find(x=>x.d===today)||{w:0}).w;
    g('stats').innerHTML='<div class="stat"><div class="n">'+streak()+'</div><div class="l">day streak</div></div><div class="stat"><div class="n">'+total+'</div><div class="l">total words</div></div><div class="stat"><div class="n">'+R.length+'</div><div class="l">days logged</div></div>';
    const pct=goal?Math.min(100,Math.round(tw/goal*100)):0;
    g('fill').style.width=pct+'%';
    g('todayMsg').textContent='Today: '+tw+' / '+goal+' words';
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No words yet — even 50 counts as showing up.</div>'; return; }
    L.innerHTML=R.map((x,i)=>'<div class="item"><span>'+x.d+'</span><span style="color:#5AE57A">'+x.w+' words</span><span class="x" onclick="del('+i+')">✕</span></div>').join('');
  }
  render();
</script>
</body>
</html>
