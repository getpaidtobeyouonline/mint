<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Preparation Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .count { text-align: center; margin-bottom: 12px; }
  .count .n { font-family: 'Playfair Display', serif; font-size: 2.6rem; color: #5AE57A; }
  .track { background: #3C603C; border-radius: 5px; height: 12px; overflow: hidden; margin: 8px 0; }
  .track>i { display: block; height: 100%; background: #5AE57A; transition: width .3s; }
  .topic { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 8px 12px; margin-bottom: 5px; display: flex; align-items: center; gap: 9px; font-size: .87rem; }
  .box { width: 19px; height: 19px; border: 2px solid #5AE57A; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .7rem; font-weight: 700; }
  .box.on { background: #5AE57A; color: #325132; }
  .topic.done .lb { text-decoration: line-through; opacity: .5; }
  .topic .x { margin-left: auto; cursor: pointer; opacity: .5; } .topic .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 10px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Exam Preparation Planner</h1>
  <p class="sub">Count down to the exam and tick off every topic until you are fully revised.</p>

  <div class="panel">
    <div class="row">
      <div><label>Exam name</label><input id="exam" placeholder="e.g. Biology final" onchange="saveExam()"></div>
      <div><label>Exam date</label><input id="date" type="date" onchange="render()"></div>
    </div>
    <div class="count" style="margin-top:12px"><span class="n" id="days">—</span><div style="opacity:.7;font-size:.85rem" id="dlabel">set the exam date</div></div>
    <div class="track"><i id="bar" style="width:0%"></i></div>
    <div style="text-align:center;font-size:.85rem;opacity:.8" id="meta"></div>
  </div>

  <div class="panel">
    <label>Add a topic to revise</label>
    <div class="row">
      <div style="flex:3"><input id="topic" placeholder="e.g. Cell respiration" onkeydown="if(event.key==='Enter')add()"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
    <div id="list" style="margin-top:10px"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  let R=JSON.parse(localStorage.getItem('epp')||'[]');
  const save=()=>localStorage.setItem('epp',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  if(localStorage.getItem('epp_exam'))g('exam').value=localStorage.getItem('epp_exam');
  if(localStorage.getItem('epp_date'))g('date').value=localStorage.getItem('epp_date');
  function saveExam(){ localStorage.setItem('epp_exam',g('exam').value); }
  function add(){ const t=g('topic').value.trim(); if(!t)return; R.push({t,done:false}); g('topic').value=''; save(); render(); }
  function toggle(i){ R[i].done=!R[i].done; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all topics?')){ R=[]; save(); render(); } }
  function render(){
    if(g('date').value){
      localStorage.setItem('epp_date',g('date').value);
      const d=Math.ceil((new Date(g('date').value)-new Date().setHours(0,0,0,0))/86400000);
      g('days').textContent= d>=0?d:'—';
      g('dlabel').textContent= d>1?'days until the exam':d===1?'day to go!':d===0?'Exam is today — you've got this':'exam date has passed';
    } else { g('days').textContent='—'; g('dlabel').textContent='set the exam date'; }
    const done=R.filter(x=>x.done).length;
    g('bar').style.width=(R.length?Math.round(done/R.length*100):0)+'%';
    g('meta').textContent=R.length?(done+' / '+R.length+' topics revised'):'';
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No topics added yet.</div>'; return; }
    L.innerHTML=[...R].map((x,i)=>({x,i})).sort((a,b)=>a.x.done-b.x.done).map(({x,i})=>
      '<div class="topic'+(x.done?' done':'')+'"><span class="box'+(x.done?' on':'')+'" onclick="toggle('+i+')">'+(x.done?'✓':'')+'</span><span class="lb">'+esc(x.t)+'</span><span class="x" onclick="del('+i+')">✕</span></div>').join('');
  }
  render();
</script>
</body>
</html>
