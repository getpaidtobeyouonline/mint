<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Family Command Centre Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 48px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .lead { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 11px 14px; font-size: .86rem; margin-bottom: 6px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Family Command Centre Builder</h1>
  <p class="sub">Plan a household hub — one spot where the whole family's logistics live.</p>

  <div class="panel">
    <div class="lead">A command centre is the wall, shelf or corner where your family stays organised. Plan what yours needs.</div>
    <label for="where">Where it will go</label>
    <input id="where" placeholder="e.g. Kitchen wall by the back door">
    <label for="calendar">Calendar / scheduling element</label>
    <input id="calendar" placeholder="e.g. Large wall calendar everyone can see">
    <label for="zones">Zones / sections you want</label>
    <textarea id="zones" placeholder="e.g. Family calendar, this-week board, chore chart, menu, in-tray for post"></textarea>
    <label for="info">Key info to display</label>
    <textarea id="info" placeholder="Emergency numbers, school times, routines, contacts"></textarea>
    <label for="supplies">A spot for everyday supplies</label>
    <input id="supplies" placeholder="e.g. Hooks for keys, tray for chargers, pens, school letters">
    <label for="routine">The routine that keeps it working</label>
    <textarea id="routine" placeholder="e.g. A 5-minute Sunday family sync to update the week"></textarea>
    <button class="btn" onclick="gen()">Build My Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['where','calendar','zones','info','supplies','routine'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('fccb_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('fccb_'+k,g(k).value)); });
  function gen(){
    const t=`FAMILY COMMAND CENTRE PLAN\n\nLOCATION:\n${v('where')||'[where it goes]'}\n\nCALENDAR ELEMENT:\n${v('calendar')||'[how you track dates]'}\n\nZONES:\n${v('zones')||'[the sections you need]'}\n\nKEY INFO ON DISPLAY:\n${v('info')||'[numbers, times, routines]'}\n\nEVERYDAY SUPPLIES SPOT:\n${v('supplies')||'[keys, post, chargers...]'}\n\nTHE ROUTINE THAT KEEPS IT WORKING:\n${v('routine')||'[a weekly family sync]'}\n\n--- The secret ---\nA command centre only works if it is USED. A short weekly family check-in to update it is what turns a nice board into a real system.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
