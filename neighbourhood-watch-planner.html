<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neighbourhood Watch Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Neighbourhood Watch Planner</h1>
  <p class="sub">Plan a simple, friendly scheme that helps a street look out for each other.</p>

  <div class="panel">
    <label for="area">Area covered</label>
    <input id="area" placeholder="e.g. Our street, numbers 1-30">
    <label for="coordinator">Coordinator(s) &amp; contact</label>
    <input id="coordinator" placeholder="Who organises it, and how to reach them">
    <label for="members">How neighbours will join &amp; stay in touch</label>
    <textarea id="members" placeholder="e.g. A group chat, a noticeboard, regular catch-ups"></textarea>
    <label for="focus">What the scheme will focus on</label>
    <textarea id="focus" placeholder="e.g. Reporting suspicious activity, checking on the vulnerable, holiday house-watching"></textarea>
    <label for="reporting">How to report concerns (and what is an emergency)</label>
    <textarea id="reporting" placeholder="Non-emergency vs emergency — make this crystal clear"></textarea>
    <label for="meetings">Meeting / check-in rhythm</label>
    <input id="meetings" placeholder="e.g. A short catch-up every few months">
    <button class="btn" onclick="gen()">Build Scheme Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['area','coordinator','members','focus','reporting','meetings'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('nwp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('nwp_'+k,g(k).value)); });
  function gen(){
    const t=`NEIGHBOURHOOD WATCH SCHEME PLAN\n\nAREA COVERED:\n${v('area')||'[the streets/homes included]'}\n\nCOORDINATOR(S):\n${v('coordinator')||'[who organises it]'}\n\nJOINING & STAYING IN TOUCH:\n${v('members')||'[how neighbours connect]'}\n\nWHAT WE FOCUS ON:\n${v('focus')||'[the scheme priorities]'}\n\nREPORTING CONCERNS:\n${v('reporting')||'[non-emergency vs emergency]'}\n\nMEETINGS / CHECK-INS:\n${v('meetings')||'[how often you meet]'}\n\n--- Keep it positive ---\nA good scheme is about community and care, not suspicion.\nAlways report genuine emergencies to the proper services — never put yourself at risk.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
