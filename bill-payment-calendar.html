<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Bill Payment Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 80px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .total { text-align: center; margin-bottom: 12px; }
  .total .n { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; }
  .bill { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 8px 12px; margin-bottom: 5px; display: flex; align-items: center; gap: 9px; font-size: .87rem; }
  .bill.soon { border-left: 3px solid #5AE57A; }
  .day { background: #3C603C; border-radius: 6px; width: 38px; height: 38px; flex: none; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .day .d { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: #5AE57A; line-height: 1; }
  .day .l { font-size: .54rem; opacity: .6; text-transform: uppercase; }
  .bill .x { margin-left: auto; cursor: pointer; opacity: .5; } .bill .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 10px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Bill Payment Calendar</h1>
  <p class="sub">List monthly bills by the day they are due — see what is coming and never miss one.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Bill</label><input id="name" placeholder="e.g. Electricity"></div>
      <div><label>Day of month</label><input id="day" type="number" min="1" max="31" placeholder="1-31"></div>
      <div><label>Amount</label><input id="amt" type="number" min="0" step="0.01" placeholder="0"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div class="total"><span class="n" id="total">0</span><div style="opacity:.7;font-size:.85rem">total monthly bills</div></div>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('bpc')||'[]');
  const save=()=>localStorage.setItem('bpc',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const fmt=n=>n.toLocaleString(undefined,{maximumFractionDigits:0});
  function add(){ const d=parseInt(g('day').value)||0, a=parseFloat(g('amt').value)||0;
    if(!v('name')||!d){ alert('Enter a bill name and due day.'); return; }
    R.push({n:v('name'),d:Math.min(31,Math.max(1,d)),a}); g('name').value=''; g('day').value=''; g('amt').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all bills?')){ R=[]; save(); render(); } }
  function render(){
    g('total').textContent=fmt(R.reduce((s,x)=>s+x.a,0));
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No bills added yet.</div>'; return; }
    const todayD=new Date().getDate();
    L.innerHTML=R.map((x,i)=>({x,i})).sort((a,b)=>a.x.d-b.x.d).map(({x,i})=>{
      const soon=(x.d>=todayD&&x.d-todayD<=5);
      return '<div class="bill'+(soon?' soon':'')+'"><span class="day"><span class="d">'+x.d+'</span><span class="l">day</span></span><span><b style="color:#5AE57A">'+esc(x.n)+'</b>'+(x.a?'<br><span style="opacity:.7">'+fmt(x.a)+'</span>':'')+'</span><span class="x" onclick="del('+i+')">✕</span></div>';
    }).join('');
  }
  render();
</script>
</body>
</html>
