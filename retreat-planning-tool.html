<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Retreat Planning Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Retreat Planning Tool</h1>
  <p class="sub">Plan a transformational retreat from theme to logistics in one place.</p>

  <div class="panel">
    <label for="theme">Retreat theme &amp; promise</label>
    <textarea id="theme" placeholder="What the retreat is about and what guests leave with"></textarea>
    <div class="grid">
      <div><label for="length">Length</label><input id="length" placeholder="e.g. 3 days"></div>
      <div><label for="guests">Number of guests</label><input id="guests" placeholder="e.g. 10"></div>
    </div>
    <label for="location">Location &amp; venue</label>
    <input id="location" placeholder="Where it will be held">
    <label for="flow">Daily flow</label>
    <textarea id="flow" placeholder="e.g. morning practice, deep work, free time, evening circle"></textarea>
    <label for="logistics">Key logistics to sort</label>
    <textarea id="logistics" placeholder="Travel, meals, accommodation, materials, helpers"></textarea>
    <label for="budget">Budget &amp; pricing notes</label>
    <input id="budget" placeholder="Costs, ticket price, deposit terms">
    <button class="btn" onclick="gen()">Build Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['theme','length','guests','location','flow','logistics','budget'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('rpt_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('rpt_'+k,g(k).value)); });
  function gen(){
    const t='RETREAT PLAN\n\nTHEME & PROMISE:\n'+(v('theme')||'[the retreat theme and outcome]')+
    '\n\nFORMAT: '+(v('length')||'[length]')+(v('guests')?'  |  '+v('guests')+' guests':'')+
    '\n\nLOCATION:\n'+(v('location')||'[venue and place]')+
    '\n\nDAILY FLOW:\n'+(v('flow')||'[the rhythm of each day]')+
    '\n\nLOGISTICS TO SORT:\n'+(v('logistics')||'[travel, meals, accommodation, helpers]')+
    '\n\nBUDGET & PRICING:\n'+(v('budget')||'[costs, ticket price, deposits]')+
    '\n\n--- Retreat planning tips ---\nLeave white space — guests need rest, not a packed schedule.\nVisit the venue or vet it thoroughly before you commit.\nTake deposits early and set a clear minimum-numbers cancellation date.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
