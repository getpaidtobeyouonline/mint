<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Plain Text vs HTML Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .res { text-align: center; background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 10px; padding: 22px; margin-bottom: 12px; }
  .res .pick { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; }
  .res .vd { opacity: .8; margin-top: 4px; }
  .pros { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
  .pros h4 { color: #5AE57A; font-size: .9rem; margin-bottom: 4px; } .pros li { margin-left:16px; font-size:.9rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Plain Text vs HTML Checker</h1>
  <p class="sub">Pretty templates feel professional but often convert worse. Find the right format for the email you're about to send.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="type">This email is mostly</label><select id="type" onchange="calc()"><option value="personal">A personal/story/relational email</option><option value="info">Informational / educational</option><option value="promo">Promo / sale / launch</option><option value="newsletter">Newsletter with multiple sections</option><option value="trans">Transactional (receipt, login)</option></select></div>
      <div><label for="aud">Your audience</label><select id="aud" onchange="calc()"><option value="creator">Creator-style (solopreneur, coach)</option><option value="brand">Bigger brand / e-commerce</option><option value="b2b">B2B</option></select></div>
    </div>
    <label for="goal">Primary goal</label>
    <select id="goal" onchange="calc()"><option value="reply">Get a reply / start a conversation</option><option value="click">Get a click to a page</option><option value="brand">Brand awareness / aesthetics</option></select>
  </div>

  <div class="res"><div class="pick" id="pick">—</div><div class="vd" id="vd"></div></div>
  <div id="why"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  ['type','aud','goal'].forEach(k=>{ const s=localStorage.getItem('pth_'+k); if(s!==null)g(k).value=s; });
  function calc(){
    ['type','aud','goal'].forEach(k=>localStorage.setItem('pth_'+k,g(k).value));
    const t=g('type').value, a=g('aud').value, goal=g('goal').value;
    let score=0; // positive = plain, negative = HTML
    if(t==='personal') score+=2; if(t==='info') score+=1; if(t==='newsletter') score-=1; if(t==='promo'&&a==='brand') score-=2; if(t==='trans') score-=1;
    if(a==='creator') score+=1; if(a==='brand') score-=1;
    if(goal==='reply') score+=2; if(goal==='brand') score-=2;
    const pick = score>=2?['Plain text','Looks like a one-to-one email — highest reply & deliverability for personal/relationship-led messages.']
      : score<=-2?['Designed HTML','Visuals carry weight here — product imagery, brand polish, multi-section layout earn their place.']
      : ['Lightly styled HTML','Best of both: clean type, one image at most, looks personal but on-brand.'];
    g('pick').textContent=pick[0]; g('vd').textContent=pick[1];
    g('why').innerHTML=`<div class="pros"><h4>Why plain text often wins</h4><ul>
      <li>Inboxes a person, not a brand &mdash; deliverability bumps</li>
      <li>Reads as a 1:1 message &mdash; more replies, more saves</li>
      <li>No image clipping, no broken layouts on mobile</li>
      </ul></div>
      <div class="pros"><h4>When HTML earns its keep</h4><ul>
      <li>Product imagery is the offer (e.g. e-commerce, art)</li>
      <li>Multi-section newsletters with clear hierarchy</li>
      <li>Branded launch announcements where polish builds trust</li>
      </ul></div>
      <div class="pros"><h4>The rule</h4><ul><li>If the email could be sent from a person, write it like one. If it can't, design it well.</li></ul></div>`;
  }
  calc();
</script>
</body>
</html>
