<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Fasting and Prayer Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, textarea, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 48px; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 120px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 18px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 10px; }
  .total { text-align: center; margin-bottom: 12px; }
  .total .n { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; }
  .entry { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; margin-bottom: 6px; }
  .entry .d { font-size: .77rem; color: #5AE57A; display: flex; justify-content: space-between; }
  .entry .x { cursor: pointer; opacity: .5; } .entry .x:hover { opacity: 1; }
  .entry p { font-size: .89rem; white-space: pre-wrap; margin-top: 3px; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  .note { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 9px 12px; font-size: .79rem; opacity: .72; margin-top: 10px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Fasting and Prayer Tracker</h1>
  <p class="sub">Hold your seasons of fasting and prayer with intention and reflection.</p>

  <div class="panel">
    <div class="row">
      <div><label>Type</label><select id="type"><option>Prayer focus</option><option>Partial fast</option><option>Full-day fast</option><option>Fast from (something)</option><option>Other</option></select></div>
      <div><label>Date</label><input id="date" type="date"></div>
    </div>
    <label>Your intention</label>
    <input id="intent" placeholder="What you are praying into or seeking">
    <label>Reflection (optional)</label>
    <textarea id="note" placeholder="What you noticed, felt or received"></textarea>
    <button class="btn" onclick="add()">Log Entry</button>
    <div class="note">Fast wisely and gently. If you have any health condition or concern, speak to a doctor first.</div>
  </div>

  <div class="panel">
    <div class="total"><span class="n" id="total">0</span><div style="opacity:.7;font-size:.85rem">entries logged</div></div>
    <div id="list"></div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('fpt')||'[]');
  const save=()=>localStorage.setItem('fpt',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('intent')){ alert('Write your intention.'); return; }
    R.unshift({t:g('type').value,d:g('date').value,i:v('intent'),n:v('note')});
    g('intent').value=''; g('note').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function render(){
    g('total').textContent=R.length;
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">Your entries will appear here.</div>'; return; }
    L.innerHTML=R.map((x,i)=>'<div class="entry"><div class="d"><span>'+x.t+(x.d?'  ·  '+x.d:'')+'</span><span class="x" onclick="del('+i+')">✕</span></div><p><b>'+esc(x.i)+'</b>'+(x.n?'\n'+esc(x.n):'')+'</p></div>').join('');
  }
  render();
</script>
</body>
</html>
