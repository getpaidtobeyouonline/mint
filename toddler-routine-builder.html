<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toddler Routine Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 48px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Toddler Routine Builder</h1>
  <p class="sub">Build a predictable daily rhythm — toddlers thrive on knowing what comes next.</p>

  <div class="panel">
    <label for="morning">Morning (wake, breakfast, play)</label>
    <textarea id="morning" placeholder="e.g. 7am wake, milk, breakfast, get dressed, free play"></textarea>
    <label for="mid">Mid-morning (activity / outing)</label>
    <textarea id="mid" placeholder="e.g. park, group, craft, story time"></textarea>
    <label for="lunch">Lunch</label>
    <input id="lunch" placeholder="Time and what works for them">
    <label for="nap">Nap / quiet time</label>
    <input id="nap" placeholder="e.g. 1pm-3pm">
    <label for="afternoon">Afternoon (play, snack, outdoors)</label>
    <textarea id="afternoon" placeholder="What grounds and tires them gently"></textarea>
    <label for="dinner">Dinner</label>
    <input id="dinner" placeholder="Time and family rhythm">
    <label for="bedtime">Wind-down &amp; bedtime</label>
    <textarea id="bedtime" placeholder="Bath, pyjamas, story, lights out"></textarea>
    <button class="btn" onclick="gen()">Build Routine</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['morning','mid','lunch','nap','afternoon','dinner','bedtime'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('trb_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('trb_'+k,g(k).value)); });
  function gen(){
    const t='OUR TODDLER ROUTINE\n\nMORNING\n'+(v('morning')||'[wake, breakfast, play]')+
    '\n\nMID-MORNING\n'+(v('mid')||'[activity or outing]')+
    '\n\nLUNCH\n'+(v('lunch')||'[lunchtime]')+
    '\n\nNAP / QUIET TIME\n'+(v('nap')||'[nap window]')+
    '\n\nAFTERNOON\n'+(v('afternoon')||'[play, snack, outdoors]')+
    '\n\nDINNER\n'+(v('dinner')||'[dinner time]')+
    '\n\nWIND-DOWN & BEDTIME\n'+(v('bedtime')||'[bath, story, sleep]')+
    '\n\n--- Tips ---\nToddlers do best with predictable rhythm — exact times can flex.\nBuild in outdoor time most days — fresh air helps everything.\nKeep transitions slow with a warning ("five more minutes").';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
