<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Slow Travel Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .lead { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 11px 14px; font-size: .87rem; font-style: italic; margin-bottom: 6px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Slow Travel Planner</h1>
  <p class="sub">Fewer places, deeper. Plan a trip built on living somewhere, not ticking it off.</p>

  <div class="panel">
    <div class="lead">Slow travel trades the highlight reel for real connection — staying longer, going deeper, rushing less.</div>
    <label for="base">Where you will base yourself (and how long)</label>
    <input id="base" placeholder="e.g. One month in a small Italian town">
    <label for="why">Why this place — what you want from it</label>
    <textarea id="why" placeholder="The experience you are after, not the sights"></textarea>
    <label for="routine">A daily rhythm you want to settle into</label>
    <textarea id="routine" placeholder="e.g. Morning market, afternoon writing, evening walk"></textarea>
    <label for="local">How you will connect with local life</label>
    <textarea id="local" placeholder="Language class, regular cafe, neighbours, a hobby"></textarea>
    <label for="explore">A few things to explore — slowly, no rush</label>
    <textarea id="explore" placeholder="Day trips and discoveries, spread out over time"></textarea>
    <label for="resist">What you will deliberately NOT do</label>
    <input id="resist" placeholder="e.g. No cramming, no checklist tourism">
    <button class="btn" onclick="gen()">Build Slow Travel Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['base','why','routine','local','explore','resist'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('slowtp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('slowtp_'+k,g(k).value)); });
  function gen(){
    const t=`SLOW TRAVEL PLAN\n\nMY BASE:\n${v('base')||'[where and how long]'}\n\nWHY THIS PLACE:\n${v('why')||'[the experience you want]'}\n\nMY DAILY RHYTHM:\n${v('routine')||'[a gentle daily shape]'}\n\nCONNECTING WITH LOCAL LIFE:\n${v('local')||'[how you go beyond tourist]'}\n\nTO EXPLORE — SLOWLY:\n${v('explore')||'[discoveries, spread out]'}\n\nWHAT I WILL NOT DO:\n${v('resist')||'[the rushing you are leaving behind]'}\n\n--- The slow travel mindset ---\nYou are not here to see everything. You are here to know one place well.\nLeave space for the unplanned — that is where the best moments live.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
