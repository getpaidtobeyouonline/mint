<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Apology Formula Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 48px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .step { font-size: .8rem; color: #5AE57A; margin-top: 4px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .95rem; }
  .warn { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; font-size: .8rem; opacity: .8; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Apology Formula Builder</h1>
  <p class="sub">A real apology has five parts. Build one that repairs instead of defends.</p>

  <div class="panel">
    <label for="what">1. What you did <span class="step">— name it specifically, no "if"</span></label>
    <textarea id="what" placeholder="I am sorry that I..."></textarea>
    <label for="impact">2. The impact on them <span class="step">— show you understand</span></label>
    <textarea id="impact" placeholder="I know this made you feel..."></textarea>
    <label for="own">3. Take responsibility <span class="step">— no blame, no excuses</span></label>
    <textarea id="own" placeholder="It was not okay, and it was my responsibility"></textarea>
    <label for="change">4. What you will do differently <span class="step">— a real commitment</span></label>
    <textarea id="change" placeholder="Going forward, I will..."></textarea>
    <label for="ask">5. Ask, do not demand <span class="step">— leave room for them</span></label>
    <input id="ask" placeholder="e.g. Is there anything I can do to make this right?">
    <button class="btn" onclick="gen()">Build My Apology</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
    <div class="warn">An apology is a beginning, not a transaction. Do not expect instant forgiveness — give them time, and let your actions do the rest.</div>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['what','impact','own','change','ask'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('afb_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('afb_'+k,g(k).value)); });
  function gen(){
    const t=`${v('what')||'[I am sorry that I...]'}\n\n${v('impact')||'[I understand this affected you by...]'}\n\n${v('own')||'[That was my responsibility — no excuses.]'}\n\n${v('change')||'[Going forward, I will...]'}\n\n${v('ask')||'[Is there anything I can do to make this right?]'}`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
