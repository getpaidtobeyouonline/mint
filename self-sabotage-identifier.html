<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Self-Sabotage Identifier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  .q { background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
  .q span { flex: 1; min-width: 220px; font-size: .92rem; }
  select { background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .85rem; padding: 7px 9px; border-radius: 7px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .95rem; padding: 13px 26px; border-radius: 8px; margin: 8px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .fix { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 12px 15px; margin-bottom: 9px; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Self-Sabotage Identifier</h1>
  <p class="sub">Self-sabotage is your nervous system protecting you from a "ceiling" that no longer applies. Find your pattern.</p>

  <div id="form"></div>
  <button class="btn" onclick="run()">Identify Patterns</button>
  <button class="btn ghost" onclick="reset()">Reset</button>
  <div id="res"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const Q=[
    ["I disappear / go quiet right when things start working","Slow yourself down right after a win. Stay present instead of escaping."],
    ["I pick fights or create drama near a big milestone","Notice the pattern. Name it to a trusted person before the next one."],
    ["I overwork and burn out right before launches","Schedule rest BEFORE the high-stakes moment, not after."],
    ["I start something new the moment something else is about to succeed","Don't trust the shiny pull mid-launch. Finish first."],
    ["I get sick / very tired right when I need to show up","Take it seriously — your body may be protecting you from a perceived threat. What is the threat?"],
    ["I downplay results so people don't expect more of me","Practise letting wins land without disclaimers."],
    ["I revert to old habits right after a breakthrough","Add a small ritual that says: 'I am allowed to keep this.'"],
    ["I push love/support away when things go well","Tell one trusted person what you are about to receive — and let them know they may need to keep you grounded."]
  ];
  const g=id=>document.getElementById(id);
  g('form').innerHTML=Q.map((q,i)=>`<div class="q"><span>${q[0]}</span>
    <select id="q${i}"><option value="0">Not me</option><option value="1">Sometimes me</option><option value="2">Often me</option></select></div>`).join('');
  const saved=JSON.parse(localStorage.getItem('ssi')||'{}');
  Q.forEach((_,i)=>{ if(saved[i])g('q'+i).value=saved[i]; g('q'+i).addEventListener('change',()=>{ const o={};Q.forEach((_,j)=>o[j]=g('q'+j).value); localStorage.setItem('ssi',JSON.stringify(o)); }); });
  function run(){
    const found=Q.map((q,i)=>({q,v:+g('q'+i).value})).filter(o=>o.v>=1).sort((a,b)=>b.v-a.v);
    g('res').innerHTML= found.length?'<h3 style="font-family:\'Playfair Display\',serif;color:#5AE57A;margin:0 0 10px">Your patterns &amp; antidotes</h3>'+
      found.slice(0,4).map(o=>'<div class="fix"><b style="color:#5AE57A">'+esc(o.q[0])+'</b><br>'+esc(o.q[1])+'</div>').join('')+
      '<div class="fix" style="border-left-color:#BFD8BF">Self-sabotage is not a character flaw &mdash; it is a protective pattern. Naming it is most of the cure; the antidotes above are the rest.</div>'
      :'<div class="fix" style="border-left-color:#5AE57A">No strong patterns flagged. Keep noticing — they often appear near a new ceiling.</div>';
    g('res').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function reset(){ if(confirm('Reset?')){ localStorage.removeItem('ssi'); Q.forEach((_,i)=>g('q'+i).value='0'); g('res').innerHTML=''; } }
</script>
</body>
</html>
