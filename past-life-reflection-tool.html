<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Past Life Reflection Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Past Life Reflection Tool</h1>
  <p class="sub">Explore recurring themes as imagery for reflection — and what they may be teaching.</p>

  <div class="panel">
    <label for="theme">A recurring theme, fear or strong affinity</label>
    <textarea id="theme" placeholder="Something that feels older or deeper than this life explains"></textarea>
    <label for="impression">An impression, image or scene that comes to you</label>
    <textarea id="impression" placeholder="Let your imagination offer a setting, a feeling, a story"></textarea>
    <label for="feel">How it feels</label>
    <input id="feel" placeholder="The emotion the impression carries">
    <label for="teach">What it might be inviting you to learn</label>
    <textarea id="teach" placeholder="The lesson, the gift or the wound asking for attention"></textarea>
    <label for="release">What you choose to release or integrate now</label>
    <input id="release" placeholder="What you bring into healing in this life">
    <button class="btn" onclick="gen()">Build Reflection</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['theme','impression','feel','teach','release'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('plr_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('plr_'+k,g(k).value)); });
  function gen(){
    const t='PAST LIFE REFLECTION\n\nTHE RECURRING THEME:\n'+(v('theme')||'[what feels older than this life]')+
    '\n\nTHE IMPRESSION THAT CAME:\n'+(v('impression')||'[the image, scene or story]')+
    '\n\nHOW IT FEELS:\n'+(v('feel')||'[the emotion it carries]')+
    '\n\nWHAT IT MAY BE TEACHING:\n'+(v('teach')||'[the lesson or gift]')+
    '\n\nWHAT I RELEASE OR INTEGRATE NOW:\n'+(v('release')||'[what you bring into healing]')+
    '\n\n--- Holding this gently ---\nWhether literal or symbolic, these images can carry real wisdom for you.\nWhat matters is the healing and insight you take into this life, now.\nUse the reflection to free yourself from old patterns — then live forward.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
