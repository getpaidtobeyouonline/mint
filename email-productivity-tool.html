<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Productivity Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 18px; font-size: .95rem; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .bar { height: 9px; background: #2A442A; border-radius: 6px; overflow: hidden; margin: 8px 0 4px; }
  .bar i { display: block; height: 100%; background: #5AE57A; width: 0; transition: width .3s; }
  .count { text-align: center; font-size: .85rem; color: #5AE57A; margin-bottom: 4px; }
  .grp { font-size: .76rem; text-transform: uppercase; letter-spacing: .04em; color: #5AE57A; margin: 16px 0 7px; }
  .item { display: flex; gap: 10px; align-items: flex-start; background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; cursor: pointer; }
  .item.done { border-color: #5AE57A; opacity: .55; }
  .box { width: 20px; height: 20px; border: 2px solid #5AE57A; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; font-size: .8rem; color: #5AE57A; }
  .item.done .box::after { content: '\2713'; }
  .btn { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; cursor: pointer; font-size: .85rem; padding: 8px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Email Productivity Tool</h1>
  <p class="sub">Take back control of your inbox — habit by habit.</p>

  <div class="panel">
    <div class="count" id="count">0 / 0 done</div>
    <div class="bar"><i id="fill"></i></div>
    <div id="list"></div>
    <button class="btn" onclick="reset()">Reset Checklist</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const ITEMS={
    'Set up your system': ['Turn off email notifications during focus time','Create a few simple folders or labels (not dozens)','Set up filters for newsletters and low-priority mail','Unsubscribe from anything you never read'],
    'Daily habits': ['Check email in 2-3 set windows, not constantly','Process the inbox: do, delegate, defer or delete','Reply to anything under 2 minutes immediately','Move action emails to a task list, not back to the inbox','Aim to end the day with a near-empty inbox'],
    'Write better emails': ['Use a clear, specific subject line','Put the ask or main point in the first line','Keep it short — a few sentences beats an essay','State exactly what you need and by when'],
    'Reduce email overall': ['Use a quick message or call when it is faster','Reply-all only when everyone truly needs it','Use templates for messages you send often']
  };
  const KEY='ept'; let done=JSON.parse(localStorage.getItem(KEY)||'{}');
  const g=id=>document.getElementById(id);
  function render(){
    const L=g('list'); L.innerHTML=''; let total=0,ch=0;
    Object.keys(ITEMS).forEach(grp=>{
      const h=document.createElement('div'); h.className='grp'; h.textContent=grp; L.appendChild(h);
      ITEMS[grp].forEach(txt=>{
        total++; const id=grp+'|'+txt; if(done[id])ch++;
        const d=document.createElement('div'); d.className='item'+(done[id]?' done':'');
        d.innerHTML='<div class="box"></div><div>'+txt+'</div>';
        d.onclick=()=>{ done[id]=!done[id]; localStorage.setItem(KEY,JSON.stringify(done)); render(); };
        L.appendChild(d);
      });
    });
    g('fill').style.width=total?Math.round(ch/total*100)+'%':'0%';
    g('count').textContent=ch+' / '+total+' done';
  }
  function reset(){ if(confirm('Reset the checklist?')){ done={}; localStorage.setItem(KEY,'{}'); render(); } }
  render();
</script>
</body>
</html>
