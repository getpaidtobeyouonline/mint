<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Seasonal Eating Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 10px 0 5px; }
  select, input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  select:focus, input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip { background: #2A442A; border: 1px solid #5A845A; border-radius: 18px; padding: 6px 13px; font-size: .85rem; }
  h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.02rem; margin-bottom: 8px; }
  .add { display: flex; gap: 8px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 15px; border-radius: 8px; font-family:'DM Sans',sans-serif; flex: none; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 7px 12px; margin: 5px 0; display: flex; justify-content: space-between; font-size: .87rem; }
  .item .x { cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { opacity: .45; font-size: .82rem; font-style: italic; padding: 3px 0; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Seasonal Eating Planner</h1>
  <p class="sub">Eating in season means fresher, cheaper, tastier food. See what is at its best now.</p>

  <div class="panel">
    <label for="season">Pick the current season</label>
    <select id="season" onchange="showSeason()">
      <option value="spring">Spring</option>
      <option value="summer">Summer</option>
      <option value="autumn">Autumn</option>
      <option value="winter">Winter</option>
    </select>
    <h3 style="margin-top:14px">In season now</h3>
    <div class="chips" id="chips"></div>
  </div>

  <div class="panel">
    <h3>My seasonal meal plan</h3>
    <div class="add"><input id="meal" placeholder="e.g. Roasted squash soup" onkeydown="if(event.key==='Enter')add()" style="flex:1"><button class="btn" onclick="add()">Add</button></div>
    <div id="list" style="margin-top:8px"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const SEASONS={
    spring:["Asparagus","Spinach","Peas","Radishes","Spring onions","Rhubarb","New potatoes","Lettuce","Strawberries","Herbs"],
    summer:["Tomatoes","Courgettes","Berries","Stone fruit","Sweetcorn","Cucumber","Peppers","Aubergine","Beans","Melon"],
    autumn:["Squash &amp; pumpkin","Apples","Pears","Mushrooms","Kale","Beetroot","Leeks","Brussels sprouts","Plums","Parsnips"],
    winter:["Root vegetables","Cabbage","Citrus fruit","Cauliflower","Brussels sprouts","Swede","Potatoes","Onions","Pomegranate","Chard"]
  };
  let R=JSON.parse(localStorage.getItem('sep')||'[]');
  const save=()=>localStorage.setItem('sep',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  if(localStorage.getItem('sep_season'))g('season').value=localStorage.getItem('sep_season');
  function showSeason(){
    localStorage.setItem('sep_season',g('season').value);
    g('chips').innerHTML=SEASONS[g('season').value].map(x=>'<span class="chip">'+x+'</span>').join('');
  }
  function add(){ const t=g('meal').value.trim(); if(!t)return; R.push(t); g('meal').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear meal plan?')){ R=[]; save(); render(); } }
  function render(){
    g('list').innerHTML=R.length?R.map((x,i)=>'<div class="item"><span>'+esc(x)+'</span><span class="x" onclick="del('+i+')">✕</span></div>').join(''):'<div class="empty">No seasonal meals added yet.</div>';
  }
  showSeason(); render();
</script>
</body>
</html>
