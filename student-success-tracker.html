<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Success Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#325132;color:#FFFFFF;font-family:'DM Sans',sans-serif;min-height:100vh;padding:2rem 1rem}
.container{max-width:680px;margin:0 auto}
header{text-align:center;margin-bottom:2rem}
h1{font-family:'Playfair Display',serif;font-size:2.1rem;color:#5AE57A;margin-bottom:.5rem}
.subtitle{opacity:.65;font-size:.95rem;max-width:480px;margin:0 auto}
.card{background:#3C603C;border:1px solid #4C724C;border-radius:12px;padding:1.4rem 1.5rem;margin-bottom:1.25rem}
.card h2{font-family:'Playfair Display',serif;color:#5AE57A;font-size:1rem;margin-bottom:.9rem;padding-bottom:.5rem;border-bottom:1px solid #4C724C}
label{display:block;font-size:.82rem;font-weight:500;opacity:.7;margin-bottom:.4rem;margin-top:.85rem}
label:first-of-type{margin-top:0}
input[type=text]{width:100%;background:#325132;border:1px solid #4C724C;border-radius:8px;padding:.7rem .9rem;color:#FFFFFF;font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
input[type=text]:focus{border-color:#5AE57A}
.opt-row{display:flex;gap:.55rem;margin-top:.6rem}
.opt{flex:1;background:#325132;border:1px solid #4C724C;border-radius:8px;padding:.55rem .4rem;text-align:center;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;color:#FFFFFF;transition:border-color .2s,color .2s,background .2s}
.opt.sel{border-color:#5AE57A;color:#5AE57A;background:#325132}
.btn{width:100%;background:#5AE57A;color:#325132;border:none;border-radius:8px;padding:.9rem;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.02em;transition:opacity .2s;margin-top:.9rem}
.btn:hover{opacity:.88}
.results{display:none}
.results.show{display:block}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;margin-bottom:1.1rem}
.stat{background:#3C603C;border:1px solid #4C724C;border-radius:8px;padding:.65rem .5rem;text-align:center}
.stat-val{font-family:'Playfair Display',serif;font-size:1.2rem;color:#5AE57A;display:block}
.stat-lbl{font-size:.63rem;opacity:.45;display:block;margin-top:.15rem;text-transform:uppercase;letter-spacing:.06em}
.ms-card{background:#3C603C;border:1px solid #4C724C;border-radius:10px;padding:1.1rem 1.25rem;margin-bottom:.85rem;border-left:3px solid #5AE57A}
.ms-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.3rem;gap:.5rem}
.ms-name{font-family:'Playfair Display',serif;font-size:1.05rem}
.ms-time{font-size:.72rem;opacity:.38;white-space:nowrap}
.ms-what{font-size:.83rem;opacity:.65;margin-bottom:.5rem;line-height:1.4}
.ms-checkin{font-size:.82rem;font-style:italic;margin-bottom:.55rem;padding:.5rem .7rem;background:#325132;border-radius:6px;line-height:1.4;opacity:.78}
.ms-meta{background:#325132;border-radius:6px;padding:.5rem .7rem;font-size:.75rem;opacity:.55;line-height:1.65}
.lbl{font-size:.68rem;text-transform:uppercase;letter-spacing:.04em;font-style:normal}
.red{color:#5AE57A}
.grn{color:#5AE57A}
.copy-btn{width:100%;background:transparent;border:1px solid #5AE57A;color:#5AE57A;border-radius:8px;padding:.75rem;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:.25rem}
.copy-btn:hover{opacity:.7}
footer{text-align:center;font-size:.75rem;opacity:.4;margin-top:2rem;padding-bottom:1rem}
@media(max-width:480px){h1{font-size:1.75rem}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Student Success Tracker</h1>
    <p class="subtitle">Build a milestone framework that tracks progress, flags at-risk learners, and keeps your community celebrating wins.</p>
  </header>

  <div class="card">
    <h2>Your Program</h2>
    <label>Program Type</label>
    <div class="opt-row">
      <button class="opt sel" onclick="pickPT(0)" id="pt0">Course</button>
      <button class="opt"     onclick="pickPT(1)" id="pt1">Coaching</button>
      <button class="opt"     onclick="pickPT(2)" id="pt2">Membership</button>
      <button class="opt"     onclick="pickPT(3)" id="pt3">Challenge</button>
    </div>
    <label>Program Duration</label>
    <div class="opt-row">
      <button class="opt"     onclick="pickDur(0)" id="d0">1 Week</button>
      <button class="opt"     onclick="pickDur(1)" id="d1">4 Weeks</button>
      <button class="opt sel" onclick="pickDur(2)" id="d2">12 Weeks</button>
      <button class="opt"     onclick="pickDur(3)" id="d3">6 Months</button>
    </div>
    <label>Topic / Program Name</label>
    <input type="text" id="inT" placeholder="e.g. Email Marketing Bootcamp, The Coaching Intensive">
    <label>Student / Client Description</label>
    <input type="text" id="inA" placeholder="e.g. coaches, freelancers, online sellers">
    <label>Core Outcome</label>
    <input type="text" id="inX" placeholder="e.g. sign 3 clients, build a profitable email list">
    <button class="btn" onclick="generate()">Build My Success Tracker →</button>
  </div>

  <div class="results" id="results">
    <div class="stats" id="statsBar"></div>
    <div id="msCards"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyResults()">Copy Success Framework as Text</button>
  </div>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>
<script>
const fill = (s,T,A,X) => s.replace(/\{T\}/g,T).replace(/\{A\}/g,A).replace(/\{X\}/g,X);
const st   = (v,l) => `<div class="stat"><span class="stat-val">${v}</span><span class="stat-lbl">${l}</span></div>`;

const ptLabel  = ['Course','Coaching','Membership','Challenge'];
const ptKeys   = ['course','coaching','membership','challenge'];
const durLabel = ['1 Week','4 Weeks','12 Weeks','6 Months'];
const timings  = [
  ['Day 1','Day 2','Day 4','Day 6','Day 7'],
  ['Day 1','Week 1','Week 2','Week 3','Week 4'],
  ['Week 1','Week 3','Week 6','Week 9','Week 12'],
  ['Week 1','Month 2','Month 3','Month 5','Month 6'],
];
const stageCols = ['#5AE57A','#5AE57A','#5AE57A','#5AE57A','#5AE57A'];

const milestoneData = {
  course: [
    {name:'First Action',   what:'{A} completes their first lesson and submits the Module 1 action step toward {X}', checkin:'How are you finding {T} so far? Any questions before you go further?', redflag:'No login or activity within 48 hrs of purchase', celebrate:'Send a personal "you started!" message — Day 1 energy sets the whole tone'},
    {name:'Early Momentum', what:'{A} has completed 25% of {T} and applied at least one lesson toward {X}', checkin:'What\'s one thing from {T} you\'ve already tried or plan to try this week?', redflag:'Logging in but not completing lessons or skipping action steps', celebrate:'Acknowledge progress publicly — a shoutout or personal email goes a long way'},
    {name:'Halfway Point',  what:'{A} is halfway through {T} and has seen at least one early result toward {X}', checkin:'What\'s working best in {T} so far? Where do you feel stuck?', redflag:'Gap of more than 7 days between logins — reach out before momentum dies', celebrate:'Feature their progress — midpoint wins make great social proof for future students'},
    {name:'Final Sprint',   what:'{A} has one section left and is within reach of completing {X}', checkin:'You\'re almost done with {T} — what\'s one thing you\'ll do with what you\'ve learned?', redflag:'Slowing down before the finish — 75% completion is a common drop-off point', celebrate:'Send a personal "you\'re almost there" push — it closes more students than you\'d expect'},
    {name:'Completion Win', what:'{A} has finished {T} and taken the final action step toward {X}', checkin:'What\'s the biggest shift since starting {T}? We\'d love to share your story.', redflag:'Completed the content but hasn\'t yet implemented the final step toward {X}', celebrate:'Celebrate publicly — this is your testimonial moment and social proof goldmine'},
  ],
  coaching: [
    {name:'First Session',  what:'{A} shows up for Session 1 and submits their pre-work on {T}', checkin:'What\'s your #1 goal for our time together working on {T}?', redflag:'No pre-work submitted or late/no-show to the first session', celebrate:'Send a session recap within 24 hrs — it shows you\'re invested in their {X}'},
    {name:'First Shift',    what:'{A} implements Session 1 homework and makes a visible action or mindset shift on {T}', checkin:'What changed for you this week as you worked on {T}?', redflag:'Homework not attempted or excuses replacing action between sessions', celebrate:'Name the shift out loud in your next session — {A} need to hear it from you'},
    {name:'Breakthrough',   what:'{A} hits a breakthrough in {T} that directly connects to their goal of {X}', checkin:'Describe the shift you\'ve had since we started working on {T} together.', redflag:'Plateau or regression — revisiting solved problems rather than advancing toward {X}', celebrate:'Document it together — write the breakthrough story while it\'s still vivid'},
    {name:'Independence',   what:'{A} applies {T} skills independently without needing to be prompted', checkin:'What have you handled this week that you couldn\'t have before we started {T}?', redflag:'Still needing high levels of direction — dependency rather than growth toward {X}', celebrate:'Name the independence explicitly — it\'s a coaching milestone worth celebrating aloud'},
    {name:'Transformed',    what:'{A} can clearly articulate how {T} has moved them toward {X}', checkin:'Looking back, what\'s the biggest change in how you approach {T} since we started?', redflag:'Results without reflection — they can do it but can\'t explain how or why yet', celebrate:'Co-create their success story and share it publicly — with their permission'},
  ],
  membership: [
    {name:'First Engagement', what:'{A} logs in, introduces themselves, and engages with their first {T} resource', checkin:'What brought you to {T} today — and what\'s your #1 goal inside the membership?', redflag:'Signed up but never logged in or introduced themselves within the first 3 days', celebrate:'Welcome them personally — a DM or comment within 24 hrs changes everything'},
    {name:'Active Member',    what:'{A} has engaged with 3+ {T} resources and joined at least one community conversation', checkin:'What\'s one thing from {T} you\'ve applied or tried since joining?', redflag:'Logging in but only lurking — no comments, questions, or contributions yet', celebrate:'Acknowledge their participation — consistent engagers become your best advocates'},
    {name:'First Win',        what:'{A} shares a result or specific question in the community about {T} and {X}', checkin:'What\'s working? What do you wish we had more of inside {T}?', redflag:'Still consuming but no wins shared after 30+ days — may be overwhelmed or stuck', celebrate:'Amplify their win loudly — a featured post keeps momentum high for the whole group'},
    {name:'Power Member',     what:'{A} is consistently contributing to {T} discussions and helping other members reach {X}', checkin:'What\'s your biggest win from {T} this month — and what are you working on next?', redflag:'Drop in engagement or no login for 14+ days — classic pre-churn signal', celebrate:'Give them a role, badge, or shoutout — recognition turns members into champions'},
    {name:'Renewal Ready',    what:'{A} has achieved a meaningful result from {T} and can speak to progress toward {X}', checkin:'What\'s changed since joining {T} — and what do you want to accomplish next?', redflag:'Renewal due but no meaningful results shared — reach out before they quietly cancel', celebrate:'Personal outreach before renewal — make them feel seen and valued before they decide'},
  ],
  challenge: [
    {name:'Day 1 Done',    what:'{A} submits Day 1 task, posts in the group, and introduces themselves', checkin:'What\'s the #1 thing you want to achieve by the end of this {T} challenge?', redflag:'No submission by end of Day 1 — the first day predicts full challenge completion', celebrate:'React and comment on every Day 1 submission — it sets the group\'s energy for the whole challenge'},
    {name:'Day-3 Strong',  what:'{A} is still showing up and submitting daily tasks on {T} by Day 3', checkin:'What\'s surprising or challenging you most so far in the {T} challenge?', redflag:'Missed Day 2 or 3 — a direct DM can bring back 40%+ of dropouts at this point', celebrate:'Shout out the consistent ones publicly — "still going on Day 3!" creates powerful social proof'},
    {name:'Halfway',       what:'{A} has completed 50% of the challenge and is seeing early movement toward {X}', checkin:'What\'s the biggest shift so far? What do you want to tackle in the second half?', redflag:'Engagement drop or copy-paste submissions — they may be losing steam', celebrate:'Mid-challenge wins post — feature specific results to re-energise the whole group'},
    {name:'Final Push',    what:'{A} has completed 75% of the challenge with visible momentum toward {X}', checkin:'You\'re so close — what\'s one thing you\'ll do differently after this {T} challenge ends?', redflag:'Dropping off in the final stretch — use a "so close!" DM to pull them back in', celebrate:'Personal message: "You\'re almost there — here\'s why finishing matters for {X}"'},
    {name:'Challenge Won', what:'{A} completes all tasks and achieves the stated challenge outcome of {X}', checkin:'What\'s the biggest win you\'re taking away from this {T} challenge?', redflag:'Completed content but skipped the final step or community celebration post', celebrate:'Big public celebration — name every finisher, share results, screenshot and post widely'},
  ],
};

let state = {pt:0, dur:2};

function pickPT(i) {
  state.pt = i;
  [0,1,2,3].forEach(x => document.getElementById(`pt${x}`).classList.toggle('sel', x===i));
}
function pickDur(i) {
  state.dur = i;
  [0,1,2,3].forEach(x => document.getElementById(`d${x}`).classList.toggle('sel', x===i));
}

function generate() {
  const T = document.getElementById('inT').value.trim();
  const A = document.getElementById('inA').value.trim();
  const X = document.getElementById('inX').value.trim();
  if (!T || !A || !X) { alert('Please fill in all three fields.'); return; }

  const ms    = milestoneData[ptKeys[state.pt]];
  const times = timings[state.dur];

  document.getElementById('statsBar').innerHTML =
    st(5,'Milestones') + st(ptLabel[state.pt],'Program') +
    st(durLabel[state.dur],'Duration') + st(times[4],'Complete By');

  document.getElementById('msCards').innerHTML = ms.map((m,i) => {
    const col = stageCols[i];
    return `<div class="ms-card" style="border-left-color:${col}">
      <div class="ms-head">
        <span class="ms-name" style="color:${col}">${m.name}</span>
        <span class="ms-time">${times[i]}</span>
      </div>
      <div class="ms-what">${fill(m.what,T,A,X)}</div>
      <div class="ms-checkin">"${fill(m.checkin,T,A,X)}"</div>
      <div class="ms-meta">
        <span class="lbl red">Red flag:</span> ${fill(m.redflag,T,A,X)}<br>
        <span class="lbl grn">Celebrate:</span> ${fill(m.celebrate,T,A,X)}
      </div>
    </div>`;
  }).join('');

  const r = document.getElementById('results');
  r.classList.add('show');
  r.scrollIntoView({behavior:'smooth', block:'start'});
}

function copyResults() {
  const T = document.getElementById('inT').value.trim();
  const A = document.getElementById('inA').value.trim();
  const X = document.getElementById('inX').value.trim();
  const ms    = milestoneData[ptKeys[state.pt]];
  const times = timings[state.dur];
  let text = `STUDENT SUCCESS TRACKER\n`;
  text += `Program: ${T} (${ptLabel[state.pt]}) · ${durLabel[state.dur]} · Audience: ${A}\n\n`;
  ms.forEach((m,i) => {
    text += `${m.name.toUpperCase()} — ${times[i]}\n${'─'.repeat(36)}\n`;
    text += `What to look for: ${fill(m.what,T,A,X)}\n`;
    text += `Check-in: "${fill(m.checkin,T,A,X)}"\n`;
    text += `Red flag: ${fill(m.redflag,T,A,X)}\n`;
    text += `Celebrate: ${fill(m.celebrate,T,A,X)}\n\n`;
  });
  text += `---\nCreated with Student Success Tracker by GetPaidToBeYouOnline`;

  const btn = document.getElementById('copyBtn');
  const done = () => { btn.textContent='Copied!'; setTimeout(()=>btn.textContent='Copy Success Framework as Text',2200); };
  navigator.clipboard ? navigator.clipboard.writeText(text).then(done)
    : (()=>{ const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done(); })();
}
</script>
</body>
</html>
