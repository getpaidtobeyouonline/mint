<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsletter Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 20px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .addrow { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .addrow>div { flex: 1; min-width: 120px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .tip { background:#2E4D2E;border:1px solid #4F8A55;border-radius:8px;padding:11px 14px;font-size:.85rem;margin-bottom:12px; }
  .iss { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 11px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; gap: 10px; align-items: center; flex-wrap: wrap; }
  .iss .x { cursor: pointer; opacity: .5; } .iss .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 16px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Newsletter Planner</h1>
  <p class="sub">Plan a repeatable newsletter format and queue issues so you are never staring at a blank screen.</p>

  <div class="panel">
    <label for="fmt">Your recurring format / sections</label>
    <input id="fmt" placeholder="e.g. 1 idea + 1 tool + 1 question">
    <div class="addrow" style="margin-top:10px">
      <div><label for="date">Issue date</label><input id="date" type="date"></div>
      <div style="flex:2"><label for="theme">Theme / main idea</label><input id="theme" placeholder="e.g. why your offer isn’t converting"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Queue</button></div>
    </div>
  </div>

  <div class="tip">A predictable format is the secret to a sustainable newsletter — readers know what they get, and you stop reinventing it every week.</div>
  <div id="list"></div>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let I=JSON.parse(localStorage.getItem('nlp')||'[]');
  const fmt=()=>{ const s=localStorage.getItem('nlp_fmt'); if(s)g('fmt').value=s; };
  fmt(); g('fmt').addEventListener('input',()=>localStorage.setItem('nlp_fmt',g('fmt').value));
  const save=()=>localStorage.setItem('nlp',JSON.stringify(I));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ const th=v('theme'); if(!th){alert('Add a theme.');return;} I.push({date:g('date').value,theme:th}); g('theme').value=''; save(); render(); }
  function del(i){ I.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the queue?')){ I=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!I.length){ L.innerHTML='<div class="empty">No issues queued yet — line up your next few.</div>'; return; }
    L.innerHTML=[...I].map((x,i)=>({x,i})).sort((a,b)=>(a.x.date||'~')<(b.x.date||'~')?-1:1).map(({x,i})=>`<div class="iss"><span>${x.date?`<b style="color:#5AE57A">${x.date}</b> · `:''}${esc(x.theme)}${v('fmt')?`<br><span style="opacity:.55;font-size:.8rem">Format: ${esc(v('fmt'))}</span>`:''}</span><span class="x" onclick="del(${i})">✕</span></div>`).join('');
  }
  render();
</script>
</body>
</html>
