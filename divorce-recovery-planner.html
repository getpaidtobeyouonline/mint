<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divorce Recovery Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .lead { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 11px 14px; font-size: .87rem; font-style: italic; margin-bottom: 6px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Divorce Recovery Planner</h1>
  <p class="sub">Rebuilding after a separation takes time. Make a gentle plan for healing and moving forward.</p>

  <div class="panel">
    <div class="lead">Healing is not linear. Some days will undo others — that is the process, not a failure.</div>
    <label for="support">My support team (people &amp; professionals)</label>
    <textarea id="support" placeholder="Who you can lean on — friends, family, a counsellor"></textarea>
    <label for="practical">Practical things I need to sort</label>
    <textarea id="practical" placeholder="Living arrangements, finances, admin — one at a time"></textarea>
    <label for="emotion">How I will process the emotions</label>
    <textarea id="emotion" placeholder="Journaling, therapy, exercise, talking — what helps you"></textarea>
    <label for="self">Ways I will take care of myself</label>
    <textarea id="self" placeholder="Sleep, movement, small comforts, time with good people"></textarea>
    <label for="rediscover">Parts of me I want to rediscover or grow</label>
    <textarea id="rediscover" placeholder="Who you are becoming — interests, goals, friendships"></textarea>
    <label for="boundary">A boundary I am setting (with my ex, or others)</label>
    <input id="boundary" placeholder="e.g. Communication only about the practical matters">
    <button class="btn" onclick="gen()">Build My Recovery Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['support','practical','emotion','self','rediscover','boundary'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('drp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('drp_'+k,g(k).value)); });
  function gen(){
    const t=`MY DIVORCE RECOVERY PLAN\n\nMY SUPPORT TEAM:\n${v('support')||'[who you can lean on]'}\n\nPRACTICAL THINGS TO SORT:\n${v('practical')||'[one step at a time]'}\n\nPROCESSING THE EMOTIONS:\n${v('emotion')||'[what helps you feel and heal]'}\n\nTAKING CARE OF MYSELF:\n${v('self')||'[the basics, and small comforts]'}\n\nREDISCOVERING MYSELF:\n${v('rediscover')||'[who you are becoming]'}\n\nA BOUNDARY I AM SETTING:\n${v('boundary')||'[what protects your peace]'}\n\n--- Gentle reminders ---\nThis ending does not erase the good, and it is not a verdict on your worth.\nGrieve the relationship and the future you imagined — both are real losses.\nYou will not always feel like this. Take it one day, sometimes one hour, at a time.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
