<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escape Room Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Escape Room Planner</h1>
  <p class="sub">Design a DIY escape room, or plan a brilliant night out with friends.</p>

  <div class="panel">
    <label for="theme">Theme / story</label>
    <input id="theme" placeholder="e.g. detective's office, lost time machine">
    <label for="duration">Duration &amp; players</label>
    <input id="duration" placeholder="e.g. 45 min, 4 players">
    <label for="puzzles">Puzzles &amp; clues (one per line)</label>
    <textarea id="puzzles" placeholder="Lock, riddle, hidden item, code combination"></textarea>
    <label for="path">The path — how clues connect</label>
    <textarea id="path" placeholder="Clue A leads to puzzle B leads to box C..."></textarea>
    <label for="props">Props &amp; supplies</label>
    <textarea id="props" placeholder="Padlocks, envelopes, UV pen, keys, printed clues"></textarea>
    <label for="finale">The finale — how they win</label>
    <input id="finale" placeholder="What unlocks at the end">
    <button class="btn" onclick="gen()">Build Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['theme','duration','puzzles','path','props','finale'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('erp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('erp_'+k,g(k).value)); });
  function gen(){
    const t='ESCAPE ROOM PLAN\n\nTHEME: '+(v('theme')||'[your story]')+'\nDURATION: '+(v('duration')||'[length and players]')+
    '\n\nPUZZLES & CLUES:\n'+(v('puzzles')||'[your puzzles, one per line]')+
    '\n\nTHE PATH:\n'+(v('path')||'[how clues connect to the finale]')+
    '\n\nPROPS & SUPPLIES:\n'+(v('props')||'[everything you need]')+
    '\n\nFINALE:\n'+(v('finale')||'[how they win]')+
    '\n\n--- Design tips ---\nMake the first puzzle a quick win — it sets the energy.\nLayer puzzles so two people can work on different things.\nHave a "hint envelope" ready if they stall — it saves the night.\nTest the whole flow with one friend before the big night.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
