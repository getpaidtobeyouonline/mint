<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appliance Warranty Organiser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 12px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .app { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 11px 14px; margin-bottom: 7px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .app.warn { border-left: 3px solid #5AE57A; }
  .app.expired { border-left: 3px solid #BFD8BF; opacity: .65; }
  .app .nm { font-weight: 500; }
  .app .st { font-size: .82rem; }
  .app .x { cursor: pointer; opacity: .5; flex: none; } .app .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Appliance Warranty Organiser</h1>
  <p class="sub">Keep every appliance's warranty end date in one place — claim before it lapses.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Appliance</label><input id="name" placeholder="e.g. Washing machine"></div>
      <div><label>Brand / model</label><input id="model" placeholder="Optional"></div>
    </div>
    <div class="row">
      <div><label>Purchased</label><input id="purchased" type="date"></div>
      <div><label>Warranty ends</label><input id="ends" type="date"></div>
    </div>
    <button class="btn" onclick="add()">+ Add Appliance</button>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('awo')||'[]');
  const save=()=>localStorage.setItem('awo',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('name')){ alert('Enter an appliance name.'); return; }
    R.push({n:v('name'),m:v('model'),p:g('purchased').value,e:g('ends').value});
    ['name','model'].forEach(k=>g(k).value=''); g('purchased').value=''; g('ends').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all appliances?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No appliances added yet.</div>'; return; }
    const today=new Date().setHours(0,0,0,0);
    L.innerHTML=R.map((x,i)=>({x,i,du:x.e?Math.ceil((new Date(x.e)-today)/86400000):99999})).sort((a,b)=>a.du-b.du).map(({x,i,du})=>{
      let cls='', st;
      if(!x.e){ st='No warranty date set'; }
      else if(du<0){ cls=' expired'; st='Warranty expired'; }
      else if(du<60){ cls=' warn'; st='⚠ Warranty ends in '+du+' days'; }
      else st='Warranty ends '+x.e+' ('+du+'d)';
      return '<div class="app'+cls+'"><span><span class="nm">'+esc(x.n)+'</span>'+(x.m?' <span style="opacity:.6">· '+esc(x.m)+'</span>':'')+'<br><span class="st" style="opacity:.8">'+st+'</span></span><span class="x" onclick="del('+i+')">✕</span></div>';
    }).join('');
  }
  render();
</script>
</body>
</html>
