<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>People-Pleasing Pattern Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  .q { background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
  .q span { flex: 1; min-width: 220px; font-size: .92rem; }
  select { background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .85rem; padding: 7px 9px; border-radius: 7px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .95rem; padding: 13px 26px; border-radius: 8px; margin: 8px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .res { text-align: center; background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 22px; margin: 18px 0; }
  .res .n { font-family: 'Playfair Display', serif; font-size: 2.6rem; color: #5AE57A; line-height: 1; }
  .res .vd { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: #5AE57A; margin-top: 5px; }
  .fix { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 12px 15px; margin-bottom: 9px; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>People-Pleasing Pattern Checker</h1>
  <p class="sub">People-pleasing looks nice and costs you everything. Spot your patterns.</p>

  <div id="form"></div>
  <button class="btn" onclick="run()">Check My Patterns</button>
  <button class="btn ghost" onclick="reset()">Reset</button>
  <div id="res"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const Q=[
    ["I say yes when I want to say no","Practise: 'Let me get back to you' before any yes."],
    ["I rehearse messages so people will not be upset","Practise: send a kind, direct message once. Don't revise it."],
    ["I apologise for things that are not my fault","Catch every 'sorry' you didn't owe. Try 'thanks for waiting' instead."],
    ["I shrink my real opinion to keep the peace","Pick one safe place to say what you actually think this week."],
    ["I struggle to receive a compliment","Just say thank you. Don't deflect."],
    ["I take responsibility for other adults' feelings","You are not the thermostat for grown people. Notice when you carry it."],
    ["I avoid conflict even when it costs me","Have one honest conversation you've been dodging."],
    ["I am performing 'easygoing' a lot of the time","Drop the act with one safe person and see what happens."]
  ];
  const g=id=>document.getElementById(id);
  g('form').innerHTML=Q.map((q,i)=>`<div class="q"><span>${q[0]}</span>
    <select id="q${i}"><option value="1">Rarely</option><option value="2">Sometimes</option><option value="3">Often</option><option value="4">Constantly</option></select></div>`).join('');
  const saved=JSON.parse(localStorage.getItem('ppc')||'{}');
  Q.forEach((_,i)=>{ if(saved[i])g('q'+i).value=saved[i]; g('q'+i).addEventListener('change',()=>{ const o={};Q.forEach((_,j)=>o[j]=g('q'+j).value); localStorage.setItem('ppc',JSON.stringify(o)); }); });
  function run(){
    const sc=Q.reduce((s,_,i)=>s+ +g('q'+i).value,0);
    const pct=Math.round(sc/(Q.length*4)*100);
    const vd= pct>=75?['Deep pattern','Pleasing is the default setting. The work is small repeated honesty.']:pct>=50?['Recurring pattern','Real, but not all-consuming. Pick one swap and practise.']:pct>=25?['Occasional','Mostly self-led; the slips are useful data.']:['Rare','You take care of yourself first — keep modelling that.'];
    const weak=Q.map((q,i)=>({q,v:+g('q'+i).value})).filter(o=>o.v>=3).slice(0,3);
    g('res').innerHTML='<div class="res"><div class="n">'+pct+'%</div><div class="vd">'+vd[0]+'</div><div style="opacity:.8;font-size:.92rem;margin-top:4px">'+vd[1]+'</div></div>'+
      (weak.length?'<h3 style="font-family:\'Playfair Display\',serif;color:#5AE57A;margin:0 0 10px">Practise these</h3>'+
       weak.map(o=>'<div class="fix"><b style="color:#5AE57A">'+esc(o.q[0])+'</b><br>'+esc(o.q[1])+'</div>').join('')
       :'<div class="fix" style="border-left-color:#5AE57A">No strong patterns flagged — keep honouring the no when it comes.</div>');
    g('res').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function reset(){ if(confirm('Reset?')){ localStorage.removeItem('ppc'); Q.forEach((_,i)=>g('q'+i).value='1'); g('res').innerHTML=''; } }
</script>
</body>
</html>
