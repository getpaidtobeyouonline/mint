<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Boundaries For Health Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, select, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Boundaries For Health Planner</h1>
  <p class="sub">Your health depends on what you protect. Plan one boundary, with the words to say it.</p>

  <div class="panel">
    <label for="area">Where is your health being drained?</label>
    <select id="area">
      <option>Work hours bleeding into rest</option>
      <option>Saying yes when I have no capacity</option>
      <option>People who leave me depleted</option>
      <option>Phone / news / screens</option>
      <option>Skipping meals, sleep, or movement for others</option>
      <option>Other</option>
    </select>
    <label for="cost">What it is costing your health</label>
    <textarea id="cost" placeholder="Sleep, energy, stress levels, mood..."></textarea>
    <label for="boundary">The boundary you will set (be specific)</label>
    <input id="boundary" placeholder="e.g. No work email after 7pm">
    <label for="words">The exact words you will use</label>
    <textarea id="words" placeholder="e.g. I am not available after 7pm — I will reply in the morning"></textarea>
    <label for="hold">How you will hold it when it gets hard</label>
    <textarea id="hold" placeholder="e.g. Phone on do-not-disturb, no apology, repeat the line"></textarea>
    <button class="btn" onclick="gen()">Build Boundary Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['area','cost','boundary','words','hold'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('bhp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('bhp_'+k,g(k).value)); });
  function gen(){
    const t=`MY HEALTH BOUNDARY\n\nWHAT IS DRAINING ME:\n${v('area')}\n\nWHAT IT IS COSTING:\n${v('cost')||'[name the real health cost]'}\n\nTHE BOUNDARY:\n${v('boundary')||'[one specific, clear line]'}\n\nTHE WORDS I WILL USE:\n"${v('words')||'[your sentence — calm, short, no over-explaining]'}"\n\nHOW I WILL HOLD IT:\n${v('hold')||'[your plan for the hard moment]'}\n\n--- Truth ---\nA boundary is not a wall against people — it is care for yourself.\nYou do not need permission, and "no" is a complete sentence.\nGuilt is normal at first. It fades. Your health does not have to.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
