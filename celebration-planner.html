<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celebration Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 130px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .checklist { margin-top: 14px; }
  .grp { font-size: .74rem; text-transform: uppercase; letter-spacing: .04em; color: #5AE57A; opacity: .8; margin: 12px 0 5px; }
  .task { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 8px 12px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; font-size: .88rem; }
  .box { width: 19px; height: 19px; border: 2px solid #5AE57A; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .7rem; font-weight: 700; }
  .box.on { background: #5AE57A; color: #325132; }
  .task.done .lb { text-decoration: line-through; opacity: .5; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Celebration Planner</h1>
  <p class="sub">Birthday, anniversary or party — get a ready-made checklist and tick it off.</p>

  <div class="panel">
    <div class="row">
      <div><label for="occ">Occasion</label><select id="occ"><option>Birthday party</option><option>Anniversary</option><option>Graduation</option><option>Family gathering</option><option>Achievement / milestone</option></select></div>
      <div><label for="size">Size</label><select id="size"><option>Intimate (under 10)</option><option>Medium (10-30)</option><option>Large (30+)</option></select></div>
    </div>
    <label for="date">Date of the celebration</label>
    <input id="date" type="date">
    <button class="btn" onclick="gen()">Build Checklist</button>
  </div>

  <div class="checklist" id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  let done=JSON.parse(localStorage.getItem('cpl_done')||'{}');
  const save=()=>localStorage.setItem('cpl_done',JSON.stringify(done));
  function gen(){
    const occ=g('occ').value, size=g('size').value, date=g('date').value;
    if(date)localStorage.setItem('cpl_date',date);
    localStorage.setItem('cpl_occ',occ); localStorage.setItem('cpl_size',size);
    let when='';
    if(date){ const d=Math.ceil((new Date(date)-new Date())/86400000);
      when= d>=0?' — '+d+' day'+(d===1?'':'s')+' to go':''; }
    const LIST={
      "4-6 weeks before":["Set the date and budget","Make the guest list","Book the venue or prepare the space","Send save-the-dates if needed"],
      "2-3 weeks before":["Send invitations and track RSVPs","Plan the food and drink","Order the cake","Sort decorations and theme","Plan activities or entertainment"],
      "The week of":["Confirm numbers and final RSVPs","Buy food, drinks and supplies","Prepare or collect the cake","Tidy and set up the space","Charge cameras / plan photos"],
      "On the day":["Decorate the space","Set out food and drinks","Welcome guests warmly","Take photos throughout","Actually be present — enjoy it"]
    };
    if(/Large/.test(size))LIST["2-3 weeks before"].push("Arrange extra seating, plates and help");
    if(/Anniversary/.test(occ))LIST["The week of"].push("Prepare a heartfelt toast or note");
    let h='<div class="panel"><h3 style="font-family:\'Playfair Display\',serif;color:#5AE57A">'+esc(occ)+when+'</h3>';
    let n=0;
    Object.entries(LIST).forEach(([grp,tasks])=>{
      h+='<div class="grp">'+grp+'</div>';
      tasks.forEach(t=>{ const key=occ+'|'+t; const on=!!done[key];
        h+='<div class="task'+(on?' done':'')+'"><span class="box'+(on?' on':'')+'" onclick="tog(\''+key.replace(/'/g,"\\'")+'\')">'+(on?'✓':'')+'</span><span class="lb">'+esc(t)+'</span></div>';
        n++; });
    });
    h+='</div>';
    g('out').innerHTML=h;
  }
  function tog(key){ done[key]=!done[key]; save(); gen(); }
  if(localStorage.getItem('cpl_occ'))g('occ').value=localStorage.getItem('cpl_occ');
  if(localStorage.getItem('cpl_size'))g('size').value=localStorage.getItem('cpl_size');
  if(localStorage.getItem('cpl_date'))g('date').value=localStorage.getItem('cpl_date');
  gen();
</script>
</body>
</html>
