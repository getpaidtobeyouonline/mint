<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Legacy Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  textarea { min-height: 56px; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .blk { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
  .blk h4 { color: #5AE57A; font-size: .76rem; text-transform: uppercase; margin-bottom: 5px; }
  .blk p { font-size: .93rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Legacy Builder</h1>
  <p class="sub">A 4-question reflection to make sure today's choices are building the legacy you actually want.</p>

  <div class="panel">
    <label for="remember">What do you want to be remembered for?</label>
    <textarea id="remember" placeholder="Not what you did — what kind of person you were"></textarea>
    <label for="said">What would people who love you say about you at 90?</label>
    <textarea id="said" placeholder="The truth-telling version"></textarea>
    <label for="gift">What do you want to leave the people you love?</label>
    <textarea id="gift" placeholder="Lessons, examples, a way of being, something tangible"></textarea>
    <label for="today">What is one thing today that would honour that legacy?</label>
    <input id="today" placeholder="Concrete, small, do-able">
    <button class="btn" onclick="gen()">Map My Legacy</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['remember','said','gift','today'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('lb8_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('lb8_'+k,g(k).value)); });
  function gen(){
    g('out').innerHTML='<div class="blk"><h4>What I want remembered</h4><p>'+esc(v('remember')||'—')+'</p></div>'+
      '<div class="blk"><h4>The version at 90</h4><p>'+esc(v('said')||'—')+'</p></div>'+
      '<div class="blk"><h4>What I want to leave</h4><p>'+esc(v('gift')||'—')+'</p></div>'+
      '<div class="blk"><h4>Today, this honours it</h4><p>'+esc(v('today')||'—')+'</p></div>'+
      '<div class="blk" style="border-left-color:#BFD8BF"><h4>The truth</h4><p>Legacy is not a single grand thing. It is the accumulation of how you show up on ordinary days. Doing the one thing above is the legacy in motion.</p></div>';
    g('out').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function copyOut(){ const t=g('out').innerText; if(!t){alert('Map first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
