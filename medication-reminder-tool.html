<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Medication Reminder Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 20px; font-size: .95rem; }
  .note { background:#2E4D2E;border:1px solid #4F8A55;border-radius:8px;padding:10px 13px;font-size:.82rem;margin-bottom:14px; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .med { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 11px 14px; margin-bottom: 8px; display: flex; gap: 12px; align-items: center; }
  .med.taken { opacity: .55; }
  .box { flex: none; width: 24px; height: 24px; border: 1px solid #BFD8BF; border-radius: 7px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: .9rem; }
  .med.taken .box { background: #5AE57A; border-color: #5AE57A; color: #325132; }
  .med .info { flex: 1; }
  .med .nm { font-weight: 500; font-size: .92rem; } .med.taken .nm { text-decoration: line-through; }
  .med .meta { font-size: .78rem; opacity: .65; }
  .med .x { cursor: pointer; opacity: .5; font-size: .8rem; } .med .x:hover { opacity: 1; color: #5AE57A; }
  .stat { text-align: center; font-size: .9rem; opacity: .85; margin-bottom: 12px; } .stat b { color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Medication Reminder Tool</h1>
  <p class="sub">A daily checklist of your meds and the times to take them. Tick as you go.</p>

  <div class="note">A personal tracking aid only — it does not send alerts and is not medical advice. Always follow your prescriber's instructions.</div>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Medication &amp; dose</label><input id="nm" placeholder="e.g. Iron — 1 tablet"></div>
      <div><label>Time</label><input id="time" type="time"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="stat" id="stat"></div>
  <div id="list"></div>
  <button class="btn ghost" onclick="resetDay()">Reset Today</button>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const today=new Date().toISOString().slice(0,10);
  let M=JSON.parse(localStorage.getItem('medr')||'[]');
  let taken=JSON.parse(localStorage.getItem('medr_taken')||'{}');
  if(taken.date!==today)taken={date:today,ids:[]};
  const save=()=>{ localStorage.setItem('medr',JSON.stringify(M)); localStorage.setItem('medr_taken',JSON.stringify(taken)); };
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ const nm=v('nm'); if(!nm){alert('Add a medication.');return;} M.push({id:Date.now(),nm,time:g('time').value}); g('nm').value=''; g('time').value=''; save(); render(); }
  function toggle(id){ const i=taken.ids.indexOf(id); if(i>=0)taken.ids.splice(i,1); else taken.ids.push(id); save(); render(); }
  function del(id){ M=M.filter(x=>x.id!==id); save(); render(); }
  function resetDay(){ taken.ids=[]; save(); render(); }
  function clearAll(){ if(confirm('Clear all medications?')){ M=[]; taken.ids=[]; save(); render(); } }
  function render(){
    const done=M.filter(x=>taken.ids.includes(x.id)).length;
    g('stat').innerHTML= M.length?`<b>${done}</b> / ${M.length} taken today`:'';
    const L=g('list');
    if(!M.length){ L.innerHTML='<div class="empty">No medications added yet.</div>'; return; }
    L.innerHTML=[...M].sort((a,b)=>(a.time||'~')<(b.time||'~')?-1:1).map(x=>{ const t=taken.ids.includes(x.id);
      return `<div class="med ${t?'taken':''}"><div class="box" onclick="toggle(${x.id})">${t?'✓':''}</div><div class="info"><div class="nm">${esc(x.nm)}</div>${x.time?`<div class="meta">⏰ ${x.time}</div>`:''}</div><span class="x" onclick="del(${x.id})">✕</span></div>`;
    }).join('');
  }
  render();
</script>
</body>
</html>
