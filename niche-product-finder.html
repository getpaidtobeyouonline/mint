<title>Niche Product Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#325132;color:#FFFFFF;font-family:'DM Sans',sans-serif;min-height:100vh;padding:2rem 1rem}
.container{max-width:680px;margin:0 auto}
header{text-align:center;margin-bottom:2rem}
h1{font-family:'Playfair Display',serif;font-size:2.1rem;color:#5AE57A;margin-bottom:.5rem}
.subtitle{opacity:.65;font-size:.95rem}
.card{background:#3C603C;border:1px solid #4C724C;border-radius:12px;padding:1.4rem 1.5rem;margin-bottom:1.25rem}
.card h2{font-family:'Playfair Display',serif;color:#5AE57A;font-size:1rem;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid #4C724C}
.grid{display:grid;gap:.6rem}
.g2{grid-template-columns:1fr 1fr}
.g4{grid-template-columns:repeat(4,1fr)}
.opt{background:#325132;border:2px solid #4C724C;border-radius:8px;padding:.7rem .6rem;cursor:pointer;font-size:.82rem;text-align:center;transition:all .2s;line-height:1.3}
.opt:hover{border-color:#5AE57A}
.opt.sel{border-color:#5AE57A;color:#5AE57A;background:#325132}
.opt .ico{font-size:1.3rem;display:block;margin-bottom:.25rem}
.opt strong{display:block;font-size:.82rem}
.opt small{opacity:.5;font-size:.75rem}
.btn{width:100%;background:#5AE57A;color:#325132;border:none;border-radius:8px;padding:.9rem;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.02em;transition:opacity .2s;margin-bottom:1.25rem}
.btn:hover{opacity:.88}
.results{display:none}
.results.show{display:block}
.r-card{background:#3C603C;border:1px solid #4C724C;border-left:3px solid #5AE57A;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.r-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:#5AE57A;opacity:.65;margin-bottom:.25rem}
.r-name{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:.75rem}
.tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.6rem}
.tag{border-radius:4px;padding:.2rem .6rem;font-size:.75rem;border:1px solid #4C724C;opacity:.75}
.tag.g{border-color:#5AE57A;color:#5AE57A;opacity:1}
.r-why{font-size:.85rem;opacity:.55;line-height:1.5}
footer{text-align:center;font-size:.75rem;opacity:.4;margin-top:2rem;padding-bottom:1rem}
@media(max-width:500px){h1{font-size:1.75rem}.g4{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Niche Product Finder</h1>
    <p class="subtitle">Answer 4 questions. Get 3 product ideas matched to your skills and audience.</p>
  </header>

  <div class="card">
    <h2>1. What's your topic area?</h2>
    <div class="grid g4" id="topicGrid"></div>
  </div>

  <div class="card">
    <h2>2. Who is your audience?</h2>
    <div class="grid g2" id="audienceGrid"></div>
  </div>

  <div class="card">
    <h2>3. What transformation do you deliver?</h2>
    <div class="grid g2" id="transformGrid"></div>
  </div>

  <div class="card">
    <h2>4. What format suits you best?</h2>
    <div class="grid g2" id="formatGrid"></div>
  </div>

  <button class="btn" onclick="find()">Find My Niche Products →</button>

  <div class="results" id="results">
    <div class="card" style="border-color:#C9A84C33">
      <h2>Your Matched Product Ideas</h2>
      <div id="cards"></div>
    </div>
  </div>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

  {name:"Macro & Calorie Tracker Spreadsheet",t:'health',f:'spreadsheet',a:'intermediate',x:'time',price:'$9–$17',where:'Gumroad, Etsy',why:'Solves a real daily pain. High repeat use drives word-of-mouth.'},

  {name:"Freelancer Tax Prep Checklist",t:'finance',f:'checklist',a:'professionals',x:'time',price:'$9–$27',where:'Gumroad, Payhip',why:'High-anxiety topic — people gladly pay to reduce tax stress.'},

  {name:"Parenting Conversation Starters Guide",t:'parenting',f:'guide',a:'beginners',x:'confidence',price:'$7–$17',where:'Gumroad, Payhip',why:'Emotional need. Excellent gift product.'},

  {name:"Home Organization Template Pack",t:'lifestyle',f:'template',a:'beginners',x:'confidence',price:'$9–$17',where:'Etsy, Gumroad',why:'Visual results = high satisfaction, five-star reviews.'},
  {name:"Weekly Life Planner & Habit Tracker",t:'lifestyle',f:'planner',a:'intermediate',x:'time',price:'$9–$17',where:'Etsy, Gumroad',why:'Popular category. Endless niche variations to stand out.'},
  {name:"Morning Routine Starter Guide",t:'lifestyle',f:'guide',a:'beginners',x:'time',price:'$7–$17',where:'Gumroad, Payhip',why:'Self-improvement always sells. Easy to create in a weekend.'}
];

const sel = {topic:null, audience:null, transform:null, format:null};

function buildGrid(id, items, key, hasIco) {
  document.getElementById(id).innerHTML = items.map(item =>
    `<div class="opt" id="${key}_${item.id}" onclick="pick('${key}','${item.id}')">
      ${hasIco ? `<span class="ico">${item.ico}</span>` : ''}
      <strong>${item.label}</strong>
      ${item.desc ? `<small>${item.desc}</small>` : ''}
    </div>`
  ).join('');
}

function pick(key, id) {
  if (sel[key]) {
    const old = document.getElementById(key + '_' + sel[key]);
    if (old) old.classList.remove('sel');
  }
  sel[key] = id;
  document.getElementById(key + '_' + id).classList.add('sel');
}

function find() {
  if (!sel.topic || !sel.audience || !sel.transform || !sel.format) {
    alert('Please answer all 4 questions first.');
    return;
  }
  const top3 = ideas
    .filter(i => i.t === sel.topic)
    .map(i => ({...i, score: (i.f===sel.format?4:0)+(i.a===sel.audience?3:0)+(i.x===sel.transform?2:0)}))
    .sort((a,b) => b.score - a.score)
    .slice(0, 3);

  const labels = ['Top Pick','Runner Up','Also Consider'];
  document.getElementById('cards').innerHTML = top3.map((idea, i) => `
    <div class="r-card">
      <div class="r-label">${labels[i]}</div>
      <div class="r-name">${idea.name}</div>
      <div class="tags">
        <span class="tag g">${idea.price}</span>
        <span class="tag">Sell on: ${idea.where}</span>
      </div>
      <div class="r-why">${idea.why}</div>
    </div>`).join('');

  const res = document.getElementById('results');
  res.classList.add('show');
  res.scrollIntoView({behavior:'smooth', block:'start'});
}

buildGrid('topicGrid', topics, 'topic', true);
buildGrid('audienceGrid', audiences, 'audience', false);
buildGrid('transformGrid', transforms, 'transform', false);
buildGrid('formatGrid', formats, 'format', false);
</script>

</html>
