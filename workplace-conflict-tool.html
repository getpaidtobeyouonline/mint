<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Workplace Conflict Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Workplace Conflict Tool</h1>
  <p class="sub">Think a tense situation through calmly — and plan a constructive conversation.</p>

  <div class="panel">
    <label for="situation">The situation (just the facts)</label>
    <textarea id="situation" placeholder="What happened, without the story or blame"></textarea>
    <label for="theirview">Their likely point of view</label>
    <textarea id="theirview" placeholder="Genuinely try to see it from their side"></textarea>
    <label for="mypart">Your part in it</label>
    <textarea id="mypart" placeholder="Honestly — what you may have contributed"></textarea>
    <label for="need">What you actually need</label>
    <input id="need" placeholder="The real outcome you want, not just to be right">
    <label for="opener">How you will open the conversation</label>
    <textarea id="opener" placeholder="A calm, non-blaming first sentence"></textarea>
    <button class="btn" onclick="gen()">Build Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['situation','theirview','mypart','need','opener'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('wct_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('wct_'+k,g(k).value)); });
  function gen(){
    const t='WORKPLACE CONFLICT PLAN\n\nTHE SITUATION (facts only):\n'+(v('situation')||'[what happened, no story]')+
    '\n\nTHEIR POINT OF VIEW:\n'+(v('theirview')||'[how they likely see it]')+
    '\n\nMY PART IN IT:\n'+(v('mypart')||'[what you may have contributed]')+
    '\n\nWHAT I ACTUALLY NEED:\n'+(v('need')||'[the real outcome you want]')+
    '\n\nHOW I WILL OPEN:\n"'+(v('opener')||'[a calm, non-blaming first line]')+'"'+
    '\n\n--- For the conversation ---\nPick a private moment when you are both calm — never in front of others.\nUse "I" statements: describe impact, not character.\nListen fully before responding. Aim to solve the problem, not win.\nIf it escalates or feels unsafe, involve a manager or HR.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
