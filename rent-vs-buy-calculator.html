<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rent vs Buy Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 600px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; } .row>div { flex: 1; }
  h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1rem; margin-bottom: 4px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin-top: 12px; }
  .result { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; margin-top: 12px; display: none; }
  .cols { display: flex; gap: 8px; }
  .cols div { flex: 1; text-align: center; background: #3C603C; border: 1px solid #4C724C; border-radius: 8px; padding: 12px 6px; }
  .cols .v { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: #5AE57A; }
  .cols .l { font-size: .68rem; opacity: .65; text-transform: uppercase; }
  .verdict { text-align: center; font-size: .9rem; margin-top: 10px; }
  .note { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; font-size: .8rem; opacity: .75; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Rent vs Buy Calculator</h1>
  <p class="sub">A simple comparison of total cost over a period you plan to stay.</p>

  <div class="panel">
    <h3>Renting</h3>
    <div class="row">
      <div><label>Monthly rent</label><input id="rent" type="number" min="0" placeholder="e.g. 1000"></div>
      <div><label>Annual rent rise %</label><input id="rrise" type="number" step="0.1" value="3"></div>
    </div>
  </div>

  <div class="panel">
    <h3>Buying</h3>
    <div class="row">
      <div><label>Upfront costs (deposit + fees)</label><input id="upfront" type="number" min="0" placeholder="e.g. 30000"></div>
      <div><label>Monthly mortgage + costs</label><input id="own" type="number" min="0" placeholder="e.g. 1100"></div>
    </div>
  </div>

  <div class="panel">
    <label>Years you plan to stay</label>
    <input id="years" type="number" min="1" value="7">
    <button class="btn" onclick="calc()">Compare</button>
    <div class="result" id="result"></div>
    <div class="note">A simplified estimate. It does not model house price changes, equity built, or investment returns on a deposit — use it as a rough guide only.</div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const fmt=n=>n.toLocaleString(undefined,{maximumFractionDigits:0});
  function calc(){
    const rent=+g('rent').value, rrise=+g('rrise').value/100, upfront=+g('upfront').value||0, own=+g('own').value, years=+g('years').value;
    if(!rent||!own||!years){ alert('Fill in rent, monthly buying cost and years.'); return; }
    let rentTotal=0, m=rent;
    for(let y=0;y<years;y++){ rentTotal+=m*12; m*=(1+rrise); }
    const buyTotal=upfront+own*12*years;
    const cheaper=rentTotal<buyTotal?'Renting':'Buying';
    const diff=Math.abs(rentTotal-buyTotal);
    g('result').style.display='block';
    g('result').innerHTML='<div class="cols"><div><div class="v">'+fmt(rentTotal)+'</div><div class="l">Total to rent</div></div><div><div class="v">'+fmt(buyTotal)+'</div><div class="l">Total to buy</div></div></div>'+
      '<div class="verdict">Over '+years+' years, <b style="color:#5AE57A">'+cheaper+'</b> costs about '+fmt(diff)+' less in cash out — but remember buying also builds equity the longer you stay.</div>';
    g('result').scrollIntoView({behavior:'smooth'});
  }
</script>
</body>
</html>
