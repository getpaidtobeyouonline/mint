<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Flash Sale Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#325132;color:#FFFFFF;font-family:'DM Sans',sans-serif;min-height:100vh;padding:2rem 1rem}
.container{max-width:680px;margin:0 auto}
header{text-align:center;margin-bottom:2rem}
h1{font-family:'Playfair Display',serif;font-size:2.1rem;color:#5AE57A;margin-bottom:.5rem}
.subtitle{opacity:.65;font-size:.95rem;max-width:480px;margin:0 auto}
.card{background:#3C603C;border:1px solid #4C724C;border-radius:12px;padding:1.4rem 1.5rem;margin-bottom:1.25rem}
.card h2{font-family:'Playfair Display',serif;color:#5AE57A;font-size:1rem;margin-bottom:.9rem;padding-bottom:.5rem;border-bottom:1px solid #4C724C}
label{display:block;font-size:.82rem;font-weight:500;opacity:.7;margin-bottom:.4rem;margin-top:.85rem}
label:first-of-type{margin-top:0}
.input-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
input[type=number]{width:100%;background:#325132;border:1px solid #4C724C;border-radius:8px;padding:.7rem .9rem;color:#FFFFFF;font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s;-moz-appearance:textfield}
input[type=number]:focus{border-color:#5AE57A}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
.opt-row{display:flex;gap:.55rem;flex-wrap:wrap}
.opt{flex:1;min-width:0;background:#325132;border:1px solid #4C724C;border-radius:8px;padding:.55rem .4rem;text-align:center;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;color:#FFFFFF;transition:border-color .2s,color .2s,background .2s}
.opt.sel{border-color:#5AE57A;color:#5AE57A;background:#325132}
.btn{width:100%;background:#5AE57A;color:#325132;border:none;border-radius:8px;padding:.9rem;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.02em;transition:opacity .2s;margin-top:.9rem}
.btn:hover{opacity:.88}
.results{display:none}
.results.show{display:block}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;margin-bottom:.75rem}
.stat{background:#3C603C;border:1px solid #4C724C;border-radius:8px;padding:.65rem .5rem;text-align:center}
.stat-val{font-family:'Playfair Display',serif;font-size:1.2rem;color:#5AE57A;display:block}
.stat-lbl{font-size:.63rem;opacity:.45;display:block;margin-top:.15rem;text-transform:uppercase;letter-spacing:.06em}
.sum-card{background:#325132;border:1px solid #C9A84C44;border-radius:12px;padding:1.3rem 1.5rem;margin-bottom:1rem}
.sum-lbl{font-size:.72rem;opacity:.45;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
.sum-big{font-family:'Playfair Display',serif;font-size:2.5rem;color:#5AE57A;line-height:1;margin-bottom:.65rem}
.sum-compare{font-size:.83rem;opacity:.68;line-height:1.5;padding:.5rem .7rem;background:#325132;border-radius:6px;margin-bottom:.5rem}
.sum-note{font-size:.78rem;opacity:.5;line-height:1.4}
.section-card{background:#3C603C;border:1px solid #4C724C;border-radius:10px;padding:1.1rem 1.25rem;margin-bottom:.85rem}
.section-card h3{font-family:'Playfair Display',serif;font-size:.95rem;color:#5AE57A;margin-bottom:.75rem}
.funnel{display:flex;align-items:center;justify-content:space-between;gap:.3rem;margin-bottom:.55rem}
.f-step{text-align:center;flex:1;min-width:0}
.f-val{font-family:'Playfair Display',serif;font-size:1.15rem;color:#FFFFFF;display:block}
.f-lbl{font-size:.6rem;opacity:.4;text-transform:uppercase;letter-spacing:.05em;display:block;margin-top:.1rem}
.f-arr{opacity:.25;font-size:.9rem;flex-shrink:0}
.f-note{font-size:.72rem;opacity:.4;text-align:center;font-style:italic;line-height:1.4}
.v-item{margin-bottom:.6rem;padding-bottom:.6rem;border-bottom:1px solid #3C603C}
.v-item:last-of-type{border-bottom:none;margin-bottom:0;padding-bottom:0}
.v-key{font-size:.7rem;opacity:.35;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:.2rem}
.v-text{font-size:.83rem;opacity:.72;line-height:1.45}
.v-tip{background:#325132;border-radius:6px;padding:.55rem .75rem;font-size:.78rem;opacity:.6;line-height:1.45;margin-top:.7rem}
.v-tip strong{color:#5AE57A;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em}
.copy-btn{width:100%;background:transparent;border:1px solid #5AE57A;color:#5AE57A;border-radius:8px;padding:.75rem;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:.25rem}
.copy-btn:hover{opacity:.7}
footer{text-align:center;font-size:.75rem;opacity:.4;margin-top:2rem;padding-bottom:1rem}
@media(max-width:480px){h1{font-size:1.75rem}.stats{grid-template-columns:repeat(2,1fr)}.input-row{grid-template-columns:1fr}.funnel{gap:.15rem}.f-val{font-size:.95rem}}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Minted Flash Sale Calculator</h1>
    <p class="subtitle">Enter your price, discount, and list size to project revenue, map the email funnel, and see whether your flash sale is actually worth running.</p>
  </header>

  <div class="card">
    <h2>Your Flash Sale</h2>
    <label>Product Type</label>
    <div class="opt-row">
      <button class="opt sel" onclick="pickPT(0)" id="pt0">Course</button>
      <button class="opt"     onclick="pickPT(1)" id="pt1">Ebook</button>
      <button class="opt"     onclick="pickPT(2)" id="pt2">Template Kit</button>
      <button class="opt"     onclick="pickPT(3)" id="pt3">Membership</button>
      <button class="opt"     onclick="pickPT(4)" id="pt4">Coaching</button>
    </div>
    <div class="input-row" style="margin-top:.85rem">
      <div>
        <label style="margin-top:0">Full Price ($)</label>
        <input type="number" id="inP" placeholder="97" min="1">
      </div>
      <div>
        <label style="margin-top:0">Email List Size</label>
        <input type="number" id="inL" placeholder="2500" min="1">
      </div>
    </div>
    <label>Email Open Rate (%)</label>
    <input type="number" id="inO" placeholder="25" min="1" max="100">
    <label>Discount</label>
    <div class="opt-row">
      <button class="opt"     onclick="pickD(0)" id="d0">20% off</button>
      <button class="opt sel" onclick="pickD(1)" id="d1">30% off</button>
      <button class="opt"     onclick="pickD(2)" id="d2">40% off</button>
      <button class="opt"     onclick="pickD(3)" id="d3">50% off</button>
    </div>
    <label>Sale Duration</label>
    <div class="opt-row">
      <button class="opt"     onclick="pickDur(0)" id="dur0">24 Hours</button>
      <button class="opt sel" onclick="pickDur(1)" id="dur1">48 Hours</button>
      <button class="opt"     onclick="pickDur(2)" id="dur2">72 Hours</button>
      <button class="opt"     onclick="pickDur(3)" id="dur3">5 Days</button>
    </div>
    <button class="btn" onclick="generate()">Calculate My Flash Sale →</button>
  </div>

  <div class="results" id="results">
    <div class="stats"   id="statsBar"></div>
    <div id="sumCard"></div>
    <div class="section-card" id="funnelCard"></div>
    <div class="section-card" id="verdictCard"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyResults()">Copy Flash Sale Plan as Text</button>
  </div>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>
<script>
const st   = (v,l) => `<div class="stat"><span class="stat-val">${v}</span><span class="stat-lbl">${l}</span></div>`;
const fmt$ = n => n >= 10000 ? '$'+(n/1000).toFixed(0)+'k' : n >= 1000 ? '$'+(n/1000).toFixed(1)+'k' : '$'+n.toFixed(n===Math.round(n)?0:2);
const fmtN = n => n >= 10000 ? (n/1000).toFixed(0)+'k' : n >= 1000 ? (n/1000).toFixed(1)+'k' : n.toString();
const ptLabel   = ['Course','Ebook','Template Kit','Membership','Coaching'];
const discOpts  = [20, 30, 40, 50];
const durLabels = ['24 Hours','48 Hours','72 Hours','5 Days'];
const convRates = [3.5, 2.5, 2.0, 1.5]; // flash conversion rate of clicks → sales by duration
const CTR       = 0.025;

const discRecs = [
  '20% off keeps margins strong — ideal for a loyal-buyer appreciation flash or a quick re-engagement campaign with your warmest audience.',
  '30% off is the sweet spot: urgent enough to drive real action without signalling that your full price was inflated all along.',
  '40% off is aggressive territory — reserve this for a once-a-year event, a major re-launch, or a product you\'re sunsetting.',
  '50% off sends a clearance signal. It converts volume in the short term, but trains buyers to wait for sales on every future launch.',
];
const durNotes = [
  'Maximum urgency. Best for warm, engaged lists. Lower total volume but the highest commit-to-click ratio of any window.',
  'The sweet spot for most lists — enough time to reach slow openers without giving urgency long enough to evaporate.',
  'Works well for smaller lists that need longer exposure. Plan three emails: open, 36-hour push, and final hours.',
  'Only use 5 days if you\'re layering bonuses or a countdown structure. A flat 5-day sale with no variation kills urgency fast.',
];
const powerMoves = [
  'Send your "last 3 hours" email at 9pm local — evening close emails in 24h flash sales close 50–60% of total revenue.',
  'Three emails: launch, 24-hour reminder, and "closing tonight." The final email alone drives 40–50% of total flash sale revenue.',
  'Add a bonus that disappears at the 48-hour mark — it creates a urgency spike inside the longer window and reactivates non-openers.',
  'Structure as 3-day sale + 2-day countdown bonus. The bonus change on day 3 re-engages people who ignored the first two emails.',
];

let state = {pt:0, d:1, dur:1};
function pickPT(i)  { state.pt=i;  [0,1,2,3,4].forEach(x=>document.getElementById(`pt${x}`).classList.toggle('sel',x===i)); }
function pickD(i)   { state.d=i;   [0,1,2,3].forEach(x=>document.getElementById(`d${x}`).classList.toggle('sel',x===i)); }
function pickDur(i) { state.dur=i; [0,1,2,3].forEach(x=>document.getElementById(`dur${x}`).classList.toggle('sel',x===i)); }

function calc() {
  const orig     = parseFloat(document.getElementById('inP').value) || 0;
  const listSize = parseInt(document.getElementById('inL').value)   || 0;
  const openRate = parseFloat(document.getElementById('inO').value) || 0;
  const disc     = discOpts[state.d];
  const salePrice   = parseFloat((orig * (1 - disc/100)).toFixed(2));
  const sacPerSale  = parseFloat((orig - salePrice).toFixed(2));
  const breakEven   = Math.round((1/(1-disc/100) - 1) * 100);
  const opens       = Math.round(listSize * openRate / 100);
  const clicks      = Math.round(opens * CTR);
  const convRate    = convRates[state.dur];
  const projSales   = Math.round(clicks * convRate / 100);
  const projRev     = projSales * salePrice;
  const fullRev     = projSales * orig;
  const revGap      = fullRev - projRev;
  return {orig, listSize, openRate, disc, salePrice, sacPerSale, breakEven, opens, clicks, convRate, projSales, projRev, fullRev, revGap};
}

function generate() {
  const orig     = parseFloat(document.getElementById('inP').value);
  const listSize = parseInt(document.getElementById('inL').value);
  const openRate = parseFloat(document.getElementById('inO').value);
  if (!orig || orig<=0 || !listSize || listSize<=0 || !openRate || openRate<=0) {
    alert('Please fill in Full Price, Email List Size, and Open Rate.'); return;
  }
  const d = calc();

  document.getElementById('statsBar').innerHTML =
    st(fmt$(d.salePrice),'Sale Price') + st(fmt$(d.projRev),'Proj. Revenue') + st(d.projSales,'Proj. Sales') + st('+'+d.breakEven+'%','Min. Uplift Needed');

  document.getElementById('sumCard').innerHTML = `
    <div class="sum-card">
      <div class="sum-lbl">Projected Flash Sale Revenue</div>
      <div class="sum-big">${fmt$(d.projRev)}</div>
      <div class="sum-compare">At full price, ${d.projSales} sales = ${fmt$(d.fullRev)}. Your ${d.disc}% discount trades ${fmt$(d.sacPerSale)}/sale in margin for urgency — the gap is ${fmt$(d.revGap)} total across this sale.</div>
      <div class="sum-note">Break-even: to match what these ${d.projSales} sales would earn at full price, you need ${d.breakEven}% more sales than your normal baseline.</div>
    </div>`;

  document.getElementById('funnelCard').innerHTML = `
    <h3>Email Funnel</h3>
    <div class="funnel">
      <div class="f-step"><span class="f-val">${fmtN(d.listSize)}</span><span class="f-lbl">List</span></div>
      <span class="f-arr">→</span>
      <div class="f-step"><span class="f-val">${fmtN(d.opens)}</span><span class="f-lbl">Opens</span></div>
      <span class="f-arr">→</span>
      <div class="f-step"><span class="f-val">${fmtN(d.clicks)}</span><span class="f-lbl">Clicks</span></div>
      <span class="f-arr">→</span>
      <div class="f-step"><span class="f-val" style="color:#5AE57A">${d.projSales}</span><span class="f-lbl">Sales</span></div>
    </div>
    <div class="f-note">${d.openRate}% open rate · 2.5% CTR (industry avg) · ${d.convRate}% flash conversion · ${durLabels[state.dur]} window</div>`;

  document.getElementById('verdictCard').innerHTML = `
    <h3>Flash Sale Verdict</h3>
    <div class="v-item"><span class="v-key">Discount Depth — ${d.disc}% off</span><div class="v-text">${discRecs[state.d]}</div></div>
    <div class="v-item"><span class="v-key">Duration — ${durLabels[state.dur]}</span><div class="v-text">${durNotes[state.dur]}</div></div>
    <div class="v-tip"><strong>Power move</strong>${powerMoves[state.dur]}</div>`;

  const r = document.getElementById('results');
  r.classList.add('show');
  r.scrollIntoView({behavior:'smooth', block:'start'});
}

function copyResults() {
  const orig = parseFloat(document.getElementById('inP').value);
  if (!orig) return;
  const d = calc();
  let text = `FLASH SALE CALCULATOR\n`;
  text += `Product: ${ptLabel[state.pt]} · Full Price: ${fmt$(d.orig)} · Discount: ${d.disc}% · Sale Price: ${fmt$(d.salePrice)}\n`;
  text += `Duration: ${durLabels[state.dur]}\n\n`;
  text += `PROJECTED RESULTS\n${'─'.repeat(36)}\n`;
  text += `Projected Sales: ${d.projSales} units\n`;
  text += `Projected Revenue: ${fmt$(d.projRev)}\n`;
  text += `At Full Price: ${fmt$(d.fullRev)}\n`;
  text += `Revenue Traded: ${fmt$(d.revGap)}\n`;
  text += `Min. Volume Uplift Needed: +${d.breakEven}%\n\n`;
  text += `EMAIL FUNNEL\n${'─'.repeat(36)}\n`;
  text += `List: ${fmtN(d.listSize)} → Opens: ${fmtN(d.opens)} → Clicks: ${fmtN(d.clicks)} → Sales: ${d.projSales}\n`;
  text += `(${d.openRate}% open rate · 2.5% CTR · ${d.convRate}% flash conversion)\n\n`;
  text += `VERDICT\n${'─'.repeat(36)}\n`;
  text += `Discount (${d.disc}% off): ${discRecs[state.d]}\n\n`;
  text += `Duration (${durLabels[state.dur]}): ${durNotes[state.dur]}\n\n`;
  text += `Power Move: ${powerMoves[state.dur]}\n`;
  text += `\n---\nCreated with Flash Sale Calculator by GetPaidToBeYouOnline`;

  const btn  = document.getElementById('copyBtn');
  const done = () => { btn.textContent='Copied!'; setTimeout(()=>btn.textContent='Copy Flash Sale Plan as Text',2200); };
  navigator.clipboard ? navigator.clipboard.writeText(text).then(done)
    : (()=>{ const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done(); })();
}
</script>
</body>
</html>
