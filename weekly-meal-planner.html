<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Weekly Meal Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .day { margin-bottom: 12px; }
  .day h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1rem; margin-bottom: 6px; }
  .meal { display: flex; gap: 8px; align-items: center; margin-bottom: 5px; }
  .meal label { font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; opacity: .65; width: 70px; flex: none; }
  .meal input { flex: 1; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family:'DM Sans',sans-serif; font-size: .9rem; padding: 7px 10px; border-radius: 7px; }
  .meal input:focus { outline: none; border-color: #5AE57A; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 10px 18px; border-radius: 8px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Weekly Meal Planner</h1>
  <p class="sub">Plan breakfast, lunch and dinner for the week — saved automatically as you type.</p>

  <div class="panel" id="grid"></div>
  <div class="panel" style="text-align:center">
    <button class="btn" onclick="copyAll()">Copy Week</button>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
  const MEALS=["Breakfast","Lunch","Dinner"];
  let D=JSON.parse(localStorage.getItem('wmp')||'{}');
  const save=()=>localStorage.setItem('wmp',JSON.stringify(D));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function build(){
    g('grid').innerHTML=DAYS.map(d=>'<div class="day"><h3>'+d+'</h3>'+
      MEALS.map(m=>{ const k=d+'|'+m;
        return '<div class="meal"><label>'+m+'</label><input id="'+k.replace(/\|/g,'_')+'" value="'+esc(D[k]||'')+'" oninput="upd(\''+k+'\',this.value)" placeholder="..."></div>';
      }).join('')+'</div>').join('');
  }
  function upd(k,v){ D[k]=v; save(); }
  function copyAll(){
    let t='WEEKLY MEAL PLAN\n';
    DAYS.forEach(d=>{ t+='\n'+d.toUpperCase()+'\n'+MEALS.map(m=>'  '+m+': '+(D[d+'|'+m]||'-')).join('\n')+'\n'; });
    navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.'));
  }
  function clearAll(){ if(confirm('Clear the whole week?')){ D={}; save(); build(); } }
  build();
</script>
</body>
</html>
