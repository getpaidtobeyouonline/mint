<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Business Income Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .big { text-align: center; margin-bottom: 12px; }
  .big .n { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; }
  .grp { font-size: .76rem; text-transform: uppercase; letter-spacing: .04em; color: #5AE57A; margin: 14px 0 6px; display: flex; justify-content: space-between; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 8px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; gap: 8px; font-size: .9rem; }
  .item .val { color: #5AE57A; }
  .item .x { cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Creative Business Income Tool</h1>
  <p class="sub">See every revenue stream side by side — and which stream is really paying you.</p>

  <div class="panel">
    <div class="row">
      <div><label>Stream</label><select id="stream"><option>Originals / commissions</option><option>Prints &amp; products</option><option>Workshops &amp; teaching</option><option>Licensing &amp; royalties</option><option>Subscription / Patreon</option><option>Other</option></select></div>
      <div style="flex:2"><label>What it was</label><input id="what" placeholder="Sale, class, etc."></div>
      <div><label>Amount</label><input id="amt" type="number" step="0.01" min="0" placeholder="0"></div>
      <div><label>Month</label><input id="month" type="month"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Log</button></div>
    </div>
  </div>

  <div class="panel">
    <div class="big"><div class="n" id="total">0</div><div style="opacity:.7;font-size:.85rem">total income logged</div></div>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const ST=['Originals / commissions','Prints & products','Workshops & teaching','Licensing & royalties','Subscription / Patreon','Other'];
  let R=JSON.parse(localStorage.getItem('cbit')||'[]');
  const save=()=>localStorage.setItem('cbit',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const fmt=n=>n.toLocaleString(undefined,{maximumFractionDigits:0});
  function add(){ const a=parseFloat(g('amt').value)||0; if(!a){ alert('Enter an amount.'); return; }
    R.unshift({s:g('stream').value,w:v('what'),a:a,m:g('month').value||new Date().toISOString().slice(0,7)});
    g('what').value=''; g('amt').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all income?')){ R=[]; save(); render(); } }
  function render(){
    g('total').textContent=fmt(R.reduce((s,x)=>s+x.a,0));
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No income logged yet.</div>'; return; }
    L.innerHTML=ST.map(s=>{
      const items=R.map((x,i)=>({x,i})).filter(o=>o.x.s===s);
      if(!items.length)return '';
      const tot=items.reduce((sum,o)=>sum+o.x.a,0);
      return '<div class="grp"><span>'+s+'</span><span class="val">'+fmt(tot)+'</span></div>'+items.map(({x,i})=>
        '<div class="item"><span>'+(esc(x.w)||'—')+'</span><span><span style="opacity:.7;font-size:.8rem">'+x.m+'</span>  <span class="val">'+fmt(x.a)+'</span>  <span class="x" onclick="del('+i+')">✕</span></span></div>').join('');
    }).join('');
  }
  render();
</script>
</body>
</html>
