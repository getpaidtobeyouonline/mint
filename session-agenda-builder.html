<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Agenda Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 140px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Session Agenda Builder</h1>
  <p class="sub">Plan a focused coaching session so every minute earns its place.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="client">Client</label><input id="client" placeholder="Client name"></div>
      <div><label for="length">Session length</label><input id="length" placeholder="e.g. 60 min"></div>
    </div>
    <label for="focus">Focus / outcome for this session</label>
    <input id="focus" placeholder="What this session should achieve">
    <label for="topic">Main topic or work to cover</label>
    <textarea id="topic" placeholder="The core of the session"></textarea>
    <label for="exercise">Key exercise or coaching activity</label>
    <textarea id="exercise" placeholder="The hands-on work or breakthrough piece"></textarea>
    <label for="actions">Actions / homework to set</label>
    <textarea id="actions" placeholder="What the client commits to before next time"></textarea>
    <button class="btn" onclick="gen()">Build Agenda</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['client','length','focus','topic','exercise','actions'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('sab_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('sab_'+k,g(k).value)); });
  function gen(){
    const t='COACHING SESSION AGENDA'+(v('client')?'\nClient: '+v('client'):'')+(v('length')?'  |  '+v('length'):'')+
    (v('focus')?'\nFocus: '+v('focus'):'')+
    '\n\n1. CHECK-IN (5 min)\nWins since last session? Energy and mood today? Anything urgent?\n\n2. REVIEW ACTIONS (5-10 min)\nWhat got done, what did not, and what they learned.\n\n3. MAIN WORK (bulk of the session)\n'+(v('topic')||'[the core topic or work]')+
    '\n\n4. KEY EXERCISE / COACHING\n'+(v('exercise')||'[the hands-on activity]')+
    '\n\n5. ACTIONS & COMMITMENT (10 min)\n'+(v('actions')||'[what they commit to before next time]')+
    '\n\n6. CLOSE (5 min)\nKey takeaway in their words. Confirm next session. End on encouragement.\n\n--- Tip ---\nLeave space — the best breakthroughs rarely fit the plan exactly.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
