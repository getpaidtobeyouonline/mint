<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Financial Freedom Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 10px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .res { text-align: center; background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 10px; padding: 20px; }
  .res .n { font-family: 'Playfair Display', serif; font-size: 2.6rem; color: #5AE57A; line-height: 1; }
  .res .l { font-size: .85rem; opacity: .7; margin-top: 6px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
  .stat { flex: 1; min-width: 120px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 13px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: #5AE57A; }
  .stat .l { font-size: .68rem; opacity: .65; text-transform: uppercase; }
  .note { font-size: .85rem; opacity: .78; margin-top: 12px; text-align: left; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Financial Freedom Calculator</h1>
  <p class="sub">Two questions: how much do you need invested, and how close are you?</p>

  <div class="panel">
    <div class="grid">
      <div><label for="exp">Your annual expenses ($)</label><input id="exp" type="number" min="0" value="40000" oninput="calc()"></div>
      <div><label for="rate">Safe withdrawal rate (%)</label><input id="rate" type="number" min="2" max="6" step="0.1" value="4" oninput="calc()"></div>
    </div>
    <div class="grid">
      <div><label for="have">Currently invested ($)</label><input id="have" type="number" min="0" value="20000" oninput="calc()"></div>
      <div><label for="add">Investing per month ($)</label><input id="add" type="number" min="0" value="800" oninput="calc()"></div>
    </div>
    <label for="ret">Expected real return (% / yr)</label>
    <input id="ret" type="number" min="0" step="0.1" value="7" oninput="calc()">
  </div>

  <div class="res">
    <div class="n" id="number">$0</div>
    <div class="l">your freedom number (25x annual expenses at 4%)</div>
    <div class="stats">
      <div class="stat"><div class="v" id="pct">0%</div><div class="l">there</div></div>
      <div class="stat"><div class="v" id="years">—</div><div class="l">years to go</div></div>
      <div class="stat"><div class="v" id="when">—</div><div class="l">arrive by</div></div>
    </div>
    <div class="note" id="note"></div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), n=id=>parseFloat(g(id).value)||0;
  ['exp','rate','have','add','ret'].forEach(k=>{ const s=localStorage.getItem('ffc_'+k); if(s!==null)g(k).value=s; });
  function calc(){
    ['exp','rate','have','add','ret'].forEach(k=>localStorage.setItem('ffc_'+k,g(k).value));
    const number=n('exp')*(100/Math.max(2,n('rate')));
    g('number').textContent='$'+Math.round(number).toLocaleString();
    g('pct').textContent= number>0?Math.min(100,Math.round(n('have')/number*100))+'%':'0%';
    const r=n('ret')/100/12, P=n('have'), pm=n('add'); let y='—', wh='—';
    if (P>=number) { y='0'; wh='today'; }
    else if (r>0 && pm>0) {
      // months until P*(1+r)^m + pm*((1+r)^m-1)/r = number
      let lo=0, hi=12*100;
      while(lo<hi){ const m=(lo+hi)>>1; const fv=P*Math.pow(1+r,m)+pm*(Math.pow(1+r,m)-1)/r; if(fv<number)lo=m+1; else hi=m; }
      const yr=lo/12; y=yr.toFixed(1); const d=new Date(); d.setMonth(d.getMonth()+lo); wh=d.toISOString().slice(0,7);
    } else if(pm>0){ const yr=(number-P)/(pm*12); y=yr.toFixed(1); const d=new Date(); d.setMonth(d.getMonth()+Math.round(yr*12)); wh=d.toISOString().slice(0,7); }
    g('years').textContent=y; g('when').textContent=wh;
    g('note').textContent = P>=number ? 'You are at financial freedom by this definition. Withdrawal rate, not income, is the new game.'
      : 'Two levers move the date: lower expenses (cuts the number AND raises savings) or invest more. Lowering expenses by $1/mo saves ~$300 of needed capital.';
  }
  calc();
</script>
</body>
</html>
