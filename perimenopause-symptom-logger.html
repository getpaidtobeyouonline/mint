<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Perimenopause Symptom Logger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 120px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 12px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .row2 { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 9px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: .85rem; gap: 10px; }
  .row2 .x { cursor: pointer; opacity: .5; } .row2 .x:hover { opacity: 1; color: #5AE57A; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 5px; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  .note { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; font-size: .8rem; opacity: .75; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Perimenopause Symptom Logger</h1>
  <p class="sub">Track symptoms over time. A clear record makes doctor conversations far more useful.</p>

  <div class="panel">
    <div class="row">
      <div><label>Date</label><input id="dt" type="date"></div>
      <div><label>Symptom</label><select id="sym"><option>Hot flushes</option><option>Night sweats</option><option>Sleep disruption</option><option>Mood changes</option><option>Brain fog</option><option>Irregular periods</option><option>Fatigue</option><option>Joint aches</option><option>Anxiety</option><option>Low libido</option><option>Other</option></select></div>
      <div><label>Severity</label><select id="sev"><option>Mild</option><option>Moderate</option><option>Severe</option></select></div>
    </div>
    <label>Note (trigger, time of day, anything else)</label>
    <input id="note" placeholder="Optional">
    <button class="btn" onclick="add()">+ Log Symptom</button>
    <div class="note">A personal record only — not a diagnosis. Bring this log to a healthcare professional for proper assessment.</div>
  </div>

  <div class="panel">
    <button class="btn ghost" onclick="copyLog()" style="margin-top:0">Copy log for doctor</button>
    <div id="list" style="margin-top:12px"></div>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('psl')||'[]');
  const save=()=>localStorage.setItem('psl',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const COL={Mild:'#5AE57A',Moderate:'#5AE57A',Severe:'#5AE57A'};
  g('dt').value=new Date().toISOString().slice(0,10);
  function add(){
    R.push({d:g('dt').value||new Date().toISOString().slice(0,10),s:g('sym').value,sev:g('sev').value,note:v('note')});
    g('note').value=''; save(); render();
  }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all logged symptoms?')){ R=[]; save(); render(); } }
  function copyLog(){ if(!R.length){alert('Nothing logged yet.');return;}
    const t='PERIMENOPAUSE SYMPTOM LOG\n\n'+[...R].sort((a,b)=>a.d<b.d?-1:1).map(x=>x.d+' — '+x.s+' ('+x.sev+')'+(x.note?' — '+x.note:'')).join('\n');
    navigator.clipboard.writeText(t).then(()=>alert('Log copied!'),()=>alert('Copy failed.'));
  }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No symptoms logged yet.</div>'; return; }
    L.innerHTML=[...R].map((x,i)=>({x,i})).sort((a,b)=>a.x.d<b.x.d?1:-1).map(({x,i})=>
      '<div class="row2"><span><span class="dot" style="background:'+COL[x.sev]+'"></span><b style="color:#5AE57A">'+x.d+'</b> · '+esc(x.s)+' · '+x.sev+(x.note?' · '+esc(x.note):'')+'</span><span class="x" onclick="del('+i+')">✕</span></div>').join('');
  }
  render();
</script>
</body>
</html>
