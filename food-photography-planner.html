<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Food Photography Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 48px; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .checks { margin-bottom: 14px; }
  .item { display: flex; align-items: center; gap: 9px; padding: 6px 0; border-bottom: 1px solid #4C724C; cursor: pointer; font-size: .87rem; }
  .item:last-child { border-bottom: none; }
  .box { width: 18px; height: 18px; border: 2px solid #5AE57A; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; font-size: .68rem; font-weight: 700; }
  .box.on { background: #5AE57A; color: #325132; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .9rem; }
  h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1rem; margin-bottom: 6px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Food Photography Planner</h1>
  <p class="sub">Plan a food shoot that looks the part — setup, styling and shot list.</p>

  <div class="panel">
    <h3>Pre-shoot checklist</h3>
    <div class="checks" id="checks"></div>
    <label for="dish">Dish you are shooting</label>
    <input id="dish" placeholder="The food / recipe">
    <label for="story">The look / mood you want</label>
    <input id="story" placeholder="e.g. Bright and fresh, or moody and rustic">
    <label for="props">Props &amp; surfaces</label>
    <textarea id="props" placeholder="Plates, linens, board, cutlery, garnish"></textarea>
    <label for="shots">Shot list</label>
    <textarea id="shots" placeholder="e.g. Overhead hero, 45-degree, close-up texture, a 'process' shot"></textarea>
    <button class="btn" onclick="gen()">Build Shoot Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const CHECKS=["Shoot near a window — natural light is best","Avoid harsh direct sun; diffuse it if needed","Tidy the background — keep it simple","Have a clean cloth for spills and smudges","Garnish and finishing touches ready","Phone/camera lens wiped clean","Food photographed FRESH — it fades fast"];
  let st=JSON.parse(localStorage.getItem('fpp_chk')||'{}');
  const F=['dish','story','props','shots'];
  F.forEach(k=>{ const s=localStorage.getItem('fpp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('fpp_'+k,g(k).value)); });
  function tog(i){ st[i]=!st[i]; localStorage.setItem('fpp_chk',JSON.stringify(st)); draw(); }
  function draw(){
    g('checks').innerHTML=CHECKS.map((c,i)=>'<div class="item" onclick="tog('+i+')"><span class="box'+(st[i]?' on':'')+'">'+(st[i]?'✓':'')+'</span><span>'+c+'</span></div>').join('');
  }
  function gen(){
    const t=`FOOD PHOTOGRAPHY SHOOT PLAN\n\nDISH:\n${v('dish')||'[the dish]'}\n\nLOOK / MOOD:\n${v('story')||'[the mood you want]'}\n\nPROPS & SURFACES:\n${v('props')||'[plates, linens, board...]'}\n\nSHOT LIST:\n${v('shots')||'[overhead, 45-degree, close-up...]'}\n\n--- On the day ---\nShoot in soft natural light. Style the plate, then shoot fast — food does not stay photogenic.\nTake more frames than you think you need, and vary the angle every few shots.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  draw();
</script>
</body>
</html>
