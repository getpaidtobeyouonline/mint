<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evening Reflection Prompt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 10px 0 5px; }
  textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; min-height: 56px; }
  textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .ent { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 12px 15px; margin-bottom: 9px; }
  .ent .d { font-size: .78rem; opacity: .6; }
  .ent .x { float: right; cursor: pointer; opacity: .5; } .ent .x:hover { opacity: 1; color: #5AE57A; }
  .ent p { font-size: .9rem; margin-top: 4px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Evening Reflection Prompt</h1>
  <p class="sub">Close the day with three sentences. The brain consolidates whatever you replay before sleep.</p>

  <div class="panel">
    <label for="win">One small win today</label>
    <textarea id="win" placeholder="Tiny counts. The smaller the more honest."></textarea>
    <label for="learn">One thing I learned (about anything or anyone)</label>
    <textarea id="learn" placeholder="What did today teach me?"></textarea>
    <label for="release">One thing I am putting down before sleep</label>
    <textarea id="release" placeholder="A worry, a story, a grudge"></textarea>
    <button class="btn" onclick="save()">Close the Day</button>
  </div>

  <div id="list"></div>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let E=JSON.parse(localStorage.getItem('erp')||'[]');
  const saveLs=()=>localStorage.setItem('erp',JSON.stringify(E));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function save(){ if(!v('win')&&!v('learn')&&!v('release')){alert('Add at least one.');return;}
    E.push({d:new Date().toISOString().slice(0,10),win:v('win'),learn:v('learn'),release:v('release')});
    ['win','learn','release'].forEach(k=>g(k).value=''); saveLs(); render(); }
  function del(i){ E.splice(i,1); saveLs(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ E=[]; saveLs(); render(); } }
  function render(){
    const L=g('list');
    if(!E.length){ L.innerHTML=''; return; }
    L.innerHTML=[...E].sort((a,b)=>a.d<b.d?1:-1).map((x,i)=>'<div class="ent"><span class="x" onclick="del('+E.indexOf(x)+')">✕</span><div class="d">'+x.d+'</div>'+
      (x.win?'<p>🏆 '+esc(x.win)+'</p>':'')+
      (x.learn?'<p>💡 '+esc(x.learn)+'</p>':'')+
      (x.release?'<p>🌙 '+esc(x.release)+'</p>':'')+'</div>').join('');
  }
  render();
</script>
</body>
</html>
