<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Bundle Discount Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#325132;color:#FFFFFF;font-family:'DM Sans',sans-serif;min-height:100vh;padding:2rem 1rem}
.container{max-width:680px;margin:0 auto}
header{text-align:center;margin-bottom:2rem}
h1{font-family:'Playfair Display',serif;font-size:2.1rem;color:#5AE57A;margin-bottom:.5rem}
.subtitle{opacity:.65;font-size:.95rem;max-width:480px;margin:0 auto}
.card{background:#3C603C;border:1px solid #4C724C;border-radius:12px;padding:1.4rem 1.5rem;margin-bottom:1.25rem}
.card h2{font-family:'Playfair Display',serif;color:#5AE57A;font-size:1rem;margin-bottom:.9rem;padding-bottom:.5rem;border-bottom:1px solid #4C724C}
label{display:block;font-size:.82rem;font-weight:500;opacity:.7;margin-bottom:.4rem;margin-top:.85rem}
label:first-of-type{margin-top:0}
input[type=text],input[type=number]{background:#325132;border:1px solid #4C724C;border-radius:8px;padding:.65rem .8rem;color:#FFFFFF;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;width:100%}
input[type=text]:focus,input[type=number]:focus{border-color:#5AE57A}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
.opt-row{display:flex;gap:.55rem;flex-wrap:wrap}
.opt{flex:1;min-width:0;background:#325132;border:1px solid #4C724C;border-radius:8px;padding:.55rem .4rem;text-align:center;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;color:#FFFFFF;transition:border-color .2s,color .2s,background .2s}
.opt.sel{border-color:#5AE57A;color:#5AE57A;background:#325132}
.btn{width:100%;background:#5AE57A;color:#325132;border:none;border-radius:8px;padding:.9rem;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.02em;transition:opacity .2s;margin-top:.9rem}
.btn:hover{opacity:.88}
.col-heads{display:grid;grid-template-columns:1fr 100px;gap:.5rem;font-size:.68rem;opacity:.4;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem;padding:0 .1rem}
.item-row{display:grid;grid-template-columns:1fr 100px;gap:.5rem;margin-bottom:.45rem;align-items:center}
.results{display:none}
.results.show{display:block}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;margin-bottom:.75rem}
.stat{background:#3C603C;border:1px solid #4C724C;border-radius:8px;padding:.65rem .5rem;text-align:center}
.stat-val{font-family:'Playfair Display',serif;font-size:1.2rem;color:#5AE57A;display:block}
.stat-lbl{font-size:.63rem;opacity:.45;display:block;margin-top:.15rem;text-transform:uppercase;letter-spacing:.06em}
.sum-card{background:#325132;border:1px solid #C9A84C44;border-radius:12px;padding:1.3rem 1.5rem;margin-bottom:1rem}
.sum-lbl{font-size:.72rem;opacity:.45;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
.sum-big{font-family:'Playfair Display',serif;font-size:2.5rem;color:#5AE57A;line-height:1;margin-bottom:.65rem}
.sum-line{font-size:.84rem;opacity:.68;line-height:1.5;padding:.5rem .7rem;background:#325132;border-radius:6px}
.section-card{background:#3C603C;border:1px solid #4C724C;border-radius:10px;padding:1.1rem 1.25rem;margin-bottom:.85rem}
.section-card h3{font-family:'Playfair Display',serif;font-size:.95rem;color:#5AE57A;margin-bottom:.75rem}
.bd-item{margin-bottom:.65rem}
.bd-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.2rem}
.bd-name{font-size:.83rem;opacity:.75;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bd-price{font-family:'Playfair Display',serif;font-size:.9rem;color:#5AE57A;flex-shrink:0}
.bd-pct{font-size:.7rem;opacity:.4;min-width:2.5rem;text-align:right;flex-shrink:0}
.bd-bar-wrap{height:3px;background:#4C724C;border-radius:2px;overflow:hidden}
.bd-bar{height:100%;background:#5AE57A;border-radius:2px}
.bd-total,.bd-bundle{display:flex;justify-content:space-between;font-size:.83rem;padding:.45rem 0;border-top:1px solid #4C724C;margin-top:.2rem}
.bd-total{opacity:.5}
.bd-bundle{font-weight:600}
.v-item{margin-bottom:.6rem;padding-bottom:.6rem;border-bottom:1px solid #3C603C}
.v-item:last-of-type{border-bottom:none;margin-bottom:0;padding-bottom:0}
.v-key{font-size:.7rem;opacity:.35;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:.2rem}
.v-text{font-size:.83rem;opacity:.72;line-height:1.45}
.v-tip{background:#325132;border-radius:6px;padding:.55rem .75rem;font-size:.78rem;opacity:.6;line-height:1.45;margin-top:.7rem}
.v-tip strong{color:#5AE57A;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em}
.copy-btn{width:100%;background:transparent;border:1px solid #5AE57A;color:#5AE57A;border-radius:8px;padding:.75rem;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:.25rem}
.copy-btn:hover{opacity:.7}
footer{text-align:center;font-size:.75rem;opacity:.4;margin-top:2rem;padding-bottom:1rem}
@media(max-width:480px){h1{font-size:1.75rem}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Minted Bundle Discount Calculator</h1>
    <p class="subtitle">Enter your products, pick a discount, and instantly see your bundle price, customer savings, average order value lift, and whether the pricing holds up.</p>
  </header>

  <div class="card">
    <h2>Your Bundle</h2>
    <label>Product Type</label>
    <div class="opt-row">
      <button class="opt sel" onclick="pickPT(0)" id="pt0">Course</button>
      <button class="opt"     onclick="pickPT(1)" id="pt1">Ebook</button>
      <button class="opt"     onclick="pickPT(2)" id="pt2">Template Kit</button>
      <button class="opt"     onclick="pickPT(3)" id="pt3">Membership</button>
      <button class="opt"     onclick="pickPT(4)" id="pt4">Coaching</button>
    </div>
    <label style="margin-top:1rem">Bundle Items</label>
    <div class="col-heads"><span>Product Name</span><span>Price ($)</span></div>
    <div class="item-row"><input type="text" class="iname" placeholder="Product 1"><input type="number" class="iprice" placeholder="47" min="0"></div>
    <div class="item-row"><input type="text" class="iname" placeholder="Product 2"><input type="number" class="iprice" placeholder="27" min="0"></div>
    <div class="item-row"><input type="text" class="iname" placeholder="Product 3"><input type="number" class="iprice" placeholder="17" min="0"></div>
    <div class="item-row"><input type="text" class="iname" placeholder="Product 4 (optional)"><input type="number" class="iprice" placeholder="" min="0"></div>
    <label>Bundle Discount</label>
    <div class="opt-row">
      <button class="opt"     onclick="pickD(0)" id="d0">15% off</button>
      <button class="opt sel" onclick="pickD(1)" id="d1">20% off</button>
      <button class="opt"     onclick="pickD(2)" id="d2">25% off</button>
      <button class="opt"     onclick="pickD(3)" id="d3">30% off</button>
    </div>
    <button class="btn" onclick="generate()">Calculate My Bundle →</button>
  </div>

  <div class="results" id="results">
    <div class="stats" id="statsBar"></div>
    <div id="sumCard"></div>
    <div class="section-card" id="breakdownCard"></div>
    <div class="section-card" id="verdictCard"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyResults()">Copy Bundle Report as Text</button>
  </div>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>
<script>
const st   = (v,l) => `<div class="stat"><span class="stat-val">${v}</span><span class="stat-lbl">${l}</span></div>`;
const fmt$ = n => n >= 10000 ? '$'+(n/1000).toFixed(0)+'k' : n >= 1000 ? '$'+(n/1000).toFixed(1)+'k' : '$'+(n===Math.floor(n)?n:n.toFixed(2));
const ptLabel  = ['Course','Ebook','Template Kit','Membership','Coaching'];
const discOpts = [15, 20, 25, 30];

const discRecs = [
  '15% off keeps margins strong and positions the bundle as a premium package — ideal when your individual products are already priced competitively.',
  '20% off is the sweet spot for most digital bundles — meaningful savings without signalling that your individual prices were inflated.',
  '25% off creates a compelling offer — most effective for re-engagement campaigns or pairing older products with your newest release.',
  '30% off is a strong promotional bundle — best reserved for launch windows or Black Friday rather than an evergreen listing.',
];
const countRecs = [
  '', '',
  'Two-product bundle: works best as a checkout upsell or "complete the set" offer — keep the pairing tightly related.',
  'Three-product bundle: the most psychologically satisfying size — feels complete and intentional without overwhelming the buyer.',
  'Four-product bundle: position this as a complete system or vault, not just a discount deal — the naming matters as much as the price.',
];
const ptMoves = [
  'Name your bundle as a curriculum path — "The Complete [Topic] System" justifies the value and explains why everything belongs together.',
  'Add a free bonus (checklist or worksheet) at no extra cost — it lifts perceived value without adding to your price.',
  'Bundle by use case, not just topic — "Everything you need to launch" converts better than "4 template packs at a discount."',
  'Use the bundle as a joining incentive — "Join today and get [X] included" frames the membership as the anchor, not the discount.',
  'Add a 30-minute strategy call to the bundle — even at a higher price, the personal element significantly boosts conversion.',
];

let state = {pt:0, d:1};
function pickPT(i) { state.pt=i; [0,1,2,3,4].forEach(x=>document.getElementById(`pt${x}`).classList.toggle('sel',x===i)); }
function pickD(i)  { state.d=i;  [0,1,2,3].forEach(x=>document.getElementById(`d${x}`).classList.toggle('sel',x===i)); }

function getItems() {
  const names  = [...document.querySelectorAll('.iname')].map(e=>e.value.trim());
  const prices = [...document.querySelectorAll('.iprice')].map(e=>parseFloat(e.value)||0);
  return names.map((n,i)=>({name:n,price:prices[i]})).filter(it=>it.name&&it.price>0);
}

function generate() {
  const items = getItems();
  if (items.length < 2) { alert('Please enter at least 2 products with names and prices.'); return; }

  const disc        = discOpts[state.d];
  const totalVal    = parseFloat(items.reduce((s,it)=>s+it.price,0).toFixed(2));
  const bundlePrice = parseFloat((totalVal*(1-disc/100)).toFixed(2));
  const savings     = parseFloat((totalVal-bundlePrice).toFixed(2));
  const avgItem     = totalVal/items.length;
  const aovLift     = (bundlePrice/avgItem).toFixed(1);

  document.getElementById('statsBar').innerHTML =
    st(fmt$(bundlePrice),'Bundle Price') + st(fmt$(totalVal),'Total Value') + st(fmt$(savings),'Customer Saves') + st(aovLift+'x','AOV Lift');

  document.getElementById('sumCard').innerHTML = `
    <div class="sum-card">
      <div class="sum-lbl">Bundle Price at ${disc}% Off</div>
      <div class="sum-big">${fmt$(bundlePrice)}</div>
      <div class="sum-line">Buyers get ${fmt$(totalVal)} worth of products for ${fmt$(bundlePrice)} — saving ${fmt$(savings)} and spending ${aovLift}× more than a single-item buyer would.</div>
    </div>`;

  document.getElementById('breakdownCard').innerHTML = `
    <h3>Bundle Breakdown</h3>
    ${items.map(it=>{
      const pct=Math.round(it.price/totalVal*100);
      return `<div class="bd-item">
        <div class="bd-row"><span class="bd-name">${it.name}</span><span class="bd-price">${fmt$(it.price)}</span><span class="bd-pct">${pct}%</span></div>
        <div class="bd-bar-wrap"><div class="bd-bar" style="width:${pct}%"></div></div>
      </div>`;
    }).join('')}
    <div class="bd-total"><span>Individual Total</span><span>${fmt$(totalVal)}</span></div>
    <div class="bd-bundle"><span>Bundle Price (${disc}% off)</span><span style="color:#5AE57A">${fmt$(bundlePrice)}</span></div>`;

  document.getElementById('verdictCard').innerHTML = `
    <h3>Bundle Verdict</h3>
    <div class="v-item"><span class="v-key">Discount — ${disc}% off</span><div class="v-text">${discRecs[state.d]}</div></div>
    <div class="v-item"><span class="v-key">Bundle Size — ${items.length} products</span><div class="v-text">${countRecs[Math.min(items.length,4)]}</div></div>
    <div class="v-tip"><strong>Power move</strong>${ptMoves[state.pt]}</div>`;

  const r = document.getElementById('results');
  r.classList.add('show');
  r.scrollIntoView({behavior:'smooth',block:'start'});
}

function copyResults() {
  const items = getItems();
  if (items.length < 2) return;
  const disc        = discOpts[state.d];
  const totalVal    = parseFloat(items.reduce((s,it)=>s+it.price,0).toFixed(2));
  const bundlePrice = parseFloat((totalVal*(1-disc/100)).toFixed(2));
  const savings     = parseFloat((totalVal-bundlePrice).toFixed(2));
  const aovLift     = (bundlePrice/(totalVal/items.length)).toFixed(1);
  let text = `BUNDLE DISCOUNT CALCULATOR\nProduct Type: ${ptLabel[state.pt]} · Discount: ${disc}% off\n\n`;
  text += `BUNDLE BREAKDOWN\n${'─'.repeat(36)}\n`;
  items.forEach(it=>{ const pct=Math.round(it.price/totalVal*100); text+=`${it.name.padEnd(28)}${fmt$(it.price).padStart(6)}  (${pct}%)\n`; });
  text += `\nIndividual Total: ${fmt$(totalVal)}\nBundle Price (${disc}% off): ${fmt$(bundlePrice)}\nCustomer Saves: ${fmt$(savings)}\nAOV Lift: ${aovLift}x\n\n`;
  text += `VERDICT\n${'─'.repeat(36)}\n`;
  text += `Discount (${disc}% off): ${discRecs[state.d]}\n\n`;
  text += `Bundle Size (${items.length} products): ${countRecs[Math.min(items.length,4)]}\n\n`;
  text += `Power Move: ${ptMoves[state.pt]}\n`;
  text += `\n---\nCreated with Bundle Discount Calculator by GetPaidToBeYouOnline`;

  const btn  = document.getElementById('copyBtn');
  const done = ()=>{ btn.textContent='Copied!'; setTimeout(()=>btn.textContent='Copy Bundle Report as Text',2200); };
  navigator.clipboard?navigator.clipboard.writeText(text).then(done)
    :(()=>{ const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done(); })();
}
</script>
</body>
</html>
