<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Legacy Letter Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .lead { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 11px 14px; font-size: .87rem; font-style: italic; margin-bottom: 6px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 18px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .95rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Legacy Letter Generator</h1>
  <p class="sub">A letter to someone you love — the words and wisdom you want them to keep.</p>

  <div class="panel">
    <div class="lead">A legacy letter passes on what a will cannot: your love, your values, your hopes for them.</div>
    <label for="to">Who is this letter for?</label>
    <input id="to" placeholder="Their name">
    <label for="love">What I want them to know about how I love them</label>
    <textarea id="love" placeholder="Say it fully and plainly"></textarea>
    <label for="proud">What I am most proud of in them (or hope for them)</label>
    <textarea id="proud" placeholder="Who they are, who they are becoming"></textarea>
    <label for="lessons">The most important things life taught me</label>
    <textarea id="lessons" placeholder="The wisdom you most want to pass on"></textarea>
    <label for="memory">A memory of us I treasure</label>
    <textarea id="memory" placeholder="A moment you never want forgotten"></textarea>
    <label for="hope">My hope for their life</label>
    <textarea id="hope" placeholder="What you wish for them, always"></textarea>
    <label for="from">Signed (your name)</label>
    <input id="from" placeholder="Your name">
    <button class="btn" onclick="gen()">Compose Letter</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['to','love','proud','lessons','memory','hope','from'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('llg_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('llg_'+k,g(k).value)); });
  function gen(){
    const t=`My dear ${v('to')||'[name]'},\n\nThere are things I want you to have in writing, so you can return to them whenever you need.\n\n${v('love')||'[How much, and in what way, you love them.]'}\n\n${v('proud')||'[What you are proud of, and what you hope for them.]'}\n\nA few things life taught me, that I hope serve you well:\n${v('lessons')||'[The wisdom you want to pass on.]'}\n\nA memory I will always treasure:\n${v('memory')||'[A moment that meant everything.]'}\n\nMy hope for your life:\n${v('hope')||'[What you wish for them, always.]'}\n\nWhatever happens, and wherever you are, you are loved. That does not change.\n\nWith all my heart,\n${v('from')||'[your name]'}`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Compose it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
