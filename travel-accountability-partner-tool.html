<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Travel Accountability Partner Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 48px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Travel Accountability Partner Tool</h1>
  <p class="sub">Most travel dreams die quietly. Make a pact with someone so yours actually happens.</p>

  <div class="panel">
    <label for="dream">The travel dream I keep putting off</label>
    <input id="dream" placeholder="e.g. The big trip to South America">
    <label for="why">Why it matters that I do this</label>
    <textarea id="why" placeholder="What will it mean to you — and what is the cost of not going?"></textarea>
    <label for="partner">My accountability partner</label>
    <input id="partner" placeholder="Who will hold you to this?">
    <label for="firststep">The first concrete step &amp; deadline</label>
    <input id="firststep" placeholder="e.g. Research costs by the end of this month">
    <label for="checkin">How often we will check in</label>
    <input id="checkin" placeholder="e.g. A 15-minute call on the 1st of each month">
    <label for="stake">My stake — what happens if I do not act</label>
    <input id="stake" placeholder="e.g. I donate to a cause I dislike">
    <button class="btn" onclick="gen()">Build Accountability Pact</button>
    <button class="btn ghost" onclick="copyOut()">Copy &amp; Send to Partner</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['dream','why','partner','firststep','checkin','stake'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('tapt_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('tapt_'+k,g(k).value)); });
  function gen(){
    const t=`TRAVEL ACCOUNTABILITY PACT\n\nMY TRAVEL DREAM:\n${v('dream')||'[the trip you keep delaying]'}\n\nWHY IT MATTERS:\n${v('why')||'[your real reason]'}\n\nMY ACCOUNTABILITY PARTNER:\n${v('partner')||'[who is keeping you honest]'}\n\nFIRST STEP & DEADLINE:\n${v('firststep')||'[a concrete first action]'}\n\nWE WILL CHECK IN:\n${v('checkin')||'[how often]'}\n\nMY STAKE IF I DO NOT ACT:\n${v('stake')||'[a consequence with bite]'}\n\n--- The agreement ---\nI am asking you to hold me to this. Ask me about it. Do not let me quietly drop it.\nDreams without deadlines stay dreams. Thank you for helping me make this one real.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied — now send it to your partner!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
