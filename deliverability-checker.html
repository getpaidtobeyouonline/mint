<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deliverability Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 20px; font-size: .95rem; }
  .q { background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
  .q span { flex: 1; min-width: 210px; font-size: .92rem; }
  .q span small { display: block; opacity: .6; font-size: .8rem; }
  select { background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .85rem; padding: 7px 9px; border-radius: 7px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .95rem; padding: 13px 26px; border-radius: 8px; margin: 8px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .res { text-align: center; background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 22px; margin: 18px 0; }
  .res .n { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: #5AE57A; line-height: 1; }
  .res .vd { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: #5AE57A; margin-top: 5px; }
  .fix { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 12px 15px; margin-bottom: 9px; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Deliverability Checker</h1>
  <p class="sub">If you land in spam, nothing else matters. Score your inbox-placement hygiene.</p>

  <div id="form"></div>
  <button class="btn" onclick="run()">Check Deliverability</button>
  <button class="btn ghost" onclick="reset()">Reset</button>
  <div id="res"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const Q=[
    ["Domain has SPF, DKIM and DMARC set up","The #1 technical factor. Set these in your email tool + DNS — it is the single biggest fix.",2],
    ["You only email people who explicitly opted in","Bought, scraped or cold lists destroy reputation fast.",2],
    ["You remove non-openers / unengaged subscribers","Sending to dead addresses signals 'spammer' to inboxes.",1.5],
    ["Open rates are healthy and not declining","Falling opens tell mailbox providers people don't want you.",1.5],
    ["Spam complaints are rare (<0.1%)","A few complaints can tank placement for everyone on your list.",1.5],
    ["You send from a real, consistent from-name & domain","No-reply@ and changing senders hurt trust.",1],
    ["Emails aren't one giant image / link-stuffed","Image-only and link-heavy emails trip spam filters.",1],
    ["You warmed up new sending volume gradually","Sudden big sends from a cold domain get filtered.",0.5]
  ];
  const TW=Q.reduce((s,q)=>s+q[2],0);
  const g=id=>document.getElementById(id);
  g('form').innerHTML=Q.map((q,i)=>`<div class="q"><span>${q[0]}<small>${q[1]}</small></span>
    <select id="q${i}"><option value="0">No</option><option value="0.5">Partly</option><option value="1">Yes</option></select></div>`).join('');
  const saved=JSON.parse(localStorage.getItem('dc7')||'{}');
  Q.forEach((_,i)=>{ if(saved[i])g('q'+i).value=saved[i]; g('q'+i).addEventListener('change',()=>{ const o={};Q.forEach((_,j)=>o[j]=g('q'+j).value); localStorage.setItem('dc7',JSON.stringify(o)); }); });
  function run(){
    const sc=Q.reduce((s,q,i)=>s+ (+g('q'+i).value)*q[2],0);
    const pct=Math.round(sc/TW*100);
    const vd= pct>=85?'Strong — you are hitting the inbox':pct>=60?'Decent — close the gaps':pct>=35?'At risk — fix this now':'Critical — you are likely in spam';
    const fixes=Q.map((q,i)=>({q,v:+g('q'+i).value})).filter(o=>o.v<1).sort((a,b)=>a.v-b.v).slice(0,3);
    g('res').innerHTML=`<div class="res"><div class="n">${pct}%</div><div class="vd">${vd}</div></div>`+
      (fixes.length?`<h3 style="font-family:'Playfair Display',serif;color:#5AE57A;margin:0 0 10px">Fix these first</h3>`+
       fixes.map(f=>`<div class="fix"><b style="color:#5AE57A">${f.q[0]}</b><br>${f.q[1]}</div>`).join('')
       :'<div class="fix" style="border-left-color:#5AE57A">Solid hygiene — keep monitoring opens and complaints.</div>');
    g('res').scrollIntoView({behavior:'smooth'});
  }
  function reset(){ if(confirm('Reset answers?')){ localStorage.removeItem('dc7'); Q.forEach((_,i)=>g('q'+i).value='0'); g('res').innerHTML=''; } }
</script>
</body>
</html>
