<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Cultural Integration Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Cultural Integration Planner</h1>
  <p class="sub">Living abroad is more than being there. Plan how you will truly belong, not just visit.</p>

  <div class="panel">
    <label for="lang">My language learning plan</label>
    <textarea id="lang" placeholder="Even basics transform daily life — how will you learn?"></textarea>
    <label for="connect">How I will make local friends</label>
    <textarea id="connect" placeholder="Classes, clubs, neighbours, work, hobbies"></textarea>
    <label for="customs">Local customs &amp; etiquette to learn and adopt</label>
    <textarea id="customs" placeholder="How things are done here — and embracing it"></textarea>
    <label for="explore">Ways I will explore beyond the expat bubble</label>
    <textarea id="explore" placeholder="Local food, events, neighbourhoods, traditions"></textarea>
    <label for="give">How I will contribute to my new community</label>
    <input id="give" placeholder="Volunteering, supporting local, being a good neighbour">
    <label for="patience">A reminder for the frustrating days</label>
    <input id="patience" placeholder="Integration takes time — be patient with yourself">
    <button class="btn" onclick="gen()">Build Integration Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['lang','connect','customs','explore','give','patience'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('cip_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('cip_'+k,g(k).value)); });
  function gen(){
    const t=`CULTURAL INTEGRATION PLAN\n\nLANGUAGE LEARNING:\n${v('lang')||'[your plan]'}\n\nMAKING LOCAL FRIENDS:\n${v('connect')||'[how you will connect]'}\n\nCUSTOMS & ETIQUETTE TO ADOPT:\n${v('customs')||'[local ways of doing things]'}\n\nEXPLORING BEYOND THE EXPAT BUBBLE:\n${v('explore')||'[how you go deeper]'}\n\nCONTRIBUTING TO MY COMMUNITY:\n${v('give')||'[how you give back]'}\n\nMY REMINDER FOR HARD DAYS:\n${v('patience')||'[patience matters]'}\n\n--- Truth ---\nIntegration is not erasing where you are from — it is adding a new home to your story.\nThe culture-shock dip is normal and it passes. Curiosity beats comparison every time.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
