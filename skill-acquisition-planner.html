<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Skill Acquisition Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 15px; border-radius: 7px; font-family:'DM Sans',sans-serif; flex: none; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .add { display: flex; gap: 8px; }
  .stage { margin-bottom: 12px; }
  .stage .sh { font-size: .8rem; color: #5AE57A; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 5px; }
  .sub-step { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 8px 12px; margin-bottom: 5px; display: flex; align-items: center; gap: 9px; font-size: .87rem; }
  .box { width: 19px; height: 19px; border: 2px solid #5AE57A; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .7rem; font-weight: 700; }
  .box.on { background: #5AE57A; color: #325132; }
  .sub-step.done .lb { text-decoration: line-through; opacity: .5; }
  .sub-step .x { margin-left: auto; cursor: pointer; opacity: .5; } .sub-step .x:hover { opacity: 1; color: #5AE57A; }
  .track { background: #3C603C; border-radius: 5px; height: 11px; overflow: hidden; margin: 6px 0 12px; }
  .track>i { display: block; height: 100%; background: #5AE57A; transition: width .3s; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Skill Acquisition Planner</h1>
  <p class="sub">Break a new skill into four stages — and a checklist of steps for each.</p>

  <div class="panel">
    <label>The skill you are building</label>
    <input id="skill" placeholder="e.g. Public speaking" onchange="saveSkill()">
    <div class="track"><i id="bar" style="width:0%"></i></div>
    <div id="stages"></div>
  </div>

  <div class="panel">
    <label>Add a step (choose its stage)</label>
    <div class="add">
      <select id="stage" style="flex:1;background:#2A442A;border:1px solid #5A845A;color:#FFFFFF;font-family:'DM Sans',sans-serif;font-size:.9rem;padding:8px 10px;border-radius:7px">
        <option value="0">1 · Foundations</option>
        <option value="1">2 · Build &amp; practise</option>
        <option value="2">3 · Apply for real</option>
        <option value="3">4 · Refine &amp; master</option>
      </select>
      <input id="step" placeholder="e.g. Watch a beginner course" onkeydown="if(event.key==='Enter')add()">
      <button class="btn" onclick="add()">Add</button>
    </div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:10px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const STAGES=['1 · Foundations','2 · Build & practise','3 · Apply for real','4 · Refine & master'];
  let R=JSON.parse(localStorage.getItem('sap')||'[]');
  const save=()=>localStorage.setItem('sap',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  if(localStorage.getItem('sap_skill'))g('skill').value=localStorage.getItem('sap_skill');
  function saveSkill(){ localStorage.setItem('sap_skill',g('skill').value); }
  function add(){ const t=g('step').value.trim(); if(!t)return;
    R.push({s:+g('stage').value,t,done:false}); g('step').value=''; save(); render(); }
  function toggle(i){ R[i].done=!R[i].done; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all steps?')){ R=[]; save(); render(); } }
  function render(){
    const done=R.filter(x=>x.done).length;
    g('bar').style.width=(R.length?Math.round(done/R.length*100):0)+'%';
    g('stages').innerHTML=STAGES.map((name,s)=>{
      const items=R.map((x,i)=>({x,i})).filter(o=>o.x.s===s);
      if(!items.length)return '';
      return '<div class="stage"><div class="sh">'+name+'</div>'+items.map(({x,i})=>
        '<div class="sub-step'+(x.done?' done':'')+'"><span class="box'+(x.done?' on':'')+'" onclick="toggle('+i+')">'+(x.done?'✓':'')+'</span><span class="lb">'+esc(x.t)+'</span><span class="x" onclick="del('+i+')">✕</span></div>').join('')+'</div>';
    }).join('')||'<div style="text-align:center;opacity:.5;font-size:.86rem;font-style:italic;padding:10px 0">No steps yet — add them below.</div>';
  }
  render();
</script>
</body>
</html>
