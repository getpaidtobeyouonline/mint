<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Vocabulary Builder Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 10px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .quiz { background: #2A442A; border: 2px solid #5A845A; border-radius: 12px; padding: 22px; text-align: center; }
  .quiz .word { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: #5AE57A; }
  .quiz .def { font-size: .95rem; margin-top: 10px; display: none; }
  .quiz .hint { font-size: .78rem; opacity: .5; margin-top: 10px; }
  .stat { text-align: center; font-size: .85rem; opacity: .8; margin-bottom: 10px; }
  .stat b { color: #5AE57A; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 7px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: .84rem; gap: 8px; }
  .item .x { cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Vocabulary Builder Tool</h1>
  <p class="sub">Collect new words, then drill them. Build a vocabulary that grows every week.</p>

  <div class="panel">
    <label>Word or phrase</label>
    <input id="word" placeholder="The new word">
    <label>Meaning</label>
    <input id="def" placeholder="What it means">
    <label>In a sentence (optional)</label>
    <input id="ex" placeholder="Use it in context">
    <button class="btn" onclick="add()">+ Add Word</button>
  </div>

  <div class="panel" id="drillW" style="display:none">
    <div class="stat"><b id="qpos"></b> · tap to reveal the meaning</div>
    <div class="quiz" id="quiz" onclick="reveal()"></div>
    <button class="btn ghost" onclick="nextWord()" style="width:100%">Next word ›</button>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('vbt')||'[]'), qi=0, shown=false;
  const save=()=>localStorage.setItem('vbt',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('word')||!v('def')){ alert('Enter a word and its meaning.'); return; }
    R.push({w:v('word'),d:v('def'),e:v('ex')}); ['word','def','ex'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ R.splice(i,1); if(qi>=R.length)qi=0; save(); render(); }
  function clearAll(){ if(confirm('Clear all words?')){ R=[]; qi=0; save(); render(); } }
  function reveal(){ shown=true; renderQuiz(); }
  function nextWord(){ if(R.length){ qi=(qi+1)%R.length; shown=false; renderQuiz(); } }
  function renderQuiz(){
    if(!R.length){ g('drillW').style.display='none'; return; }
    g('drillW').style.display='block';
    const x=R[qi];
    g('qpos').textContent='Word '+(qi+1)+' of '+R.length;
    g('quiz').innerHTML='<div class="word">'+esc(x.w)+'</div><div class="def" style="display:'+(shown?'block':'none')+'">'+esc(x.d)+(x.e?'<br><span style="opacity:.6;font-style:italic">"'+esc(x.e)+'"</span>':'')+'</div>'+(shown?'':'<div class="hint">tap to reveal</div>');
  }
  function render(){
    renderQuiz();
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No words yet — add your first.</div>'; return; }
    L.innerHTML=R.map((x,i)=>'<div class="item"><span><b style="color:#5AE57A">'+esc(x.w)+'</b> — '+esc(x.d)+'</span><span class="x" onclick="del('+i+')">✕</span></div>').join('');
  }
  render();
</script>
</body>
</html>
