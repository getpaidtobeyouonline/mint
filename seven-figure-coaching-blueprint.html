<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Seven Figure Coaching Blueprint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.35rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Seven Figure Coaching Blueprint</h1>
  <p class="sub">Map the leverage, team and systems behind a seven-figure coaching business.</p>

  <div class="panel">
    <label for="now">Where the business is now</label>
    <textarea id="now" placeholder="Current revenue, offers and how you spend your time"></textarea>
    <label for="offers">Your leveraged offer suite</label>
    <textarea id="offers" placeholder="High-ticket, group, course, membership — the mix beyond 1:1"></textarea>
    <label for="engine">Your marketing &amp; sales engine</label>
    <textarea id="engine" placeholder="The repeatable system that brings leads and clients"></textarea>
    <label for="team">The team &amp; systems you need</label>
    <textarea id="team" placeholder="Roles to hire, systems to build, what to stop doing yourself"></textarea>
    <label for="milestones">12-24 month milestones</label>
    <textarea id="milestones" placeholder="The markers on the way to seven figures"></textarea>
    <button class="btn" onclick="gen()">Build Blueprint</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['now','offers','engine','team','milestones'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('sfcb_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('sfcb_'+k,g(k).value)); });
  function gen(){
    const t='SEVEN FIGURE COACHING BLUEPRINT\n\nWHERE THE BUSINESS IS NOW:\n'+(v('now')||'[current revenue, offers, your time]')+
    '\n\n1. LEVERAGED OFFER SUITE\n'+(v('offers')||'[the mix beyond 1:1]')+
    '\n\n2. MARKETING & SALES ENGINE\n'+(v('engine')||'[the repeatable lead and client system]')+
    '\n\n3. TEAM & SYSTEMS\n'+(v('team')||'[roles to hire, systems to build]')+
    '\n\n4. 12-24 MONTH MILESTONES\n'+(v('milestones')||'[the markers on the way]')+
    '\n\n--- The seven-figure shift ---\nYou cannot 1:1 your way to seven figures — leverage is the whole game.\nThe business must run on systems and a team, not on you alone.\nMaster ONE marketing channel deeply before adding another.\nYour job shifts from doing the work to leading the business.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
