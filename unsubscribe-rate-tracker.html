<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsubscribe Rate Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 20px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .addrow { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .addrow>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat { flex: 1; min-width: 120px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 13px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #5AE57A; }
  .stat .l { font-size: .7rem; opacity: .65; text-transform: uppercase; }
  .row { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 10px 13px; margin-bottom: 7px; display: flex; justify-content: space-between; gap: 10px; font-size: .87rem; flex-wrap: wrap; }
  .row.bad { border-left-color: #5AE57A; }
  .row .x { cursor: pointer; opacity: .5; } .row .x:hover { opacity: 1; color: #5AE57A; }
  .note { background:#2A442A; border:1px solid #5A845A; border-radius:8px; padding:11px 14px; font-size:.86rem; margin-bottom:12px; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 16px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Unsubscribe Rate Tracker</h1>
  <p class="sub">A rising unsubscribe rate is an early warning. Track it per email and catch the cause fast.</p>

  <div class="panel">
    <div class="addrow">
      <div style="flex:2"><label for="nm">Email / campaign</label><input id="nm" placeholder="e.g. Sales email 2"></div>
      <div><label for="del">Delivered</label><input id="del" type="number" min="0"></div>
      <div><label for="un">Unsubscribes</label><input id="un" type="number" min="0"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="sAvg">—</div><div class="l">Avg unsub rate</div></div>
    <div class="stat"><div class="v" id="sWorst">—</div><div class="l">Worst email</div></div>
    <div class="stat"><div class="v" id="sN">0</div><div class="l">Emails logged</div></div>
  </div>

  <div class="note" id="note"></div>
  <div id="list"></div>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim(), nu=id=>parseFloat(g(id).value)||0;
  let P=JSON.parse(localStorage.getItem('urt')||'[]');
  const save=()=>localStorage.setItem('urt',JSON.stringify(P));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const ur=p=>p.d>0?p.u/p.d*100:0;
  function add(){ const nm=v('nm'); if(!nm){alert('Name the email.');return;} P.push({nm,d:nu('del'),u:nu('un')}); ['nm','del','un'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ P.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ P=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!P.length){ L.innerHTML='<div class="empty">No emails logged yet.</div>'; g('sAvg').textContent=g('sWorst').textContent='—'; g('sN').textContent='0'; g('note').textContent=''; return; }
    const avg=P.reduce((s,p)=>s+ur(p),0)/P.length;
    const worst=[...P].sort((a,b)=>ur(b)-ur(a))[0];
    g('sAvg').textContent=avg.toFixed(2)+'%'; g('sWorst').textContent=ur(worst).toFixed(2)+'%'; g('sN').textContent=P.length;
    g('note').innerHTML= avg<=0.5?'Healthy: under ~0.5% per email is normal. Some unsubscribes are good list hygiene.'
      : avg<=1?'Slightly high. Check frequency and that content matches what people signed up for.'
      : '<b style="color:#5AE57A">Too high (&gt;1%).</b> Likely causes: too frequent, off-topic, mismatched expectations, or buying/cold lists. Fix this before scaling sends.';
    L.innerHTML=[...P].map((p,i)=>({p,i})).sort((a,b)=>ur(b.p)-ur(a.p)).map(({p,i})=>`<div class="row ${ur(p)>1?'bad':''}"><span>${esc(p.nm)}</span><span>${ur(p).toFixed(2)}% (${p.u}/${p.d.toLocaleString()}) <span class="x" onclick="del(${i})">✕</span></span></div>`).join('');
  }
  render();
</script>
</body>
</html>
