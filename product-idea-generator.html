<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Idea Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 700px; margin: 0 auto; }
    h1 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: clamp(1.8rem, 4vw, 2.6rem); text-align: center; margin-bottom: 0.4rem; }
    .subtitle { text-align: center; opacity: 0.6; margin-bottom: 2rem; font-size: 0.9rem; }

    .input-card { background: #345534; border: 1px solid #3C603C; border-radius: 10px; padding: 1.4rem; margin-bottom: 1.25rem; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    @media (max-width: 520px) { .row-2 { grid-template-columns: 1fr; } }
    label { display: block; font-size: 0.76rem; opacity: 0.5; margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.04em; }
    input[type=text] { width: 100%; background: #3C603C; border: 1px solid #4C724C; color: #FFFFFF; padding: 0.6rem 0.9rem; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none; transition: border-color 0.15s; }
    input[type=text]:focus { border-color: #5AE57A; }

    .filter-label { font-size: 0.76rem; opacity: 0.5; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .pills { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.1rem; }
    .pill { background: #3C603C; border: 1px solid #4C724C; color: #BFD8BF; padding: 0.28rem 0.7rem; border-radius: 20px; font-size: 0.76rem; cursor: pointer; transition: all 0.15s; user-select: none; }
    .pill.on { background: #C9A84C1a; border-color: #5AE57A; color: #5AE57A; }

    .gen-btn { width: 100%; background: #5AE57A; color: #325132; border: none; padding: 0.82rem; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
    .gen-btn:hover { opacity: 0.86; }

    .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.9rem; }
    .section-title { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.05rem; }
    .regen-link { font-size: 0.78rem; color: #BFD8BF; cursor: pointer; background: none; border: none; font-family: 'DM Sans', sans-serif; transition: color 0.15s; }
    .regen-link:hover { color: #5AE57A; }

    .ideas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; margin-bottom: 1.5rem; }
    @media (max-width: 520px) { .ideas-grid { grid-template-columns: 1fr; } }

    .idea-card { background: #345534; border: 1px solid #3C603C; border-radius: 10px; padding: 1rem; display: flex; flex-direction: column; gap: 0.6rem; transition: border-color 0.15s; }
    .idea-card:hover { border-color: #4C724C; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; }
    .type-badge { font-size: 0.67rem; background: #3C603C; border: 1px solid #4C724C; color: #BFD8BF; padding: 0.18rem 0.5rem; border-radius: 4px; white-space: nowrap; }
    .heart-btn { background: none; border: none; cursor: pointer; font-size: 1rem; color: #4C724C; transition: color 0.15s; flex-shrink: 0; line-height: 1; }
    .heart-btn:hover { color: #C9A84C88; }
    .heart-btn.on { color: #5AE57A; }
    .idea-title { font-size: 0.86rem; line-height: 1.5; }

    .saved-card { background: #345534; border: 1px solid #3C603C; border-radius: 10px; padding: 1.3rem; margin-bottom: 1.25rem; }
    .clear-btn { background: none; border: none; color: #5A845A; font-size: 0.76rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: color 0.15s; }
    .clear-btn:hover { color: #5AE57A; }
    .saved-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0; border-bottom: 1px solid #3C603C; }
    .saved-item:last-of-type { border-bottom: none; }
    .saved-text { flex: 1; font-size: 0.85rem; }
    .saved-badge { font-size: 0.67rem; background: #3C603C; border: 1px solid #4C724C; color: #BFD8BF; padding: 0.18rem 0.5rem; border-radius: 4px; white-space: nowrap; }
    .del-btn { background: none; border: none; color: #4C724C; cursor: pointer; font-size: 0.75rem; transition: color 0.15s; }
    .del-btn:hover { color: #5AE57A; }

    .copy-btn { width: 100%; background: transparent; border: 1px solid #5AE57A; color: #5AE57A; padding: 0.65rem; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; margin-top: 0.85rem; }
    .copy-btn:hover { background: #5AE57A; color: #325132; }

    footer { text-align: center; opacity: 0.35; font-size: 0.78rem; margin-top: 0.5rem; padding-bottom: 1rem; }
  </style>
</head>
<body>
<div class="container">
  <h1>Product Idea Generator</h1>
  <p class="subtitle">Turn your knowledge into digital products people will buy.</p>

  <div class="input-card">
    <div class="row-2">
      <div>
        <label>Your Niche or Skill</label>
        <input type="text" id="niche" placeholder="e.g. email marketing, Canva design…">
      </div>
      <div>
        <label>Target Audience</label>
        <input type="text" id="audience" placeholder="e.g. new coaches, Etsy sellers…">
      </div>
    </div>
    <div class="filter-label">Product Types (select to include)</div>
    <div class="pills" id="pills"></div>
    <button class="gen-btn" onclick="generate()">Generate Ideas</button>
  </div>

  <div id="resultsWrap" style="display:none">
    <div class="section-head">
      <span class="section-title">Generated Ideas</span>
      <button class="regen-link" onclick="generate()">↻ Regenerate</button>
    </div>
    <div class="ideas-grid" id="ideasGrid"></div>
  </div>

  <div class="saved-card" id="savedWrap" style="display:none">
    <div class="section-head">
      <span class="section-title">Saved Ideas</span>
      <button class="clear-btn" onclick="clearSaved()">Clear All</button>
    </div>
    <div id="savedList"></div>
    <button class="copy-btn" id="copyBtn" onclick="copySaved()">Copy Saved Ideas</button>
  </div>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const KEY = 'gpbyo_ideas_v1';
  const TYPES = ['Ebook','Template Pack','Mini Course','Checklist','Swipe File','Spreadsheet','Email Sequence','Challenge','Toolkit','Workshop'];
  const T = {
    'Ebook':          ['{n} {niche} Secrets Every {aud} Needs to Know','The Complete {niche} Playbook for {aud}','From Zero to Confident: A {niche} Guide for {aud}','The {aud} {niche} Handbook'],
    'Template Pack':  ['Done-For-You {niche} Templates for {aud}','The {aud} {niche} Starter Template Pack','Plug-and-Play {niche} Templates','The Ultimate {niche} Template Bundle'],
    'Mini Course':    ['{niche} in {time}: The Fast-Track Course','The {aud} {niche} Mini Course','Master {niche} Over a Weekend','The No-Fluff {niche} Course for {aud}'],
    'Checklist':      ['The Ultimate {niche} Checklist for {aud}','{n}-Step {niche} System for {aud}','The {aud} {niche} Starter Checklist','Never Miss a Step: The {niche} Checklist'],
    'Swipe File':     ['{n} {niche} Scripts for {aud}','The {aud} {niche} Swipe File','Ready-to-Use {niche} Copy & Captions','{n} Fill-in-the-Blank {niche} Templates'],
    'Spreadsheet':    ['The {aud} {niche} Tracker & Planner','{niche} Revenue Calculator for {aud}','The {niche} Planning Spreadsheet','Track & Grow: The {niche} Spreadsheet'],
    'Email Sequence': ['{n}-Email {niche} Welcome Sequence','Done-For-You {niche} Email Scripts for {aud}','The {aud} {niche} Email Funnel Kit','Automated {niche} Emails for {aud}'],
    'Challenge':      ['The {time} {niche} Challenge for {aud}','{n}-Day {niche} Jumpstart for {aud}','The {aud} {niche} Sprint','Kick-Start {niche} in {time}'],
    'Toolkit':        ['The Complete {niche} Toolkit for {aud}','The {aud} {niche} Resource Bundle','Everything You Need for {niche}','The {niche} All-in-One Kit'],
    'Workshop':       ['{niche} Intensive Workshop for {aud}','The {aud} {niche} Live Workshop','Hands-On {niche} Training for {aud}','The {niche} Masterclass for {aud}'],
  };
  const NUMS  = [5,7,10,15,21,30];
  const TIMES = ['7-Day','5-Day','30-Day','21-Day','14-Day','3-Day'];
  const rand  = a => a[Math.floor(Math.random()*a.length)];
  const uid   = () => Math.random().toString(36).slice(2);
  const fill  = (tpl,n,a) => tpl.replace(/{niche}/g,n).replace(/{aud}/g,a).replace(/{n}/g,rand(NUMS)).replace(/{time}/g,rand(TIMES));

  let active = new Set(TYPES);
  let current = [];
  let saved = JSON.parse(localStorage.getItem(KEY)||'[]');

  function buildPills() {
    document.getElementById('pills').innerHTML = TYPES.map(t =>
      `<div class="pill on" data-t="${t}" onclick="togglePill('${t}')">${t}</div>`
    ).join('');
  }

  function togglePill(t) {
    if (active.has(t)) { if (active.size===1) return; active.delete(t); }
    else active.add(t);
    document.querySelector(`[data-t="${t}"]`).classList.toggle('on');
  }

  function generate() {
    const n = document.getElementById('niche').value.trim() || 'your topic';
    const a = document.getElementById('audience').value.trim() || 'your audience';
    const types = TYPES.filter(t => active.has(t));
    current = types.map(t => ({ id: uid(), type: t, title: fill(rand(T[t]), n, a) }))
                   .sort(() => Math.random()-0.5).slice(0, 8);
    renderIdeas();
    document.getElementById('resultsWrap').style.display = 'block';
  }

  function renderIdeas() {
    const savedIds = new Set(saved.map(s=>s.id));
    document.getElementById('ideasGrid').innerHTML = current.map(i => `
      <div class="idea-card">
        <div class="card-top">
          <span class="type-badge">${i.type}</span>
          <button class="heart-btn${savedIds.has(i.id)?' on':''}" onclick="toggleSave('${i.id}')" title="Save">♥</button>
        </div>
        <div class="idea-title">${i.title}</div>
      </div>`).join('');
  }

  function toggleSave(id) {
    if (saved.some(s=>s.id===id)) { saved = saved.filter(s=>s.id!==id); }
    else { const idea=current.find(i=>i.id===id); if(idea) saved.push(idea); }
    persist(); renderIdeas(); renderSaved();
  }

  function removeSaved(id) {
    saved = saved.filter(s=>s.id!==id);
    persist(); renderIdeas(); renderSaved();
  }

  function renderSaved() {
    const wrap = document.getElementById('savedWrap');
    if (!saved.length) { wrap.style.display='none'; return; }
    wrap.style.display = 'block';
    document.getElementById('savedList').innerHTML = saved.map(i => `
      <div class="saved-item">
        <span class="saved-text">${i.title}</span>
        <span class="saved-badge">${i.type}</span>
        <button class="del-btn" onclick="removeSaved('${i.id}')">✕</button>
      </div>`).join('');
  }

  function clearSaved() {
    if (confirm('Clear all saved ideas?')) { saved=[]; persist(); renderIdeas(); renderSaved(); }
  }

  function persist() { localStorage.setItem(KEY, JSON.stringify(saved)); }

  function copySaved() {
    const text = 'PRODUCT IDEAS\n'+'─'.repeat(28)+'\n\n'+saved.map(i=>`[${i.type}]\n${i.title}`).join('\n\n');
    navigator.clipboard.writeText(text).then(() => {
      const b=document.getElementById('copyBtn'); b.textContent='Copied!';
      setTimeout(()=>b.textContent='Copy Saved Ideas',1600);
    });
  }

  buildPills();
  renderSaved();
</script>
</body>
</html>
