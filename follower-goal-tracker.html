<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Follower Goal Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid > div { flex: 1; min-width: 130px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: .92rem; padding: 10px 18px; border-radius: 8px; margin: 12px 8px 0 0; }
  .btn:hover { opacity: .9; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .big { text-align: center; background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 10px; padding: 18px; margin-bottom: 14px; }
  .big .n { font-family: 'Playfair Display', serif; font-size: 2.4rem; color: #5AE57A; line-height: 1; }
  .track { background: #3C603C; border-radius: 5px; height: 10px; overflow: hidden; margin-top: 12px; }
  .track > i { display: block; height: 100%; background: #5AE57A; transition: width .3s; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; }
  .stat { flex: 1; min-width: 120px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 13px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #5AE57A; }
  .stat .l { font-size: .71rem; opacity: .65; text-transform: uppercase; }
  .log { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 9px 13px; margin-bottom: 7px; display: flex; justify-content: space-between; gap: 10px; font-size: .88rem; }
  .log .x { cursor: pointer; opacity: .5; } .log .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; padding: 18px 0; font-style: italic; font-size: .9rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Follower Goal Tracker</h1>
  <p class="sub">Set a follower goal, log your progress, and see exactly what pace hits it on time.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="plat">Platform</label><input id="plat" placeholder="e.g. Instagram"></div>
      <div><label for="start">Starting followers</label><input id="start" type="number" min="0" value="500" oninput="calc()"></div>
    </div>
    <div class="grid">
      <div><label for="goal">Goal followers</label><input id="goal" type="number" min="0" value="10000" oninput="calc()"></div>
      <div><label for="date">Target date</label><input id="date" type="date" oninput="calc()"></div>
    </div>
  </div>

  <div class="big">
    <div class="n" id="cur">500</div>
    <div style="font-size:.85rem;opacity:.7">current followers</div>
    <div class="track"><i id="bar" style="width:0%"></i></div>
    <div style="font-size:.82rem;opacity:.7;margin-top:6px" id="pct">0% to goal</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="need">0</div><div class="l">To go</div></div>
    <div class="stat"><div class="v" id="days">—</div><div class="l">Days left</div></div>
    <div class="stat"><div class="v" id="perday">—</div><div class="l">Needed / day</div></div>
    <div class="stat"><div class="v" id="onpace">—</div><div class="l">On pace?</div></div>
  </div>

  <div class="panel">
    <label for="entry">Log today's follower count</label>
    <div class="grid">
      <div><input id="entry" type="number" min="0" placeholder="Current count"></div>
      <div style="flex:0"><button class="btn" onclick="addLog()" style="margin-top:0">+ Log</button></div>
    </div>
    <div id="logs" style="margin-top:14px"></div>
  </div>

  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g = id => document.getElementById(id), n = id => parseFloat(g(id).value)||0;
  const F = ['plat','start','goal','date'];
  let logs = JSON.parse(localStorage.getItem('fgt_logs')||'[]');
  F.forEach(k=>{ const s=localStorage.getItem('fgt_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('fgt_'+k,g(k).value)); });

  function current(){ return logs.length ? logs[logs.length-1].c : n('start'); }
  function calc() {
    F.forEach(k=>localStorage.setItem('fgt_'+k,g(k).value));
    const cur=current(), start=n('start'), goal=n('goal');
    g('cur').textContent = cur.toLocaleString();
    const prog = goal>start ? Math.min(100,Math.max(0,(cur-start)/(goal-start)*100)) : (cur>=goal?100:0);
    g('bar').style.width=prog+'%';
    g('pct').textContent = Math.round(prog)+'% to goal';
    const need = Math.max(0, goal-cur);
    g('need').textContent = need.toLocaleString();
    const d=g('date').value;
    if (d) {
      const days = Math.max(0, Math.round((new Date(d)-new Date(new Date().toISOString().slice(0,10)))/86400000));
      g('days').textContent = days;
      const per = days>0 ? Math.ceil(need/days) : need;
      g('perday').textContent = need>0 ? per.toLocaleString() : '0';
      let pace='—';
      if (logs.length>=2) {
        const first=logs[0], last=logs[logs.length-1];
        const dd=(new Date(last.d)-new Date(first.d))/86400000;
        if (dd>0) { const rate=(last.c-first.c)/dd; pace = rate>=per ? '✅ Yes' : '⚠ Behind'; }
      }
      g('onpace').textContent = need===0 ? '🎉 Hit!' : pace;
    } else { g('days').textContent='—'; g('perday').textContent='—'; g('onpace').textContent='—'; }
    renderLogs();
  }
  function addLog() {
    const c=parseFloat(g('entry').value); if(isNaN(c)){alert('Enter a follower count.');return;}
    logs.push({ d:new Date().toISOString().slice(0,10), c });
    g('entry').value=''; localStorage.setItem('fgt_logs',JSON.stringify(logs)); calc();
  }
  function delLog(i){ logs.splice(i,1); localStorage.setItem('fgt_logs',JSON.stringify(logs)); calc(); }
  function clearAll(){ if(confirm('Clear all logs?')){ logs=[]; localStorage.setItem('fgt_logs','[]'); calc(); } }
  function renderLogs() {
    const L=g('logs');
    if(!logs.length){ L.innerHTML='<div class="empty">No check-ins yet — log your follower count to track the trend.</div>'; return; }
    L.innerHTML = [...logs].map((x,i)=>({x,i})).reverse().map(({x,i})=>{
      const prev = i>0 ? logs[i-1].c : n('start');
      const dlt = x.c - prev; const sign = dlt>=0?'+':'';
      return `<div class="log"><span>${x.d}</span><span>${x.c.toLocaleString()} <span style="color:${dlt>=0?'#5AE57A':'#5AE57A'}">(${sign}${dlt})</span> <span class="x" onclick="delLog(${i})">✕</span></span></div>`;
    }).join('');
  }
  calc();
</script>
</body>
</html>
