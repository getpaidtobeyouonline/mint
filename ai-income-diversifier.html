<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted AI Income Diversifier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 780px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2.1rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; }
  .grid > div { flex: 1; min-width: 130px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: .95rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; }
  .btn:hover { opacity: .9; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat { flex: 1; min-width: 120px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 13px; text-align: center; }
  .stat .n { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #5AE57A; }
  .stat .l { font-size: .71rem; opacity: .65; text-transform: uppercase; }
  .scorebox { text-align: center; background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 14px; }
  .scorebox .n { font-family: 'Playfair Display', serif; font-size: 2.4rem; color: #5AE57A; line-height: 1; }
  .scorebox .vd { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: #5AE57A; margin-top: 4px; }
  .track { background: #3C603C; border-radius: 5px; height: 9px; overflow: hidden; margin-top: 10px; }
  .track > i { display: block; height: 100%; background: #5AE57A; transition: width .25s; }
  .rec { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 11px 15px; margin-bottom: 9px; font-size: .9rem; }
  .stream { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 11px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; align-items: center; }
  .stream .nm { font-weight: 500; }
  .stream .meta { font-size: .8rem; opacity: .7; }
  .stream .bar { height: 5px; background: #3C603C; border-radius: 4px; margin-top: 5px; overflow: hidden; }
  .stream .bar > i { display: block; height: 100%; background: #5AE57A; }
  .stream .right { text-align: right; }
  .stream .x { cursor: pointer; opacity: .55; font-size: .82rem; }
  .stream .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; padding: 22px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.7rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted AI Income Diversifier</h1>
  <p class="sub">Map your income streams, expose concentration risk, and get a clear plan to build a resilient mix.</p>

  <div class="panel">
    <label for="name">Income stream</label>
    <input id="name" placeholder="e.g. Freelance prompt writing">
    <div class="grid">
      <div><label for="amt">$ / month</label><input id="amt" type="number" min="0" value="500"></div>
      <div><label for="type">Type</label>
        <select id="type"><option>Active (trades time)</option><option>Leveraged (semi-passive)</option><option>Passive (scales without time)</option></select></div>
      <div><label for="stab">Stability</label>
        <select id="stab"><option>Stable</option><option>Variable</option><option>Risky</option></select></div>
    </div>
    <button class="btn" onclick="saveItem()" id="saveBtn">+ Add Stream</button>
    <button class="btn ghost" onclick="cancelEdit()" id="cancelBtn" style="display:none">Cancel</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="n" id="sTot">$0</div><div class="l">Total / mo</div></div>
    <div class="stat"><div class="n" id="sNum">0</div><div class="l">Streams</div></div>
    <div class="stat"><div class="n" id="sTop">—</div><div class="l">Top concentration</div></div>
    <div class="stat"><div class="n" id="sPas">—</div><div class="l">Passive share</div></div>
  </div>

  <div class="scorebox">
    <div class="n" id="score">—</div><div class="vd" id="verdict">Add streams to score</div>
    <div class="track"><i id="bar" style="width:0%"></i></div>
  </div>

  <div id="recs"></div>
  <div id="list"></div>

  <button class="btn" onclick="exportMd()">Export Plan</button>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  let streams = JSON.parse(localStorage.getItem('aidv') || '[]');
  let editing = -1;
  const save = () => localStorage.setItem('aidv', JSON.stringify(streams));
  const esc = t => (t||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const g = id => document.getElementById(id), v = id => g(id).value.trim();

  function saveItem() {
    const name = v('name');
    if (!name) { alert('Name the income stream.'); return; }
    const obj = { name, amt:+v('amt')||0, type:g('type').value, stab:g('stab').value };
    if (editing>=0) { streams[editing]=obj; editing=-1; g('saveBtn').textContent='+ Add Stream'; g('cancelBtn').style.display='none'; }
    else streams.push(obj);
    g('name').value=''; g('amt').value=500;
    save(); render();
  }
  function edit(i){ const x=streams[i]; g('name').value=x.name; g('amt').value=x.amt; g('type').value=x.type; g('stab').value=x.stab; editing=i; g('saveBtn').textContent='✓ Update'; g('cancelBtn').style.display='inline-block'; window.scrollTo({top:0,behavior:'smooth'}); }
  function cancelEdit(){ editing=-1; g('saveBtn').textContent='+ Add Stream'; g('cancelBtn').style.display='none'; g('name').value=''; }
  function del(i){ if(confirm('Remove this stream?')){ streams.splice(i,1); if(editing===i)cancelEdit(); save(); render(); } }
  function clearAll(){ if(confirm('Clear all streams?')){ streams=[]; save(); render(); } }

  function analyze() {
    const tot = streams.reduce((s,x)=>s+x.amt,0);
    if (!tot) return { tot:0, score:0, top:0, passive:0, recs:[] };
    const top = Math.max(...streams.map(x=>x.amt))/tot;
    const passive = streams.filter(x=>!x.type.startsWith('Active')).reduce((s,x)=>s+x.amt,0)/tot;
    const cnt = streams.length;
    const countF = cnt>=4?35:cnt===3?25:cnt===2?15:0;
    const balanceF = Math.max(0, Math.round((1-top)*47)); // 0..~35
    const passF = Math.round(passive*30);
    const score = Math.min(100, countF + Math.min(35,balanceF) + passF);
    const recs = [];
    if (cnt<=1) recs.push("Single point of failure — one stream is your whole income. Add a second of a different type.");
    if (top>0.6 && cnt>1) recs.push(`Over-concentrated — ${Math.round(top*100)}% comes from one stream. Grow the others or add one.`);
    if (passive===0) recs.push("Every dollar costs you time — all income is active. Build one leveraged or passive stream.");
    if (!streams.some(x=>x.stab==='Stable')) recs.push("No stable base — add a predictable recurring stream for a floor.");
    if (!recs.length) recs.push("Healthy mix — focus on scaling your strongest passive stream and trimming the riskiest.");
    return { tot, score, top, passive, recs };
  }

  function render() {
    const a = analyze();
    g('sTot').textContent = '$'+Math.round(a.tot).toLocaleString();
    g('sNum').textContent = streams.length;
    g('sTop').textContent = a.tot? Math.round(a.top*100)+'%' : '—';
    g('sPas').textContent = a.tot? Math.round(a.passive*100)+'%' : '—';
    g('score').textContent = a.tot? a.score : '—';
    g('bar').style.width = (a.tot?a.score:0)+'%';
    g('verdict').textContent = !a.tot ? 'Add streams to score'
      : a.score>=85?'Diversified — resilient income':a.score>=65?'Resilient — solid but keep building':a.score>=40?'Building — still fragile':'Fragile — high risk';
    g('recs').innerHTML = a.tot ? a.recs.map(r=>`<div class="rec">→ ${esc(r)}</div>`).join('') : '';
    const l = g('list');
    if (!streams.length) { l.innerHTML='<div class="empty">No income streams yet — add your first above.</div>'; return; }
    l.innerHTML = [...streams].map((x,i)=>({x,i})).sort((p,q)=>q.x.amt-p.x.amt).map(({x,i})=>{
      const share = a.tot? Math.round(x.amt/a.tot*100):0;
      return `<div class="stream">
        <div style="flex:1;min-width:180px">
          <div class="nm">${esc(x.name)}</div>
          <div class="meta">${esc(x.type)} · ${esc(x.stab)} · ${share}% of income</div>
          <div class="bar"><i style="width:${share}%"></i></div>
        </div>
        <div class="right"><div>$${x.amt.toLocaleString()}/mo</div>
          <div class="meta"><span onclick="edit(${i})" style="cursor:pointer">✎</span> <span class="x" onclick="del(${i})">✕</span></div>
        </div>
      </div>`;
    }).join('');
  }

  function exportMd() {
    if (!streams.length) { alert('Add a stream first.'); return; }
    const a = analyze();
    let t = `# AI Income Diversification Plan\n\n`+
      `Total: $${Math.round(a.tot).toLocaleString()}/mo · ${streams.length} streams\n`+
      `Diversification score: ${a.score}/100\nTop concentration: ${Math.round(a.top*100)}% · Passive share: ${Math.round(a.passive*100)}%\n\n## Streams\n`;
    [...streams].sort((p,q)=>q.amt-p.amt).forEach(x => t += `- ${x.name} — $${x.amt}/mo (${x.type}, ${x.stab})\n`);
    t += `\n## Recommendations\n` + a.recs.map(r=>`- ${r}`).join('\n');
    const b = new Blob([t.trim()],{type:'text/markdown'});
    const el = document.createElement('a'); el.href=URL.createObjectURL(b); el.download='income-diversification-plan.md'; el.click(); URL.revokeObjectURL(el.href);
  }

  render();
</script>
</body>
</html>
