<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Character Development Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Character Development Tool</h1>
  <p class="sub">Get past the cliches — build a character who feels like a real person.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="name">Name</label><input id="name" placeholder="Character name"></div>
      <div><label for="age">Age &amp; role</label><input id="age" placeholder="e.g. 34, the reluctant detective"></div>
    </div>
    <label for="want">What they want (the surface goal)</label>
    <textarea id="want" placeholder="What drives them at the start"></textarea>
    <label for="need">What they actually need (the deeper truth)</label>
    <textarea id="need" placeholder="What the story will give them, even against their will"></textarea>
    <label for="wound">A wound from their past</label>
    <textarea id="wound" placeholder="The thing they have not faced"></textarea>
    <label for="flaw">A flaw / blind spot</label>
    <input id="flaw" placeholder="The trait that keeps them stuck">
    <label for="voice">Their voice — how they speak</label>
    <input id="voice" placeholder="A turn of phrase, rhythm, vocabulary">
    <label for="arc">Their arc — start to end</label>
    <input id="arc" placeholder="Who they are at the start → who they become">
    <button class="btn" onclick="gen()">Build Character Sheet</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['name','age','want','need','wound','flaw','voice','arc'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('cdt_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('cdt_'+k,g(k).value)); });
  function gen(){
    const t='CHARACTER SHEET\n\nNAME: '+(v('name')||'[name]')+(v('age')?'  ·  '+v('age'):'')+
    '\n\nWHAT THEY WANT:\n'+(v('want')||'[surface goal]')+
    '\n\nWHAT THEY NEED:\n'+(v('need')||'[the deeper truth]')+
    '\n\nWOUND:\n'+(v('wound')||'[the thing they have not faced]')+
    '\n\nFLAW / BLIND SPOT:\n'+(v('flaw')||'[the trait that keeps them stuck]')+
    '\n\nVOICE:\n'+(v('voice')||'[how they speak]')+
    '\n\nARC:\n'+(v('arc')||'[who they are at the start → who they become]')+
    '\n\n--- Bringing them to life ---\nLet what they want and what they need be at odds — that is your story.\nGive them one specific physical or verbal quirk you can return to.\nWrite three small scenes of them alone — that is where they truly emerge.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
