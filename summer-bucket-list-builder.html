<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Summer Bucket List Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 130px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .total { text-align: center; margin-bottom: 12px; }
  .total .n { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; gap: 8px; cursor: pointer; }
  .item.done { border-color: #5AE57A; opacity: .55; }
  .item.done span:first-child { text-decoration: line-through; }
  .item .x { cursor: pointer; opacity: .5; flex: none; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  .ideas { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .chip { background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; border-radius: 20px; padding: 5px 12px; cursor: pointer; font-size: .82rem; }
  .chip:hover { border-color: #5AE57A; color: #5AE57A; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Summer Bucket List Builder</h1>
  <p class="sub">Build your family's summer wishlist — and tick them off all season.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:3"><label>Add to the list</label><input id="item" placeholder="Something fun to do this summer"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
    <label>Need ideas? Tap to add</label>
    <div class="ideas" id="ideas"></div>
  </div>

  <div class="panel">
    <div class="total"><span class="n" id="total">0</span><div style="opacity:.7;font-size:.85rem">summer wins</div></div>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const IDEAS=['Paddle in the sea','Eat ice cream at sunset','Build a sandcastle','Sleep under the stars','Pick strawberries','Have a picnic','Make popsicles','Catch a butterfly with your eyes','Watch a sunrise','Visit a new park','Have a water fight','Stargaze with blankets','Bake a summer pie','Read 3 books','Try a new food','Have an outdoor movie night'];
  g('ideas').innerHTML=IDEAS.map(t=>'<span class="chip" onclick="quick(\''+t.replace(/'/g,"\\'")+'\')">'+t+'</span>').join('');
  let R=JSON.parse(localStorage.getItem('sbl')||'[]');
  const save=()=>localStorage.setItem('sbl',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function quick(t){ R.push({t:t,done:false}); save(); render(); }
  function add(){ if(!v('item')){ return; } R.push({t:v('item'),done:false}); g('item').value=''; save(); render(); }
  function tog(i){ R[i].done=!R[i].done; save(); render(); }
  function del(i,e){ e.stopPropagation(); R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the whole list?')){ R=[]; save(); render(); } }
  function render(){
    g('total').textContent=R.filter(x=>x.done).length+' / '+R.length;
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">Add some summer dreams — big or tiny.</div>'; return; }
    L.innerHTML=R.map((x,i)=>'<div class="item'+(x.done?' done':'')+'" onclick="tog('+i+')"><span>'+(x.done?'✓ ':'')+esc(x.t)+'</span><span class="x" onclick="del('+i+',event)">✕</span></div>').join('');
  }
  render();
</script>
</body>
</html>
