<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Goal Setter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, select, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 54px; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 150px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  .note { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; font-size: .8rem; opacity: .75; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Health Goal Setter</h1>
  <p class="sub">Turn a vague wish into a goal with a number, a date, and a first step.</p>

  <div class="panel">
    <label for="goal">Your health goal</label>
    <input id="goal" placeholder="e.g. Walk more / sleep better / lower stress">
    <div class="grid">
      <div><label for="area">Area</label><select id="area"><option>Movement</option><option>Sleep</option><option>Nutrition</option><option>Mental health</option><option>Recovery</option><option>Medical / preventive</option></select></div>
      <div><label for="by">Target date</label><input id="by" type="date"></div>
    </div>
    <label for="measure">How you will measure it (the number)</label>
    <input id="measure" placeholder="e.g. 8,000 steps a day, 7+ hours sleep">
    <label for="why">Why it matters to you</label>
    <textarea id="why" placeholder="The real reason — connect it to your life"></textarea>
    <label for="step">Smallest first step you can take this week</label>
    <input id="step" placeholder="Something so small it feels almost too easy">
    <label for="block">Likely obstacle &amp; your plan for it</label>
    <textarea id="block" placeholder="When X happens, I will Y"></textarea>
    <button class="btn" onclick="gen()">Build My Goal Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
    <div class="note">A planning tool only — not medical advice. Check with a professional before big health changes.</div>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['goal','area','by','measure','why','step','block'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('hgs_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('hgs_'+k,g(k).value)); });
  function gen(){
    if(!v('goal')){ alert('Enter your health goal first.'); return; }
    const t=`MY HEALTH GOAL\n\n${v('goal')}\n\nArea: ${v('area')}\nTarget date: ${v('by')||'[set a date]'}\nMeasured by: ${v('measure')||'[pick one clear number]'}\n\nWHY IT MATTERS:\n${v('why')||'[your real reason]'}\n\nFIRST STEP THIS WEEK:\n${v('step')||'[the smallest possible action]'}\n\nIF-THEN PLAN FOR OBSTACLES:\n${v('block')||'[when X happens, I will Y]'}\n\n--- Keep it honest ---\nA goal without a number is a wish. A goal without a date is a someday.\nReview this every Sunday. Adjust the number, never drop the habit.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
