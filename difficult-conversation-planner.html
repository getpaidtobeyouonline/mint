<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Difficult Conversation Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .hint { font-size: .78rem; opacity: .6; margin-top: 3px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Difficult Conversation Planner</h1>
  <p class="sub">Hard talks go better with preparation. Get clear before you sit down.</p>

  <div class="panel">
    <label for="topic">What is the conversation about?</label>
    <input id="topic" placeholder="One sentence, neutral">
    <label for="goal">My real goal for this conversation</label>
    <textarea id="goal" placeholder="What does a good outcome actually look like?"></textarea>
    <div class="hint">If your goal is to win or punish, pause — that rarely ends well.</div>
    <label for="open">My opening line</label>
    <textarea id="open" placeholder="e.g. I want to talk about something, and I am hoping we can do it kindly"></textarea>
    <label for="facts">The key points I need to make (facts, not attacks)</label>
    <textarea id="facts" placeholder="Stick to specifics and your own experience"></textarea>
    <label for="fear">What I am afraid will happen</label>
    <textarea id="fear" placeholder="Name it — it loses some power once written down"></textarea>
    <label for="hear">What I want to make sure I hear from them</label>
    <input id="hear" placeholder="Their side, their feelings, their needs">
    <button class="btn" onclick="gen()">Build My Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['topic','goal','open','facts','fear','hear'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('dcp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('dcp_'+k,g(k).value)); });
  function gen(){
    const t=`DIFFICULT CONVERSATION PLAN\n\nTOPIC:\n${v('topic')||'[the subject]'}\n\nMY REAL GOAL:\n${v('goal')||'[a good, fair outcome]'}\n\nMY OPENING LINE:\n${v('open')||'[a calm, honest start]'}\n\nKEY POINTS (facts, not attacks):\n${v('facts')||'[your specifics]'}\n\nWHAT I FEAR MIGHT HAPPEN:\n${v('fear')||'[name it]'}\n\nWHAT I WANT TO HEAR FROM THEM:\n${v('hear')||'[their side]'}\n\n--- Before you start ---\n• Pick a private, unrushed time when you are both calm.\n• Breathe. Speak slowly. Pause more than feels natural.\n• Listen to understand — repeat back what you hear.\n• It is okay to take a break and come back to it.\n• You can be honest and kind at the same time.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
