<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Friendship Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .idea { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 10px 13px; font-size: .86rem; font-style: italic; margin-bottom: 10px; }
  .card { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 14px; margin-bottom: 7px; display: flex; justify-content: space-between; gap: 10px; font-size: .87rem; }
  .card .nm { color: #5AE57A; font-weight: 500; }
  .card .x { cursor: pointer; opacity: .5; } .card .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Work Friendship Planner</h1>
  <p class="sub">Friends at work make work better. Be intentional about the connections that matter.</p>

  <div class="panel">
    <div class="idea" id="idea"></div>
    <button class="btn ghost" onclick="newIdea()" style="margin-bottom:6px">An idea</button>
    <div class="row">
      <div style="flex:2"><label>Colleague</label><input id="name" placeholder="Name"></div>
      <div><label>Connection level</label><select id="lvl"><option>Want to know better</option><option>Friendly acquaintance</option><option>Real work friend</option></select></div>
    </div>
    <label>One thing to do to build this connection</label>
    <input id="action" placeholder="e.g. Invite them to lunch this week">
    <button class="btn" onclick="add()" style="margin-top:12px">+ Add</button>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:10px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const IDEAS=["Invite someone new to a coffee or lunch break.","Ask a genuine question beyond work — and remember the answer.","Offer help before you are asked — it builds trust fast.","Celebrate a colleague's win out loud.","Find the people whose values match yours, not just the loudest.","Keep work friendships kind but professional — no gossip.","A quick 'how are you really?' goes a long way."];
  let R=JSON.parse(localStorage.getItem('wfp')||'[]');
  const save=()=>localStorage.setItem('wfp',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function newIdea(){ g('idea').textContent='💡 '+IDEAS[Math.floor(Math.random()*IDEAS.length)]; }
  function add(){ if(!v('name')){ alert('Enter a name.'); return; }
    R.push({n:v('name'),l:g('lvl').value,a:v('action')}); ['name','action'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No colleagues added yet.</div>'; return; }
    L.innerHTML=R.map((x,i)=>'<div class="card"><span><span class="nm">'+esc(x.n)+'</span> · '+esc(x.l)+(x.a?'<br><span style="opacity:.7">Next: '+esc(x.a)+'</span>':'')+'</span><span class="x" onclick="del('+i+')">✕</span></div>').join('');
  }
  newIdea(); render();
</script>
</body>
</html>
