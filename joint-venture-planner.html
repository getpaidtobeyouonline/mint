<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joint Venture Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.4rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Joint Venture Planner</h1>
  <p class="sub">Plan a joint venture where both businesses win — and nothing is left vague.</p>

  <div class="panel">
    <label for="partner">The partner</label>
    <input id="partner" placeholder="Who you would partner with">
    <label for="youbring">What you bring</label>
    <textarea id="youbring" placeholder="Your audience, skills, assets, offer"></textarea>
    <label for="theybring">What they bring</label>
    <textarea id="theybring" placeholder="Their audience, skills, assets, offer"></textarea>
    <label for="venture">The joint offer or promotion</label>
    <textarea id="venture" placeholder="What you will do together"></textarea>
    <label for="split">How revenue &amp; responsibilities are split</label>
    <textarea id="split" placeholder="Be specific — who does what, who earns what"></textarea>
    <button class="btn" onclick="gen()">Build Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['partner','youbring','theybring','venture','split'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('jvp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('jvp_'+k,g(k).value)); });
  function gen(){
    const t='JOINT VENTURE PLAN\n\nPARTNER:\n'+(v('partner')||'[the partner]')+
    '\n\nWHAT I BRING:\n'+(v('youbring')||'[your audience, skills, assets]')+
    '\n\nWHAT THEY BRING:\n'+(v('theybring')||'[their audience, skills, assets]')+
    '\n\nTHE JOINT OFFER / PROMOTION:\n'+(v('venture')||'[what you do together]')+
    '\n\nSPLIT — REVENUE & RESPONSIBILITIES:\n'+(v('split')||'[who does what, who earns what]')+
    '\n\n--- Joint venture tips ---\nThe best JVs pair complementary strengths, not identical ones.\nAgree the split, the roles and the timeline in writing before you launch.\nDecide upfront how you handle refunds, costs and any disputes.\nStart with one small collaboration to test the partnership before going bigger.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
