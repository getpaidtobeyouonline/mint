<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTA Meeting Agenda Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>PTA Meeting Agenda Tool</h1>
  <p class="sub">Build a focused PTA agenda that runs to time — and brings people back.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="date">Date</label><input id="date" type="date"></div>
      <div><label for="length">Length</label><input id="length" placeholder="e.g. 60 min"></div>
    </div>
    <label for="updates">Updates &amp; reports</label>
    <textarea id="updates" placeholder="Treasurer, headteacher, recent events"></textarea>
    <label for="decisions">Decisions to make</label>
    <textarea id="decisions" placeholder="One per line — votes, choices, spends"></textarea>
    <label for="events">Upcoming events</label>
    <textarea id="events" placeholder="Who is leading, what is needed"></textarea>
    <label for="aob">Any other business</label>
    <input id="aob" placeholder="Standing item — keep it short">
    <button class="btn" onclick="gen()">Build Agenda</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['date','length','updates','decisions','events','aob'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('pta_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('pta_'+k,g(k).value)); });
  function gen(){
    const t='PTA MEETING AGENDA'+(v('date')?'\nDate: '+v('date'):'')+(v('length')?'  ·  '+v('length'):'')+
    '\n\n1. WELCOME & APOLOGIES (5 min)\n   Quick hello, note who is missing.\n\n2. MINUTES OF LAST MEETING (5 min)\n   Approve and note any follow-ups.\n\n3. UPDATES (15 min)\n'+(v('updates')||'   - Treasurer\'s update\n   - Headteacher\'s update\n   - Recent events report')+
    '\n\n4. DECISIONS (20 min)\n'+(v('decisions')||'   - [decisions to be made]')+
    '\n\n5. UPCOMING EVENTS (10 min)\n'+(v('events')||'   - [events to plan]')+
    '\n\n6. ANY OTHER BUSINESS (5 min)\n   '+(v('aob')||'AOB only items raised in advance')+
    '\n\n7. CLOSE & NEXT MEETING DATE (5 min)\n\n--- Meeting tips ---\nShare the agenda 48 hours in advance.\nKeep decisions framed as proposals, not open-ended chats.\nStart and finish on time — respecting people\'s evenings keeps them coming back.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
