<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Angel Number Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .meaning { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 10px 13px; font-size: .87rem; margin-top: 10px; min-height: 24px; }
  .total { text-align: center; margin-bottom: 12px; }
  .total .n { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; }
  .entry { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 9px 12px; margin-bottom: 6px; }
  .entry .top { display: flex; justify-content: space-between; gap: 8px; }
  .entry .num { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.1rem; }
  .entry .meta { font-size: .8rem; opacity: .65; }
  .entry .x { cursor: pointer; opacity: .5; } .entry .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Angel Number Tracker</h1>
  <p class="sub">Notice the repeating numbers — and what they may be whispering.</p>

  <div class="panel">
    <div class="row">
      <div><label>Number you saw</label><input id="num" placeholder="e.g. 111, 444, 1111"></div>
      <div style="flex:2"><label>Where you saw it</label><input id="where" placeholder="A clock, a receipt, a plate..."></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Log</button></div>
    </div>
    <div class="meaning" id="meaning">Type a number to see a common meaning.</div>
  </div>

  <div class="panel">
    <div class="total"><span class="n" id="total">0</span><div style="opacity:.7;font-size:.85rem">sightings logged</div></div>
    <div id="list"></div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const MEANINGS={
    '111':'New beginnings — your thoughts are quickly becoming reality. Choose them with care.',
    '222':'Balance, trust and alignment. Stay the course; things are coming together.',
    '333':'Encouragement and support are near. Express yourself and create.',
    '444':'You are protected and surrounded by support. You are not alone.',
    '555':'A significant change is on its way. Stay open and flexible.',
    '666':'Re-balance — refocus on what truly matters over worry or material concerns.',
    '777':'You are on the right path. A sign of spiritual growth and good fortune.',
    '888':'Abundance and flow. Reciprocity and reward are moving toward you.',
    '999':'Completion — a chapter is ending so a new one can begin.',
    '1111':'A powerful alignment portal. Pause, breathe, and set a clear intention.',
    '1212':'Step confidently onto your path. Keep your thoughts positive and high.',
    '000':'Oneness and infinite potential — a fresh, open beginning.'
  };
  function look(){ const n=v('num').replace(/\D/g,''); g('meaning').textContent=MEANINGS[n]||(n?'A repeating number is always a gentle nudge to pay attention. Trust what it means to you.':'Type a number to see a common meaning.'); }
  g('num').addEventListener('input',look);
  let R=JSON.parse(localStorage.getItem('ant')||'[]');
  const save=()=>localStorage.setItem('ant',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ const n=v('num').replace(/\D/g,''); if(!n){ alert('Enter a number.'); return; }
    R.unshift({n:n,w:v('where'),d:new Date().toLocaleDateString(),m:MEANINGS[n]||''}); g('num').value=''; g('where').value=''; look(); save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function render(){
    g('total').textContent=R.length;
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">Your sightings will appear here.</div>'; return; }
    L.innerHTML=R.map((x,i)=>'<div class="entry"><div class="top"><span class="num">'+x.n+'</span><span class="x" onclick="del('+i+')">✕</span></div><div class="meta">'+x.d+(x.w?'  ·  '+esc(x.w):'')+'</div>'+(x.m?'<div class="meta" style="opacity:.85">'+x.m+'</div>':'')+'</div>').join('');
  }
  render();
</script>
</body>
</html>
