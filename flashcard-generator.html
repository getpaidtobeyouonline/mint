<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Flashcard Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 600px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 10px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .card { background: #2A442A; border: 2px solid #5A845A; border-radius: 12px; min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; cursor: pointer; text-align: center; }
  .card .side { font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; color: #5AE57A; opacity: .7; }
  .card .content { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-top: 8px; }
  .card .hint { font-size: .78rem; opacity: .5; margin-top: 12px; }
  .nav { display: flex; gap: 8px; align-items: center; justify-content: center; margin-top: 12px; }
  .nav .pos { font-size: .85rem; opacity: .7; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 7px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: .84rem; gap: 8px; }
  .item .x { cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Flashcard Generator</h1>
  <p class="sub">Add cards, then study them. Tap a card to flip it — test yourself, build recall.</p>

  <div class="panel">
    <label>Front (question / term)</label>
    <input id="front" placeholder="e.g. What is photosynthesis?">
    <label>Back (answer / definition)</label>
    <input id="back" placeholder="The answer...">
    <button class="btn" onclick="add()">+ Add Card</button>
  </div>

  <div class="panel" id="studyW" style="display:none">
    <div class="card" id="card" onclick="flip()"></div>
    <div class="nav">
      <button class="btn ghost" onclick="prev()" style="margin-top:0">‹ Prev</button>
      <span class="pos" id="pos"></span>
      <button class="btn ghost" onclick="next()" style="margin-top:0">Next ›</button>
    </div>
    <button class="btn ghost" onclick="shuffle()" style="width:100%">🔀 Shuffle</button>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('fcg')||'[]'), idx=0, showBack=false;
  const save=()=>localStorage.setItem('fcg',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('front')||!v('back')){ alert('Fill both sides.'); return; }
    R.push({f:v('front'),b:v('back')}); g('front').value=''; g('back').value=''; save(); render(); }
  function del(i){ R.splice(i,1); if(idx>=R.length)idx=Math.max(0,R.length-1); save(); render(); }
  function clearAll(){ if(confirm('Clear all cards?')){ R=[]; idx=0; save(); render(); } }
  function flip(){ showBack=!showBack; renderCard(); }
  function next(){ if(R.length){ idx=(idx+1)%R.length; showBack=false; renderCard(); } }
  function prev(){ if(R.length){ idx=(idx-1+R.length)%R.length; showBack=false; renderCard(); } }
  function shuffle(){ R.sort(()=>Math.random()-0.5); idx=0; showBack=false; save(); render(); }
  function renderCard(){
    if(!R.length){ g('studyW').style.display='none'; return; }
    g('studyW').style.display='block';
    const c=R[idx];
    g('card').innerHTML='<div class="side">'+(showBack?'Answer':'Question')+'</div><div class="content">'+esc(showBack?c.b:c.f)+'</div><div class="hint">tap to flip</div>';
    g('pos').textContent=(idx+1)+' / '+R.length;
  }
  function render(){
    renderCard();
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No cards yet — add your first.</div>'; return; }
    L.innerHTML=R.map((x,i)=>'<div class="item"><span><b style="color:#5AE57A">'+esc(x.f)+'</b> → '+esc(x.b)+'</span><span class="x" onclick="del('+i+')">✕</span></div>').join('');
  }
  render();
</script>
</body>
</html>
