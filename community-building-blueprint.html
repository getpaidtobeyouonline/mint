<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Building Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.4rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Community Building Roadmap</h1>
  <p class="sub">Plan a community that becomes the heart of your coaching business.</p>

  <div class="panel">
    <label for="who">Who the community is for</label>
    <input id="who" placeholder="The people it brings together">
    <label for="purpose">The shared purpose</label>
    <textarea id="purpose" placeholder="Why members would gather and stay"></textarea>
    <label for="platform">Where it will live</label>
    <input id="platform" placeholder="e.g. a private group, an app, a membership site">
    <label for="rituals">Engagement rituals</label>
    <textarea id="rituals" placeholder="Regular moments — calls, threads, challenges, check-ins"></textarea>
    <label for="growth">How it will grow</label>
    <textarea id="growth" placeholder="How new members find and join"></textarea>
    <label for="model">How it supports the business</label>
    <input id="model" placeholder="e.g. paid membership, a free funnel, retention">
    <button class="btn" onclick="gen()">Build Roadmap</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['who','purpose','platform','rituals','growth','model'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('cbr_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('cbr_'+k,g(k).value)); });
  function gen(){
    const t='COMMUNITY BUILDING ROADMAP\n\nWHO IT IS FOR:\n'+(v('who')||'[the people it brings together]')+
    '\n\nSHARED PURPOSE:\n'+(v('purpose')||'[why members gather and stay]')+
    '\n\nWHERE IT LIVES:\n'+(v('platform')||'[your platform]')+
    '\n\nENGAGEMENT RITUALS:\n'+(v('rituals')||'[the regular moments that build belonging]')+
    '\n\nHOW IT GROWS:\n'+(v('growth')||'[how new members find and join]')+
    '\n\nHOW IT SUPPORTS THE BUSINESS:\n'+(v('model')||'[membership, funnel, retention]')+
    '\n\n--- Community building tips ---\nStart small and intimate — a tight, active community beats a big, quiet one.\nRituals create belonging: predictable moments people can rely on.\nLead conversations early, then hand ownership to members over time.\nProtect the culture fiercely; one set of clear values guides everything.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
