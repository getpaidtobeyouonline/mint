<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Bio Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Professional Bio Builder</h1>
  <p class="sub">Get three ready-to-use bios — a one-liner, a short version and a full version.</p>

  <div class="panel">
    <label for="name">Your name</label>
    <input id="name" placeholder="First and last name">
    <label for="role">Your role or title</label>
    <input id="role" placeholder="e.g. Marketing strategist">
    <label for="does">What you do / your specialty</label>
    <input id="does" placeholder="e.g. helps small brands grow with email">
    <label for="proof">Your strongest credibility point</label>
    <input id="proof" placeholder="An award, result, client, years, or notable work">
    <label for="who">Who you help</label>
    <input id="who" placeholder="e.g. founders, students, busy parents">
    <label for="touch">A human touch</label>
    <input id="touch" placeholder="e.g. lives in Leeds with two dogs and too many books">
    <button class="btn" onclick="gen()">Build Bios</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['name','role','does','proof','who','touch'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('pbb_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('pbb_'+k,g(k).value)); });
  function gen(){
    if(!v('name')){ alert('Add your name.'); return; }
    const n=v('name'), r=v('role')||'[role]', d=v('does')||'[what you do]';
    const one=n+' is a '+r+' who '+d+'.';
    const short=one+(v('proof')?' '+v('proof').charAt(0).toUpperCase()+v('proof').slice(1)+'.':'')+(v('who')?' '+n.split(' ')[0]+' works with '+v('who')+'.':'');
    const long=short+(v('touch')?'\n\nOutside of work, '+n.split(' ')[0]+' '+v('touch')+'.':'');
    const t='YOUR PROFESSIONAL BIOS\n\n--- ONE-LINER (for email signatures, intros) ---\n'+one+
    '\n\n--- SHORT (for LinkedIn, social, speaker intros) ---\n'+short+
    '\n\n--- FULL (for your website or About page) ---\n'+long+
    '\n\nTIP: Write in the third person for formal use, first person for your own site.\nLead with what you do for others, not just your job title.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
