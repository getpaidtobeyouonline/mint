<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Workshop Notes Organiser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .hint { font-size: .76rem; opacity: .6; margin-top: 2px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 10px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .note { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
  .note .top { display: flex; justify-content: space-between; gap: 10px; }
  .note .nm { color: #5AE57A; font-weight: 500; }
  .note .x { cursor: pointer; opacity: .5; flex: none; } .note .x:hover { opacity: 1; color: #5AE57A; }
  .note .sec { font-size: .87rem; margin-top: 4px; }
  .note .sec b { color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Workshop Notes Organiser</h1>
  <p class="sub">A clean structure for workshop notes — learnings, questions and what to do next.</p>

  <div class="panel">
    <label>Workshop / topic</label>
    <input id="title" placeholder="e.g. Negotiation skills workshop">
    <label>What I learned</label>
    <textarea id="learn" placeholder="Key points, frameworks, ideas"></textarea>
    <label>Questions still open</label>
    <textarea id="quest" placeholder="Anything unclear or worth following up"></textarea>
    <label>Actions to take</label>
    <textarea id="action" placeholder="What you will do with this"></textarea>
    <div class="hint">Notes you do not revisit are wasted. Schedule a review of these in a week.</div>
    <button class="btn" onclick="add()">+ Save Notes</button>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('wno')||'[]');
  const save=()=>localStorage.setItem('wno',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('title')&&!v('learn')){ alert('Add a title or some notes.'); return; }
    R.push({t:v('title'),l:v('learn'),q:v('quest'),a:v('action'),d:new Date().toLocaleDateString()});
    ['title','learn','quest','action'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all notes?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No workshop notes yet.</div>'; return; }
    L.innerHTML=[...R].reverse().map(x=>{ const i=R.indexOf(x);
      let h='<div class="note"><div class="top"><span class="nm">'+esc(x.t||'Workshop')+' <span style="opacity:.5;font-weight:400;font-size:.78rem">· '+x.d+'</span></span><span class="x" onclick="del('+i+')">✕</span></div>';
      if(x.l)h+='<div class="sec"><b>Learned:</b> '+esc(x.l)+'</div>';
      if(x.q)h+='<div class="sec"><b>Questions:</b> '+esc(x.q)+'</div>';
      if(x.a)h+='<div class="sec"><b>Actions:</b> '+esc(x.a)+'</div>';
      return h+'</div>';
    }).join('');
  }
  render();
</script>
</body>
</html>
