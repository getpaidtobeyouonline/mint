<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Day Agenda Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>VIP Day Agenda Builder</h1>
  <p class="sub">Design a high-value VIP day that delivers a real result in a single session.</p>

  <div class="panel">
    <label for="client">Client</label>
    <input id="client" placeholder="Client name">
    <label for="outcome">The outcome of the day</label>
    <textarea id="outcome" placeholder="The one big thing they walk away with"></textarea>
    <label for="prework">Pre-work before the day</label>
    <textarea id="prework" placeholder="What they prepare or send in advance"></textarea>
    <label for="morning">Morning block — focus &amp; work</label>
    <textarea id="morning" placeholder="What you tackle in the first half"></textarea>
    <label for="afternoon">Afternoon block — build &amp; finalise</label>
    <textarea id="afternoon" placeholder="What you complete in the second half"></textarea>
    <label for="deliverable">The deliverable they leave with</label>
    <input id="deliverable" placeholder="The tangible result or asset">
    <button class="btn" onclick="gen()">Build Agenda</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['client','outcome','prework','morning','afternoon','deliverable'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('vda_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('vda_'+k,g(k).value)); });
  function gen(){
    const t='VIP DAY AGENDA'+(v('client')?'\nClient: '+v('client'):'')+
    '\n\nOUTCOME OF THE DAY:\n'+(v('outcome')||'[the one big result]')+
    '\n\nPRE-WORK (sent in advance):\n'+(v('prework')||'[what they prepare beforehand]')+
    '\n\n--- THE DAY ---\n\n9:00  Welcome, set intentions, review pre-work\n\n9:30  MORNING BLOCK\n'+(v('morning')||'[deep focus and core work]')+
    '\n\n12:30 Lunch break\n\n1:30  AFTERNOON BLOCK\n'+(v('afternoon')||'[build and finalise]')+
    '\n\n4:30  Review, deliverable handover, next steps\n\n5:00  Close\n\nDELIVERABLE THEY LEAVE WITH:\n'+(v('deliverable')||'[the tangible asset or result]')+
    '\n\n--- VIP day tips ---\nProtect the energy: build in breaks and keep the room comfortable.\nGood pre-work means you start fast and finish strong.\nAdd a follow-up call 1-2 weeks later to lock in the result.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
