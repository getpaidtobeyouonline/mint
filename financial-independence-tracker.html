<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Financial Independence Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 10px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .res { text-align: center; background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 10px; padding: 20px; }
  .res .n { font-family: 'Playfair Display', serif; font-size: 2.6rem; color: #5AE57A; line-height: 1; }
  .res .vd { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: #5AE57A; margin-top: 6px; }
  .track { background: #3C603C; border-radius: 5px; height: 10px; overflow: hidden; margin: 12px 0; }
  .track>i { display: block; height: 100%; background: #5AE57A; transition: width .3s; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
  .stat { flex: 1; min-width: 110px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 12px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: #5AE57A; }
  .stat .l { font-size: .68rem; opacity: .65; text-transform: uppercase; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Financial Independence Tracker</h1>
  <p class="sub">How much of your monthly expenses are covered by passive income? That's your real FI ratio.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="exp">Monthly expenses ($)</label><input id="exp" type="number" min="0" value="3500" oninput="calc()"></div>
      <div><label for="passive">Monthly passive income ($)</label><input id="passive" type="number" min="0" value="600" oninput="calc()"></div>
    </div>
  </div>

  <div class="res">
    <div class="n" id="pct">0%</div>
    <div class="vd" id="vd">of expenses covered by passive income</div>
    <div class="track"><i id="bar" style="width:0%"></i></div>
    <div class="stats">
      <div class="stat"><div class="v" id="gap">$0</div><div class="l">monthly gap</div></div>
      <div class="stat"><div class="v" id="annual">$0</div><div class="l">passive / yr</div></div>
    </div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), n=id=>parseFloat(g(id).value)||0;
  ['exp','passive'].forEach(k=>{ const s=localStorage.getItem('fit_'+k); if(s!==null)g(k).value=s; });
  function calc(){
    ['exp','passive'].forEach(k=>localStorage.setItem('fit_'+k,g(k).value));
    const ex=n('exp'), p=n('passive');
    const pct=ex>0?Math.min(200,p/ex*100):0;
    g('pct').textContent=Math.round(pct)+'%';
    g('bar').style.width=Math.min(100,pct)+'%';
    g('vd').textContent= pct>=100?'Financially independent ✓':'of expenses covered by passive income';
    g('gap').textContent=(ex-p<0?'+$':'$')+Math.abs(Math.round(ex-p)).toLocaleString();
    g('annual').textContent='$'+Math.round(p*12).toLocaleString();
  }
  calc();
</script>
</body>
</html>
