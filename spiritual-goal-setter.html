<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spiritual Goal Setter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Spiritual Goal Setter</h1>
  <p class="sub">Set a soul-led intention — and a gentle, sustainable way to grow into it.</p>

  <div class="panel">
    <label for="goal">Your spiritual goal or intention</label>
    <input id="goal" placeholder="e.g. a calmer mind, a deeper practice, more presence">
    <label for="why">Why it matters to your soul</label>
    <textarea id="why" placeholder="The deeper longing underneath it"></textarea>
    <label for="practice">The daily or weekly practice</label>
    <textarea id="practice" placeholder="The small, repeatable habit that grows it"></textarea>
    <label for="obstacle">What might pull you off course</label>
    <textarea id="obstacle" placeholder="And a kind plan for when it does"></textarea>
    <label for="growth">How you will know you are growing</label>
    <input id="growth" placeholder="A felt sense, not a metric">
    <button class="btn" onclick="gen()">Build Intention</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['goal','why','practice','obstacle','growth'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('spgs_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('spgs_'+k,g(k).value)); });
  function gen(){
    const t='SPIRITUAL INTENTION\n\nMY INTENTION:\n'+(v('goal')||'[your soul-led goal]')+
    '\n\nWHY IT MATTERS TO MY SOUL:\n'+(v('why')||'[the deeper longing]')+
    '\n\nMY PRACTICE:\n'+(v('practice')||'[the small, repeatable habit]')+
    '\n\nWHEN I DRIFT, I WILL:\n'+(v('obstacle')||'[your kind plan for the off days]')+
    '\n\nI WILL KNOW I AM GROWING WHEN:\n'+(v('growth')||'[the felt sense of growth]')+
    '\n\n--- A gentle reminder ---\nSpiritual growth is not a project to finish — it is a way of walking.\nConsistency, however small, matters far more than intensity.\nMeet yourself with grace. Begin again, as many times as it takes.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
