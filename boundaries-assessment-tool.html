<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boundaries Assessment Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  .q { background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
  .q span { flex: 1; min-width: 220px; font-size: .92rem; }
  select { background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .85rem; padding: 7px 9px; border-radius: 7px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .95rem; padding: 13px 26px; border-radius: 8px; margin: 8px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .res { text-align: center; background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 22px; margin: 18px 0; }
  .res .n { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: #5AE57A; line-height: 1; }
  .res .vd { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: #5AE57A; margin-top: 5px; }
  .fix { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 12px 15px; margin-bottom: 9px; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Boundaries Assessment Tool</h1>
  <p class="sub">Boundaries are not built once — they are practised. Score where yours are leaking and what to do.</p>

  <div id="form"></div>
  <button class="btn" onclick="run()">Check My Boundaries</button>
  <button class="btn ghost" onclick="reset()">Reset</button>
  <div id="res"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const Q=[
    ["I say no without long explanations","\"No, I can't\" is a complete sentence.","Practise it once this week with no follow-up justification."],
    ["I do not check work outside chosen hours","Boundaries with devices are still boundaries.","Set one device-free hour and protect it like a meeting."],
    ["I do not over-explain my decisions","Over-explaining = seeking permission.","Next time, give the decision once. Stop."],
    ["I can let someone be disappointed in me","Approval-keeping costs you yourself.","Disappoint one person, kindly, this week. You will survive."],
    ["I do not absorb other people's emotions as my own","Empathy without boundary = burnout.","Notice when you carry someone's feeling home — name it, then put it down."],
    ["I ask for what I need clearly","Hints are not boundaries.","Replace one hint this week with a direct ask."],
    ["I have time that is genuinely my own","If it does not exist in the calendar, it does not exist.","Block 30 mins this week labelled 'mine'. Defend it."],
    ["I do not say yes when I want to say no","Yes-by-default is a boundary leak.","Buy yourself the 24-hour rule: 'Let me get back to you.'"]
  ];
  const g=id=>document.getElementById(id);
  g('form').innerHTML=Q.map((q,i)=>`<div class="q"><span>${q[0]}</span>
    <select id="q${i}"><option value="1">Rarely</option><option value="2">Sometimes</option><option value="3">Often</option><option value="4">Almost always</option></select></div>`).join('');
  const saved=JSON.parse(localStorage.getItem('bat')||'{}');
  Q.forEach((_,i)=>{ if(saved[i])g('q'+i).value=saved[i]; g('q'+i).addEventListener('change',()=>{ const o={};Q.forEach((_,j)=>o[j]=g('q'+j).value); localStorage.setItem('bat',JSON.stringify(o)); }); });
  function run(){
    const sc=Q.reduce((s,_,i)=>s+ +g('q'+i).value,0);
    const pct=Math.round(sc/(Q.length*4)*100);
    const vd= pct>=80?['Healthy boundaries','You take care of yourself without apology.']:pct>=60?['Mostly held','One or two leaks; tighten them before they become resentments.']:pct>=40?['Leaky','Resentment-prone — the cost is showing up in your energy.']:['Wide open','You are being lived by other people\'s priorities. Start with one boundary this week.'];
    const weak=Q.map((q,i)=>({q,v:+g('q'+i).value})).filter(o=>o.v<=2).slice(0,3);
    g('res').innerHTML='<div class="res"><div class="n">'+pct+'%</div><div class="vd">'+vd[0]+'</div><div style="opacity:.8;font-size:.92rem;margin-top:4px">'+vd[1]+'</div></div>'+
      (weak.length?'<h3 style="font-family:\'Playfair Display\',serif;color:#5AE57A;margin:0 0 10px">Practise these this week</h3>'+
       weak.map(o=>'<div class="fix"><b style="color:#5AE57A">'+esc(o.q[0])+'</b><br>'+esc(o.q[2])+'</div>').join('')
       :'<div class="fix" style="border-left-color:#5AE57A">Strong — keep tending these; they leak if not practised.</div>');
    g('res').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function reset(){ if(confirm('Reset?')){ localStorage.removeItem('bat'); Q.forEach((_,i)=>g('q'+i).value='1'); g('res').innerHTML=''; } }
</script>
</body>
</html>
