<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inner Child Healing Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 16px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 54px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  .note { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 9px 12px; font-size: .8rem; opacity: .72; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Inner Child Healing Tool</h1>
  <p class="sub">Write a tender letter to the younger you who is still part of you.</p>

  <div class="panel">
    <label for="age">The age of the younger you</label>
    <input id="age" placeholder="e.g. 7 years old">
    <label for="felt">What they were feeling back then</label>
    <textarea id="felt" placeholder="The emotion that needs to be heard"></textarea>
    <label for="needed">What they needed but did not receive</label>
    <textarea id="needed" placeholder="The reassurance, safety or love they longed for"></textarea>
    <label for="give">What you can give them now</label>
    <textarea id="give" placeholder="The words, comfort and truth they can hear from you today"></textarea>
    <label for="action">A nurturing action for this week</label>
    <input id="action" placeholder="Something kind you will do for that part of you">
    <button class="btn" onclick="gen()">Write the Letter</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['age','felt','needed','give','action'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('ich_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('ich_'+k,g(k).value)); });
  function gen(){
    const t='A LETTER TO MY INNER CHILD\n\nDear little one'+(v('age')?' ('+v('age')+')':'')+',\n\nI see you. I know you felt '+(v('felt')||'[what they felt]')+', and that you carried it alone for a long time.\n\nYou needed '+(v('needed')||'[what they needed]')+'. It was not your fault that you did not get it. You deserved it then, and you still do.\n\nSo let me tell you now: '+(v('give')||'[what you give them today]')+'\n\nI am here. I am not going anywhere. You are safe with me now, and you always will be.\n\nWith love,\nYour grown-up self\n\n--- A nurturing action this week ---\n'+(v('action')||'[a kind act for that part of you]')+
    '\n\n--- A gentle note ---\nReturn to this letter whenever the younger you feels activated.\nHealing is slow and non-linear — meet yourself with patience.\nIf old wounds feel heavy, a trauma-informed therapist can walk with you.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Write it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
