<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Instagram Travel Content Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 12px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .out { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 14px; margin-top: 12px; display: none; }
  .out .cap { font-size: .92rem; }
  .out .tags { font-size: .85rem; color: #5AE57A; margin-top: 10px; }
  .out h4 { font-size: .76rem; text-transform: uppercase; letter-spacing: .04em; opacity: .7; margin-bottom: 4px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Instagram Travel Content Tool</h1>
  <p class="sub">Turn a travel moment into a caption and hashtag set, ready to post.</p>

  <div class="panel">
    <label for="place">Place / location</label>
    <input id="place" placeholder="e.g. Santorini, Greece">
    <label for="subject">What is in the photo?</label>
    <input id="subject" placeholder="e.g. Sunset over the white houses">
    <label for="vibe">Caption vibe</label>
    <select id="vibe"><option value="inspiring">Inspiring / dreamy</option><option value="witty">Witty / fun</option><option value="reflective">Reflective</option><option value="useful">Useful / tips</option></select>
    <button class="btn" onclick="gen()">Generate Caption Ideas</button>
    <div class="out" id="out"></div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  function gen(){
    const place=v('place')||'this place', subject=v('subject')||'this moment', vibe=g('vibe').value;
    const CAPS={
      inspiring:["Some places stay with you long after you leave. "+place+" is one of them.","Collecting moments, not things — and "+place+" gave me plenty.",""+subject+". This is your reminder that the world is wide and waiting."],
      witty:["Did I come to "+place+" just for this view? Absolutely. No regrets.","Currently accepting applications for someone to carry my bags around "+place+".",""+subject+" — and yes, I took 200 photos to get this one."],
      reflective:["Travel teaches you how small you are, in the best possible way. "+place+", thank you.",""+subject+". I want to remember exactly how this felt.","Days like this in "+place+" are why I save, plan and go."],
      useful:["Visiting "+place+"? Here is what I wish I had known before I went 👇","Save this for your "+place+" trip — "+subject+" is a must-see.","Quick guide to "+place+": where to go, when, and what it really costs."]
    };
    const caps=CAPS[vibe];
    const tagBase=place.toLowerCase().replace(/[^a-z]/g,'');
    const tags=['#travel','#'+tagBase,'#travelgram','#wanderlust','#travelphotography','#exploremore','#travelblogger','#instatravel','#'+tagBase+'travel','#traveldiaries'];
    g('out').style.display='block';
    g('out').innerHTML='<h4>Caption options</h4>'+caps.map(c=>'<div class="cap" style="margin-bottom:8px">• '+c+'</div>').join('')+
      '<h4 style="margin-top:10px">Hashtag set</h4><div class="tags">'+tags.join(' ')+'</div>'+
      '<button class="btn ghost" onclick="copyTags(\''+tags.join(' ')+'\')" style="margin-top:10px">Copy hashtags</button>';
  }
  function copyTags(t){ navigator.clipboard.writeText(t).then(()=>alert('Hashtags copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
