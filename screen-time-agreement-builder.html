<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screen Time Agreement Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 48px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .9rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Screen Time Agreement Builder</h1>
  <p class="sub">A family agreement works better than a parental rule. Build it together, sign it together.</p>

  <div class="panel">
    <label for="who">This agreement is for</label>
    <input id="who" placeholder="Child's name / the whole family">
    <label for="weekday">Weekday screen limit</label>
    <input id="weekday" placeholder="e.g. 1 hour after homework">
    <label for="weekend">Weekend screen limit</label>
    <input id="weekend" placeholder="e.g. 2 hours, in two sittings">
    <label for="free">Screen-free zones &amp; times</label>
    <textarea id="free" placeholder="e.g. No screens at the dinner table or in bedrooms after 8pm"></textarea>
    <label for="before">What must happen before screens</label>
    <textarea id="before" placeholder="e.g. Homework done, room tidy, been outside"></textarea>
    <label for="parent">What the grown-ups agree to do too</label>
    <textarea id="parent" placeholder="e.g. Phones away at meals, model good habits"></textarea>
    <label for="consequence">If the agreement is broken</label>
    <input id="consequence" placeholder="e.g. Screen break the next day">
    <button class="btn" onclick="gen()">Build Agreement</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['who','weekday','weekend','free','before','parent','consequence'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('stab_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('stab_'+k,g(k).value)); });
  function gen(){
    const t=`FAMILY SCREEN TIME AGREEMENT\n\nFor: ${v('who')||'[name]'}\nDate: ${new Date().toLocaleDateString()}\n\nWEEKDAY LIMIT:\n${v('weekday')||'[agree a limit]'}\n\nWEEKEND LIMIT:\n${v('weekend')||'[agree a limit]'}\n\nSCREEN-FREE ZONES & TIMES:\n${v('free')||'[where and when screens go away]'}\n\nFIRST THINGS FIRST — before screens:\n${v('before')||'[what must be done]'}\n\nTHE GROWN-UPS ALSO AGREE TO:\n${v('parent')||'[model it too]'}\n\nIF THE AGREEMENT IS BROKEN:\n${v('consequence')||'[a fair, known consequence]'}\n\n--- Signatures ---\nChild: ____________________\nParent/Carer: ____________________\n\nReview this together every month and adjust as you go.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
