<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Email Metrics Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 800px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 20px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .addrow { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .addrow>div { flex: 1; min-width: 90px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat { flex: 1; min-width: 110px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 12px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: #5AE57A; }
  .stat .l { font-size: .69rem; opacity: .65; text-transform: uppercase; }
  .row { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 8px 12px; margin-bottom: 6px; display: flex; justify-content: space-between; font-size: .85rem; gap: 10px; flex-wrap: wrap; }
  .row .x { cursor: pointer; opacity: .5; } .row .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 16px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Email Metrics Dashboard</h1>
  <p class="sub">Log every send's core metrics in one place — see your real averages, trends, and best performers.</p>

  <div class="panel">
    <div class="addrow">
      <div style="flex:2"><label for="nm">Email</label><input id="nm" placeholder="e.g. Welcome 1"></div>
      <div><label for="date">Date</label><input id="date" type="date"></div>
      <div><label for="del">Delivered</label><input id="del" type="number" min="0"></div>
      <div><label for="op">Opens</label><input id="op" type="number" min="0"></div>
      <div><label for="cl">Clicks</label><input id="cl" type="number" min="0"></div>
      <div><label for="un">Unsubs</label><input id="un" type="number" min="0"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="sN">0</div><div class="l">Sends</div></div>
    <div class="stat"><div class="v" id="sOR">—</div><div class="l">Avg open</div></div>
    <div class="stat"><div class="v" id="sCR">—</div><div class="l">Avg click</div></div>
    <div class="stat"><div class="v" id="sUR">—</div><div class="l">Avg unsub</div></div>
  </div>

  <div id="list"></div>
  <button class="btn ghost" onclick="exportCsv()">Export CSV</button>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim(), nu=id=>parseFloat(g(id).value)||0;
  let R=JSON.parse(localStorage.getItem('emd')||'[]');
  g('date').value=new Date().toISOString().slice(0,10);
  const save=()=>localStorage.setItem('emd',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const or=r=>r.d>0?r.o/r.d*100:0, cr=r=>r.d>0?r.c/r.d*100:0, ur=r=>r.d>0?r.u/r.d*100:0;
  function add(){ const nm=v('nm'); if(!nm){alert('Name the email.');return;} R.push({nm,date:v('date')||new Date().toISOString().slice(0,10),d:nu('del'),o:nu('op'),c:nu('cl'),u:nu('un')}); ['nm','del','op','cl','un'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ R=[]; save(); render(); } }
  function render(){
    g('sN').textContent=R.length;
    if(R.length){
      g('sOR').textContent=(R.reduce((s,r)=>s+or(r),0)/R.length).toFixed(1)+'%';
      g('sCR').textContent=(R.reduce((s,r)=>s+cr(r),0)/R.length).toFixed(2)+'%';
      g('sUR').textContent=(R.reduce((s,r)=>s+ur(r),0)/R.length).toFixed(2)+'%';
    } else { g('sOR').textContent=g('sCR').textContent=g('sUR').textContent='—'; }
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No sends logged yet.</div>'; return; }
    L.innerHTML=[...R].map((r,i)=>({r,i})).sort((a,b)=>a.r.date<b.r.date?1:-1).map(({r,i})=>`<div class="row"><span><b style="color:#5AE57A">${r.date}</b> · ${esc(r.nm)}</span><span>🔓${or(r).toFixed(1)}% · 🖱${cr(r).toFixed(2)}% · ✗${ur(r).toFixed(2)}% <span class="x" onclick="del(${i})">✕</span></span></div>`).join('');
  }
  function exportCsv(){ if(!R.length){alert('Add some sends first.');return;}
    const out=[['Date','Email','Delivered','Opens','Clicks','Unsubs','Open %','Click %','Unsub %']]
      .concat([...R].sort((a,b)=>a.date<b.date?-1:1).map(r=>[r.date,r.nm,r.d,r.o,r.c,r.u,or(r).toFixed(2),cr(r).toFixed(2),ur(r).toFixed(2)]));
    const csv=out.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const b=new Blob([csv],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='email-metrics.csv'; a.click(); URL.revokeObjectURL(a.href);
  }
  render();
</script>
</body>
</html>
