<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podcast Episode Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Podcast Episode Planner</h1>
  <p class="sub">Plan a focused episode that earns the listener's time — and the next play.</p>

  <div class="panel">
    <label for="title">Working title</label>
    <input id="title" placeholder="A title that promises something specific">
    <label for="for">Who this is for</label>
    <input id="for" placeholder="Your exact listener">
    <label for="promise">The one promise of this episode</label>
    <textarea id="promise" placeholder="What they will know, feel or be able to do by the end"></textarea>
    <label for="hook">Opening hook (first 30 seconds)</label>
    <textarea id="hook" placeholder="A story, statement or question that earns attention"></textarea>
    <label for="points">Key points / segments (one per line)</label>
    <textarea id="points" placeholder="The flow of the episode"></textarea>
    <label for="cta">Call to action at the end</label>
    <input id="cta" placeholder="Subscribe? Download? Share with someone?">
    <button class="btn" onclick="gen()">Build Episode Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['title','for','promise','hook','points','cta'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('pep2_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('pep2_'+k,g(k).value)); });
  function gen(){
    const pts=v('points').split('\n').filter(x=>x.trim()).map((x,i)=>'  '+(i+1)+'. '+x.trim()).join('\n')||'  [your segments]';
    const t='PODCAST EPISODE PLAN\n\nTITLE: '+(v('title')||'[working title]')+
    '\n\nFOR: '+(v('for')||'[your listener]')+
    '\n\nTHE PROMISE:\n'+(v('promise')||'[what the listener gets by the end]')+
    '\n\n--- THE EPISODE ---\n\n1. HOOK (first 30 sec)\n'+(v('hook')||'[the line that earns the listen]')+
    '\n\n2. KEY POINTS\n'+pts+
    '\n\n3. CALL TO ACTION\n'+(v('cta')||'[subscribe, download, share]')+
    '\n\n--- Episode tips ---\nOne promise per episode. Cut anything that does not serve it.\nA strong first 60 seconds is what makes them stay.\nEnd with one clear ask. Two is one too many.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
