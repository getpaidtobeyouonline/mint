<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Morning Routine for Kids</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 48px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Morning Routine for Kids</h1>
  <p class="sub">Out of the door on time, with everyone still smiling.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="leave">Leave-the-house time</label><input id="leave" placeholder="e.g. 8:15am"></div>
      <div><label for="wake">Wake-up time</label><input id="wake" placeholder="e.g. 6:45am"></div>
    </div>
    <label for="bodycare">Body care</label>
    <input id="bodycare" placeholder="Loo, brush teeth, hair, face">
    <label for="dress">Getting dressed</label>
    <input id="dress" placeholder="Outfit choices (laid out the night before?)">
    <label for="brek">Breakfast</label>
    <input id="brek" placeholder="A go-to that works on busy mornings">
    <label for="bag">School / nursery bag</label>
    <textarea id="bag" placeholder="What goes in: book bag, lunch, water, kit, letters"></textarea>
    <label for="exit">Final exit steps</label>
    <input id="exit" placeholder="Shoes, coat, kiss, out the door">
    <button class="btn" onclick="gen()">Build Routine</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['leave','wake','bodycare','dress','brek','bag','exit'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('mrk_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('mrk_'+k,g(k).value)); });
  function gen(){
    const t='MORNING ROUTINE'+(v('wake')?'\nWake: '+v('wake'):'')+(v('leave')?'   Leave by: '+v('leave'):'')+
    '\n\n1. BODY CARE\n'+(v('bodycare')||'[loo, brush teeth, hair]')+
    '\n\n2. GET DRESSED\n'+(v('dress')||'[outfit ready the night before]')+
    '\n\n3. BREAKFAST\n'+(v('brek')||'[a quick, reliable breakfast]')+
    '\n\n4. PACK THE BAG\n'+(v('bag')||'[everything ready by the door]')+
    '\n\n5. OUT THE DOOR\n'+(v('exit')||'[shoes, coat, kiss, go]')+
    '\n\n--- Tips for a calm morning ---\nLay out clothes and pack bags the night before — five evening minutes saves twenty in the morning.\nWake yourself fifteen minutes earlier than your child for a peaceful head start.\nUse a visual checklist for younger kids — they love ticking things off themselves.\nMusic or a "morning playlist" can keep the energy moving without nagging.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
