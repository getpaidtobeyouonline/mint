<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Post Launch Email Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .em { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
  .em h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.02rem; }
  .em .who { font-size: .8rem; opacity: .65; } .em p { font-size: .9rem; margin-top: 4px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Post Launch Email Planner</h1>
  <p class="sub">Most launches end the moment cart closes. The smart ones keep earning for another week.</p>

  <div class="panel">
    <label for="prod">What you launched</label>
    <input id="prod" placeholder="e.g. The Pricing Toolkit">
    <button class="btn" onclick="gen()">Build Post-Launch Plan</button>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const sv=localStorage.getItem('plep'); if(sv)g('prod').value=sv;
  g('prod').addEventListener('input',()=>localStorage.setItem('plep',g('prod').value));
  function gen(){
    const p=v('prod')||'your offer';
    const seq=[
      ["Day 0 — Thank-you to BUYERS","new buyers","Confirm purchase + how to access. Set 1 clear first action. Ask them to reply with their #1 goal — engagement + early wins."],
      ["Day 1 — Welcome to NON-BUYERS","didn't buy","No guilt. Acknowledge the launch ended. Give a pure-value email related to the topic. Keep the door warm."],
      ["Day 3 — Quick-win for BUYERS","new buyers","One tactical thing they can do this week to start seeing results from "+p+". Drives engagement and refund-protection."],
      ["Day 5 — Social proof to NON-BUYERS","didn't buy","Share a real result a launch buyer just had. No pitch, just proof. Plant the seed for next time."],
      ["Day 7 — Debrief to FULL LIST","everyone","Honest behind-the-scenes: what worked, what didn't, what you learned. Builds enormous trust; great content too."],
      ["Day 10 — Downsell / waitlist","interested non-buyers","Offer the smaller next-step product OR open a waitlist for next launch (capture intent while warm)."],
      ["Day 14 — Back to normal","everyone","Resume regular value emails. The launch is over; the relationship is forever."]
    ];
    g('out').innerHTML=seq.map(s=>'<div class="em"><h3>'+s[0]+'</h3><div class="who">→ '+s[1]+'</div><p>'+s[2]+'</p></div>').join('');
  }
  gen();
</script>
</body>
</html>
