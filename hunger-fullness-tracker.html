<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunger Fullness Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input[type=range] { padding: 0; accent-color: #5AE57A; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 130px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 10px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .scaleref { font-size: .8rem; opacity: .7; margin-top: 4px; }
  .row2 { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 9px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: .86rem; gap: 8px; }
  .row2 .x { cursor: pointer; opacity: .5; } .row2 .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Hunger Fullness Tracker</h1>
  <p class="sub">Rate hunger before and fullness after each meal. The aim: start ~3, finish ~7.</p>

  <div class="panel">
    <label>What you ate</label>
    <input id="meal" placeholder="The meal or snack">
    <label>Hunger BEFORE: <span id="bv" style="color:#5AE57A">3</span>/10</label>
    <input id="before" type="range" min="1" max="10" value="3" oninput="document.getElementById('bv').textContent=this.value">
    <div class="scaleref">1 = painfully hungry · 3 = ready to eat · 5 = neutral</div>
    <label>Fullness AFTER: <span id="av" style="color:#5AE57A">7</span>/10</label>
    <input id="after" type="range" min="1" max="10" value="7" oninput="document.getElementById('av').textContent=this.value">
    <div class="scaleref">7 = pleasantly full · 8+ = a bit much · 10 = stuffed</div>
    <button class="btn" onclick="add()">+ Log Meal</button>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('hft')||'[]');
  const save=()=>localStorage.setItem('hft',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('meal')){ alert('Enter what you ate.'); return; }
    R.push({m:v('meal'),b:+g('before').value,a:+g('after').value,d:new Date().toLocaleDateString(undefined,{month:'short',day:'numeric'})});
    g('meal').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all logs?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No meals logged yet.</div>'; return; }
    L.innerHTML=[...R].reverse().map(x=>{ const i=R.indexOf(x);
      const note= x.b<=2?' (waited too long)':x.a>=9?' (overfull)':x.b>=3&&x.b<=4&&x.a>=6&&x.a<=7?' ✓ ideal range':'';
      return '<div class="row2"><span><b style="color:#5AE57A">'+esc(x.m)+'</b> · before '+x.b+' → after '+x.a+'<span style="opacity:.6">'+note+'</span></span><span class="x" onclick="del('+i+')">✕</span></div>';
    }).join('');
  }
  render();
</script>
</body>
</html>
