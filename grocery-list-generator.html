<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Grocery List Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .grp { font-size: .76rem; text-transform: uppercase; letter-spacing: .04em; color: #5AE57A; margin: 12px 0 5px; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 7px 12px; margin-bottom: 4px; display: flex; align-items: center; gap: 9px; font-size: .87rem; }
  .box { width: 18px; height: 18px; border: 2px solid #5AE57A; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .68rem; font-weight: 700; }
  .box.on { background: #5AE57A; color: #325132; }
  .item.done .lb { text-decoration: line-through; opacity: .5; }
  .item .x { margin-left: auto; cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 10px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Grocery List Generator</h1>
  <p class="sub">Build a shopping list sorted by aisle — so you shop fast and forget nothing.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Item</label><input id="item" placeholder="e.g. Tomatoes" onkeydown="if(event.key==='Enter')add()"></div>
      <div><label>Aisle</label><select id="aisle"><option>Produce</option><option>Meat &amp; fish</option><option>Dairy &amp; eggs</option><option>Bakery</option><option>Pantry &amp; dry goods</option><option>Frozen</option><option>Drinks</option><option>Household</option><option>Other</option></select></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="copyList()" style="margin-top:10px">Copy List</button>
    <button class="btn ghost" onclick="clearDone()">Clear Ticked</button>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const AISLES=["Produce","Meat & fish","Dairy & eggs","Bakery","Pantry & dry goods","Frozen","Drinks","Household","Other"];
  let R=JSON.parse(localStorage.getItem('glg2')||'[]');
  const save=()=>localStorage.setItem('glg2',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('item')){ alert('Enter an item.'); return; }
    R.push({i:v('item'),a:g('aisle').value,done:false}); g('item').value=''; save(); render(); }
  function toggle(i){ R[i].done=!R[i].done; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearDone(){ R=R.filter(x=>!x.done); save(); render(); }
  function clearAll(){ if(confirm('Clear the whole list?')){ R=[]; save(); render(); } }
  function copyList(){ if(!R.length){ alert('List is empty.'); return; }
    let t='GROCERY LIST\n';
    AISLES.forEach(a=>{ const items=R.filter(x=>x.a===a); if(items.length)t+='\n'+a.toUpperCase()+'\n'+items.map(x=>'  - '+x.i).join('\n')+'\n'; });
    navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.'));
  }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">Your list is empty.</div>'; return; }
    L.innerHTML=AISLES.map(a=>{
      const items=R.map((x,i)=>({x,i})).filter(o=>o.x.a===a);
      if(!items.length)return '';
      return '<div class="grp">'+a+'</div>'+items.map(({x,i})=>
        '<div class="item'+(x.done?' done':'')+'"><span class="box'+(x.done?' on':'')+'" onclick="toggle('+i+')">'+(x.done?'✓':'')+'</span><span class="lb">'+esc(x.i)+'</span><span class="x" onclick="del('+i+')">✕</span></div>').join('');
    }).join('');
  }
  render();
</script>
</body>
</html>
