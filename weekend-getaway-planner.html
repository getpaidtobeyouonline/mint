<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekend Getaway Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 48px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Weekend Getaway Planner</h1>
  <p class="sub">A short break only works if it is light to plan. Sort the essentials in one page.</p>

  <div class="panel">
    <label for="where">Where &amp; when</label>
    <input id="where" placeholder="Destination and the weekend dates">
    <label for="stay">Where you are staying</label>
    <input id="stay" placeholder="Accommodation booked?">
    <label for="travel">Getting there &amp; back</label>
    <input id="travel" placeholder="Transport — booked and timed">
    <label for="must">The 2-3 things you most want to do</label>
    <textarea id="must" placeholder="Keep it short — it is a weekend, not a marathon"></textarea>
    <label for="food">A meal or two worth planning</label>
    <input id="food" placeholder="A restaurant to book, a local dish to try">
    <label for="pack">Anything specific to pack</label>
    <input id="pack" placeholder="Beyond the usual weekend bag">
    <button class="btn" onclick="gen()">Build Weekend Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['where','stay','travel','must','food','pack'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('wgp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('wgp_'+k,g(k).value)); });
  function gen(){
    const t=`WEEKEND GETAWAY PLAN\n\nWHERE & WHEN:\n${v('where')||'[destination + dates]'}\n\nSTAYING AT:\n${v('stay')||'[accommodation]'}\n\nGETTING THERE & BACK:\n${v('travel')||'[transport]'}\n\nTOP THINGS TO DO:\n${v('must')||'[your 2-3 priorities]'}\n\nFOOD TO PLAN:\n${v('food')||'[a meal worth booking]'}\n\nPACK:\n${v('pack')||'[anything specific]'}\n\n--- The weekend rule ---\nDo not over-schedule. Two great things and some unplanned wandering beats ten rushed ones.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
