<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Renovation Budget Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 90px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .result { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
  .result .big { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .result .l { font-size: .82rem; opacity: .7; text-align: center; }
  .result .bd { font-size: .87rem; margin-top: 10px; }
  .result .bd div { display: flex; justify-content: space-between; padding: 3px 0; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 7px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: .86rem; gap: 8px; }
  .item .x { cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 10px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Home Renovation Budget Tool</h1>
  <p class="sub">Add up renovation costs — and the contingency you will almost certainly need.</p>

  <div class="panel">
    <label>Total budget available</label>
    <input id="budget" type="number" min="0" placeholder="e.g. 15000" oninput="saveB();render()">
  </div>

  <div class="result" id="result"></div>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Cost item</label><input id="label" placeholder="e.g. Kitchen units"></div>
      <div><label>Est. cost</label><input id="amt" type="number" min="0" placeholder="0"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
    <div id="list" style="margin-top:10px"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('hrbt')||'[]');
  const save=()=>localStorage.setItem('hrbt',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const fmt=n=>n.toLocaleString(undefined,{maximumFractionDigits:0});
  if(localStorage.getItem('hrbt_budget'))g('budget').value=localStorage.getItem('hrbt_budget');
  function saveB(){ localStorage.setItem('hrbt_budget',g('budget').value); }
  function add(){ const a=parseFloat(g('amt').value)||0; if(!v('label')||!a){ alert('Enter an item and cost.'); return; }
    R.push({l:v('label'),a}); g('label').value=''; g('amt').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the budget?')){ R=[]; save(); render(); } }
  function render(){
    const costs=R.reduce((s,x)=>s+x.a,0);
    const contingency=costs*0.15;
    const grand=costs+contingency;
    const budget=parseFloat(g('budget').value)||0;
    const left=budget-grand;
    g('result').innerHTML='<div class="big" style="color:'+(left>=0?'#5AE57A':'#5AE57A')+'">'+fmt(left)+'</div><div class="l">'+(left>=0?'within budget':'over budget')+'</div>'+
      '<div class="bd"><div><span>Quoted costs</span><span>'+fmt(costs)+'</span></div>'+
      '<div><span>Contingency (15%)</span><span>'+fmt(contingency)+'</span></div>'+
      '<div><span>Total likely cost</span><span style="color:#5AE57A">'+fmt(grand)+'</span></div></div>';
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No costs added yet.</div>'; return; }
    L.innerHTML=[...R].map((x,i)=>({x,i})).sort((a,b)=>b.x.a-a.x.a).map(({x,i})=>
      '<div class="item"><span>'+esc(x.l)+'</span><span><b style="color:#5AE57A">'+fmt(x.a)+'</b> <span class="x" onclick="del('+i+')">✕</span></span></div>').join('');
  }
  render();
</script>
</body>
</html>
