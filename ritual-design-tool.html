<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Ritual Design Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Ritual Design Tool</h1>
  <p class="sub">Design a personal ritual to mark a moment, a threshold or an intention.</p>

  <div class="panel">
    <label for="occasion">The occasion or purpose</label>
    <input id="occasion" placeholder="e.g. a new beginning, a release, a milestone">
    <label for="open">The opening — how it begins</label>
    <textarea id="open" placeholder="How you create a clear start (a breath, a candle, words)"></textarea>
    <label for="centre">The central act</label>
    <textarea id="centre" placeholder="The heart of the ritual — what you actually do"></textarea>
    <label for="words">Words spoken</label>
    <textarea id="words" placeholder="A statement, blessing or intention said aloud"></textarea>
    <label for="close">The closing — how it ends</label>
    <input id="close" placeholder="How you mark a clear ending">
    <button class="btn" onclick="gen()">Build Ritual</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['occasion','open','centre','words','close'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('rdt_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('rdt_'+k,g(k).value)); });
  function gen(){
    const t='RITUAL DESIGN\n\nOCCASION / PURPOSE:\n'+(v('occasion')||'[what this ritual marks]')+
    '\n\n1. OPENING\n'+(v('open')||'[how you create a clear start]')+
    '\n\n2. THE CENTRAL ACT\n'+(v('centre')||'[the heart of the ritual]')+
    '\n\n3. WORDS SPOKEN\n"'+(v('words')||'[your statement or blessing]')+'"\n\n4. CLOSING\n'+(v('close')||'[how you mark a clear ending]')+
    '\n\n--- What makes a ritual work ---\nA ritual is an ordinary act done with full attention and meaning.\nClear beginnings and endings make it feel set apart from ordinary time.\nKeep it simple enough to actually do — and repeat it when it serves you.\nThe meaning you bring is what makes it sacred.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
