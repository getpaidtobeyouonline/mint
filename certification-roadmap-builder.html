<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Certification Roadmap Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .track { background: #3C603C; border-radius: 5px; height: 12px; overflow: hidden; margin: 4px 0 12px; }
  .track>i { display: block; height: 100%; background: #5AE57A; transition: width .3s; }
  .step { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
  .step .num { width: 24px; height: 24px; border-radius: 50%; background: #3C603C; flex: none; display: flex; align-items: center; justify-content: center; font-size: .8rem; cursor: pointer; }
  .step.done .num { background: #5AE57A; color: #325132; font-weight: 700; }
  .step .tx { font-size: .89rem; }
  .step.done .tx { text-decoration: line-through; opacity: .5; }
  .step .x { margin-left: auto; cursor: pointer; opacity: .5; } .step .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Certification Roadmap Builder</h1>
  <p class="sub">Map the path to a certification, milestone by milestone, and tick off each step.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Certification goal</label><input id="cert" placeholder="e.g. PMP / AWS Solutions Architect" onchange="saveCert()"></div>
      <div><label>Exam date (optional)</label><input id="date" type="date" onchange="render()"></div>
    </div>
    <div class="track" style="margin-top:10px"><i id="bar" style="width:0%"></i></div>
    <div id="meta" style="font-size:.85rem;opacity:.8;text-align:center"></div>
  </div>

  <div class="panel">
    <label>Add a milestone step</label>
    <div class="row">
      <div style="flex:3"><input id="step" placeholder="e.g. Finish the official study guide" onkeydown="if(event.key==='Enter')add()"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
    <div id="list" style="margin-top:10px"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  let R=JSON.parse(localStorage.getItem('crb2')||'[]');
  const save=()=>localStorage.setItem('crb2',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  if(localStorage.getItem('crb2_cert'))g('cert').value=localStorage.getItem('crb2_cert');
  if(localStorage.getItem('crb2_date'))g('date').value=localStorage.getItem('crb2_date');
  function saveCert(){ localStorage.setItem('crb2_cert',g('cert').value); }
  function add(){ const t=g('step').value.trim(); if(!t)return; R.push({t,done:false}); g('step').value=''; save(); render(); }
  function toggle(i){ R[i].done=!R[i].done; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all steps?')){ R=[]; save(); render(); } }
  function render(){
    if(g('date').value)localStorage.setItem('crb2_date',g('date').value);
    const done=R.filter(x=>x.done).length;
    g('bar').style.width=(R.length?Math.round(done/R.length*100):0)+'%';
    let meta=done+' / '+R.length+' milestones done';
    if(g('date').value){ const d=Math.ceil((new Date(g('date').value)-new Date().setHours(0,0,0,0))/86400000);
      meta+= d>=0?' · '+d+' days to exam':' · exam date passed'; }
    g('meta').textContent=R.length?meta:'Add milestone steps below to build your roadmap.';
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No steps yet.</div>'; return; }
    L.innerHTML=R.map((x,i)=>'<div class="step'+(x.done?' done':'')+'"><span class="num" onclick="toggle('+i+')">'+(x.done?'✓':(i+1))+'</span><span class="tx">'+esc(x.t)+'</span><span class="x" onclick="del('+i+')">✕</span></div>').join('');
  }
  render();
</script>
</body>
</html>
