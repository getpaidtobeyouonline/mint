<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Skills Resume Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .hint { font-size: .78rem; opacity: .6; margin-top: 3px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .9rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Skills Resume Builder</h1>
  <p class="sub">Build a clean, skills-first resume section — perfect when experience is light but ability is real.</p>

  <div class="panel">
    <label for="name">Name &amp; target role</label>
    <input id="name" placeholder="Your name — the role you are aiming for">
    <label for="summary">Professional summary (2-3 lines)</label>
    <textarea id="summary" placeholder="Who you are, what you offer, what you want"></textarea>
    <label for="hard">Hard skills (one per line)</label>
    <textarea id="hard" placeholder="Tools, software, technical abilities, languages"></textarea>
    <label for="soft">Soft skills (one per line)</label>
    <textarea id="soft" placeholder="Communication, leadership, problem-solving..."></textarea>
    <label for="achieve">Key achievements (one per line — start with a verb, add a number)</label>
    <textarea id="achieve" placeholder="e.g. Grew a club from 10 to 80 members in one year"></textarea>
    <div class="hint">Achievements beat duties. Show results, not just responsibilities.</div>
    <label for="extra">Education / projects / certifications</label>
    <textarea id="extra" placeholder="One per line"></textarea>
    <button class="btn" onclick="gen()">Build Resume Section</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['name','summary','hard','soft','achieve','extra'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('srb2_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('srb2_'+k,g(k).value)); });
  function lines(id){ return v(id).split('\n').map(s=>s.trim()).filter(Boolean); }
  function gen(){
    const hard=lines('hard'), soft=lines('soft'), ach=lines('achieve'), ex=lines('extra');
    const t=`${(v('name')||'[Your name]').toUpperCase()}\n${'='.repeat(40)}\n\nPROFESSIONAL SUMMARY\n${v('summary')||'[your 2-3 line summary]'}\n\nHARD SKILLS\n${hard.length?hard.map(x=>'  • '+x).join('\n'):'  • [add your hard skills]'}\n\nSOFT SKILLS\n${soft.length?soft.map(x=>'  • '+x).join('\n'):'  • [add your soft skills]'}\n\nKEY ACHIEVEMENTS\n${ach.length?ach.map(x=>'  • '+x).join('\n'):'  • [add achievements with numbers]'}\n\nEDUCATION / PROJECTS / CERTIFICATIONS\n${ex.length?ex.map(x=>'  • '+x).join('\n'):'  • [add education and projects]'}\n\n--- Tip ---\nTailor the skills and achievements to each job. Mirror words from the job description — many employers screen for them.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
