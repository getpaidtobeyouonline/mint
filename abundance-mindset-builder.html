<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Abundance Mindset Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  textarea { min-height: 50px; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .blk { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
  .blk h4 { color: #5AE57A; font-size: .76rem; text-transform: uppercase; margin-bottom: 5px; }
  .blk p { font-size: .93rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Abundance Mindset Builder</h1>
  <p class="sub">Abundance is a daily practice, not a feeling. Run these 5 prompts to recondition the lens.</p>

  <div class="panel">
    <label for="have">What I already have that past-me would be amazed by</label>
    <textarea id="have" placeholder="Specifics &mdash; relationships, skills, freedom, work, health"></textarea>
    <label for="enough">One thing I have 'enough' of right now</label>
    <input id="enough" placeholder="Time, food, support, health, safety...">
    <label for="give">One thing I can give freely today</label>
    <input id="give" placeholder="A compliment, a referral, a generous tip, attention">
    <label for="celebrate">Whose recent win can I genuinely celebrate?</label>
    <input id="celebrate" placeholder="A person and what they achieved">
    <label for="trust">What is one thing I trust will come, even though I cannot see it yet?</label>
    <textarea id="trust" placeholder="An opportunity, a person, a resolution"></textarea>
    <button class="btn" onclick="gen()">Anchor It</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['have','enough','give','celebrate','trust'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('amb_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('amb_'+k,g(k).value)); });
  function gen(){
    g('out').innerHTML='<div class="blk"><h4>1 · Past-you would be amazed</h4><p>'+esc(v('have')||'—')+'</p></div>'+
      '<div class="blk"><h4>2 · I already have enough of</h4><p>'+esc(v('enough')||'—')+'</p></div>'+
      '<div class="blk"><h4>3 · I can give freely today</h4><p>'+esc(v('give')||'—')+'</p></div>'+
      '<div class="blk"><h4>4 · I celebrate</h4><p>'+esc(v('celebrate')||'—')+' &mdash; their win does not subtract from mine.</p></div>'+
      '<div class="blk"><h4>5 · I trust is on the way</h4><p>'+esc(v('trust')||'—')+'</p></div>'+
      '<div class="blk" style="border-left-color:#BFD8BF"><h4>The practice</h4><p>Do this for 10 days. Abundance is not believing the universe owes you something &mdash; it is training your attention to see what is already here, and what is on its way.</p></div>';
    g('out').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function copyOut(){ const t=g('out').innerText; if(!t){alert('Anchor first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
