<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vision Board Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .grp { font-size: .76rem; text-transform: uppercase; letter-spacing: .04em; color: #5AE57A; margin: 14px 0 6px; }
  .board { display: grid; grid-template-columns: repeat(auto-fill,minmax(150px,1fr)); gap: 8px; }
  .tile { background: linear-gradient(150deg,#325132,#2A442A); border: 1px solid #5AE57A; border-radius: 10px; padding: 14px 12px; font-size: .9rem; position: relative; }
  .tile .x { position: absolute; top: 6px; right: 9px; cursor: pointer; opacity: .4; font-size: .8rem; } .tile .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Vision Board Builder</h1>
  <p class="sub">Build a vision board in words — a clear, vivid picture of the life you are creating.</p>

  <div class="panel">
    <div class="row">
      <div><label>Life area</label><select id="area"><option>Career &amp; Purpose</option><option>Money &amp; Abundance</option><option>Health &amp; Body</option><option>Love &amp; Relationships</option><option>Home &amp; Lifestyle</option><option>Growth &amp; Spirit</option><option>Adventure &amp; Fun</option></select></div>
      <div style="flex:2"><label>Your vision</label><input id="vision" placeholder="Describe it vividly, in the present tense"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div id="board"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:10px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const AREAS=['Career & Purpose','Money & Abundance','Health & Body','Love & Relationships','Home & Lifestyle','Growth & Spirit','Adventure & Fun'];
  let R=JSON.parse(localStorage.getItem('vbb')||'[]');
  const save=()=>localStorage.setItem('vbb',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('vision')){ alert('Describe your vision.'); return; }
    R.push({a:g('area').value,v:v('vision')}); g('vision').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the whole board?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('board');
    if(!R.length){ L.innerHTML='<div class="empty">Your vision board is empty — add your first vision above.</div>'; return; }
    L.innerHTML=AREAS.map(a=>{
      const items=R.map((x,i)=>({x,i})).filter(o=>o.x.a===a);
      if(!items.length)return '';
      return '<div class="grp">'+a+'</div><div class="board">'+items.map(({x,i})=>
        '<div class="tile"><span class="x" onclick="del('+i+')">✕</span>'+esc(x.v)+'</div>').join('')+'</div>';
    }).join('');
  }
  render();
</script>
</body>
</html>
