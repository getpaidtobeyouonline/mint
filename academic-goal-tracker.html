<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Academic Goal Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 12px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .card { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 12px 14px; margin-bottom: 9px; }
  .card.done { border-left: 3px solid #5AE57A; }
  .card .top { display: flex; justify-content: space-between; gap: 10px; }
  .card .t { font-weight: 500; }
  .card .m { font-size: .8rem; opacity: .65; }
  .card .ic { cursor: pointer; opacity: .6; flex: none; } .card .ic:hover { opacity: 1; color: #5AE57A; }
  .track { background: #3C603C; border-radius: 4px; height: 9px; overflow: hidden; margin-top: 7px; cursor: pointer; }
  .track>i { display: block; height: 100%; background: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Academic Goal Tracker</h1>
  <p class="sub">Set goals for grades, assignments and the term — and watch the progress build.</p>

  <div class="panel">
    <label>The academic goal</label>
    <input id="goal" placeholder="e.g. Achieve a B+ average this term">
    <div class="row">
      <div><label>Type</label><select id="type"><option>Grade target</option><option>Assignment</option><option>Skill</option><option>Term goal</option><option>Habit</option></select></div>
      <div><label>By when</label><input id="by" type="date"></div>
    </div>
    <button class="btn" onclick="add()">+ Add Goal</button>
  </div>

  <div class="panel">
    <p style="font-size:.8rem;opacity:.6;margin-bottom:8px">Tap a progress bar to move it forward.</p>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('agt')||'[]');
  const save=()=>localStorage.setItem('agt',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('goal')){ alert('Enter an academic goal.'); return; }
    R.push({g:v('goal'),t:g('type').value,by:g('by').value,p:0}); g('goal').value=''; g('by').value=''; save(); render(); }
  function bump(i){ R[i].p=R[i].p>=100?0:Math.min(100,R[i].p+20); save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all goals?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No goals yet — set your first.</div>'; return; }
    L.innerHTML=R.map((x,i)=>'<div class="card'+(x.p>=100?' done':'')+'"><div class="top"><div><div class="t">'+esc(x.g)+'</div><div class="m">'+x.t+(x.by?' · by '+x.by:'')+' · '+x.p+'%</div></div><span class="ic" onclick="del('+i+')">✕</span></div><div class="track" onclick="bump('+i+')"><i style="width:'+x.p+'%"></i></div></div>').join('');
  }
  render();
</script>
</body>
</html>
