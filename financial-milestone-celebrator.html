<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Milestone Celebrator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .row>div { flex: 1; min-width: 130px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .ms { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 12px 15px; margin-bottom: 9px; }
  .ms .top { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; flex-wrap: wrap; }
  .ms .nm { font-weight: 500; }
  .ms .when { font-family: 'Playfair Display', serif; color: #5AE57A; }
  .ms .how { font-size: .85rem; opacity: .85; margin-top: 4px; }
  .ms .x { cursor: pointer; opacity: .5; font-size: .8rem; } .ms .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  .note { background:#2E4D2E;border:1px solid #4F8A55;border-radius:8px;padding:11px 14px;font-size:.85rem;margin-bottom:12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Financial Milestone Celebrator</h1>
  <p class="sub">Mark the money wins. The brain needs the reward, or the discipline starts to feel like punishment.</p>

  <div class="note">No milestone is too small. First $100 saved counts. First debt paid off counts. Celebrating tells your brain "do that again".</div>

  <div class="panel">
    <div class="row">
      <div><label>Date hit</label><input id="dt" type="date"></div>
      <div style="flex:2"><label>Milestone</label><input id="nm" placeholder="e.g. First $1,000 in savings"></div>
      <div style="flex:2"><label>How you celebrated</label><input id="how" placeholder="e.g. nice dinner / new book / a walk and a smile"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Mark</button></div>
    </div>
  </div>

  <div id="list"></div>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let M=JSON.parse(localStorage.getItem('fmc')||'[]');
  const save=()=>localStorage.setItem('fmc',JSON.stringify(M));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  g('dt').value=new Date().toISOString().slice(0,10);
  function add(){ const nm=v('nm'); if(!nm){alert('Name the milestone.');return;} M.push({d:g('dt').value,nm,how:v('how')}); ['nm','how'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ M.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ M=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!M.length){ L.innerHTML='<div class="empty">No milestones marked yet — what is one you hit recently?</div>'; return; }
    L.innerHTML=[...M].map((x,i)=>({x,i})).sort((a,b)=>a.x.d<b.x.d?1:-1).map(({x,i})=>`<div class="ms"><div class="top"><span class="nm">${esc(x.nm)}</span><span class="when">${x.d}</span></div>${x.how?`<div class="how">🎉 ${esc(x.how)}</div>`:''}<div style="margin-top:4px"><span class="x" onclick="del(${i})">✕ remove</span></div></div>`).join('');
  }
  render();
</script>
</body>
</html>
