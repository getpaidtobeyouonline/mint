<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Soul Purpose Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Soul Purpose Finder</h1>
  <p class="sub">Five honest questions to help a purpose statement rise to the surface.</p>

  <div class="panel">
    <label for="alive">What makes you feel most alive</label>
    <textarea id="alive" placeholder="When do you lose track of time?"></textarea>
    <label for="free">What you would happily do for free</label>
    <textarea id="free" placeholder="The work that does not feel like work"></textarea>
    <label for="thank">What people thank you for</label>
    <textarea id="thank" placeholder="The gift others see in you"></textarea>
    <label for="change">The change you want to see in the world</label>
    <textarea id="change" placeholder="What you wish were different for others"></textarea>
    <label for="who">Who you most want to help</label>
    <input id="who" placeholder="The people you feel called to serve">
    <button class="btn" onclick="gen()">Reveal My Purpose</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['alive','free','thank','change','who'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('spf_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('spf_'+k,g(k).value)); });
  function gen(){
    const t='SOUL PURPOSE REFLECTION\n\nWHAT MAKES ME FEEL ALIVE:\n'+(v('alive')||'[where time disappears for you]')+
    '\n\nWHAT I WOULD DO FOR FREE:\n'+(v('free')||'[the work that is not work]')+
    '\n\nWHAT PEOPLE THANK ME FOR:\n'+(v('thank')||'[the gift others see]')+
    '\n\nTHE CHANGE I WANT TO SEE:\n'+(v('change')||'[what you wish were different]')+
    '\n\nWHO I WANT TO HELP:\n'+(v('who')||'[the people you serve]')+
    '\n\n--- A DRAFT PURPOSE STATEMENT ---\n"I am here to use '+(v('thank')||'[my gift]')+'\nto help '+(v('who')||'[these people]')+'\nso that '+(v('change')||'[this change]')+'."\n\n--- Hold it lightly ---\nPurpose is less a destination and more a direction you keep choosing.\nRe-read this in a month. Let the words keep refining themselves.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
