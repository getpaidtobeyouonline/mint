<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Therapy Prep Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 56px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  .hint { font-size: .8rem; opacity: .6; margin-top: 3px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Therapy Prep Tool</h1>
  <p class="sub">Sessions are short. Walk in clear on what you want to use the time for.</p>

  <div class="panel">
    <label for="since">What has happened since last session</label>
    <textarea id="since" placeholder="Events, shifts, things you noticed — good and hard"></textarea>
    <label for="main">The main thing I want to talk about today</label>
    <input id="main" placeholder="If you only get to one topic, this is it">
    <div class="hint">Lead with this — do not save it for the last five minutes.</div>
    <label for="feel">How I have been feeling (in my own words)</label>
    <textarea id="feel" placeholder="Mood, energy, sleep, anxiety — whatever is true"></textarea>
    <label for="ask">Questions I want to ask my therapist</label>
    <textarea id="ask" placeholder="About progress, an approach, homework, anything"></textarea>
    <label for="win">A win or progress to mention</label>
    <input id="win" placeholder="However small — it is worth naming">
    <label for="goal">What I want to leave this session with</label>
    <input id="goal" placeholder="A reframe, a next step, just being heard...">
    <button class="btn" onclick="gen()">Build Prep Notes</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['since','main','feel','ask','win','goal'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('tpt_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('tpt_'+k,g(k).value)); });
  function gen(){
    const t=`THERAPY SESSION PREP\n\nSINCE LAST TIME:\n${v('since')||'[what changed]'}\n\nMAIN TOPIC (start here):\n${v('main')||'[the one thing]'}\n\nHOW I HAVE BEEN FEELING:\n${v('feel')||'[in your own words]'}\n\nQUESTIONS TO ASK:\n${v('ask')||'[anything you want to raise]'}\n\nA WIN TO MENTION:\n${v('win')||'[name the progress]'}\n\nWHAT I WANT TO LEAVE WITH:\n${v('goal')||'[your intention for the session]'}\n\n--- Reminder ---\nIt is your time — you are allowed to steer it.\nYou can say "I am not ready to talk about that yet."\nHonesty, even messy honesty, is what makes therapy work.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
