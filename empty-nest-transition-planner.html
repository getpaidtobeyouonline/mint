<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empty Nest Transition Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .lead { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 11px 14px; font-size: .87rem; font-style: italic; margin-bottom: 6px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Empty Nest Transition Planner</h1>
  <p class="sub">When the children leave, a new chapter opens. Plan it on purpose, not by drift.</p>

  <div class="panel">
    <div class="lead">Missing them is love. The goal is not to stop feeling it, but to also build a life that is full again.</div>
    <label for="feel">What I am feeling about this change</label>
    <textarea id="feel" placeholder="Pride, loss, relief, fear — all of it is allowed"></textarea>
    <label for="rediscover">Something I want to rediscover or try</label>
    <textarea id="rediscover" placeholder="A hobby, a passion, a version of you that got paused"></textarea>
    <label for="relationship">How I want to invest in my closest relationships now</label>
    <textarea id="relationship" placeholder="Partner, friends — what needs renewed attention?"></textarea>
    <label for="connect">How I will stay connected with my child (without hovering)</label>
    <input id="connect" placeholder="e.g. A weekly call they can count on, no pressure between">
    <label for="space">What I will do with the new time and space</label>
    <textarea id="space" placeholder="Travel, learning, work, rest, something new entirely"></textarea>
    <button class="btn" onclick="gen()">Build My Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['feel','rediscover','relationship','connect','space'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('entp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('entp_'+k,g(k).value)); });
  function gen(){
    const t=`MY EMPTY NEST CHAPTER\n\nWHAT I AM FEELING:\n${v('feel')||'[name it honestly]'}\n\nTO REDISCOVER OR TRY:\n${v('rediscover')||'[the paused parts of you]'}\n\nRELATIONSHIPS TO REINVEST IN:\n${v('relationship')||'[who needs your attention now]'}\n\nSTAYING CONNECTED WITH MY CHILD:\n${v('connect')||'[steady, low-pressure connection]'}\n\nWHAT I WILL DO WITH THE NEW SPACE:\n${v('space')||'[fill the time on purpose]'}\n\n--- Remember ---\nYou did the job — they are ready to fly. That is success, not loss.\nYour relationship is not ending; it is changing shape.\nThis is allowed to be the start of something good for you too.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
