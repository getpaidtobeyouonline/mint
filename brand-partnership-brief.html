<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Brand Partnership Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.4rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Brand Partnership Brief</h1>
  <p class="sub">Build a clear, confident pitch to partner with a brand you love.</p>

  <div class="panel">
    <label for="brand">The brand</label>
    <input id="brand" placeholder="Who you want to partner with">
    <label for="fit">Why it is a genuine fit</label>
    <textarea id="fit" placeholder="Shared values, audience overlap, why it makes sense"></textarea>
    <label for="offer">What you offer them</label>
    <textarea id="offer" placeholder="Your audience, reach, content, expertise, deliverables"></textarea>
    <label for="want">What you want in return</label>
    <textarea id="want" placeholder="Fee, product, exposure, long-term relationship"></textarea>
    <label for="deliverables">Proposed deliverables</label>
    <textarea id="deliverables" placeholder="Exactly what you would create or do"></textarea>
    <label for="metrics">How success will be measured</label>
    <input id="metrics" placeholder="e.g. reach, clicks, sign-ups, sales">
    <button class="btn" onclick="gen()">Build Brief</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['brand','fit','offer','want','deliverables','metrics'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('bpb_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('bpb_'+k,g(k).value)); });
  function gen(){
    const t='BRAND PARTNERSHIP BRIEF\n\nBRAND: '+(v('brand')||'[the brand]')+
    '\n\nWHY IT IS A FIT:\n'+(v('fit')||'[shared values and audience overlap]')+
    '\n\nWHAT I OFFER:\n'+(v('offer')||'[your audience, reach, expertise]')+
    '\n\nWHAT I AM LOOKING FOR:\n'+(v('want')||'[fee, product, relationship]')+
    '\n\nPROPOSED DELIVERABLES:\n'+(v('deliverables')||'[exactly what you would create]')+
    '\n\nHOW WE MEASURE SUCCESS:\n'+(v('metrics')||'[the metrics that matter]')+
    '\n\n--- Pitching a brand ---\nLead with what is in it for them — make their win obvious.\nKeep the first message short; attach the full brief.\nShow you genuinely know and use the brand.\nName a clear next step: a quick call to explore it.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
