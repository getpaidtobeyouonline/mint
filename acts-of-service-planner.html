<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Acts of Service Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .idea { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; font-size: .87rem; font-style: italic; margin-bottom: 10px; }
  .stat { text-align: center; font-size: .85rem; opacity: .8; margin-bottom: 10px; }
  .stat b { color: #5AE57A; font-family: 'Playfair Display', serif; font-size: 1.2rem; }
  .task { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 8px 12px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; font-size: .87rem; }
  .box { width: 19px; height: 19px; border: 2px solid #5AE57A; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .7rem; font-weight: 700; }
  .box.on { background: #5AE57A; color: #325132; }
  .task.done .lb { text-decoration: line-through; opacity: .5; }
  .task .x { margin-left: auto; cursor: pointer; opacity: .5; } .task .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Acts of Service Planner</h1>
  <p class="sub">Love shows up in the small, helpful things. Plan kind acts and follow through.</p>

  <div class="panel">
    <div class="idea" id="idea"></div>
    <button class="btn ghost" onclick="newIdea()" style="margin-bottom:4px">Inspire me</button>
    <div class="row">
      <div style="flex:2"><label>The kind act</label><input id="act" placeholder="e.g. Make their morning coffee"></div>
      <div><label>For whom</label><input id="who" placeholder="Name"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div class="stat"><b id="done">0</b> acts of service completed</div>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const IDEAS=["Handle a chore they dislike before they get to it","Prepare their favourite meal","Run an errand so they do not have to","Tidy a space that has been stressing them","Take something off their to-do list quietly","Make them a warm drink unprompted","Sort out an admin task they have been dreading","Pack their bag or prep their day the night before","Give them an hour of free time by covering for them","Fix or sort that one small annoying thing"];
  let R=JSON.parse(localStorage.getItem('aosp')||'[]');
  const save=()=>localStorage.setItem('aosp',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function newIdea(){ g('idea').textContent='💡 '+IDEAS[Math.floor(Math.random()*IDEAS.length)]; }
  function add(){ if(!v('act')){ alert('Enter a kind act.'); return; }
    R.push({a:v('act'),w:v('who'),done:false}); g('act').value=''; g('who').value=''; save(); render(); }
  function toggle(i){ R[i].done=!R[i].done; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ R=[]; save(); render(); } }
  function render(){
    g('done').textContent=R.filter(x=>x.done).length;
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No acts planned yet — add one.</div>'; return; }
    L.innerHTML=[...R].map((x,i)=>({x,i})).sort((a,b)=>a.x.done-b.x.done).map(({x,i})=>
      '<div class="task'+(x.done?' done':'')+'"><span class="box'+(x.done?' on':'')+'" onclick="toggle('+i+')">'+(x.done?'✓':'')+'</span><span class="lb">'+esc(x.a)+(x.w?' <span style="opacity:.6">· for '+esc(x.w)+'</span>':'')+'</span><span class="x" onclick="del('+i+')">✕</span></div>').join('');
  }
  newIdea(); render();
</script>
</body>
</html>
