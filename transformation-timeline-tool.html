<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Transformation Timeline Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Transformation Timeline Tool</h1>
  <p class="sub">Map the journey from where a client is now to where you will take them.</p>

  <div class="panel">
    <label for="start">Starting point — where they are now</label>
    <textarea id="start" placeholder="The struggle, the feeling, the situation"></textarea>
    <label for="end">Destination — where they will be</label>
    <textarea id="end" placeholder="The outcome and how it feels"></textarea>
    <label for="duration">Programme duration</label>
    <input id="duration" placeholder="e.g. 12 weeks, 6 months">
    <label for="m1">Milestone 1 (early win)</label>
    <input id="m1" placeholder="The first shift they will feel">
    <label for="m2">Milestone 2 (mid-point)</label>
    <input id="m2" placeholder="The momentum marker">
    <label for="m3">Milestone 3 (near the end)</label>
    <input id="m3" placeholder="The breakthrough before the finish">
    <button class="btn" onclick="gen()">Build Timeline</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['start','end','duration','m1','m2','m3'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('ttt_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('ttt_'+k,g(k).value)); });
  function gen(){
    const t='TRANSFORMATION TIMELINE'+(v('duration')?'  ('+v('duration')+')':'')+
    '\n\n● START — where they are now\n'+(v('start')||'[the current struggle]')+
    '\n\n│\n▼  MILESTONE 1 — early win\n'+(v('m1')||'[the first shift they feel]')+
    '\n\n│\n▼  MILESTONE 2 — momentum\n'+(v('m2')||'[the mid-point marker]')+
    '\n\n│\n▼  MILESTONE 3 — breakthrough\n'+(v('m3')||'[the shift before the finish]')+
    '\n\n│\n★  DESTINATION — where they will be\n'+(v('end')||'[the final transformation]')+
    '\n\n--- Use this ---\nShow it on discovery calls and sales pages — people buy a clear journey.\nNaming the milestones turns a vague promise into a believable path.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
