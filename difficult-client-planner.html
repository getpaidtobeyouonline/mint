<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Difficult Client Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Difficult Client Planner</h1>
  <p class="sub">Think a tricky client relationship through calmly — and decide your next move.</p>

  <div class="panel">
    <label for="issue">What is difficult (just the facts)</label>
    <textarea id="issue" placeholder="The pattern of behaviour, without the story"></textarea>
    <label for="impact">The impact it is having</label>
    <textarea id="impact" placeholder="On the work, on you, on the relationship"></textarea>
    <label for="theirside">What might be going on for them</label>
    <textarea id="theirside" placeholder="Fear, overwhelm, unclear expectations?"></textarea>
    <label for="mypart">Your part in it</label>
    <textarea id="mypart" placeholder="Anything you set up unclearly or let slide"></textarea>
    <label for="need">What you need to change</label>
    <input id="need" placeholder="The shift that would resolve this">
    <button class="btn" onclick="gen()">Build Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['issue','impact','theirside','mypart','need'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('dclp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('dclp_'+k,g(k).value)); });
  function gen(){
    const t='DIFFICULT CLIENT PLAN\n\nWHAT IS DIFFICULT (facts):\n'+(v('issue')||'[the behaviour pattern]')+
    '\n\nTHE IMPACT:\n'+(v('impact')||'[on the work and on you]')+
    '\n\nWHAT MIGHT BE GOING ON FOR THEM:\n'+(v('theirside')||'[their possible perspective]')+
    '\n\nMY PART IN IT:\n'+(v('mypart')||'[what you contributed]')+
    '\n\nWHAT NEEDS TO CHANGE:\n'+(v('need')||'[the shift that resolves it]')+
    '\n\n--- THE CONVERSATION ---\n1. Open warmly and assume good intent.\n2. Name the pattern factually, not personally.\n3. Listen to their side fully.\n4. Re-set clear expectations and boundaries together.\n5. Agree what good looks like from here.\n\n--- If it cannot be fixed ---\nNot every client is the right client. A respectful, clean exit — refunding fairly per your terms — is sometimes the kindest outcome for you both.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
