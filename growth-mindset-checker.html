<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growth Mindset Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  .q { background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
  .q span { flex: 1; min-width: 230px; font-size: .92rem; }
  select { background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .85rem; padding: 7px 9px; border-radius: 7px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .95rem; padding: 13px 26px; border-radius: 8px; margin: 8px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .res { text-align: center; background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 22px; margin: 18px 0; }
  .res .n { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: #5AE57A; line-height: 1; }
  .res .vd { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: #5AE57A; margin-top: 5px; }
  .swap { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 12px 15px; margin-bottom: 9px; font-size: .92rem; }
  .swap b { color: #5AE57A; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Growth Mindset Checker</h1>
  <p class="sub">Where you are fixed, you stall. Where you are growth, you compound. Score yours.</p>

  <div id="form"></div>
  <button class="btn" onclick="run()">Check My Mindset</button>
  <button class="btn ghost" onclick="reset()">Reset</button>
  <div id="res"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const Q=[
    ["I see effort as the path, not a sign I lack talent","Fixed: effort = proof I am not good enough."],
    ["I welcome useful criticism","Fixed: criticism = attack."],
    ["Other people's wins inspire me, not threaten me","Fixed: their win = my loss."],
    ["I believe my abilities can grow with practice","Fixed: I am just not a maths/social/tech person."],
    ["I try things I might be bad at","Fixed: avoid anywhere I might look incompetent."],
    ["I see failure as information, not identity","Fixed: I failed → I am a failure."],
    ["I ask for help without it feeling like weakness","Fixed: asking = inadequate."]
  ];
  const SWAP=[
    ["I'm just not good at this","I'm not good at this <b>yet</b>"],
    ["I failed","That didn't work — what's the lesson?"],
    ["This is too hard","This is going to stretch me"],
    ["I can't","I can't <b>yet</b>"],
    ["She got lucky","I wonder what she did differently"]
  ];
  const g=id=>document.getElementById(id);
  g('form').innerHTML=Q.map((q,i)=>`<div class="q"><span>${q[0]}<small style="display:block;opacity:.6;font-size:.78rem">${q[1]}</small></span>
    <select id="q${i}"><option value="1">Rarely</option><option value="2">Sometimes</option><option value="3">Often</option><option value="4">Almost always</option></select></div>`).join('');
  const saved=JSON.parse(localStorage.getItem('gmc')||'{}');
  Q.forEach((_,i)=>{ if(saved[i])g('q'+i).value=saved[i]; g('q'+i).addEventListener('change',()=>{ const o={};Q.forEach((_,j)=>o[j]=g('q'+j).value); localStorage.setItem('gmc',JSON.stringify(o)); }); });
  function run(){
    const sc=Q.reduce((s,_,i)=>s+ +g('q'+i).value,0);
    const pct=Math.round(sc/(Q.length*4)*100);
    const vd= pct>=80?['Growth-oriented','You already think like someone who keeps getting better.']
      : pct>=60?['Mostly growth','One or two fixed patterns are still costing you — see swaps below.']
      : pct>=40?['Mixed','Half the time you grow, half the time you protect yourself. Catch the protection.']
      : ['Fixed pattern','Most areas are running on fixed mindset. The single highest-leverage shift: change "I am not" to "I am not yet".'];
    g('res').innerHTML='<div class="res"><div class="n">'+pct+'%</div><div class="vd">'+vd[0]+'</div><div style="opacity:.8;font-size:.9rem;margin-top:4px">'+vd[1]+'</div></div>'+
      '<h3 style="font-family:\'Playfair Display\',serif;color:#5AE57A;margin:0 0 10px">Catch and swap</h3>'+
      SWAP.map(s=>'<div class="swap"><b>Catch:</b> "'+esc(s[0])+'"<br><b>Swap to:</b> "'+s[1]+'"</div>').join('');
    g('res').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function reset(){ if(confirm('Reset answers?')){ localStorage.removeItem('gmc'); Q.forEach((_,i)=>g('q'+i).value='1'); g('res').innerHTML=''; } }
</script>
</body>
</html>
