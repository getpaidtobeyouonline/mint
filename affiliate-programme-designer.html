<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affiliate Programme Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.4rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Affiliate Programme Designer</h1>
  <p class="sub">Design an affiliate programme so others sell your offer for you.</p>

  <div class="panel">
    <label for="offer">The offer affiliates will promote</label>
    <input id="offer" placeholder="The product or programme">
    <label for="who">Who would make great affiliates</label>
    <textarea id="who" placeholder="People whose audience matches your ideal client"></textarea>
    <label for="commission">Commission</label>
    <input id="commission" placeholder="e.g. 30% per sale, flat fee, recurring">
    <label for="track">How they get their link &amp; get tracked</label>
    <input id="track" placeholder="e.g. affiliate platform, unique link, coupon code">
    <label for="assets">Assets &amp; support you will give them</label>
    <textarea id="assets" placeholder="Swipe copy, graphics, training, a contact"></textarea>
    <button class="btn" onclick="gen()">Build Programme</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['offer','who','commission','track','assets'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('apd_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('apd_'+k,g(k).value)); });
  function gen(){
    const t='AFFILIATE PROGRAMME DESIGN\n\nOFFER PROMOTED:\n'+(v('offer')||'[the product or programme]')+
    '\n\nIDEAL AFFILIATES:\n'+(v('who')||'[people with the right audience]')+
    '\n\nCOMMISSION:\n'+(v('commission')||'[your commission structure]')+
    '\n\nLINKS & TRACKING:\n'+(v('track')||'[how affiliates are tracked]')+
    '\n\nASSETS & SUPPORT:\n'+(v('assets')||'[swipe copy, graphics, training]')+
    '\n\n--- Affiliate programme tips ---\nYour happiest clients and aligned peers are your best affiliates.\nMake promoting effortless — give them the words, links and visuals.\nA generous, fair commission attracts affiliates who actually show up.\nThank and reward your top affiliates — they are a sales team you do not pay until they deliver.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
