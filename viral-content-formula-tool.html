<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viral Content Formula Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; }
  .btn:hover { opacity: .9; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .blk { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
  .blk h4 { font-size: .76rem; color: #5AE57A; text-transform: uppercase; margin-bottom: 5px; }
  .blk p, .blk li { font-size: .93rem; } .blk ol { margin-left: 18px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Viral Content Formula Tool</h1>
  <p class="sub">Plug your idea into a proven viral structure and get a post built to be shared.</p>

  <div class="panel">
    <label for="topic">Your topic / idea</label>
    <input id="topic" placeholder="e.g. why most morning routines fail">
    <label for="format">Format</label>
    <select id="format"><option value="hot">Hot take / contrarian</option><option value="list">Listicle</option><option value="story">Transformation story</option><option value="how">How-to / steps</option><option value="mistake">Mistakes to avoid</option></select>
    <label for="audience">Who it's for</label>
    <input id="audience" placeholder="e.g. overwhelmed creators">
    <button class="btn" onclick="gen()">Build Viral Structure</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  ['topic','format','audience'].forEach(k=>{ const s=localStorage.getItem('vcf_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('vcf_'+k,g(k).value)); });
  const STR = {
    hot:["Hook: state the belief everyone holds about [topic]","Turn: 'Here's why that's wrong'","Proof: 1 sharp reason or example","Reframe: what to do instead","CTA: 'Agree? Save this / tell me below'"],
    list:["Hook: '[N] [things] that [big outcome]'","Promise the payoff up front","List items — punchiest first, one line each","Bonus item that overdelivers","CTA: 'Save this for later / which one hit?'"],
    story:["Hook: the low point ('I was [bad state]')","Stakes: what was at risk","Turning point: the one shift","Result: the after, with a specific number","Lesson: the takeaway for [audience]"],
    how:["Hook: promise the outcome + speed","Why it matters in one line","Steps 1–4, each a single action","The mistake to avoid in step X","CTA: 'Follow for more / save this'"],
    mistake:["Hook: '[N] mistakes killing your [result]'","Mistake 1 + the fix","Mistake 2 + the fix","Mistake 3 + the fix","CTA: 'Which one are you guilty of?'"]
  };
  const TRIG=["Relatable: name a feeling they've had but not said out loud","Useful: they can act on it in under 60 seconds","Status: sharing it makes them look smart/in-the-know","Emotion: surprise, validation, or mild controversy","Save-worthy: a list/framework they'll want again"];
  function gen() {
    const topic=v('topic')||'[topic]', aud=v('audience')||'[audience]';
    const steps=STR[g('format').value].map(s=>s.replace('[topic]',topic).replace('[audience]',aud));
    g('out').innerHTML=`<div class="blk"><h4>Viral structure</h4><ol>${steps.map(s=>`<li>${esc(s)}</li>`).join('')}</ol></div>
      <div class="blk"><h4>Make sure it has 2+ share triggers</h4><ol>${TRIG.map(t=>`<li>${esc(t)}</li>`).join('')}</ol></div>
      <div class="blk" style="border-left-color:#BFD8BF"><h4>The make-or-break rule</h4><p>If the first line doesn't stop the scroll, nothing else matters. Write 5 hook variations and pick the boldest true one.</p></div>`;
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function copyOut(){ const t=g('out').innerText; if(!t){alert('Generate first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
