<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Social Battery Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 22px 20px; margin-bottom: 16px; }
  .batt { width: 150px; height: 70px; border: 3px solid #5AE57A; border-radius: 10px; margin: 6px auto 4px; position: relative; padding: 5px; }
  .batt:after { content: ''; position: absolute; right: -10px; top: 22px; width: 7px; height: 22px; background: #5AE57A; border-radius: 0 3px 3px 0; }
  .batt .fill { height: 100%; border-radius: 4px; transition: width .3s, background .3s; }
  .pct { text-align: center; font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 14px 0 5px; }
  input[type=range] { width: 100%; accent-color: #5AE57A; }
  .verdict { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 14px; margin-top: 14px; }
  .verdict h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.1rem; }
  .verdict li { font-size: .9rem; margin-left: 16px; margin-top: 3px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Social Battery Checker</h1>
  <p class="sub">Check your charge before you say yes. Slide to where you honestly are right now.</p>

  <div class="panel">
    <div class="batt"><div class="fill" id="fill" style="width:60%"></div></div>
    <div class="pct" id="pct">60%</div>
    <label for="lvl">Your current social charge</label>
    <input id="lvl" type="range" min="0" max="100" value="60" oninput="render()">
    <div class="verdict" id="verdict"></div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const saved=localStorage.getItem('sbc'); if(saved!==null)g('lvl').value=saved;
  function render(){
    const v=+g('lvl').value;
    localStorage.setItem('sbc',v);
    g('fill').style.width=v+'%';
    g('pct').textContent=v+'%';
    const col= v>=66?'#5AE57A':v>=33?'#5AE57A':'#5AE57A';
    g('fill').style.background=col;
    g('pct').style.color=col;
    let title,lines;
    if(v>=66){ title="Well charged";
      lines=["You have capacity — say yes to what you actually want.","A good time for the bigger or newer social plans.","Still, leave a little in reserve so you do not crash later."]; }
    else if(v>=33){ title="Running mid — choose carefully";
      lines=["Enough for something low-key with people you trust.","Decline anything draining or obligatory — it can wait.","Build in a recharge window straight after."]; }
    else { title="Nearly empty — protect yourself";
      lines=["This is a no, not a maybe. Cancel or postpone if you can.","Pushing through now borrows energy you do not have.","Prioritise solitude and quiet — recharging is the task tonight."]; }
    g('verdict').innerHTML='<h3>'+title+'</h3><ul>'+lines.map(x=>'<li>'+x+'</li>').join('')+'</ul>';
  }
  render();
</script>
</body>
</html>
