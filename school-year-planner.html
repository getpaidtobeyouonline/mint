<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted School Year Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .event { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 9px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; font-size: .87rem; gap: 10px; }
  .event.soon { border-left: 3px solid #5AE57A; }
  .event.past { opacity: .45; }
  .when { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: .9rem; flex: none; }
  .event .x { cursor: pointer; opacity: .5; } .event .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted School Year Planner</h1>
  <p class="sub">Keep term dates, holidays, events and deadlines all in one place.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Event</label><input id="event" placeholder="e.g. Half term / parents' evening / school trip"></div>
      <div><label>Date</label><input id="date" type="date"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearPast()" style="margin-top:10px">Clear Past</button>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('syp')||'[]');
  const save=()=>localStorage.setItem('syp',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('event')||!g('date').value){ alert('Enter an event and date.'); return; }
    R.push({e:v('event'),d:g('date').value}); g('event').value=''; g('date').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearPast(){ const t=new Date().toISOString().slice(0,10); R=R.filter(x=>x.d>=t); save(); render(); }
  function clearAll(){ if(confirm('Clear all events?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No events added yet.</div>'; return; }
    const today=new Date(); today.setHours(0,0,0,0);
    L.innerHTML=[...R].map((x,i)=>({x,i})).sort((a,b)=>a.x.d<b.x.d?-1:1).map(({x,i})=>{
      const d=new Date(x.d); const du=Math.round((d-today)/86400000);
      let cls='', lbl;
      if(du<0){ cls=' past'; lbl='past'; }
      else if(du===0){ cls=' soon'; lbl='Today'; }
      else if(du<=14){ cls=' soon'; lbl='in '+du+'d'; }
      else lbl=d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
      return '<div class="event'+cls+'"><span><b style="color:#5AE57A">'+esc(x.e)+'</b></span><span class="when">'+lbl+'</span><span class="x" onclick="del('+i+')">✕</span></div>';
    }).join('');
  }
  render();
</script>
</body>
</html>
