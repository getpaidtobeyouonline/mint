<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boundary Setting Script Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, select, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 48px; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Boundary Setting Script Tool</h1>
  <p class="sub">A boundary is easier to hold when you have the words ready. Build your script.</p>

  <div class="panel">
    <label for="who">Who is this with?</label>
    <input id="who" placeholder="Friend, family member, colleague...">
    <label for="behaviour">The behaviour or situation, stated factually</label>
    <textarea id="behaviour" placeholder="What is happening — no blame, just facts"></textarea>
    <label for="feel">How it affects you</label>
    <textarea id="feel" placeholder="When this happens, I feel..."></textarea>
    <label for="ask">The boundary — what you need to change</label>
    <textarea id="ask" placeholder="A clear, specific request"></textarea>
    <label for="hold">What you will do if it is not respected</label>
    <input id="hold" placeholder="e.g. I will leave / end the call / step away">
    <button class="btn" onclick="gen()">Build My Script</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['who','behaviour','feel','ask','hold'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('bsst_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('bsst_'+k,g(k).value)); });
  function gen(){
    const t=`MY BOUNDARY SCRIPT\nFor a conversation with: ${v('who')||'[person]'}\n\nWHAT TO SAY:\n\n"When ${v('behaviour')||'[the situation]'},\nI feel ${v('feel')||'[the effect on you]'}.\n\nWhat I need is ${v('ask')||'[the clear request]'}.\n\nIf that is not possible, ${v('hold')||'[what you will do]'}."\n\n--- Delivery notes ---\n• Stay calm and steady — you are not asking permission.\n• Keep it short. Do not over-explain or over-apologise.\n• Expect some discomfort or pushback — that is normal, not a sign to back down.\n• A boundary is about what YOU will do, not about controlling them.\n• You are allowed to repeat the same sentence if needed.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
