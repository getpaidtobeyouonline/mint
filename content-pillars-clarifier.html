<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Pillars Clarifier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .row { display: flex; gap: 8px; } .row input { flex: 1; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .pillar { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
  .pillar .h { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .pillar h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.05rem; }
  .pillar .x { cursor: pointer; opacity: .5; } .pillar .x:hover { opacity: 1; color: #5AE57A; }
  .pillar ul { margin: 8px 0 0 16px; font-size: .9rem; }
  .stat { font-size: .86rem; opacity: .8; margin-bottom: 12px; }
  .warn { color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Content Pillars Clarifier</h1>
  <p class="sub">3–5 pillars keep you on-brand and never out of ideas. Define yours and auto-get post angles.</p>

  <div class="panel">
    <div class="row">
      <input id="name" placeholder="Pillar name (e.g. Behind the business)">
      <button class="btn" onclick="add()" style="margin-top:0">+ Add</button>
    </div>
    <input id="goal" placeholder="What this pillar does for your audience (optional)" style="margin-top:8px">
  </div>

  <div class="stat" id="stat"></div>
  <div id="list"></div>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let P=JSON.parse(localStorage.getItem('cpc6')||'[]');
  const save=()=>localStorage.setItem('cpc6',JSON.stringify(P));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const ANG=n=>[`A myth about ${n}, busted`,`A behind-the-scenes look at ${n}`,`A quick how-to within ${n}`,`A mistake people make with ${n}`,`A story / result about ${n}`,`A hot take on ${n}`];
  function add(){ const n=v('name'); if(!n){alert('Name the pillar.');return;} if(P.length>=5){alert('Stick to 5 max — focus is the point.');return;} P.push({n,g:v('goal')}); g('name').value=''; g('goal').value=''; save(); render(); }
  function del(i){ P.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all pillars?')){ P=[]; save(); render(); } }
  function render(){
    g('stat').innerHTML = !P.length?'' : P.length<3?`<span class="warn">${P.length} pillar(s) — aim for 3–5 so your feed has range without losing focus.</span>`:P.length>5?'<span class="warn">Too many — cut to 5.</span>':`✅ ${P.length} pillars. Rotate them so no two posts in a row are the same type.`;
    const L=g('list');
    if(!P.length){ L.innerHTML='<div class="empty">No pillars yet — add 3–5.</div>'; return; }
    L.innerHTML=P.map((p,i)=>`<div class="pillar"><div class="h"><h3>${i+1}. ${esc(p.n)}</h3><span class="x" onclick="del(${i})">✕</span></div>
      ${p.g?`<div style="font-size:.83rem;opacity:.7">${esc(p.g)}</div>`:''}
      <ul>${ANG(esc(p.n)).slice(0,4).map(a=>`<li>${a}</li>`).join('')}</ul></div>`).join('');
  }
  render();
</script>
</body>
</html>
