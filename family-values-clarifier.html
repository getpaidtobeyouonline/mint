<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Family Values Clarifier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .step { font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin-bottom: 8px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { background: #2A442A; border: 1px solid #5A845A; border-radius: 20px; padding: 7px 14px; font-size: .85rem; cursor: pointer; }
  .chip.on { background: #5AE57A; color: #325132; border-color: #5AE57A; font-weight: 500; }
  .count { font-size: .82rem; opacity: .65; margin-top: 8px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 12px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 9px 11px; border-radius: 8px; min-height: 50px; resize: vertical; margin-top: 6px; }
  textarea:focus { outline: none; border-color: #5AE57A; }
  .result { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; margin-top: 14px; display: none; }
  .result h3 { font-family: 'Playfair Display', serif; color: #5AE57A; }
  .vrow { font-size: .95rem; margin-top: 6px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Family Values Clarifier</h1>
  <p class="sub">Name what your family stands for. Shared values make a thousand small decisions easier.</p>

  <div class="panel">
    <div class="step">Step 1 — Pick the values that feel most true (choose up to 5)</div>
    <div class="chips" id="chips"></div>
    <div class="count" id="count">0 selected</div>
  </div>

  <div class="panel">
    <div class="step">Step 2 — In one line, what does your family stand for?</div>
    <textarea id="motto" placeholder="e.g. We are kind, we are honest, and we always come back to each other"></textarea>
    <button class="btn" onclick="gen()">Create Our Values</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <div class="result" id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const VALUES=["Kindness","Honesty","Respect","Adventure","Hard work","Generosity","Curiosity","Faith","Health","Creativity","Gratitude","Courage","Patience","Loyalty","Fun & humour","Responsibility","Forgiveness","Togetherness","Independence","Learning"];
  let sel=JSON.parse(localStorage.getItem('fvc_sel')||'[]');
  if(localStorage.getItem('fvc_motto'))g('motto').value=localStorage.getItem('fvc_motto');
  g('motto').addEventListener('input',()=>localStorage.setItem('fvc_motto',g('motto').value));
  function draw(){
    g('chips').innerHTML=VALUES.map(v=>'<span class="chip'+(sel.includes(v)?' on':'')+'" onclick="tog(\''+v.replace(/'/g,"\\'").replace(/&/g,'&amp;')+'\')">'+v+'</span>').join('');
    g('count').textContent=sel.length+' selected'+(sel.length>=5?' (max)':'');
  }
  function tog(v){
    if(sel.includes(v))sel=sel.filter(x=>x!==v);
    else { if(sel.length>=5){ alert('Pick your top 5 — that is the exercise.'); return; } sel.push(v); }
    localStorage.setItem('fvc_sel',JSON.stringify(sel)); draw();
  }
  function gen(){
    if(!sel.length){ alert('Pick at least one value.'); return; }
    g('out').style.display='block';
    g('out').innerHTML='<h3>Our Family Values</h3>'+sel.map(v=>'<div class="vrow">✦ '+v+'</div>').join('')+
      (g('motto').value.trim()?'<p style="margin-top:12px;font-style:italic;font-size:.95rem">“'+esc(g('motto').value.trim())+'”</p>':'')+
      '<p style="margin-top:12px;font-size:.85rem;opacity:.75">Print these and put them where everyone sees them. Refer back when decisions get hard.</p>';
    g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ if(!sel.length){alert('Pick values first.');return;}
    const t='OUR FAMILY VALUES\n\n'+sel.map(v=>'- '+v).join('\n')+(g('motto').value.trim()?'\n\n"'+g('motto').value.trim()+'"':'');
    navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.'));
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  draw();
</script>
</body>
</html>
