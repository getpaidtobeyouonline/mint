<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Holiday Decoration Organiser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .fp { background: #2A442A; border: 1px solid #5A845A; border-radius: 16px; padding: 5px 12px; font-size: .8rem; cursor: pointer; }
  .fp.on { background: #5AE57A; color: #325132; border-color: #5AE57A; font-weight: 500; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 8px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: .87rem; gap: 8px; }
  .item .loc { color: #5AE57A; font-size: .8rem; flex: none; }
  .item .x { cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Holiday Decoration Organiser</h1>
  <p class="sub">Catalogue your decorations and where they are boxed — find everything next year in seconds.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Decoration</label><input id="item" placeholder="e.g. Outdoor lights"></div>
      <div><label>Occasion</label><select id="occasion"><option>Christmas</option><option>Halloween</option><option>Easter</option><option>Birthdays</option><option>General</option></select></div>
      <div><label>Stored where</label><input id="loc" placeholder="e.g. Attic box 3"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div class="filter" id="filter"></div>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('hdo')||'[]'), filter='all';
  const save=()=>localStorage.setItem('hdo',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('item')){ alert('Enter a decoration.'); return; }
    R.push({i:v('item'),o:g('occasion').value,l:v('loc')}); g('item').value=''; g('loc').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the catalogue?')){ R=[]; save(); render(); } }
  function setF(f){ filter=f; render(); }
  function render(){
    const occs=['all',...new Set(R.map(x=>x.o))];
    g('filter').innerHTML=occs.map(f=>'<span class="fp'+(filter===f?' on':'')+'" onclick="setF(\''+f+'\')">'+(f==='all'?'All':f)+'</span>').join('');
    const L=g('list');
    const shown=R.map((x,i)=>({x,i})).filter(o=>filter==='all'||o.x.o===filter);
    if(!shown.length){ L.innerHTML='<div class="empty">Nothing catalogued here yet.</div>'; return; }
    L.innerHTML=shown.map(({x,i})=>'<div class="item"><span><b style="color:#5AE57A">'+esc(x.i)+'</b> <span style="opacity:.6">· '+x.o+'</span></span><span>'+(x.l?'<span class="loc">'+esc(x.l)+'</span> ':'')+'<span class="x" onclick="del('+i+')">✕</span></span></div>').join('');
  }
  render();
</script>
</body>
</html>
