<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Menopause Support Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  select, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  select:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .blk { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
  .blk h4 { color: #5AE57A; font-size: .95rem; margin-bottom: 4px; } .blk li { font-size: .9rem; margin-left: 16px; }
  .note { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; font-size: .8rem; opacity: .75; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Menopause Support Planner</h1>
  <p class="sub">Pick the area giving you the most trouble. Get gentle, practical support ideas.</p>

  <div class="panel">
    <label for="focus">What needs the most support right now?</label>
    <select id="focus" onchange="gen()">
      <option value="sleep">Sleep &amp; night sweats</option>
      <option value="mood">Mood &amp; emotional wellbeing</option>
      <option value="energy">Energy &amp; fatigue</option>
      <option value="bone">Bone &amp; muscle strength</option>
      <option value="heat">Hot flushes</option>
      <option value="focus">Brain fog &amp; focus</option>
    </select>
    <label for="own">Your own note or question for your doctor</label>
    <textarea id="own" placeholder="Anything you want to remember to ask"></textarea>
    <button class="btn" onclick="gen()">Build Support Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
    <div class="note">General wellbeing ideas, not medical advice. Treatment options including HRT should be discussed with a doctor.</div>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const PLANS={
    sleep:{t:"Sleep & night sweats",lifestyle:["Keep the bedroom cool — light, layered, breathable bedding","Consistent sleep and wake times, even at weekends","Limit caffeine after midday and alcohol in the evening","Wind-down routine: dim light, no screens 30 min before bed"],ask:["Ask about options for disruptive night sweats","Ask whether sleep issues warrant further review"]},
    mood:{t:"Mood & emotional wellbeing",lifestyle:["Daily movement — even a walk lifts mood measurably","Stay socially connected; isolation makes everything harder","Practise stress reduction: breathwork, journaling, nature","Be patient with yourself — this is a real hormonal shift"],ask:["Ask about support for persistent low mood or anxiety","Ask what is normal vs. worth treating"]},
    energy:{t:"Energy & fatigue",lifestyle:["Protein at every meal to steady blood sugar and energy","Strength training twice a week to maintain muscle","Prioritise sleep — fatigue often starts there","Pace your day; build in genuine rest, not just collapse"],ask:["Ask for bloods to rule out iron, thyroid, vitamin D issues","Ask whether fatigue is being driven by other symptoms"]},
    bone:{t:"Bone & muscle strength",lifestyle:["Strength training 2-3x weekly — the strongest bone protector","Weight-bearing movement: walking, stairs, dancing","Adequate calcium and vitamin D from food and sunlight","Balance work to reduce fall risk over time"],ask:["Ask whether a bone-density scan is appropriate for you","Ask about calcium and vitamin D supplementation"]},
    heat:{t:"Hot flushes",lifestyle:["Dress in light layers you can remove quickly","Note and reduce triggers: spicy food, alcohol, caffeine, stress","Cool tools: fan, cold water, breathable fabrics","Slow paced breathing at the first sign can ease intensity"],ask:["Ask about treatment options if flushes disrupt daily life","Ask which non-hormonal options might suit you"]},
    focus:{t:"Brain fog & focus",lifestyle:["Sleep is the biggest lever — protect it fiercely","Single-task; write things down rather than relying on memory","Exercise improves cognition — keep moving daily","Reduce overwhelm: fewer open loops, simpler systems"],ask:["Ask for reassurance — menopausal brain fog usually improves","Ask whether other factors could be contributing"]}
  };
  ['focus','own'].forEach(k=>{ const s=localStorage.getItem('msp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('msp_'+k,g(k).value)); });
  g('focus').addEventListener('change',()=>localStorage.setItem('msp_focus',g('focus').value));
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function gen(){
    const p=PLANS[g('focus').value], own=g('own').value.trim();
    let h='<div class="blk"><h4>'+p.t+' — lifestyle support</h4><ul>'+p.lifestyle.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul></div>';
    h+='<div class="blk"><h4>To raise with your doctor</h4><ul>'+p.ask.map(x=>'<li>'+esc(x)+'</li>').join('')+(own?'<li>'+esc(own)+'</li>':'')+'</ul></div>';
    h+='<div class="blk" style="border-left-color:#BFD8BF"><h4>Remember</h4><p style="font-size:.9rem">Menopause is a transition, not a decline. Support is available and you deserve to feel well — keep asking until you do.</p></div>';
    g('out').innerHTML=h;
    window._copy=p.t+'\n\nLIFESTYLE SUPPORT:\n'+p.lifestyle.map(x=>'- '+x).join('\n')+'\n\nFOR MY DOCTOR:\n'+p.ask.concat(own?[own]:[]).map(x=>'- '+x).join('\n');
  }
  function copyOut(){ if(!window._copy){alert('Build it first.');return;} navigator.clipboard.writeText(window._copy).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
