<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fear Mapping Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  textarea { min-height: 56px; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .blk { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
  .blk h4 { color: #5AE57A; font-size: .76rem; text-transform: uppercase; margin-bottom: 4px; }
  .blk p { font-size: .93rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Fear Mapping Tool</h1>
  <p class="sub">The "fear-setting" exercise — name the worst, the recoverable, and the cost of not acting.</p>

  <div class="panel">
    <label for="action">The action you are putting off</label>
    <input id="action" placeholder="e.g. raise my rates / quit the job / send the pitch">
    <label for="worst">What is the worst that could happen?</label>
    <textarea id="worst" placeholder="Name it specifically — vague fear is more powerful than specific fear"></textarea>
    <label for="prevent">If it happened, what could you do to recover?</label>
    <textarea id="prevent" placeholder="The recovery plan — usually obvious once you write it"></textarea>
    <label for="cost">Cost of NOT acting in 6 months? 1 year? 3 years?</label>
    <textarea id="cost" placeholder="What it costs to keep playing it safe"></textarea>
    <button class="btn" onclick="gen()">Map It</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['action','worst','prevent','cost'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('fmt_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('fmt_'+k,g(k).value)); });
  function gen(){
    g('out').innerHTML='<div class="blk"><h4>The action you are avoiding</h4><p>'+esc(v('action')||'—')+'</p></div>'+
      '<div class="blk"><h4>Worst case (named, not vague)</h4><p>'+esc(v('worst')||'—')+'</p></div>'+
      '<div class="blk"><h4>How you would recover</h4><p>'+esc(v('prevent')||'—')+' — turns out, you would survive this.</p></div>'+
      '<div class="blk" style="border-left-color:#5AE57A"><h4>Cost of staying still</h4><p>'+esc(v('cost')||'—')+'</p></div>'+
      '<div class="blk" style="border-left-color:#BFD8BF"><h4>The decision</h4><p>The worst case is recoverable. The cost of not acting is not. The smallest version of this action you can take today is the answer.</p></div>';
    g('out').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function copyOut(){ const t=g('out').innerText; if(!t){alert('Map it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
