<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Methodology Namer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .hint { font-size: .78rem; opacity: .6; margin-top: 3px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Methodology Namer</h1>
  <p class="sub">Generate name ideas for your signature method, framework or programme.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="kw1">A word that describes your approach</label><input id="kw1" placeholder="e.g. Aligned, Simple, Bold"></div>
      <div><label for="kw2">A word for your theme or field</label><input id="kw2" placeholder="e.g. Income, Wellness, Brand"></div>
    </div>
    <label for="outcome">The end result in one word</label>
    <input id="outcome" placeholder="e.g. Freedom, Clarity, Growth">
    <div class="hint">Single words work best — you will get a mix of name styles to choose from.</div>
    <button class="btn" onclick="gen()">Generate Names</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['kw1','kw2','outcome'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('mn_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('mn_'+k,g(k).value)); });
  const cap=s=>s?s.charAt(0).toUpperCase()+s.slice(1):s;
  function gen(){
    const a=cap(v('kw1'))||'[Approach]', b=cap(v('kw2'))||'[Theme]', o=cap(v('outcome'))||'[Result]';
    const names=[
      'The '+a+' Method','The '+a+' '+b+' Framework','The '+o+' Blueprint',
      'The '+a+' System','The '+b+' to '+o+' Path','The '+a+' Way',
      'The '+o+' Formula','The '+a+' '+o+' Method','The '+b+' Accelerator',
      'The '+a+' Roadmap','The '+o+' Code','The '+a+' Model'
    ];
    const t='METHODOLOGY NAME IDEAS\n\n'+names.map((n,i)=>'  '+(i+1)+'. '+n).join('\n')+
    '\n\n--- How to choose ---\nSay each one out loud — the right name feels natural to repeat.\nIt should hint at the result, not just the topic.\nCheck it is not already taken (search it + check social handles).\nWhen in doubt, simple and clear beats clever and confusing.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Generate names first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
