<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Resignation Letter Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 140px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Resignation Letter Builder</h1>
  <p class="sub">Leave well. Build a gracious, professional resignation letter in minutes.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="you">Your name</label><input id="you" placeholder="Your full name"></div>
      <div><label for="manager">Manager's name</label><input id="manager" placeholder="Who it is addressed to"></div>
    </div>
    <div class="grid">
      <div><label for="role">Your role</label><input id="role" placeholder="Your job title"></div>
      <div><label for="lastday">Your last day</label><input id="lastday" type="date"></div>
    </div>
    <label for="thanks">What you are grateful for</label>
    <textarea id="thanks" placeholder="A genuine thank-you — growth, people, opportunities"></textarea>
    <label for="tone">Tone</label>
    <select id="tone"><option>Warm and gracious</option><option>Short and professional</option></select>
    <button class="btn" onclick="gen()">Build Letter</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['you','manager','role','lastday','thanks','tone'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('rlb_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('rlb_'+k,g(k).value)); });
  function gen(){
    const warm=g('tone').value==='Warm and gracious';
    const thanks=v('thanks')||'the opportunities, growth and the people I have worked alongside';
    const t='Dear '+(v('manager')||'[Manager]')+',\n\nPlease accept this letter as formal notice of my resignation from my role as '+(v('role')||'[role]')+'. My last working day will be '+(v('lastday')||'[date]')+'.\n\n'+
    (warm?'I am truly grateful for '+thanks+'. This role has meant a great deal to me, and I will carry what I have learned here forward.\n\n':'Thank you for the opportunity to work in this role.\n\n')+
    'I am committed to a smooth handover and will do everything I can over my notice period to wrap up my work and support the transition.\n\n'+
    'I wish you and the team continued success.\n\nKind regards,\n'+(v('you')||'[Your name]')+
    '\n\n--- Before you send ---\nResign in person or by call first, then follow up with this letter.\nKeep it positive — this letter may be read for years.\nCheck your notice period in your contract and confirm your final date.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
