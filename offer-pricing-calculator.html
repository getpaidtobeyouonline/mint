<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offer Pricing Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 16px 70px; }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.7rem,5vw,2.5rem); color: #5AE57A; text-align: center; margin-bottom: 6px; }
    .subtitle { text-align: center; opacity: 0.55; font-size: 0.88rem; margin-bottom: 30px; }
    .wrap { width: 100%; max-width: 520px; }
    .card { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 22px 20px; margin-bottom: 14px; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1rem; color: #5AE57A; margin-bottom: 16px; }
    .field { margin-bottom: 14px; flex: 1; }
    label { display: block; font-size: 0.74rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: #5AE57A; margin-bottom: 6px; }
    input, select { width: 100%; background: #325132; border: 1px solid #4C724C; border-radius: 8px; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; padding: 10px 14px; outline: none; transition: border-color 0.2s; }
    input:focus, select:focus { border-color: #5AE57A; }
    select option { background: #3C603C; }
    .row { display: flex; gap: 10px; }
    .hint { font-size: 0.73rem; opacity: 0.35; margin-top: 5px; line-height: 1.4; }
    .exp-row { display: flex; gap: 8px; }
    .exp-opt { flex: 1; text-align: center; padding: 10px 8px; background: #325132; border: 2px solid #4C724C; border-radius: 8px; cursor: pointer; font-size: 0.88rem; transition: border-color 0.2s, color 0.2s; user-select: none; }
    .exp-opt:hover { border-color: #5A845A; }
    .exp-opt.active { border-color: #5AE57A; color: #5AE57A; background: #325132; }
    .btn-calc { width: 100%; background: #5AE57A; color: #325132; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 700; padding: 13px; cursor: pointer; transition: opacity 0.2s; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; }
    .btn-calc:hover { opacity: 0.85; }
    .results { display: none; }
    .results.show { display: block; }
    .pillars { display: flex; gap: 10px; margin-bottom: 14px; }
    .pillar { flex: 1; background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 16px 10px; text-align: center; }
    .pillar-lbl { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.07em; opacity: 0.4; margin-bottom: 8px; }
    .pillar-price { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #FFFFFF; margin-bottom: 5px; }
    .pillar-desc { font-size: 0.7rem; opacity: 0.35; line-height: 1.3; }
    .rec-card { background: #2E4D2E; border: 2px solid #5AE57A; border-radius: 12px; padding: 24px 20px; margin-bottom: 14px; text-align: center; }
    .rec-lbl { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.09em; color: #5AE57A; opacity: 0.75; margin-bottom: 8px; }
    .rec-price { font-family: 'Playfair Display', serif; font-size: 3.2rem; color: #5AE57A; line-height: 1; margin-bottom: 6px; }
    .rec-sub { font-size: 0.8rem; opacity: 0.4; margin-bottom: 20px; }
    .milestones { display: flex; gap: 10px; justify-content: center; }
    .ms { background: #325132; border: 1px solid #4C724C; border-radius: 8px; padding: 10px 16px; text-align: center; flex: 1; }
    .ms-num { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: #FFFFFF; }
    .ms-lbl { font-size: 0.68rem; opacity: 0.35; margin-top: 3px; }
    .insight { background: #325132; border-left: 3px solid #5AE57A; border-radius: 4px; padding: 13px 16px; margin-bottom: 12px; font-size: 0.87rem; line-height: 1.65; opacity: 0.85; }
    .btn-reset { width: 100%; background: transparent; border: 1px solid #4C724C; color: #FFFFFF; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; padding: 11px; cursor: pointer; transition: border-color 0.2s; }
    .btn-reset:hover { border-color: #5AE57A; }
    footer { margin-top: 48px; font-size: 0.7rem; opacity: 0.3; text-align: center; }
  </style>
</head>
<body>
  <h1>Offer Pricing Calculator</h1>
  <p class="subtitle">Find the price your offer deserves — not what fear tells you to charge.</p>

  <div class="wrap">
    <div class="card">
      <div class="card-title">Your Offer</div>
      <div class="field">
        <label>Offer Type</label>
        <select id="offer-type">
          <option value="template">Template / Toolkit</option>
          <option value="ebook">Ebook / PDF Guide</option>
          <option value="mini">Mini-Course (1–3 hrs of content)</option>
          <option value="course" selected>Full Course (4+ hrs of content)</option>
          <option value="group">Group Coaching / Membership</option>
          <option value="1on1">1:1 Coaching / Done-for-You Service</option>
        </select>
      </div>
      <div class="row">
        <div class="field">
          <label>Hours to Create</label>
          <input type="number" id="hours" placeholder="e.g. 20" min="1" />
        </div>
        <div class="field">
          <label>Your Hourly Value ($)</label>
          <input type="number" id="rate" placeholder="e.g. 75" min="1" />
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">The Market</div>
      <div class="row">
        <div class="field">
          <label>Competitor Low ($)</label>
          <input type="number" id="comp-low" placeholder="e.g. 27" min="0" />
        </div>
        <div class="field">
          <label>Competitor High ($)</label>
          <input type="number" id="comp-high" placeholder="e.g. 297" min="0" />
        </div>
      </div>
      <div class="field">
        <label>Your Experience Level</label>
        <div class="exp-row">
          <div class="exp-opt" data-val="0.75" onclick="selectExp(this)">Emerging</div>
          <div class="exp-opt active" data-val="1.0" onclick="selectExp(this)">Established</div>
          <div class="exp-opt" data-val="1.35" onclick="selectExp(this)">Expert</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">The Buyer's Outcome</div>
      <div class="field">
        <label>Outcome Value to Buyer ($) <span style="opacity:0.4;font-weight:400;text-transform:none;font-size:0.72rem">(optional)</span></label>
        <input type="number" id="outcome-val" placeholder="e.g. 5000 — what they save or earn from your offer" min="0" />
        <div class="hint">Even a rough estimate unlocks value-based pricing — the most profitable approach.</div>
      </div>
      <button class="btn-calc" onclick="calculate()">Calculate My Price</button>
    </div>

    <div class="results" id="results"></div>
  </div>

  <footer>Powered by GetPaidToBeYouOnline</footer>

  <script>
    let expMult = 1.0;

    function selectExp(el) {
      document.querySelectorAll('.exp-opt').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      expMult = parseFloat(el.dataset.val);
    }

    const fmt = n => '$' + Math.round(n).toLocaleString('en-US');

    function calculate() {
      const offerType  = document.getElementById('offer-type').value;
      const hours      = parseFloat(document.getElementById('hours').value)       || 0;
      const rate       = parseFloat(document.getElementById('rate').value)        || 0;
      const compLow    = parseFloat(document.getElementById('comp-low').value)    || 0;
      const compHigh   = parseFloat(document.getElementById('comp-high').value)   || 0;
      const outcomeVal = parseFloat(document.getElementById('outcome-val').value) || 0;

      if (!hours || !rate || !compLow || !compHigh) {
        alert('Please fill in hours, hourly value, and both competitor prices.');
        return;
      }

      const unitMap = { template: 120, ebook: 80, mini: 50, course: 30, group: 20, '1on1': 12 };
      const units   = unitMap[offerType] || 50;

      const floor  = Math.max(Math.ceil(((hours * rate) / units) / 5) * 5, 9);
      const market = Math.round(((compLow + compHigh) / 2) * expMult / 10) * 10;
      const valRaw = outcomeVal > 0 ? Math.min(outcomeVal * 0.1, compHigh * 3) : null;
      const valPrc = valRaw ? Math.round(valRaw / 10) * 10 : null;

      let rec = valPrc ? Math.round(((market + valPrc) / 2) / 10) * 10 : market;
      rec = Math.max(rec, floor);

      const pillars = [
        { lbl: 'Floor Price',  price: floor,  desc: 'Minimum to recoup creation cost' },
        { lbl: 'Market Price', price: market, desc: 'Competitor midpoint at your level' },
        ...(valPrc ? [{ lbl: 'Value Price', price: valPrc, desc: '10% of buyer outcome value' }] : []),
      ];

      const ms = [1000, 5000, 10000].map(g => ({ g, u: Math.ceil(g / rec) }));

      let insight;
      if (rec <= floor * 1.15) {
        insight = `Your price is near the floor. Consider raising your hourly value or expected sales volume — at this rate, you're trading significant time for very thin margin.`;
      } else if (valPrc && valPrc > market * 1.5) {
        insight = `The transformation you deliver justifies charging well above the market rate. Don't let the number scare you — buyers who understand the ROI will pay it. Lead with the outcome, not the deliverables.`;
      } else {
        insight = `Your sweet spot sits comfortably in the market range. Price in the upper half of competitors to signal quality, and let your transformation story carry the value conversation.`;
      }

      document.getElementById('results').innerHTML = `
        <div class="pillars">
          ${pillars.map(p => `
            <div class="pillar">
              <div class="pillar-lbl">${p.lbl}</div>
              <div class="pillar-price">${fmt(p.price)}</div>
              <div class="pillar-desc">${p.desc}</div>
            </div>`).join('')}
        </div>
        <div class="rec-card">
          <div class="rec-lbl">Recommended Price</div>
          <div class="rec-price">${fmt(rec)}</div>
          <div class="rec-sub">Optimal blend of cost, market, and value</div>
          <div class="milestones">
            ${ms.map(m => `<div class="ms"><div class="ms-num">${m.u}</div><div class="ms-lbl">sales to ${fmt(m.g)}</div></div>`).join('')}
          </div>
        </div>
        <div class="insight">${insight}</div>
        <button class="btn-reset" onclick="document.getElementById('results').classList.remove('show')">Recalculate</button>`;

      document.getElementById('results').classList.add('show');
      document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  </script>
</body>
</html>
