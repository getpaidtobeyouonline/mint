<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Self Care Menu Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 5px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.05rem; margin-bottom: 4px; }
  .desc { font-size: .82rem; opacity: .7; margin-bottom: 8px; }
  .add { display: flex; gap: 8px; }
  .add .btn { flex: none; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 8px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 7px 12px; margin: 5px 0; display: flex; justify-content: space-between; font-size: .88rem; }
  .item .x { cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { opacity: .45; font-size: .82rem; font-style: italic; padding: 4px 0; }
  .pick { text-align: center; margin-top: 8px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Self Care Menu Builder</h1>
  <p class="sub">Build a menu of go-to self-care by time cost — so you never freeze when you need it.</p>

  <div class="panel" id="m5"></div>
  <div class="panel" id="m30"></div>
  <div class="panel" id="m2"></div>

  <div class="panel" style="text-align:center">
    <button class="btn" onclick="surprise()">🎲 Surprise me — pick one</button>
    <div class="pick" id="pick"></div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const MENUS=[
    {key:'m5',id:'five',title:'5-minute menu',desc:'Tiny resets for a hard moment',ph:'e.g. Step outside and breathe'},
    {key:'m30',id:'thirty',title:'30-minute menu',desc:'A real pause when you have a window',ph:'e.g. A walk with a good playlist'},
    {key:'m2',id:'two',title:'Half-day menu',desc:'Bigger care for when you are running low',ph:'e.g. A long bath, book, no plans'}
  ];
  let D=JSON.parse(localStorage.getItem('scmb')||'{}');
  MENUS.forEach(m=>{ if(!D[m.id])D[m.id]=[]; });
  const save=()=>localStorage.setItem('scmb',JSON.stringify(D));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(id){ const inp=document.getElementById('in_'+id); const t=inp.value.trim(); if(!t)return;
    D[id].push(t); inp.value=''; save(); render(); }
  function del(id,i){ D[id].splice(i,1); save(); render(); }
  function render(){
    MENUS.forEach(m=>{
      const items=D[m.id];
      g(m.key).innerHTML='<h3>'+m.title+'</h3><div class="desc">'+m.desc+'</div>'+
        '<div class="add"><input id="in_'+m.id+'" placeholder="'+m.ph+'" onkeydown="if(event.key===\'Enter\')add(\''+m.id+'\')"><button class="btn" onclick="add(\''+m.id+'\')">Add</button></div>'+
        (items.length?items.map((x,i)=>'<div class="item"><span>'+esc(x)+'</span><span class="x" onclick="del(\''+m.id+'\','+i+')">✕</span></div>').join(''):'<div class="empty">Nothing here yet — add a few ideas.</div>');
    });
  }
  function surprise(){
    const all=[]; MENUS.forEach(m=>D[m.id].forEach(x=>all.push(x)));
    if(!all.length){ g('pick').textContent='Add some ideas first.'; return; }
    g('pick').innerHTML='<div style="font-family:\'Playfair Display\',serif;font-size:1.2rem;color:#5AE57A;margin-top:6px">'+esc(all[Math.floor(Math.random()*all.length)])+'</div><div style="font-size:.82rem;opacity:.7">Do this one — your menu chose for you.</div>';
  }
  render();
</script>
</body>
</html>
