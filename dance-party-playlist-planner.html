<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Dance Party Playlist Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 130px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 8px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; gap: 8px; font-size: .9rem; align-items: center; }
  .item .num { color: #5AE57A; font-family: 'Playfair Display', serif; flex: none; min-width: 26px; }
  .item .move { cursor: pointer; opacity: .5; flex: none; } .item .move:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Dance Party Playlist Planner</h1>
  <p class="sub">Build the kids\' party playlist — drag-free, just up and down arrows.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:3"><label>Song</label><input id="title" placeholder="Title — Artist"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="copyOut()" style="margin-top:8px">Copy Playlist</button>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('dppp')||'[]');
  const save=()=>localStorage.setItem('dppp',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('title')){ return; } R.push(v('title')); g('title').value=''; save(); render(); }
  function up(i){ if(i<=0)return; [R[i-1],R[i]]=[R[i],R[i-1]]; save(); render(); }
  function down(i){ if(i>=R.length-1)return; [R[i+1],R[i]]=[R[i],R[i+1]]; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the playlist?')){ R=[]; save(); render(); } }
  function copyOut(){ if(!R.length){ alert('Nothing to copy.'); return; }
    const t='DANCE PARTY PLAYLIST\n\n'+R.map((s,i)=>(i+1)+'. '+s).join('\n');
    navigator.clipboard.writeText(t).then(()=>alert('Playlist copied!'),()=>alert('Copy failed.'));
  }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">Add the first banger above.</div>'; return; }
    L.innerHTML=R.map((s,i)=>'<div class="item"><span class="num">'+(i+1)+'.</span><span style="flex:1">'+esc(s)+'</span><span class="move" onclick="up('+i+')">▲</span><span class="move" onclick="down('+i+')">▼</span><span class="move" onclick="del('+i+')">✕</span></div>').join('');
  }
  render();
</script>
</body>
</html>
