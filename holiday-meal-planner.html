<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holiday Meal Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.02rem; margin-bottom: 4px; }
  .desc { font-size: .8rem; opacity: .65; margin-bottom: 8px; }
  .add { display: flex; gap: 8px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 15px; border-radius: 8px; font-family:'DM Sans',sans-serif; flex: none; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 7px 12px; margin: 5px 0; display: flex; align-items: center; gap: 9px; font-size: .87rem; }
  .box { width: 18px; height: 18px; border: 2px solid #5AE57A; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .68rem; font-weight: 700; }
  .box.on { background: #5AE57A; color: #325132; }
  .item.done .lb { text-decoration: line-through; opacity: .5; }
  .item .who { color: #5AE57A; font-size: .76rem; flex: none; }
  .item .x { margin-left: auto; cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { opacity: .45; font-size: .82rem; font-style: italic; padding: 3px 0; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Holiday Meal Planner</h1>
  <p class="sub">Plan the big festive meal course by course — and note who is bringing what.</p>

  <div class="panel">
    <label>Occasion &amp; number of guests</label>
    <input id="header" placeholder="e.g. Christmas lunch — 8 people">
  </div>

  <div class="panel" id="s_starter"></div>
  <div class="panel" id="s_main"></div>
  <div class="panel" id="s_sides"></div>
  <div class="panel" id="s_dessert"></div>
  <div class="panel" id="s_drinks"></div>

  <div class="panel" style="text-align:center">
    <button class="btn" onclick="copyOut()">Copy Plan</button>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const SEC=[
    {id:'starter',title:'Starter',desc:'The opener'},
    {id:'main',title:'Main',desc:'The centrepiece'},
    {id:'sides',title:'Sides &amp; trimmings',desc:'All the extras'},
    {id:'dessert',title:'Dessert',desc:'The sweet finish'},
    {id:'drinks',title:'Drinks',desc:'For everyone'}
  ];
  let D=JSON.parse(localStorage.getItem('hmp2')||'{}');
  SEC.forEach(s=>{ if(!D[s.id])D[s.id]=[]; });
  if(localStorage.getItem('hmp2_header'))g('header').value=localStorage.getItem('hmp2_header');
  g('header').addEventListener('input',()=>localStorage.setItem('hmp2_header',g('header').value));
  const save=()=>localStorage.setItem('hmp2',JSON.stringify(D));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(id){
    const dish=document.getElementById('dish_'+id).value.trim();
    const who=document.getElementById('who_'+id).value.trim();
    if(!dish)return;
    D[id].push({d:dish,w:who,done:false}); save(); render();
  }
  function toggle(id,i){ D[id][i].done=!D[id][i].done; save(); render(); }
  function del(id,i){ D[id].splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the plan?')){ SEC.forEach(s=>D[s.id]=[]); save(); render(); } }
  function render(){
    SEC.forEach(s=>{
      g('s_'+s.id).innerHTML='<h3>'+s.title+'</h3><div class="desc">'+s.desc+'</div>'+
        '<div class="add"><input id="dish_'+s.id+'" placeholder="Dish..." style="flex:2"><input id="who_'+s.id+'" placeholder="Who" style="flex:1"><button class="btn" onclick="add(\''+s.id+'\')">Add</button></div>'+
        (D[s.id].length?D[s.id].map((x,i)=>'<div class="item'+(x.done?' done':'')+'"><span class="box'+(x.done?' on':'')+'" onclick="toggle(\''+s.id+'\','+i+')">'+(x.done?'✓':'')+'</span><span class="lb">'+esc(x.d)+'</span>'+(x.w?'<span class="who">'+esc(x.w)+'</span>':'')+'<span class="x" onclick="del(\''+s.id+'\','+i+')">✕</span></div>').join(''):'<div class="empty">Nothing added yet.</div>');
    });
  }
  function copyOut(){
    let t='HOLIDAY MEAL PLAN\n'+(g('header').value.trim()||'')+'\n';
    SEC.forEach(s=>{ if(D[s.id].length)t+='\n'+s.title.replace(/&amp;/g,'&').toUpperCase()+'\n'+D[s.id].map(x=>'  • '+x.d+(x.w?' ('+x.w+')':'')).join('\n')+'\n'; });
    navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.'));
  }
  render();
</script>
</body>
</html>
