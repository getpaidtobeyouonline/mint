<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homeschool Daily Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Homeschool Daily Planner</h1>
  <p class="sub">Plan a homeschool day with a real rhythm — focus, movement, joy.</p>

  <div class="panel">
    <label for="morning">Morning basket / read-aloud</label>
    <textarea id="morning" placeholder="A poem, a chapter, a hymn or song — the cosy opener"></textarea>
    <label for="core">Core lessons (one per line)</label>
    <textarea id="core" placeholder="Maths, English, science — keep it short and focused"></textarea>
    <label for="move">Movement / outdoor time</label>
    <input id="move" placeholder="Walk, park, garden, PE">
    <label for="creative">Creative or project work</label>
    <textarea id="creative" placeholder="Art, music, nature, history, a long-running project"></textarea>
    <label for="indie">Independent / quiet time</label>
    <input id="indie" placeholder="Free reading, puzzles, drawing">
    <label for="close">Closing the day</label>
    <input id="close" placeholder="A poem, a tidy, a small celebration">
    <button class="btn" onclick="gen()">Build Day</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['morning','core','move','creative','indie','close'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('hsdp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('hsdp_'+k,g(k).value)); });
  function gen(){
    const t='HOMESCHOOL DAY\n\n1. MORNING BASKET\n'+(v('morning')||'[poem, read-aloud, song — the cosy opener]')+
    '\n\n2. CORE LESSONS\n'+(v('core')||'[short, focused — maths, English, etc.]')+
    '\n\n3. MOVEMENT / OUTDOORS\n'+(v('move')||'[a walk, park, garden, PE]')+
    '\n\n4. CREATIVE / PROJECT TIME\n'+(v('creative')||'[art, music, project, history]')+
    '\n\n5. INDEPENDENT TIME\n'+(v('indie')||'[free reading, puzzles, drawing]')+
    '\n\n6. CLOSE THE DAY\n'+(v('close')||'[a poem, a tidy, a small celebration]')+
    '\n\n--- Homeschool tips ---\nShort, focused lessons beat long, drifting ones — especially for younger kids.\nMix table work with movement and curiosity-led time.\nTake regular weeks off; a tired family does not learn well.\nLet your kids see your own learning — they copy that more than anything you say.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
