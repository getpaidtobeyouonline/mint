<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Art Commission Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 580px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 130px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 12px; }
  .res { display: none; }
  .big { text-align: center; margin-bottom: 12px; }
  .big .n { font-family: 'Playfair Display', serif; font-size: 2.4rem; color: #5AE57A; }
  .rows { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 6px 14px; }
  .line { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #4C724C; font-size: .92rem; }
  .line:last-child { border-bottom: none; }
  .line .v { color: #5AE57A; font-weight: 500; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Art Commission Calculator</h1>
  <p class="sub">Price a commission honestly — covering time, materials and the work that pays.</p>

  <div class="panel">
    <div class="row">
      <div><label>Materials</label><input id="mat" type="number" step="0.01" min="0" placeholder="40"></div>
      <div><label>Hours</label><input id="hours" type="number" step="0.5" min="0" placeholder="12"></div>
      <div><label>Hourly rate</label><input id="rate" type="number" step="0.01" min="0" placeholder="25"></div>
    </div>
    <div class="row">
      <div><label>Shipping &amp; packaging</label><input id="ship" type="number" step="0.01" min="0" placeholder="15"></div>
      <div><label>Complexity multiplier</label><input id="mult" type="number" step="0.1" min="1" placeholder="1.2"></div>
    </div>
    <button class="btn" onclick="calc()">Calculate Quote</button>
  </div>

  <div class="panel res" id="res">
    <div class="big"><div class="n" id="quote">—</div><div style="opacity:.7;font-size:.85rem">your commission quote</div></div>
    <div class="rows" id="rows"></div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), n=id=>parseFloat(g(id).value)||0;
  const fmt=x=>x.toFixed(2);
  function calc(){
    const mat=n('mat'), hrs=n('hours'), rate=n('rate'), ship=n('ship'), mult=n('mult')||1;
    if(!hrs||!rate){ alert('Enter hours and your rate.'); return; }
    const labour=hrs*rate, base=labour+mat;
    const total=Math.ceil((base*mult+ship)/5)*5;
    g('quote').textContent=fmt(total);
    g('rows').innerHTML=
      '<div class="line"><span>Labour ('+hrs+'h @ '+fmt(rate)+')</span><span class="v">'+fmt(labour)+'</span></div>'+
      '<div class="line"><span>Materials</span><span class="v">'+fmt(mat)+'</span></div>'+
      '<div class="line"><span>Subtotal</span><span class="v">'+fmt(base)+'</span></div>'+
      '<div class="line"><span>×'+mult+' complexity</span><span class="v">'+fmt(base*mult)+'</span></div>'+
      '<div class="line"><span>Shipping &amp; packaging</span><span class="v">'+fmt(ship)+'</span></div>'+
      '<div class="line"><span style="opacity:.7">Suggested 50% deposit</span><span class="v">'+fmt(total/2)+'</span></div>';
    g('res').style.display='block'; g('res').scrollIntoView({behavior:'smooth'});
  }
</script>
</body>
</html>
