<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sponsorship Pitch Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  textarea { min-height: 48px; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Sponsorship Pitch Builder</h1>
  <p class="sub">Turn your stats into a tight, brand-focused pitch email that actually gets replies.</p>

  <div class="panel">
    <label for="name">Your name / handle</label>
    <input id="name" placeholder="e.g. @janecreates">
    <label for="brand">Brand you're pitching</label>
    <input id="brand" placeholder="e.g. Brightleaf Tea">
    <label for="audience">Your audience in one line</label>
    <input id="audience" placeholder="e.g. 12k women 25–34 into clean living">
    <label for="fit">Why you genuinely fit this brand</label>
    <textarea id="fit" placeholder="A real, specific reason — not 'I love your products'"></textarea>
    <label for="idea">The content idea you'd create</label>
    <textarea id="idea" placeholder="e.g. a 'morning reset' reel featuring the tea"></textarea>
    <label for="proof">One proof point</label>
    <input id="proof" placeholder="e.g. last brand reel drove 240 link clicks">
    <button class="btn" onclick="gen()">Build Pitch</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['name','brand','audience','fit','idea','proof'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('spb_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('spb_'+k,g(k).value)); });
  function gen(){
    if(!v('brand')){ alert('Add the brand name.'); return; }
    const t=`Subject: ${v('idea')?'Content idea for '+v('brand'):'Partnership idea — '+v('brand')}

Hi ${v('brand')} team,

I'm ${v('name')||'[name]'} — ${v('audience')||'[audience]'}.

Why I'm reaching out: ${v('fit')||'[specific, genuine reason you fit this brand]'}.

Here's a concrete idea, not a generic ask: ${v('idea')||'[the content you would make]'}. It puts ${v('brand')} in front of exactly the people who'd buy, in a way that feels native to my feed.

A quick proof point: ${v('proof')||'[a result from past content]'}.

If this is interesting, I'll send my rate card and a couple of options. Happy to tailor it to a campaign you already have running.

Thanks for the time,
${v('name')||'[name]'}`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build the pitch first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Pitch copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
