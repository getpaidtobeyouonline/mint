<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Communication Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 54px; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Team Communication Tool</h1>
  <p class="sub">Turn a messy update into a clear, well-structured team message.</p>

  <div class="panel">
    <label for="subject">What the message is about</label>
    <input id="subject" placeholder="The headline / subject">
    <label for="audience">Who it is for</label>
    <input id="audience" placeholder="The team, a group, a specific person">
    <label for="context">Context — why this matters now</label>
    <textarea id="context" placeholder="The background they need in a sentence or two"></textarea>
    <label for="points">Key points</label>
    <textarea id="points" placeholder="The main things to communicate, one per line"></textarea>
    <label for="action">What you need them to do</label>
    <textarea id="action" placeholder="The clear ask — who, what, by when"></textarea>
    <label for="tone">Tone</label>
    <select id="tone"><option>Clear and friendly</option><option>Direct and brief</option><option>Warm and encouraging</option><option>Formal and careful</option></select>
    <button class="btn" onclick="gen()">Build Message</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['subject','audience','context','points','action','tone'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('tct_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('tct_'+k,g(k).value)); });
  function gen(){
    const pts=v('points').split('\n').filter(x=>x.trim()).map(x=>'  • '+x.trim()).join('\n')||'  • [your key points]';
    const t='TEAM MESSAGE'+(v('audience')?'\nTo: '+v('audience'):'')+(v('subject')?'\nSubject: '+v('subject'):'')+(v('tone')?'\nTone: '+v('tone'):'')+
    '\n\n--- DRAFT ---\n\nHi team,\n\n'+(v('context')||'[one or two lines of context]')+
    '\n\nThe key points:\n'+pts+
    '\n\nWhat I need from you:\n'+(v('action')||'[the clear ask — who, what, by when]')+
    '\n\nHappy to talk it through if anything is unclear.\n\nThanks,\n[your name]'+
    '\n\n--- Before you send ---\nLead with the point, not the backstory.\nMake the ask impossible to misread. State the deadline.\nIf it needs a discussion, a quick call may beat a long message.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
