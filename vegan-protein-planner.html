<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Vegan Protein Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .glass { text-align: center; }
  .glass .n { font-family: 'Playfair Display', serif; font-size: 2.6rem; color: #5AE57A; line-height: 1; }
  .glass .of { opacity: .7; font-size: .9rem; }
  .track { background: #3C603C; border-radius: 5px; height: 13px; overflow: hidden; margin: 10px 0 6px; }
  .track>i { display: block; height: 100%; background: #5AE57A; transition: width .3s; }
  .row { display: flex; gap: 8px; align-items: flex-end; } .row>div { flex: 1; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .row2 { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 7px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: .85rem; }
  .row2 .x { cursor: pointer; opacity: .5; } .row2 .x:hover { opacity: 1; color: #5AE57A; }
  .ref { font-size: .82rem; opacity: .8; }
  .empty { text-align: center; opacity: .5; font-size: .84rem; padding: 8px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Vegan Protein Planner</h1>
  <p class="sub">Hit your protein goal on a plant-based diet — log sources and watch the total.</p>

  <div class="panel">
    <label>Daily protein goal (grams)</label>
    <input id="goal" type="number" min="1" value="80" oninput="render()">
    <div class="glass" style="margin-top:10px">
      <div><span class="n" id="total">0</span><span class="of" id="of"> / 80 g</span></div>
      <div class="track"><i id="bar" style="width:0%"></i></div>
      <div class="of" id="msg"></div>
    </div>
  </div>

  <div class="panel">
    <div class="row">
      <div><label>Source</label><select id="src">
        <option value="18">Lentils, cooked cup (18g)</option>
        <option value="15">Chickpeas, cooked cup (15g)</option>
        <option value="20">Tofu, 100g firm (20g)</option>
        <option value="17">Tempeh, 100g (17g)</option>
        <option value="9">Black beans, cooked cup (9g)</option>
        <option value="8">Edamame, half cup (8g)</option>
        <option value="6">Peanut butter, 2 tbsp (8g)</option>
        <option value="6">Oats, half cup dry (6g)</option>
        <option value="5">Quinoa, cooked cup (8g)</option>
        <option value="25">Vegan protein scoop (25g)</option>
      </select></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Log</button></div>
    </div>
    <div id="list" style="margin-top:10px"></div>
    <button class="btn ghost" onclick="resetDay()" style="margin-top:8px">Reset Day</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const LBL={};
  [...document.getElementById('src').options].forEach(o=>LBL[o.value]=o.text.replace(/ \(\d+g\)/,''));
  const today=new Date().toISOString().slice(0,10);
  let D=JSON.parse(localStorage.getItem('vpp')||'{}');
  if(D.day!==today)D={day:today,items:[]};
  const save=()=>localStorage.setItem('vpp',JSON.stringify(D));
  if(localStorage.getItem('vpp_goal'))g('goal').value=localStorage.getItem('vpp_goal');
  function add(){ const grams=+g('src').value; const name=g('src').options[g('src').selectedIndex].text.replace(/ \(\d+g\)/,'');
    const real=+(g('src').options[g('src').selectedIndex].text.match(/\((\d+)g\)/)[1]);
    D.items.push({n:name,g:real}); save(); render(); }
  function del(i){ D.items.splice(i,1); save(); render(); }
  function resetDay(){ if(confirm('Reset today?')){ D={day:today,items:[]}; save(); render(); } }
  function render(){
    localStorage.setItem('vpp_goal',g('goal').value);
    const goal=+g('goal').value||80;
    const total=D.items.reduce((s,x)=>s+x.g,0);
    g('total').textContent=total; g('of').textContent=' / '+goal+' g';
    g('bar').style.width=Math.min(100,total/goal*100)+'%';
    g('msg').textContent= total>=goal?'Goal hit — plant power 🌱':(goal-total)+'g to go';
    const L=g('list');
    if(!D.items.length){ L.innerHTML='<div class="empty">No protein logged yet today.</div>'; return; }
    L.innerHTML=[...D.items].reverse().map(x=>{ const i=D.items.indexOf(x);
      return '<div class="row2"><span>'+x.n+'</span><span><b style="color:#5AE57A">'+x.g+'g</b> <span class="x" onclick="del('+i+')">✕</span></span></div>';
    }).join('');
  }
  render();
</script>
</body>
</html>
