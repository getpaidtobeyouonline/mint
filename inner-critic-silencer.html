<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inner Critic Silencer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  textarea { min-height: 50px; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .res { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
  .res h4 { color: #5AE57A; font-size: .76rem; text-transform: uppercase; margin-bottom: 5px; }
  .res p { font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Inner Critic Silencer</h1>
  <p class="sub">You cannot silence the inner critic by arguing with it. You silence it by hearing it, separating from it, and answering back.</p>

  <div class="panel">
    <label for="voice">What is the critic saying? (exact words)</label>
    <textarea id="voice" placeholder='e.g. "you are going to embarrass yourself"'></textarea>
    <label for="who">Whose voice does it sound like, if you are honest?</label>
    <input id="who" placeholder="A parent, teacher, ex, younger you, no one in particular">
    <label for="situation">When does it show up most?</label>
    <input id="situation" placeholder="Right before you do something brave or visible">
    <button class="btn" onclick="gen()">Run the Process</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['voice','who','situation'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('ics_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('ics_'+k,g(k).value)); });
  function gen(){
    const vo=v('voice')||'(the critical thought)', wh=v('who')||'someone in your past', si=v('situation')||'high-stakes moments';
    g('out').innerHTML='<div class="res"><h4>1 · Hear it without merging</h4><p>The critic says: "<i>'+esc(vo)+'</i>". Notice you can hear that sentence. Which means you are not the sentence. The voice is happening <b>to</b> you, not <b>as</b> you.</p></div>'+
      '<div class="res"><h4>2 · Identify the source</h4><p>That voice sounds like <b style="color:#5AE57A">'+esc(wh)+'</b> &mdash; not your own truth. It is a recording, not a fact.</p></div>'+
      '<div class="res"><h4>3 · Thank it (yes, really)</h4><p>It is trying to protect you from looking bad in '+esc(si)+'. Say: "Thanks. I see you. I have got it from here." Then keep going.</p></div>'+
      '<div class="res"><h4>4 · Replace, do not argue</h4><p>Do not try to disprove the critic — say one true alternative instead: <b style="color:#5AE57A">"I have done hard things before. I can do this one."</b> Truth + action > argument.</p></div>'+
      '<div class="res" style="border-left-color:#BFD8BF"><h4>5 · Act anyway</h4><p>You do not need the voice to go quiet first. The voice goes quiet <b>after</b> you act. Take the smallest possible step right now.</p></div>';
    g('out').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function copyOut(){ const t=g('out').innerText; if(!t){alert('Run it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
