<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Workout Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 20px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .day { margin-bottom: 12px; }
  .day h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1rem; border-bottom: 1px solid #4C724C; padding-bottom: 5px; margin-bottom: 7px; }
  .w { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 7px; padding: 9px 12px; margin-bottom: 6px; display: flex; justify-content: space-between; gap: 10px; font-size: .88rem; align-items: center; }
  .w.rest { border-left-color: #BFD8BF; opacity: .8; }
  .w .x { cursor: pointer; opacity: .5; } .w .x:hover { opacity: 1; color: #5AE57A; }
  .empty { opacity: .45; font-size: .85rem; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Workout Planner</h1>
  <p class="sub">Plan the week's training by day. A planned workout is a kept workout.</p>

  <div class="panel">
    <div class="row">
      <div><label>Day</label><select id="day"><option>Mon</option><option>Tue</option><option>Wed</option><option>Thu</option><option>Fri</option><option>Sat</option><option>Sun</option></select></div>
      <div style="flex:2"><label>Workout</label><input id="what" placeholder="e.g. Upper body strength"></div>
      <div><label>Type</label><select id="type"><option>Strength</option><option>Cardio</option><option>Mobility</option><option>Sport</option><option>Rest</option></select></div>
      <div><label>Mins</label><input id="mins" type="number" min="0"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div id="grid"></div>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let W=JSON.parse(localStorage.getItem('wkp')||'[]');
  const save=()=>localStorage.setItem('wkp',JSON.stringify(W));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ const w=v('what'); if(!w){alert('Add a workout.');return;} W.push({d:g('day').value,w,t:g('type').value,m:parseFloat(g('mins').value)||0}); g('what').value=''; g('mins').value=''; save(); render(); }
  function del(i){ W.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the week?')){ W=[]; save(); render(); } }
  function render(){
    g('grid').innerHTML=DAYS.map(d=>{
      const items=W.map((w,i)=>({w,i})).filter(o=>o.w.d===d);
      return `<div class="day"><h3>${d}</h3>${items.length?items.map(({w,i})=>`<div class="w ${w.t==='Rest'?'rest':''}"><span><b style="color:#5AE57A">${esc(w.t)}</b> — ${esc(w.w)}${w.m?' · '+w.m+'min':''}</span><span class="x" onclick="del(${i})">✕</span></div>`).join(''):'<div class="empty">No workout planned.</div>'}</div>`;
    }).join('');
  }
  render();
</script>
</body>
</html>
