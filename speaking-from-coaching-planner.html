<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Speaking from Coaching Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.4rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Speaking from Coaching Planner</h1>
  <p class="sub">Turn your coaching message into a signature talk that fills your pipeline.</p>

  <div class="panel">
    <label for="title">Signature talk title</label>
    <input id="title" placeholder="The name of your talk">
    <label for="audience">Audiences &amp; events to target</label>
    <textarea id="audience" placeholder="Who needs this talk and where they gather"></textarea>
    <label for="message">The core message</label>
    <textarea id="message" placeholder="The one idea the audience must leave with"></textarea>
    <label for="points">Talk structure (one point per line)</label>
    <textarea id="points" placeholder="The flow of the talk"></textarea>
    <label for="goal">What the talk should do for your business</label>
    <input id="goal" placeholder="e.g. leads, authority, paid speaking, clients">
    <button class="btn" onclick="gen()">Build Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['title','audience','message','points','goal'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('scp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('scp_'+k,g(k).value)); });
  function gen(){
    const pts=v('points').split('\n').filter(x=>x.trim()).map((x,i)=>'  '+(i+1)+'. '+x.trim()).join('\n')||'  [your talk structure]';
    const t='SIGNATURE TALK PLAN\n\nTALK: '+(v('title')||'[talk title]')+
    '\n\nAUDIENCES & EVENTS:\n'+(v('audience')||'[who and where]')+
    '\n\nCORE MESSAGE:\n'+(v('message')||'[the one big idea]')+
    '\n\nSTRUCTURE:\n'+pts+
    '\n\nGOAL FOR THE BUSINESS:\n'+(v('goal')||'[leads, authority, clients]')+
    '\n\n--- Speaking that converts ---\nTeach genuine value — a talk that only pitches is forgettable.\nOpen with a story, close with a clear, low-pressure next step.\nHave a way for the room to connect with you (a resource, a QR code).\nStart with local events and podcasts; momentum compounds fast.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
