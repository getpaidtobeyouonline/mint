<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Homeschool Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 90px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .day { margin-bottom: 10px; }
  .day .dh { font-size: .8rem; color: #5AE57A; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; display: flex; justify-content: space-between; }
  .slot { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 7px 12px; margin-bottom: 4px; display: flex; align-items: center; gap: 9px; font-size: .86rem; }
  .box { width: 18px; height: 18px; border: 2px solid #5AE57A; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .68rem; font-weight: 700; }
  .box.on { background: #5AE57A; color: #325132; }
  .slot.done .lb { text-decoration: line-through; opacity: .5; }
  .slot .sj { color: #5AE57A; font-size: .78rem; flex: none; }
  .slot .x { margin-left: auto; cursor: pointer; opacity: .5; } .slot .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 10px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Homeschool Planner</h1>
  <p class="sub">Plan the homeschool week — subjects across the days, all in one calm view.</p>

  <div class="panel">
    <div class="row">
      <div><label>Day</label><select id="day"><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option></select></div>
      <div><label>Subject</label><select id="subj"><option>Maths</option><option>English</option><option>Science</option><option>History</option><option>Geography</option><option>Art</option><option>Music</option><option>PE</option><option>Languages</option><option>Life skills</option><option>Project</option><option>Reading</option></select></div>
      <div style="flex:2"><label>Activity / lesson</label><input id="act" placeholder="What you will cover"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="resetChecks()" style="margin-top:10px">Uncheck All</button>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday"];
  let R=JSON.parse(localStorage.getItem('hsp')||'[]');
  const save=()=>localStorage.setItem('hsp',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('act')){ alert('Enter an activity.'); return; }
    R.push({day:g('day').value,subj:g('subj').value,act:v('act'),done:false}); g('act').value=''; save(); render(); }
  function toggle(i){ R[i].done=!R[i].done; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function resetChecks(){ R.forEach(x=>x.done=false); save(); render(); }
  function clearAll(){ if(confirm('Clear the whole plan?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No lessons planned yet.</div>'; return; }
    L.innerHTML=DAYS.map(d=>{
      const items=R.map((x,i)=>({x,i})).filter(o=>o.x.day===d);
      if(!items.length)return '';
      const done=items.filter(o=>o.x.done).length;
      return '<div class="day"><div class="dh"><span>'+d+'</span><span style="opacity:.6">'+done+'/'+items.length+'</span></div>'+items.map(({x,i})=>
        '<div class="slot'+(x.done?' done':'')+'"><span class="box'+(x.done?' on':'')+'" onclick="toggle('+i+')">'+(x.done?'✓':'')+'</span><span class="sj">'+esc(x.subj)+'</span><span class="lb">'+esc(x.act)+'</span><span class="x" onclick="del('+i+')">✕</span></div>').join('')+'</div>';
    }).join('');
  }
  render();
</script>
</body>
</html>
