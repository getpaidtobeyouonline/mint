<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Somatic Practice Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 16px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  .note { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 9px 12px; font-size: .8rem; opacity: .72; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Somatic Practice Planner</h1>
  <p class="sub">Plan a gentle practice of listening to — and moving with — your body.</p>

  <div class="panel">
    <label for="want">What you want to work with</label>
    <input id="want" placeholder="e.g. releasing tension, feeling grounded, processing emotion">
    <label for="practices">Practices you will use</label>
    <textarea id="practices" placeholder="e.g. shaking, slow breath, gentle movement, grounding, self-touch"></textarea>
    <label for="when">When &amp; how often</label>
    <input id="when" placeholder="e.g. each morning, or whenever you feel activated">
    <label for="listen">How you will listen to your body</label>
    <textarea id="listen" placeholder="Where you feel things, what sensations tell you, when to pause"></textarea>
    <button class="btn" onclick="gen()">Build Practice</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['want','practices','when','listen'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('smtp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('smtp_'+k,g(k).value)); });
  function gen(){
    const t='SOMATIC PRACTICE PLAN\n\nWHAT I AM WORKING WITH:\n'+(v('want')||'[tension, grounding, emotion]')+
    '\n\nMY PRACTICES:\n'+(v('practices')||'[shaking, breath, movement, grounding]')+
    '\n\nWHEN & HOW OFTEN:\n'+(v('when')||'[your rhythm]')+
    '\n\nHOW I LISTEN TO MY BODY:\n'+(v('listen')||'[sensations, signals, when to pause]')+
    '\n\n--- Somatic practice with care ---\nGo slowly and gently — this is about safety, not pushing through.\nThe body holds the pace. If something feels overwhelming, pause and ground.\nLittle and often works better than rare and intense.\nFor trauma or strong distress, work alongside a qualified somatic or trauma practitioner.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
