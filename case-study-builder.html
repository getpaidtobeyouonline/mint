<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Study Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Case Study Builder</h1>
  <p class="sub">Turn a client success into a story that quietly sells your work.</p>

  <div class="panel">
    <label for="client">Client (name or description)</label>
    <input id="client" placeholder="Who they are">
    <label for="before">Where they started</label>
    <textarea id="before" placeholder="Their situation, struggle and feelings before"></textarea>
    <label for="work">What you did together</label>
    <textarea id="work" placeholder="Your approach and the key moments"></textarea>
    <label for="results">The results</label>
    <textarea id="results" placeholder="What changed — specific and measurable where possible"></textarea>
    <label for="quote">A quote in their words</label>
    <textarea id="quote" placeholder="Something they said about the experience"></textarea>
    <label for="forwho">Who this is perfect proof for</label>
    <input id="forwho" placeholder="The kind of prospect this will convince">
    <button class="btn" onclick="gen()">Build Case Study</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['client','before','work','results','quote','forwho'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('csb_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('csb_'+k,g(k).value)); });
  function gen(){
    const t='CLIENT CASE STUDY'+(v('client')?'\nClient: '+v('client'):'')+
    '\n\nTHE STARTING POINT\n'+(v('before')||'[where they were before]')+
    '\n\nTHE WORK\n'+(v('work')||'[what you did together]')+
    '\n\nTHE RESULTS\n'+(v('results')||'[what changed, specifically]')+
    (v('quote')?'\n\nIN THEIR WORDS\n"'+v('quote')+'"':'')+
    (v('forwho')?'\n\nPERFECT PROOF FOR:\n'+v('forwho'):'')+
    '\n\n--- Make it convert ---\nLead with the transformation, then tell the story behind it.\nThe "before" should sound like your prospect’s today.\nUse it on your sales page, in emails and on discovery calls.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
