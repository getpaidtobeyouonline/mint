<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boundary Setting Script</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Boundary Setting Script</h1>
  <p class="sub">Write a calm, kind script to hold a boundary with a client.</p>

  <div class="panel">
    <label for="situation">The situation</label>
    <textarea id="situation" placeholder="e.g. messages at all hours, scope creep, late payments, missed sessions"></textarea>
    <label for="boundary">The boundary you need to hold</label>
    <textarea id="boundary" placeholder="Clear and specific"></textarea>
    <label for="reason">Why it matters (the positive reason)</label>
    <input id="reason" placeholder="e.g. so I can give you my best work">
    <label for="consequence">What happens if it is crossed</label>
    <input id="consequence" placeholder="The calm, fair follow-through">
    <button class="btn" onclick="gen()">Build Script</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['situation','boundary','reason','consequence'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('bss_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('bss_'+k,g(k).value)); });
  function gen(){
    const t='BOUNDARY SETTING SCRIPT\n\nSITUATION:\n'+(v('situation')||'[what is happening]')+
    '\n\n--- THE SCRIPT ---\n\n1. WARMTH FIRST\n"I really value working with you, and I want to make sure I keep giving you my best."\n\n2. STATE THE BOUNDARY CLEARLY\n"'+(v('boundary')||'[your clear boundary]')+'"\n\n3. GIVE THE POSITIVE REASON\n"'+(v('reason')||'[why this serves them too]')+'"\n\n4. CONFIRM THE FOLLOW-THROUGH (if needed)\n"'+(v('consequence')||'[what happens if it is crossed]')+'"\n\n5. INVITE & CLOSE\n"Does that work for you? I want us both to feel good about how we work together."\n\n--- Reminders ---\nState a boundary, do not apologise for it. Warm and firm, not harsh.\nSay it once, clearly, then hold it calmly and consistently.\nGood clients respect clear boundaries — they often relax once they know the rules.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
