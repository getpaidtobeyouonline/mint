<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industry Authority Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .total { text-align: center; margin-bottom: 12px; }
  .total .n { font-family: 'Playfair Display', serif; font-size: 2.1rem; color: #5AE57A; }
  .grp { font-size: .76rem; text-transform: uppercase; letter-spacing: .04em; color: #5AE57A; margin: 14px 0 6px; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 8px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; gap: 8px; font-size: .88rem; }
  .item .meta { opacity: .6; font-size: .8rem; }
  .item .x { cursor: pointer; opacity: .5; flex: none; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.4rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Industry Authority Tracker</h1>
  <p class="sub">Log every authority marker — your growing proof of being a known name.</p>

  <div class="panel">
    <div class="row">
      <div><label>Type</label><select id="type"><option>Podcast / interview</option><option>Speaking / panel</option><option>Press / feature</option><option>Article / guest post</option><option>Award / nomination</option><option>Collaboration</option><option>Other</option></select></div>
      <div><label>Date</label><input id="date" type="date"></div>
    </div>
    <label>What it was</label>
    <input id="what" placeholder="e.g. Guest on the XYZ Podcast">
    <button class="btn" onclick="add()" style="margin-top:10px">+ Add Authority Marker</button>
  </div>

  <div class="panel">
    <div class="total"><span class="n" id="total">0</span><div style="opacity:.7;font-size:.85rem">authority markers earned</div></div>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const TYPES=['Podcast / interview','Speaking / panel','Press / feature','Article / guest post','Award / nomination','Collaboration','Other'];
  let R=JSON.parse(localStorage.getItem('iat')||'[]');
  const save=()=>localStorage.setItem('iat',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('what')){ alert('Enter what it was.'); return; }
    R.push({t:g('type').value,w:v('what'),d:g('date').value}); g('what').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all markers?')){ R=[]; save(); render(); } }
  function render(){
    g('total').textContent=R.length;
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No authority markers logged yet.</div>'; return; }
    L.innerHTML=TYPES.map(ty=>{
      const items=R.map((x,i)=>({x,i})).filter(o=>o.x.t===ty);
      if(!items.length)return '';
      return '<div class="grp">'+ty+' ('+items.length+')</div>'+items.map(({x,i})=>
        '<div class="item"><span>'+esc(x.w)+'</span><span><span class="meta">'+(x.d||'')+'</span> <span class="x" onclick="del('+i+')">✕</span></span></div>').join('');
    }).join('');
  }
  render();
</script>
</body>
</html>
