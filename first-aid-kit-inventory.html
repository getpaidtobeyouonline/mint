<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First Aid Kit Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .9rem; padding: 8px 10px; border-radius: 7px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .count { text-align: center; margin-bottom: 12px; }
  .count .n { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: #5AE57A; }
  .track { background: #3C603C; border-radius: 5px; height: 11px; overflow: hidden; margin: 8px 0; }
  .track>i { display: block; height: 100%; background: #5AE57A; }
  .item { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #4C724C; cursor: pointer; font-size: .87rem; }
  .item:last-child { border-bottom: none; }
  .box { width: 19px; height: 19px; border: 2px solid #5AE57A; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; font-size: .68rem; font-weight: 700; }
  .box.on { background: #5AE57A; color: #325132; }
  .item .x { margin-left: auto; cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .add { display: flex; gap: 8px; margin-top: 10px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .88rem; padding: 8px 14px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .note { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; font-size: .8rem; opacity: .75; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>First Aid Kit Inventory</h1>
  <p class="sub">Check your first aid kit is complete — tick what you have, add what is missing.</p>

  <div class="panel">
    <div class="count"><span class="n" id="pct">0%</span><div style="opacity:.7;font-size:.85rem">kit complete</div></div>
    <div class="track"><i id="bar" style="width:0%"></i></div>
    <div id="list"></div>
    <div class="add"><input id="extra" placeholder="Add your own item..." onkeydown="if(event.key==='Enter')addExtra()"><button class="btn" onclick="addExtra()">Add</button></div>
    <div class="note">Check expiry dates on plasters, antiseptic and any medicines once a year, and restock after use.</div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const BASE=["Plasters — assorted sizes","Sterile gauze pads","Adhesive tape","Bandages &amp; a triangular bandage","Antiseptic wipes or cream","Scissors","Tweezers","Disposable gloves","Pain relief tablets","Thermometer","Burn gel / dressing","Eye wash","Safety pins","A first aid guide / instructions"];
  let state=JSON.parse(localStorage.getItem('faki')||'{}');
  let extra=JSON.parse(localStorage.getItem('faki_extra')||'[]');
  const save=()=>{ localStorage.setItem('faki',JSON.stringify(state)); localStorage.setItem('faki_extra',JSON.stringify(extra)); };
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function toggle(k){ state[k]=!state[k]; save(); render(); }
  function addExtra(){ const t=g('extra').value.trim(); if(!t)return; extra.push(t); g('extra').value=''; save(); render(); }
  function delExtra(i){ delete state['X|'+extra[i]]; extra.splice(i,1); save(); render(); }
  function render(){
    let html='', total=0, done=0;
    BASE.forEach(it=>{ const on=!!state[it]; total++; if(on)done++;
      html+='<div class="item" onclick="toggle(\''+it.replace(/'/g,"\\'")+'\')"><span class="box'+(on?' on':'')+'">'+(on?'✓':'')+'</span><span>'+it+'</span></div>';
    });
    extra.forEach((it,i)=>{ const k='X|'+it; const on=!!state[k]; total++; if(on)done++;
      html+='<div class="item"><span class="box'+(on?' on':'')+'" onclick="toggle(\''+k.replace(/'/g,"\\'")+'\')">'+(on?'✓':'')+'</span><span onclick="toggle(\''+k.replace(/'/g,"\\'")+'\')">'+esc(it)+'</span><span class="x" onclick="delExtra('+i+')">✕</span></div>';
    });
    g('list').innerHTML=html;
    const pct=total?Math.round(done/total*100):0;
    g('pct').textContent=pct+'%'; g('bar').style.width=pct+'%';
  }
  render();
</script>
</body>
</html>
