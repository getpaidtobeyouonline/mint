<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testimonial Request Email Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Testimonial Request Email Tool</h1>
  <p class="sub">Specific questions get usable testimonials. Generate an email that does the work for them.</p>

  <div class="panel">
    <label for="prod">What they bought / worked on</label>
    <input id="prod" placeholder="e.g. The Pricing Toolkit">
    <label for="when">How long ago</label>
    <select id="when"><option>2-4 weeks ago</option><option>1-3 months ago</option><option>Recently completed a result</option></select>
    <label for="result">The transformation they likely got</label>
    <input id="result" placeholder="e.g. raised their prices and started landing more aligned clients">
    <button class="btn" onclick="gen()">Build Email</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['prod','when','result'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('tret_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('tret_'+k,g(k).value)); });
  function gen(){
    const p=v('prod')||'[product]', r=v('result')||'made real progress';
    const t='Subject: a quick favour (will take 2 mins)\n\nHey {first name},\n\nIt\'s been '+g('when').value.toLowerCase()+' since you went through '+p+'.\n\nIf it helped at all — would you mind answering 3 quick questions? I use the best answers (with your permission) to help others find this.\n\n1. Where were you stuck before '+p+'?\n2. What changed for you? (specifics are gold — numbers, time saved, a result)\n3. Who would you tell to try this?\n\nNo pressure to be polished — bullet points are perfect. Hit reply and send whatever comes out.\n\nThank you for going through it. Even if you don\'t reply, I am cheering for you.\n\n— [your name]\n\nP.S. If you got '+r+' (even partly), that is exactly the kind of story that helps others realise it is possible for them too.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ if(g('out').style.display==='none'){alert('Build it first.');return;} navigator.clipboard.writeText(g('out').textContent).then(()=>alert('Email copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
