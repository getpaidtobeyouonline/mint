<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Multiple Income Stream Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat { flex: 1; min-width: 120px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 13px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: #5AE57A; }
  .stat .l { font-size: .69rem; opacity: .65; text-transform: uppercase; }
  .stream { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 12px 15px; margin-bottom: 9px; }
  .stream .top { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; flex-wrap: wrap; }
  .stream .nm { font-weight: 500; }
  .stream .amt { font-family: 'Playfair Display', serif; color: #5AE57A; }
  .stream .meta { font-size: .8rem; opacity: .68; margin-top: 3px; }
  .bar { background: #3C603C; border-radius: 4px; height: 6px; overflow: hidden; margin-top: 5px; }
  .bar>i { display: block; height: 100%; background: #5AE57A; }
  .stream .x { cursor: pointer; opacity: .5; } .stream .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 16px 0; font-style: italic; }
  .warn { background:#2E4D2E;border:1px solid #4F8A55;border-radius:8px;padding:11px 14px;font-size:.86rem;margin-bottom:12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Multiple Income Stream Planner</h1>
  <p class="sub">Plan a real portfolio of income — active, passive, leveraged — and watch for over-concentration.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Stream name</label><input id="nm" placeholder="e.g. Day job / digital product / dividends"></div>
      <div><label>Type</label><select id="ty"><option value="Active">Active (your hours)</option><option value="Leveraged">Leveraged (semi-passive)</option><option value="Passive">Passive (scales w/o time)</option></select></div>
      <div><label>$/month</label><input id="amt" type="number" min="0"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="sTot">$0</div><div class="l">Total / mo</div></div>
    <div class="stat"><div class="v" id="sN">0</div><div class="l">Streams</div></div>
    <div class="stat"><div class="v" id="sPas">0%</div><div class="l">Passive + leveraged</div></div>
  </div>

  <div class="warn" id="warn" style="display:none"></div>
  <div id="list"></div>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim(), nu=id=>parseFloat(g(id).value)||0;
  let S=JSON.parse(localStorage.getItem('misp')||'[]');
  const save=()=>localStorage.setItem('misp',JSON.stringify(S));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ const nm=v('nm'); if(!nm){alert('Name the stream.');return;} S.push({nm,ty:g('ty').value,amt:nu('amt')}); ['nm','amt'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ S.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ S=[]; save(); render(); } }
  function render(){
    const tot=S.reduce((s,x)=>s+x.amt,0);
    const pas=S.filter(x=>x.ty!=='Active').reduce((s,x)=>s+x.amt,0);
    g('sTot').textContent='$'+Math.round(tot).toLocaleString();
    g('sN').textContent=S.length;
    g('sPas').textContent=tot>0?Math.round(pas/tot*100)+'%':'0%';
    const top=S.length?Math.max(...S.map(x=>x.amt))/tot:0;
    const W=g('warn');
    if(!S.length){ W.style.display='none'; }
    else if(top>0.7){ W.style.display='block'; W.innerHTML='⚠ <b>Single point of failure:</b> one stream is over 70% of your income. Diversification is risk management, not greed.'; }
    else if(pas/Math.max(1,tot)===0){ W.style.display='block'; W.innerHTML='⚠ All income is active — every dollar costs you time. Build one leveraged or passive stream.'; }
    else W.style.display='none';
    const L=g('list');
    if(!S.length){ L.innerHTML='<div class="empty">No streams yet — add your first.</div>'; return; }
    L.innerHTML=[...S].map((x,i)=>({x,i})).sort((a,b)=>b.x.amt-a.x.amt).map(({x,i})=>{ const share=tot>0?Math.round(x.amt/tot*100):0;
      return `<div class="stream"><div class="top"><span class="nm">${esc(x.nm)}</span><span class="amt">$${x.amt.toLocaleString()}/mo</span></div>
        <div class="meta">${x.ty} · ${share}% of income</div>
        <div class="bar"><i style="width:${share}%"></i></div>
        <div style="margin-top:6px;font-size:.78rem"><span class="x" onclick="del(${i})">✕ remove</span></div></div>`;
    }).join('');
  }
  render();
</script>
</body>
</html>
