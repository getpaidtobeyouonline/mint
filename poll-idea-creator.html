<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poll Idea Creator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #325132;
    color: #FFFFFF;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
    line-height: 1.6;
  }
  .container { max-width: 720px; margin: 0 auto; }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 2.8rem);
    color: #5AE57A;
    text-align: center;
    margin-bottom: 12px;
  }
  .subtitle {
    text-align: center;
    opacity: 0.8;
    margin-bottom: 32px;
    font-size: 1rem;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 24px;
  }
  .chip {
    background: transparent;
    color: #FFFFFF;
    border: 1px solid rgba(201, 168, 76, 0.4);
    padding: 8px 16px;
    border-radius: 999px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip:hover { border-color: #5AE57A; }
  .chip.active {
    background: #5AE57A;
    color: #325132;
    border-color: #5AE57A;
    font-weight: 500;
  }
  .generate-btn {
    display: block;
    margin: 0 auto 32px;
    background: #5AE57A;
    color: #325132;
    border: none;
    padding: 16px 40px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1.1rem;
    font-weight: 500;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,168,76,0.3); }
  .poll-card {
    background: rgba(201, 168, 76, 0.06);
    border: 1px solid rgba(201, 168, 76, 0.25);
    border-radius: 12px;
    padding: 28px 24px;
    margin-bottom: 16px;
  }
  .category-tag {
    display: inline-block;
    color: #5AE57A;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
    font-weight: 500;
  }
  .poll-question {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: #FFFFFF;
    line-height: 1.4;
    margin-bottom: 18px;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }
  .option {
    background: rgba(240, 235, 224, 0.05);
    border: 1px solid rgba(201, 168, 76, 0.2);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.95rem;
  }
  .insight {
    font-size: 0.85rem;
    color: rgba(240, 235, 224, 0.7);
    border-left: 2px solid #5AE57A;
    padding-left: 12px;
    font-style: italic;
  }
  .empty {
    text-align: center;
    opacity: 0.6;
    font-style: italic;
    padding: 40px 20px;
  }
  .actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .secondary-btn {
    background: transparent;
    color: #5AE57A;
    border: 1px solid #5AE57A;
    padding: 10px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .secondary-btn:hover { background: rgba(201, 168, 76, 0.1); }
  footer {
    text-align: center;
    margin-top: 60px;
    padding-top: 24px;
    border-top: 1px solid rgba(240, 235, 224, 0.1);
    font-size: 0.85rem;
    opacity: 0.6;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Poll Idea Creator</h1>
  <p class="subtitle">Stop posting bland "yes/no" polls. Generate ready-to-use polls with options, plus the insight you'll actually get from the results.</p>

  <div class="controls">
    <button class="chip active" data-cat="all">All</button>
    <button class="chip" data-cat="thisthat">This or That</button>
    <button class="chip" data-cat="buyer">Buyer Insight</button>
    <button class="chip" data-cat="opinion">Opinion</button>
    <button class="chip" data-cat="habit">Habits</button>
    <button class="chip" data-cat="fun">Fun</button>
  </div>

  <button class="generate-btn" id="generateBtn">Generate Poll</button>

  <div id="pollContainer">
    <div class="empty">Pick a vibe and tap generate to see your next poll.</div>
  </div>

  <div class="actions" id="actions" style="display:none;">
    <button class="secondary-btn" id="copyBtn">Copy Poll</button>
    <button class="secondary-btn" id="anotherBtn">Another One</button>
  </div>
</div>

<footer>Powered by GetPaidToBeYouOnline</footer>

<script>
  const polls = {
    thisthat: [
      { q: "Coffee or tea while you work?", o: ["Coffee", "Tea"], i: "Use the winner in your morning routine reels." },
      { q: "Mac or Windows for your daily setup?", o: ["Mac", "Windows"], i: "Tells you which tutorials your audience needs." },
      { q: "Notion or Apple Notes for everything?", o: ["Notion", "Apple Notes"], i: "Quick read on whether your audience over-systems or keeps it simple." },
      { q: "Inbox zero or inbox 47,000?", o: ["Zero — always", "Forty-seven thousand"], i: "Reveals the productivity style of your audience." }
    ],
    buyer: [
      { q: "Free workshop or paid mini-course — which do you actually finish?", o: ["Free workshop", "Paid mini-course"], i: "Tells you whether to lead with free or paid offers." },
      { q: "$27 ebook or $97 course — what feels safer to buy first?", o: ["$27 ebook", "$97 course"], i: "Maps your audience's price ceiling for first-time buyers." },
      { q: "Would you rather pay once or pay monthly?", o: ["One-time payment", "Monthly subscription"], i: "Critical answer if you're deciding membership vs. product." },
      { q: "Live cohort or self-paced — what actually gets done?", o: ["Live cohort", "Self-paced"], i: "Use the winning format for your next launch." },
      { q: "What stops you from buying — price or unclear outcome?", o: ["The price", "Unclear outcome"], i: "If 'outcome' wins, rewrite your sales page first." }
    ],
    opinion: [
      { q: "Should creators show their face on camera in 2026?", o: ["Yes — always", "No — work speaks"], i: "Pure debate fuel for comments." },
      { q: "Is daily posting still the move?", o: ["Yes, daily wins", "Quality > frequency"], i: "Stake your own flag in the caption." },
      { q: "Best place to grow right now?", o: ["Instagram", "Threads", "LinkedIn", "X"], i: "Doubles as market research for your next platform bet." },
      { q: "Email list or community app — where do you actually engage?", o: ["Email list", "Community app"], i: "Tells you where to invest your top-of-funnel energy." }
    ],
    habit: [
      { q: "Morning person or night owl for deep work?", o: ["Morning", "Night"], i: "Schedule your live workshops based on the winner." },
      { q: "Plan the night before or wing it day-of?", o: ["Plan the night before", "Wing it"], i: "Reveals if your audience needs templates or frameworks." },
      { q: "Calendar blocking or to-do list?", o: ["Calendar blocks", "To-do list"], i: "Pitch the opposite method as your hot take." },
      { q: "Phone in another room while you work — or not?", o: ["Another room", "Right next to me"], i: "Sets up a focus-tips post your audience will save." }
    ],
    fun: [
      { q: "Hot take: pineapple on pizza?", o: ["Yes", "Absolutely not"], i: "Light filler. Use when engagement has been heavy lately." },
      { q: "Which would you rather give up for a month — coffee or social media?", o: ["Coffee", "Social media"], i: "Surprising answers either way. Comment goldmine." },
      { q: "Be 10 minutes early or right on time?", o: ["10 minutes early", "Right on time"], i: "Reveals personality types in your audience." },
      { q: "Read the book or watch the movie?", o: ["Book", "Movie"], i: "Easy weekend post. Pairs well with a book recommendation." }
    ]
  };

  const catLabels = { thisthat: 'This or That', buyer: 'Buyer Insight', opinion: 'Opinion', habit: 'Habits', fun: 'Fun' };

  let activeCat = 'all';
  let lastQ = null;

  const chips = document.querySelectorAll('.chip');
  const generateBtn = document.getElementById('generateBtn');
  const container = document.getElementById('pollContainer');
  const actions = document.getElementById('actions');
  const copyBtn = document.getElementById('copyBtn');
  const anotherBtn = document.getElementById('anotherBtn');

  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      chips.forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeCat = chip.dataset.cat;
    });
  });

  function pickPoll() {
    let pool = [];
    if (activeCat === 'all') {
      for (const cat in polls) polls[cat].forEach(x => pool.push({ ...x, cat }));
    } else {
      polls[activeCat].forEach(x => pool.push({ ...x, cat: activeCat }));
    }
    let pick;
    do { pick = pool[Math.floor(Math.random() * pool.length)]; }
    while (pool.length > 1 && pick.q === lastQ);
    lastQ = pick.q;
    return pick;
  }

  function render() {
    const pick = pickPoll();
    const optionsHTML = pick.o.map(o => `<div class="option">${o}</div>`).join('');
    container.innerHTML = `
      <div class="poll-card">
        <span class="category-tag">${catLabels[pick.cat]}</span>
        <div class="poll-question">${pick.q}</div>
        <div class="options">${optionsHTML}</div>
        <div class="insight">What you'll learn: ${pick.i}</div>
      </div>
    `;
    actions.style.display = 'flex';
  }

  generateBtn.addEventListener('click', render);
  anotherBtn.addEventListener('click', render);

  copyBtn.addEventListener('click', () => {
    if (!lastQ) return;
    const pool = Object.values(polls).flat();
    const current = pool.find(p => p.q === lastQ);
    const text = `${current.q}\n\n` + current.o.map(o => `• ${o}`).join('\n');
    navigator.clipboard.writeText(text).then(() => {
      const original = copyBtn.textContent;
      copyBtn.textContent = 'Copied!';
      setTimeout(() => copyBtn.textContent = original, 1500);
    });
  });
</script>
</body>
</html>
