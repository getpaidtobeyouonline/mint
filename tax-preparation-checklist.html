<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tax Preparation Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  .score { text-align: center; background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 16px; margin-bottom: 16px; position: sticky; top: 12px; }
  .score .n { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; }
  .track { background: #3C603C; border-radius: 5px; height: 8px; overflow: hidden; margin-top: 8px; }
  .track>i { display: block; height: 100%; background: #5AE57A; transition: width .25s; }
  .sec { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 16px 18px; margin-bottom: 14px; }
  .sec h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.05rem; margin-bottom: 6px; }
  .chk { display: flex; gap: 11px; padding: 8px 0; border-top: 1px solid #3C603C; cursor: pointer; }
  .chk:first-of-type { border-top: none; }
  .box { flex: none; width: 21px; height: 21px; border: 1px solid #BFD8BF; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: .8rem; margin-top: 2px; }
  .chk.on .box { background: #5AE57A; border-color: #5AE57A; color: #325132; }
  .chk.on .t { opacity: .5; text-decoration: line-through; }
  .t { font-size: .92rem; }
  .btn { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; cursor: pointer; font-size: .9rem; padding: 10px 18px; border-radius: 8px; margin-top: 14px; font-family:'DM Sans',sans-serif; }
  .note { font-size: .78rem; opacity: .55; margin: 10px 0; text-align: center; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Tax Preparation Checklist</h1>
  <p class="sub">A clean prep checklist so tax time is admin, not panic.</p>

  <div class="note">General guidance — confirm exact requirements with a tax professional for your jurisdiction.</div>
  <div class="score"><div class="n" id="pct">0%</div><div class="track"><i id="bar" style="width:0%"></i></div></div>
  <div id="list"></div>
  <button class="btn" onclick="reset()">Reset</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const DATA=[
    ["Income docs",[
      ["Employer wage / salary statements","Annual statements from every employer."],
      ["Self-employed / freelance income totals","From every client / platform."],
      ["Interest, dividend, capital gains statements","From every brokerage / bank."],
      ["Side hustle / marketplace payouts","Etsy, Stripe, PayPal, etc."],
      ["Rental income (if any)",""]]],
    ["Deduction docs",[
      ["Business expense receipts categorised",""],
      ["Home office records (if applicable)",""],
      ["Mileage / vehicle log",""],
      ["Charitable donation receipts",""],
      ["Education-related expenses",""],
      ["Health-care / medical expenses",""]]],
    ["Personal info",[
      ["IDs / tax IDs / dependants info",""],
      ["Last year's return (for reference)",""],
      ["Bank details for direct deposit / payment",""]]],
    ["Final pass",[
      ["All amounts cross-checked against statements",""],
      ["Filed (or sent to your preparer) before deadline",""],
      ["Copy of filed return saved",""],
      ["Refund / payment received & reconciled",""]]]
  ];
  const flat=[]; DATA.forEach(([s,it])=>it.forEach(([t,h])=>flat.push({s,t,h})));
  let st=JSON.parse(localStorage.getItem('tpc')||'[]'); if(st.length!==flat.length)st=flat.map(()=>false);
  const g=id=>document.getElementById(id);
  function render(){
    let i=-1;
    g('list').innerHTML=DATA.map(([s,it])=>`<div class="sec"><h3>${s}</h3>`+it.map(([t,h])=>{
      i++; const idx=i;
      return `<div class="chk ${st[idx]?'on':''}" data-i="${idx}"><div class="box">${st[idx]?'✓':''}</div><div class="t">${t}${h?`<div style="opacity:.6;font-size:.8rem">${h}</div>`:''}</div></div>`;
    }).join('')+`</div>`).join('');
    g('list').querySelectorAll('.chk').forEach(e=>e.onclick=()=>{ const k=+e.dataset.i; st[k]=!st[k]; localStorage.setItem('tpc',JSON.stringify(st)); render(); });
    const d=st.filter(Boolean).length, p=Math.round(d/flat.length*100);
    g('pct').textContent=p+'%'; g('bar').style.width=p+'%';
  }
  function reset(){ if(confirm('Reset?')){ st=flat.map(()=>false); localStorage.setItem('tpc',JSON.stringify(st)); render(); } }
  render();
</script>
</body>
</html>
