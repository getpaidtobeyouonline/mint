<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Automation Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 740px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2.1rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .76rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 13px 0 5px; }
  .hint { text-transform: none; letter-spacing: 0; opacity: .55; font-size: .8rem; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .96rem; padding: 10px 12px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  textarea { min-height: 56px; }
  input[type=range] { padding: 0; accent-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 22px; margin-bottom: 18px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; }
  .grid > div { flex: 1; min-width: 150px; }
  .stats { display: flex; gap: 12px; flex-wrap: wrap; }
  .stat { flex: 1; min-width: 140px; background: #2A442A; border: 1px solid #5A845A; border-radius: 10px; padding: 15px; text-align: center; }
  .stat .n { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: #5AE57A; }
  .stat .l { font-size: .73rem; opacity: .65; text-transform: uppercase; letter-spacing: .04em; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: .95rem; padding: 12px 22px; border-radius: 8px; margin: 16px 8px 0 0; }
  .btn:hover { opacity: .9; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-size: .9rem; font-family: 'DM Sans', sans-serif; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.7rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>AI Automation Planner</h1>
  <p class="sub">Map a repetitive task into an AI-powered workflow — and see exactly how many hours it buys you back.</p>

  <div class="panel">
    <label for="name">Task to automate</label>
    <input id="name" placeholder="e.g. Turning meeting notes into follow-up emails">

    <label for="trigger">What kicks it off (the trigger)?</label>
    <input id="trigger" placeholder="e.g. A call ends and notes are saved">

    <div class="grid">
      <div><label for="runs">Times per month</label><input id="runs" type="number" min="0" value="20" oninput="calc()"></div>
      <div><label for="mins">Minutes per run (manual)</label><input id="mins" type="number" min="0" value="15" oninput="calc()"></div>
    </div>

    <label for="auto">How much of it AI can handle: <span id="aval" style="color:#5AE57A">75%</span></label>
    <input id="auto" type="range" min="10" max="95" value="75" oninput="calc()">

    <label for="steps">The steps today <span class="hint">(one per line, in order)</span></label>
    <textarea id="steps" placeholder="Open notes&#10;Pull out action items&#10;Draft an email per person&#10;Send"></textarea>

    <label for="ai">Where AI does the thinking</label>
    <textarea id="ai" placeholder="The step(s) that need judgment, e.g. extract and phrase the follow-ups"></textarea>

    <label for="tools">Tools / context available</label>
    <textarea id="tools" placeholder="e.g. Gmail, a chat LLM, a Zapier account"></textarea>

    <label for="out">Definition of done</label>
    <textarea id="out2" placeholder="What good output looks like"></textarea>
  </div>

  <div class="panel">
    <div class="stats">
      <div class="stat"><div class="n" id="mHrs">0</div><div class="l">Hours / month</div></div>
      <div class="stat"><div class="n" id="yHrs">0</div><div class="l">Hours / year</div></div>
      <div class="stat"><div class="n" id="wWks">0</div><div class="l">Work-weeks / year</div></div>
    </div>
  </div>

  <button class="btn" onclick="build()">Generate Blueprint</button>
  <button class="btn ghost" onclick="copyB()">Copy</button>
  <button class="btn ghost" onclick="dlMd()">Download .md</button>

  <pre id="result" style="display:none"></pre>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F = ['name','trigger','runs','mins','auto','steps','ai','tools','out2'];
  F.forEach(id => { const s = localStorage.getItem('aap_'+id); if (s!==null) document.getElementById(id).value = s; });
  F.forEach(id => document.getElementById(id).addEventListener('input', save));
  function save() { F.forEach(id => localStorage.setItem('aap_'+id, document.getElementById(id).value)); }
  const v = id => document.getElementById(id).value.trim();
  const lines = id => v(id).split('\n').map(s=>s.trim()).filter(Boolean);

  function metrics() {
    const runs = +v('runs')||0, mins = +v('mins')||0, auto = +document.getElementById('auto').value;
    const savedMin = mins * (auto/100) * runs;
    const mH = savedMin/60, yH = mH*12;
    return { mH, yH, wWks: yH/40, auto };
  }
  function calc() {
    const m = metrics();
    document.getElementById('aval').textContent = document.getElementById('auto').value + '%';
    document.getElementById('mHrs').textContent = m.mH.toFixed(1);
    document.getElementById('yHrs').textContent = Math.round(m.yH);
    document.getElementById('wWks').textContent = m.wWks.toFixed(1);
    save();
  }

  function blueprint() {
    const m = metrics(), steps = lines('steps');
    return `# Automation Blueprint: ${v('name')||'Untitled Task'}\n\n`+
      `**Trigger:** ${v('trigger')||'(not set)'}\n`+
      `**Frequency:** ${v('runs')||0}×/month at ~${v('mins')||0} min each\n`+
      `**AI coverage:** ${m.auto}%\n\n`+
      `## Time reclaimed\n~${m.mH.toFixed(1)} hrs/month · ~${Math.round(m.yH)} hrs/year (${m.wWks.toFixed(1)} work-weeks)\n\n`+
      `## Current process\n${steps.length?steps.map((s,i)=>`${i+1}. ${s}`).join('\n'):'(not mapped)'}\n\n`+
      `## Where AI does the thinking\n${v('ai')||'(not set)'}\n\n`+
      `## Tools available\n${v('tools')||'(not set)'}\n\n`+
      `## Definition of done\n${v('out2')||'(not set)'}\n\n`+
      `## Start here\n${steps.length?`Automate step ${pickFirst(steps)} first — it's the cleanest win. Prove it, then chain the rest.`:'Map the steps above, then automate the most repetitive one first.'}\n\n`+
      `---\n## Instructions for Claude\nDesign this automation end to end. Confirm the trigger, lay out each step with the exact tool/prompt to use, write the AI prompt for the thinking step, and define how to verify the output meets "done". Flag the riskiest step and a fallback. Ask clarifying questions before finalizing.`;
  }
  function pickFirst(steps) {
    // smallest/most mechanical step ≈ shortest description
    let bi = 0; steps.forEach((s,i)=>{ if (s.length < steps[bi].length) bi = i; });
    return bi+1;
  }

  function build() {
    if (!v('name')) { alert('Name the task first.'); return; }
    const r = document.getElementById('result');
    r.textContent = blueprint();
    r.style.display = 'block';
    r.scrollIntoView({ behavior: 'smooth' });
  }
  function copyB() {
    navigator.clipboard.writeText(blueprint()).then(
      ()=>alert('Blueprint copied — paste it into Claude.'),
      ()=>alert('Copy failed.'));
  }
  function dlMd() {
    const n = (v('name')||'automation-blueprint').toLowerCase().replace(/[^a-z0-9]+/g,'-');
    const b = new Blob([blueprint()], { type:'text/markdown' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = n+'.md'; a.click(); URL.revokeObjectURL(a.href);
  }

  calc();
</script>
</body>
</html>
