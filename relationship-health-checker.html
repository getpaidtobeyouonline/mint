<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Relationship Health Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .q { font-size: .92rem; margin-bottom: 6px; }
  .q b { color: #5AE57A; }
  .opts { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .opt { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 6px 12px; font-size: .82rem; cursor: pointer; }
  .opt.on { background: #5AE57A; color: #325132; border-color: #5AE57A; font-weight: 500; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; }
  .result { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; margin-top: 14px; display: none; }
  .result .score { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; }
  .result h3 { font-family: 'Playfair Display', serif; color: #5AE57A; }
  .result li { font-size: .9rem; margin-left: 16px; margin-top: 3px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Relationship Health Checker</h1>
  <p class="sub">A gentle check-in on the connection. Answer honestly — it is just for you.</p>

  <div class="panel" id="quiz"></div>
  <div class="result" id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const Q=["We <b>communicate openly</b>, even about hard things","I feel <b>respected and valued</b> by my partner","We make real <b>time for each other</b>","We handle <b>conflict</b> without it turning cruel","I feel <b>emotionally safe</b> in this relationship","We still <b>show affection and appreciation</b>","We are <b>aligned</b> on the things that matter long term","I can be <b>fully myself</b> around them"];
  const SCALE=["Rarely","Sometimes","Often","Almost always"];
  let ans=Array(Q.length).fill(-1);
  function draw(){
    g('quiz').innerHTML=Q.map((q,i)=>'<div class="q">'+(i+1)+'. '+q+'</div><div class="opts">'+
      SCALE.map((s,j)=>'<span class="opt'+(ans[i]===j?' on':'')+'" onclick="pick('+i+','+j+')">'+s+'</span>').join('')+'</div>').join('')+
      '<button class="btn" onclick="score()">See My Check-In</button>';
  }
  function pick(i,j){ ans[i]=j; draw(); }
  function score(){
    if(ans.includes(-1)){ alert('Answer all eight questions.'); return; }
    const total=ans.reduce((s,x)=>s+x,0), pct=Math.round(total/(Q.length*3)*100);
    let title,lines;
    if(pct>=80){ title="Strong and healthy";
      lines=["The foundations are solid — communication, respect, safety.","Keep investing; strong relationships are maintained, not finished.","Name what is working out loud so you both keep doing it."]; }
    else if(pct>=55){ title="Good, with room to grow";
      lines=["Real strengths here, and a couple of areas worth attention.","Look at your lowest answers — pick one to talk about this week.","Small, consistent effort beats grand gestures."]; }
    else if(pct>=35){ title="Strained — worth real attention";
      lines=["Several areas feel thin right now. That is information, not a verdict.","Have one honest, kind conversation about what you both need.","Consider whether outside support could help you reconnect."]; }
    else { title="Struggling — please get support";
      lines=["This check-in suggests the relationship is under real strain.","You deserve to feel safe, valued and heard.","Talking to a couples counsellor or trusted person could help — please reach out."]; }
    g('out').style.display='block';
    g('out').innerHTML='<div class="score">'+pct+'%</div><h3>'+title+'</h3><ul>'+lines.map(x=>'<li>'+x+'</li>').join('')+'</ul>';
    g('out').scrollIntoView({behavior:'smooth'});
  }
  draw();
</script>
</body>
</html>
