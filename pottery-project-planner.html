<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Pottery Project Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Pottery Project Planner</h1>
  <p class="sub">From clay to fired piece — plan each stage with intention.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="form">The form</label><input id="form" placeholder="e.g. mug, vase, bowl"></div>
      <div><label for="method">Method</label><input id="method" placeholder="Wheel, hand-built, slab, coil"></div>
    </div>
    <label for="clay">Clay body</label>
    <input id="clay" placeholder="Stoneware, porcelain, earthenware">
    <label for="size">Finished size &amp; quantity</label>
    <input id="size" placeholder="e.g. four 12cm bowls">
    <label for="surface">Surface treatment</label>
    <textarea id="surface" placeholder="Carving, slip, oxide, burnishing"></textarea>
    <label for="glaze">Glaze plan</label>
    <input id="glaze" placeholder="Glazes, dips, brush work">
    <label for="firing">Firing schedule</label>
    <input id="firing" placeholder="Bisque temperature, glaze temperature">
    <button class="btn" onclick="gen()">Build Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['form','method','clay','size','surface','glaze','firing'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('ptp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('ptp_'+k,g(k).value)); });
  function gen(){
    const t='POTTERY PROJECT PLAN\n\nFORM: '+(v('form')||'[the piece]')+'  ·  '+(v('method')||'[method]')+
    '\n\nCLAY: '+(v('clay')||'[clay body]')+'\nSIZE & QTY: '+(v('size')||'[size and how many]')+
    '\n\nSURFACE TREATMENT:\n'+(v('surface')||'[carving, slip, oxide]')+
    '\n\nGLAZE PLAN:\n'+(v('glaze')||'[glazes and application]')+
    '\n\nFIRING SCHEDULE:\n'+(v('firing')||'[bisque + glaze temperatures]')+
    '\n\n--- Studio tips ---\nMake test tiles for new glaze and clay combinations.\nDry slowly and evenly — cracks come from rushing.\nLabel each piece with maker mark and date — your future self will thank you.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
