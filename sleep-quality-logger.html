<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Quality Logger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input[type=range] { padding: 0; accent-color: #5AE57A; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat { flex: 1; min-width: 120px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 13px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #5AE57A; }
  .stat .l { font-size: .69rem; opacity: .65; text-transform: uppercase; }
  .barwrap { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; font-size: .82rem; }
  .barwrap .lb { width: 80px; flex: none; opacity: .8; }
  .barwrap .tr { flex: 1; background: #3C603C; border-radius: 4px; height: 13px; overflow: hidden; }
  .barwrap .tr>i { display: block; height: 100%; background: #5AE57A; }
  .barwrap .pc { width: 70px; text-align: right; flex: none; }
  .row2 { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 8px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: .85rem; gap: 10px; }
  .row2 .x { cursor: pointer; opacity: .5; } .row2 .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Sleep Quality Logger</h1>
  <p class="sub">Log hours and quality each morning. The pattern shows what helps you sleep.</p>

  <div class="panel">
    <div class="row">
      <div><label>Date</label><input id="dt" type="date"></div>
      <div><label>Hours slept</label><input id="hrs" type="number" min="0" max="24" step="0.5"></div>
      <div style="flex:2"><label>Quality (1-10): <span id="qv" style="color:#5AE57A">7</span></label><input id="ql" type="range" min="1" max="10" value="7" oninput="document.getElementById('qv').textContent=this.value"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Log</button></div>
    </div>
    <input id="note" placeholder="What affected it? (caffeine, screen, stress, etc.)" style="margin-top:8px">
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="sH">—</div><div class="l">Avg hours</div></div>
    <div class="stat"><div class="v" id="sQ">—</div><div class="l">Avg quality</div></div>
    <div class="stat"><div class="v" id="sN">0</div><div class="l">Nights logged</div></div>
  </div>

  <div class="panel" id="chartW" style="display:none">
    <div style="font-family:'Playfair Display',serif;color:#5AE57A;margin-bottom:8px">Recent nights</div>
    <div id="chart"></div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('sql')||'[]');
  const save=()=>localStorage.setItem('sql',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  g('dt').value=new Date().toISOString().slice(0,10);
  function add(){ const h=parseFloat(g('hrs').value)||0; if(!h){alert('Enter hours slept.');return;}
    const d=g('dt').value||new Date().toISOString().slice(0,10);
    const ex=R.find(x=>x.d===d); const o={d,h,q:+g('ql').value,note:v('note')};
    if(ex)Object.assign(ex,o); else R.push(o);
    ['hrs','note'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ R=[]; save(); render(); } }
  function render(){
    g('sN').textContent=R.length;
    if(R.length){
      g('sH').textContent=(R.reduce((s,x)=>s+x.h,0)/R.length).toFixed(1);
      g('sQ').textContent=(R.reduce((s,x)=>s+x.q,0)/R.length).toFixed(1);
      g('chartW').style.display='block';
      g('chart').innerHTML=[...R].sort((a,b)=>a.d<b.d?-1:1).slice(-10).map(x=>`<div class="barwrap"><span class="lb">${x.d.slice(5)}</span><div class="tr"><i style="width:${x.q*10}%"></i></div><span class="pc">${x.h}h · ${x.q}/10</span></div>`).join('');
    } else { g('sH').textContent=g('sQ').textContent='—'; g('chartW').style.display='none'; }
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No nights logged yet.</div>'; return; }
    L.innerHTML=[...R].map((x,i)=>({x,i})).sort((a,b)=>a.x.d<b.x.d?1:-1).map(({x,i})=>`<div class="row2"><span><b style="color:#5AE57A">${x.d}</b> · ${x.h}h · ${x.q}/10${x.note?' · '+esc(x.note):''}</span><span class="x" onclick="del(${i})">✕</span></div>`).join('');
  }
  render();
</script>
</body>
</html>
