<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscription Cost Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat { flex: 1; min-width: 120px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 13px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: #5AE57A; }
  .stat .l { font-size: .69rem; opacity: .65; text-transform: uppercase; }
  .sub2 { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 7px; padding: 9px 13px; margin-bottom: 6px; display: flex; justify-content: space-between; gap: 10px; font-size: .87rem; flex-wrap: wrap; align-items: center; }
  .sub2.cut { border-left-color: #5AE57A; opacity: .7; }
  .tag { font-size: .72rem; padding: 1px 8px; border-radius: 20px; border: 1px solid #5AE57A; color: #5AE57A; cursor: pointer; }
  .tag.cut { border-color: #5AE57A; color: #5AE57A; }
  .sub2 .x { cursor: pointer; opacity: .5; } .sub2 .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Subscription Cost Calculator</h1>
  <p class="sub">Subscriptions add up silently. Total yours, mark what to cut, see the savings.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Subscription</label><input id="nm" placeholder="e.g. Netflix"></div>
      <div><label>$/mo</label><input id="mo" type="number" min="0" step="0.01"></div>
      <div><label>Billing</label><select id="bi"><option value="1">Monthly</option><option value="12">Yearly (÷12)</option></select></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="sMo">$0</div><div class="l">/ month</div></div>
    <div class="stat"><div class="v" id="sYr">$0</div><div class="l">/ year</div></div>
    <div class="stat"><div class="v" id="sCut">$0</div><div class="l">if you cut tagged</div></div>
  </div>

  <div id="list"></div>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let S=JSON.parse(localStorage.getItem('scc')||'[]');
  const save=()=>localStorage.setItem('scc',JSON.stringify(S));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ const nm=v('nm'); const a=parseFloat(g('mo').value)||0; if(!nm||!a){alert('Add name and price.');return;}
    const monthly=a/parseFloat(g('bi').value); S.push({nm,mo:monthly,cut:false}); ['nm','mo'].forEach(k=>g(k).value=''); save(); render(); }
  function cyc(i){ S[i].cut=!S[i].cut; save(); render(); }
  function del(i){ S.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ S=[]; save(); render(); } }
  function render(){
    const tot=S.reduce((s,x)=>s+x.mo,0), cut=S.filter(x=>x.cut).reduce((s,x)=>s+x.mo,0);
    g('sMo').textContent='$'+tot.toFixed(2);
    g('sYr').textContent='$'+Math.round(tot*12).toLocaleString();
    g('sCut').textContent='$'+Math.round(cut*12).toLocaleString()+'/yr';
    const L=g('list');
    if(!S.length){ L.innerHTML='<div class="empty">No subscriptions added yet.</div>'; return; }
    L.innerHTML=[...S].map((x,i)=>({x,i})).sort((a,b)=>b.x.mo-a.x.mo).map(({x,i})=>`<div class="sub2 ${x.cut?'cut':''}"><span>${esc(x.nm)}${x.cut?' <span style="opacity:.7;font-size:.78rem">— marked to cut</span>':''}</span><span>$${x.mo.toFixed(2)}/mo <span class="tag ${x.cut?'cut':''}" onclick="cyc(${i})">${x.cut?'cutting':'keep'}</span> <span class="x" onclick="del(${i})">✕</span></span></div>`).join('');
  }
  render();
</script>
</body>
</html>
