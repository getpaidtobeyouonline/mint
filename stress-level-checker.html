<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Stress Level Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  .q { background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
  .q span { flex: 1; min-width: 220px; font-size: .92rem; }
  select { background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .85rem; padding: 7px 9px; border-radius: 7px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .95rem; padding: 13px 26px; border-radius: 8px; margin: 8px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .res { text-align: center; background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 22px; margin: 18px 0; }
  .res .n { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: #5AE57A; line-height: 1; }
  .res .vd { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: #5AE57A; margin-top: 5px; }
  .res .d { opacity: .85; font-size: .92rem; margin-top: 6px; }
  .fix { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 12px 15px; margin-bottom: 9px; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Stress Level Checker</h1>
  <p class="sub">A quick 10-signal check-in. Awareness is the first step to lowering the load.</p>

  <div id="form"></div>
  <button class="btn" onclick="run()">Check My Stress</button>
  <button class="btn ghost" onclick="reset()">Reset</button>
  <div id="res"></div>
  <footer>Powered by GetPaidToBeYouOnline · Not a medical assessment — see a professional if stress is affecting daily life</footer>
</div>

<script>
  const Q=[
    "My sleep has been disrupted lately",
    "I feel tension in my body (jaw, shoulders, gut)",
    "I'm more irritable or short-tempered than usual",
    "My mind races or won't switch off",
    "I'm relying more on caffeine, sugar, alcohol or screens",
    "I feel behind no matter how much I do",
    "I've withdrawn from people or things I enjoy",
    "Small problems feel bigger than they are",
    "I struggle to concentrate or finish tasks",
    "I rarely feel genuinely rested or calm"
  ];
  const TIP=[
    ["Box breathing — 5 minutes","Inhale 4, hold 4, exhale 4, hold 4. It physically downshifts your nervous system."],
    ["Name the top stressor","Write the single biggest stressor and one small action you can take on it today."],
    ["Protect one recovery block","Schedule 30 device-free minutes today and defend it like a meeting."],
    ["Move your body","A 15-minute walk metabolises stress hormones better than thinking about it."],
    ["Talk to one person","Saying it out loud to someone you trust reduces the load measurably."]
  ];
  const g=id=>document.getElementById(id);
  g('form').innerHTML=Q.map((q,i)=>`<div class="q"><span>${q}</span>
    <select id="q${i}"><option value="0">Rarely</option><option value="1">Sometimes</option><option value="2">Often</option><option value="3">Almost always</option></select></div>`).join('');
  const saved=JSON.parse(localStorage.getItem('slc')||'{}');
  Q.forEach((_,i)=>{ if(saved[i])g('q'+i).value=saved[i]; g('q'+i).addEventListener('change',()=>{ const o={};Q.forEach((_,j)=>o[j]=g('q'+j).value); localStorage.setItem('slc',JSON.stringify(o)); }); });
  function run(){
    const sc=Q.reduce((s,_,i)=>s+ +g('q'+i).value,0);
    const pct=Math.round(sc/(Q.length*3)*100);
    const vd= pct>=70?['High load','Your system is running hot. Recovery is not optional right now.']:pct>=45?['Elevated','Real strain building. Add recovery before it tips over.']:pct>=22?['Moderate','Normal ups and downs — keep the basics protected.']:['Low','You are managing well. Keep doing what works.'];
    g('res').innerHTML='<div class="res"><div class="n">'+pct+'%</div><div class="vd">'+vd[0]+'</div><div class="d">'+vd[1]+'</div></div>'+
      '<h3 style="font-family:\'Playfair Display\',serif;color:#5AE57A;margin:0 0 10px">Do one of these today</h3>'+
      TIP.map(t=>'<div class="fix"><b style="color:#5AE57A">'+t[0]+'</b><br>'+t[1]+'</div>').join('');
    g('res').scrollIntoView({behavior:'smooth'});
  }
  function reset(){ if(confirm('Reset?')){ localStorage.removeItem('slc'); Q.forEach((_,i)=>g('q'+i).value='0'); g('res').innerHTML=''; } }
</script>
</body>
</html>
