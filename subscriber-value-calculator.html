<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscriber Value Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 10px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .res { text-align: center; background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 10px; padding: 20px; }
  .res .n { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: #5AE57A; line-height: 1; }
  .res .l { font-size: .85rem; opacity: .7; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
  .stat { flex: 1; min-width: 110px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 12px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: #5AE57A; }
  .stat .l { font-size: .68rem; opacity: .65; text-transform: uppercase; }
  .note { font-size: .85rem; opacity: .78; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Subscriber Value Calculator</h1>
  <p class="sub">Know what one subscriber is worth — then you know exactly what you can spend to get one.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="rev">Total revenue from email (period)</label><input id="rev" type="number" min="0" value="6000" oninput="calc()"></div>
      <div><label for="subs">Subscribers in that period</label><input id="subs" type="number" min="1" value="2000" oninput="calc()"></div>
    </div>
    <div class="grid">
      <div><label for="months">Period length (months)</label><input id="months" type="number" min="1" value="12" oninput="calc()"></div>
      <div><label for="cost">Cost to acquire a subscriber ($)</label><input id="cost" type="number" min="0" step="0.01" value="1.50" oninput="calc()"></div>
    </div>
  </div>

  <div class="res">
    <div class="n" id="val">$0</div>
    <div class="l">value per subscriber (this period)</div>
    <div class="stats">
      <div class="stat"><div class="v" id="mo">$0</div><div class="l">/sub/month</div></div>
      <div class="stat"><div class="v" id="roi">—</div><div class="l">Acquisition ROI</div></div>
      <div class="stat"><div class="v" id="max">$0</div><div class="l">Max you can pay</div></div>
    </div>
    <div class="note" id="note"></div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), n=id=>parseFloat(g(id).value)||0;
  ['rev','subs','months','cost'].forEach(k=>{ const s=localStorage.getItem('svc7_'+k); if(s!==null)g(k).value=s; });
  function calc(){
    ['rev','subs','months','cost'].forEach(k=>localStorage.setItem('svc7_'+k,g(k).value));
    const subs=Math.max(1,n('subs')), val=n('rev')/subs, mo=val/Math.max(1,n('months'));
    g('val').textContent='$'+val.toFixed(2);
    g('mo').textContent='$'+mo.toFixed(2);
    const cost=n('cost');
    g('roi').textContent= cost>0 ? Math.round((val-cost)/cost*100)+'%' : '∞';
    g('max').textContent='$'+(val*0.5).toFixed(2);
    g('note').textContent = cost>0 && val>cost
      ? `Each subscriber returns $${val.toFixed(2)} and costs $${cost.toFixed(2)} — profitable. You could safely pay up to ~$${(val*0.5).toFixed(2)} to acquire one (keeping a margin) and still win.`
      : cost>0 ? `You are paying $${cost.toFixed(2)} but a subscriber only returns $${val.toFixed(2)}. Fix monetisation (offer, sequence) before spending to grow the list.`
      : 'Add an acquisition cost to see if paid growth would be profitable.';
  }
  calc();
</script>
</body>
</html>
