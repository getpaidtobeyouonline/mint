<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sacred Space Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Sacred Space Designer</h1>
  <p class="sub">Design a small corner of your home that calls you back to stillness.</p>

  <div class="panel">
    <label for="where">The space</label>
    <input id="where" placeholder="e.g. a corner of the bedroom, a windowsill, a chair">
    <label for="purpose">Its purpose</label>
    <input id="purpose" placeholder="e.g. meditation, prayer, journaling, simply pausing">
    <label for="elements">Elements to include</label>
    <textarea id="elements" placeholder="Objects, textures, plants, a candle, meaningful items"></textarea>
    <label for="senses">Light, scent and sound</label>
    <textarea id="senses" placeholder="How you want it to feel to the senses"></textarea>
    <label for="ritual">A small ritual to enter the space</label>
    <input id="ritual" placeholder="e.g. light a candle, take three breaths">
    <button class="btn" onclick="gen()">Build Design</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['where','purpose','elements','senses','ritual'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('ssd_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('ssd_'+k,g(k).value)); });
  function gen(){
    const t='SACRED SPACE DESIGN\n\nTHE SPACE:\n'+(v('where')||'[your chosen corner]')+
    '\n\nITS PURPOSE:\n'+(v('purpose')||'[what it is for]')+
    '\n\nELEMENTS:\n'+(v('elements')||'[objects and meaningful items]')+
    '\n\nLIGHT, SCENT & SOUND:\n'+(v('senses')||'[how it feels to the senses]')+
    '\n\nRITUAL TO ENTER:\n'+(v('ritual')||'[a small threshold ritual]')+
    '\n\n--- Designing sacred space ---\nIt does not need to be large — only set apart and tended with care.\nKeep it clear of clutter and everyday tasks.\nLet it hold only what nourishes you. Refresh it with the seasons.\nThe space becomes sacred through the attention you bring to it.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
