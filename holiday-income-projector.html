<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holiday Income Projector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 10px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
  .stat { flex: 1; min-width: 120px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 13px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: #5AE57A; }
  .stat .l { font-size: .69rem; opacity: .65; text-transform: uppercase; }
  .res { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 10px; padding: 18px; }
  .row { display: flex; justify-content: space-between; padding: 5px 0; border-top: 1px solid #4C724C; font-size: .9rem; }
  .row:first-of-type { border-top: none; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Holiday Income Projector</h1>
  <p class="sub">Project Q4 income across the holiday calendar — Black Friday, Christmas, Boxing Day, New Year.</p>

  <div class="panel">
    <label for="base">Your normal monthly revenue ($)</label>
    <input id="base" type="number" min="0" value="5000" oninput="calc()">
    <div class="grid">
      <div><label for="bf">Black Friday multiplier (×)</label><input id="bf" type="number" min="0" step="0.1" value="2.5" oninput="calc()"></div>
      <div><label for="xmas">Mid-Dec/Christmas multiplier (×)</label><input id="xmas" type="number" min="0" step="0.1" value="1.4" oninput="calc()"></div>
    </div>
    <div class="grid">
      <div><label for="box">Boxing/post-Christmas multiplier (×)</label><input id="box" type="number" min="0" step="0.1" value="1.2" oninput="calc()"></div>
      <div><label for="nye">New Year multiplier (×)</label><input id="nye" type="number" min="0" step="0.1" value="1.6" oninput="calc()"></div>
    </div>
  </div>

  <div class="res">
    <div id="rows"></div>
    <div class="stats">
      <div class="stat"><div class="v" id="total">$0</div><div class="l">Q4 + Jan total</div></div>
      <div class="stat"><div class="v" id="bonus">$0</div><div class="l">Bonus vs. baseline</div></div>
    </div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), n=id=>parseFloat(g(id).value)||0;
  ['base','bf','xmas','box','nye'].forEach(k=>{ const s=localStorage.getItem('hip_'+k); if(s!==null)g(k).value=s; });
  function calc(){
    ['base','bf','xmas','box','nye'].forEach(k=>localStorage.setItem('hip_'+k,g(k).value));
    const b=n('base');
    const rows=[
      ['Black Friday week',b*n('bf')],
      ['Mid-Dec / Christmas',b*n('xmas')],
      ['Boxing Day / between',b*n('box')],
      ['New Year reset',b*n('nye')]
    ];
    const total=rows.reduce((s,x)=>s+x[1],0), baseline=b*4;
    g('rows').innerHTML=rows.map(r=>`<div class="row"><span>${r[0]}</span><span style="color:#5AE57A">$${Math.round(r[1]).toLocaleString()}</span></div>`).join('');
    g('total').textContent='$'+Math.round(total).toLocaleString();
    g('bonus').textContent='$'+Math.round(total-baseline).toLocaleString();
  }
  calc();
</script>
</body>
</html>
