<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Trending Topic Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .idea { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 12px 15px; margin-bottom: 9px; display:flex; justify-content:space-between; gap:10px; }
  .idea .t { font-size: .95rem; } .idea .a { font-size:.78rem; opacity:.6; }
  .idea .cp { cursor: pointer; color: #5AE57A; font-size: .82rem; }
  .note { background:#2E4D2E; border:1px solid #4F8A55; border-radius:8px; padding:11px 14px; font-size:.85rem; margin-bottom:12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Trending Topic Finder</h1>
  <p class="sub">Spin evergreen-trend angles onto your niche — the formats that reliably catch a wave.</p>

  <div class="panel">
    <label for="niche">Your niche / topic</label>
    <input id="niche" placeholder="e.g. home cooking on a budget">
    <label for="kind">Angle type</label>
    <select id="kind"><option value="any">Surprise me</option><option value="news">React to what's changing</option><option value="myth">Myth-bust</option><option value="trend">Ride a format trend</option><option value="season">Timely / seasonal</option></select>
    <button class="btn" onclick="gen()">Find Topic Angles</button>
    <button class="btn ghost" onclick="gen()">↻ More</button>
  </div>

  <div class="note">No live data — this gives you the proven <b>angles</b> that trend. Pair with a 2-min check of your platform's trending tab before posting.</div>
  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  ['niche','kind'].forEach(k=>{ const s=localStorage.getItem('ttf_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('ttf_'+k,g(k).value)); });
  const T={
    news:["What [X] just changed in {n} (and what to do about it)","The new rule in {n} nobody's talking about","Why everyone in {n} is switching to ___ — should you?"],
    myth:["The biggest myth about {n}, debunked","Stop believing this about {n}","'{n} truth' that the experts won't say out loud"],
    trend:["{n}, but explained in 15 seconds","Rating popular {n} advice: hot or not","Trying the viral {n} method so you don't have to"],
    season:["Your {n} game-plan for this month","What to do about {n} before the season ends","The {n} reset everyone needs right now"],
    extra:["3 {n} mistakes costing you money","I tried {n} for 30 days — here's the truth","{n} for beginners vs. what actually works","The {n} tip I wish I knew sooner","Unpopular opinion about {n}"]
  };
  function gen(){
    const n=v('niche')||'your topic';
    const k=g('kind').value;
    let pool = k==='any' ? [].concat(...Object.values(T)) : T[k].concat(T.extra);
    pool = pool.map(s=>s.replace(/\{n\}/g,n));
    // shuffle, take 6
    for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
    const pick=pool.slice(0,6);
    g('out').innerHTML=pick.map((p,i)=>`<div class="idea"><div><div class="t">${esc(p)}</div></div><span class="cp" onclick="cp(${i})">⧉</span></div>`).join('');
    window._p=pick;
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function cp(i){ navigator.clipboard.writeText(window._p[i]).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
