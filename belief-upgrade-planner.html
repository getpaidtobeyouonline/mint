<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belief Upgrade Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  textarea { min-height: 50px; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .step { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
  .step h4 { color: #5AE57A; font-size: .76rem; text-transform: uppercase; margin-bottom: 5px; }
  .step p { font-size: .93rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Belief Upgrade Planner</h1>
  <p class="sub">Beliefs change through evidence, not affirmation. Plan how you will build evidence for the upgrade.</p>

  <div class="panel">
    <label for="old">Old belief (the one running silently)</label>
    <input id="old" placeholder='e.g. "money is hard to come by"'>
    <label for="new">New belief you want to install</label>
    <input id="new" placeholder='e.g. "money flows in proportion to value I create"'>
    <label for="bridge">A bridge belief you actually believe right now</label>
    <input id="bridge" placeholder='e.g. "money has come to me before — it can again"'>
    <label for="evidence">3 pieces of evidence the new belief is true</label>
    <textarea id="evidence" placeholder="Past moments, examples, people who prove it"></textarea>
    <label for="action">One action this week that only the new belief would take</label>
    <input id="action" placeholder='e.g. raise my rates by 25% on the next proposal'>
    <button class="btn" onclick="gen()">Plan the Upgrade</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['old','new','bridge','evidence','action'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('bup_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('bup_'+k,g(k).value)); });
  function gen(){
    g('out').innerHTML='<div class="step"><h4>1 · Old belief (named)</h4><p>'+esc(v('old')||'—')+'</p></div>'+
      '<div class="step"><h4>2 · Bridge (the one you can already say honestly)</h4><p>'+esc(v('bridge')||'—')+' &mdash; use this until the new one feels true.</p></div>'+
      '<div class="step"><h4>3 · New belief</h4><p>'+esc(v('new')||'—')+'</p></div>'+
      '<div class="step"><h4>4 · Evidence stack</h4><p>'+esc(v('evidence')||'—')+'<br>Keep adding to this list — beliefs change by evidence, not repetition alone.</p></div>'+
      '<div class="step"><h4>5 · Action that proves it</h4><p>'+esc(v('action')||'—')+'</p></div>'+
      '<div class="step" style="border-left-color:#BFD8BF"><h4>The rule</h4><p>Repeat the bridge daily. Take the action by the end of this week. Add the result (good or bad) to your evidence list. The old belief loses ground only when you act in a way it cannot explain.</p></div>';
    g('out').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function copyOut(){ const t=g('out').innerText; if(!t){alert('Plan first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
