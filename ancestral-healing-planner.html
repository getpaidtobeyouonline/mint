<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Ancestral Healing Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Ancestral Healing Planner</h1>
  <p class="sub">Honour your lineage, and lovingly tend a pattern passed down through it.</p>

  <div class="panel">
    <label for="lineage">The lineage or ancestor you are working with</label>
    <input id="lineage" placeholder="A side of the family, a generation, a named ancestor">
    <label for="pattern">A pattern you sense came down the line</label>
    <textarea id="pattern" placeholder="A wound, a belief, a way of being that repeats"></textarea>
    <label for="honour">What you want to honour and give thanks for</label>
    <textarea id="honour" placeholder="The gifts, strength and love also passed down"></textarea>
    <label for="release">What you choose to heal and release</label>
    <textarea id="release" placeholder="What ends with you, so it is not passed forward"></textarea>
    <label for="ritual">A practice or ritual to mark this</label>
    <input id="ritual" placeholder="e.g. a candle, a letter, a meal, words spoken aloud">
    <button class="btn" onclick="gen()">Build Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['lineage','pattern','honour','release','ritual'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('ahp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('ahp_'+k,g(k).value)); });
  function gen(){
    const t='ANCESTRAL HEALING PLAN\n\nLINEAGE I AM WORKING WITH:\n'+(v('lineage')||'[the line or ancestor]')+
    '\n\nTHE PATTERN PASSED DOWN:\n'+(v('pattern')||'[the wound or belief that repeats]')+
    '\n\nWHAT I HONOUR & GIVE THANKS FOR:\n'+(v('honour')||'[the gifts and strength also inherited]')+
    '\n\nWHAT I HEAL & RELEASE — IT ENDS WITH ME:\n'+(v('release')||'[what you will not pass forward]')+
    '\n\nMY RITUAL:\n'+(v('ritual')||'[a practice to mark this]')+
    '\n\n--- Tending the lineage ---\nHold both truths: the harm and the love your ancestors carried.\nYou cannot change the past, but you can be where a pattern stops.\nHealing yourself quietly heals backward and forward through the line.\nGo gently. For heavy generational trauma, walk with a skilled practitioner.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
