<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Gift Wrap Inventory Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 90px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 8px 12px; margin-bottom: 5px; display: flex; align-items: center; gap: 9px; font-size: .87rem; }
  .item.low { border-left: 3px solid #5AE57A; }
  .item .st { cursor: pointer; font-size: .78rem; color: #5AE57A; flex: none; }
  .item .x { margin-left: auto; cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 10px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Gift Wrap Inventory Tool</h1>
  <p class="sub">Track wrapping paper, bags, ribbon and tags — know what you have before you buy more.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Item</label><input id="item" placeholder="e.g. Kraft paper roll"></div>
      <div><label>Type</label><select id="type"><option>Paper</option><option>Gift bags</option><option>Ribbon &amp; bows</option><option>Tags &amp; cards</option><option>Tape &amp; tissue</option></select></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="copyLow()" style="margin-top:8px">Copy Restock List</button>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('gwit')||'[]');
  const save=()=>localStorage.setItem('gwit',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const STATES=['Plenty','Running low','Out'];
  function add(){ if(!v('item')){ alert('Enter an item.'); return; }
    R.push({i:v('item'),t:g('type').value,s:0}); g('item').value=''; save(); render(); }
  function cycle(i){ R[i].s=(R[i].s+1)%3; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the inventory?')){ R=[]; save(); render(); } }
  function copyLow(){ const low=R.filter(x=>x.s>=1); if(!low.length){ alert('Nothing low or out.'); return; }
    navigator.clipboard.writeText('GIFT WRAP RESTOCK LIST\n\n'+low.map(x=>'- '+x.i+(x.s===2?' (OUT)':'')).join('\n')).then(()=>alert('Restock list copied!'),()=>alert('Copy failed.'));
  }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No items added yet.</div>'; return; }
    L.innerHTML=R.map((x,i)=>({x,i})).sort((a,b)=>b.x.s-a.x.s).map(({x,i})=>
      '<div class="item'+(x.s>=1?' low':'')+'"><span><b style="color:#5AE57A">'+esc(x.i)+'</b> <span style="opacity:.6">· '+x.t+'</span></span><span class="st" onclick="cycle('+i+')">'+STATES[x.s]+' ⟳</span><span class="x" onclick="del('+i+')">✕</span></div>').join('');
  }
  render();
</script>
</body>
</html>
