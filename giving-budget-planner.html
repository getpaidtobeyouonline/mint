<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giving Budget Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 10px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat { flex: 1; min-width: 120px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 13px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: #5AE57A; }
  .stat .l { font-size: .69rem; opacity: .65; text-transform: uppercase; }
  .row2 { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 7px; padding: 9px 13px; margin-bottom: 6px; display: flex; justify-content: space-between; gap: 10px; font-size: .87rem; flex-wrap: wrap; }
  .row2 .x { cursor: pointer; opacity: .5; } .row2 .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Giving Budget Planner</h1>
  <p class="sub">Generosity is a habit. Set the annual amount, plan where it goes, track each gift.</p>

  <div class="panel">
    <label for="annual">Annual giving target ($)</label>
    <input id="annual" type="number" min="0" value="1200" oninput="render()">
  </div>

  <div class="panel">
    <div class="row">
      <div><label>Date</label><input id="dt" type="date"></div>
      <div style="flex:2"><label>To whom / cause</label><input id="to" placeholder="e.g. local food bank"></div>
      <div><label>$</label><input id="amt" type="number" min="0" step="0.01"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Log</button></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="given">$0</div><div class="l">Given this year</div></div>
    <div class="stat"><div class="v" id="left">$0</div><div class="l">Left to give</div></div>
    <div class="stat"><div class="v" id="cnt">0</div><div class="l">Gifts</div></div>
  </div>

  <div id="list"></div>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let G=JSON.parse(localStorage.getItem('gbp')||'[]');
  const save=()=>{ localStorage.setItem('gbp',JSON.stringify(G)); localStorage.setItem('gbp_a',g('annual').value); };
  g('annual').value=localStorage.getItem('gbp_a')||g('annual').value;
  g('dt').value=new Date().toISOString().slice(0,10);
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ const to=v('to'), a=parseFloat(g('amt').value)||0; if(!to||!a){alert('Add a recipient and amount.');return;}
    G.push({d:g('dt').value,to,a}); ['to','amt'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ G.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ G=[]; save(); render(); } }
  function render(){
    save();
    const yr=new Date().getFullYear()+'';
    const year=G.filter(x=>x.d.startsWith(yr));
    const given=year.reduce((s,x)=>s+x.a,0);
    const target=parseFloat(g('annual').value)||0;
    g('given').textContent='$'+Math.round(given).toLocaleString();
    g('left').textContent='$'+Math.max(0,Math.round(target-given)).toLocaleString();
    g('cnt').textContent=year.length;
    const L=g('list');
    if(!G.length){ L.innerHTML='<div class="empty">No gifts logged yet.</div>'; return; }
    L.innerHTML=[...G].map((x,i)=>({x,i})).sort((a,b)=>a.x.d<b.x.d?1:-1).map(({x,i})=>`<div class="row2"><span><b style="color:#5AE57A">${x.d}</b> · ${esc(x.to)}</span><span>$${x.a.toLocaleString()} <span class="x" onclick="del(${i})">✕</span></span></div>`).join('');
  }
  render();
</script>
</body>
</html>
