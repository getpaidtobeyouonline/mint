<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coaching Session Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .hint { font-size: .78rem; opacity: .6; margin-top: 3px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Coaching Session Planner</h1>
  <p class="sub">Get the most from your coach. Coaching works best when you bring the agenda.</p>

  <div class="panel">
    <label for="since">What has happened since last session</label>
    <textarea id="since" placeholder="Wins, setbacks, things you noticed"></textarea>
    <label for="commit">Progress on what I committed to</label>
    <textarea id="commit" placeholder="Did you do it? What got in the way?"></textarea>
    <label for="focus">The ONE thing I most want to work on today</label>
    <input id="focus" placeholder="Your priority for this session">
    <div class="hint">One real focus beats five shallow ones.</div>
    <label for="outcome">What a great session would give me</label>
    <textarea id="outcome" placeholder="Clarity, a decision, a plan, a shift..."></textarea>
    <label for="stuck">Where I feel stuck or uncertain</label>
    <textarea id="stuck" placeholder="Be honest — this is where coaching helps most"></textarea>
    <button class="btn" onclick="gen()">Build Session Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['since','commit','focus','outcome','stuck'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('csp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('csp_'+k,g(k).value)); });
  function gen(){
    const t=`COACHING SESSION PLAN\n\nSINCE LAST SESSION:\n${v('since')||'[what happened]'}\n\nPROGRESS ON MY COMMITMENT:\n${v('commit')||'[honest update]'}\n\nTODAY'S ONE FOCUS:\n${v('focus')||'[your single priority]'}\n\nWHAT A GREAT SESSION GIVES ME:\n${v('outcome')||'[the outcome you want]'}\n\nWHERE I FEEL STUCK:\n${v('stuck')||'[be honest here]'}\n\n--- Get the most from it ---\nBring the agenda — your coach guides, you drive.\nBe coachable: stay open, even when it is uncomfortable.\nLeave with a clear, written commitment for next time.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
