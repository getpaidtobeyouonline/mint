<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Goal Setter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #5AE57A; }
  textarea { min-height: 50px; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .res { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px 18px; }
  .res h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.15rem; margin-bottom: 8px; }
  .res p { font-size: .95rem; margin-bottom: 6px; }
  .res b { color: #5AE57A; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Financial Goal Setter</h1>
  <p class="sub">Set a financial goal as a SMART target with monthly contributions and a real why.</p>

  <div class="panel">
    <label for="goal">The goal in one line</label>
    <input id="goal" placeholder="e.g. Save $20k for a house deposit">
    <div class="grid">
      <div><label for="amt">Target amount ($)</label><input id="amt" type="number" min="0" value="20000"></div>
      <div><label for="months">By how many months</label><input id="months" type="number" min="1" value="24"></div>
      <div><label for="have">Already have ($)</label><input id="have" type="number" min="0" value="2000"></div>
    </div>
    <label for="why">Why this matters (the real reason)</label>
    <textarea id="why" placeholder="What changes in your life when you hit this"></textarea>
    <button class="btn" onclick="gen()">Set the Goal</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['goal','amt','months','have','why'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim(), n=id=>parseFloat(g(id).value)||0;
  F.forEach(k=>{ const s=localStorage.getItem('fgs_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('fgs_'+k,g(k).value)); });
  function gen(){
    const gap=Math.max(0,n('amt')-n('have')), m=Math.max(1,n('months')); const pm=Math.ceil(gap/m), wk=Math.ceil(pm/4.33);
    const half=Math.round(n('have')+gap/2).toLocaleString();
    g('out').innerHTML='<div class="res"><h3>Your goal, defined</h3>'+
      '<p>'+esc(v('goal')||'(your goal)')+' &mdash; target $'+n('amt').toLocaleString()+' in '+m+' months.</p>'+
      '<p><b>Per month:</b> ~$'+pm.toLocaleString()+' (~$'+wk.toLocaleString()+'/wk).</p>'+
      '<p><b>Halfway checkpoint:</b> at month '+Math.round(m/2)+', you should be near $'+half+'.</p>'+
      '<p><b>Why:</b> '+esc(v('why')||'(your why)')+'</p>'+
      '<p style="margin-top:10px;opacity:.85">Read your "why" line every time the monthly transfer hits. Goals are kept by purpose, not discipline.</p></div>';
    g('out').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function copyOut(){ const t=g('out').innerText; if(!t){alert('Set it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
