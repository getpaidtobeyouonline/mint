<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homework Help Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Homework Help Tool</h1>
  <p class="sub">Break a tricky homework task into small, doable steps — together.</p>

  <div class="panel">
    <label for="subject">Subject</label>
    <input id="subject" placeholder="e.g. Maths, English, History">
    <label for="task">What the homework is asking</label>
    <textarea id="task" placeholder="In your child's own words"></textarea>
    <label for="know">What they already understand</label>
    <textarea id="know" placeholder="The bits that make sense to them"></textarea>
    <label for="stuck">Where they are stuck</label>
    <textarea id="stuck" placeholder="The exact bit that feels hard"></textarea>
    <label for="time">How long they will work for</label>
    <input id="time" placeholder="e.g. 20 min, with a break">
    <button class="btn" onclick="gen()">Build Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['subject','task','know','stuck','time'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('hwh_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('hwh_'+k,g(k).value)); });
  function gen(){
    const t='HOMEWORK SESSION PLAN'+(v('subject')?'\nSubject: '+v('subject'):'')+(v('time')?'  ·  '+v('time'):'')+
    '\n\n1. UNDERSTAND THE TASK\n'+(v('task')||'[what the homework is asking]')+
    '\n\n2. START WHERE IT MAKES SENSE\n'+(v('know')||'[what they already understand]')+
    '   → Do these bits first — quick wins build confidence.'+
    '\n\n3. THE TRICKY BIT\n'+(v('stuck')||'[where they are stuck]')+
    '\n   • Read it out loud together.\n   • Underline the key words.\n   • Try one small example before the real one.\n   • If still stuck, jot a question for the teacher and move on.'+
    '\n\n4. WRAP UP\n   • Look back over what got done.\n   • Pack the bag for tomorrow.\n   • Praise the effort, not just the answer.'+
    '\n\n--- Tips for grown-ups ---\nYour job is the scaffolding, not the answers.\nKeep snacks and water nearby; tired or hungry brains struggle.\nA short break after 15-20 minutes resets focus better than pushing through.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
