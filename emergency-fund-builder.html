<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Emergency Fund Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 10px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .res { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 10px; padding: 20px; }
  .res .n { font-family: 'Playfair Display', serif; font-size: 2.4rem; color: #5AE57A; line-height: 1; text-align: center; }
  .res .l { font-size: .85rem; opacity: .7; text-align: center; margin-top: 6px; }
  .track { background: #3C603C; border-radius: 5px; height: 10px; overflow: hidden; margin: 14px 0 6px; }
  .track>i { display: block; height: 100%; background: #5AE57A; transition: width .3s; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
  .stat { flex: 1; min-width: 110px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 12px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: #5AE57A; }
  .stat .l { font-size: .68rem; opacity: .65; text-transform: uppercase; }
  .note { font-size: .85rem; opacity: .78; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Emergency Fund Builder</h1>
  <p class="sub">Calculate your real target, see what you have, and lock the monthly build.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="exp">Essential monthly expenses ($)</label><input id="exp" type="number" min="0" value="2500" oninput="calc()"></div>
      <div><label for="months">Months of cushion</label><select id="months" onchange="calc()"><option value="3">3 (lean)</option><option value="6" selected>6 (standard)</option><option value="9">9 (variable income)</option><option value="12">12 (solo / freelance)</option></select></div>
    </div>
    <div class="grid">
      <div><label for="have">Currently saved ($)</label><input id="have" type="number" min="0" value="500" oninput="calc()"></div>
      <div><label for="add">Can add per month ($)</label><input id="add" type="number" min="0" value="200" oninput="calc()"></div>
    </div>
  </div>

  <div class="res">
    <div class="n" id="goal">$0</div>
    <div class="l">your emergency fund target</div>
    <div class="track"><i id="bar" style="width:0%"></i></div>
    <div class="l" id="pct" style="margin-top:5px">0% there</div>
    <div class="stats">
      <div class="stat"><div class="v" id="gap">$0</div><div class="l">to go</div></div>
      <div class="stat"><div class="v" id="mo">—</div><div class="l">months left</div></div>
      <div class="stat"><div class="v" id="date">—</div><div class="l">done by</div></div>
    </div>
    <div class="note" id="note"></div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), n=id=>parseFloat(g(id).value)||0;
  ['exp','months','have','add'].forEach(k=>{ const s=localStorage.getItem('efb_'+k); if(s!==null)g(k).value=s; });
  function calc(){
    ['exp','months','have','add'].forEach(k=>localStorage.setItem('efb_'+k,g(k).value));
    const goal=n('exp')*n('months'), gap=Math.max(0,goal-n('have')), add=n('add');
    g('goal').textContent='$'+Math.round(goal).toLocaleString();
    g('gap').textContent='$'+Math.round(gap).toLocaleString();
    const pct=goal>0?Math.min(100,Math.round(n('have')/goal*100)):0;
    g('bar').style.width=pct+'%'; g('pct').textContent=pct+'% there';
    if(add>0 && gap>0){ const m=Math.ceil(gap/add); g('mo').textContent=m;
      const d=new Date(); d.setMonth(d.getMonth()+m); g('date').textContent=d.toISOString().slice(0,7);
    } else { g('mo').textContent=gap===0?'✓':'—'; g('date').textContent=gap===0?'today':'—'; }
    g('note').textContent= gap===0 ? 'Done. Move overflow into investments or longer-term goals.'
      : 'Open a separate high-yield account labelled "do not touch". Out of sight = stays put.';
  }
  calc();
</script>
</body>
</html>
