<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Artist Statement Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 54px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Artist Statement Builder</h1>
  <p class="sub">Get the artist statement off your to-do list — clear, honest and ready to send.</p>

  <div class="panel">
    <label for="make">What you make (in plain words)</label>
    <input id="make" placeholder="e.g. small oil paintings of coastal light">
    <label for="explore">What you are exploring through it</label>
    <textarea id="explore" placeholder="The themes, questions or feelings the work circles"></textarea>
    <label for="method">How you make it</label>
    <textarea id="method" placeholder="Materials, methods, where you work"></textarea>
    <label for="why">Why this work matters to you</label>
    <textarea id="why" placeholder="The honest reason — not the impressive one"></textarea>
    <label for="hope">What you hope the viewer takes away</label>
    <input id="hope" placeholder="A feeling, a question, a quiet moment">
    <button class="btn" onclick="gen()">Build Statement</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['make','explore','method','why','hope'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('asb_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('asb_'+k,g(k).value)); });
  function gen(){
    const t='ARTIST STATEMENT — DRAFT\n\n'+
    'I make '+(v('make')||'[what you make]')+'. Through this work I am exploring '+(v('explore')||'[your themes and questions]')+'.\n\n'+
    'I work '+(v('method')||'[your materials and methods]')+'.\n\n'+
    (v('why')?'This work matters to me because '+v('why')+'.\n\n':'')+
    (v('hope')?'I hope the viewer leaves with '+v('hope')+'.':'')+
    '\n\n--- Editing tips ---\nRead it aloud — cut anything that does not sound like you talking.\nUse plain words. The work is the thing — the statement is just the door.\nKeep it short for galleries (100-200 words) and slightly longer for grant applications.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
