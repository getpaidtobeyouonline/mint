<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quarterly Life Audit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  textarea { min-height: 50px; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .blk { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
  .blk h4 { color: #5AE57A; font-size: .76rem; text-transform: uppercase; margin-bottom: 5px; }
  .blk p { font-size: .93rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Quarterly Life Audit</h1>
  <p class="sub">90 days is long enough to see real change and short enough to course-correct. Run the audit.</p>

  <div class="panel">
    <label for="best">Best decision of the quarter</label>
    <textarea id="best" placeholder="The choice you would make again"></textarea>
    <label for="worst">Worst decision of the quarter</label>
    <textarea id="worst" placeholder="What it taught you"></textarea>
    <label for="keep">What is working that I will protect</label>
    <textarea id="keep" placeholder="Habits, people, schedule, beliefs"></textarea>
    <label for="drop">What is no longer serving me</label>
    <textarea id="drop" placeholder="To stop, simplify, or remove"></textarea>
    <label for="start">What I will start this quarter</label>
    <textarea id="start" placeholder="One meaningful new thing"></textarea>
    <label for="want">If this next quarter went brilliantly, what would be true on day 90?</label>
    <textarea id="want" placeholder="The vivid snapshot"></textarea>
    <button class="btn" onclick="gen()">Audit the Quarter</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['best','worst','keep','drop','start','want'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('qla_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('qla_'+k,g(k).value)); });
  function gen(){
    g('out').innerHTML='<div class="blk"><h4>Best decision</h4><p>'+esc(v('best')||'—')+'</p></div>'+
      '<div class="blk"><h4>Worst decision &amp; lesson</h4><p>'+esc(v('worst')||'—')+'</p></div>'+
      '<div class="blk"><h4>What I am protecting</h4><p>'+esc(v('keep')||'—')+'</p></div>'+
      '<div class="blk"><h4>What I am dropping</h4><p>'+esc(v('drop')||'—')+'</p></div>'+
      '<div class="blk"><h4>What I am starting</h4><p>'+esc(v('start')||'—')+'</p></div>'+
      '<div class="blk"><h4>Day 90 snapshot</h4><p>'+esc(v('want')||'—')+'</p></div>'+
      '<div class="blk" style="border-left-color:#BFD8BF"><h4>The discipline</h4><p>Re-read this on day 45. Adjust if needed. Do not wait for the end of the quarter to notice you are off course.</p></div>';
    g('out').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function copyOut(){ const t=g('out').innerText; if(!t){alert('Audit first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  gen();
</script>
</body>
</html>
