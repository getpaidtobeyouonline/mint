<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Email Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  textarea { min-height: 50px; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Story Email Builder</h1>
  <p class="sub">Story emails out-convert "info" emails because they earn the read. Build one with a proven structure.</p>

  <div class="panel">
    <label for="moment">The opening moment (something specific that happened)</label>
    <input id="moment" placeholder="e.g. A client emailed me at 11pm panicking about her launch">
    <label for="tension">The tension / what was at stake</label>
    <textarea id="tension" placeholder="The risk or hard feeling — make it real"></textarea>
    <label for="turn">The turning point / what shifted</label>
    <textarea id="turn" placeholder="The moment things changed"></textarea>
    <label for="lesson">The lesson the reader gets</label>
    <textarea id="lesson" placeholder="The takeaway, stated plainly"></textarea>
    <label for="cta">Where it leads (your CTA / offer)</label>
    <input id="cta" placeholder="e.g. join the launch playbook before Friday">
    <button class="btn" onclick="gen()">Build Story Email</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['moment','tension','turn','lesson','cta'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('seb_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('seb_'+k,g(k).value)); });
  function gen(){
    if(!v('moment')){ alert('Add the opening moment.'); return; }
    const t='Subject ideas: pick the boldest true one.\n\n'+
      v('moment')+'\n\n'+
      (v('tension')||'[the tension — what was at stake]')+'\n\n'+
      'Here is what I did next.\n\n'+
      (v('turn')||'[the turning point]')+'\n\n'+
      'The thing nobody told me — and the takeaway I want you to have:\n\n'+
      (v('lesson')||'[the lesson, stated plainly]')+'\n\n'+
      'If this is hitting close, '+(v('cta')||'[your CTA]')+'.\n\n'+
      '— [your name]\n\n'+
      'P.S. One sentence to reinforce the action, not filler.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ if(g('out').style.display==='none'){alert('Build it first.');return;} navigator.clipboard.writeText(g('out').textContent).then(()=>alert('Story email copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
