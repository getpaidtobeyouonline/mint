<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Upsell Email Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .em { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 13px 16px; margin-bottom: 10px; }
  .em h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1rem; }
  .em .when { font-size: .78rem; opacity: .6; } .em p { font-size: .9rem; margin-top: 4px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Upsell Email Planner</h1>
  <p class="sub">Existing buyers convert 3-10x better than new ones. Plan the upsell sequence that earns it without feeling pushy.</p>

  <div class="panel">
    <label for="bought">What they bought</label>
    <input id="bought" placeholder="e.g. The Pricing Guide">
    <label for="next">The natural next step you sell</label>
    <input id="next" placeholder="e.g. 1:1 pricing strategy session">
    <label for="bridge">Why one leads to the other (in one line)</label>
    <input id="bridge" placeholder="e.g. once you've raised your prices, the next gap is closing high-ticket calls">
    <button class="btn" onclick="gen()">Build Upsell Plan</button>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['bought','next','bridge'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('uep_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('uep_'+k,g(k).value)); });
  function gen(){
    const b=v('bought')||'product A', nx=v('next')||'product B', br=v('bridge')||'the natural next step';
    const seq=[
      ["Email 1 — Quick-start","Day 2","Help them get a fast win from "+b+". Engagement now buys you permission to offer more later."],
      ["Email 2 — Show the gap","Day 5",br+". Make them feel the next problem they'll have."],
      ["Email 3 — Introduce the bridge","Day 8","Soft introduce "+nx+" as the answer. Story or behind-the-scenes, not a pitch."],
      ["Email 4 — Proof","Day 11","A case study from someone who took the same path: "+b+" → "+nx+"."],
      ["Email 5 — The offer","Day 14","Clear, confident invitation. Existing-buyer pricing or fast-action bonus is fair here."],
      ["Email 6 — Last call","Day 16","Short deadline reminder. After this, return them to normal broadcasts."]
    ];
    g('out').innerHTML=seq.map(s=>'<div class="em"><h3>'+s[0]+'</h3><div class="when">'+s[1]+'</div><p>'+s[2]+'</p></div>').join('');
  }
  gen();
</script>
</body>
</html>
