<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Book Writing Outline Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 54px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Book Writing Outline Tool</h1>
  <p class="sub">Shape the whole book in one page — so you know where you are headed.</p>

  <div class="panel">
    <label for="title">Working title</label>
    <input id="title" placeholder="The book's working title">
    <label for="genre">Genre / category</label>
    <input id="genre" placeholder="e.g. literary fiction, memoir, self-help">
    <label for="hook">One-line hook</label>
    <input id="hook" placeholder="The book in a sentence — be specific">
    <label for="reader">The reader you are writing for</label>
    <input id="reader" placeholder="The exact person on the other side">
    <label for="promise">Promise / transformation</label>
    <textarea id="promise" placeholder="Where the reader ends up by the last page"></textarea>
    <label for="chapters">Chapter list (one per line)</label>
    <textarea id="chapters" placeholder="Your chapters, in order"></textarea>
    <button class="btn" onclick="gen()">Build Outline</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['title','genre','hook','reader','promise','chapters'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('bwot_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('bwot_'+k,g(k).value)); });
  function gen(){
    const ch=v('chapters').split('\n').filter(x=>x.trim()).map((x,i)=>'  Chapter '+(i+1)+': '+x.trim()).join('\n')||'  [your chapters]';
    const t='BOOK OUTLINE\n\nTITLE: '+(v('title')||'[working title]')+(v('genre')?'   ('+v('genre')+')':'')+
    '\n\nHOOK:\n'+(v('hook')||'[the book in one sentence]')+
    '\n\nFOR THE READER WHO:\n'+(v('reader')||'[the exact reader]')+
    '\n\nTHE PROMISE:\n'+(v('promise')||'[where they end up]')+
    '\n\nCHAPTERS:\n'+ch+
    '\n\n--- Outlining tips ---\nA messy first outline beats a polished one that never gets written.\nWrite the chapter list in any order — then reorder for narrative flow.\nIf a chapter does not move the promise forward, cut it or merge it.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
