<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Streak Counter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .big { text-align: center; }
  .big .n { font-family: 'Playfair Display', serif; font-size: 3.6rem; color: #5AE57A; line-height: 1; }
  .big .l { opacity: .7; font-size: .9rem; }
  .stats { display: flex; gap: 10px; margin: 14px 0; }
  .stat { flex: 1; background: #2A442A; border: 1px solid #5A845A; border-radius: 10px; padding: 11px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: #5AE57A; }
  .stat .s { font-size: .68rem; opacity: .65; text-transform: uppercase; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .95rem; padding: 13px 18px; border-radius: 8px; font-family:'DM Sans',sans-serif; width: 100%; }
  .btn.done { background: #3C603C; color: #5AE57A; border: 1px solid #5AE57A; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; font-size: .85rem; padding: 9px; margin-top: 10px; }
  .cal { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; margin-top: 14px; }
  .cal div { aspect-ratio: 1; border-radius: 5px; background: #3C603C; display: flex; align-items: center; justify-content: center; font-size: .65rem; opacity: .6; }
  .cal div.hit { background: #5AE57A; color: #325132; opacity: 1; font-weight: 600; }
  .msg { text-align: center; font-size: .88rem; margin-top: 12px; opacity: .85; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Workout Streak Counter</h1>
  <p class="sub">Tap the button on every day you train. Watch the chain grow — and protect it.</p>

  <div class="panel">
    <div class="big"><span class="n" id="streak">0</span><div class="l">day streak</div></div>
    <div class="stats">
      <div class="stat"><div class="v" id="best">0</div><div class="s">Best streak</div></div>
      <div class="stat"><div class="v" id="total">0</div><div class="s">Total workouts</div></div>
      <div class="stat"><div class="v" id="m30">0</div><div class="s">Last 30 days</div></div>
    </div>
    <button class="btn" id="logBtn" onclick="toggle()">I worked out today</button>
    <div class="cal" id="cal"></div>
    <div class="msg" id="msg"></div>
    <button class="btn ghost" onclick="clearAll()">Reset all data</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const today=new Date().toISOString().slice(0,10);
  let D=JSON.parse(localStorage.getItem('wsc')||'{}');
  const save=()=>localStorage.setItem('wsc',JSON.stringify(D));
  const key=dt=>dt.toISOString().slice(0,10);
  function toggle(){ if(D[today])delete D[today]; else D[today]=1; save(); render(); }
  function clearAll(){ if(confirm('Reset all streak data?')){ D={}; save(); render(); } }
  function streakFrom(){ let s=0,d=new Date(); if(!D[key(d)])d.setDate(d.getDate()-1);
    for(;;){ if(D[key(d)]){s++; d.setDate(d.getDate()-1);} else break; } return s; }
  function best(){ const ks=Object.keys(D).sort(); let b=0,c=0,prev=null;
    ks.forEach(k=>{ if(prev){ const gap=(new Date(k)-new Date(prev))/86400000; c=gap===1?c+1:1; } else c=1; b=Math.max(b,c); prev=k; }); return b; }
  function render(){
    const s=streakFrom();
    g('streak').textContent=s;
    g('best').textContent=Math.max(best(),s);
    g('total').textContent=Object.keys(D).length;
    let c30=0; for(let i=0;i<30;i++){ const d=new Date(); d.setDate(d.getDate()-i); if(D[key(d)])c30++; }
    g('m30').textContent=c30;
    const done=!!D[today];
    g('logBtn').textContent=done?'✓ Logged for today':'I worked out today';
    g('logBtn').className=done?'btn done':'btn';
    let cal='';
    for(let i=27;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); cal+='<div class="'+(D[key(d)]?'hit':'')+'">'+d.getDate()+'</div>'; }
    g('cal').innerHTML=cal;
    g('msg').textContent= s>=7?'Strong chain — '+s+' days. Do not break it.':done?'Logged. Show up again tomorrow.':'Train today to keep the streak alive.';
  }
  render();
</script>
</body>
</html>
