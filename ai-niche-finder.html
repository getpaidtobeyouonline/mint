<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted AI Niche Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2.1rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .76rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .label-q { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.05rem; margin-bottom: 10px; }
  .crit { display: flex; align-items: center; gap: 12px; justify-content: space-between; padding: 7px 0; flex-wrap: wrap; }
  .crit span { flex: 1; min-width: 200px; font-size: .92rem; }
  .crit span small { display: block; opacity: .55; font-size: .78rem; }
  .crit select { width: 70px; }
  .scorebox { text-align: center; background: #2A442A; border: 1px solid #5A845A; border-radius: 10px; padding: 16px; margin-top: 14px; }
  .scorebox .n { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: #5AE57A; line-height: 1; }
  .scorebox .vd { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: #5AE57A; margin-top: 4px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: .95rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; }
  .btn:hover { opacity: .9; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .card { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 12px 14px; margin-bottom: 9px; }
  .card .top { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; flex-wrap: wrap; }
  .card .nm { font-weight: 500; }
  .badge { font-size: .72rem; padding: 2px 9px; border-radius: 20px; background: #325132; color: #5AE57A; }
  .card .meta { font-size: .8rem; opacity: .7; margin-top: 3px; }
  .card .x { cursor: pointer; opacity: .55; font-size: .82rem; }
  .card .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; padding: 22px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.7rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted AI Niche Finder</h1>
  <p class="sub">Spark niche ideas, then score each one against six profitability tests so you commit to the right one.</p>

  <div class="panel">
    <div class="label-q">Niche spark</div>
    <label for="aud">Lock an audience (optional)</label>
    <select id="aud"></select>
    <button class="btn" onclick="spark()">✦ Spark a Niche</button>
  </div>

  <div class="panel">
    <label for="niche">Niche to evaluate</label>
    <input id="niche" placeholder="e.g. Helping wedding photographers automate client emails with AI">
    <div id="crits"></div>
    <div class="scorebox"><div class="n" id="score">—</div><div class="vd" id="verdict">Rate the six tests</div></div>
    <button class="btn" onclick="saveNiche()">Save to Shortlist</button>
    <button class="btn ghost" onclick="resetCrits()">Reset Ratings</button>
  </div>

  <div class="label-q">Shortlist</div>
  <div id="list"></div>
  <button class="btn" onclick="exportMd()">Export Shortlist</button>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const audiences = ["freelance designers","real estate agents","fitness coaches","Etsy sellers","online course creators","local restaurants","wedding photographers","B2B founders","life coaches","podcasters","dental clinics","authors","financial advisors","travel agencies","SaaS startups","nonprofits"];
  const problems = ["spend hours on repetitive content","struggle to follow up with leads","can't keep up with social posting","waste time on admin and email","find research and prep slow","lose clients to slow responses","can't personalize at scale","reinvent the same docs every week"];
  const crits = [
    ["Demand size","Enough people genuinely have this need"],
    ["Pain intensity","It's urgent and painful, not a nice-to-have"],
    ["Willingness to pay","They already spend money solving this"],
    ["Reachability","You can actually find and target them"],
    ["Competition gap","Underserved or you can clearly differentiate"],
    ["Your fit","You have real insight or an edge here"]
  ];
  const g = id => document.getElementById(id);
  g('aud').innerHTML = '<option value="">🎲 Any audience</option>' + audiences.map(a=>`<option>${a}</option>`).join('');
  g('crits').innerHTML = crits.map((c,i)=>`<div class="crit"><span>${c[0]}<small>${c[1]}</small></span>
    <select id="c${i}" onchange="calc()"><option value="0">–</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></div>`).join('');

  const pick = a => a[Math.floor(Math.random()*a.length)];
  function spark() {
    const a = g('aud').value || pick(audiences);
    g('niche').value = `Helping ${a} who ${pick(problems)} — solved with AI`;
  }

  function ratings() { return crits.map((_,i)=>+g('c'+i).value); }
  function calc() {
    const r = ratings();
    if (r.some(x=>x===0)) { g('score').textContent='—'; g('verdict').textContent='Rate all six tests'; return 0; }
    const pct = Math.round(r.reduce((s,x)=>s+x,0)/30*100);
    g('score').textContent = pct;
    g('verdict').textContent = pct>=80?'Strong — commit to this':pct>=65?'Promising — worth testing':pct>=45?'Risky — needs an angle':'Avoid — weak fundamentals';
    return pct;
  }
  function resetCrits() { crits.forEach((_,i)=>g('c'+i).value='0'); calc(); }

  let shortlist = JSON.parse(localStorage.getItem('anf') || '[]');
  const save = () => localStorage.setItem('anf', JSON.stringify(shortlist));
  const esc = t => (t||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

  function saveNiche() {
    const name = g('niche').value.trim();
    if (!name) { alert('Enter or spark a niche first.'); return; }
    const r = ratings();
    if (r.some(x=>x===0)) { alert('Rate all six tests before saving.'); return; }
    shortlist.push({ name, r, score: calc() });
    save(); render();
  }
  function del(i) { shortlist.splice(i,1); save(); render(); }
  function clearAll() { if (confirm('Clear the shortlist?')) { shortlist=[]; save(); render(); } }

  function render() {
    const l = g('list');
    if (!shortlist.length) { l.innerHTML='<div class="empty">No niches saved yet — score one and save it.</div>'; return; }
    const top = Math.max(...shortlist.map(s=>s.score));
    l.innerHTML = [...shortlist].map((s,i)=>({s,i})).sort((a,b)=>b.s.score-a.s.score).map(({s,i})=>`
      <div class="card">
        <div class="top"><span class="nm">${esc(s.name)}</span>
          <span class="badge">${s.score}/100${s.score===top?' ★':''}</span></div>
        <div class="meta">${crits.map((c,j)=>`${c[0].split(' ')[0]} ${s.r[j]}`).join(' · ')}</div>
        <div class="x" onclick="del(${i})">✕ Remove</div>
      </div>`).join('');
  }

  function exportMd() {
    if (!shortlist.length) { alert('Save a niche first.'); return; }
    let t = `# Niche Shortlist\n\n`;
    [...shortlist].sort((a,b)=>b.score-a.score).forEach(s => {
      t += `## ${s.name} — ${s.score}/100\n` + crits.map((c,j)=>`- ${c[0]}: ${s.r[j]}/5`).join('\n') + `\n\n`;
    });
    const b = new Blob([t.trim()],{type:'text/markdown'});
    const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download='niche-shortlist.md'; a.click(); URL.revokeObjectURL(a.href);
  }

  render(); calc();
</script>
</body>
</html>
