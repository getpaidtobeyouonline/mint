<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beta Launch Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#325132;color:#FFFFFF;font-family:'DM Sans',sans-serif;min-height:100vh;padding:28px 16px}
h1{font-family:'Playfair Display',serif;font-size:2rem;color:#5AE57A;text-align:center;margin-bottom:6px}
.sub{text-align:center;opacity:.6;margin-bottom:24px;font-size:.9rem}
.card{background:#3C603C;border:1px solid #4C724C;border-radius:14px;padding:20px;max-width:700px;margin:0 auto 16px}
.card-title{font-family:'Playfair Display',serif;font-size:1rem;color:#5AE57A;margin-bottom:14px}
label{display:block;margin-bottom:5px;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:#5AE57A;font-weight:600}
input,select{background:#325132;border:1px solid #4C724C;border-radius:8px;padding:9px 12px;color:#FFFFFF;font-family:'DM Sans',sans-serif;font-size:.88rem;width:100%;transition:border .2s}
input:focus,select:focus{outline:none;border-color:#5AE57A}
input::placeholder{color:#5A845A}
select option{background:#3C603C}
.setup-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:10px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:700px;margin:0 auto 16px}
.stat{background:#3C603C;border:1px solid #4C724C;border-radius:12px;padding:14px;text-align:center}
.stat-val{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:3px}
.stat-lbl{font-size:.65rem;color:#BFD8BF;text-transform:uppercase;letter-spacing:.04em}
.prog-card{background:#3C603C;border:1px solid #4C724C;border-radius:14px;padding:18px;max-width:700px;margin:0 auto 16px}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-label{font-size:.85rem}
.prog-pct{font-family:'Playfair Display',serif;color:#5AE57A;font-size:1.1rem}
.track{background:#325132;border-radius:20px;height:10px;overflow:hidden}
.fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#5AE57A,#5AE57A);transition:width .6s}
.form-row{display:grid;grid-template-columns:2fr 1.5fr 1.2fr auto;gap:8px;align-items:flex-end}
.add-btn{background:#5AE57A;color:#325132;border:none;border-radius:8px;padding:9px 16px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;height:38px;transition:opacity .2s;white-space:nowrap}
.add-btn:hover{opacity:.85}
.filter-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.fbtn{background:transparent;border:1px solid #4C724C;color:#BFD8BF;border-radius:20px;padding:5px 13px;font-family:'DM Sans',sans-serif;font-size:.75rem;cursor:pointer;transition:all .2s}
.fbtn:hover,.fbtn.on{border-color:#5AE57A;color:#5AE57A;background:#C9A84C10}
.tester-row{background:#325132;border:1px solid #3C603C;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.t-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.t-name{font-weight:600;font-size:.9rem;flex:1;min-width:100px}
.t-contact{font-size:.75rem;color:#BFD8BF;flex:1;min-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-badge{font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:12px;white-space:nowrap}
.s-interested{background:#C9A84C22;color:#5AE57A;border:1px solid #C9A84C40}
.s-enrolled{background:#44cc6622;color:#5AE57A;border:1px solid #44cc6640}
.s-active{background:#4488ff22;color:#5AE57A;border:1px solid #4488ff40}
.s-completed{background:#aa88ff22;color:#FFFFFF;border:1px solid #aa88ff40}
.s-feedback{background:#ff884422;color:#5AE57A;border:1px solid #ff884440}
.t-actions{display:flex;gap:6px;flex-shrink:0}
.t-sel{background:#3C603C;border:1px solid #4C724C;border-radius:6px;padding:4px 8px;color:#FFFFFF;font-family:'DM Sans',sans-serif;font-size:.72rem;width:auto;cursor:pointer}
.t-del{background:transparent;border:none;color:#4C724C;cursor:pointer;font-size:.85rem;padding:3px 6px;border-radius:4px;transition:color .2s}
.t-del:hover{color:#5AE57A}
.t-note{margin-top:8px;display:flex;gap:8px}
.t-note input{font-size:.8rem;padding:7px 10px;margin:0;background:#3C603C}
.note-save{background:transparent;border:1px solid #4C724C;color:#BFD8BF;border-radius:6px;padding:6px 12px;font-family:'DM Sans',sans-serif;font-size:.75rem;cursor:pointer;white-space:nowrap;transition:all .2s}
.note-save:hover{border-color:#5AE57A;color:#5AE57A}
.t-feedback-text{font-size:.78rem;color:#BFD8BF;margin-top:6px;font-style:italic;padding-left:2px}
.checklist-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #3C603C;cursor:pointer}
.checklist-item:last-child{border-bottom:none}
.check-box{width:18px;height:18px;border:2px solid #4C724C;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:.75rem}
.check-box.done{border-color:#5AE57A;background:#5AE57A;color:#325132}
.check-text{font-size:.86rem;transition:opacity .2s}
.check-text.done{opacity:.4;text-decoration:line-through}
.empty{text-align:center;opacity:.35;padding:20px;font-size:.85rem}
.gold{color:#5AE57A}.green{color:#5AE57A}
footer{text-align:center;margin-top:40px;opacity:.35;font-size:.78rem}
@media(max-width:560px){.stats{grid-template-columns:1fr 1fr}.setup-grid{grid-template-columns:1fr 1fr}.form-row{grid-template-columns:1fr 1fr}.form-row .add-btn{grid-column:1/-1;width:100%}h1{font-size:1.7rem}}
</style>
</head>
<body>
<h1>Beta Launch Tracker</h1>
<p class="sub">Track every beta tester from interested to raving fan</p>

<div class="card">
  <div class="card-title">Beta Offer Setup</div>
  <div class="setup-grid">
    <div><label>Offer Name</label><input id="offerName" type="text" placeholder="e.g. Content Academy Beta" oninput="renderAll()"></div>
    <div><label>Beta Price ($)</label><input id="betaPrice" type="number" placeholder="197" oninput="renderAll()"></div>
    <div><label>Total Spots</label><input id="totalSpots" type="number" placeholder="20" oninput="renderAll()"></div>
    <div><label>Close Date</label><input id="closeDate" type="date" onchange="renderAll()"></div>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val gold" id="sFilled">0</div><div class="stat-lbl">Spots Filled</div></div>
  <div class="stat"><div class="stat-val green" id="sRevenue">$0</div><div class="stat-lbl">Revenue</div></div>
  <div class="stat"><div class="stat-val gold" id="sFeedback">0</div><div class="stat-lbl">Feedback In</div></div>
  <div class="stat"><div class="stat-val" id="sDays">—</div><div class="stat-lbl">Days Left</div></div>
</div>

<div class="prog-card">
  <div class="prog-top"><span class="prog-label" id="progLabel">Beta Progress</span><span class="prog-pct" id="progPct">0%</span></div>
  <div class="track"><div class="fill" id="progFill" style="width:0%"></div></div>
</div>

<div class="card">
  <div class="card-title">Add Beta Tester</div>
  <div class="form-row">
    <div><label>Name</label><input id="fName" type="text" placeholder="e.g. Sarah Collins"></div>
    <div><label>Email / Contact</label><input id="fContact" type="text" placeholder="e.g. sarah@email.com"></div>
    <div><label>Status</label>
      <select id="fStatus">
        <option value="interested">Interested</option>
        <option value="enrolled">Enrolled ✓</option>
        <option value="active">Active</option>
        <option value="completed">Completed</option>
        <option value="feedback">Gave Feedback</option>
      </select>
    </div>
    <button class="add-btn" onclick="addTester()">+ Add</button>
  </div>
</div>

<div style="max-width:700px;margin:0 auto 10px">
  <div class="filter-row" id="filters">
    <button class="fbtn on" onclick="setFilter('all',this)">All</button>
    <button class="fbtn" onclick="setFilter('interested',this)">Interested</button>
    <button class="fbtn" onclick="setFilter('enrolled',this)">Enrolled</button>
    <button class="fbtn" onclick="setFilter('active',this)">Active</button>
    <button class="fbtn" onclick="setFilter('completed',this)">Completed</button>
    <button class="fbtn" onclick="setFilter('feedback',this)">Feedback</button>
  </div>
</div>

<div id="testerList" style="max-width:700px;margin:0 auto 16px"></div>

<div class="card">
  <div class="card-title">Pre-Launch Checklist</div>
  <div id="checklist"></div>
</div>

<footer>Powered by GetPaidToBeYouOnline</footer>

<script>
const STORE='betaTracker';const CSTORE='betaChecklist';
let testers=JSON.parse(localStorage.getItem(STORE)||'[]');
let checks=JSON.parse(localStorage.getItem(CSTORE)||'null')||[
  'Write and publish sales / waitlist page',
  'Set beta price and define what\'s included',
  'Reach out personally to 20 warm leads',
  'Post about the beta to your audience',
  'Set up payment link or checkout',
  'Create welcome email for new beta testers',
  'Build community or group for beta participants',
  'Schedule kick-off call or onboarding',
  'Prepare feedback form or survey',
  'Document what worked for the full launch',
].map((t,i)=>({id:i,text:t,done:false}));

let filter='all';
function fmt(n){return'$'+Math.round(n).toLocaleString()}
function save(){localStorage.setItem(STORE,JSON.stringify(testers));localStorage.setItem(CSTORE,JSON.stringify(checks));}
function v(id){return(document.getElementById(id)||{}).value||''}

function addTester(){
  const name=document.getElementById('fName').value.trim();
  const contact=document.getElementById('fContact').value.trim();
  const status=document.getElementById('fStatus').value;
  if(!name)return;
  testers.unshift({id:Date.now(),name,contact,status,note:''});
  save();document.getElementById('fName').value='';document.getElementById('fContact').value='';
  renderAll();
}

function updateStatus(id,status){const t=testers.find(t=>t.id===id);if(t){t.status=status;save();renderAll();}}
function saveNote(id,val){const t=testers.find(t=>t.id===id);if(t){t.note=val;save();renderAll();}}
function delTester(id){if(!confirm('Remove this tester?'))return;testers=testers.filter(t=>t.id!==id);save();renderAll();}
function setFilter(f,btn){filter=f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderAll();}

const statusLabel={interested:'Interested',enrolled:'Enrolled ✓',active:'Active',completed:'Completed',feedback:'Gave Feedback'};
const statusCls={interested:'s-interested',enrolled:'s-enrolled',active:'s-active',completed:'s-completed',feedback:'s-feedback'};

function renderAll(){
  const price=parseFloat(v('betaPrice'))||0;
  const spots=parseInt(v('totalSpots'))||0;
  const closeDate=v('closeDate');
  const enrolled=testers.filter(t=>['enrolled','active','completed','feedback'].includes(t.status));
  const feedbackGiven=testers.filter(t=>t.status==='feedback');
  const revenue=enrolled.length*price;
  const pct=spots>0?Math.min(Math.round(enrolled.length/spots*100),100):0;

  document.getElementById('sFilled').textContent=enrolled.length+(spots?'/'+spots:'');
  document.getElementById('sRevenue').textContent=fmt(revenue);
  document.getElementById('sFeedback').textContent=feedbackGiven.length;

  if(closeDate){const diff=Math.ceil((new Date(closeDate)-new Date())/(1000*60*60*24));
    document.getElementById('sDays').textContent=diff>=0?diff:'Closed';
    document.getElementById('sDays').style.color=diff<3?'#5AE57A':diff<7?'#5AE57A':'#FFFFFF';
  }else{document.getElementById('sDays').textContent='—';}

  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progLabel').textContent=
    (v('offerName')||'Beta')+(spots?` — ${enrolled.length} of ${spots} spots filled`:` — ${enrolled.length} enrolled`);

  const visible=filter==='all'?testers:testers.filter(t=>t.status===filter);
  document.getElementById('testerList').innerHTML=visible.length
    ?visible.map(t=>`
      <div class="tester-row">
        <div class="t-top">
          <span class="t-name">${t.name}</span>
          <span class="t-contact">${t.contact||'—'}</span>
          <span class="status-badge ${statusCls[t.status]}">${statusLabel[t.status]}</span>
          <div class="t-actions">
            <select class="t-sel" onchange="updateStatus(${t.id},this.value)">
              ${Object.entries(statusLabel).map(([v,l])=>`<option value="${v}"${t.status===v?' selected':''}>${l}</option>`).join('')}
            </select>
            <button class="t-del" onclick="delTester(${t.id})">✕</button>
          </div>
        </div>
        <div class="t-note">
          <input type="text" placeholder="Add feedback or note…" value="${t.note||''}" id="note_${t.id}">
          <button class="note-save" onclick="saveNote(${t.id},document.getElementById('note_${t.id}').value)">Save</button>
        </div>
        ${t.note?`<div class="t-feedback-text">"${t.note}"</div>`:''}
      </div>`).join('')
    :`<div class="empty">${filter==='all'?'No testers yet — add your first one above.':'No '+filter+' testers.'}</div>`;

  document.getElementById('checklist').innerHTML=checks.map(c=>`
    <div class="checklist-item" onclick="toggleCheck(${c.id})">
      <div class="check-box ${c.done?'done':''}"> ${c.done?'✓':''}</div>
      <span class="check-text ${c.done?'done':''}">${c.text}</span>
    </div>`).join('');
}

function toggleCheck(id){const c=checks.find(c=>c.id===id);if(c){c.done=!c.done;save();renderAll();}}

const now=new Date();
const d=now.toISOString().split('T')[0];
document.getElementById('closeDate').value=new Date(now.getTime()+14*24*60*60*1000).toISOString().split('T')[0];
renderAll();
</script>
</body>
</html>
