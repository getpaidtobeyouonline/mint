<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Summer Schedule Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .idea { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 10px 13px; font-size: .86rem; font-style: italic; margin-bottom: 10px; }
  .week { margin-bottom: 10px; }
  .week .wh { font-size: .82rem; color: #5AE57A; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 7px 12px; margin-bottom: 4px; display: flex; justify-content: space-between; font-size: .86rem; }
  .item .x { cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 10px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Summer Schedule Builder</h1>
  <p class="sub">Plan the long break — camps, trips, activities — so it is fun, not chaos or boredom.</p>

  <div class="panel">
    <div class="idea" id="idea"></div>
    <button class="btn ghost" onclick="newIdea()" style="margin-bottom:6px">Need an idea?</button>
    <div class="row">
      <div><label>Week</label><select id="week"><option>Week 1</option><option>Week 2</option><option>Week 3</option><option>Week 4</option><option>Week 5</option><option>Week 6</option></select></div>
      <div style="flex:2"><label>Plan / activity</label><input id="plan" placeholder="e.g. Beach day / summer camp"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:10px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const WEEKS=["Week 1","Week 2","Week 3","Week 4","Week 5","Week 6"];
  const IDEAS=["Mix busy days with do-nothing days — kids need both","Plan one 'big' thing and lots of small free play","A library trip on a rainy day","Visit somewhere local you have never been","A water-play afternoon in the garden","Bake or cook something together","A nature walk and scavenger hunt","Schedule downtime — boredom sparks creativity"];
  let R=JSON.parse(localStorage.getItem('ssb3')||'[]');
  const save=()=>localStorage.setItem('ssb3',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function newIdea(){ g('idea').textContent='💡 '+IDEAS[Math.floor(Math.random()*IDEAS.length)]; }
  function add(){ if(!v('plan')){ alert('Enter a plan.'); return; }
    R.push({w:g('week').value,p:v('plan')}); g('plan').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the schedule?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No plans added yet.</div>'; return; }
    L.innerHTML=WEEKS.map(w=>{
      const items=R.map((x,i)=>({x,i})).filter(o=>o.x.w===w);
      if(!items.length)return '';
      return '<div class="week"><div class="wh">'+w+'</div>'+items.map(({x,i})=>
        '<div class="item"><span>'+esc(x.p)+'</span><span class="x" onclick="del('+i+')">✕</span></div>').join('')+'</div>';
    }).join('');
  }
  newIdea(); render();
</script>
</body>
</html>
