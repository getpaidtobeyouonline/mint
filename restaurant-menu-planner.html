<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Menu Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.02rem; margin-bottom: 4px; }
  .desc { font-size: .8rem; opacity: .65; margin-bottom: 8px; }
  .add { display: flex; gap: 8px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 15px; border-radius: 8px; font-family:'DM Sans',sans-serif; flex: none; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 7px 12px; margin: 5px 0; display: flex; justify-content: space-between; font-size: .88rem; }
  .item .x { cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { opacity: .45; font-size: .82rem; font-style: italic; padding: 3px 0; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .9rem; margin-top: 14px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Restaurant Menu Planner</h1>
  <p class="sub">Hosting a dinner or planning a small menu? Build it course by course.</p>

  <div class="panel">
    <label>Occasion / menu name</label>
    <input id="header" placeholder="e.g. Saturday dinner party — 6 guests">
  </div>

  <div class="panel" id="s_starters"></div>
  <div class="panel" id="s_mains"></div>
  <div class="panel" id="s_sides"></div>
  <div class="panel" id="s_desserts"></div>
  <div class="panel" id="s_drinks"></div>

  <div class="panel" style="text-align:center">
    <button class="btn" onclick="gen()">Build Menu</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
    <pre id="out" style="display:none;text-align:left"></pre>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const SEC=[
    {id:'starters',title:'Starters',desc:'Light openers'},
    {id:'mains',title:'Mains',desc:'The centrepiece dishes'},
    {id:'sides',title:'Sides',desc:'Vegetables, salads, bread'},
    {id:'desserts',title:'Desserts',desc:'The sweet finish'},
    {id:'drinks',title:'Drinks',desc:'Wine, soft drinks, cocktails'}
  ];
  let D=JSON.parse(localStorage.getItem('rmp2')||'{}');
  SEC.forEach(s=>{ if(!D[s.id])D[s.id]=[]; });
  if(localStorage.getItem('rmp2_header'))g('header').value=localStorage.getItem('rmp2_header');
  g('header').addEventListener('input',()=>localStorage.setItem('rmp2_header',g('header').value));
  const save=()=>localStorage.setItem('rmp2',JSON.stringify(D));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(id){ const inp=document.getElementById('in_'+id); const t=inp.value.trim(); if(!t)return;
    D[id].push(t); inp.value=''; save(); render(); }
  function del(id,i){ D[id].splice(i,1); save(); render(); }
  function render(){
    SEC.forEach(s=>{
      g('s_'+s.id).innerHTML='<h3>'+s.title+'</h3><div class="desc">'+s.desc+'</div>'+
        '<div class="add"><input id="in_'+s.id+'" placeholder="Add a dish..." onkeydown="if(event.key===\'Enter\')add(\''+s.id+'\')" style="flex:1"><button class="btn" onclick="add(\''+s.id+'\')">Add</button></div>'+
        (D[s.id].length?D[s.id].map((x,i)=>'<div class="item"><span>'+esc(x)+'</span><span class="x" onclick="del(\''+s.id+'\','+i+')">✕</span></div>').join(''):'<div class="empty">Nothing added yet.</div>');
    });
  }
  function gen(){
    let t='MENU\n'+(g('header').value.trim()||'')+'\n';
    SEC.forEach(s=>{ if(D[s.id].length)t+='\n'+s.title.toUpperCase()+'\n'+D[s.id].map(x=>'  • '+x).join('\n')+'\n'; });
    g('out').textContent=t; g('out').style.display='block';
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build the menu first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
  render();
</script>
</body>
</html>
