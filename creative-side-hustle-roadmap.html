<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Side Hustle Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Creative Side Hustle Roadmap</h1>
  <p class="sub">Turn your creative gift into a small, real income — start small, grow on purpose.</p>

  <div class="panel">
    <label for="gift">Your creative gift</label>
    <input id="gift" placeholder="What you make or do best">
    <label for="who">Who would happily pay for it</label>
    <input id="who" placeholder="The specific person who needs this">
    <label for="offer">Your first offer (small, finishable)</label>
    <textarea id="offer" placeholder="One specific thing they can buy from you, soon"></textarea>
    <label for="price">A fair price for it</label>
    <input id="price" placeholder="Cover time + materials + a margin">
    <label for="where">Where you will sell it first</label>
    <input id="where" placeholder="A market, Etsy, Instagram, your existing audience">
    <label for="first">Your first five customers — how you'll find them</label>
    <textarea id="first" placeholder="Friends, friends-of-friends, one local spot, one post"></textarea>
    <label for="next">When you'll know it's working</label>
    <input id="next" placeholder="A clear, simple signal — repeat buyer, referrals, fully booked">
    <button class="btn" onclick="gen()">Build Roadmap</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['gift','who','offer','price','where','first','next'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('cshr_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('cshr_'+k,g(k).value)); });
  function gen(){
    const t='CREATIVE SIDE HUSTLE ROADMAP\n\nMY GIFT:\n'+(v('gift')||'[what you do best]')+
    '\n\nWHO WANTS IT:\n'+(v('who')||'[your specific buyer]')+
    '\n\nFIRST OFFER:\n'+(v('offer')||'[one finishable thing they can buy]')+
    '\n\nPRICE: '+(v('price')||'[your honest, fair price]')+
    '\n\nWHERE I WILL SELL FIRST:\n'+(v('where')||'[your first market or platform]')+
    '\n\nFIRST 5 CUSTOMERS — HOW:\n'+(v('first')||'[friends, friends-of-friends, one local spot, one post]')+
    '\n\nI WILL KNOW IT IS WORKING WHEN:\n'+(v('next')||'[a clear, simple signal]')+
    '\n\n--- The honest truth ---\nStart smaller than feels brave. One offer. One channel. Five buyers.\nGet money in fast — real customers teach you more than a perfect plan.\nDouble down on what works, drop what does not. Grow at your own pace.\nThe creative life IS a real career. You are allowed to be paid for what you love.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
