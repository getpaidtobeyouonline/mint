<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted City Break Itinerary Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 90px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .day { margin-bottom: 12px; }
  .day .dh { font-size: .82rem; color: #5AE57A; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 5px; }
  .slot { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 7px 12px; margin-bottom: 4px; display: flex; align-items: center; gap: 9px; font-size: .87rem; }
  .slot .pd { color: #5AE57A; font-size: .76rem; flex: none; width: 64px; }
  .slot .x { margin-left: auto; cursor: pointer; opacity: .5; } .slot .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 10px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted City Break Itinerary Builder</h1>
  <p class="sub">Plan a short city trip by day-part — morning, afternoon, evening — without over-packing it.</p>

  <div class="panel">
    <div class="row">
      <div><label>Day</label><input id="day" type="number" min="1" value="1"></div>
      <div><label>Part of day</label><select id="part"><option>Morning</option><option>Afternoon</option><option>Evening</option></select></div>
      <div style="flex:3"><label>Plan</label><input id="act" placeholder="e.g. Museum + cafe nearby"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="copyAll()" style="margin-top:8px">Copy</button>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const ORDER={Morning:0,Afternoon:1,Evening:2};
  let R=JSON.parse(localStorage.getItem('cbib')||'[]');
  const save=()=>localStorage.setItem('cbib',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('act')){ alert('Enter a plan.'); return; }
    R.push({day:parseInt(g('day').value)||1,part:g('part').value,act:v('act')}); g('act').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the itinerary?')){ R=[]; save(); render(); } }
  function copyAll(){ if(!R.length){ alert('Nothing to copy.'); return; }
    const days=[...new Set(R.map(x=>x.day))].sort((a,b)=>a-b);
    let t='CITY BREAK ITINERARY\n';
    days.forEach(d=>{ t+='\nDAY '+d+'\n'+R.filter(x=>x.day===d).sort((a,b)=>ORDER[a.part]-ORDER[b.part]).map(x=>'  '+x.part+': '+x.act).join('\n')+'\n'; });
    navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.'));
  }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No plans added yet.</div>'; return; }
    const days=[...new Set(R.map(x=>x.day))].sort((a,b)=>a-b);
    L.innerHTML=days.map(d=>{
      const items=R.map((x,i)=>({x,i})).filter(o=>o.x.day===d).sort((a,b)=>ORDER[a.x.part]-ORDER[b.x.part]);
      return '<div class="day"><div class="dh">Day '+d+'</div>'+items.map(({x,i})=>
        '<div class="slot"><span class="pd">'+x.part+'</span><span>'+esc(x.act)+'</span><span class="x" onclick="del('+i+')">✕</span></div>').join('')+'</div>';
    }).join('');
  }
  render();
</script>
</body>
</html>
