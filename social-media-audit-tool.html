<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Social Media Audit Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 740px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  .cat { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 16px 18px; margin-bottom: 14px; }
  .cat h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.05rem; margin-bottom: 6px; }
  .item { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 7px 0; border-top: 1px solid #3C603C; flex-wrap: wrap; }
  .item:first-of-type { border-top: none; }
  .item span { flex: 1; min-width: 210px; font-size: .92rem; }
  select { background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .85rem; padding: 7px 9px; border-radius: 7px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .95rem; padding: 13px 26px; border-radius: 8px; margin: 8px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .score { text-align: center; background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 22px; margin: 18px 0; }
  .score .n { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: #5AE57A; line-height: 1; }
  .score .vd { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: #5AE57A; margin-top: 5px; }
  .bar { display: flex; justify-content: space-between; font-size: .85rem; margin: 8px 0 3px; }
  .tr { background: #3C603C; border-radius: 5px; height: 7px; overflow: hidden; }
  .tr>i { display: block; height: 100%; background: #5AE57A; }
  .fix { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 12px 15px; margin-bottom: 9px; font-size: .9rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Social Media Audit Tool</h1>
  <p class="sub">A full 5-area audit of your presence — score it and get a prioritised fix list.</p>

  <div id="form"></div>
  <button class="btn" onclick="run()">Run Audit</button>
  <button class="btn ghost" onclick="reset()">Reset</button>
  <div id="res"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const A=[
    {n:"Profile & Positioning",k:"prof",items:[
      ["Bio instantly says who you help & how","Lead with a benefit, not a job title."],
      ["Consistent name/handle/photo","Frictionless recognition & search."],
      ["One clear, current CTA/link","Confused visitors don't act."]]},
    {n:"Content Quality",k:"cont",items:[
      ["Strong hooks on every post","First 2s/line decide reach."],
      ["Clear value or POV, not vague","Be useful or have a stance."],
      ["Recognisable, consistent style","Builds trust and recall."]]},
    {n:"Consistency",k:"cons",items:[
      ["You post on a reliable schedule","Gaps reset momentum."],
      ["You batch / plan ahead","Removes the 'what do I post' tax."],
      ["You show up in stories/comments too","Presence beats sporadic posts."]]},
    {n:"Engagement",k:"eng",items:[
      ["You reply to comments fast","Early engagement is a ranking signal."],
      ["You comment on others daily","Fastest free growth lever."],
      ["Content drives saves/shares","Weighted heavily by algorithms."]]},
    {n:"Growth & Monetisation",k:"grow",items:[
      ["You track what works monthly","Can't improve what you don't measure."],
      ["A clear path from follower → buyer","Followers ≠ income without a path."],
      ["At least one active income lever","Affiliate, product, or service."]]}
  ];
  const flat=[]; A.forEach(c=>c.items.forEach(it=>flat.push({c:c.n,t:it[0],h:it[1]})));
  const g=id=>document.getElementById(id);
  const saved=JSON.parse(localStorage.getItem('smat')||'{}');
  g('form').innerHTML=A.map(c=>`<div class="cat"><h3>${c.n}</h3>`+c.items.map((it,j)=>`
    <div class="item"><span>${it[0]}</span>
      <select id="${c.k}_${j}"><option value="1">No</option><option value="2">Partly</option><option value="3">Mostly</option><option value="4">Yes</option></select></div>`).join('')+`</div>`).join('');
  A.forEach(c=>c.items.forEach((_,j)=>{ const e=g(c.k+'_'+j); if(saved[c.k+'_'+j])e.value=saved[c.k+'_'+j]; e.addEventListener('change',pers); }));
  function pers(){ const o={}; A.forEach(c=>c.items.forEach((_,j)=>o[c.k+'_'+j]=g(c.k+'_'+j).value)); localStorage.setItem('smat',JSON.stringify(o)); }
  function run(){
    pers();
    const per=A.map(c=>{ let s=0; c.items.forEach((_,j)=>s+=+g(c.k+'_'+j).value); return {n:c.n,pct:Math.round(s/(c.items.length*4)*100)}; });
    const overall=Math.round(per.reduce((s,p)=>s+p.pct,0)/per.length);
    const vd=overall>=85?['Excellent','Dialled in — now scale what works.']:overall>=65?['Solid','Good base; tighten the weak areas.']:overall>=40?['Needs work','Real leaks — fix the lowest area first.']:['Critical','Start from the top; fundamentals are missing.'];
    const weak=[...per].sort((a,b)=>a.pct-b.pct).slice(0,2);
    g('res').innerHTML=`<div class="score"><div class="n">${overall}%</div><div class="vd">${vd[0]}</div><div style="opacity:.8;font-size:.9rem;margin-top:4px">${vd[1]}</div></div>`+
      `<div class="cat"><h3>By area</h3>`+per.map(p=>`<div class="bar"><span>${p.n}</span><span>${p.pct}%</span></div><div class="tr"><i style="width:${p.pct}%"></i></div>`).join('')+`</div>`+
      `<h3 style="font-family:'Playfair Display',serif;color:#5AE57A;margin:0 0 10px">Fix first</h3>`+
      weak.map(w=>`<div class="fix"><b style="color:#5AE57A">${w.n}</b> (${w.pct}%) — this is dragging your whole presence down. Spend your next 2 weeks here before anything else.</div>`).join('');
    g('res').scrollIntoView({behavior:'smooth'});
  }
  function reset(){ if(confirm('Reset answers?')){ localStorage.removeItem('smat'); A.forEach(c=>c.items.forEach((_,j)=>g(c.k+'_'+j).value='1')); g('res').innerHTML=''; } }
</script>
</body>
</html>
