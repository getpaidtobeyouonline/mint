<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Testing Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 820px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2.1rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 26px; font-size: .95rem; }
  label { display: block; font-size: .78rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 12px 0 6px; }
  input, textarea, select {
    width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF;
    font-family: 'DM Sans', sans-serif; font-size: 1rem; padding: 11px 13px; border-radius: 8px; resize: vertical;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #5AE57A; }
  textarea { min-height: 70px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: .95rem; padding: 12px 22px; border-radius: 8px; margin-top: 16px; }
  .btn:hover { opacity: .9; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 22px; margin-bottom: 22px; }
  .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 22px; }
  .stat { flex: 1; min-width: 140px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 16px; text-align: center; }
  .stat .n { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; }
  .stat .l { font-size: .78rem; opacity: .65; text-transform: uppercase; letter-spacing: .05em; }
  .variant { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 9px; padding: 16px; margin-bottom: 14px; }
  .variant h3 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.15rem; display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .badge { background: #5AE57A; color: #325132; font-size: .7rem; font-weight: 500; padding: 3px 9px; border-radius: 20px; letter-spacing: .04em; }
  .ptext { white-space: pre-wrap; font-size: .9rem; background: #325132; border: 1px solid #3C603C; border-radius: 6px; padding: 10px; margin: 8px 0; }
  .run { font-size: .85rem; opacity: .85; padding: 4px 0; border-top: 1px solid #3C603C; }
  .avg { font-size: .9rem; margin-top: 6px; }
  .gold { color: #5AE57A; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .mini { background: transparent; border: 1px solid #5A845A; color: #FFFFFF; cursor: pointer; padding: 5px 12px; border-radius: 6px; font-size: .8rem; }
  .mini:hover { border-color: #5AE57A; color: #5AE57A; }
  .inline { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
  .inline > div { flex: 1; min-width: 110px; }
  .empty { text-align: center; opacity: .5; padding: 26px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.7rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Prompt Testing Dashboard</h1>
  <p class="sub">Track prompt variations, score every test run, and let the data show you which prompt actually wins.</p>

  <div class="stats" id="stats"></div>

  <div class="panel">
    <label for="vname">New Prompt Variant — Label</label>
    <input id="vname" placeholder="e.g. v3 — added role + examples">
    <label for="vtext">Prompt Text</label>
    <textarea id="vtext" placeholder="Paste the full prompt you're testing…"></textarea>
    <button class="btn" onclick="addVariant()">+ Add Variant</button>
  </div>

  <div id="list"></div>

  <div class="row">
    <button class="btn" onclick="exportReport()">Export Report</button>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  let variants = JSON.parse(localStorage.getItem('ptd') || '[]');
  const save = () => localStorage.setItem('ptd', JSON.stringify(variants));
  const esc = t => (t||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const avg = r => r.length ? (r.reduce((s,x)=>s+x.score,0)/r.length) : 0;

  function addVariant() {
    const name = document.getElementById('vname').value.trim();
    const text = document.getElementById('vtext').value.trim();
    if (!name || !text) { alert('Label and prompt text are required.'); return; }
    variants.push({ name, text, runs: [] });
    document.getElementById('vname').value = '';
    document.getElementById('vtext').value = '';
    save(); render();
  }

  function addRun(i) {
    const sc = +document.getElementById('sc'+i).value;
    const nt = document.getElementById('nt'+i).value.trim();
    variants[i].runs.push({ score: sc, note: nt });
    save(); render();
  }

  function delRun(vi, ri) { variants[vi].runs.splice(ri,1); save(); render(); }
  function delVariant(i) { if (confirm('Delete this variant and its runs?')) { variants.splice(i,1); save(); render(); } }
  function clearAll() { if (confirm('Clear the entire dashboard?')) { variants=[]; save(); render(); } }

  function bestIndex() {
    let bi = -1, bv = -1;
    variants.forEach((v,i) => { if (v.runs.length && avg(v.runs) > bv) { bv = avg(v.runs); bi = i; } });
    return bi;
  }

  function render() {
    const totalRuns = variants.reduce((s,v)=>s+v.runs.length,0);
    const bi = bestIndex();
    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="n">${variants.length}</div><div class="l">Variants</div></div>
      <div class="stat"><div class="n">${totalRuns}</div><div class="l">Test Runs</div></div>
      <div class="stat"><div class="n">${bi>=0 ? avg(variants[bi].runs).toFixed(1) : '—'}</div><div class="l">Top Score</div></div>`;

    const l = document.getElementById('list');
    if (!variants.length) { l.innerHTML = '<div class="empty">No variants yet — add your first prompt above.</div>'; return; }
    l.innerHTML = variants.map((v,i) => `
      <div class="variant">
        <h3>${esc(v.name)} ${i===bi ? '<span class="badge">★ Winner</span>' : ''}</h3>
        <div class="ptext">${esc(v.text)}</div>
        <div class="avg">Avg score: <span class="gold">${v.runs.length ? avg(v.runs).toFixed(2) : 'no runs yet'}</span> ${v.runs.length ? `(${v.runs.length} run${v.runs.length>1?'s':''})` : ''}</div>
        ${v.runs.map((r,ri)=>`<div class="run">★ ${r.score}/5 ${r.note?'— '+esc(r.note):''} <span style="cursor:pointer;opacity:.5" onclick="delRun(${i},${ri})">✕</span></div>`).join('')}
        <div class="inline" style="margin-top:12px">
          <div>
            <label>Score</label>
            <select id="sc${i}"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select>
          </div>
          <div style="flex:3">
            <label>Note (optional)</label>
            <input id="nt${i}" placeholder="What happened in this run?">
          </div>
        </div>
        <div class="row">
          <button class="mini" onclick="addRun(${i})">+ Log Run</button>
          <button class="mini" onclick="delVariant(${i})">✕ Delete Variant</button>
        </div>
      </div>`).join('');
  }

  function exportReport() {
    if (!variants.length) { alert('Add a variant first.'); return; }
    const bi = bestIndex();
    let t = `# Prompt Testing Report\n\n`;
    [...variants].map((v,i)=>({v,i})).sort((a,b)=>avg(b.v.runs)-avg(a.v.runs)).forEach(({v,i}) => {
      t += `## ${v.name}${i===bi?' (WINNER)':''}\nAvg: ${v.runs.length?avg(v.runs).toFixed(2):'n/a'} over ${v.runs.length} run(s)\n\nPrompt:\n${v.text}\n\n`;
      v.runs.forEach(r => t += `- ${r.score}/5${r.note?' — '+r.note:''}\n`);
      t += `\n`;
    });
    const blob = new Blob([t.trim()], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'prompt-test-report.md';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  render();
</script>
</body>
</html>
