<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivia Night Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .grp { font-size: .76rem; text-transform: uppercase; letter-spacing: .04em; color: #5AE57A; margin: 14px 0 6px; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 12px; margin-bottom: 5px; }
  .item .q { font-weight: 500; }
  .item .a { font-size: .82rem; color: #5AE57A; margin-top: 3px; }
  .item .x { cursor: pointer; opacity: .5; float: right; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Trivia Night Builder</h1>
  <p class="sub">Build a quiz that lands — rounds, questions, answers, all in one place.</p>

  <div class="panel">
    <div class="row">
      <div><label>Round</label><input id="round" placeholder="e.g. Music, Geography"></div>
      <div style="flex:2"><label>Question</label><input id="q" placeholder="The question"></div>
    </div>
    <div class="row" style="margin-top:6px">
      <div style="flex:3"><label>Answer</label><input id="a" placeholder="The answer"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="copyOut()" style="margin-top:8px">Copy Quiz</button>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('tnb')||'[]');
  const save=()=>localStorage.setItem('tnb',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('q')){ alert('Enter a question.'); return; }
    R.push({r:v('round')||'General',q:v('q'),a:v('a')}); g('q').value=''; g('a').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all questions?')){ R=[]; save(); render(); } }
  function copyOut(){ if(!R.length){ alert('No questions yet.'); return; }
    const rounds=[...new Set(R.map(x=>x.r))];
    let t='QUIZ NIGHT\n';
    rounds.forEach(r=>{ t+='\nROUND: '+r+'\n'; const items=R.filter(x=>x.r===r); items.forEach((x,i)=>{ t+='  '+(i+1)+'. '+x.q+'\n     A: '+x.a+'\n'; }); });
    navigator.clipboard.writeText(t).then(()=>alert('Quiz copied!'),()=>alert('Copy failed.'));
  }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">Add the first question.</div>'; return; }
    const rounds=[...new Set(R.map(x=>x.r))];
    L.innerHTML=rounds.map(r=>{
      const items=R.map((x,i)=>({x,i})).filter(o=>o.x.r===r);
      return '<div class="grp">'+esc(r)+' ('+items.length+')</div>'+items.map(({x,i})=>
        '<div class="item"><span class="x" onclick="del('+i+')">✕</span><div class="q">'+esc(x.q)+'</div><div class="a">A: '+esc(x.a)+'</div></div>').join('');
    }).join('');
  }
  render();
</script>
</body>
</html>
