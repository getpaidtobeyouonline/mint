<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Fund Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 10px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .res { text-align: center; background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 10px; padding: 20px; }
  .res .n { font-family: 'Playfair Display', serif; font-size: 2.4rem; color: #5AE57A; line-height: 1; }
  .res .l { font-size: .85rem; opacity: .7; margin-top: 6px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
  .stat { flex: 1; min-width: 110px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 12px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: #5AE57A; }
  .stat .l { font-size: .68rem; opacity: .65; text-transform: uppercase; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>College Fund Calculator</h1>
  <p class="sub">Inflation-adjusted cost in the year your child starts — and what to set aside monthly.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="age">Child's age today</label><input id="age" type="number" min="0" max="18" value="3" oninput="calc()"></div>
      <div><label for="start">Starts college at</label><input id="start" type="number" min="16" max="22" value="18" oninput="calc()"></div>
    </div>
    <div class="grid">
      <div><label for="cost">Current annual cost ($)</label><input id="cost" type="number" min="0" value="25000" oninput="calc()"></div>
      <div><label for="years">Years of college</label><input id="years" type="number" min="1" max="8" value="4" oninput="calc()"></div>
    </div>
    <div class="grid">
      <div><label for="infl">Education inflation (% / yr)</label><input id="infl" type="number" min="0" step="0.1" value="5" oninput="calc()"></div>
      <div><label for="ret">Investment return (% / yr)</label><input id="ret" type="number" min="0" step="0.1" value="6" oninput="calc()"></div>
    </div>
    <label for="have">Saved already ($)</label><input id="have" type="number" min="0" value="2000" oninput="calc()">
  </div>

  <div class="res">
    <div class="n" id="total">$0</div>
    <div class="l">total cost in future dollars</div>
    <div class="stats">
      <div class="stat"><div class="v" id="mo">$0</div><div class="l">save / month</div></div>
      <div class="stat"><div class="v" id="yrs">—</div><div class="l">years to save</div></div>
    </div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), n=id=>parseFloat(g(id).value)||0;
  ['age','start','cost','years','infl','ret','have'].forEach(k=>{ const s=localStorage.getItem('cfc_'+k); if(s!==null)g(k).value=s; });
  function calc(){
    ['age','start','cost','years','infl','ret','have'].forEach(k=>localStorage.setItem('cfc_'+k,g(k).value));
    const yrsTo=Math.max(0,n('start')-n('age')), m=yrsTo*12;
    let total=0;
    for(let i=0;i<n('years');i++) total += n('cost')*Math.pow(1+n('infl')/100, yrsTo+i);
    g('total').textContent='$'+Math.round(total).toLocaleString();
    g('yrs').textContent=yrsTo;
    const r=n('ret')/100/12, gap=Math.max(0,total - n('have')*Math.pow(1+n('ret')/100,yrsTo));
    let pm = 0;
    if(m>0){ if(r>0) pm = gap*r/(Math.pow(1+r,m)-1); else pm = gap/m; }
    g('mo').textContent='$'+Math.round(pm).toLocaleString();
  }
  calc();
</script>
</body>
</html>
