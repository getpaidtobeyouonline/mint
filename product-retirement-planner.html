<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Retirement Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#325132;color:#FFFFFF;font-family:'DM Sans',sans-serif;min-height:100vh;padding:2rem 1rem}
.container{max-width:680px;margin:0 auto}
header{text-align:center;margin-bottom:2rem}
h1{font-family:'Playfair Display',serif;font-size:2.1rem;color:#5AE57A;margin-bottom:.5rem}
.subtitle{opacity:.65;font-size:.95rem;max-width:480px;margin:0 auto}
.card{background:#3C603C;border:1px solid #4C724C;border-radius:12px;padding:1.4rem 1.5rem;margin-bottom:1.25rem}
.card h2{font-family:'Playfair Display',serif;color:#5AE57A;font-size:1rem;margin-bottom:.9rem;padding-bottom:.5rem;border-bottom:1px solid #4C724C}
label{display:block;font-size:.82rem;font-weight:500;opacity:.7;margin-bottom:.35rem;margin-top:.85rem}
label:first-of-type{margin-top:0}
input[type=text]{width:100%;background:#325132;border:1px solid #4C724C;border-radius:8px;padding:.7rem .9rem;color:#FFFFFF;font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
input[type=text]:focus{border-color:#5AE57A}
.opt-row{display:flex;gap:.55rem;flex-wrap:wrap}
.opt{flex:1;min-width:0;background:#325132;border:1px solid #4C724C;border-radius:8px;padding:.55rem .4rem;text-align:center;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;color:#FFFFFF;transition:border-color .2s,color .2s,background .2s}
.opt.sel{border-color:#5AE57A;color:#5AE57A;background:#325132}
.btn{width:100%;background:#5AE57A;color:#325132;border:none;border-radius:8px;padding:.9rem;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.02em;transition:opacity .2s;margin-top:.9rem}
.btn:hover{opacity:.88}
.results{display:none}
.results.show{display:block}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;margin-bottom:.75rem}
.stat{background:#3C603C;border:1px solid #4C724C;border-radius:8px;padding:.65rem .5rem;text-align:center}
.stat-val{font-family:'Playfair Display',serif;font-size:1.2rem;color:#5AE57A;display:block}
.stat-lbl{font-size:.63rem;opacity:.45;display:block;margin-top:.15rem;text-transform:uppercase;letter-spacing:.06em}
.verdict-card{border-radius:12px;padding:1.3rem 1.5rem;margin-bottom:1rem}
.verdict-label{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:.4rem}
.verdict-tagline{font-size:.88rem;opacity:.75;line-height:1.45;margin-bottom:.9rem}
.score-display{display:flex;align-items:center;gap:.75rem}
.score-num{font-family:'Playfair Display',serif;font-size:2.2rem;min-width:3.2rem;line-height:1}
.score-track{flex:1}
.score-bar-wrap{background:#00000033;border-radius:4px;height:8px;overflow:hidden;margin-bottom:.2rem}
.score-bar-fill{height:100%;border-radius:4px}
.score-legend{font-size:.67rem;opacity:.45;display:flex;justify-content:space-between}
.section-card{background:#3C603C;border:1px solid #4C724C;border-radius:10px;padding:1.1rem 1.25rem;margin-bottom:.85rem}
.section-card h3{font-family:'Playfair Display',serif;font-size:.95rem;color:#5AE57A;margin-bottom:.75rem}
.step-list{list-style:none;counter-reset:sc}
.step-list li{font-size:.83rem;opacity:.72;padding:.35rem 0 .35rem 1.65rem;position:relative;line-height:1.5;border-bottom:1px solid #3C603C;counter-increment:sc}
.step-list li:last-child{border-bottom:none}
.step-list li::before{content:counter(sc);position:absolute;left:0;width:1.15rem;height:1.15rem;background:#5AE57A;color:#325132;border-radius:50%;font-size:.62rem;font-weight:700;line-height:1.15rem;text-align:center;top:.38rem}
.bullet-list{list-style:none}
.bullet-list li{font-size:.83rem;opacity:.72;padding:.3rem 0 .3rem 1.2rem;position:relative;line-height:1.45;border-bottom:1px solid #3C603C}
.bullet-list li:last-child{border-bottom:none}
.bullet-list li::before{content:'→';position:absolute;left:0;color:#5AE57A;font-size:.8rem;top:.3rem}
.copy-btn{width:100%;background:transparent;border:1px solid #5AE57A;color:#5AE57A;border-radius:8px;padding:.75rem;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:.25rem}
.copy-btn:hover{opacity:.7}
footer{text-align:center;font-size:.75rem;opacity:.4;margin-top:2rem;padding-bottom:1rem}
@media(max-width:480px){h1{font-size:1.75rem}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Product Retirement Planner</h1>
    <p class="subtitle">Answer four questions about your product and get a retirement score, a clear verdict, and a step-by-step plan for what to do next.</p>
  </header>

  <div class="card">
    <h2>Your Product</h2>
    <label>Product Type</label>
    <div class="opt-row">
      <button class="opt sel" onclick="pickPT(0)" id="pt0">Course</button>
      <button class="opt"     onclick="pickPT(1)" id="pt1">Ebook</button>
      <button class="opt"     onclick="pickPT(2)" id="pt2">Template Kit</button>
      <button class="opt"     onclick="pickPT(3)" id="pt3">Membership</button>
      <button class="opt"     onclick="pickPT(4)" id="pt4">Coaching</button>
    </div>
    <label>Product Name</label>
    <input type="text" id="inT" placeholder="e.g. Email Marketing Bootcamp, The Freelancer Kit">
    <label>Sales Trend</label>
    <div class="opt-row">
      <button class="opt"     onclick="pick('tr',0)" id="tr0">Growing</button>
      <button class="opt sel" onclick="pick('tr',1)" id="tr1">Stable</button>
      <button class="opt"     onclick="pick('tr',2)" id="tr2">Declining</button>
      <button class="opt"     onclick="pick('tr',3)" id="tr3">Dead</button>
    </div>
    <label>Support Load</label>
    <div class="opt-row">
      <button class="opt sel" onclick="pick('su',0)" id="su0">Minimal</button>
      <button class="opt"     onclick="pick('su',1)" id="su1">Manageable</button>
      <button class="opt"     onclick="pick('su',2)" id="su2">Heavy</button>
      <button class="opt"     onclick="pick('su',3)" id="su3">Draining</button>
    </div>
    <label>Content Freshness</label>
    <div class="opt-row">
      <button class="opt sel" onclick="pick('cf',0)" id="cf0">Evergreen</button>
      <button class="opt"     onclick="pick('cf',1)" id="cf1">Slightly Dated</button>
      <button class="opt"     onclick="pick('cf',2)" id="cf2">Outdated</button>
      <button class="opt"     onclick="pick('cf',3)" id="cf3">Wrong / Harmful</button>
    </div>
    <label>Your Energy for It</label>
    <div class="opt-row">
      <button class="opt sel" onclick="pick('en',0)" id="en0">Energized</button>
      <button class="opt"     onclick="pick('en',1)" id="en1">Neutral</button>
      <button class="opt"     onclick="pick('en',2)" id="en2">Drained</button>
      <button class="opt"     onclick="pick('en',3)" id="en3">Done With It</button>
    </div>
    <button class="btn" onclick="generate()">Generate My Retirement Plan →</button>
  </div>

  <div class="results" id="results">
    <div class="stats" id="statsBar"></div>
    <div id="verdictCard"></div>
    <div class="section-card">
      <h3>Your Action Plan</h3>
      <ul class="step-list" id="planList"></ul>
    </div>
    <div class="section-card">
      <h3>Customer Care</h3>
      <ul class="bullet-list" id="custList"></ul>
    </div>
    <div class="section-card">
      <h3>Content Afterlife</h3>
      <ul class="bullet-list" id="afterList"></ul>
    </div>
    <button class="copy-btn" id="copyBtn" onclick="copyResults()">Copy Retirement Plan as Text</button>
  </div>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>
<script>
const st = (v,l) => `<div class="stat"><span class="stat-val">${v}</span><span class="stat-lbl">${l}</span></div>`;
const ptLabel    = ['Course','Ebook','Template Kit','Membership','Coaching'];
const trLabels   = ['Growing','Stable','Declining','Dead'];
const trVals     = [0,15,40,65];
const suVals     = [0,5,15,25];
const cfVals     = [0,5,15,20];
const enVals     = [0,5,15,20];
const MAX        = 130;

const verdicts = [
  {label:'Keep & Grow',      col:'#5AE57A', bg:'#325132', tag:'This product still has life — focus on optimising, not exiting.'},
  {label:'Monitor Closely',  col:'#5AE57A', bg:'#325132', tag:'Mixed signals — set a 60-day checkpoint before making any decision.'},
  {label:'Plan Your Sunset', col:'#5AE57A', bg:'#325132', tag:'The signals are pointing toward the exit. Wind down deliberately — not reactively.'},
  {label:'Retire Now',       col:'#5AE57A', bg:'#325132', tag:'Clear retirement signal. A clean exit protects your brand and frees your energy for what\'s next.'},
];

const planSteps = [
  ['Survey existing buyers — one question: "What\'s the #1 thing you wish this also covered?" Use the answers to plan your next update.',
   'Add one fresh case study or testimonial to your sales page this month — new proof lifts conversions without changing the product.',
   'Create a simple companion resource (checklist, swipe file, or template) and bundle it at no extra cost to reduce refund requests.',
   'Test a 20–30% price increase — products with strong social proof often convert just as well at a higher price point.',
   'Email past buyers with a referral nudge — "know someone who needs this?" with a direct link costs nothing and regularly converts.'],
  ['Stop active promotion for 30 days and watch organic or evergreen sales — this separates a marketing problem from a product problem.',
   'Set a checkpoint now: decide what "good enough to keep" means — e.g. 5 sales in 60 days, 2 new reviews, or one strong testimonial.',
   'Run one final promotion (flash sale, bundle, or email sequence) and measure conversion rate — if it doesn\'t move, the market has moved on.',
   'Audit your support inbox — if the same questions recur, a single FAQ or module tweak might meaningfully improve buyer satisfaction.',
   'Talk to 2 recent buyers and 2 people who didn\'t buy — their answers will clarify whether to invest in or walk away from this product.'],
  ['Set a public close date 30–60 days out — "doors closing on [date]" creates genuine urgency without manufactured pressure.',
   'Run a final promotion in the last 30 days — last-chance pricing or a limited bonus stack gives fence-sitters a real reason to decide.',
   'Draft a "thank you and what\'s next" email to all past buyers — give them first access to your next offer as a loyalty reward.',
   'Decide now what happens after close: archive it, repurpose it, or bundle it — don\'t leave that decision to the last minute.',
   'Document your single biggest learning from this product — it belongs in your next launch strategy, not lost in a forgotten debrief.'],
  ['Stop all advertising and promotion immediately — every dollar spent promoting a dead product can\'t go toward your next one.',
   'Send a direct, confident email to your list: "I\'m retiring [product name]. Here\'s what\'s next — and here\'s how you\'re taken care of."',
   'Honour all existing customer access commitments — communicate clearly whether access continues and for how long, then stick to it.',
   'Archive the product page or mark it sold out — a dead page that still ranks sends confused buyers to a dead end.',
   'Write a one-page internal debrief: what worked, what didn\'t, and one thing you\'d do differently — this is your edge for the next launch.'],
];

const custCare = [
  ['No communication needed — focus on improving the experience, not introducing uncertainty about a product they\'ve already paid for.',
   'If strong results exist, share them publicly — buyer wins on your sales page or community reinforce the purchase decision they made.',
   'Send a quiet "thank you for being an early supporter" note — no pitch, just gratitude. It builds loyalty that converts on your next offer.'],
  ['Don\'t share your uncertainty with buyers — communicating doubt undermines a purchase decision they\'ve already made and can\'t undo.',
   'If you survey buyers, frame it as improving the product, not evaluating it — "help us make this better" gets far more honest responses.',
   'Keep support response times strong — good support buys you goodwill and clarity while you evaluate, and protects your reviews.'],
  ['Email all buyers before you close — give them time to complete the product, download files, or export anything they need.',
   'Offer existing buyers a loyalty discount on your next product — they are your warmest and most qualified audience for what comes next.',
   'Be specific about access after the close date — will they still have it? For how long? Ambiguity damages trust; clarity builds it.'],
  ['Email all current buyers within 48 hours — be direct about what\'s happening and reassure them their access and results are secure.',
   'Honour every guarantee or commitment made at point of sale, without exception — your reputation outlasts any individual product.',
   'Offer existing buyers early access or a discount on what\'s coming next — turn a potential negative into a genuine loyalty moment.'],
];

const afterlife = [
  ['Break the course into standalone modules and sell each as a focused mini-course at a lower, easier-to-say-yes-to price point.',
   'Extract your best lessons into a lead magnet or content upgrade — proven course content becomes your most effective list-builder.',
   'Pitch the core framework as a podcast series, YouTube channel, or written newsletter to build an audience for your next paid offer.'],
  ['Turn chapters into a free email series to grow your list using content you\'ve already proven works with buyers.',
   'Extract the core method as a template or checklist and sell it as a $9–17 product — faster to deliver, faster to convert.',
   'Expand the ebook into a course or live workshop and relaunch at a significantly higher price with a stronger transformation promise.'],
  ['Break the kit into individual templates and sell each separately as add-ons to other products or as standalone shop items.',
   'Convert your most popular template into a free lead magnet and use it to promote a new paid kit or course.',
   'Bundle remaining templates into a "complete vault" at a one-time price and close it permanently — scarcity drives a final revenue spike.'],
  ['Archive the content library and offer existing members lifetime access at a fixed fee — let them keep what they built alongside you.',
   'Extract your most-used content as standalone products — let former members buy exactly what they want, without the ongoing commitment.',
   'Transition the community to a free group and monetise through a new paid product, workshop, or live event series instead.'],
  ['Turn your most-used coaching frameworks into a self-paced course or template kit — scale your impact without scaling your time.',
   'Document your top client breakthroughs as detailed case studies — they become your next launch\'s most credible social proof.',
   'Offer a final cohort to close out with a small group before transitioning to a new format, price point, or delivery model.'],
];

let state = {pt:0, tr:1, su:0, cf:0, en:0};

function pickPT(i) { state.pt=i; [0,1,2,3,4].forEach(x=>document.getElementById(`pt${x}`).classList.toggle('sel',x===i)); }
function pick(k,i) { state[k]=i; [0,1,2,3].forEach(x=>document.getElementById(`${k}${x}`).classList.toggle('sel',x===i)); }

function calcScore() { return Math.round((trVals[state.tr]+suVals[state.su]+cfVals[state.cf]+enVals[state.en])/MAX*100); }
function getVI(sc)   { return sc>=65?3:sc>=45?2:sc>=25?1:0; }

function generate() {
  const T = document.getElementById('inT').value.trim();
  if (!T) { alert('Please enter your product name.'); return; }

  const sc = calcScore();
  const vi = getVI(sc);
  const v  = verdicts[vi];

  document.getElementById('statsBar').innerHTML =
    st(sc+'/100','Retire Score') + st(v.label,'Verdict') + st(ptLabel[state.pt],'Product') + st(trLabels[state.tr],'Sales Trend');

  document.getElementById('verdictCard').innerHTML = `
    <div class="verdict-card" style="background:${v.bg};border:1px solid ${v.col}44">
      <div class="verdict-label" style="color:${v.col}">${v.label}</div>
      <div class="verdict-tagline">${v.tag}</div>
      <div class="score-display">
        <div class="score-num" style="color:${v.col}">${sc}</div>
        <div class="score-track">
          <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${sc}%;background:${v.col}"></div></div>
          <div class="score-legend"><span>0 — Keep forever</span><span>100 — Retire now</span></div>
        </div>
      </div>
    </div>`;

  document.getElementById('planList').innerHTML  = planSteps[vi].map(s=>`<li>${s}</li>`).join('');
  document.getElementById('custList').innerHTML  = custCare[vi].map(s=>`<li>${s}</li>`).join('');
  document.getElementById('afterList').innerHTML = afterlife[state.pt].map(s=>`<li>${s}</li>`).join('');

  const r = document.getElementById('results');
  r.classList.add('show');
  r.scrollIntoView({behavior:'smooth',block:'start'});
}

function copyResults() {
  const T  = document.getElementById('inT').value.trim();
  const sc = calcScore();
  const vi = getVI(sc);
  const v  = verdicts[vi];
  let text = `PRODUCT RETIREMENT PLAN\nProduct: ${T} (${ptLabel[state.pt]})\nRetirement Score: ${sc}/100 — ${v.label}\n${v.tag}\n\n`;
  text += `ACTION PLAN\n${'─'.repeat(36)}\n`;
  planSteps[vi].forEach((s,i)=>{ text+=`${i+1}. ${s}\n`; });
  text += `\nCUSTOMER CARE\n${'─'.repeat(36)}\n`;
  custCare[vi].forEach(s=>{ text+=`→ ${s}\n`; });
  text += `\nCONTENT AFTERLIFE\n${'─'.repeat(36)}\n`;
  afterlife[state.pt].forEach(s=>{ text+=`→ ${s}\n`; });
  text += `\n---\nCreated with Product Retirement Planner by GetPaidToBeYouOnline`;

  const btn=document.getElementById('copyBtn');
  const done=()=>{btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy Retirement Plan as Text',2200);};
  navigator.clipboard?navigator.clipboard.writeText(text).then(done)
    :(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done();})();
}
</script>
</body>
</html>
