<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Daily Task Prioritiser</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #325132;
    color: #FFFFFF;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    color: #5AE57A;
    font-size: 2rem;
    text-align: center;
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center;
    color: #F0EBE0aa;
    font-size: 0.9rem;
    margin-bottom: 28px;
  }
  .card {
    background: #3C603C;
    border: 1px solid #4C724C;
    border-radius: 12px;
    padding: 20px;
    max-width: 600px;
    margin: 0 auto 24px;
  }
  .input-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .input-row input {
    flex: 1;
    min-width: 160px;
    background: #325132;
    border: 1px solid #4C724C;
    color: #FFFFFF;
    padding: 10px 14px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
  }
  .input-row input:focus { border-color: #5AE57A; }
  select {
    background: #325132;
    border: 1px solid #4C724C;
    color: #FFFFFF;
    padding: 10px 14px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: #5AE57A; }
  .btn {
    background: #5AE57A;
    color: #325132;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.95rem;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover { background: #5AE57A; }
  .section-label {
    font-family: 'Playfair Display', serif;
    color: #5AE57A;
    font-size: 1rem;
    margin-bottom: 14px;
  }
  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #3C603C;
  }
  .task-item:last-child { border-bottom: none; }
  .task-item input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #5AE57A;
    cursor: pointer;
    flex-shrink: 0;
  }
  .task-text {
    flex: 1;
    font-size: 0.95rem;
    word-break: break-word;
  }
  .task-text.done {
    text-decoration: line-through;
    color: #BFD8BF;
  }
  .badge {
    font-size: 0.72rem;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-high   { background: #5AE57A; color: #5AE57A; }
  .badge-medium { background: #2E4D2E; color: #5AE57A; }
  .badge-low    { background: #2E4D2E; color: #5AE57A; }
  .del-btn {
    background: none;
    border: none;
    color: #5A845A;
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 6px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .del-btn:hover { color: #5AE57A; }
  .empty {
    text-align: center;
    color: #5A845A;
    font-size: 0.9rem;
    padding: 20px 0;
  }
  .clear-row {
    text-align: right;
    margin-top: 12px;
  }
  .clear-btn {
    background: none;
    border: none;
    color: #BFD8BF;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    text-decoration: underline;
  }
  .clear-btn:hover { color: #5AE57A; }
  footer {
    text-align: center;
    color: #5A845A;
    font-size: 0.78rem;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 10px;
    background: #325132;
    border-top: 1px solid #3C603C;
  }
</style>
</head>
<body>

<h1>Minted Daily Task Prioritiser</h1>
<p class="subtitle">Add your tasks, set a priority, and tackle what matters most first.</p>

<div class="card">
  <div class="input-row">
    <input type="text" id="taskInput" placeholder="Enter a task..." maxlength="120" />
    <select id="prioritySelect">
      <option value="high">🔴 High</option>
      <option value="medium" selected>🟡 Medium</option>
      <option value="low">🟢 Low</option>
    </select>
    <button class="btn" onclick="addTask()">Add</button>
  </div>
</div>

<div class="card">
  <div class="section-label">Today's Tasks</div>
  <div id="taskList"><p class="empty">No tasks yet — add one above.</p></div>
  <div class="clear-row">
    <button class="clear-btn" onclick="clearDone()">Clear completed</button>
  </div>
</div>

<footer>Powered by GetPaidToBeYouOnline</footer>

<script>
  const ORDER = { high: 0, medium: 1, low: 2 };
  let tasks = JSON.parse(localStorage.getItem('dtp_tasks') || '[]');

  function save() {
    localStorage.setItem('dtp_tasks', JSON.stringify(tasks));
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) return;
    const priority = document.getElementById('prioritySelect').value;
    tasks.push({ id: Date.now(), text, priority, done: false });
    tasks.sort((a, b) => ORDER[a.priority] - ORDER[b.priority]);
    save();
    render();
    input.value = '';
    input.focus();
  }

  function toggle(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function remove(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  function clearDone() {
    tasks = tasks.filter(t => !t.done);
    save();
    render();
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    const list = document.getElementById('taskList');
    if (!tasks.length) {
      list.innerHTML = '<p class="empty">No tasks yet — add one above.</p>';
      return;
    }
    list.innerHTML = tasks.map(t => `
      <div class="task-item">
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})" />
        <span class="task-text ${t.done ? 'done' : ''}">${esc(t.text)}</span>
        <span class="badge badge-${t.priority}">${t.priority.charAt(0).toUpperCase() + t.priority.slice(1)}</span>
        <button class="del-btn" onclick="remove(${t.id})" title="Delete">✕</button>
      </div>`).join('');
  }

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
