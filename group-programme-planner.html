<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Programme Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Group Programme Planner</h1>
  <p class="sub">Plan a group coaching programme that scales your time and lifts results.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="name">Programme name</label><input id="name" placeholder="Programme name"></div>
      <div><label for="size">Group size</label><input id="size" placeholder="e.g. 8-12"></div>
      <div><label for="length">Duration</label><input id="length" placeholder="e.g. 8 weeks"></div>
    </div>
    <label for="outcome">The outcome members get</label>
    <textarea id="outcome" placeholder="The shared transformation"></textarea>
    <label for="rhythm">Weekly rhythm</label>
    <textarea id="rhythm" placeholder="e.g. Mon content drop, Wed live call, async support"></textarea>
    <label for="community">Community &amp; support element</label>
    <input id="community" placeholder="e.g. private group, accountability pods, voice support">
    <label for="price">Price &amp; payment options</label>
    <input id="price" placeholder="e.g. £997 or 3 x £359">
    <button class="btn" onclick="gen()">Build Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['name','size','length','outcome','rhythm','community','price'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('gpp_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('gpp_'+k,g(k).value)); });
  function gen(){
    const t='GROUP PROGRAMME PLAN\n\nPROGRAMME: '+(v('name')||'[name]')+(v('size')?'  |  Group: '+v('size'):'')+(v('length')?'  |  '+v('length'):'')+
    '\n\nTHE OUTCOME:\n'+(v('outcome')||'[the shared transformation]')+
    '\n\nWEEKLY RHYTHM:\n'+(v('rhythm')||'[content + live calls + support]')+
    '\n\nCOMMUNITY & SUPPORT:\n'+(v('community')||'[group, pods, voice support]')+
    '\n\nPRICE & PAYMENT:\n'+(v('price')||'[price and payment options]')+
    '\n\n--- Group programme tips ---\nKeep the cohort small enough that everyone feels seen.\nA repeatable weekly rhythm beats a clever but chaotic schedule.\nPeer accountability is half the value — design the community on purpose.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
