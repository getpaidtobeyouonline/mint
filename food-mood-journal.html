<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Mood Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 12px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .row2 { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 9px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: .85rem; gap: 10px; }
  .row2 .x { cursor: pointer; opacity: .5; } .row2 .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  .insight { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 11px 14px; font-size: .85rem; margin-bottom: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Food Mood Journal</h1>
  <p class="sub">Log what you ate and how you felt after. Patterns show which foods lift or drain you.</p>

  <div class="panel">
    <label>What did you eat / drink?</label>
    <input id="food" placeholder="e.g. Oats and berries / large coffee / pasta">
    <div class="row">
      <div><label>Meal</label><select id="meal"><option>Breakfast</option><option>Lunch</option><option>Dinner</option><option>Snack</option><option>Drink</option></select></div>
      <div><label>Energy after</label><select id="energy"><option>High</option><option>Steady</option><option>Low / crash</option></select></div>
      <div><label>Mood after</label><select id="mood"><option>😊 Good</option><option>😐 Neutral</option><option>😟 Off</option><option>😣 Bloated/heavy</option></select></div>
    </div>
    <button class="btn" onclick="add()">+ Log Entry</button>
  </div>

  <div class="panel">
    <div id="insight"></div>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('fmj')||'[]');
  const save=()=>localStorage.setItem('fmj',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('food')){ alert('What did you eat?'); return; }
    R.push({t:Date.now(),food:v('food'),meal:g('meal').value,energy:g('energy').value,mood:g('mood').value});
    g('food').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all entries?')){ R=[]; save(); render(); } }
  function render(){
    const I=g('insight'), L=g('list');
    if(!R.length){ I.innerHTML=''; L.innerHTML='<div class="empty">No entries yet — log your next meal.</div>'; return; }
    const crash=R.filter(x=>x.energy==='Low / crash').length;
    const good=R.filter(x=>x.mood==='😊 Good').length;
    I.innerHTML='<div class="insight">'+R.length+' entries · '+good+' felt good after · '+crash+' energy crash'+(crash===1?'':'es')+'. Look for the foods next to each pattern.</div>';
    L.innerHTML=[...R].reverse().map(x=>{ const i=R.indexOf(x);
      const d=new Date(x.t).toLocaleDateString(undefined,{month:'short',day:'numeric'});
      return '<div class="row2"><span><b style="color:#5AE57A">'+x.meal+'</b> · '+esc(x.food)+'<br><span style="opacity:.7">'+d+' · '+x.energy+' energy · '+x.mood+'</span></span><span class="x" onclick="del('+i+')">✕</span></div>';
    }).join('');
  }
  render();
</script>
</body>
</html>
