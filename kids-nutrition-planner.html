<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Nutrition Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .count { text-align: center; margin-bottom: 12px; }
  .count .n { font-family: 'Playfair Display', serif; font-size: 2.4rem; color: #5AE57A; }
  .track { background: #3C603C; border-radius: 5px; height: 12px; overflow: hidden; margin: 8px 0; }
  .track>i { display: block; height: 100%; background: #5AE57A; transition: width .3s; }
  .hab { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #4C724C; cursor: pointer; font-size: .88rem; }
  .hab:last-child { border-bottom: none; }
  .box { width: 21px; height: 21px; border: 2px solid #5AE57A; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; font-size: .7rem; font-weight: 700; }
  .box.on { background: #5AE57A; color: #325132; }
  .hab.done .lb { text-decoration: line-through; opacity: .5; }
  .note { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; font-size: .8rem; opacity: .8; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Kids Nutrition Planner</h1>
  <p class="sub">A daily checklist of balanced eating goals for children — tick them off together.</p>

  <div class="panel">
    <div class="count"><span class="n" id="pct">0%</span><div style="opacity:.7;font-size:.85rem">of today's goals</div></div>
    <div class="track"><i id="bar" style="width:0%"></i></div>
    <div id="list"></div>
    <div class="note">General healthy-eating guidance for children, not medical advice. For specific concerns, speak to a paediatrician or dietitian.</div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const HABITS=["Ate fruit today","Ate vegetables today","Had a source of protein","Had a wholegrain food","Had dairy or a calcium source","Drank water (not just sweet drinks)","Tried at least one 'safe new' food","Ate breakfast","Limited sugary snacks &amp; drinks","Ate together as a family at least once"];
  const today=new Date().toISOString().slice(0,10);
  let D=JSON.parse(localStorage.getItem('knp')||'{}');
  if(D.day!==today)D={day:today,done:[]};
  const save=()=>localStorage.setItem('knp',JSON.stringify(D));
  function toggle(i){ D.done.includes(i)?D.done=D.done.filter(x=>x!==i):D.done.push(i); save(); render(); }
  function render(){
    g('list').innerHTML=HABITS.map((h,i)=>{ const on=D.done.includes(i);
      return '<div class="hab'+(on?' done':'')+'" onclick="toggle('+i+')"><span class="box'+(on?' on':'')+'">'+(on?'✓':'')+'</span><span class="lb">'+h+'</span></div>';
    }).join('');
    const pct=Math.round(D.done.length/HABITS.length*100);
    g('pct').textContent=pct+'%'; g('bar').style.width=pct+'%';
  }
  render();
</script>
</body>
</html>
