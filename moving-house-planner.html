<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Moving House Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .count { text-align: center; margin-bottom: 12px; }
  .count .n { font-family: 'Playfair Display', serif; font-size: 2.6rem; color: #5AE57A; }
  .track { background: #3C603C; border-radius: 5px; height: 12px; overflow: hidden; margin: 8px 0; }
  .track>i { display: block; height: 100%; background: #5AE57A; transition: width .3s; }
  .grp { font-size: .78rem; text-transform: uppercase; letter-spacing: .04em; color: #5AE57A; margin: 14px 0 6px; font-weight: 500; }
  .item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid #4C724C; cursor: pointer; font-size: .88rem; }
  .item:last-child { border-bottom: none; }
  .box { width: 20px; height: 20px; border: 2px solid #5AE57A; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; font-size: .7rem; font-weight: 700; }
  .box.on { background: #5AE57A; color: #325132; }
  .item.done .lb { text-decoration: line-through; opacity: .5; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Moving House Planner</h1>
  <p class="sub">Count down to moving day and work through every task, phase by phase.</p>

  <div class="panel">
    <label for="date">Moving day</label>
    <input id="date" type="date" onchange="render()">
    <div class="count" style="margin-top:12px"><span class="n" id="days">—</span><div style="opacity:.7;font-size:.85rem" id="dlabel">set your moving date</div></div>
    <div class="track"><i id="bar" style="width:0%"></i></div>
    <div style="text-align:center;font-size:.85rem;opacity:.8" id="meta"></div>
  </div>

  <div class="panel">
    <div id="list"></div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const GROUPS={
    "6-8 weeks before":["Confirm the moving date","Get removal company quotes (or book a van)","Start decluttering room by room","Sort paperwork &amp; gather important documents"],
    "3-4 weeks before":["Book removals / van","Order packing boxes &amp; supplies","Notify landlord or start the sale handover","Tell schools / nurseries if relevant"],
    "2 weeks before":["Start packing non-essentials","Arrange mail redirection","Notify banks, insurers &amp; subscriptions of the move","Book time off work for moving day"],
    "Final week":["Pack room by room, label every box","Set up utilities at the new home","Defrost the fridge/freezer","Pack an essentials 'first night' box","Confirm details with removals"],
    "Moving day":["Take final meter readings","Do a final walk-through of the empty home","Keep valuables &amp; documents with you","Check everything is loaded","Hand over the keys"]
  };
  let state=JSON.parse(localStorage.getItem('mhp')||'{}');
  if(localStorage.getItem('mhp_date'))g('date').value=localStorage.getItem('mhp_date');
  const save=()=>localStorage.setItem('mhp',JSON.stringify(state));
  function toggle(k){ state[k]=!state[k]; save(); render(); }
  function render(){
    if(g('date').value){
      localStorage.setItem('mhp_date',g('date').value);
      const d=Math.ceil((new Date(g('date').value)-new Date().setHours(0,0,0,0))/86400000);
      g('days').textContent= d>=0?d:'—';
      g('dlabel').textContent= d>1?'days until moving day':d===1?'day to go!':d===0?'Moving day — good luck!':'moving date has passed';
    }
    let html='', total=0, done=0;
    Object.entries(GROUPS).forEach(([grp,items])=>{
      html+='<div class="grp">'+grp+'</div>';
      items.forEach(it=>{ const k=grp+'|'+it; const on=!!state[k]; total++; if(on)done++;
        html+='<div class="item'+(on?' done':'')+'" onclick="toggle(\''+k.replace(/'/g,"\\'")+'\')"><span class="box'+(on?' on':'')+'">'+(on?'✓':'')+'</span><span class="lb">'+it+'</span></div>';
      });
    });
    g('list').innerHTML=html;
    const pct=total?Math.round(done/total*100):0;
    g('bar').style.width=pct+'%';
    g('meta').textContent=done+' / '+total+' tasks done';
  }
  render();
</script>
</body>
</html>
