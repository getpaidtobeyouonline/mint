<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Revenue Goal Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 10px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
  .stat { flex: 1; min-width: 120px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 13px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: #5AE57A; }
  .stat .l { font-size: .69rem; opacity: .65; text-transform: uppercase; }
  .res { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 10px; padding: 18px; }
  .note { font-size: .87rem; opacity: .82; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Revenue Goal Planner</h1>
  <p class="sub">Set an annual revenue goal — see the monthly, weekly, daily, and offers-per-week needed.</p>

  <div class="panel">
    <label for="goal">Annual revenue goal ($)</label>
    <input id="goal" type="number" min="0" value="100000" oninput="calc()">
    <div class="grid">
      <div><label for="aov">Average offer price ($)</label><input id="aov" type="number" min="0" value="497" oninput="calc()"></div>
      <div><label for="weeks">Working weeks / year</label><input id="weeks" type="number" min="1" value="46" oninput="calc()"></div>
    </div>
  </div>

  <div class="res">
    <div class="stats">
      <div class="stat"><div class="v" id="mo">$0</div><div class="l">/ month</div></div>
      <div class="stat"><div class="v" id="wk">$0</div><div class="l">/ week</div></div>
      <div class="stat"><div class="v" id="dy">$0</div><div class="l">/ day</div></div>
      <div class="stat"><div class="v" id="sales">0</div><div class="l">offers / week</div></div>
    </div>
    <div class="note" id="note"></div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), n=id=>parseFloat(g(id).value)||0;
  ['goal','aov','weeks'].forEach(k=>{ const s=localStorage.getItem('rgp_'+k); if(s!==null)g(k).value=s; });
  function calc(){
    ['goal','aov','weeks'].forEach(k=>localStorage.setItem('rgp_'+k,g(k).value));
    const goal=n('goal'), w=Math.max(1,n('weeks')), aov=Math.max(1,n('aov'));
    const mo=goal/12, wk=goal/w, dy=wk/5;
    g('mo').textContent='$'+Math.round(mo).toLocaleString();
    g('wk').textContent='$'+Math.round(wk).toLocaleString();
    g('dy').textContent='$'+Math.round(dy).toLocaleString();
    const sales=wk/aov;
    g('sales').textContent= sales<1 ? sales.toFixed(2) : Math.ceil(sales);
    g('note').textContent = sales>=5
      ? `That is ${Math.ceil(sales)} sales/week at $${aov} each. Higher AOV is your biggest lever — raise the offer price or add an upsell before working harder.`
      : `That is ~${sales.toFixed(2)} sales/week. Eminently doable; the work is consistency, not volume.`;
  }
  calc();
</script>
</body>
</html>
