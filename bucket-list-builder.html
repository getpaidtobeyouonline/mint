<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Bucket List Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .count { text-align: center; margin-bottom: 12px; }
  .count .n { font-family: 'Playfair Display', serif; font-size: 2.4rem; color: #5AE57A; }
  .filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .fp { background: #2A442A; border: 1px solid #5A845A; border-radius: 16px; padding: 5px 12px; font-size: .8rem; cursor: pointer; }
  .fp.on { background: #5AE57A; color: #325132; border-color: #5AE57A; font-weight: 500; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 9px 13px; margin-bottom: 6px; display: flex; align-items: center; gap: 9px; font-size: .88rem; }
  .item.done { border-left: 3px solid #5AE57A; }
  .box { width: 19px; height: 19px; border: 2px solid #5AE57A; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .7rem; font-weight: 700; }
  .box.on { background: #5AE57A; color: #325132; }
  .item.done .lb { text-decoration: line-through; opacity: .55; }
  .item .cat { font-size: .74rem; opacity: .6; }
  .item .x { margin-left: auto; cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Bucket List Builder</h1>
  <p class="sub">Write down the things you truly want to do — a list you can see is a list you start chasing.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Bucket list dream</label><input id="dream" placeholder="e.g. Walk the Great Wall of China"></div>
      <div><label>Category</label><select id="cat"><option>Travel</option><option>Adventure</option><option>Experience</option><option>Skill</option><option>Personal</option></select></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div class="count"><span class="n" id="num">0</span><div style="opacity:.7;font-size:.85rem" id="meta">dreams on your list</div></div>
    <div class="filter" id="filter"></div>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('blb')||'[]'), filter='all';
  const save=()=>localStorage.setItem('blb',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('dream')){ alert('Enter a bucket list dream.'); return; }
    R.push({d:v('dream'),c:g('cat').value,done:false}); g('dream').value=''; save(); render(); }
  function toggle(i){ R[i].done=!R[i].done; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the bucket list?')){ R=[]; save(); render(); } }
  function setF(f){ filter=f; render(); }
  function render(){
    const done=R.filter(x=>x.done).length;
    g('num').textContent=R.length;
    g('meta').textContent=R.length?(done+' done · '+(R.length-done)+' still to go'):'dreams on your list';
    const cats=['all',...new Set(R.map(x=>x.c))];
    g('filter').innerHTML=cats.map(f=>'<span class="fp'+(filter===f?' on':'')+'" onclick="setF(\''+f+'\')">'+(f==='all'?'All':f)+'</span>').join('');
    const L=g('list');
    const shown=R.map((x,i)=>({x,i})).filter(o=>filter==='all'||o.x.c===filter);
    if(!shown.length){ L.innerHTML='<div class="empty">Nothing here yet — add a dream.</div>'; return; }
    shown.sort((a,b)=>a.x.done-b.x.done);
    L.innerHTML=shown.map(({x,i})=>
      '<div class="item'+(x.done?' done':'')+'"><span class="box'+(x.done?' on':'')+'" onclick="toggle('+i+')">'+(x.done?'✓':'')+'</span><span class="lb">'+esc(x.d)+' <span class="cat">· '+x.c+'</span></span><span class="x" onclick="del('+i+')">✕</span></div>').join('');
  }
  render();
</script>
</body>
</html>
