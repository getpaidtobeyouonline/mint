<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Learning Goal Setter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, select, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 150px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Learning Goal Setter</h1>
  <p class="sub">Turn "I want to learn that" into a goal with a target, a date and a first move.</p>

  <div class="panel">
    <label for="skill">What do you want to learn?</label>
    <input id="skill" placeholder="e.g. Conversational Spanish / data analysis">
    <div class="grid">
      <div><label for="level">Target level</label><select id="level"><option>Basic / aware</option><option>Working knowledge</option><option>Proficient</option><option>Advanced / expert</option></select></div>
      <div><label for="by">Target date</label><input id="by" type="date"></div>
    </div>
    <label for="why">Why this matters to you</label>
    <textarea id="why" placeholder="The real reason — connect it to your life or work"></textarea>
    <label for="proof">How you will know you have learned it (the proof)</label>
    <input id="proof" placeholder="e.g. Hold a 10-minute conversation / pass the test">
    <label for="how">How you will learn it (resources &amp; method)</label>
    <textarea id="how" placeholder="Course, book, practice, tutor — what is your route?"></textarea>
    <label for="step">First step you will take this week</label>
    <input id="step" placeholder="Something small and concrete">
    <button class="btn" onclick="gen()">Build Learning Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['skill','level','by','why','proof','how','step'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('lgs_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('lgs_'+k,g(k).value)); });
  function gen(){
    if(!v('skill')){ alert('What do you want to learn?'); return; }
    const t=`MY LEARNING GOAL\n\nI WILL LEARN:\n${v('skill')}\n\nTo the level of: ${v('level')}\nBy: ${v('by')||'[set a date]'}\n\nWHY IT MATTERS:\n${v('why')||'[your real reason]'}\n\nPROOF I HAVE LEARNED IT:\n${v('proof')||'[a clear, demonstrable outcome]'}\n\nHOW I WILL LEARN IT:\n${v('how')||'[resources and method]'}\n\nFIRST STEP THIS WEEK:\n${v('step')||'[a small, concrete action]'}\n\n--- Keep it real ---\nLearning sticks with regular practice, not occasional cramming.\nDefine "done" by what you can DO, not hours spent.\nReview this plan every week and adjust the route, not the goal.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
