<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confidence Score Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  .q { background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
  .q span { flex: 1; min-width: 220px; font-size: .92rem; }
  select { background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .85rem; padding: 7px 9px; border-radius: 7px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .95rem; padding: 13px 26px; border-radius: 8px; margin: 8px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .res { text-align: center; background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 22px; margin: 18px 0; }
  .res .n { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: #5AE57A; line-height: 1; }
  .res .vd { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: #5AE57A; margin-top: 5px; }
  .res .d { opacity: .82; font-size: .92rem; margin-top: 6px; }
  .fix { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 12px 15px; margin-bottom: 9px; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Confidence Score Calculator</h1>
  <p class="sub">Confidence is built from evidence, not pep-talks. Score yours across 8 real-world signals.</p>

  <div id="form"></div>
  <button class="btn" onclick="run()">Score My Confidence</button>
  <button class="btn ghost" onclick="reset()">Reset</button>
  <div id="res"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const Q=[
    ["I take action even before I feel ready","Acting first, feeling second, is the whole game.","Pick one tiny action you have been waiting to feel ready for. Do it today, before noon."],
    ["I keep promises to myself (small ones count)","Self-trust = stack of kept micro-promises.","Make one promise to yourself this morning so small it would be embarrassing to break. Then keep it."],
    ["I can hear feedback without spiralling","Feedback resistance is fragile confidence.","Next time feedback hits hard, write it down and revisit in 24h. Most stings shrink with time."],
    ["I do not need everyone to like me","Approval-hunger is confidence in someone else's hands.","Identify one person you have been performing for. Drop the act for one interaction this week."],
    ["I ask for what I want","Unasked = unmet, and confidence dies in the gap.","Make one ask this week you have been avoiding. Plain language, no over-explaining."],
    ["I let myself be seen imperfectly","Hiding to look composed quietly drains confidence.","Share something this week before it is polished — a post, a question, a draft."],
    ["I do not compare myself out of action","Comparison is fine; comparison-paralysis is not.","Unfollow 3 accounts that trigger paralysis instead of inspiration."],
    ["I can be wrong without it meaning I am bad","Self-worth uncoupled from outcomes is real confidence.","Say out loud: 'I can be wrong about that and still be okay.' Practice it on something small."]
  ];
  const g=id=>document.getElementById(id);
  g('form').innerHTML=Q.map((q,i)=>`<div class="q"><span>${q[0]}<small style="display:block;opacity:.6;font-size:.8rem">${q[1]}</small></span>
    <select id="q${i}"><option value="1">Rarely</option><option value="2">Sometimes</option><option value="3">Often</option><option value="4">Almost always</option></select></div>`).join('');
  const saved=JSON.parse(localStorage.getItem('csc8')||'{}');
  Q.forEach((_,i)=>{ if(saved[i])g('q'+i).value=saved[i]; g('q'+i).addEventListener('change',()=>{ const o={};Q.forEach((_,j)=>o[j]=g('q'+j).value); localStorage.setItem('csc8',JSON.stringify(o)); }); });
  function run(){
    const sc=Q.reduce((s,_,i)=>s+ +g('q'+i).value,0);
    const pct=Math.round(sc/(Q.length*4)*100);
    const vd= pct>=80?['Rooted','Grounded confidence. Now use it to do something that scares you.']
      : pct>=60?['Solid','Strong base. Close the lower gaps and you tip into rooted.']
      : pct>=40?['Building','Real but inconsistent. Stack tiny wins daily.']
      : ['Fragile','Confidence is low because the evidence is missing — not because you are not enough. Build proof, one small promise at a time.'];
    const weak=Q.map((q,i)=>({q,v:+g('q'+i).value})).filter(o=>o.v<=2).slice(0,3);
    g('res').innerHTML='<div class="res"><div class="n">'+pct+'%</div><div class="vd">'+vd[0]+'</div><div class="d">'+vd[1]+'</div></div>'+
      (weak.length?'<h3 style="font-family:\'Playfair Display\',serif;color:#5AE57A;margin:0 0 10px">Start here this week</h3>'+
       weak.map(o=>'<div class="fix"><b style="color:#5AE57A">'+esc(o.q[0])+'</b><br>'+esc(o.q[2])+'</div>').join('')
       :'<div class="fix" style="border-left-color:#5AE57A">No critical gaps — keep stretching just past your comfort zone.</div>');
    g('res').scrollIntoView({behavior:'smooth'});
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function reset(){ if(confirm('Reset answers?')){ localStorage.removeItem('csc8'); Q.forEach((_,i)=>g('q'+i).value='1'); g('res').innerHTML=''; } }
</script>
</body>
</html>
