<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internship Application Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 12px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .stats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat { flex: 1; min-width: 70px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 10px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: #5AE57A; }
  .stat .l { font-size: .62rem; opacity: .65; text-transform: uppercase; }
  .card { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; font-size: .87rem; gap: 10px; }
  .card .st { cursor: pointer; font-size: .78rem; color: #5AE57A; flex: none; }
  .card .x { cursor: pointer; opacity: .5; flex: none; } .card .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Internship Application Tracker</h1>
  <p class="sub">Track every internship you apply for, and never lose sight of where each one stands.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Company</label><input id="company" placeholder="Company name"></div>
      <div style="flex:2"><label>Role</label><input id="role" placeholder="Internship title"></div>
    </div>
    <button class="btn" onclick="add()">+ Add Application</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="s0">0</div><div class="l">To apply</div></div>
    <div class="stat"><div class="v" id="s1">0</div><div class="l">Applied</div></div>
    <div class="stat"><div class="v" id="s2">0</div><div class="l">Interview</div></div>
    <div class="stat"><div class="v" id="s3">0</div><div class="l">Offer</div></div>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('iat')||'[]');
  const save=()=>localStorage.setItem('iat',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const STATES=['To apply','Applied','Interview','Offer','Closed'];
  function add(){ if(!v('company')){ alert('Enter a company.'); return; }
    R.push({c:v('company'),r:v('role'),s:0}); g('company').value=''; g('role').value=''; save(); render(); }
  function cycle(i){ R[i].s=(R[i].s+1)%STATES.length; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all applications?')){ R=[]; save(); render(); } }
  function render(){
    [0,1,2,3].forEach(s=>g('s'+s).textContent=R.filter(x=>x.s===s).length);
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No applications tracked yet.</div>'; return; }
    L.innerHTML=R.map((x,i)=>({x,i})).sort((a,b)=>a.x.s-b.x.s).map(({x,i})=>
      '<div class="card"><span><b style="color:#5AE57A">'+esc(x.c)+'</b>'+(x.r?' · '+esc(x.r):'')+'</span><span style="display:flex;gap:10px;align-items:center"><span class="st" onclick="cycle('+i+')">'+STATES[x.s]+' ⟳</span><span class="x" onclick="del('+i+')">✕</span></span></div>').join('');
  }
  render();
</script>
</body>
</html>
