<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Net Worth Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .panel h2 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1rem; margin-bottom: 8px; }
  .row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .row>div { flex: 1; min-width: 120px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .res { text-align: center; background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 10px; padding: 20px; }
  .res .n { font-family: 'Playfair Display', serif; font-size: 2.6rem; color: #5AE57A; line-height: 1; }
  .res .n.neg { color: #5AE57A; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
  .stat { flex: 1; min-width: 110px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 12px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: #5AE57A; }
  .stat .l { font-size: .68rem; opacity: .65; text-transform: uppercase; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 8px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: .87rem; }
  .item .x { cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { opacity: .45; font-size: .82rem; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Net Worth Calculator</h1>
  <p class="sub">Assets minus liabilities equals the truth. Update monthly and watch it climb.</p>

  <div class="panel">
    <h2>Assets (what you own)</h2>
    <div class="row"><div style="flex:2"><label>Item</label><input id="aN" placeholder="e.g. Savings / 401k / home"></div><div><label>Value ($)</label><input id="aV" type="number" min="0"></div><div style="flex:0"><button class="btn" onclick="add('a')">+ Add</button></div></div>
    <div id="aL" style="margin-top:8px"></div>
  </div>

  <div class="panel">
    <h2>Liabilities (what you owe)</h2>
    <div class="row"><div style="flex:2"><label>Item</label><input id="lN" placeholder="e.g. Mortgage / credit card"></div><div><label>Amount ($)</label><input id="lV" type="number" min="0"></div><div style="flex:0"><button class="btn" onclick="add('l')">+ Add</button></div></div>
    <div id="lL" style="margin-top:8px"></div>
  </div>

  <div class="res">
    <div class="n" id="nw">$0</div>
    <div style="opacity:.7;font-size:.88rem;margin-top:4px">your net worth</div>
    <div class="stats">
      <div class="stat"><div class="v" id="sA">$0</div><div class="l">Assets</div></div>
      <div class="stat"><div class="v" id="sL">$0</div><div class="l">Liabilities</div></div>
    </div>
  </div>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let A=JSON.parse(localStorage.getItem('nwc_a')||'[]'), L=JSON.parse(localStorage.getItem('nwc_l')||'[]');
  const save=()=>{ localStorage.setItem('nwc_a',JSON.stringify(A)); localStorage.setItem('nwc_l',JSON.stringify(L)); };
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(k){ const n=v(k==='a'?'aN':'lN'), a=parseFloat((k==='a'?g('aV').value:g('lV').value))||0; if(!n){alert('Add a name.');return;}
    (k==='a'?A:L).push({n,a}); (k==='a'?'aN aV':'lN lV').split(' ').forEach(x=>g(x).value=''); save(); render(); }
  function del(k,i){ (k==='a'?A:L).splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ A=[]; L=[]; save(); render(); } }
  function render(){
    const ta=A.reduce((s,x)=>s+x.a,0), tl=L.reduce((s,x)=>s+x.a,0), nw=ta-tl;
    g('sA').textContent='$'+Math.round(ta).toLocaleString();
    g('sL').textContent='$'+Math.round(tl).toLocaleString();
    g('nw').textContent=(nw<0?'-$':'$')+Math.abs(Math.round(nw)).toLocaleString();
    g('nw').className='n '+(nw<0?'neg':'');
    g('aL').innerHTML = A.length?A.map((x,i)=>`<div class="item"><span>${esc(x.n)}</span><span>$${x.a.toLocaleString()} <span class="x" onclick="del('a',${i})">✕</span></span></div>`).join(''):'<div class="empty">No assets added.</div>';
    g('lL').innerHTML = L.length?L.map((x,i)=>`<div class="item"><span>${esc(x.n)}</span><span>$${x.a.toLocaleString()} <span class="x" onclick="del('l',${i})">✕</span></span></div>`).join(''):'<div class="empty">No liabilities added.</div>';
  }
  render();
</script>
</body>
</html>
