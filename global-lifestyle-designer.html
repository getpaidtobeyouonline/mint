<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Global Lifestyle Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .lead { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 11px 14px; font-size: .87rem; font-style: italic; margin-bottom: 6px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Global Lifestyle Designer</h1>
  <p class="sub">Design the location-flexible life you actually want — on purpose, not by accident.</p>

  <div class="panel">
    <div class="lead">Most people drift into a default life. This is your chance to design one that crosses borders by choice.</div>
    <label for="vision">My global lifestyle vision (in a few sentences)</label>
    <textarea id="vision" placeholder="What does your ideal location-flexible life look like?"></textarea>
    <label for="income">How my income will travel with me</label>
    <textarea id="income" placeholder="Remote work, business, savings, passive income"></textarea>
    <label for="bases">My ideal base(s) or rhythm</label>
    <input id="bases" placeholder="e.g. Two home bases, or slow travel four countries a year">
    <label for="anchors">Anchors I will keep wherever I am</label>
    <textarea id="anchors" placeholder="Routines, relationships, health habits that travel with you"></textarea>
    <label for="people">How I will keep relationships strong across distance</label>
    <textarea id="people" placeholder="Staying close to family and friends from afar"></textarea>
    <label for="firststep">My first real step toward this</label>
    <input id="firststep" placeholder="One concrete thing to do in the next 30 days">
    <button class="btn" onclick="gen()">Design My Lifestyle</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['vision','income','bases','anchors','people','firststep'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('gld_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('gld_'+k,g(k).value)); });
  function gen(){
    const t=`MY GLOBAL LIFESTYLE DESIGN\n\nMY VISION:\n${v('vision')||'[the life you want]'}\n\nHOW MY INCOME TRAVELS:\n${v('income')||'[location-flexible income]'}\n\nMY BASE(S) / RHYTHM:\n${v('bases')||'[where and how you live]'}\n\nMY ANCHORS (wherever I am):\n${v('anchors')||'[routines that travel with you]'}\n\nKEEPING RELATIONSHIPS STRONG:\n${v('people')||'[staying close across distance]'}\n\nMY FIRST STEP (next 30 days):\n${v('firststep')||'[one concrete action]'}\n\n--- Remember ---\nA global life is not about escaping — it is about choosing.\nFreedom needs structure: the anchors are what make the movement sustainable.\nStart before you feel ready. The first step teaches you the second.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
