<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Essay Outline Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 48px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .hint { font-size: .78rem; opacity: .6; margin-top: 3px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Essay Outline Builder</h1>
  <p class="sub">A clear outline writes the essay for you. Structure your argument before you draft.</p>

  <div class="panel">
    <label for="topic">Essay question or title</label>
    <input id="topic" placeholder="The prompt you are answering">
    <label for="thesis">Your thesis (your main argument in one sentence)</label>
    <textarea id="thesis" placeholder="What you are claiming, clearly stated"></textarea>
    <div class="hint">Everything in the essay should support this one sentence.</div>
    <label for="p1">Body point 1 — claim + evidence</label>
    <textarea id="p1" placeholder="First supporting point and the evidence for it"></textarea>
    <label for="p2">Body point 2 — claim + evidence</label>
    <textarea id="p2" placeholder="Second supporting point and evidence"></textarea>
    <label for="p3">Body point 3 — claim + evidence</label>
    <textarea id="p3" placeholder="Third supporting point and evidence"></textarea>
    <label for="counter">Counter-argument &amp; your response</label>
    <textarea id="counter" placeholder="The strongest objection — and why your thesis still holds"></textarea>
    <label for="concl">Conclusion — the 'so what'</label>
    <textarea id="concl" placeholder="Why your argument matters, beyond restating it"></textarea>
    <button class="btn" onclick="gen()">Build Outline</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['topic','thesis','p1','p2','p3','counter','concl'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('eob_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('eob_'+k,g(k).value)); });
  function gen(){
    const t=`ESSAY OUTLINE\n\nQUESTION:\n${v('topic')||'[the essay prompt]'}\n\n1. INTRODUCTION\n   • Hook + context\n   • THESIS: ${v('thesis')||'[your main argument]'}\n   • Signpost the points to come\n\n2. BODY PARAGRAPH 1\n   • ${v('p1')||'[claim + evidence + analysis]'}\n   • Link back to thesis\n\n3. BODY PARAGRAPH 2\n   • ${v('p2')||'[claim + evidence + analysis]'}\n   • Link back to thesis\n\n4. BODY PARAGRAPH 3\n   • ${v('p3')||'[claim + evidence + analysis]'}\n   • Link back to thesis\n\n5. COUNTER-ARGUMENT\n   • ${v('counter')||'[strongest objection + your rebuttal]'}\n\n6. CONCLUSION\n   • Restate thesis in fresh words\n   • ${v('concl')||'[the wider significance — the "so what"]'}\n\n--- Tip ---\nEach body paragraph = one claim, real evidence, your analysis, link back. Write the body first; the intro is easier once you know what you said.`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
