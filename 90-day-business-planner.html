<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minted 90 Day Business Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 2rem 1rem; }
    h1 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: clamp(1.8rem, 4vw, 2.6rem); text-align: center; margin-bottom: 0.4rem; }
    .subtitle { text-align: center; opacity: 0.65; margin-bottom: 2rem; font-size: 0.9rem; }
    .container { max-width: 680px; margin: 0 auto; }
    .section { background: #345534; border: 1px solid #3C603C; border-radius: 10px; padding: 1.4rem; margin-bottom: 1.1rem; }
    .section-title { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1rem; margin-bottom: 1rem; }
    label { display: block; font-size: 0.8rem; opacity: 0.6; margin-bottom: 0.3rem; margin-top: 0.85rem; }
    label:first-of-type { margin-top: 0; }
    input[type="text"] { width: 100%; background: #3C603C; border: 1px solid #4C724C; color: #FFFFFF; padding: 0.65rem 0.9rem; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    input[type="text"]:focus { border-color: #5AE57A; }
    .action-row { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.45rem; }
    .action-num { color: #5AE57A; font-size: 0.78rem; width: 16px; flex-shrink: 0; }
    .btn-gold { background: #5AE57A; color: #325132; border: none; padding: 1rem 2rem; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 2rem; transition: opacity 0.2s; }
    .btn-gold:hover { opacity: 0.85; }
    .btn-outline { background: transparent; border: 1px solid #5AE57A; color: #5AE57A; padding: 0.7rem 1rem; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; flex: 1; transition: all 0.2s; }
    .btn-outline:hover { background: #5AE57A; color: #325132; }
    #planView { display: none; }
    .plan-header { text-align: center; margin-bottom: 1.75rem; }
    .plan-goal { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: #5AE57A; margin-bottom: 0.3rem; }
    .plan-sub { font-size: 0.85rem; opacity: 0.55; }
    .month-card { background: #345534; border: 1px solid #3C603C; border-top: 3px solid #5AE57A; border-radius: 10px; padding: 1.3rem; margin-bottom: 1rem; }
    .month-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.13em; color: #5AE57A; margin-bottom: 0.35rem; }
    .month-milestone { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 0.85rem; line-height: 1.4; }
    .action-item { display: flex; gap: 0.6rem; align-items: flex-start; margin-bottom: 0.4rem; font-size: 0.88rem; opacity: 0.82; line-height: 1.45; }
    .action-dot { color: #5AE57A; flex-shrink: 0; margin-top: 1px; }
    .btn-row { display: flex; gap: 0.65rem; margin: 0.5rem 0 2.5rem; }
    footer { text-align: center; opacity: 0.35; font-size: 0.78rem; margin-top: 1rem; }
    @media print {
      body { background: #FFFFFF; color: #325132; padding: 1rem; }
      .btn-row, footer { display: none; }
      .section, .month-card { background: #FFFFFF; border-color: #FFFFFF; }
      .plan-goal, .month-label, .action-dot, .section-title { color: #5AE57A !important; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Minted 90 Day Business Planner</h1>
  <p class="subtitle">Map your next 90 days — one goal, three milestones, nine focused actions.</p>

  <div id="formView">
    <div class="section">
      <div class="section-title">Your 90-Day Vision</div>
      <label>What's your #1 goal for the next 90 days?</label>
      <input type="text" id="goal" placeholder="e.g. Launch my digital product and hit $5K/month">
      <label>Revenue target</label>
      <input type="text" id="revenue" placeholder="e.g. $5,000/month by Day 90">
    </div>
    <div id="monthForms"></div>
    <button class="btn-gold" onclick="buildPlan()">✦ Build My 90-Day Plan</button>
  </div>

  <div id="planView">
    <div class="plan-header">
      <div class="plan-goal" id="outGoal"></div>
      <div class="plan-sub" id="outRevenue"></div>
    </div>
    <div id="planCards"></div>
    <div class="btn-row">
      <button class="btn-outline" id="copyBtn" onclick="copyPlan()">Copy Plan</button>
      <button class="btn-outline" onclick="window.print()">Print / PDF</button>
      <button class="btn-outline" onclick="reset()">Start Over</button>
    </div>
  </div>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const months = [
    { name: 'Month 1', days: 'Days 1–30',  placeholder: 'Build the foundation', actions: ['Validate your offer', 'Set up your platform', 'Define your ideal customer'] },
    { name: 'Month 2', days: 'Days 31–60', placeholder: 'Launch and get visible',  actions: ['Launch to your audience', 'Start content marketing', 'Make your first sales'] },
    { name: 'Month 3', days: 'Days 61–90', placeholder: 'Scale and optimize',      actions: ['Double down on what works', 'Automate your funnel', 'Hit your revenue target'] }
  ];

  const mf = document.getElementById('monthForms');
  months.forEach((m, i) => {
    mf.innerHTML += `
      <div class="section">
        <div class="section-title">${m.name} <span style="opacity:.4;font-size:.8rem;font-family:'DM Sans',sans-serif">${m.days}</span></div>
        <label>Monthly milestone</label>
        <input type="text" id="m${i}_goal" placeholder="${m.placeholder}">
        <label>3 key actions</label>
        ${m.actions.map((ph, j) => `<div class="action-row"><span class="action-num">${j+1}.</span><input type="text" id="m${i}_a${j}" placeholder="${ph}"></div>`).join('')}
      </div>`;
  });

  function val(id) { return document.getElementById(id).value.trim(); }

  function buildPlan() {
    const goal    = val('goal') || 'My 90-Day Goal';
    const revenue = val('revenue');
    document.getElementById('outGoal').textContent    = goal;
    document.getElementById('outRevenue').textContent = revenue ? `Target: ${revenue}` : '';

    const cards = document.getElementById('planCards');
    cards.innerHTML = '';
    months.forEach((m, i) => {
      const milestone = val(`m${i}_goal`) || m.placeholder;
      const actions   = [0,1,2].map(j => val(`m${i}_a${j}`)).filter(Boolean);
      cards.innerHTML += `
        <div class="month-card">
          <div class="month-label">${m.name} · ${m.days}</div>
          <div class="month-milestone">${milestone}</div>
          ${actions.length
            ? actions.map(a => `<div class="action-item"><span class="action-dot">▸</span>${a}</div>`).join('')
            : '<div class="action-item" style="opacity:.35">No actions added</div>'}
        </div>`;
    });

    document.getElementById('formView').style.display = 'none';
    document.getElementById('planView').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function copyPlan() {
    const goal    = document.getElementById('outGoal').textContent;
    const revenue = document.getElementById('outRevenue').textContent;
    let text = `90 DAY BUSINESS PLAN\n${'─'.repeat(30)}\n${goal}\n${revenue ? revenue + '\n' : ''}\n`;
    months.forEach((m, i) => {
      const milestone = val(`m${i}_goal`) || m.placeholder;
      const actions   = [0,1,2].map(j => val(`m${i}_a${j}`)).filter(Boolean);
      text += `${m.name.toUpperCase()} (${m.days})\n${milestone}\n`;
      actions.forEach((a, j) => text += `  ${j+1}. ${a}\n`);
      text += '\n';
    });
    navigator.clipboard.writeText(text).then(() => {
      const b = document.getElementById('copyBtn');
      b.textContent = 'Copied!'; setTimeout(() => b.textContent = 'Copy Plan', 1600);
    });
  }

  function reset() {
    document.getElementById('formView').style.display = 'block';
    document.getElementById('planView').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
