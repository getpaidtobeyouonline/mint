<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentor Relationship Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 46px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 120px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 12px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .session { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 11px 14px; margin-bottom: 8px; }
  .session .d { color: #5AE57A; font-size: .8rem; }
  .session .x { float: right; cursor: pointer; opacity: .5; } .session .x:hover { opacity: 1; color: #5AE57A; }
  .session p { font-size: .87rem; margin-top: 2px; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Mentor Relationship Tracker</h1>
  <p class="sub">Make the most of a mentor. Log each session, the advice, and your next action.</p>

  <div class="panel">
    <div class="row">
      <div><label>Mentor</label><input id="mentor" placeholder="Their name"></div>
      <div><label>Date</label><input id="date" type="date"></div>
    </div>
    <label>Key advice or insight from this session</label>
    <textarea id="advice" placeholder="The most useful thing they said"></textarea>
    <label>My action before the next session</label>
    <textarea id="action" placeholder="One concrete thing you committed to"></textarea>
    <label>Question to bring next time</label>
    <input id="next" placeholder="Something to ask them">
    <button class="btn" onclick="add()">+ Log Session</button>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('mrt')||'[]');
  const save=()=>localStorage.setItem('mrt',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  g('date').value=new Date().toISOString().slice(0,10);
  function add(){ if(!v('advice')&&!v('action')){ alert('Log at least the advice or your action.'); return; }
    R.push({m:v('mentor'),d:g('date').value,advice:v('advice'),action:v('action'),next:v('next')});
    ['advice','action','next'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all sessions?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No sessions logged yet.</div>'; return; }
    L.innerHTML=[...R].map((x,i)=>({x,i})).sort((a,b)=>a.x.d<b.x.d?1:-1).map(({x,i})=>{
      let p='';
      if(x.advice)p+='<p><b style="color:#5AE57A">Advice:</b> '+esc(x.advice)+'</p>';
      if(x.action)p+='<p><b style="color:#5AE57A">My action:</b> '+esc(x.action)+'</p>';
      if(x.next)p+='<p><b style="color:#5AE57A">Ask next:</b> '+esc(x.next)+'</p>';
      return '<div class="session"><span class="x" onclick="del('+i+')">✕</span><div class="d">'+(x.m?esc(x.m)+' · ':'')+(x.d||'')+'</div>'+p+'</div>';
    }).join('');
  }
  render();
</script>
</body>
</html>
