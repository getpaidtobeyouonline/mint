<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Travel Affiliate Income Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.85rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 120px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .result { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; margin-top: 12px; }
  .result .big { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .result .l { font-size: .82rem; opacity: .7; text-align: center; }
  .bd { font-size: .87rem; margin-top: 10px; }
  .bd div { display: flex; justify-content: space-between; padding: 3px 0; }
  .note { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; font-size: .8rem; opacity: .75; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Travel Affiliate Income Planner</h1>
  <p class="sub">Project potential income from travel affiliate links — and see what it would really take.</p>

  <div class="panel">
    <label>Monthly visitors / followers reached</label>
    <input id="traffic" type="number" min="0" placeholder="e.g. 5000" oninput="calc()">
    <div class="row">
      <div><label>Click-through rate %</label><input id="ctr" type="number" min="0" step="0.1" value="3" oninput="calc()"></div>
      <div><label>Conversion rate %</label><input id="conv" type="number" min="0" step="0.1" value="4" oninput="calc()"></div>
    </div>
    <label>Average commission per sale</label>
    <input id="commission" type="number" min="0" step="0.01" placeholder="e.g. 25" oninput="calc()">
    <div class="result" id="result"></div>
    <div class="note">An estimate to model scenarios — real results vary widely by niche, audience trust and offer quality.</div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const fmt=n=>n.toLocaleString(undefined,{maximumFractionDigits:0});
  function calc(){
    const traffic=parseFloat(g('traffic').value)||0;
    const ctr=parseFloat(g('ctr').value)||0;
    const conv=parseFloat(g('conv').value)||0;
    const comm=parseFloat(g('commission').value)||0;
    const clicks=traffic*ctr/100;
    const sales=clicks*conv/100;
    const monthly=sales*comm;
    g('result').innerHTML='<div class="big">'+fmt(monthly)+'</div><div class="l">estimated monthly affiliate income</div>'+
      '<div class="bd"><div><span>Clicks on links</span><span>'+fmt(clicks)+'/mo</span></div>'+
      '<div><span>Sales</span><span>'+(sales).toFixed(1)+'/mo</span></div>'+
      '<div><span>Per year</span><span style="color:#5AE57A">'+fmt(monthly*12)+'</span></div></div>';
  }
  calc();
</script>
</body>
</html>
