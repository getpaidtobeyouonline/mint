<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Puzzle Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 90px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .stats { display: flex; gap: 8px; margin-bottom: 12px; }
  .stat { flex: 1; background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 8px; text-align: center; }
  .stat .n { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #5AE57A; }
  .stat .l { font-size: .68rem; text-transform: uppercase; opacity: .6; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 9px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; gap: 8px; font-size: .9rem; }
  .item .meta { font-size: .8rem; opacity: .65; }
  .item .x { cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Puzzle Tracker</h1>
  <p class="sub">Log every jigsaw — pieces, time and the satisfaction of the final piece.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Puzzle</label><input id="name" placeholder="Title / image"></div>
      <div><label>Pieces</label><input id="pieces" type="number" min="0" placeholder="e.g. 1000"></div>
      <div><label>Hours</label><input id="hours" type="number" step="0.5" min="0" placeholder="e.g. 6.5"></div>
      <div><label>Status</label><select id="status"><option>Finished</option><option>In progress</option><option>To do</option></select></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div class="stats" id="stats"></div>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('puzt')||'[]');
  const save=()=>localStorage.setItem('puzt',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('name')){ alert('Enter a puzzle.'); return; }
    R.unshift({n:v('name'),p:parseFloat(g('pieces').value)||0,h:parseFloat(g('hours').value)||0,s:g('status').value});
    ['name','pieces','hours'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all puzzles?')){ R=[]; save(); render(); } }
  function render(){
    const fin=R.filter(x=>x.s==='Finished');
    const pieces=fin.reduce((s,x)=>s+x.p,0);
    const hours=fin.reduce((s,x)=>s+x.h,0);
    g('stats').innerHTML='<div class="stat"><div class="n">'+fin.length+'</div><div class="l">finished</div></div><div class="stat"><div class="n">'+pieces.toLocaleString()+'</div><div class="l">pieces</div></div><div class="stat"><div class="n">'+hours+'</div><div class="l">hours</div></div>';
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No puzzles yet.</div>'; return; }
    L.innerHTML=R.map((x,i)=>'<div class="item"><span>'+esc(x.n)+'</span><span class="meta">'+x.s+(x.p?'  ·  '+x.p+' pcs':'')+(x.h?'  ·  '+x.h+'h':'')+'  <span class="x" onclick="del('+i+')">✕</span></span></div>').join('');
  }
  render();
</script>
</body>
</html>
