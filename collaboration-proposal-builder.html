<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collaboration Proposal Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #5AE57A; }
  textarea { min-height: 46px; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Collaboration Proposal Builder</h1>
  <p class="sub">A clear, mutual-win proposal beats "wanna collab?" every time. Build one in a minute.</p>

  <div class="panel">
    <label for="you">You / your handle</label>
    <input id="you" placeholder="@you · 8k, beauty">
    <label for="them">Who you're proposing to</label>
    <input id="them" placeholder="@them">
    <label for="type">Collab type</label>
    <select id="type"><option>Shoutout / story swap</option><option>Joint live or Q&A</option><option>Co-created freebie</option><option>Giveaway bundle</option><option>Guest takeover</option><option>Content series together</option></select>
    <label for="idea">The specific idea</label>
    <textarea id="idea" placeholder="One concrete idea, not a vague ask"></textarea>
    <label for="them_win">What THEY get</label>
    <textarea id="them_win" placeholder="Lead with their benefit"></textarea>
    <label for="you_win">What you get</label>
    <input id="you_win" placeholder="Be honest — equal value reads as trustworthy">
    <button class="btn" onclick="gen()">Build Proposal</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['you','them','type','idea','them_win','you_win'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('cpb6_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('cpb6_'+k,g(k).value)); });
  function gen(){
    if(!v('them')){ alert('Add who you\'re proposing to.'); return; }
    const t=`Hey ${v('them')||'[them]'} —

I'm ${v('you')||'[you]'}. I follow your stuff and our audiences overlap without competing, which is exactly why this could work.

Idea: a ${g('type').value.toLowerCase()} — ${v('idea')||'[the specific idea]'}.

What's in it for you: ${v('them_win')||'[their benefit, stated first]'}.

What I'd bring: ${v('you_win')||'[your side — keep it equal]'}.

It's low-lift on both sides and we can keep it simple for a first collab. If you're open, I'll handle the planning doc and we pick a date.

No worries at all if the timing's off — either way, big fan of what you're building.

${v('you')||'[you]'}`;
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Proposal copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
