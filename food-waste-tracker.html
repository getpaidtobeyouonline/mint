<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Waste Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 90px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .stats { display: flex; gap: 10px; margin-bottom: 12px; }
  .stat { flex: 1; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 12px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #5AE57A; }
  .stat .l { font-size: .66rem; opacity: .65; text-transform: uppercase; }
  .row2 { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 8px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: .86rem; gap: 8px; }
  .row2 .x { cursor: pointer; opacity: .5; } .row2 .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 10px 0; font-style: italic; }
  .insight { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 11px 14px; font-size: .85rem; margin-bottom: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Food Waste Tracker</h1>
  <p class="sub">Log what gets thrown away. Seeing the pattern is the fastest way to waste less.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>What was wasted</label><input id="item" placeholder="e.g. Half a bag of salad"></div>
      <div><label>Est. value</label><input id="value" type="number" min="0" step="0.01" placeholder="0"></div>
      <div><label>Why</label><select id="why"><option>Went off / expired</option><option>Cooked too much</option><option>Forgot about it</option><option>Did not like it</option><option>Bought too much</option></select></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Log</button></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="sCount">0</div><div class="l">Items wasted</div></div>
    <div class="stat"><div class="v" id="sValue">0</div><div class="l">Value lost</div></div>
  </div>

  <div class="panel">
    <div id="insight"></div>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('fwt')||'[]');
  const save=()=>localStorage.setItem('fwt',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const fmt=n=>n.toLocaleString(undefined,{maximumFractionDigits:0});
  function add(){ if(!v('item')){ alert('Enter what was wasted.'); return; }
    R.push({i:v('item'),val:parseFloat(g('value').value)||0,w:g('why').value}); g('item').value=''; g('value').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the waste log?')){ R=[]; save(); render(); } }
  function render(){
    g('sCount').textContent=R.length;
    g('sValue').textContent=fmt(R.reduce((s,x)=>s+x.val,0));
    const I=g('insight'), L=g('list');
    if(!R.length){ I.innerHTML=''; L.innerHTML='<div class="empty">No food waste logged — keep it that way!</div>'; return; }
    const c={}; R.forEach(x=>c[x.w]=(c[x.w]||0)+1);
    const top=Object.entries(c).sort((a,b)=>b[1]-a[1])[0];
    I.innerHTML='<div class="insight">Your most common reason: <b style="color:#5AE57A">'+top[0]+'</b>. Tackle that one and you cut most of your waste.</div>';
    L.innerHTML=[...R].reverse().map(x=>{ const i=R.indexOf(x);
      return '<div class="row2"><span>'+esc(x.i)+' <span style="opacity:.6">· '+esc(x.w)+'</span></span><span>'+(x.val?fmt(x.val)+' ':'')+'<span class="x" onclick="del('+i+')">✕</span></span></div>';
    }).join('');
  }
  render();
</script>
</body>
</html>
