<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindful Eating Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, textarea, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 48px; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .prompt { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 11px 14px; font-size: .88rem; font-style: italic; margin-bottom: 4px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 10px 16px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin-top: 12px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .entry { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 12px 15px; margin-bottom: 9px; }
  .entry .d { color: #5AE57A; font-size: .82rem; }
  .entry .x { float: right; cursor: pointer; opacity: .5; } .entry .x:hover { opacity: 1; color: #5AE57A; }
  .entry p { font-size: .89rem; margin-top: 3px; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Mindful Eating Journal</h1>
  <p class="sub">Slow down and notice a meal. Mindful eating reconnects you with real hunger and real enjoyment.</p>

  <div class="panel">
    <div class="prompt" id="prompt"></div>
    <label>The meal</label>
    <input id="meal" placeholder="What you ate">
    <label>Hunger before (1 starving — 10 stuffed)</label>
    <select id="before"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select>
    <label>What I noticed — taste, texture, pace, distractions</label>
    <textarea id="notice" placeholder="Did you taste it? Rush it? Eat on autopilot?"></textarea>
    <label>How I felt afterward</label>
    <input id="after" placeholder="Satisfied? Still hungry? Overfull?">
    <button class="btn" onclick="add()">Save Entry</button>
    <button class="btn ghost" onclick="newPrompt()">New prompt</button>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const PROMPTS=["Before this meal, pause. How hungry are you, really?","Put your fork down between bites — what changes?","Notice the first three bites fully. What do they taste of?","Are you eating because you are hungry, or for another reason?","Eat the next meal with no screen. What do you notice?"];
  let R=JSON.parse(localStorage.getItem('mej')||'[]');
  const save=()=>localStorage.setItem('mej',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function newPrompt(){ g('prompt').textContent=PROMPTS[Math.floor(Math.random()*PROMPTS.length)]; }
  function add(){ if(!v('meal')&&!v('notice')){ alert('Add the meal or what you noticed.'); return; }
    R.push({d:new Date().toLocaleDateString(undefined,{month:'short',day:'numeric'}),meal:v('meal'),before:g('before').value,notice:v('notice'),after:v('after')});
    ['meal','notice','after'].forEach(k=>g(k).value=''); save(); render(); newPrompt(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all entries?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No entries yet — try it at your next meal.</div>'; return; }
    L.innerHTML=[...R].reverse().map(x=>{ const i=R.indexOf(x);
      let p='<p><b style="color:#5AE57A">'+esc(x.meal||'Meal')+'</b> · hunger before: '+x.before+'/10</p>';
      if(x.notice)p+='<p>'+esc(x.notice)+'</p>';
      if(x.after)p+='<p style="opacity:.8">After: '+esc(x.after)+'</p>';
      return '<div class="entry"><span class="x" onclick="del('+i+')">✕</span><div class="d">'+x.d+'</div>'+p+'</div>';
    }).join('');
  }
  newPrompt(); render();
</script>
</body>
</html>
