<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Shadow Work Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 16px; font-size: .95rem; }
  .prompt { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; font-style: italic; }
  .prompt .small { font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; opacity: .6; font-style: normal; display: block; margin-bottom: 3px; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; min-height: 70px; }
  textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 12px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .entry { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 11px 14px; margin-bottom: 8px; }
  .entry .d { font-size: .76rem; color: #5AE57A; margin-bottom: 4px; display: flex; justify-content: space-between; }
  .entry .x { cursor: pointer; opacity: .5; } .entry .x:hover { opacity: 1; }
  .entry p { font-size: .89rem; white-space: pre-wrap; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Shadow Work Journal</h1>
  <p class="sub">Meet the hidden parts of yourself with honesty and compassion.</p>

  <div class="panel">
    <div class="prompt"><span class="small">Today's prompt</span><span id="prompt"></span></div>
    <button class="btn ghost" onclick="newPrompt()" style="margin-top:0">New Prompt</button>
    <label for="resp">Your honest response</label>
    <textarea id="resp" placeholder="Write freely — no one else will read this"></textarea>
    <button class="btn" onclick="save()">Save Entry</button>
  </div>

  <div class="panel">
    <div id="list"></div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const PROMPTS=[
    'What trait in others irritates you most — and where does it live in you?',
    'What emotion were you not allowed to feel as a child?',
    'What are you most afraid people would think if they truly knew you?',
    'When do you tend to people-please, and what are you afraid of losing?',
    'What part of yourself do you judge most harshly?',
    'What did you have to hide or suppress to feel loved?',
    'What are you pretending not to know?',
    'Where do you give your power away, and to whom?',
    'What would you do if you were not afraid of being judged?',
    'What pattern keeps repeating in your life — and what might it be protecting?',
    'What do you envy in others, and what does it reveal about your desires?',
    'What boundary do you keep failing to hold, and why?'
  ];
  function newPrompt(){ g('prompt').textContent=PROMPTS[Math.floor(Math.random()*PROMPTS.length)]; }
  let R=JSON.parse(localStorage.getItem('swj')||'[]');
  const save2=()=>localStorage.setItem('swj',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function save(){
    if(!v('resp')){ alert('Write your response first.'); return; }
    R.unshift({date:new Date().toLocaleDateString(),prompt:g('prompt').textContent,resp:v('resp')});
    save2(); g('resp').value=''; newPrompt(); render();
  }
  function del(i){ R.splice(i,1); save2(); render(); }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">Your entries are saved privately on this device only.</div>'; return; }
    L.innerHTML=R.map((e,i)=>'<div class="entry"><div class="d"><span>'+e.date+'</span><span class="x" onclick="del('+i+')">✕</span></div><p><i>'+esc(e.prompt)+'</i>\n\n'+esc(e.resp)+'</p></div>').join('');
  }
  newPrompt(); render();
</script>
</body>
</html>
