<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Digital Declutter Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 24px 16px 60px; }
  h1 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 2rem; text-align: center; margin-bottom: 4px; }
  .subtitle { text-align: center; color: #F0EBE0aa; font-size: 0.88rem; margin-bottom: 24px; }
  .prog-card { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; max-width: 600px; margin: 0 auto 14px; }
  .prog-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .prog-num { font-family: 'Playfair Display', serif; font-size: 1.1rem; }
  .prog-of { font-size: 0.78rem; color: #BFD8BF; }
  .prog-last { font-size: 0.76rem; color: #BFD8BF; }
  .bar-track { background: #325132; border-radius: 5px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 5px; transition: width 0.4s ease, background 0.4s; }
  .done-card { background: #325132; border: 1px solid #70c07066; border-radius: 12px; padding: 20px; max-width: 600px; margin: 0 auto 14px; text-align: center; display: none; }
  .done-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: #5AE57A; animation: glow 3s ease-in-out infinite; }
  @keyframes glow { 0%,100%{text-shadow:0 0 8px #70c07033}50%{text-shadow:0 0 20px #70c07099} }
  .done-sub { font-size: 0.84rem; color: #BFD8BF; margin-top: 8px; }
  .cat-card { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; max-width: 600px; margin: 0 auto 10px; overflow: hidden; }
  .cat-header { display: flex; align-items: center; gap: 10px; padding: 14px 18px; cursor: pointer; user-select: none; transition: background 0.15s; }
  .cat-header:hover { background: #3C603C; }
  .cat-icon { font-size: 1.15rem; flex-shrink: 0; }
  .cat-name { font-family: 'Playfair Display', serif; font-size: 0.95rem; flex: 1; }
  .cat-prog { font-size: 0.78rem; flex-shrink: 0; font-family: 'Playfair Display', serif; }
  .cat-all { font-size: 0.7rem; color: #5A845A; cursor: pointer; padding: 2px 8px; border-radius: 8px; flex-shrink: 0; transition: color 0.15s; }
  .cat-all:hover { color: #5AE57A; }
  .cat-arrow { font-size: 0.75rem; color: #5A845A; flex-shrink: 0; width: 12px; }
  .cat-bar { height: 3px; background: #325132; }
  .cat-bar-fill { height: 100%; transition: width 0.4s ease, background 0.4s; }
  .cat-body { display: none; padding: 6px 0 10px; }
  .cat-body.open { display: block; }
  .item { display: flex; align-items: flex-start; gap: 12px; padding: 9px 18px; cursor: pointer; transition: background 0.12s; }
  .item:hover { background: #325132; }
  .item.done .item-text { color: #5A845A; text-decoration: line-through; }
  .item-check { width: 18px; height: 18px; border-radius: 4px; border: 2px solid #4C724C; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; transition: all 0.15s; margin-top: 1px; color: #325132; }
  .item.done .item-check { border-color: #5AE57A; background: #5AE57A; }
  .item-text { font-size: 0.86rem; color: #F0EBE0aa; line-height: 1.5; }
  .bottom-row { max-width: 600px; margin: 18px auto 0; text-align: center; }
  .btn-reset { background: none; border: 1px solid #4C724C; color: #5A845A; padding: 9px 24px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.84rem; cursor: pointer; transition: all 0.15s; }
  .btn-reset:hover { border-color: #5AE57A; color: #5AE57A; }
  footer { position: fixed; bottom: 0; left: 0; right: 0; text-align: center; color: #5A845A; font-size: 0.78rem; padding: 10px; background: #325132; border-top: 1px solid #3C603C; }
</style>
</head>
<body>

<h1>Minted Digital Declutter</h1>
<p class="subtitle">Systematically clear the clutter from your digital life.</p>

<div class="prog-card">
  <div class="prog-top">
    <div><span class="prog-num" id="progNum">0</span> <span class="prog-of" id="progOf">of 0 tasks complete</span></div>
    <div class="prog-last" id="lastLabel"></div>
  </div>
  <div class="bar-track"><div class="bar-fill" id="progBar" style="width:0%"></div></div>
</div>

<div class="done-card" id="doneCard">
  <div class="done-title">✦ Digital Declutter Complete</div>
  <div class="done-sub" id="doneSub"></div>
</div>

<div id="catList"></div>

<div class="bottom-row">
  <button class="btn-reset" id="resetBtn" onclick="handleReset()">Reset Checklist</button>
</div>

<footer>Powered by GetPaidToBeYouOnline</footer>

<script>
const CATS = [
  {id:'files', icon:'💾', label:'Files & Folders', color:'#5AE57A', items:[
    'Empty your Downloads folder completely','Clear everything off your Desktop','Delete duplicate or blurry photos','Remove files you haven\'t opened in over a year','Back up important files to cloud or external drive','Organize remaining files into a clear folder structure']},
  {id:'apps', icon:'📱', label:'Apps & Software', color:'#5AE57A', items:[
    'Uninstall apps you haven\'t opened in 90 days','Remove browser extensions you no longer use','Audit your home screen — keep only daily-use apps','Delete abandoned games or tools you\'ve forgotten about','Clear the cache and data of apps you\'re keeping','Update any apps that are significantly out of date']},
  {id:'email', icon:'📧', label:'Email', color:'#5AE57A', items:[
    'Unsubscribe from newsletters you skip every time','Bulk-delete old promotional and social emails','Archive or delete emails older than one year','Empty spam and trash folders','Create folders for categories of emails worth keeping','Set up filters for high-volume recurring senders']},
  {id:'subs', icon:'💳', label:'Subscriptions', color:'#5AE57A', items:[
    'List every active subscription and its monthly cost','Cancel anything you haven\'t used this month','Look for duplicate services (two streaming, two music apps)','Review annual subscriptions renewing in the next 90 days','Scan your credit card for charges you don\'t recognize']},
  {id:'photos', icon:'📷', label:'Photos & Videos', color:'#5AE57A', items:[
    'Delete blurry, dark, or accidental photos','Remove screenshots you\'ve already used or no longer need','Delete long videos you\'ll realistically never watch again','Back up your camera roll to cloud storage or a hard drive','Organize remaining photos into dated albums or folders']},
  {id:'social', icon:'📲', label:'Social & Accounts', color:'#5AE57A', items:[
    'Unfollow accounts that drain, distract, or bore you','Review privacy settings on each platform you use','Remove third-party apps connected to your social accounts','Delete accounts for platforms you no longer actively use','Review who can see your profile and posts on each platform']},
  {id:'security', icon:'🔐', label:'Passwords & Security', color:'#5AE57A', items:[
    'Update passwords for your most important accounts','Enable two-factor authentication wherever it\'s missing','Remove saved passwords for sites you\'ve left','Check if your email appeared in a known data breach','Review which apps have access via Google or Apple sign-in']},
  {id:'browser', icon:'🌐', label:'Browser', color:'#5AE57A', items:[
    'Clear your browser history and cache','Delete bookmarks you haven\'t visited in six months','Close tabs you\'ve had open for more than a week','Remove saved autofill entries and form data','Delete saved passwords for sites you no longer use']},
];

const TOTAL = CATS.reduce((s,c)=>s+c.items.length,0);
let state = JSON.parse(localStorage.getItem('ddc_state')||'{"checked":{},"lastDone":null}');
let resetConfirm = false;

function save() { localStorage.setItem('ddc_state', JSON.stringify(state)); }
function isChecked(catId, i) { return !!state.checked[catId+'_'+i]; }
function catDone(cat) { return cat.items.filter((_,i)=>isChecked(cat.id,i)).length; }
function totalDone() { return Object.keys(state.checked).length; }

function toggleItem(catId, idx) {
  const key=catId+'_'+idx;
  if(state.checked[key]) delete state.checked[key]; else state.checked[key]=true;
  save(); updateCat(catId); updateProgress();
}

function checkAllCat(catId, e) {
  e.stopPropagation();
  const cat=CATS.find(c=>c.id===catId);
  const allDone=catDone(cat)===cat.items.length;
  cat.items.forEach((_,i)=>{ if(allDone) delete state.checked[catId+'_'+i]; else state.checked[catId+'_'+i]=true; });
  save(); updateCat(catId); updateProgress();
}

function toggleCat(id) {
  const body=document.getElementById('cb-'+id);
  const open=body.classList.toggle('open');
  document.getElementById('ca-'+id).textContent=open?'▾':'▸';
}

function updateCat(catId) {
  const cat=CATS.find(c=>c.id===catId);
  const done=catDone(cat), total=cat.items.length;
  const pct=done/total*100;
  const col=done===total?'#5AE57A':done>0?cat.color:'#4C724C';
  document.getElementById('cp-'+catId).textContent=done+'/'+total;
  document.getElementById('cp-'+catId).style.color=col;
  document.getElementById('cb-'+catId).style.setProperty('--cc',cat.color);
  document.getElementById('cbf-'+catId).style.cssText=`width:${pct}%;background:${col}`;
  cat.items.forEach((_,i)=>{
    const chk=isChecked(catId,i);
    document.getElementById('ci-'+catId+'-'+i).className='item'+(chk?' done':'');
    document.getElementById('ck-'+catId+'-'+i).textContent=chk?'✓':'';
    document.getElementById('ck-'+catId+'-'+i).style.borderColor=chk?cat.color:'#4C724C';
    document.getElementById('ck-'+catId+'-'+i).style.background=chk?cat.color:'';
  });
}

function updateProgress() {
  const done=totalDone(), pct=done/TOTAL*100;
  const col=pct>=100?'#5AE57A':pct>=50?'#5AE57A':'#C9A84C66';
  document.getElementById('progNum').textContent=done;
  document.getElementById('progNum').style.color=col;
  document.getElementById('progOf').textContent='of '+TOTAL+' tasks complete';
  document.getElementById('progBar').style.cssText=`width:${pct}%;background:${col}`;
  const doneCard=document.getElementById('doneCard');
  if(done===TOTAL){
    if(!state.lastDone){state.lastDone=new Date().toISOString().slice(0,10);save();}
    doneCard.style.display='block';
    document.getElementById('doneSub').textContent=TOTAL+' items cleared · '+new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  } else {
    doneCard.style.display='none';
  }
  const last=state.lastDone;
  if(last){
    const days=Math.round((Date.now()-new Date(last+'T12:00:00'))/86400000);
    document.getElementById('lastLabel').textContent=days===0?'Last done today':days===1?'Last done yesterday':`Last done ${days} days ago`;
  } else {
    document.getElementById('lastLabel').textContent='Never completed';
  }
}

function handleReset() {
  const btn=document.getElementById('resetBtn');
  if(!resetConfirm){resetConfirm=true;btn.textContent='Confirm Reset';btn.style.borderColor='#5AE57A';btn.style.color='#5AE57A';setTimeout(()=>{resetConfirm=false;btn.textContent='Reset Checklist';btn.style.borderColor='';btn.style.color='';},3000);return;}
  state={checked:{},lastDone:null};save();resetConfirm=false;
  btn.textContent='Reset Checklist';btn.style.borderColor='';btn.style.color='';
  CATS.forEach(c=>updateCat(c.id)); updateProgress();
}

// Build DOM
document.getElementById('catList').innerHTML = CATS.map(cat=>`
  <div class="cat-card">
    <div class="cat-header" onclick="toggleCat('${cat.id}')">
      <span class="cat-icon">${cat.icon}</span>
      <span class="cat-name">${cat.label}</span>
      <span class="cat-prog" id="cp-${cat.id}">0/${cat.items.length}</span>
      <span class="cat-all" onclick="checkAllCat('${cat.id}',event)">check all</span>
      <span class="cat-arrow" id="ca-${cat.id}">▸</span>
    </div>
    <div class="cat-bar"><div class="cat-bar-fill" id="cbf-${cat.id}" style="width:0%;background:${cat.color}"></div></div>
    <div class="cat-body" id="cb-${cat.id}">
      ${cat.items.map((item,i)=>`
        <div class="item${isChecked(cat.id,i)?' done':''}" id="ci-${cat.id}-${i}" onclick="toggleItem('${cat.id}',${i})">
          <div class="item-check" id="ck-${cat.id}-${i}" style="border-color:${isChecked(cat.id,i)?cat.color:'#4C724C'};background:${isChecked(cat.id,i)?cat.color:''};color:#325132">${isChecked(cat.id,i)?'✓':''}</div>
          <div class="item-text">${item}</div>
        </div>`).join('')}
    </div>
  </div>`).join('');

CATS.forEach(c=>updateCat(c.id));
updateProgress();
</script>
</body>
</html>
