<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exit Interview Prep Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 54px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Exit Interview Prep Tool</h1>
  <p class="sub">Prepare honest, constructive answers — and leave on the best possible terms.</p>

  <div class="panel">
    <label for="reason">Why you are leaving (your honest summary)</label>
    <textarea id="reason" placeholder="The real reason — you will soften the wording below"></textarea>
    <label for="good">What was genuinely good here</label>
    <textarea id="good" placeholder="People, projects, growth — give credit where it is due"></textarea>
    <label for="improve">What could be improved (constructively)</label>
    <textarea id="improve" placeholder="Frame as suggestions, not attacks"></textarea>
    <label for="advice">Advice you would give for your replacement / the team</label>
    <textarea id="advice" placeholder="Useful, forward-looking feedback"></textarea>
    <button class="btn" onclick="gen()">Build Prep Notes</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['reason','good','improve','advice'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('eipt_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('eipt_'+k,g(k).value)); });
  function gen(){
    const t='EXIT INTERVIEW — PREP NOTES\n\nWHY I AM LEAVING (how I will say it):\n'+(v('reason')||'[your reason, framed calmly and professionally]')+
    '\n\nWHAT WAS GOOD:\n'+(v('good')||'[genuine positives worth naming]')+
    '\n\nWHAT COULD IMPROVE:\n'+(v('improve')||'[constructive, specific suggestions]')+
    '\n\nADVICE FOR THE TEAM:\n'+(v('advice')||'[forward-looking, useful feedback]')+
    '\n\n--- How to handle the conversation ---\nStay calm, gracious and professional — this shapes your reputation.\nGive balanced feedback: lead with positives, frame issues as suggestions.\nNever burn bridges or vent. The industry is smaller than it feels.\nKeep anything you would not want repeated to yourself.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
