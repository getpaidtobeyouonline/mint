<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Membership Design Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 140px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.4rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Membership Design Tool</h1>
  <p class="sub">Design a membership people happily pay for month after month.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="name">Membership name</label><input id="name" placeholder="What it is called"></div>
      <div><label for="price">Monthly price</label><input id="price" placeholder="e.g. £39/mo"></div>
    </div>
    <label for="who">Who it is for</label>
    <input id="who" placeholder="Your ideal member">
    <label for="promise">The core promise</label>
    <textarea id="promise" placeholder="The ongoing value that makes it worth staying"></textarea>
    <label for="monthly">What members get each month</label>
    <textarea id="monthly" placeholder="The recurring deliverables and rhythm"></textarea>
    <label for="retention">Why members stay</label>
    <textarea id="retention" placeholder="Community, progress, fresh value, belonging"></textarea>
    <button class="btn" onclick="gen()">Build Design</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['name','price','who','promise','monthly','retention'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('mdt_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('mdt_'+k,g(k).value)); });
  function gen(){
    const t='MEMBERSHIP DESIGN\n\nMEMBERSHIP: '+(v('name')||'[name]')+(v('price')?'  ('+v('price')+')':'')+
    '\n\nFOR: '+(v('who')||'[your ideal member]')+
    '\n\nTHE CORE PROMISE:\n'+(v('promise')||'[the ongoing value]')+
    '\n\nWHAT MEMBERS GET EACH MONTH:\n'+(v('monthly')||'[the recurring deliverables]')+
    '\n\nWHY MEMBERS STAY:\n'+(v('retention')||'[community, progress, belonging]')+
    '\n\n--- Membership tips ---\nA membership is a retention game — design for staying, not just joining.\nKeep the monthly value light enough to deliver forever, rich enough to keep.\nCommunity and ongoing progress beat a pile of content nobody finishes.\nTrack churn and ask leavers why — it is your clearest improvement list.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
