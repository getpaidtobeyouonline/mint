<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passive Income from Coaching Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.4rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Passive Income from Coaching Tool</h1>
  <p class="sub">Turn what you already teach into income that does not cost you a session.</p>

  <div class="panel">
    <label for="expertise">Your area of expertise</label>
    <input id="expertise" placeholder="What you coach people on">
    <label for="repeat">What clients ask you again and again</label>
    <textarea id="repeat" placeholder="The questions and lessons you repeat constantly"></textarea>
    <label for="product">Your product idea</label>
    <textarea id="product" placeholder="e.g. a mini course, template pack, workbook, membership"></textarea>
    <label for="price">Price point</label>
    <input id="price" placeholder="e.g. £47, £197">
    <label for="sell">How you will sell it</label>
    <textarea id="sell" placeholder="e.g. to your list, after free content, as a discovery-call follow-up"></textarea>
    <button class="btn" onclick="gen()">Build Plan</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['expertise','repeat','product','price','sell'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('pic_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('pic_'+k,g(k).value)); });
  function gen(){
    const t='PASSIVE INCOME FROM COACHING — PLAN\n\nMY EXPERTISE:\n'+(v('expertise')||'[what you coach on]')+
    '\n\nWHAT CLIENTS ASK REPEATEDLY:\n'+(v('repeat')||'[the lessons you repeat constantly]')+
    '\n\nTHE PRODUCT:\n'+(v('product')||'[course, templates, workbook, membership]')+
    (v('price')?'\n\nPRICE: '+v('price'):'')+
    '\n\nHOW I WILL SELL IT:\n'+(v('sell')||'[your selling channels]')+
    '\n\n--- Turning coaching into products ---\nThe thing you explain over and over is your first product — it is already validated.\nStart small: one tight, useful product beats a huge course you never finish.\nA low-priced product is also a gentle on-ramp to your higher-ticket work.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
