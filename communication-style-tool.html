<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Communication Style Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .q { font-size: .92rem; margin-bottom: 8px; }
  .opt { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 9px 13px; font-size: .87rem; cursor: pointer; margin-bottom: 6px; }
  .opt:hover { border-color: #5AE57A; }
  .opt.on { background: #325132; border-color: #5AE57A; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin-top: 6px; }
  .result { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; margin-top: 14px; display: none; }
  .result h3 { font-family: 'Playfair Display', serif; color: #5AE57A; }
  .result li { font-size: .9rem; margin-left: 16px; margin-top: 3px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Communication Style Tool</h1>
  <p class="sub">Discover how you tend to communicate — and how to flex it when it matters.</p>

  <div class="panel" id="quiz"></div>
  <div class="result" id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  const Q=[
    {q:"When upset, I tend to...",a:[["go quiet and withdraw","P"],["say it directly and clearly","A"],["hint at it and hope they notice","PA"],["get loud or sharp","AG"]]},
    {q:"In a disagreement, I most want to...",a:[["keep the peace","P"],["solve it together","A"],["avoid the topic","PA"],["be right","AG"]]},
    {q:"My needs usually come out as...",a:[["unspoken — I do not want to burden anyone","P"],["clear requests","A"],["sarcasm or sighs","PA"],["demands","AG"]]},
    {q:"When someone disagrees with me, I feel...",a:[["anxious, ready to back down","P"],["curious about their view","A"],["resentful but silent","PA"],["challenged, ready to push back","AG"]]},
    {q:"After a hard conversation, I usually...",a:[["replay what I should have said","P"],["feel things are resolved","A"],["still feel unheard","PA"],["feel I won or lost","AG"]]}
  ];
  let ans=Array(Q.length).fill(-1);
  function draw(){
    g('quiz').innerHTML=Q.map((o,i)=>'<div class="q">'+(i+1)+'. '+o.q+'</div>'+
      o.a.map((a,j)=>'<div class="opt'+(ans[i]===j?' on':'')+'" onclick="pick('+i+','+j+')">'+a[0]+'</div>').join('')).join('')+
      '<button class="btn" onclick="score()">See My Style</button>';
  }
  function pick(i,j){ ans[i]=j; draw(); }
  function score(){
    if(ans.includes(-1)){ alert('Answer all five questions.'); return; }
    const c={P:0,A:0,PA:0,AG:0};
    ans.forEach((a,i)=>c[Q[i].a[a][1]]++);
    const top=Object.entries(c).sort((a,b)=>b[1]-a[1])[0][0];
    const R={
      P:{t:"Passive",d:"You prioritise harmony and others' comfort, often at the cost of your own needs.",tips:["Practise naming one need directly each day.","Your feelings are not a burden — they are information.","Use “I” statements: “I feel… I need…”"]},
      A:{t:"Assertive",d:"You express needs clearly while respecting others — the healthiest baseline.",tips:["Keep modelling this; it makes others feel safe.","Stay curious — ask before assuming.","Hold the standard even when conversations get heated."]},
      PA:{t:"Passive-Aggressive",d:"Your frustration leaks out sideways — hints, sarcasm, silence — instead of being said.",tips:["Catch the hint and turn it into a direct sentence.","Say the actual thing: it feels riskier but works far better.","Name resentment early, before it builds."]},
      AG:{t:"Aggressive",d:"You speak up strongly, but it can land as pressure or attack.",tips:["Slow down — pause before responding when heated.","Aim to be understood, not to win.","Soften the delivery; keep the honesty."]}
    }[top];
    g('out').style.display='block';
    g('out').innerHTML='<h3>Your style: '+R.t+'</h3><p style="font-size:.9rem;margin:6px 0">'+R.d+'</p><p style="color:#5AE57A;font-size:.88rem">To grow:</p><ul>'+R.tips.map(x=>'<li>'+x+'</li>').join('')+'</ul>';
    g('out').scrollIntoView({behavior:'smooth'});
  }
  draw();
</script>
</body>
</html>
