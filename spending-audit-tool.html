<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Spending Audit Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat { flex: 1; min-width: 120px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 13px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: #5AE57A; }
  .stat .l { font-size: .69rem; opacity: .65; text-transform: uppercase; }
  .row2 { background: #2A442A; border: 1px solid #5A845A; border-radius: 7px; padding: 8px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; gap: 10px; font-size: .87rem; }
  .tag { font-size: .72rem; padding: 1px 8px; border-radius: 20px; border: 1px solid #5AE57A; color: #5AE57A; cursor: pointer; }
  .tag.want { border-color: #5AE57A; color: #5AE57A; } .tag.regret { border-color: #5AE57A; color: #5AE57A; }
  .row2 .x { cursor: pointer; opacity: .5; } .row2 .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Spending Audit Tool</h1>
  <p class="sub">Log recent spends and tag each as Need, Want, or Regret. The pattern is the lesson.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>What you bought</label><input id="nm" placeholder="e.g. takeout"></div>
      <div><label>$</label><input id="amt" type="number" min="0" step="0.01"></div>
      <div><label>Tag</label><select id="tg"><option>Need</option><option>Want</option><option>Regret</option></select></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="v" id="sNeed">$0</div><div class="l">Needs</div></div>
    <div class="stat"><div class="v" id="sWant">$0</div><div class="l">Wants</div></div>
    <div class="stat"><div class="v" id="sRegret">$0</div><div class="l">Regrets</div></div>
  </div>

  <div id="list"></div>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let S=JSON.parse(localStorage.getItem('sat')||'[]');
  const save=()=>localStorage.setItem('sat',JSON.stringify(S));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ const nm=v('nm'); const a=parseFloat(g('amt').value)||0; if(!nm||!a){alert('Add a name and amount.');return;}
    S.push({nm,a,t:g('tg').value}); ['nm','amt'].forEach(k=>g(k).value=''); save(); render(); }
  function cyc(i){ const o=['Need','Want','Regret']; S[i].t=o[(o.indexOf(S[i].t)+1)%3]; save(); render(); }
  function del(i){ S.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ S=[]; save(); render(); } }
  function render(){
    ['Need','Want','Regret'].forEach(t=>g('s'+t).textContent='$'+Math.round(S.filter(x=>x.t===t).reduce((s,x)=>s+x.a,0)).toLocaleString());
    const L=g('list');
    if(!S.length){ L.innerHTML='<div class="empty">No spends logged yet.</div>'; return; }
    L.innerHTML=[...S].map((x,i)=>({x,i})).reverse().map(({x,i})=>`<div class="row2"><span>${esc(x.nm)}</span><span>$${x.a.toLocaleString()} <span class="tag ${x.t==='Want'?'want':x.t==='Regret'?'regret':''}" onclick="cyc(${i})">${x.t}</span> <span class="x" onclick="del(${i})">✕</span></span></div>`).join('');
  }
  render();
</script>
</body>
</html>
