<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Contemplative Practice Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 50px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Contemplative Practice Builder</h1>
  <p class="sub">Build a quiet daily practice you can actually keep.</p>

  <div class="panel">
    <label for="practice">The practice</label>
    <input id="practice" placeholder="e.g. silent sitting, breath prayer, mindful walking">
    <div class="grid">
      <div><label for="when">When</label><input id="when" placeholder="e.g. first thing, 7am"></div>
      <div><label for="length">For how long</label><input id="length" placeholder="e.g. 10 minutes"></div>
    </div>
    <label for="where">Where &amp; in what posture</label>
    <input id="where" placeholder="A consistent place and a comfortable posture">
    <label for="begin">How you will begin and end</label>
    <textarea id="begin" placeholder="A simple opening and closing — a breath, a word, a bow"></textarea>
    <label for="distract">How you will meet distraction</label>
    <input id="distract" placeholder="e.g. gently return, without judgement">
    <button class="btn" onclick="gen()">Build Practice</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['practice','when','length','where','begin','distract'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('cpbu_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('cpbu_'+k,g(k).value)); });
  function gen(){
    const t='MY CONTEMPLATIVE PRACTICE\n\nPRACTICE: '+(v('practice')||'[your practice]')+
    '\n\nWHEN: '+(v('when')||'[your time]')+'   FOR: '+(v('length')||'[your length]')+
    '\n\nWHERE & POSTURE:\n'+(v('where')||'[your place and posture]')+
    '\n\nBEGIN & END:\n'+(v('begin')||'[your opening and closing]')+
    '\n\nWHEN MY MIND WANDERS:\n'+(v('distract')||'[gently return, without judgement]')+
    '\n\n--- A sustainable practice ---\nStart smaller than feels impressive — five faithful minutes beats thirty skipped.\nSame time, same place: let it become a habit, not a decision.\nThere is no "good" or "bad" sitting. Showing up is the practice.\nBe endlessly patient with yourself. Begin again, gently.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
