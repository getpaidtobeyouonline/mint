<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Phrase Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.95rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; } .row>div { flex: 1; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .phrase { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; margin-bottom: 6px; display: flex; justify-content: space-between; gap: 10px; }
  .phrase .en { font-size: .85rem; opacity: .7; }
  .phrase .lo { color: #5AE57A; font-weight: 500; }
  .phrase .x { cursor: pointer; opacity: .5; flex: none; } .phrase .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  .note { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; font-size: .8rem; opacity: .75; margin-top: 10px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.55rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Travel Phrase Generator</h1>
  <p class="sub">Build your own essential-phrase cheat sheet — the words that smooth every trip.</p>

  <div class="panel">
    <div style="font-family:'Playfair Display',serif;color:#5AE57A;margin-bottom:6px">The phrases worth learning</div>
    <div style="font-size:.86rem;opacity:.8" id="essentials"></div>
  </div>

  <div class="panel">
    <label>Build your cheat sheet — add the local translation</label>
    <div class="row" style="margin-bottom:8px">
      <div><input id="en" placeholder="English phrase"></div>
      <div><input id="lo" placeholder="Local language"></div>
    </div>
    <button class="btn" onclick="add()">+ Add to Cheat Sheet</button>
  </div>

  <div class="panel">
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
    <div class="note">Look up translations from a trusted source — then a couple of practised phrases go a long way.</div>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const ESSENTIALS=["Hello / Goodbye","Please / Thank you","Yes / No","Excuse me / Sorry","Do you speak English?","How much is this?","Where is...?","I would like...","The bill, please","Help! / I need a doctor","I do not understand","Cheers!"];
  g('essentials').innerHTML=ESSENTIALS.map(e=>'• '+e).join('<br>');
  let R=JSON.parse(localStorage.getItem('tpg2')||'[]');
  const save=()=>localStorage.setItem('tpg2',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('en')||!v('lo')){ alert('Enter both the English and local phrase.'); return; }
    R.push({en:v('en'),lo:v('lo')}); g('en').value=''; g('lo').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the cheat sheet?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No phrases added yet.</div>'; return; }
    L.innerHTML=R.map((x,i)=>'<div class="phrase"><span><span class="lo">'+esc(x.lo)+'</span><br><span class="en">'+esc(x.en)+'</span></span><span class="x" onclick="del('+i+')">✕</span></div>').join('');
  }
  render();
</script>
</body>
</html>
