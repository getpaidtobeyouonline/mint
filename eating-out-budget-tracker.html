<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eating Out Budget Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .row>div { flex: 1; min-width: 100px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat { flex: 1; min-width: 120px; background: #3C603C; border: 1px solid #4C724C; border-radius: 10px; padding: 13px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: #5AE57A; }
  .stat .l { font-size: .69rem; opacity: .65; text-transform: uppercase; }
  .ent { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 7px; padding: 9px 13px; margin-bottom: 6px; display: flex; justify-content: space-between; gap: 10px; font-size: .87rem; flex-wrap: wrap; }
  .tag { font-size: .72rem; padding: 1px 8px; border-radius: 20px; border: 1px solid #5AE57A; color: #5AE57A; }
  .tag.tk { border-color: #5AE57A; color: #5AE57A; }
  .ent .x { cursor: pointer; opacity: .5; } .ent .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Eating Out Budget Tracker</h1>
  <p class="sub">Track dining out vs. takeout vs. coffee runs. The bleed is usually somewhere specific.</p>

  <div class="panel">
    <div class="row">
      <div><label>Date</label><input id="dt" type="date"></div>
      <div style="flex:2"><label>Place</label><input id="nm" placeholder="e.g. lunch with Sam"></div>
      <div><label>Type</label><select id="ty"><option>Restaurant</option><option>Takeout / delivery</option><option>Coffee</option><option>Drinks</option></select></div>
      <div><label>$</label><input id="amt" type="number" min="0" step="0.01"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Log</button></div>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div id="list"></div>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('eobt')||'[]');
  const save=()=>localStorage.setItem('eobt',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  g('dt').value=new Date().toISOString().slice(0,10);
  function add(){ const nm=v('nm'), a=parseFloat(g('amt').value)||0; if(!nm||!a){alert('Add place and amount.');return;}
    R.push({d:g('dt').value,nm,t:g('ty').value,a}); ['nm','amt'].forEach(k=>g(k).value=''); save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ R=[]; save(); render(); } }
  function render(){
    const mo=new Date().toISOString().slice(0,7);
    const month=R.filter(x=>x.d.startsWith(mo));
    const by={Restaurant:0,'Takeout / delivery':0,Coffee:0,Drinks:0};
    month.forEach(x=>by[x.t]=(by[x.t]||0)+x.a);
    const tot=month.reduce((s,x)=>s+x.a,0);
    g('stats').innerHTML=`<div class="stat"><div class="v">$${tot.toFixed(2)}</div><div class="l">This month</div></div>`+
      Object.entries(by).map(([k,v])=>`<div class="stat"><div class="v">$${Math.round(v).toLocaleString()}</div><div class="l">${k}</div></div>`).join('');
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No entries yet.</div>'; return; }
    L.innerHTML=[...R].map((x,i)=>({x,i})).sort((a,b)=>a.x.d<b.x.d?1:-1).map(({x,i})=>`<div class="ent"><span><b style="color:#5AE57A">${x.d}</b> · ${esc(x.nm)} <span class="tag ${x.t.startsWith('Takeout')?'tk':''}">${esc(x.t)}</span></span><span>$${x.a.toFixed(2)} <span class="x" onclick="del(${i})">✕</span></span></div>`).join('');
  }
  render();
</script>
</body>
</html>
