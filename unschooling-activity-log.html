<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Unschooling Activity Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .total { text-align: center; margin-bottom: 12px; }
  .total .n { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; }
  .grp { font-size: .76rem; text-transform: uppercase; letter-spacing: .04em; color: #5AE57A; margin: 14px 0 6px; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 8px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; gap: 8px; font-size: .9rem; }
  .item .meta { font-size: .78rem; opacity: .65; }
  .item .x { cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Unschooling Activity Log</h1>
  <p class="sub">Log what your child explores each day — a quiet record of all the learning that just happens.</p>

  <div class="panel">
    <div class="row">
      <div><label>Area</label><select id="area"><option>Reading &amp; stories</option><option>Numbers &amp; logic</option><option>Nature &amp; science</option><option>Art &amp; making</option><option>Music &amp; movement</option><option>People &amp; conversation</option><option>Life skills</option><option>Other</option></select></div>
      <div style="flex:2"><label>What they explored</label><input id="what" placeholder="In their own words"></div>
      <div><label>Date</label><input id="date" type="date"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Log</button></div>
    </div>
  </div>

  <div class="panel">
    <div class="total"><span class="n" id="total">0</span><div style="opacity:.7;font-size:.85rem">moments of learning</div></div>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const AREAS=['Reading & stories','Numbers & logic','Nature & science','Art & making','Music & movement','People & conversation','Life skills','Other'];
  let R=JSON.parse(localStorage.getItem('uschl')||'[]');
  const save=()=>localStorage.setItem('uschl',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('what')){ alert('What did they explore?'); return; }
    R.push({a:g('area').value,w:v('what'),d:g('date').value||new Date().toISOString().slice(0,10)}); g('what').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the whole log?')){ R=[]; save(); render(); } }
  function render(){
    g('total').textContent=R.length;
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">Start logging — even small moments count.</div>'; return; }
    L.innerHTML=AREAS.map(a=>{
      const items=R.map((x,i)=>({x,i})).filter(o=>o.x.a===a);
      if(!items.length)return '';
      return '<div class="grp">'+a+' ('+items.length+')</div>'+items.map(({x,i})=>
        '<div class="item"><span>'+esc(x.w)+'</span><span><span class="meta">'+x.d+'</span>  <span class="x" onclick="del('+i+')">✕</span></span></div>').join('');
    }).join('');
  }
  render();
</script>
</body>
</html>
