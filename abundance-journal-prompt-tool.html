<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abundance Journal Prompt Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; text-align: center; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .95rem; padding: 13px 26px; border-radius: 8px; margin: 14px 8px 0 0; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .p { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 14px 16px; margin-bottom: 9px; font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.1rem; line-height: 1.4; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Abundance Journal Prompt Tool</h1>
  <p class="sub">3 abundance-mindset prompts to write into. Specific beats general.</p>

  <div class="panel">
    <button class="btn" onclick="gen()">Give Me 3 Prompts</button>
    <button class="btn ghost" onclick="gen()">↻ Different Ones</button>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const Q=[
    "What's already paid for in my life that past-me would be amazed by?",
    "Where did money flow easily to me this month? List 3 specific moments.",
    "Who in my life is wealthy in a way I admire? What can I learn from them?",
    "What's something I want, that I now have, that I once thought I couldn't afford?",
    "If money could not be a reason, what would I do this year?",
    "What's a small act of generosity I can do today without thinking about it?",
    "Where am I storing scarcity in my body? What would 'enough' feel like there?",
    "How is money trying to come to me right now, that I'm blocking by old beliefs?",
    "Whose recent financial win can I genuinely celebrate today?",
    "What did I receive today that I almost didn't notice?",
    "What's the smallest amount that would feel like a real win to me this week?",
    "What's enough for me — really? Not what the world says.",
    "Where am I generous already? What does that say about me?",
    "If I trusted money to keep showing up, what would I stop doing today?",
    "Who has more than me AND I love? What does that prove?",
    "What's one belief about money that my future-wealthy-self would laugh at?",
    "What's a piece of evidence — from this week — that abundance is possible for me?",
    "How would I behave with money today if I felt truly safe?",
    "What's coming to me that I cannot see yet, that I'm willing to trust?",
    "What would 'enough' look like if no one else was watching?"
  ];
  const g=id=>document.getElementById(id);
  function gen(){
    const p=[...Q]; for(let i=p.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [p[i],p[j]]=[p[j],p[i]]; }
    g('out').innerHTML=p.slice(0,3).map(x=>'<div class="p">'+esc(x)+'</div>').join('');
  }
  function esc(t){ return (t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  gen();
</script>
</body>
</html>
