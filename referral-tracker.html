<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Referral Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 2rem 1rem; }
    h1 { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: clamp(1.8rem, 4vw, 2.6rem); text-align: center; margin-bottom: 0.4rem; }
    .subtitle { text-align: center; opacity: 0.65; margin-bottom: 1.75rem; font-size: 0.9rem; }
    .container { max-width: 700px; margin: 0 auto; }
    .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 0.65rem; margin-bottom: 1.5rem; }
    .stat { background: #345534; border: 1px solid #3C603C; border-radius: 10px; padding: 0.85rem; text-align: center; }
    .stat-label { font-size: 0.7rem; opacity: 0.5; margin-bottom: 0.25rem; }
    .stat-val { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1.2rem; }
    .add-card { background: #345534; border: 1px solid #3C603C; border-radius: 10px; padding: 1.3rem; margin-bottom: 1.25rem; }
    .add-title { font-family: 'Playfair Display', serif; color: #5AE57A; font-size: 1rem; margin-bottom: 1rem; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; margin-bottom: 0.65rem; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.65rem; margin-bottom: 0.65rem; }
    label { display: block; font-size: 0.78rem; opacity: 0.55; margin-bottom: 0.3rem; }
    input[type="text"], input[type="number"], input[type="date"], select { width: 100%; background: #3C603C; border: 1px solid #4C724C; color: #FFFFFF; padding: 0.6rem 0.85rem; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none; }
    input:focus, select:focus { border-color: #5AE57A; }
    select option { background: #3C603C; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
    input[type="number"] { -moz-appearance: textfield; }
    input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .iw { position: relative; }
    .sym { position: absolute; top: 50%; transform: translateY(-50%); color: #5AE57A; font-size: 0.88rem; pointer-events: none; }
    .sl { left: 0.85rem; } .sr { right: 0.85rem; }
    .pl { padding-left: 2rem !important; } .pr { padding-right: 2rem !important; }
    .comm-preview { font-size: 0.82rem; color: #5AE57A; min-height: 1.2em; margin-bottom: 0.65rem; }
    .add-btn { background: #5AE57A; color: #325132; border: none; padding: 0.75rem; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; width: 100%; margin-top: 0.4rem; transition: opacity 0.2s; }
    .add-btn:hover { opacity: 0.85; }
    .filters { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .filter-btn { background: #345534; border: 1px solid #3C603C; color: #BFD8BF; padding: 0.35rem 0.8rem; border-radius: 20px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; transition: all 0.2s; }
    .filter-btn:hover { border-color: #5AE57A; color: #FFFFFF; }
    .filter-btn.active { background: #5AE57A; border-color: #5AE57A; color: #325132; font-weight: 700; }
    .ref-card { background: #345534; border: 1px solid #3C603C; border-radius: 10px; padding: 1.1rem; margin-bottom: 0.6rem; }
    .ref-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.45rem; gap: 0.5rem; }
    .ref-names { font-family: 'Playfair Display', serif; font-size: 1rem; }
    .ref-arrow { color: #5AE57A; margin: 0 0.4rem; opacity: 0.6; }
    .ref-sub { font-size: 0.78rem; opacity: 0.42; margin-top: 0.1rem; }
    .ref-right { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
    .sbadge { font-size: 0.72rem; padding: 0.2rem 0.65rem; border-radius: 20px; cursor: pointer; white-space: nowrap; transition: opacity 0.2s; }
    .sbadge:hover { opacity: 0.75; }
    .s-pending   { background: rgba(180,180,180,.1);  color: #BFD8BF; }
    .s-contacted { background: rgba(100,149,237,.15); color: #5AE57A; }
    .s-converted { background: rgba(201,168,76,.15);  color: #5AE57A; }
    .s-paid      { background: rgba(111,207,142,.15); color: #5AE57A; }
    .ref-meta { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-top: 0.4rem; }
    .ref-date { font-size: 0.72rem; opacity: 0.35; }
    .ref-deal { font-size: 0.78rem; color: #5AE57A; }
    .ref-comm { font-size: 0.78rem; color: #5AE57A; }
    .ref-note { font-size: 0.82rem; opacity: 0.52; margin-top: 0.45rem; line-height: 1.5; font-style: italic; }
    .del-btn { background: transparent; border: none; color: #4C724C; cursor: pointer; font-size: 0.85rem; transition: color 0.2s; }
    .del-btn:hover { color: #5AE57A; }
    .empty { text-align: center; opacity: 0.35; padding: 2.5rem 1rem; font-size: 0.9rem; }
    .btn-row { display: flex; gap: 0.65rem; margin: 0.5rem 0 2.5rem; }
    .btn-outline { background: transparent; border: 1px solid #5AE57A; color: #5AE57A; padding: 0.7rem 1rem; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; flex: 1; transition: all 0.2s; }
    .btn-outline:hover { background: #5AE57A; color: #325132; }
    .btn-muted { border-color: #4C724C !important; color: #BFD8BF !important; }
    .btn-muted:hover { background: #5AE57A !important; border-color: #5AE57A !important; color: #FFFFFF !important; }
    footer { text-align: center; opacity: 0.35; font-size: 0.78rem; margin-top: 1rem; }
    @media (max-width: 520px) { .grid2, .grid3 { grid-template-columns: 1fr; } .stats { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>
<body>
<div class="container">
  <h1>Referral Tracker</h1>
  <p class="subtitle">Track every referral from lead to close — click a status badge to advance it.</p>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total Referrals</div><div class="stat-val" id="statTotal">0</div></div>
    <div class="stat"><div class="stat-label">Converted</div><div class="stat-val" id="statConv">0</div></div>
    <div class="stat"><div class="stat-label">Conv. Rate</div><div class="stat-val" id="statRate">—</div></div>
    <div class="stat"><div class="stat-label">Total Earned</div><div class="stat-val" id="statEarned">$0</div></div>
  </div>

  <div class="add-card">
    <div class="add-title">Add Referral</div>
    <div class="grid2">
      <div><label>Referred By</label><input type="text" id="rFrom" placeholder="Who sent the lead"></div>
      <div><label>Lead Name</label><input type="text" id="rLead" placeholder="Who was referred"></div>
    </div>
    <div class="grid3">
      <div><label>Date</label><input type="date" id="rDate"></div>
      <div><label>Product / Service</label><input type="text" id="rProduct" placeholder="e.g. Coaching"></div>
      <div><label>Status</label>
        <select id="rStatus">
          <option>Pending</option><option>Contacted</option><option>Converted</option><option>Paid</option>
        </select>
      </div>
    </div>
    <div class="grid2">
      <div><label>Deal Value</label>
        <div class="iw"><span class="sym sl">$</span><input type="number" class="pl" id="rVal" placeholder="0.00" min="0" step="0.01" oninput="previewComm()"></div>
      </div>
      <div><label>Commission %</label>
        <div class="iw"><input type="number" class="pr" id="rPct" placeholder="10" min="0" max="100" step="0.1" oninput="previewComm()"><span class="sym sr">%</span></div>
      </div>
    </div>
    <div class="comm-preview" id="commPrev"></div>
    <div style="margin-bottom:0.65rem"><label>Notes (optional)</label><input type="text" id="rNotes" placeholder="Follow-up needed, context, etc."></div>
    <button class="add-btn" onclick="addRef()">+ Add Referral</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('All',this)">All</button>
    <button class="filter-btn" onclick="setFilter('Pending',this)">⏳ Pending</button>
    <button class="filter-btn" onclick="setFilter('Contacted',this)">💬 Contacted</button>
    <button class="filter-btn" onclick="setFilter('Converted',this)">🎯 Converted</button>
    <button class="filter-btn" onclick="setFilter('Paid',this)">✅ Paid</button>
  </div>

  <div id="refList"></div>

  <div class="btn-row">
    <button class="btn-outline" id="copyBtn" onclick="copyReport()">Copy Report</button>
    <button class="btn-outline btn-muted" onclick="confirmClear()">Clear All</button>
  </div>

  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const KEY = 'gpbyo_refs_v1';
  let refs   = JSON.parse(localStorage.getItem(KEY) || '[]');
  let filter = 'All';

  document.getElementById('rDate').valueAsDate = new Date();

  function save() { localStorage.setItem(KEY, JSON.stringify(refs)); }
  function fmt(n) { return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

  function previewComm() {
    const v = parseFloat(document.getElementById('rVal').value) || 0;
    const p = parseFloat(document.getElementById('rPct').value) || 0;
    document.getElementById('commPrev').textContent = (v && p) ? `Commission: ${fmt(v*p/100)}` : '';
  }

  function addRef() {
    const from    = document.getElementById('rFrom').value.trim();
    const lead    = document.getElementById('rLead').value.trim();
    const date    = document.getElementById('rDate').value;
    const product = document.getElementById('rProduct').value.trim();
    const status  = document.getElementById('rStatus').value;
    const val     = parseFloat(document.getElementById('rVal').value) || 0;
    const pct     = parseFloat(document.getElementById('rPct').value) || 0;
    const notes   = document.getElementById('rNotes').value.trim();

    if (!from) { document.getElementById('rFrom').focus(); return; }
    if (!lead) { document.getElementById('rLead').focus(); return; }

    refs.unshift({ id: Date.now(), from, lead, date, product, status, val, pct, notes });
    save();
    ['rFrom','rLead','rProduct','rVal','rPct','rNotes'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('rStatus').value = 'Pending';
    document.getElementById('commPrev').textContent = '';
    render();
  }

  const ORDER = ['Pending','Contacted','Converted','Paid'];

  function advance(id) {
    const r = refs.find(x=>x.id===id);
    if (r) { r.status = ORDER[Math.min(ORDER.indexOf(r.status)+1, 3)]; save(); render(); }
  }

  function deleteRef(id) { refs = refs.filter(r=>r.id!==id); save(); render(); }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const n    = refs.length;
    const conv = refs.filter(r=>r.status==='Converted'||r.status==='Paid').length;
    const earn = refs.filter(r=>r.status==='Converted'||r.status==='Paid').reduce((s,r)=>s+r.val*r.pct/100,0);

    document.getElementById('statTotal').textContent  = n;
    document.getElementById('statConv').textContent   = conv;
    document.getElementById('statRate').textContent   = n ? Math.round(conv/n*100)+'%' : '—';
    document.getElementById('statEarned').textContent = earn > 0 ? fmt(earn) : '$0';

    const shown = filter==='All' ? refs : refs.filter(r=>r.status===filter);
    const list  = document.getElementById('refList');

    if (!shown.length) {
      list.innerHTML = `<div class="empty">${n?'No referrals with this status.':'No referrals yet — add your first one above.'}</div>`;
      return;
    }

    const icons = { Pending:'⏳ Pending', Contacted:'💬 Contacted', Converted:'🎯 Converted', Paid:'✅ Paid' };
    const cls   = { Pending:'s-pending',  Contacted:'s-contacted',  Converted:'s-converted',  Paid:'s-paid'  };
    const tip   = { Pending:'Click → Contacted', Contacted:'Click → Converted', Converted:'Click → Paid', Paid:'Fully paid' };

    list.innerHTML = shown.map(r => {
      const comm = r.val && r.pct ? r.val * r.pct / 100 : 0;
      return `
        <div class="ref-card">
          <div class="ref-top">
            <div>
              <div class="ref-names">${r.from}<span class="ref-arrow">→</span>${r.lead}</div>
              ${r.product?`<div class="ref-sub">${r.product}</div>`:''}
            </div>
            <div class="ref-right">
              <span class="sbadge ${cls[r.status]}" onclick="advance(${r.id})" title="${tip[r.status]}">${icons[r.status]}</span>
              <button class="del-btn" onclick="deleteRef(${r.id})">✕</button>
            </div>
          </div>
          <div class="ref-meta">
            <span class="ref-date">${r.date}</span>
            ${r.val?`<span class="ref-deal">${fmt(r.val)}</span>`:''}
            ${comm?`<span class="ref-comm">+${fmt(comm)} commission</span>`:''}
          </div>
          ${r.notes?`<div class="ref-note">${r.notes}</div>`:''}
        </div>`;
    }).join('');
  }

  function copyReport() {
    const n    = refs.length;
    const conv = refs.filter(r=>r.status==='Converted'||r.status==='Paid').length;
    const earn = refs.filter(r=>r.status==='Converted'||r.status==='Paid').reduce((s,r)=>s+r.val*r.pct/100,0);
    let text   = `REFERRAL REPORT\n${'─'.repeat(28)}\nTotal: ${n} | Converted: ${conv} | Rate: ${n?Math.round(conv/n*100)+'%':'—'} | Earned: ${fmt(earn)}\n\n`;
    refs.forEach(r => {
      text += `${r.from} → ${r.lead}  [${r.status}]\n`;
      if (r.product) text += `  ${r.product}\n`;
      if (r.val)     text += `  Deal: ${fmt(r.val)}${r.pct?` | Commission: ${fmt(r.val*r.pct/100)}`:''}\n`;
      if (r.notes)   text += `  ${r.notes}\n`;
      text += '\n';
    });
    navigator.clipboard.writeText(text).then(()=>{
      const b=document.getElementById('copyBtn'); b.textContent='Copied!';
      setTimeout(()=>b.textContent='Copy Report',1600);
    });
  }

  function confirmClear() {
    if (confirm('Delete all referrals? This cannot be undone.')) { refs=[]; save(); render(); }
  }

  render();
</script>
</body>
</html>
