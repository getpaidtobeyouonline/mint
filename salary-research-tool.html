<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Research Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 56px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; } .grid>div { flex: 1; min-width: 130px; }
  .res { text-align: center; margin: 6px 0 14px; }
  .res .n { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #5AE57A; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  .note { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; font-size: .8rem; opacity: .75; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Salary Research Tool</h1>
  <p class="sub">Gather salary data points and set a confident, evidence-based range.</p>

  <div class="panel">
    <div class="grid">
      <div><label for="role">Role</label><input id="role" placeholder="Job title"></div>
      <div><label for="loc">Location / market</label><input id="loc" placeholder="City or remote"></div>
    </div>
    <label for="figs">Salary figures you found (one per line, numbers only)</label>
    <textarea id="figs" placeholder="From job ads, salary sites, peers, recruiters\n58000\n65000\n72000"></textarea>
    <label for="sources">Where the figures came from</label>
    <textarea id="sources" placeholder="e.g. 3 job ads, Glassdoor, a recruiter, a peer in the role"></textarea>
    <button class="btn" onclick="gen()">Build Range</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <div class="res" id="res" style="display:none"><div class="n" id="mid">—</div><div style="opacity:.7;font-size:.85rem">market midpoint estimate</div></div>
  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['role','loc','figs','sources'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('srt_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('srt_'+k,g(k).value)); });
  const fmt=n=>n.toLocaleString(undefined,{maximumFractionDigits:0});
  function gen(){
    const nums=v('figs').split(/[\n,]/).map(x=>parseFloat(x.replace(/[^0-9.]/g,''))).filter(x=>x>0);
    if(!nums.length){ alert('Add at least one salary figure.'); return; }
    const lo=Math.min(...nums), hi=Math.max(...nums), avg=nums.reduce((s,n)=>s+n,0)/nums.length;
    g('mid').textContent=fmt(avg); g('res').style.display='block';
    const target=Math.round(avg*1.05/1000)*1000;
    const t='SALARY RESEARCH SUMMARY\n'+(v('role')?'Role: '+v('role'):'')+(v('loc')?'  |  '+v('loc'):'')+
    '\n\nData points: '+nums.length+'\nLowest: '+fmt(lo)+'\nHighest: '+fmt(hi)+'\nAverage (midpoint): '+fmt(avg)+
    '\n\nSOURCES:\n'+(v('sources')||'[where your figures came from]')+
    '\n\nYOUR TARGET RANGE TO QUOTE:\n'+fmt(target)+' – '+fmt(Math.round(hi/1000)*1000)+
    '\n\nTIP: Quote a range, with your real target near the bottom of it.\nAlways state a number slightly above what you would happily accept.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
