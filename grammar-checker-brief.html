<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Grammar Checker Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; min-height: 130px; }
  textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin-top: 12px; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
  .stat { flex: 1; min-width: 90px; background: #2A442A; border: 1px solid #5A845A; border-radius: 10px; padding: 11px; text-align: center; }
  .stat .v { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: #5AE57A; }
  .stat .l { font-size: .66rem; opacity: .65; text-transform: uppercase; }
  .flag { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 9px 13px; margin-bottom: 6px; font-size: .87rem; }
  .flag .d { color: #5AE57A; }
  .ok { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 11px 14px; font-size: .88rem; }
  .note { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; font-size: .8rem; opacity: .75; margin-top: 12px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Grammar Checker Brief</h1>
  <p class="sub">A quick self-edit pass — flags common writing slips so you can polish before you submit.</p>

  <div class="panel">
    <label for="text">Paste your writing</label>
    <textarea id="text" placeholder="Paste an essay, email or paragraph here..."></textarea>
    <button class="btn" onclick="check()">Check My Writing</button>
    <div class="note">A self-edit helper, not a full grammar engine. It flags common style and clarity issues to review yourself.</div>
  </div>

  <div id="out"></div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id);
  function check(){
    const raw=g('text').value, t=raw.trim();
    if(!t){ alert('Paste some writing first.'); return; }
    const words=t.split(/\s+/).filter(Boolean);
    const sentences=t.split(/[.!?]+/).map(s=>s.trim()).filter(Boolean);
    const avgLen=sentences.length?Math.round(words.length/sentences.length):0;
    const flags=[];
    const lower=' '+t.toLowerCase()+' ';
    const longS=sentences.filter(s=>s.split(/\s+/).length>30);
    if(longS.length)flags.push(longS.length+' very long sentence(s) (30+ words). Consider splitting for clarity.');
    if(/\b(very|really|quite|just|actually|basically|literally)\b/i.test(t)){
      const fillers=(lower.match(/ (very|really|quite|just|actually|basically|literally) /g)||[]).length;
      flags.push(fillers+' filler word(s) (very, really, just, actually...). Cut them for stronger writing.');
    }
    if(/\b(\w+)\s+\1\b/i.test(t))flags.push('A repeated word detected (e.g. "the the"). Check for accidental doubles.');
    if(/\bi\s/i.test(' '+raw) && / i /.test(' '+raw))flags.push('Check that the pronoun "I" is always capitalised.');
    if(/\s,|\s\./.test(raw))flags.push('Space before a comma or full stop found. Remove it.');
    if(/[a-z]\.[A-Z]/.test(raw))flags.push('Missing space after a full stop somewhere.');
    if(/!{2,}|\?{2,}/.test(raw))flags.push('Multiple !! or ?? found. One is enough in formal writing.');
    const passive=(lower.match(/ (was|were|is|are|been) \w+ed /g)||[]).length;
    if(passive>=2)flags.push(passive+' possible passive constructions. Active voice is usually clearer.');
    if(avgLen>25)flags.push('Average sentence is long ('+avgLen+' words). Mix in shorter sentences.');
    let h='<div class="panel"><div class="stats"><div class="stat"><div class="v">'+words.length+'</div><div class="l">Words</div></div><div class="stat"><div class="v">'+sentences.length+'</div><div class="l">Sentences</div></div><div class="stat"><div class="v">'+avgLen+'</div><div class="l">Avg words/sentence</div></div></div>';
    if(flags.length)h+='<div style="margin-top:12px">'+flags.map(f=>'<div class="flag"><span class="d">⚠</span> '+f+'</div>').join('')+'</div>';
    else h+='<div class="ok" style="margin-top:12px">✓ No common issues flagged. Still read it aloud once — your ear catches what checkers miss.</div>';
    h+='</div>';
    g('out').innerHTML=h;
    g('out').scrollIntoView({behavior:'smooth'});
  }
</script>
</body>
</html>
