<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spiritual Business Aligner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 11px 0 5px; }
  input, textarea { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .94rem; padding: 9px 11px; border-radius: 8px; resize: vertical; }
  textarea { min-height: 52px; }
  input:focus, textarea:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .92rem; padding: 11px 20px; border-radius: 8px; font-family:'DM Sans',sans-serif; margin: 14px 8px 0 0; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  pre { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 16px; white-space: pre-wrap; font-family: 'DM Sans', sans-serif; font-size: .92rem; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Spiritual Business Aligner</h1>
  <p class="sub">Check that the way you earn a living is in tune with your soul.</p>

  <div class="panel">
    <label for="gifts">Your gifts and the work you feel called to</label>
    <textarea id="gifts" placeholder="What you are here to offer the world"></textarea>
    <label for="serve">Who you are here to serve</label>
    <input id="serve" placeholder="The people you most want to help">
    <label for="values">Your core values — and how they show up in the business</label>
    <textarea id="values" placeholder="What you stand for, and where it is visible in how you work"></textarea>
    <label for="misaligned">Where it feels out of alignment</label>
    <textarea id="misaligned" placeholder="What feels heavy, forced, or not quite you"></textarea>
    <label for="step">One aligned next step</label>
    <input id="step" placeholder="A small change toward more alignment">
    <button class="btn" onclick="gen()">Build Alignment</button>
    <button class="btn ghost" onclick="copyOut()">Copy</button>
  </div>

  <pre id="out" style="display:none"></pre>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const F=['gifts','serve','values','misaligned','step'];
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  F.forEach(k=>{ const s=localStorage.getItem('sba_'+k); if(s!==null)g(k).value=s; g(k).addEventListener('input',()=>localStorage.setItem('sba_'+k,g(k).value)); });
  function gen(){
    const t='SPIRITUAL BUSINESS ALIGNMENT\n\nMY GIFTS & CALLING:\n'+(v('gifts')||'[what you are here to offer]')+
    '\n\nWHO I SERVE:\n'+(v('serve')||'[the people you help]')+
    '\n\nMY VALUES IN ACTION:\n'+(v('values')||'[what you stand for and where it shows]')+
    '\n\nWHERE IT FEELS OUT OF ALIGNMENT:\n'+(v('misaligned')||'[what feels heavy or forced]')+
    '\n\nMY ALIGNED NEXT STEP:\n'+(v('step')||'[a small change toward alignment]')+
    '\n\n--- Soul-aligned business ---\nAlignment is felt in the body — notice what energises you and what drains you.\nYou are allowed to be both spiritual and well paid. Service and abundance are partners.\nLet your values shape your pricing, your boundaries and your offers.\nRealign in small, regular steps. The business is meant to support your life, not consume it.';
    g('out').textContent=t; g('out').style.display='block'; g('out').scrollIntoView({behavior:'smooth'});
  }
  function copyOut(){ const t=g('out').textContent; if(!t){alert('Build it first.');return;} navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.')); }
</script>
</body>
</html>
