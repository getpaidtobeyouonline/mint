<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Broadcast Email Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 740px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 20px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 8px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .addrow { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; } .addrow>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; margin-top: 12px; }
  .ratio { font-size: .85rem; opacity: .85; margin-bottom: 12px; background:#2E4D2E;border:1px solid #4F8A55;border-radius:8px;padding:10px 14px; }
  .row { background: #2A442A; border: 1px solid #5A845A; border-left: 3px solid #5AE57A; border-radius: 8px; padding: 10px 13px; margin-bottom: 7px; display: flex; justify-content: space-between; gap: 10px; align-items: center; flex-wrap: wrap; }
  .row .tag { font-size: .72rem; padding: 2px 9px; border-radius: 20px; border: 1px solid #5AE57A; color: #5AE57A; }
  .row .tag.sell { border-color:#5AE57A;color:#5AE57A; }
  .row .x { cursor: pointer; opacity: .5; } .row .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .88rem; padding: 16px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.6rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Broadcast Email Planner</h1>
  <p class="sub">Plan your one-off sends with a healthy value-to-sell ratio so the list never feels milked.</p>

  <div class="panel">
    <div class="addrow">
      <div style="flex:2"><label for="nm">Email idea / subject</label><input id="nm" placeholder="e.g. The pricing mistake costing you clients"></div>
      <div><label for="date">Send date</label><input id="date" type="date"></div>
      <div><label for="type">Type</label><select id="type"><option>Value</option><option>Story</option><option>Engagement</option><option>Sell</option></select></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="ratio" id="ratio"></div>
  <div id="list"></div>
  <button class="btn ghost" onclick="clearAll()">Clear All</button>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let E=JSON.parse(localStorage.getItem('bep')||'[]');
  const save=()=>localStorage.setItem('bep',JSON.stringify(E));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ const nm=v('nm'); if(!nm){alert('Add an email idea.');return;} E.push({nm,date:g('date').value,type:g('type').value}); g('nm').value=''; save(); render(); }
  function del(i){ E.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all?')){ E=[]; save(); render(); } }
  function render(){
    const sell=E.filter(e=>e.type==='Sell').length, tot=E.length;
    const pct=tot?Math.round(sell/tot*100):0;
    g('ratio').innerHTML= tot? `Mix: <b>${tot-sell}</b> value / <b>${sell}</b> sell (${pct}% selling). `+
      (pct<=30?'Healthy — you are giving far more than you ask. The list stays warm.':pct<=50?'Borderline. Add more pure-value sends or opens will slide.':'<b style="color:#5AE57A">Too sales-heavy.</b> Aim for ~80/20 value-to-sell or expect unsubscribes.')
      : 'Add emails to see your value-to-sell balance.';
    const L=g('list');
    if(!E.length){ L.innerHTML='<div class="empty">No broadcasts planned yet.</div>'; return; }
    L.innerHTML=[...E].map((x,i)=>({x,i})).sort((a,b)=>(a.x.date||'~')<(b.x.date||'~')?-1:1).map(({x,i})=>`<div class="row"><span>${x.date?`<b style="color:#5AE57A">${x.date}</b> · `:''}${esc(x.nm)}</span><span><span class="tag ${x.type==='Sell'?'sell':''}">${x.type}</span> <span class="x" onclick="del(${i})">✕</span></span></div>`).join('');
  }
  render();
</script>
</body>
</html>
