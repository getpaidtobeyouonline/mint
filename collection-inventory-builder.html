<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minted Collection Inventory Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 90px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .total { text-align: center; margin-bottom: 12px; }
  .total .n { font-family: 'Playfair Display', serif; font-size: 2rem; color: #5AE57A; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 8px 12px; margin-bottom: 5px; display: flex; justify-content: space-between; gap: 8px; font-size: .9rem; }
  .item .meta { font-size: .78rem; opacity: .65; }
  .item .val { color: #5AE57A; }
  .item .x { cursor: pointer; opacity: .5; } .item .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.45rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Minted Collection Inventory Builder</h1>
  <p class="sub">A flexible inventory for any collection — note, label, and value each piece.</p>

  <div class="panel">
    <label>What you collect</label>
    <input id="what" placeholder="e.g. records, teapots, comics">
    <div class="row" style="margin-top:8px">
      <div style="flex:2"><label>Item</label><input id="name" placeholder="Name / title"></div>
      <div><label>Year / detail</label><input id="meta" placeholder="e.g. 1972, mint"></div>
      <div><label>Value (est.)</label><input id="val" type="number" min="0" step="0.01" placeholder="0"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div class="total"><span class="n" id="total">0</span><div style="opacity:.7;font-size:.85rem">items  ·  estimated value <span id="totalVal" style="color:#5AE57A">0</span></div></div>
    <div id="list"></div>
    <button class="btn ghost" onclick="copyOut()" style="margin-top:8px">Copy Inventory</button>
    <button class="btn ghost" onclick="clearAll()">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('cib')||'[]');
  let title=localStorage.getItem('cib_what')||'';
  if(title)g('what').value=title;
  g('what').addEventListener('input',()=>localStorage.setItem('cib_what',g('what').value));
  const save=()=>localStorage.setItem('cib',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const fmt=n=>n.toLocaleString(undefined,{maximumFractionDigits:0});
  function add(){ if(!v('name')){ alert('Enter an item.'); return; }
    R.push({n:v('name'),m:v('meta'),v:parseFloat(g('val').value)||0}); g('name').value=''; g('meta').value=''; g('val').value=''; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the inventory?')){ R=[]; save(); render(); } }
  function copyOut(){ if(!R.length){ alert('Nothing to copy.'); return; }
    const t=(g('what').value||'COLLECTION INVENTORY').toUpperCase()+'\n\n'+R.map(x=>'- '+x.n+(x.m?' ('+x.m+')':'')+(x.v?' — '+fmt(x.v):'')).join('\n')+'\n\nTotal: '+fmt(R.reduce((s,x)=>s+x.v,0));
    navigator.clipboard.writeText(t).then(()=>alert('Copied!'),()=>alert('Copy failed.'));
  }
  function render(){
    g('total').textContent=R.length;
    g('totalVal').textContent=fmt(R.reduce((s,x)=>s+x.v,0));
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No items yet — add the first one.</div>'; return; }
    L.innerHTML=R.map((x,i)=>'<div class="item"><span>'+esc(x.n)+'</span><span>'+(x.m?'<span class="meta">'+esc(x.m)+'</span>  ':'')+(x.v?'<span class="val">'+fmt(x.v)+'</span>  ':'')+'<span class="x" onclick="del('+i+')">✕</span></span></div>').join('');
  }
  render();
</script>
</body>
</html>
