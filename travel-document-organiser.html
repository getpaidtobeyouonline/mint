<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Document Organiser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 660px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input, select { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus, select:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; margin-top: 12px; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .doc { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 9px 13px; margin-bottom: 6px; display: flex; align-items: center; gap: 9px; font-size: .87rem; }
  .doc .box { width: 19px; height: 19px; border: 2px solid #5AE57A; border-radius: 5px; flex: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: .7rem; font-weight: 700; }
  .doc .box.on { background: #5AE57A; color: #325132; }
  .doc.done .lb { opacity: .55; }
  .doc .ty { font-size: .74rem; opacity: .6; }
  .doc .x { margin-left: auto; cursor: pointer; opacity: .5; } .doc .x:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 12px 0; font-style: italic; }
  .note { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 10px 13px; font-size: .8rem; opacity: .75; margin-top: 10px; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Travel Document Organiser</h1>
  <p class="sub">List every document your trip needs, and tick it once it is sorted and backed up.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Document</label><input id="name" placeholder="e.g. Flight confirmation"></div>
      <div><label>Type</label><select id="type"><option>Identity</option><option>Bookings</option><option>Insurance</option><option>Visas / permits</option><option>Finance</option><option>Health</option><option>Other</option></select></div>
      <div style="flex:0"><button class="btn" onclick="add()" style="margin-top:0">+ Add</button></div>
    </div>
    <div class="note">Keep both digital copies (cloud + phone) and a paper copy, stored separately from the originals.</div>
  </div>

  <div class="panel">
    <p style="font-size:.8rem;opacity:.6;margin-bottom:8px">Tick a document once it is ready AND backed up.</p>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  const TYPES=["Identity","Bookings","Insurance","Visas / permits","Finance","Health","Other"];
  let R=JSON.parse(localStorage.getItem('tdo')||'[]');
  const save=()=>localStorage.setItem('tdo',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('name')){ alert('Enter a document.'); return; }
    R.push({n:v('name'),t:g('type').value,done:false}); g('name').value=''; save(); render(); }
  function toggle(i){ R[i].done=!R[i].done; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear all documents?')){ R=[]; save(); render(); } }
  function render(){
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No documents added yet.</div>'; return; }
    const done=R.filter(x=>x.done).length;
    let h='<div style="font-size:.85rem;opacity:.75;margin-bottom:8px">'+done+' / '+R.length+' documents ready &amp; backed up</div>';
    h+=TYPES.map(ty=>{
      const items=R.map((x,i)=>({x,i})).filter(o=>o.x.t===ty);
      if(!items.length)return '';
      return items.map(({x,i})=>
        '<div class="doc'+(x.done?' done':'')+'"><span class="box'+(x.done?' on':'')+'" onclick="toggle('+i+')">'+(x.done?'✓':'')+'</span><span class="lb">'+esc(x.n)+' <span class="ty">· '+x.t+'</span></span><span class="x" onclick="del('+i+')">✕</span></div>').join('');
    }).join('');
    L.innerHTML=h;
  }
  render();
</script>
</body>
</html>
