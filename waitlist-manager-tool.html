<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waitlist Manager Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #325132; color: #FFFFFF; font-family: 'DM Sans', sans-serif; line-height: 1.6; padding: 24px; }
  .wrap { max-width: 680px; margin: 0 auto; }
  h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #5AE57A; text-align: center; }
  .sub { text-align: center; opacity: .75; margin: 8px 0 22px; font-size: .95rem; }
  label { display: block; font-size: .73rem; letter-spacing: .04em; text-transform: uppercase; opacity: .7; margin: 9px 0 5px; }
  input { width: 100%; background: #2A442A; border: 1px solid #5A845A; color: #FFFFFF; font-family: 'DM Sans', sans-serif; font-size: .92rem; padding: 8px 10px; border-radius: 8px; }
  input:focus { outline: none; border-color: #5AE57A; }
  .panel { background: #3C603C; border: 1px solid #4C724C; border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; } .row>div { flex: 1; min-width: 110px; }
  .btn { background: #5AE57A; color: #325132; border: none; cursor: pointer; font-weight: 500; font-size: .9rem; padding: 9px 16px; border-radius: 7px; font-family:'DM Sans',sans-serif; }
  .btn.ghost { background: transparent; color: #5AE57A; border: 1px solid #5AE57A; }
  .total { text-align: center; margin-bottom: 12px; }
  .total .n { font-family: 'Playfair Display', serif; font-size: 2.1rem; color: #5AE57A; }
  .item { background: #2A442A; border: 1px solid #5A845A; border-radius: 8px; padding: 9px 12px; margin-bottom: 6px; display: flex; justify-content: space-between; gap: 8px; align-items: center; }
  .item.invited { opacity: .5; }
  .item .nm { font-weight: 500; }
  .item .meta { font-size: .8rem; opacity: .65; }
  .acts { display: flex; gap: 8px; flex: none; }
  .acts span { cursor: pointer; opacity: .6; font-size: .85rem; } .acts span:hover { opacity: 1; color: #5AE57A; }
  .empty { text-align: center; opacity: .5; font-size: .86rem; padding: 14px 0; font-style: italic; }
  footer { text-align: center; opacity: .55; font-size: .82rem; margin-top: 38px; }
  @media (max-width: 600px) { h1 { font-size: 1.5rem; } body { padding: 16px; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Waitlist Manager Tool</h1>
  <p class="sub">Keep a warm waitlist organised — and ready to fill your next intake fast.</p>

  <div class="panel">
    <div class="row">
      <div style="flex:2"><label>Name</label><input id="name" placeholder="Person's name"></div>
      <div style="flex:2"><label>Interested in</label><input id="offer" placeholder="Programme or offer"></div>
    </div>
    <div class="row" style="margin-top:8px">
      <div style="flex:3"><label>Note (contact, fit, priority)</label><input id="note" placeholder="Anything useful"></div>
      <div style="flex:0"><button class="btn" onclick="add()">+ Add</button></div>
    </div>
  </div>

  <div class="panel">
    <div class="total"><span class="n" id="total">0</span><div style="opacity:.7;font-size:.85rem">people waiting</div></div>
    <div id="list"></div>
    <button class="btn ghost" onclick="clearAll()" style="margin-top:8px">Clear All</button>
  </div>
  <footer>Powered by GetPaidToBeYouOnline</footer>
</div>

<script>
  const g=id=>document.getElementById(id), v=id=>g(id).value.trim();
  let R=JSON.parse(localStorage.getItem('wmt')||'[]');
  const save=()=>localStorage.setItem('wmt',JSON.stringify(R));
  const esc=t=>(t||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function add(){ if(!v('name')){ alert('Enter a name.'); return; }
    R.push({n:v('name'),o:v('offer'),note:v('note'),d:new Date().toISOString().slice(0,10),inv:false});
    g('name').value=''; g('offer').value=''; g('note').value=''; save(); render(); }
  function toggle(i){ R[i].inv=!R[i].inv; save(); render(); }
  function del(i){ R.splice(i,1); save(); render(); }
  function clearAll(){ if(confirm('Clear the whole waitlist?')){ R=[]; save(); render(); } }
  function render(){
    g('total').textContent=R.filter(x=>!x.inv).length;
    const L=g('list');
    if(!R.length){ L.innerHTML='<div class="empty">No one on the waitlist yet.</div>'; return; }
    L.innerHTML=R.map((x,i)=>'<div class="item'+(x.inv?' invited':'')+'"><div><div class="nm">'+esc(x.n)+(x.inv?'  ✓ invited':'')+'</div><div class="meta">'+(esc(x.o)||'—')+(x.note?'  ·  '+esc(x.note):'')+'  ·  added '+x.d+'</div></div><div class="acts"><span onclick="toggle('+i+')">'+(x.inv?'undo':'invite')+'</span><span onclick="del('+i+')">✕</span></div></div>').join('');
  }
  render();
</script>
</body>
</html>
